  <title>Audition Builder - Build The Show</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #fbf9ff;
      color: #1a1530;
      font-family: var(--bts-font);
    }

    .wizard-bg {
      position: fixed;
      inset: 0;
      background-image: url('/ASSETS/Images/Grid-purple.png');
      background-repeat: repeat;
      background-size: 50%;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }

    .wizard-header {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0 1.6rem;
      min-height: 60px;
      background: #572e88;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .wizard-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('/ASSETS/Images/Grid-purple.png');
      background-repeat: repeat;
      background-size: 50%;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .wizard-header > * {
      position: relative;
      z-index: 1;
    }

    .wizard-header-actions {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .wizard-brand img {
      height: 28px;
      display: block;
    }

    .wizard-back {
      color: rgba(255,255,255,0.74);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      padding: 0.45rem 0.9rem;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .wizard-back:hover {
      color: #fff;
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.36);
    }

    .wizard-save-status {
      font-size: 0.68rem;
      font-weight: 400;
      color: rgba(180,160,210,0.45);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    .wizard-header.inframe .wizard-brand,
    .wizard-header.inframe #wizard-back-link { display: none; }

    .wizard-header.inframe {
      justify-content: flex-end;
      background: #f8f6fb;
      border-bottom: 1px solid rgba(87,46,136,0.1);
    }
    .wizard-header.inframe::before { display: none; }
    .wizard-header.inframe .wizard-save-status { color: #9a8ab0; }
    .wizard-header.inframe .wizard-delete { color: #6a5a80; }

    .wizard-delete {
      appearance: none;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.78);
      font: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 0.15em;
      cursor: pointer;
      padding: 0.2rem 0.15rem;
      transition: color 0.15s ease, opacity 0.15s ease;
    }

    .wizard-delete:hover:not(:disabled) {
      color: #fff;
    }

    .wizard-delete:disabled {
      opacity: 0.66;
      cursor: default;
    }

    .start-draft-link {
      appearance: none;
      border: none;
      background: transparent;
      color: #9b8fb4;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      margin-top: 0.9rem;
      text-decoration: underline;
      text-underline-offset: 0.16em;
      transition: color 0.15s ease;
    }

    .start-draft-link:hover {
      color: #6f5a95;
    }

    .progress-wrap {
      position: sticky;
      top: 60px;
      z-index: 30;
      background: rgba(251,249,255,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(87,46,136,0.08);
    }

    .progress-wrap.is-hidden {
      display: none;
    }

    .progress-bar {
      width: min(1040px, calc(100% - 2.5rem));
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.65rem;
      flex-wrap: nowrap;
      padding: 0.95rem 0 0.9rem;
    }

    .progress-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 0.42rem;
      min-width: 0;
      flex: 1 1 0;
      max-width: 160px;
      color: #a094b8;
      text-align: center;
    }

    .progress-step.is-active,
    .progress-step.is-complete {
      color: #572e88;
    }

    .progress-step.is-complete {
      color: #9b8fb4;
    }

    .progress-step-num {
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.78rem;
      font-weight: 800;
      background: rgba(87,46,136,0.08);
      color: inherit;
    }

    .progress-step.is-active .progress-step-num {
      background: #572e88;
      color: #fff;
    }

    .progress-step.is-complete .progress-step-num {
      background: rgba(87,46,136,0.08);
      color: #8f83a8;
    }

    .progress-step-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
      align-items: center;
    }

    .progress-step-title {
      font-size: 0.8rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .progress-step-sub {
      margin-top: 0.12rem;
      font-size: 0.7rem;
      line-height: 1.2;
      color: #9b8fb4;
    }

    .progress-ellipsis {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      min-width: 24px;
      color: #a094b8;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1;
      padding-top: 0.35rem;
    }

    .wizard-main {
      position: relative;
      z-index: 1;
      width: min(1040px, calc(100% - 2.5rem));
      margin: 0 auto;
      padding: 2rem 0 4rem;
    }

    .wizard-intro {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.4rem;
    }

    .wizard-kicker {
      font-size: 0.78rem;
      font-weight: 800;
      color: #876fa8;
      margin-bottom: 0.38rem;
    }

    .wizard-title {
      margin: 0;
      font-size: 2rem;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: 0;
      color: #21173e;
    }

    .wizard-subtitle {
      margin: 0.5rem 0 0;
      max-width: 760px;
      font-size: 1rem;
      line-height: 1.55;
      color: #72648d;
    }

    .wizard-note {
      flex-shrink: 0;
      max-width: 280px;
      padding: 0.9rem 1rem;
      border: 1px solid rgba(87,46,136,0.12);
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 10px 32px rgba(87,46,136,0.04);
    }

    .wizard-note-title {
      font-size: 0.86rem;
      font-weight: 800;
      color: #2a1d49;
      margin-bottom: 0.18rem;
    }

    .wizard-note-copy {
      font-size: 0.8rem;
      line-height: 1.45;
      color: #7c6f95;
    }

    .wizard-card {
      border: 1px solid rgba(87,46,136,0.12);
      border-radius: 24px;
      background: rgba(255,255,255,0.94);
      box-shadow: 0 2px 0 rgba(87,46,136,0.08), 0 6px 12px rgba(87,46,136,0.04);
      padding: 1.65rem;
    }

    .wizard-card.wizard-card--start {
      position: relative;
      overflow: hidden;
      border-color: rgba(87,46,136,0.08);
      background:
        radial-gradient(circle at left center, rgba(87,46,136,0.08), transparent 34%),
        rgba(255,255,255,0.96);
      box-shadow: 0 2px 0 rgba(87,46,136,0.08), 0 8px 16px rgba(87,46,136,0.05);
      padding: 2.2rem;
    }

    .wizard-card.wizard-card--start::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(87,46,136,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(87,46,136,0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.45;
      pointer-events: none;
    }

    .wizard-card.wizard-card--start > * {
      position: relative;
      z-index: 1;
    }

    .step-kicker {
      display: block;
      width: 100%;
      font-size: 0.96rem;
      font-weight: 800;
      color: #876fa8;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .step-title {
      margin: 0;
      font-size: 2rem;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
      color: #1d1635;
      text-align: center;
    }

    .step-subtitle {
      margin: 0.8rem auto 0;
      font-size: 1.14rem;
      line-height: 1.55;
      color: #746689;
      max-width: 740px;
      text-align: center;
    }

    .welcome-list {
      margin: 1.3rem 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 0.75rem;
      max-width: 620px;
    }

    .welcome-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      font-size: 0.98rem;
      line-height: 1.45;
      color: #4d4168;
      font-weight: 700;
    }

    .welcome-list li::before {
      content: '';
      width: 0.58rem;
      height: 0.58rem;
      border-radius: 999px;
      background: #efab45;
      flex-shrink: 0;
      margin-top: 0.42rem;
      box-shadow: 0 0 0 5px rgba(239,171,69,0.16);
    }

    .start-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.95fr);
      gap: 1.4rem;
      align-items: start;
    }

    .start-kicker {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.38rem 0.72rem;
      border-radius: 999px;
      background: rgba(87,46,136,0.08);
      color: #5b3a86;
      font-size: 0.78rem;
      font-weight: 850;
      letter-spacing: 0.01em;
    }

    .start-kicker::before {
      content: '';
      width: 0.65rem;
      height: 0.65rem;
      border-radius: 999px;
      background: #efab45;
      box-shadow: 0 0 0 6px rgba(239,171,69,0.16);
    }

    .start-title {
      margin: 1rem 0 0;
      font-size: clamp(2.3rem, 5vw, 4rem);
      line-height: 0.95;
      font-weight: 950;
      letter-spacing: 0;
      color: #20153a;
      max-width: 9ch;
    }

    .start-copy {
      margin: 1rem 0 0;
      font-size: 1.08rem;
      line-height: 1.65;
      color: #64567f;
      max-width: 680px;
    }

    .start-sidecard {
      border: 1px solid rgba(87,46,136,0.1);
      border-radius: 22px;
      background: rgba(255,255,255,0.8);
      padding: 1.15rem 1.15rem 1.05rem;
      box-shadow: 0 2px 0 rgba(87,46,136,0.07), 0 6px 10px rgba(87,46,136,0.035);
    }

    .start-sidecard-title {
      font-size: 0.84rem;
      font-weight: 850;
      color: #705b93;
      margin-bottom: 0.85rem;
    }

    .start-chip-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .start-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.38rem;
      padding: 0.5rem 0.72rem;
      border-radius: 999px;
      background: #fff;
      border: 1px solid rgba(87,46,136,0.1);
      color: #564676;
      font-size: 0.8rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .start-chip::before {
      content: '';
      width: 0.42rem;
      height: 0.42rem;
      border-radius: 999px;
      background: #7faf8b;
      flex-shrink: 0;
    }

    .start-chip:nth-child(2)::before {
      background: #efab45;
    }

    .start-chip:nth-child(3)::before {
      background: #d68cb2;
    }

    .start-chip:nth-child(4)::before {
      background: #8c93d6;
    }

    .start-chip:nth-child(5)::before {
      background: #7d6aa2;
    }

    .step-body {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.35rem;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.85rem;
    }

    .choice-card {
      appearance: none;
      border: 1.5px solid rgba(87,46,136,0.14);
      border-radius: 18px;
      background: #fff;
      padding: 1rem 1rem 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      color: inherit;
      font-family: var(--bts-font);
    }

    .choice-card:hover {
      transform: translateY(-1px);
      border-color: rgba(87,46,136,0.24);
      box-shadow: 0 2px 0 rgba(87,46,136,0.08), 0 5px 8px rgba(87,46,136,0.04);
    }

    .choice-card.is-selected {
      border-color: rgba(87,46,136,0.36);
      background: rgba(87,46,136,0.05);
      box-shadow: 0 2px 0 rgba(87,46,136,0.1), 0 6px 10px rgba(87,46,136,0.05);
    }

    .choice-title {
      font-size: 1rem;
      font-weight: 850;
      color: #221741;
      line-height: 1.2;
    }

    .choice-copy {
      margin-top: 0.38rem;
      font-size: 0.86rem;
      line-height: 1.45;
      color: #776a90;
    }

    .choice-copy-example {
      display: block;
      margin-top: 0.42rem;
      font-size: 0.78rem;
      line-height: 1.45;
      color: #8c7fa5;
      font-style: italic;
    }

    .section-card {
      padding: 1.1rem 1.15rem;
      border: 1px solid rgba(87,46,136,0.1);
      border-radius: 20px;
      background: rgba(255,255,255,0.86);
    }

    .section-card--round {
      --round-accent: #572e88;
      border-color: color-mix(in srgb, var(--round-accent) 26%, white);
      box-shadow: inset 0 3px 0 color-mix(in srgb, var(--round-accent) 90%, white);
    }

    .section-card--audition { --round-accent: #7FAF8B; }
    .section-card--dance { --round-accent: #D68CB2; }
    .section-card--callback { --round-accent: #E3A46F; }
    .section-card--other { --round-accent: #9B8FB4; }

    .section-card--round .section-title,
    .section-card--round .choice-title {
      color: color-mix(in srgb, var(--round-accent) 62%, #241940);
    }

    .section-card--round .section-copy {
      color: color-mix(in srgb, var(--round-accent) 42%, #776a90);
    }

    .section-card--round .choice-card:hover {
      border-color: color-mix(in srgb, var(--round-accent) 38%, white);
      box-shadow: 0 2px 0 color-mix(in srgb, var(--round-accent) 16%, white), 0 5px 8px color-mix(in srgb, var(--round-accent) 10%, white);
    }

    .section-card--round .choice-card.is-selected {
      border-color: color-mix(in srgb, var(--round-accent) 52%, white);
      background: color-mix(in srgb, var(--round-accent) 10%, white);
      box-shadow: 0 2px 0 color-mix(in srgb, var(--round-accent) 18%, white), 0 6px 10px color-mix(in srgb, var(--round-accent) 10%, white);
    }

    .section-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 850;
      color: #241940;
    }

    .section-copy {
      margin: 0.28rem 0 0;
      font-size: 0.86rem;
      line-height: 1.5;
      color: #776a90;
    }

    .section-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.9rem;
    }

    .section-pill {
      flex-shrink: 0;
      padding: 0.38rem 0.72rem;
      border-radius: 999px;
      background: rgba(87,46,136,0.08);
      color: #76698d;
      font-size: 0.74rem;
      font-weight: 850;
      white-space: nowrap;
    }

    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin-top: 0.95rem;
    }

    .chip-btn {
      appearance: none;
      border: 1.5px solid rgba(87,46,136,0.16);
      border-radius: 999px;
      background: #fff;
      padding: 0.58rem 0.95rem;
      font-family: var(--bts-font);
      font-size: 0.86rem;
      font-weight: 700;
      color: #6d5d88;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .chip-btn.is-selected {
      background: rgba(87,46,136,0.08);
      border-color: rgba(87,46,136,0.28);
      color: #572e88;
    }

    .prep-followups {
      display: grid;
      gap: 0.9rem;
      margin-top: 1rem;
    }

    .prep-followup-card {
      padding: 1rem 1.05rem;
      border: 1px solid rgba(87,46,136,0.12);
      border-radius: 18px;
      background: rgba(255,255,255,0.9);
    }

    .prep-followup-title {
      font-size: 0.9rem;
      font-weight: 850;
      color: #33245a;
      margin-bottom: 0.2rem;
    }

    .prep-followup-copy {
      font-size: 0.82rem;
      line-height: 1.45;
      color: #7c6d96;
      margin-bottom: 0.7rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.95rem 1rem;
      margin-top: 1rem;
    }

    .field-grid.field-grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field.field-span-2 {
      grid-column: span 2;
    }

    .field.field-span-3 {
      grid-column: span 3;
    }

    .field label {
      font-size: 0.8rem;
      font-weight: 800;
      color: #5a4d78;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      font: inherit;
      color: #1a1530;
      background: #f7f3fc;
      border: 1px solid rgba(87,46,136,0.16);
      border-radius: 14px;
      padding: 0.78rem 0.95rem;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .field textarea {
      resize: vertical;
      min-height: 96px;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(87,46,136,0.34);
      box-shadow: 0 0 0 3px rgba(87,46,136,0.09);
      background: #fff;
    }

    .toggle-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.7rem;
      margin-top: 1rem;
    }

    .toggle-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem 1rem;
      border: 1px solid rgba(87,46,136,0.12);
      border-radius: 16px;
      background: #fff;
      cursor: pointer;
    }

    .toggle-copy {
      min-width: 0;
    }

    .toggle-title {
      font-size: 0.92rem;
      font-weight: 800;
      color: #251a42;
    }

    .toggle-subtitle {
      margin-top: 0.2rem;
      font-size: 0.8rem;
      line-height: 1.35;
      color: #7a6d92;
    }

    .toggle-pill {
      width: 50px;
      height: 28px;
      border-radius: 999px;
      background: rgba(87,46,136,0.15);
      position: relative;
      flex-shrink: 0;
      transition: background 0.15s ease;
    }

    .toggle-pill::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(26,21,48,0.14);
      transition: transform 0.15s ease;
    }

    .toggle-card.is-on .toggle-pill {
      background: #572e88;
    }

    .toggle-card.is-on .toggle-pill::after {
      transform: translateX(22px);
    }

    .helper-note {
      margin-top: 0.8rem;
      padding: 0.82rem 0.95rem;
      border-radius: 14px;
      background: rgba(87,46,136,0.05);
      color: #6d5d89;
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .review-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .review-card {
      border: 1px solid rgba(87,46,136,0.1);
      border-radius: 20px;
      padding: 1.1rem 1.15rem;
      background: rgba(255,255,255,0.9);
    }

    .review-card.review-card--wide {
      grid-column: 1 / -1;
    }

    .review-title {

    .modal-close:hover { color: #1a1530; }

<body>
  <div class="wizard-bg"></div>

  <header class="wizard-header">
    <a class="wizard-brand" href="/org/dashboard" aria-label="Build The Show">
      <img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" />
    </a>
    <div class="wizard-header-actions">
      <div class="wizard-save-status" id="wizard-save-status">Saves on Next</div>
      <button type="button" class="wizard-delete" id="wizard-delete-btn" onclick="deleteDraft()">Delete draft</button>
      <a class="wizard-back" id="wizard-back-link" href="/org/production">Back to Audition Settings</a>
    </div>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <main class="wizard-main">
    <div class="wizard-card" id="wizard-card"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/SHARED/Components/audition-builder-engine.js"></script>
  <script defer src="/SHARED/Components/ai-character-importer.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );
    const AuditionBuilder = window.BTSAuditionBuilderEngine;

    const STEP_CONFIG = [
      { id: 1, title: 'Access', subtitle: 'How can people audition?' },
      { id: 2, title: 'Shape', subtitle: 'What should we build?' },
      { id: 3, title: 'Seen', subtitle: 'How are performers seen?' },
      { id: 4, title: 'Timing', subtitle: 'How are times handled?' },
      { id: 5, title: 'Rounds', subtitle: 'What happens in each round?' },
      { id: 6, title: 'Prep', subtitle: 'What should performers prepare?' },
      { id: 7, title: 'Questions', subtitle: 'What do you want to collect?' },
      { id: 8, title: 'Characters', subtitle: 'How should we set up characters?' },
      { id: 9, title: 'Schedule', subtitle: 'When, where, and how long?' },
      { id: 10, title: 'Build', subtitle: 'Check it over and let us build it.' },
    ];

    const {
      MAIN_SEEN_OPTIONS,
      DANCE_SEEN_OPTIONS,
      CALLBACK_TIMING_OPTIONS,
      CALLBACK_SEEN_OPTIONS,
      OTHER_SEEN_OPTIONS,
      OTHER_TIMING_OPTIONS,
      ACTIVITY_OPTIONS,
      activityOptionsForRound,
      collectActivityValues,
      PREP_OPTIONS,
      COLLECT_OPTIONS,
      CHARACTER_SETUP_OPTIONS,
      createDefaultState,
      getMainTimingOptions,
      getDanceTimingOptions,
      getCallbackTimingOptions,
      getOtherTimingOptions,
      resolveRoundScheduleValues,
      deriveMainFormatFromTiming,
      inferMainTiming,
      inferMainSeeing,
      deriveDanceFormat,
      inferDanceSetup,
      deriveCallbackFormat,
      inferCallbackSetup,
      saveAuditionBuilderDraft,
      deleteAuditionBuilderDraft,
    } = AuditionBuilder;

    const ROUND_ADDONS = [
      { value: 'general', label: 'General audition', desc: 'Your main audition. You decide what happens in it.' },
      { value: 'dance', label: 'Dance call', desc: 'A separate movement round outside your main audition.' },
      { value: 'callback', label: 'Callbacks', desc: 'A second round for selected performers.' },
      { value: 'other', label: 'Other', desc: 'Something different. You define how it works.' },
    ];

    const ACCESS_OPTIONS = [
      { value: 'in_person', label: 'In Person', desc: 'Performers can attend in the room.' },
      { value: 'video_call', label: 'Video Call', desc: 'Offer a live video-call option if someone cannot make it on the day or will not be in the area.' },
      { value: 'self_tape', label: 'Self Tape', desc: 'Offer a self-tape option if someone cannot make it on the day or will not be in the area.' },
    ];

    const PREP_DETAIL_CONFIG = {
      short_song: {
        title: 'A short song',
        copy: 'Anything specific about the song?',
        placeholder: 'For example: 16 bars, 32 bars, or around 1 minute.'
      },
      monologue: {
        title: 'A monologue',
        copy: 'Anything specific about the monologue?',
        placeholder: 'For example: short monologue, about 1 minute, or in the style of the show.'
      },
      optional_monologue: {
        title: 'Optional monologue',
        copy: 'Anything specific about the optional monologue?',
        placeholder: 'For example: optional monologue, about 1 minute.'
      },
      movement_clothes: {
        title: 'Comfortable clothes for movement',
        copy: 'Anything specific for movement?',
        placeholder: 'For example: sneakers, jazz shoes, or clothes they can move in.'
      },
      teach_here: {
        title: 'We’ll teach material there',
        copy: 'Anything performers should know about that?',
        placeholder: 'For example: we’ll teach a short dance combination in the room.'
      },
    };

    let prodId = null;
    let prod = null;
    let currentStep = 0;
    let wizardState = createDefaultState();
    let savedDraft = null;
    let isRendering = false;
    let isBuilding = false;
    let isSavingDraft = false;
    let isDeletingDraft = false;
    let autosaveTimer = null;
    let draftStatusText = 'Saves on Next';
    let toastTimer = null;
    let zeusRoundDates = {}; // keyed by round type: main, dance, callback
    let aiImportCharacters = [];
    let wizardImportedCharCount = 0;
    let characters = []; // tracks characters saved via AI import in this session

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.toggle('toast--error', !!isError);
      toast.classList.add('visible');
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 2600);
    }

    function backToWorkspaceUrl() {
      return `/org/production?id=${encodeURIComponent(prodId)}&tab=auditions&sub=setup`;
    }

    const inFrame = window.self !== window.top;
    if (inFrame) document.querySelector('.wizard-header')?.classList.add('inframe');

    function goBack() {
      if (inFrame) { window.parent.postMessage({ type: 'wizard-back' }, '*'); }
      else { window.location.href = backToWorkspaceUrl(); }
    }

    function goDone() {
      if (inFrame) { window.parent.postMessage({ type: 'wizard-done' }, '*'); }
      else { window.location.href = backToWorkspaceUrl(); }
    }

    function scheduleDraftSave() {
      // Draft saves on Next — this just marks unsaved state
      if (!prodId || isBuilding || isDeletingDraft) return;
      draftStatusText = 'Unsaved';
      const statusEl = document.getElementById('wizard-save-status');
      if (statusEl) statusEl.textContent = draftStatusText;
    }

    function activeRounds() {
      return AuditionBuilder.activeRounds(wizardState);
    }

    function shapeSelections() {
      const shape = wizardState.shape;
      if (!shape && !wizardState.otherSelected) {
        return {
          general: false,
          dance: false,
          callback: false,
          other: false,
        };
      }
      return {
        general: shape !== 'video_only' && shape !== 'unsure',
        dance: shape === 'main_dance' || shape === 'full_rounds',
        callback: shape === 'main_callbacks' || shape === 'full_rounds',
        other: !!wizardState.otherSelected || shape === 'unsure',
      };
    }

    function applyShapeSelections(selections) {
      const hasGeneral = !!selections.general;
      const hasDance = !!selections.dance;
      const hasCallback = !!selections.callback;
      const hasOther = !!selections.other;

      wizardState.otherSelected = hasOther;

      if (!hasGeneral && !hasDance && !hasCallback && !hasOther) {
        wizardState.shape = null;
        wizardState.mainFormat = null;
        wizardState.mainSeeing = null;
        wizardState.mainTiming = null;
        wizardState.danceFormat = null;
        wizardState.danceSetup = inferDanceSetup(null);
        wizardState.callbackFormat = null;
        wizardState.callbackSetup = inferCallbackSetup(null);
        wizardState.otherSeeing = null;
        wizardState.otherTiming = null;
        return;
      }

      if (hasOther && !hasGeneral && !hasDance && !hasCallback) {
        wizardState.shape = 'unsure';
        return;
      }

      if (hasDance && hasCallback) wizardState.shape = 'full_rounds';
      else if (hasDance) wizardState.shape = 'main_dance';
      else if (hasCallback) wizardState.shape = 'main_callbacks';
      else wizardState.shape = 'main_only';
    }

    function toggleRoundOption(value) {
      const selections = shapeSelections();
      selections[value] = !selections[value];
      if (value === 'general' && !selections.general && !selections.other) {
        selections.other = true;
      }
      applyShapeSelections(selections);
      scheduleDraftSave();
      renderStep();
    }

    function toggleAccessMode(value) {
      const current = new Set(wizardState.accessModes || []);
      if (current.has(value)) current.delete(value);
      else current.add(value);
      wizardState.accessModes = [...current];
      scheduleDraftSave();
      renderStep();
    }

    function setMainSeeing(value) {
      wizardState.mainSeeing = value;
      scheduleDraftSave();
      renderStep();
    }

    function setMainTiming(value) {
      wizardState.mainTiming = value;
      wizardState.mainFormat = deriveMainFormatFromTiming(value);
      scheduleDraftSave();
      renderStep();
    }

    function syncDanceFormat() {
      wizardState.danceFormat = deriveDanceFormat(wizardState.danceSetup);
    }

    function setDanceSeeing(value) {
      wizardState.danceSetup = {
        ...(wizardState.danceSetup || {}),
        seeing: value,
      };
      syncDanceFormat();
      scheduleDraftSave();
      renderStep();
    }

    function setDanceTiming(value) {
      wizardState.danceSetup = {
        ...(wizardState.danceSetup || {}),
        timing: value,
      };
      syncDanceFormat();
      scheduleDraftSave();
      renderStep();
    }

    function setOtherSeeing(value) {
      wizardState.otherSeeing = value;
      scheduleDraftSave();
      renderStep();
    }

    function setOtherTiming(value) {
      wizardState.otherTiming = value;
      scheduleDraftSave();
      renderStep();
    }

    function syncCallbackFormat() {
      wizardState.callbackFormat = deriveCallbackFormat(wizardState.callbackSetup);
    }

    function setCallbackTiming(value) {
      wizardState.callbackSetup = {
        ...(wizardState.callbackSetup || {}),
        timing: value,
      };
      syncCallbackFormat();
      scheduleDraftSave();
      renderStep();
    }

    function setCallbackSeeing(value) {
      wizardState.callbackSetup = {
        ...(wizardState.callbackSetup || {}),
        seeing: value,
      };
      syncCallbackFormat();
      scheduleDraftSave();
      renderStep();
    }

    function syncAllActivities() {
      wizardState.activities = collectActivityValues(wizardState);
    }

    function selectedRoundActivities(roundKey) {
      return (wizardState.roundActivities?.[roundKey] || []).filter(Boolean);
    }

    function toggleRoundActivity(roundKey, value) {
      wizardState.roundActivities = wizardState.roundActivities || { main: [], dance: [], callback: [], other: [] };
      const current = new Set(selectedRoundActivities(roundKey));
      if (current.has(value)) current.delete(value);
      else current.add(value);
      wizardState.roundActivities[roundKey] = [...current];
      syncAllActivities();
      scheduleDraftSave();
      renderStep();
    }

    function roundActivitySummary(roundKey) {
      return humanList(selectedRoundActivities(roundKey).map(activityLabel));
    }

    function togglePrep(value) {
      const set = new Set(wizardState.prep || []);
      if (set.has(value)) set.delete(value);
      else set.add(value);
      wizardState.prep = [...set];
      scheduleDraftSave();
      renderStep();
    }

    function selectedPrepDetailKeys() {
      return (wizardState.prep || []).filter(value => !!PREP_DETAIL_CONFIG[value]);
    }

    function renderPrepFollowups() {
      const detailKeys = selectedPrepDetailKeys();
      if (!detailKeys.length) return '';
      return `
        <div class="prep-followups">
          ${detailKeys.map(key => {
            const config = PREP_DETAIL_CONFIG[key];
            const value = wizardState.prepDetails?.[key] || '';
            return `
              <div class="prep-followup-card">
                <div class="prep-followup-title">${esc(config.title)}</div>
                <div class="prep-followup-copy">${esc(config.copy)}</div>
                <div class="field">
                  <input
                    type="text"
                    placeholder="${esc(config.placeholder)}"
                    value="${esc(value)}"
                    oninput="updateField('prepDetails.${key}', this.value)"
                  />
                </div>
              </div>`;
          }).join('')}
        </div>`;
    }

    function toggleCollect(key) {
      wizardState.collect[key] = !wizardState.collect[key];
      scheduleDraftSave();
      renderStep();
    }

    function setCharacterSetup(value) {
      wizardState.characterSetup = value;
      if (value !== 'manual_now') wizardState.characterWhen = null;
      scheduleDraftSave();
      renderStep();
      if (value === 'ai_import') {
        AICharacterImporter.open({
          productionId: prodId,
          productionTitle: prod?.title || 'this production',
          supabase: sb,
          existingCount: characters.length,
          onSuccess(saved) {
            characters.push(...saved);
            wizardImportedCharCount = saved.length;
            renderStep();
          },
        });
      }
    }

    function updateField(path, value) {
      const parts = path.split('.');
      let target = wizardState;
      while (parts.length > 1) {
        const key = parts.shift();
        target = target[key];
      }
      target[parts[0]] = value;
    }

    function validateCurrentStep() {
      if (currentStep === 1) {
        if (!(wizardState.accessModes || []).length) {
          showToast('Choose at least one way performers can audition.', true);
          return false;
        }
      }
      if (currentStep === 2) {
        const selections = shapeSelections();
        if (!selections.general && !selections.dance && !selections.callback && !selections.other) {
          showToast('Choose at least one audition type so we know what to build.', true);
          return false;
        }
      }
      if (currentStep === 3) {
        if (shapeSelections().general && !wizardState.mainSeeing) {
          showToast('Choose how performers are seen in the general audition.', true);
          return false;
        }
        if (activeRounds().dance && !wizardState.danceSetup?.seeing) {
          showToast('Choose how you want to run the dance call.', true);
          return false;
        }
        if (activeRounds().callback) {
          if (!wizardState.callbackSetup?.seeing) {
            showToast('Choose how performers will be seen in callbacks.', true);
            return false;
          }
        }
        if (shapeSelections().other && !wizardState.otherSeeing) {
          showToast('Choose how performers are seen in the other audition round.', true);
          return false;
        }
      }
      if (currentStep === 4) {
        if (shapeSelections().general && !wizardState.mainTiming && wizardState.mainFormat !== 'video_submission') {
          showToast('Choose how times are handled for the general audition.', true);
          return false;
        }
        if (activeRounds().dance && !wizardState.danceSetup?.timing && !['self_tape', 'video_call'].includes(wizardState.danceSetup?.seeing || '')) {

      if (!validateCurrentStep()) return;
      currentStep = Math.min(10, currentStep + 1);

      currentStep = Math.max(0, currentStep - 1);

    function visibleProgressSteps() {
      const total = STEP_CONFIG.length;
      const activeId = currentStep === 'done' ? total : currentStep;
      if (total <= 6) return STEP_CONFIG.map(step => ({ type: 'step', step }));
      if (activeId <= 3) {
        return [
          ...STEP_CONFIG.slice(0, 4).map(step => ({ type: 'step', step })),
          { type: 'ellipsis', key: 'right-ellipsis' },
          { type: 'step', step: STEP_CONFIG[total - 1] },
        ];
      }
      if (activeId >= total - 2) {
        return [
          { type: 'step', step: STEP_CONFIG[0] },
          { type: 'ellipsis', key: 'left-ellipsis' },
          ...STEP_CONFIG.slice(total - 4).map(step => ({ type: 'step', step })),
        ];
      }
      return [
        { type: 'step', step: STEP_CONFIG[0] },
        { type: 'ellipsis', key: 'left-ellipsis' },
        ...STEP_CONFIG
          .filter(step => step.id >= activeId - 1 && step.id <= activeId + 1)
          .map(step => ({ type: 'step', step })),
        { type: 'ellipsis', key: 'right-ellipsis' },
        { type: 'step', step: STEP_CONFIG[total - 1] },
      ];
    }

    function renderProgress() {
      const bar = document.getElementById('progress-bar');
      const wrap = document.querySelector('.progress-wrap');
      if (!bar) return;
      if (wrap) wrap.classList.toggle('is-hidden', currentStep === 0);
      const done = currentStep === 'done';
      bar.innerHTML = visibleProgressSteps().map(item => {
        if (item.type === 'ellipsis') {
          return `<div class="progress-ellipsis" aria-hidden="true">…</div>`;
        }
        const { step } = item;
        const stateClass = done
          ? 'is-complete'
          : step.id < currentStep
            ? 'is-complete'
            : step.id === currentStep
              ? 'is-active'
              : '';
        return `
          <div class="progress-step ${stateClass}">
            <div class="progress-step-num">${step.id}</div>
            <div class="progress-step-copy">
              <div class="progress-step-title">${esc(step.title)}</div>
              <div class="progress-step-sub">${esc(step.subtitle)}</div>
            </div>
          </div>`;
      }).join('');
    }

            </div>
            <div class="field">
              <label for="${roundKey}-end">End time</label>
              <input id="${roundKey}-end" type="time" value="${esc(round.end || '')}" onchange="updateField('rounds.${roundKey}.end', this.value)" />
            </div>
          </div>
          ${needsSlots ? `
            <div class="field-grid field-grid-3">
              <div class="field">
                <label for="${roundKey}-slot">Slot length</label>
                <select id="${roundKey}-slot" onchange="updateField('rounds.${roundKey}.slotLength', Number(this.value))">
                  ${[5,7,10,15,20,30,45,60,90].map(mins => `<option value="${mins}"${Number(round.slotLength) === mins ? ' selected' : ''}>${mins < 60 ? `${mins} min` : mins === 60 ? '1 hour' : `${mins / 60} hours`}</option>`).join('')}
                </select>
              </div>
              <div class="field">
                <label for="${roundKey}-buffer">Buffer</label>
                <select id="${roundKey}-buffer" onchange="updateField('rounds.${roundKey}.buffer', Number(this.value))">
                  ${[0,3,5,10,15].map(mins => `<option value="${mins}"${Number(round.buffer) === mins ? ' selected' : ''}>${mins === 0 ? 'None' : `${mins} min`}</option>`).join('')}
                </select>
              </div>
              <div class="field">
                <label for="${roundKey}-capacity">Capacity</label>
                <input id="${roundKey}-capacity" type="number" min="1" max="40" value="${esc(round.capacity || 1)}" onchange="updateField('rounds.${roundKey}.capacity', Number(this.value || 1))" />
              </div>
            </div>
          ` : `
            <div class="helper-note">This round does not need strict public time slots. We’ll build the card, timing, and instructions so you can manage the flow your way.</div>
          `}
        </div>`;
    }

    function renderStepNine() {
      const rounds = activeRounds();
      const hasZeusData = Object.keys(zeusRoundDates).length > 0;
      const stepNineSubtitle = hasZeusData
        ? 'We found audition dates already in your production calendar and filled them in below. Check them over and adjust anything that needs changing.'
        : 'If you know the timing now, great. If not, we will still build the structure and you can fill the details in later.';
      return `
        <div class="step-kicker">Step 9</div>
        <h2 class="step-title">Let\u2019s shape the schedule</h2>
        <p class="step-subtitle">${stepNineSubtitle}</p>
        <div class="step-body">
          <div class="section-card">
            <div class="section-card-header">
              <div>
                <h3 class="section-title">Where will this happen?</h3>
                <p class="section-copy">We’ll use this as the starting location for the audition cards.</p>
              </div>
              <div class="section-pill">Used across all rounds</div>
            </div>
            <div class="field-grid" style="margin-top:0.95rem;">
              <div class="field field-span-2">
                <label for="wizard-location">Location</label>
                <input id="wizard-location" type="text" value="${esc(wizardState.location || '')}" placeholder="For example: Wave Room, Courtenay, BC" oninput="updateField('location', this.value)" />
              </div>
            </div>
          </div>
          ${roundScheduleCard('main', 'Main audition', wizardState.mainFormat)}
          ${rounds.dance ? roundScheduleCard('dance', 'Dance call', wizardState.danceFormat) : ''}
          ${rounds.callback ? roundScheduleCard('callback', 'Callbacks', wizardState.callbackFormat) : ''}
        </div>
        <div class="step-actions">
          <button type="button" class="wizard-btn wizard-btn-soft" onclick="prevStep()">Back</button>
          <div class="step-actions-right">
            <button type="button" class="wizard-btn wizard-btn-primary" onclick="nextStep()">Review build</button>
          </div>
        </div>
      `;
    }

    function buildRoundSummary(roundKey, label, flow) {
      const round = wizardState.rounds[roundKey];
      const summary = [];
      summary.push(formatFlowLabel(flow));
      if (round.date) summary.push(formatLongDate(round.date));
      if (round.start) summary.push(`${formatTime(round.start)}${round.end ? ` - ${formatTime(round.end)}` : ''}`);
      if (flowNeedsSlots(flow)) summary.push(`${round.slotLength || 0} min slots`);
      return `${label}: ${summary.filter(Boolean).join(' · ')}`;
    }

    function renderStepTen() {
      const rounds = activeRounds();
      const buildItems = [
        'Audition cards',
        'Schedule structure',
        'Question toggles',
        'Public page copy',
      ];
      if (wizardState.characterSetup === 'ai_import') buildItems.push('Character area ready for AI import');
      else if (wizardState.characterSetup !== 'sort_out_later') buildItems.push('Starter characters');
      if (wizardState.collect.extra_notes) buildItems.push('A custom notes question');

      return `
        <div class="step-kicker">Step 10</div>
        <h2 class="step-title">We’re ready to build this for you</h2>
        <p class="step-subtitle">Here’s the shape we’ll use. When you hit build, we’ll write directly into the real audition settings for this production.</p>
        <div class="step-body">
          <div class="review-grid">
            <div class="review-card review-card--wide">
              <div class="review-title">Rounds we’ll create</div>
              <ul class="review-list">
                <li>${esc(buildRoundSummary('main', 'Main audition', wizardState.mainFormat))}</li>
                ${rounds.dance ? `<li>${esc(buildRoundSummary('dance', 'Dance call', wizardState.danceFormat))}</li>` : ''}
                ${rounds.callback ? `<li>${esc(buildRoundSummary('callback', 'Callbacks', wizardState.callbackFormat))}</li>` : ''}
              </ul>
            </div>
            <div class="review-card">
              <div class="review-title">What happens in each round</div>
              <ul class="review-list">
                <li>${esc(`General audition: ${roundActivitySummary('main') || 'Flexible for now'}`)}</li>
                ${rounds.dance ? `<li>${esc(`Dance call: ${roundActivitySummary('dance') || 'Flexible for now'}`)}</li>` : ''}
                ${rounds.callback ? `<li>${esc(`Callbacks: ${roundActivitySummary('callback') || 'Flexible for now'}`)}</li>` : ''}
                ${shapeSelections().other ? `<li>${esc(`Other: ${roundActivitySummary('other') || 'Flexible for now'}`)}</li>` : ''}
              </ul>
            </div>
            <div class="review-card">
              <div class="review-title">What we’ll collect</div>
              <div class="review-copy">${esc(enabledCollectLabels().join(', ')) || 'We’ll keep the form light to start.'}</div>
            </div>
            <div class="review-card">
              <div class="review-title">How people can audition</div>
              <div class="review-copy">${esc(enabledAccessLabels().join(', ')) || 'In person'}</div>
            </div>
            <div class="review-card">
              <div class="review-title">What to prepare</div>
              <div class="review-copy">${esc(humanList(PREP_OPTIONS.filter(option => (wizardState.prep || []).includes(option.value)).map(option => option.label))) || 'We’ll keep the prep guidance flexible for now.'}</div>
            </div>
            <div class="review-card">
              <div class="review-title">What we’ll build</div>
              <ul class="review-list">
                ${buildItems.map(item => `<li>${esc(item)}</li>`).join('')}
              </ul>
            </div>
            <div class="review-card">
              <div class="review-title">What you can change later</div>
              <div class="review-copy">Dates, times, questions, materials, and public-page copy can all be edited after the build. This gives you a strong first draft, not a locked system.</div>
            </div>
          </div>
          <div class="section-card">
            <div class="inline-status">
              <span class="inline-status-dot"></span>
              <span>We’ll build it directly into your existing audition tabs. Nothing separate. Nothing duplicated.</span>
            </div>
          </div>
        </div>
        <div class="step-actions">
          <button type="button" class="wizard-btn wizard-btn-soft" onclick="prevStep()">Back</button>
          <div class="step-actions-right">
            <button type="button" class="wizard-btn wizard-btn-primary" onclick="buildAuditionWizard()">Build my audition system</button>
          </div>
        </div>
      `;
    }

    function renderDone() {
      const rounds = activeRounds();
      return `
        <div class="success-card">
          <div class="step-kicker">Audition Builder</div>
          <h2 class="success-title">Your audition setup is ready</h2>
          <p class="success-copy">We built the rounds, cards, schedule structure, question defaults, and public-page copy for you. You can head back and tweak anything you want.</p>
          <div class="success-checklist">
            <div class="success-item">
              <div class="success-item-dot"></div>
              <div>
                <div class="success-item-title">Audition cards created</div>
                <div class="success-item-copy">Your main audition${rounds.dance ? ', dance call,' : ''}${rounds.callback ? ' and callback' : ''} rounds are in place.</div>
              </div>
            </div>
            <div class="success-item">
              <div class="success-item-dot"></div>
              <div>
                <div class="success-item-title">Schedule built</div>
                <div class="success-item-copy">Time-slot rounds were generated where they made sense in the current system.</div>
              </div>
            </div>
            <div class="success-item">
              <div class="success-item-dot"></div>
              <div>
                <div class="success-item-title">${wizardState.characterSetup === 'ai_import' ? 'Character import is ready' : 'Questions and prep are filled in'}</div>
                <div class="success-item-copy">${wizardState.characterSetup === 'ai_import' ? 'Your audition setup is ready, and the character area is left clean for AI import from your script or licensing materials.' : 'Your form defaults and public prep copy are already set.'}</div>
              </div>
            </div>
            <div class="success-item">
              <div class="success-item-dot"></div>
              <div>
                <div class="success-item-title">You can still tweak everything</div>
                <div class="success-item-copy">This is your starting point, not a locked box.</div>
              </div>
            </div>
          </div>
          <div class="step-actions" style="justify-content:center;margin-top:1.7rem;">
            <div class="step-actions-right" style="justify-content:center;">
              <button type="button" class="wizard-btn wizard-btn-soft" onclick="goBack()">Back to Audition Settings</button>
              <button type="button" class="wizard-btn wizard-btn-primary" onclick="goDone()">See what we built</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderStep() {
      if (isRendering) return;
      isRendering = true;
      const saveStatus = document.getElementById('wizard-save-status');
      if (saveStatus) {
        saveStatus.textContent = isSavingDraft ? 'Saving draft...' : draftStatusText;
      }
      const deleteBtn = document.getElementById('wizard-delete-btn');
      if (deleteBtn) {
        deleteBtn.disabled = !!isSavingDraft || !!isDeletingDraft || !!isBuilding;
        deleteBtn.textContent = isDeletingDraft ? 'Deleting...' : 'Delete draft';
      }
      renderProgress();
      const card = document.getElementById('wizard-card');
      if (!card) {
        isRendering = false;
        return;
      }
      let html = '';
      if (currentStep === 'done') html = renderDone();
      else if (currentStep === 0) html = renderIntro();
      else if (currentStep === 1) html = renderStepOne();
      else if (currentStep === 2) html = renderStepTwo();
      else if (currentStep === 3) html = renderStepThree();
      else if (currentStep === 4) html = renderStepFour();
      else if (currentStep === 5) html = renderStepFive();
      else if (currentStep === 6) html = renderStepSix();
      else if (currentStep === 7) html = renderStepSeven();
      else if (currentStep === 8) html = renderStepEight();
      else if (currentStep === 9) html = renderStepNine();
      else html = renderStepTen();
      card.innerHTML = html;
      card.classList.toggle('wizard-card--start', currentStep === 0);
      card.classList.toggle('loading', !!isBuilding);
      isRendering = false;
    }

    function mergeState(nextState) {
      const baseState = createDefaultState();
      wizardState = {
        ...JSON.parse(JSON.stringify(baseState)),
        ...wizardState,
        ...nextState,
        collect: { ...baseState.collect, ...(wizardState.collect || {}), ...(nextState.collect || {}) },
        danceSetup: { ...baseState.danceSetup, ...(wizardState.danceSetup || {}), ...(nextState.danceSetup || {}) },
        callbackSetup: { ...baseState.callbackSetup, ...(wizardState.callbackSetup || {}), ...(nextState.callbackSetup || {}) },
        prepDetails: { ...baseState.prepDetails, ...(wizardState.prepDetails || {}), ...(nextState.prepDetails || {}) },
        roundActivities: {
          ...baseState.roundActivities,
          ...(wizardState.roundActivities || {}),
          ...(nextState.roundActivities || {}),
        },
        rounds: {
          main: { ...baseState.rounds.main, ...(wizardState.rounds?.main || {}), ...(nextState.rounds?.main || {}) },
          dance: { ...baseState.rounds.dance, ...(wizardState.rounds?.dance || {}), ...(nextState.rounds?.dance || {}) },
          callback: { ...baseState.rounds.callback, ...(wizardState.rounds?.callback || {}), ...(nextState.rounds?.callback || {}) },
        },
      };
      if (wizardState.mainFormat === 'hybrid') {
        wizardState.mainFormat = 'video_live';
      }
      if (wizardState.mainSeeing === 'pairs_small') {
        wizardState.mainSeeing = 'small_groups';
      }
      if (wizardState.otherSeeing === 'pairs_small') {
        wizardState.otherSeeing = 'small_groups';
      }
      if (wizardState.callbackSetup?.seeing === 'pairs_small') {
        wizardState.callbackSetup.seeing = 'small_groups';
      }
      const hasRoundActivities = Object.values(wizardState.roundActivities || {}).some(list => Array.isArray(list) && list.length);
      if (!hasRoundActivities && Array.isArray(wizardState.activities) && wizardState.activities.length) {
        wizardState.roundActivities.main = [...wizardState.activities];
      }
      syncAllActivities();
    }

    function activityLabel(value) {
      return ACTIVITY_OPTIONS.find(option => option.value === value)?.label || value;
    }

    function enabledCollectLabels() {
      return COLLECT_OPTIONS.filter(option => wizardState.collect[option.key]).map(option => option.label);
    }

    function enabledAccessLabels() {
      return ACCESS_OPTIONS
        .filter(option => (wizardState.accessModes || []).includes(option.value))
        .map(option => option.label);
    }

    function humanList(list) {
      const items = (list || []).filter(Boolean);
      if (!items.length) return '';
      if (items.length === 1) return items[0];
      if (items.length === 2) return `${items[0]} and ${items[1]}`;
      return `${items.slice(0, -1).join(', ')}, and ${items[items.length - 1]}`;
    }

    function formatLongDate(value) {
      if (!value) return '';
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatTime(value) {
      if (!value) return '';
      const [hourRaw, minuteRaw] = value.split(':');
      const hour = Number(hourRaw);
      const minute = minuteRaw || '00';
      const ampm = hour >= 12 ? 'PM' : 'AM';
      const hour12 = hour % 12 || 12;
      return `${hour12}:${minute} ${ampm}`;
    }

    function formatFlowLabel(value) {
      return AuditionBuilder.formatFlowLabel(value);
    }

    function continueDraft() {
      if (!savedDraft) return;
      mergeState(savedDraft);
      currentStep = Math.min(10, Math.max(1, Number(savedDraft.current_step) || 1));
      draftStatusText = 'Draft autosaved';
      renderStep();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      showToast('Draft loaded.');
    }

    async function saveDraft(options = {}) {
      const { silent = false } = options;
      if (isSavingDraft || isBuilding || isDeletingDraft || !prodId) return;
      clearTimeout(autosaveTimer);
      isSavingDraft = true;
      renderStep();
      try {
        await saveAuditionBuilderDraft({
          sb,
          prodId,
          prod,
          wizardState,
          currentStep,
        });
        savedDraft = {
          ...wizardState,
          rounds_enabled: activeRounds(),
          current_step: currentStep,
          is_draft: true,
        };
        draftStatusText = 'Draft autosaved';
        if (!silent) showToast('Draft saved.');
      } catch (error) {
        console.error('[BTS] audition builder draft save failed', error);
        draftStatusText = 'Autosave paused';
        showToast(silent ? "Autosave didn’t work just now. Your draft is still safe to keep editing." : "We couldn’t save the draft just now. Try again in a moment.", true);
      } finally {
        isSavingDraft = false;
        renderStep();
      }
    }

    async function deleteDraft() {
      if (isSavingDraft || isDeletingDraft || isBuilding || !prodId) return;
      if (!inFrame && !window.confirm('Delete the saved draft and clear the wizard back to the beginning?')) return;
      clearTimeout(autosaveTimer);
      isDeletingDraft = true;
      renderStep();
      try {
        await deleteAuditionBuilderDraft({
          sb,
          prodId,
        });
        const freshState = createDefaultState();
        freshState.location = (prod?.audition_locations && prod.audition_locations[0]) || prod?.audition_location || '';
        wizardState = freshState;
        savedDraft = null;
        currentStep = 0;
        draftStatusText = 'No draft saved';
        showToast('Draft deleted.');
      } catch (error) {
        console.error('[BTS] audition builder draft delete failed', error);
        showToast("We couldn’t delete the draft just now. Try again in a moment.", true);
      } finally {
        isDeletingDraft = false;
        renderStep();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    async function buildAuditionWizard() {
      if (isBuilding) return;
      isBuilding = true;
      renderStep();
      try {
        await AuditionBuilder.buildAuditionSystem({
          sb,
          prodId,
          prod,
          wizardState,
        });

        currentStep = 'done';
        savedDraft = null;
        // Draft served its purpose — clean it up now that the build is complete
        deleteAuditionBuilderDraft({ sb, prodId }).catch(() => {});
        showToast('Your audition setup is ready.');
      } catch (error) {
        console.error('[BTS] audition builder failed', error);
        showToast(`Build failed: ${error?.message || error}`, true);
      } finally {
        isBuilding = false;
        renderStep();
      }
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      prodId = params.get('id');
      if (!prodId) {
        window.location.href = '/org/dashboard';
        return;
      }

      const backLink = document.getElementById('wizard-back-link');
      if (backLink) backLink.href = backToWorkspaceUrl();

      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = '/login';
        return;
      }

      const { data, error } = await sb.from('productions').select('*').eq('id', prodId).single();
      if (error || !data) {
        window.location.href = '/org/dashboard';
        return;
      }
      prod = data;
      savedDraft = data?.wizard_data?.audition_builder || null;

      wizardState.location = (prod.audition_locations && prod.audition_locations[0]) || prod.audition_location || '';
      if (savedDraft) {
        draftStatusText = 'Draft autosaved';
      }

      // Pull audition-type events from Zeus and pre-fill step 9 if the fields are still empty
      const { data: zeusEvents } = await sb.from('production_events')
        .select('event_type, start_time, end_time, venue')
        .eq('production_id', prodId)
        .in('event_type', ['audition', 'dance_call', 'callback'])
        .order('start_time', { ascending: true });

      if (zeusEvents && zeusEvents.length) {
        const roundKeyMap = { audition: 'main', dance_call: 'dance', callback: 'callback' };
        for (const ev of zeusEvents) {
          const key = roundKeyMap[ev.event_type];
          if (!key || zeusRoundDates[key]) continue; // keep only earliest per type
          const dateStr = ev.start_time ? ev.start_time.slice(0, 10) : '';
          const startStr = ev.start_time ? ev.start_time.slice(11, 16) : '';
          const endStr = ev.end_time ? ev.end_time.slice(11, 16) : '';
          zeusRoundDates[key] = { date: dateStr, start: startStr, end: endStr, venue: ev.venue || '' };
          // Only pre-fill if wizard hasn't been filled in yet
          if (!wizardState.rounds[key].date) wizardState.rounds[key].date = dateStr;
          if (!wizardState.rounds[key].start) wizardState.rounds[key].start = startStr;
          if (!wizardState.rounds[key].end) wizardState.rounds[key].end = endStr;
          if (!wizardState.location && ev.venue) wizardState.location = ev.venue;
        }
      }

      // When running inside the workspace iframe
      if (params.get('inframe') === '1') {
        if (params.get('continue') === '1' && savedDraft) {
          // Resume from saved draft
          mergeState(savedDraft);
          currentStep = Math.min(10, Math.max(1, Number(savedDraft.current_step) || 1));
          draftStatusText = 'Draft loaded';
          // Re-apply Zeus dates for any round fields the draft left empty
          for (const [key, zeus] of Object.entries(zeusRoundDates)) {
            if (!wizardState.rounds[key].date) wizardState.rounds[key].date = zeus.date;
            if (!wizardState.rounds[key].start) wizardState.rounds[key].start = zeus.start;
            if (!wizardState.rounds[key].end) wizardState.rounds[key].end = zeus.end;
          }
        } else if (currentStep === 0) {
          // Fresh start — skip the intro
          currentStep = 1;
        }
      }

      renderStep();
    }

    // ── AI character import (exact copy of workspace importer) ──────────────

    // cycleMsg(el, msgs, ms): cycles el.textContent through msgs every ms.
  // Returns a stop function. Call stop() when the operation completes.
  function cycleMsg(el, msgs, ms) {
    if (!el || !msgs.length) return () => {};
    el.textContent = msgs[0];
    let i = 0;
    const t = setInterval(() => { el.textContent = msgs[++i % msgs.length]; }, ms || 1800);
    return () => clearInterval(t);
  }

  const MSGS_CHAR_IMPORT = ['Building your cast', 'Sorting your characters', 'Shaping your roles', 'Reading your script', 'Pulling out character details', 'Matching roles and types', 'Finding ages and ranges', 'Identifying voice types', 'Checking movement needs', 'Organising your cast list', 'Laying out your roles', 'Structuring your characters', 'Filling in the details', 'Connecting the pieces', 'Making sense of it all', 'Tidying your character list', 'Getting everything ready', 'Building your audition list', 'Setting up your roles', 'Almost there', 'Just a moment', 'Working the magic', 'Making the magic happen'];
  const MSGS_AI_SCAN = [
    'Reading the script...',
    'Studying the characters...',
    'Checking the cast list...',
    'Running through the libretto...',
    'Consulting the director...',
    'Reviewing the programme...',
    'Counting the roles...',
    'Checking the dramatis personae...',
  ];


    init();
  </script>
