          <div class="step-tip">
            <strong>This step is optional</strong>
            You don't need to add anyone right now. You can invite team members from the workspace any time after launch. You (the person creating this production) are already set as Admin.
          </div>
          `}

          <div class="team-list" id="teamList">
            <div class="team-member-row">
              <div class="team-member-info">
                <span class="team-member-email">${escHtml(currentUser ? currentUser.email : 'You')}</span>
                <span class="team-member-role">Organisation Admin</span>
              </div>
              <span class="team-member-badge">Admin (You)</span>
            </div>
            ${memberRows}
          </div>

          <div class="card-section-label" style="margin-bottom:0.35rem;">Add a Team Member</div>
          <p class="field-hint" style="margin-bottom:0.75rem;">Enter their email or Profile ID, their role on the show, and how much access they need. They'll get an invitation once you launch. If they don't have a Build The Show account, the link will walk them through signup.</p>
          <div class="team-add-form" style="grid-template-columns:1fr 1fr 1fr auto;">
            <div class="form-group">
              <label class="form-label" for="teamEmail">Email or Profile ID</label>
              <input class="form-input" type="text" id="teamEmail" placeholder="colleague@example.com or BTS-223SK-01" />
            </div>
            <div class="form-group">
              <label class="form-label" for="teamRole">Production Role</label>
              <select class="form-select" id="teamRole">${roleOptions}</select>
            </div>
            <div class="form-group">
              <label class="form-label" for="teamAccess">Workspace Access</label>
              <select class="form-select" id="teamAccess">
                <option value="Viewer">Viewer (read only)</option>
                <option value="Editor" selected>Editor (can work in their areas)</option>
                <option value="Producer">Producer (runs the show, can't delete)</option>
                <option value="Admin">Admin (full control)</option>
              </select>
            </div>
            <button class="btn-continue" style="height:44px;padding:0 1rem;font-size:0.85rem;white-space:nowrap;margin-left:0;align-self:flex-end;" onclick="addTeamMember()">+ Add</button>
          </div>

          <p class="section-note">Invitations go out after the production is created. No one gets notified until you hit Launch on the final step.</p>

          <div class="form-error" id="step6Error"></div>

          <div class="wizard-nav">
            <button class="btn-back" onclick="goBack()">← Back</button>
            <button class="btn-continue" onclick="submitStep6()">Continue</button>
          </div>
        </div>
      `;
    }

    async function addTeamMember() {
      hideError('step6Error');
      const emailEl  = document.getElementById('teamEmail');
      const roleEl   = document.getElementById('teamRole');
      const accessEl = document.getElementById('teamAccess');
      const addBtn   = document.querySelector('[onclick="addTeamMember()"]');
      const input = emailEl.value.trim();
      if (!input) {
        showError('step6Error', 'Please enter an email address or Profile ID.');
        return;
      }

      let email = input;
      if (!input.includes('@')) {
        // Profile ID lookup
        if (addBtn) { addBtn.disabled = true; addBtn.textContent = 'Looking up…'; }
        const upper = input.toUpperCase();
        let profile = null;
        const { data: exactArr } = await sb.from('profiles').select('email').eq('custom_id', upper).limit(1);
        if (exactArr && exactArr.length) {
          profile = exactArr[0];
        } else {
          const { data: prefixArr } = await sb.from('profiles').select('email').ilike('custom_id', upper + '-%').limit(1);
          if (prefixArr && prefixArr.length) profile = prefixArr[0];
        }
        if (addBtn) { addBtn.disabled = false; addBtn.textContent = '+ Add'; }
        if (!profile || !profile.email) {
          showError('step6Error', `No profile found with ID "${input}". Double-check it and try again.`);
          return;
        }
        email = profile.email;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input)) {
        showError('step6Error', 'Please enter a valid email address or Profile ID.');
        return;
      }

      if (wizardData.team.some(m => m.email === email)) {
        showError('step6Error', 'This person has already been added.');
        return;
      }
      const role   = roleEl.value;
      const access = accessEl ? accessEl.value : 'Editor';
      wizardData.team.push({ email, role, access });

      const list = document.getElementById('teamList');
      const idx = wizardData.team.length - 1;
      const div = document.createElement('div');
      div.innerHTML = `
        <div class="team-member-row" data-index="${idx}">
          <div class="team-member-info">
            <span class="team-member-email">${escHtml(email)}</span>
            <span class="team-member-role">${escHtml(role)} · ${escHtml(access)} access</span>
          </div>
          <button class="btn-remove-member" onclick="removeTeamMember(${idx})" title="Remove">&times;</button>
        </div>
      `;
      list.appendChild(div.firstElementChild);
      emailEl.value = '';
    }

    function removeTeamMember(idx) {
      wizardData.team.splice(idx, 1);
      const container = document.getElementById('stepContent');
      container.innerHTML = renderStep6HTML();
    }

    async function submitStep6() {
      hideError('step6Error');

      showLoading(MSGS_SAVING);
      try {
        const { error } = await sb.from('productions').update({
          wizard_data: buildWizardDataObj()
        }).eq('id', prodId);

        if (error) throw error;

        saveToLocalStorage();
        goNextStep();
      } catch(err) {
        showError('step6Error', 'Error saving team: ' + (err.message || 'Unknown error'));
      } finally {
        hideLoading();
      }
    }

    // ── Step 7: Volunteers & Shifts ──
    function renderStep7HTML() {
      return `

          <h1 class="step-title">Volunteers</h1>
          <p class="step-subtitle">Need extra hands? Enable volunteers and people can sign up to help with front of house, box office, load-in, and more. If this is a cast-only production, leave it off.</p>

          <div class="toggle-row">
            <label class="toggle-switch">

              <textarea class="form-textarea" id="s7_roles" rows="4" placeholder="e.g.&#10;Front of House&#10;Usher&#10;Box Office&#10;Load-in Crew">${escHtml(wizardData.volunteer_roles)}</textarea>

              <input class="form-input" type="number" id="s7_max" min="1" placeholder="No limit" value="${wizardData.max_volunteers || ''}" />

    async function submitStep7() {
      hideError('step7Error');
      readStep7();

      showLoading(MSGS_SAVING);
      try {
        const { error } = await sb.from('productions').update({
          wizard_data: buildWizardDataObj()
        }).eq('id', prodId);

        if (error) throw error;

        saveToLocalStorage();
        goNextStep();
      } catch(err) {
        showError('step7Error', 'Error saving volunteer settings: ' + (err.message || 'Unknown error'));
      } finally {
        hideLoading();
      }
    }

    // ── Step 8: Tickets & Venue ──
    function renderStep8HTML() {
      if (wizardData.ticket_types.length === 0) {
        wizardData.ticket_types.push({ name: 'General Admission', price: 0 });
      }

      const ticketRowsHtml = wizardData.ticket_types.map((t, i) => renderTicketRow(t, i)).join('');

      return `
        <div class="wizard-card">
          <h1 class="step-title">Tickets and venue</h1>
          <p class="step-subtitle">If your production has ticketed performances, set that up here. For free shows, internal showcases, or anything where you're not selling tickets, just leave this off.</p>

          <div class="toggle-row">
            <label class="toggle-switch">
              <input type="checkbox" id="s8_toggle" ${wizardData.tickets_enabled ? 'checked' : ''} />
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label-text">Enable Ticketing</span>
          </div>

          <div class="collapsible-section ${wizardData.tickets_enabled ? 'visible' : 'hidden'}" id="s8_section">
            <div class="form-group">
              <label class="form-label" for="s8_venue">Venue</label>
              <div id="s8-venue-picker"></div>
              <input type="hidden" id="s8_venue" value="${escHtml(wizardData.venue)}" />
              <p class="field-hint">Pick a saved venue or add a new one. This shows up on tickets and in your listing.</p>
            </div>

            <div class="card-section-label" style="margin-bottom:0.35rem;">Ticket Types</div>

          <div class="form-error" id="step8Error"></div>

    function renderTicketRow(t, i) {
      return `
        <div class="ticket-row" data-index="${i}">

          <div class="price-wrap">

      if (tog) {

          const sec = document.getElementById('s8_section');

            sec.classList.remove('visible');
            sec.classList.add('hidden');
          }

      if (currentOrg && typeof VenuePicker !== 'undefined') {
        VenuePicker.init(sb, currentOrg.id).then(() => {
          VenuePicker.render('s8-venue-picker', wizardData.venue || '', (name) => {

      readStep8data();
      const list = document.getElementById('ticketTypesList');
      const idx = wizardData.ticket_types.length;

      div.innerHTML = renderTicketRow({ name: '', price: 0 }, idx);

      row.remove();

      hideError('step8Error');
      readStep8data();

      const ticketsEnabled = document.getElementById('s8_toggle') ? document.getElementById('s8_toggle').checked : wizardData.tickets_enabled;

      if (ticketsEnabled && !wizardData.venue.trim()) {
        showError('step8Error', 'Venue name is required when ticketing is enabled.');
        return;

      showLoading(MSGS_SAVING);
      try {
        const updatePayload = {
          wizard_data: buildWizardDataObj()

        hideLoading();
      }

    // ── Step 9: Launch review ──
    function renderStep9HTML() {
      const TYPE_LABELS = {
        musical: 'Musical', play: 'Play', dance: 'Dance Show', concert: 'Concert',
        opera: 'Opera', variety: 'Variety Show', workshop: 'Workshop', other: 'Other',
      };
      const FEATURES = [
        { key: 'auditions',    name: 'Auditions',    colour: '#572e88', live: true  },
        { key: 'registration', name: 'Registration', colour: '#476aaa', live: true  },
        { key: 'budget',       name: 'Budget',       colour: '#dd8233', live: true  },
        { key: 'volunteers',   name: 'Volunteers',   colour: '#769e7b', live: true  },
        { key: 'sponsors',     name: 'Sponsors',     colour: '#d1523d', live: true  },
        { key: 'marketing',    name: 'Marketing',    colour: '#ca7ea7', live: false },
        { key: 'tickets',      name: 'Tickets',      colour: '#74a2b4', live: false },
      ];

      const fmtTime = t => {
        if (!t) return '';
        const [h, m] = t.split(':').map(Number);
        return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
      };
      const fmtDate = d => {
        if (!d) return '';
        return new Date(d + 'T12:00:00').toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      };

      // Small inline cal badge (44px) — not the 84px step-3 version
      const miniBadge = dateStr => {
        if (!dateStr) return '';
        const CAL_MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const parts = dateStr.split('-');
        const mon = CAL_MONTHS_S[parseInt(parts[1],10)-1] || '';
        const day = parseInt(parts[2],10);
        return `<div style="flex-shrink:0;width:44px;border-radius:5px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,0.12);">
          <div style="background:#efab45;text-align:center;font-size:0.5rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:#fff;padding:0.18rem 0;line-height:1;">${mon}</div>
          <div style="background:#fff;text-align:center;font-size:1.05rem;font-weight:900;color:#1a1530;padding:0.14rem 0 0.16rem;line-height:1;">${day}</div>
        </div>`;
      };

      const editBtn = (step, light = false) =>
        `<button class="review-edit-link" onclick="jumpToStep(${step})" style="${light ? 'color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.3);' : ''}">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </button>`;

      const isPublic  = wizardData.is_public === true;
      const typeLabel = TYPE_LABELS[wizardData.production_type] || wizardData.production_type || '';
      const orgSlug   = currentOrg?.slug || 'yourorg';
      const showSlug  = wizardData.slug || '';
      const publicUrl = showSlug ? `buildtheshow.com/${orgSlug}/${showSlug}` : null;
      const sorted    = [...step3Events].sort((a,b) => (a.date||'').localeCompare(b.date||''));
      const f         = wizardData.features || {};

      // Date row — small badges, flex-wrap, clean separators
      const datesRowHTML = sorted.length
        ? sorted.map((ev, i) => `
            <div style="display:flex;align-items:center;gap:0.6rem;padding:0 ${i < sorted.length-1 ? '1rem' : '0'} 0 0;${i < sorted.length-1 ? 'border-right:1px solid rgba(87,46,136,0.12);margin-right:0;' : ''}">
              ${miniBadge(ev.date)}
              <div style="min-width:0;">
                <div style="font-size:0.75rem;font-weight:700;color:#1a1530;white-space:nowrap;">${fmtDate(ev.date).split(',')[0]}</div>
                <div style="font-size:0.68rem;color:#5a4e70;white-space:nowrap;">${fmtDate(ev.date).split(',').slice(1).join(',').trim()}</div>
                <div style="font-size:0.65rem;color:#9080a8;margin-top:0.08rem;white-space:nowrap;">${fmtTime(ev.start_time)}${ev.end_time ? ' – ' + fmtTime(ev.end_time) : ''}</div>
              </div>
            </div>`).join('')
        : `<span style="font-size:0.8rem;color:#b0a0cc;font-style:italic;">No dates added yet.</span>`;

      // Feature list — full-width rows so nothing clips
      const featuresListHTML = FEATURES.map(feat => {
        const on = !!f[feat.key];
        if (!feat.live) return `
          <div style="display:flex;align-items:center;gap:0.6rem;padding:0.42rem 0.65rem;border-radius:8px;background:#f5f3fa;border:1.5px dashed rgba(87,46,136,0.15);">
            <span style="font-size:0.75rem;font-weight:700;color:#c0b4d4;flex:1;">${feat.name}</span>
            <span style="font-size:0.6rem;background:#e0dcea;color:#a090c0;border-radius:10px;padding:0.1rem 0.4rem;font-weight:700;white-space:nowrap;">Coming soon</span>
          </div>`;
        if (on) return `
          <div style="display:flex;align-items:center;gap:0.6rem;padding:0.42rem 0.65rem;border-radius:8px;background:${feat.colour};">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><polyline points="1.5,6.5 4.5,9.5 10.5,3.5"/></svg>
            <span style="font-size:0.75rem;font-weight:700;color:#fff;">${feat.name}</span>
          </div>`;
        return `
          <div style="display:flex;align-items:center;gap:0.6rem;padding:0.42rem 0.65rem;border-radius:8px;background:#f5f3fa;border:1.5px solid rgba(87,46,136,0.1);">
            <div style="width:11px;height:11px;flex-shrink:0;border-radius:50%;border:1.5px solid #d8d0e8;"></div>
            <span style="font-size:0.75rem;font-weight:600;color:#c0b4d4;">${feat.name}</span>
          </div>`;
      }).join('');

      return `
        <div class="wizard-card" style="max-width:900px;">
          <h1 class="step-title">Ready to launch?</h1>
          <p class="step-subtitle">Here's everything you've set up. Go back to change anything, then launch when you're ready.</p>

          <!-- HERO CARD: purple bg, poster left, title right -->
          <div style="background:#572e88;border-radius:14px;overflow:hidden;margin-bottom:0.75rem;box-shadow:0 4px 20px rgba(87,46,136,0.25);">
            <div style="display:flex;align-items:flex-start;">

              <!-- Poster — 160×240 hard-locked -->
              <div style="position:relative;flex-shrink:0;width:160px;height:240px;overflow:hidden;">
                ${wizardData.poster_url
                  ? `<img src="${escHtml(wizardData.poster_url)}" alt="Poster" style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;" />`
                  : `<div style="width:100%;height:100%;background:rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;"><span style="font-size:0.7rem;color:rgba(255,255,255,0.5);text-align:center;padding:1rem;line-height:1.5;">No image yet</span></div>`}
                <div style="position:absolute;bottom:0.6rem;left:0;right:0;display:flex;justify-content:center;">
                  ${editBtn(1, true)}
                </div>
              </div>

              <!-- Title + meta + description -->
              <div style="flex:1;min-width:0;padding:1.5rem 1.4rem 1.4rem;display:flex;flex-direction:column;gap:0.55rem;">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;">
                  <h2 style="font-size:1.5rem;font-weight:900;color:#fff;margin:0;line-height:1.2;">${escHtml(wizardData.title) || '<span style="opacity:0.4;font-style:italic;font-weight:400;font-size:1rem;">Untitled</span>'}</h2>
                  ${editBtn(2, true)}
                </div>
                <div style="display:flex;flex-wrap:wrap;align-items:center;gap:0.35rem;">
                  ${typeLabel ? `<span style="font-size:0.72rem;font-weight:700;color:#fff;background:rgba(255,255,255,0.18);border-radius:20px;padding:0.2rem 0.65rem;">${escHtml(typeLabel)}</span>` : ''}
                  <span style="font-size:0.72rem;font-weight:700;color:#fff;background:rgba(255,255,255,0.18);border-radius:20px;padding:0.2rem 0.65rem;">${isPublic ? 'Public' : 'Unlisted'}</span>
                  ${publicUrl ? `<span style="font-size:0.7rem;color:rgba(255,255,255,0.65);word-break:break-all;">${escHtml(publicUrl)}</span>` : ''}
                </div>
                ${wizardData.description
                  ? `<p style="font-size:0.78rem;color:rgba(255,255,255,0.75);line-height:1.6;margin:0;white-space:pre-line;">${escHtml(wizardData.description)}</p>`
                  : ''}
              </div>

            </div>
          </div>

          <!-- DATES BAND: white card, full width, small badges -->
          <div style="background:#fff;border:1.5px solid rgba(87,46,136,0.1);border-radius:14px;padding:1rem 1.2rem;box-shadow:0 2px 8px rgba(87,46,136,0.05);margin-bottom:0.75rem;">
            <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.7rem;">
              <span style="font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#b0a0cc;">Performance Dates</span>
              ${sorted.length ? `<span style="font-size:0.6rem;font-weight:700;color:#efab45;background:rgba(239,171,69,0.12);border-radius:20px;padding:0.08rem 0.4rem;">${sorted.length} added</span>` : ''}
              <span style="margin-left:auto;">${editBtn(3)}</span>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:0.75rem 0;">${datesRowHTML}</div>
          </div>

          <!-- BOTTOM: 2 columns — features | visibility+launch -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.65rem;align-items:start;">

            <!-- Features -->
            <div style="background:#fff;border:1.5px solid rgba(87,46,136,0.1);border-radius:14px;padding:1rem 1.1rem;box-shadow:0 2px 8px rgba(87,46,136,0.05);">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.65rem;">
                <span style="font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#b0a0cc;">Features</span>
                ${editBtn(11)}
              </div>
              <div style="display:flex;flex-direction:column;gap:0.35rem;">${featuresListHTML}</div>
            </div>

            <!-- Visibility + Launch stacked -->
            <div style="display:flex;flex-direction:column;gap:0.65rem;">

              <!-- Visibility -->
              <div style="background:#fff;border:1.5px solid rgba(87,46,136,0.1);border-radius:14px;padding:1rem 1.1rem;box-shadow:0 2px 8px rgba(87,46,136,0.05);">
                <div style="font-size:0.6rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:#b0a0cc;margin-bottom:0.65rem;">Visibility</div>
                <div style="display:flex;flex-direction:column;gap:0.4rem;">
                  <label style="display:flex;align-items:center;gap:0.55rem;padding:0.55rem 0.7rem;border-radius:9px;border:1.5px solid ${isPublic ? '#572e88' : 'rgba(87,46,136,0.12)'};background:${isPublic ? 'rgba(87,46,136,0.05)' : '#fff'};cursor:pointer;">
                    <input type="radio" name="vis_launch" id="vis_launch_public" value="public" ${isPublic ? 'checked' : ''} style="accent-color:#572e88;flex-shrink:0;" />
                    <div>
                      <div style="font-size:0.78rem;font-weight:700;color:#1a1530;">Public</div>
                      <div style="font-size:0.66rem;color:#8878a8;line-height:1.35;">Shows up in search.</div>
                    </div>
                  </label>
                  <label style="display:flex;align-items:center;gap:0.55rem;padding:0.55rem 0.7rem;border-radius:9px;border:1.5px solid ${!isPublic ? '#572e88' : 'rgba(87,46,136,0.12)'};background:${!isPublic ? 'rgba(87,46,136,0.05)' : '#fff'};cursor:pointer;">
                    <input type="radio" name="vis_launch" id="vis_launch_unlisted" value="unlisted" ${!isPublic ? 'checked' : ''} style="accent-color:#572e88;flex-shrink:0;" />
                    <div>
                      <div style="font-size:0.78rem;font-weight:700;color:#1a1530;">Unlisted</div>
                      <div style="font-size:0.66rem;color:#8878a8;line-height:1.35;">Direct link only.</div>
                    </div>
                  </label>
                </div>
              </div>

              <!-- Launch -->
              <div style="display:flex;flex-direction:column;gap:0.45rem;">
                <div class="form-error" id="step9Error"></div>
                <button class="btn-launch" onclick="launchProduction()" style="width:100%;">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
                  Launch Production
                </button>
                <button class="btn-draft" onclick="saveAsDraft()" style="width:100%;">Save as Draft</button>
                <p style="font-size:0.66rem;color:#b0a0cc;line-height:1.5;margin:0;text-align:center;">Everything can be edited from the workspace after launch.</p>
              </div>

            </div>
          </div>

          <div class="wizard-nav" style="margin-top:1rem;">
            <button class="btn-back" onclick="goBack()">← Back</button>
          </div>
        </div>
      `;
    }

    // ── Step 9: read-only month calendar ──
    let _s9CalYear  = null;
    let _s9CalMonth = null; // 0-indexed

    function renderStep9Calendar() {
      const el = document.getElementById('step9-cal-preview');
      if (!el) return;

      if (!step3Events.length) {
        el.innerHTML = `<div class="s9-cal-empty">No dates set - you can add them in your workspace calendar.</div>`;
        return;
      }

      // Figure out the month range that contains all events
      const dates = step3Events.map(e => e.date).filter(Boolean).sort();
      const firstDate = new Date(dates[0] + 'T12:00:00');
      const lastDate  = new Date(dates[dates.length - 1] + 'T12:00:00');
      const minYear = firstDate.getFullYear(), minMonth = firstDate.getMonth();
      const maxYear = lastDate.getFullYear(),  maxMonth = lastDate.getMonth();

      // Default to first month that has events
      if (_s9CalYear === null) {
        _s9CalYear  = minYear;
        _s9CalMonth = minMonth;
      }

      _drawS9Calendar(el, minYear, minMonth, maxYear, maxMonth);
    }

    function _drawS9Calendar(el, minYear, minMonth, maxYear, maxMonth) {
      const year  = _s9CalYear;
      const month = _s9CalMonth; // 0-indexed

      // Build a map: dateStr → [events]
      const byDate = {};
      step3Events.forEach(e => {
        if (!e.date) return;
        if (!byDate[e.date]) byDate[e.date] = [];
        byDate[e.date].push(e);
      });

      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const title = `${monthNames[month]} ${year}`;

      const atMin = (year === minYear && month === minMonth);
      const atMax = (year === maxYear && month === maxMonth);

      // Day-of-week headers
      const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const dowHTML = dows.map(d => `<div class="s9-cal-dow">${d}</div>`).join('');

      // Cells
      const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      let cells = '';
      // Leading empty cells
      for (let i = 0; i < firstDay; i++) {
        cells += `<div class="s9-cal-cell s9-faded"></div>`;
      }
      // Day cells
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = (dateStr === todayStr);
        const events  = byDate[dateStr] || [];
        const chipsHTML = events.slice(0, 3).map(e => {
          const col   = EVENT_COLOURS[e.event_type] || '#572e88';
          const label = EVENT_TYPE_LABELS[e.event_type] || 'Event';
          return `<span class="s9-cal-chip" style="background:${col}22;color:${col};">${escHtml(label)}</span>`;
        }).join('');
        const moreHTML = events.length > 3
          ? `<span class="s9-cal-chip" style="background:#e8e4f0;color:#9a90b0;">+${events.length - 3} more</span>`
          : '';
        cells += `<div class="s9-cal-cell${isToday ? ' s9-today' : ''}">
          <div class="s9-cal-date">${d}</div>
          ${chipsHTML}${moreHTML}
        </div>`;
      }

      el.innerHTML = `
        <div class="s9-cal-wrap">
          <div class="s9-cal-nav">
            <button class="s9-cal-nav-btn" onclick="_s9NavPrev()" ${atMin ? 'disabled' : ''}>&#8249;</button>
            <span class="s9-cal-nav-title">${title}</span>
            <button class="s9-cal-nav-btn" onclick="_s9NavNext()" ${atMax ? 'disabled' : ''}>&#8250;</button>
          </div>
          <div class="s9-cal-grid">
            ${dowHTML}
            ${cells}
          </div>
        </div>`;
    }

    function _s9NavPrev() {
      if (_s9CalMonth === 0) { _s9CalYear--;  _s9CalMonth = 11; }
      else                   { _s9CalMonth--; }
      const dates = step3Events.map(e => e.date).filter(Boolean).sort();
      const firstDate = new Date(dates[0] + 'T12:00:00');
      const lastDate  = new Date(dates[dates.length - 1] + 'T12:00:00');
      const el = document.getElementById('step9-cal-preview');
      if (el) _drawS9Calendar(el, firstDate.getFullYear(), firstDate.getMonth(), lastDate.getFullYear(), lastDate.getMonth());
    }
    function _s9NavNext() {
      if (_s9CalMonth === 11) { _s9CalYear++;  _s9CalMonth = 0; }
      else                    { _s9CalMonth++; }
      const dates = step3Events.map(e => e.date).filter(Boolean).sort();
      const firstDate = new Date(dates[0] + 'T12:00:00');
      const lastDate  = new Date(dates[dates.length - 1] + 'T12:00:00');
      const el = document.getElementById('step9-cal-preview');
      if (el) _drawS9Calendar(el, firstDate.getFullYear(), firstDate.getMonth(), lastDate.getFullYear(), lastDate.getMonth());
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' });
      } catch(e) {
        return dateStr;
      }
    }

    function jumpToStep(step) {
      currentStep = step;
      renderStep();
    }

    function productionAdminUrl(productionId, productionSlug = '') {
      const orgSlug = currentOrg?.slug || '';
      if (orgSlug && productionSlug) {
        return `/${encodeURIComponent(orgSlug)}/ORG/Productions/${encodeURIComponent(productionSlug)}`;
      }
      return `/org/production?id=${encodeURIComponent(productionId)}`;
    }

    async function quickSaveDraft() {
      readCurrentStepData();
      const btn = document.getElementById('headerDraftBtn');
      if (prodId) {
        if (btn) { btn.textContent = 'Saving...'; btn.disabled = true; }
        try {
          await sb.from('productions').update({ status: 'setup', wizard_data: buildWizardDataObj() }).eq('id', prodId);
          if (btn) { btn.textContent = 'Saved!'; setTimeout(() => { btn.textContent = 'Save Draft'; btn.disabled = false; }, 2000); }
        } catch(err) {
          if (btn) { btn.textContent = 'Save Draft'; btn.disabled = false; }
          alert('Could not save: ' + (err.message || 'Unknown error'));
        }
      } else {
        saveToLocalStorage();
        if (btn) { btn.textContent = 'Saved locally'; setTimeout(() => { btn.textContent = 'Save Draft'; }, 2000); }
      }
    }

    async function saveAsDraft() {
      hideError('step9Error');
      showLoading(MSGS_SAVING);
      try {
        const { error } = await sb.from('productions').update({
          status: 'setup',
          wizard_data: buildWizardDataObj()
        }).eq('id', prodId);

        if (error) throw error;

        const { data: savedProd } = await sb.from('productions').select('slug').eq('id', prodId).single();
        clearLocalStorage();
        window.location.href = productionAdminUrl(prodId, savedProd?.slug || '');
      } catch(err) {
        hideLoading();
        showError('step9Error', 'Error saving draft: ' + (err.message || 'Unknown error'));
      }
    }

    async function launchProduction() {
      hideError('step9Error');
      const visEl = document.getElementById('vis_launch_public');
      wizardData.is_public = visEl ? visEl.checked : true;
      showLoading(MSGS_SAVING);
      try {
        const newStatus = 'setup';
        // Auto-generate a slug from the title if one isn't already set
        const autoSlug = (wizardData.title || 'production')
          .toLowerCase().replace(/[^a-z0-9\s-]/g, '').trim()
          .replace(/\s+/g, '-').replace(/-+/g, '-').slice(0, 55)
          + '-' + new Date().getFullYear();
        const { data: existingProd } = await sb.from('productions').select('slug').eq('id', prodId).single();
        const slugToSet = existingProd?.slug || autoSlug;

        // Build enabled_modules from the features selected in step 11
        const f = wizardData.features || {};
        const enabledModules = {
          auditions: f.auditions !== false,   // on by default
          team:      !!f.volunteers,
          checklist: f.checklists !== false,  // on by default
          messages:  true,
          files:     true,
        };

        const { error } = await sb.from('productions').update({
          status: newStatus,
          is_public: wizardData.is_public,
          wizard_data: buildWizardDataObj(),
          slug: slugToSet,
          enabled_modules: enabledModules,
        }).eq('id', prodId);

        if (error) throw error;

        // Sync wizard dates to Zeus calendar.
        // If AI-generated events already exist (from Step 3 schedule import), use those -
        // they are already expanded to individual daily events and are the source of truth.
        // Only fall back to generating period blocks if no events exist at all.
        try {
          const { data: existingEvents } = await sb
            .from('production_events')
            .select('id')
            .eq('production_id', prodId)
            .limit(1);

          if (!existingEvents || existingEvents.length === 0) {
            // No AI events - generate period blocks and expand them into individual days
            const rs = wizardData.rehearsal_start, re = wizardData.rehearsal_end;
            const ps = wizardData.perf_start,      pe = wizardData.perf_end;
            const rawBlocks = [];
            if (rs) rawBlocks.push({
              production_id: prodId,
              title: 'Rehearsal',
              event_type: 'rehearsal',
              start_time: localDTStr(rs,       '10:00'),
              end_time:   localDTStr(re || rs, '18:00'),
            });
            if (ps) rawBlocks.push({
              production_id: prodId,
              title: 'Performance',
              event_type: 'performance',
              start_time: localDTStr(ps,       '19:30'),
              end_time:   localDTStr(pe || ps, '22:00'),
            });
            if (rawBlocks.length) {
              // expandMultiDayEvents expands rehearsal-type events into individual daily events;
              // performance events stay as a date-range block (per spec).
              const expanded = expandMultiDayEvents(rawBlocks).map(e => ({
                production_id: prodId,
                title:         e.title,
                event_type:    e.event_type,
                start_time:    e.start_time,
                end_time:      e.end_time,
              }));
              await sb.from('production_events').insert(expanded);
            }
          }
          // If events already exist, leave them untouched - Zeus is source of truth.
        } catch(calErr) {
          // Fail silently - don't block launch
        }

        clearLocalStorage();
        window.location.href = productionAdminUrl(prodId, slugToSet);
      } catch(err) {
        hideLoading();
        showError('step9Error', 'Error launching production: ' + (err.message || 'Unknown error'));
      }
    }

    // ── Navigation ──
    function goBack() {
      readCurrentStepData();
      saveToLocalStorage();
      const idx = wizardSteps.indexOf(currentStep);
      if (idx > 0) {
        currentStep = wizardSteps[idx - 1];
        renderStep();
      }
    }

    // ── Draft resume ──
    function resumeDraft() {
      document.getElementById('draftBanner').style.display = 'none';
      loadFromLocalStorage();
      if (wizardData.poster_url && !uploadedPreviewUrl) {
        uploadedPreviewUrl = wizardData.poster_url;
      }
      renderStep();
    }

    function startFresh() {
      clearLocalStorage();
      prodId = null;
      uploadedFile = null;
      uploadedBase64 = null;
      uploadedMediaType = null;
      uploadedPreviewUrl = null;
      aiFilledFields = [];
      wizardData = {
        title: '', production_type: 'musical', description: '', is_public: false,
        rehearsal_start: '', rehearsal_end: '', audition_start: '', audition_end: '',
        perf_start: '', perf_end: '', callback_date: '',
        auditions_enabled: true, audition_type: 'open_call', max_applicants: '',
        media_required: { headshot: true, resume: false, video: false },
        roles: [], team: [],
        features: { auditions: true, roles: true, volunteers: false, checklists: true, tickets: false, registration: false, budget: false, marketing: false, sponsors: false },
        volunteers_enabled: false, volunteer_roles: '', max_volunteers: '',
        tickets_enabled: false, venue: '', ticket_types: [],
        poster_url: ''
      };
      currentStep = 1;
      document.getElementById('draftBanner').style.display = 'none';
      renderStep();
    }

    // ── Utilities ──
    function capitalize(str) {
      if (!str) return '';
      return str.charAt(0).toUpperCase() + str.slice(1).replace(/_/g, ' ');
    }

    // ── Cookie notice ──
    function acceptCookie() {
      localStorage.setItem('bts_cookie_ok', '1');
      document.getElementById('cookieNotice').style.display = 'none';
    }

    function initCookieNotice() {
      if (!localStorage.getItem('bts_cookie_ok')) {
        document.getElementById('cookieNotice').style.display = 'flex';
      }
    }

    // ── Init ──
    async function init() {
      showLoading(MSGS_SAVING);
      try {
        const { data: { session }, error: sessionError } = await sb.auth.getSession();
        if (sessionError || !session) {
          window.location.href = '/login';
          return;
        }
        currentUser = session.user;

        const { data: org, error: orgError } = await sb
          .from('organizations')
          .select('*')
          .eq('admin_id', currentUser.id)
          .limit(1)
          .single();

        if (orgError || !org) {
          window.location.href = '/org/setup';
          return;
        }
        currentOrg = org;

        // Check for existing draft
        const savedProdId = localStorage.getItem('bts_wizard_prod_id');
        const savedState = localStorage.getItem('bts_wizard_state');

        const autoResume = localStorage.getItem('bts_wizard_auto_resume') === '1';
        try { localStorage.removeItem('bts_wizard_auto_resume'); } catch(_) {}

        if (savedProdId && savedState) {
          // Pre-fetch poster_url so it's ready on resume
          const { data: prodRow } = await sb.from('productions').select('poster_url').eq('id', savedProdId).maybeSingle();
          if (prodRow?.poster_url) wizardData.poster_url = prodRow.poster_url;

          if (autoResume) {
            resumeDraft();
          } else {
            document.getElementById('draftBanner').style.display = 'flex';
            renderStep();
          }
        } else {
          renderStep();
        }
        initCookieNotice();
      } catch(err) {
        console.error('Init error:', err);
        window.location.href = '/login';
      } finally {
        hideLoading();
      }
    }

    // Start
    init();
  </script>
  <script defer src="/SHARED/Components/text-fit.js"></script>
  <script src="/SHARED/Components/auto-save.js?v=5"></script>
