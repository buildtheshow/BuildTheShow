<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Team - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v51-20260704" />
  <link rel="stylesheet" href="/ASSETS/styles/production-team-card.css?v=volunteer-left-text-20260511" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; min-height: 100dvh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; z-index: 0; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: -1; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1200px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    /* ── Add button ── */
    .ctm-add-btn { background: #572e88; color: #fff; border: none; border-radius: 10px; padding: 0.6rem 1.25rem; font-size: 0.82rem; font-weight: 800; cursor: pointer; font-family: var(--bts-font); white-space: nowrap; transition: filter 0.15s; margin-bottom: 1.5rem; display: inline-block; }
    .ctm-add-btn:hover { filter: brightness(0.88); }

    /* ── Card grid ── */
    .ctm-grid { display: flex; flex-wrap: wrap; gap: 1rem; }

    /* ── Empty state ── */
    .ctm-empty { padding: 3rem 1.5rem; text-align: center; }
    .ctm-empty-title { font-size: 1.15rem; font-weight: 800; color: #1a1530; margin-bottom: 0.35rem; }
    .ctm-empty-sub { font-size: 0.82rem; color: rgba(26,21,48,0.5); margin-bottom: 1.5rem; line-height: 1.6; }

    /* ── Modal ── */
    .ctm-modal-overlay { position: fixed; inset: 0; background: rgba(10,6,26,0.55); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .ctm-modal-overlay.hidden { display: none; }
    .ctm-modal { background: #fff; border-radius: 16px; padding: 1.75rem 2rem; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.22); }
    .ctm-modal-title { font-size: 1.25rem; font-weight: 900; color: #1a1530; margin-bottom: 0.25rem; }
    .ctm-modal-sub { font-size: 0.8rem; color: rgba(26,21,48,0.5); margin-bottom: 1.5rem; }
    .ctm-field-group { display: flex; flex-direction: column; gap: 0.25rem; margin-bottom: 1rem; }
    .ctm-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(26,21,48,0.5); }
    .ctm-input, .ctm-select { width: 100%; border: 1.5px solid rgba(87,46,136,0.22); border-radius: 9px; padding: 0.6rem 0.85rem; font-size: 0.9rem; font-family: var(--bts-font); color: #1a1530; background: #fff; outline: none; transition: border-color 0.15s; }
    .ctm-input:focus, .ctm-select:focus { border-color: #572e88; }
    .ctm-modal-actions { display: flex; gap: 0.65rem; margin-top: 1.5rem; justify-content: flex-end; }
    .ctm-modal-cancel { background: transparent; border: 1.5px solid rgba(87,46,136,0.2); border-radius: 9px; padding: 0.6rem 1.2rem; font-size: 0.82rem; font-weight: 700; color: rgba(26,21,48,0.5); cursor: pointer; font-family: var(--bts-font); }
    .ctm-modal-save { background: #572e88; color: #fff; border: none; border-radius: 9px; padding: 0.6rem 1.5rem; font-size: 0.82rem; font-weight: 800; cursor: pointer; font-family: var(--bts-font); transition: filter 0.15s; }
    .ctm-modal-save:hover { filter: brightness(0.88); }
    .ctm-modal-save:disabled { opacity: 0.5; cursor: default; filter: none; }
    .ctm-modal-error { font-size: 0.75rem; color: #d1523d; margin-top: 0.5rem; min-height: 1rem; }

    /* ── Toast ── */
    .ctm-toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #efab45; color: #1a1530; padding: 0.65rem 1.2rem; border-radius: 9px; font-size: 0.82rem; font-weight: 800; box-shadow: 0 4px 16px rgba(0,0,0,0.15); opacity: 0; transform: translateY(6px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 9999; }
    .ctm-toast.visible { opacity: 1; transform: translateY(0); }
    .ctm-toast.error { background: #d1523d; color: #fff; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Plan</span></span>
            </div>
            <h1 class="aud-visual-title">Creative Team</h1>
            <p class="aud-visual-copy">The people leading this production. Add them here and send their portal access when ready.</p>
          </div>
        </div>
      </div>

      <button class="ctm-add-btn" onclick="openAddModal()">+ Add Team Member</button>

      <div id="ctm-grid-wrap"></div>

    </div>
  </div>

  <!-- Add / Edit modal -->
  <div class="ctm-modal-overlay hidden" id="ctm-modal-overlay">
    <div class="ctm-modal">
      <div class="ctm-modal-title" id="ctm-modal-title">Add Team Member</div>
      <div class="ctm-modal-sub" id="ctm-modal-sub">Add someone to the creative team. Send their portal invite when you're ready.</div>
      <div class="ctm-field-group">
        <label class="ctm-label" for="ctm-f-role">Role</label>
        <select class="ctm-select" id="ctm-f-role">
          <option value="producer">Producer</option>
          <option value="director">Director</option>
          <option value="choreographer">Choreographer</option>
          <option value="vocal director">Vocal Director</option>
          <option value="music director">Music Director</option>
          <option value="__custom__">Custom role...</option>
        </select>
        <input class="ctm-input" id="ctm-f-role-custom" placeholder="Enter custom role" style="display:none;margin-top:0.4rem;" />
      </div>
      <div class="ctm-field-group">
        <label class="ctm-label" for="ctm-f-name">Full name</label>
        <input class="ctm-input" id="ctm-f-name" placeholder="e.g. Sarah Johnson" />
      </div>
      <div class="ctm-field-group">
        <label class="ctm-label" for="ctm-f-email">Email</label>
        <input class="ctm-input" id="ctm-f-email" type="email" placeholder="e.g. sarah@email.com" />
      </div>
      <div class="ctm-field-group">
        <label class="ctm-label" for="ctm-f-phone">Phone <span style="font-weight:500;text-transform:none;letter-spacing:0;">(optional)</span></label>
        <input class="ctm-input" id="ctm-f-phone" type="tel" placeholder="e.g. 416-555-0100" />
      </div>
      <div class="ctm-modal-error" id="ctm-modal-error"></div>
      <div class="ctm-modal-actions">
        <button class="ctm-modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="ctm-modal-save" id="ctm-modal-save-btn" onclick="saveModal()">Add Member</button>
      </div>
    </div>
  </div>

  <div class="ctm-toast" id="ctm-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/ASSETS/scripts/production-team-card.js?v=mgmt-20260511b"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=67-20260704"></script>
  <script>
    window.initProductionPage('plan');
  </script>
  <script>
    const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
    const sb = supabase.createClient(SB_URL, SB_ANON);
    const prodId = new URLSearchParams(location.search).get('id') || '';

    // ── Role definitions ──────────────────────────────────
    const CREATIVE_ROLE_DEFS = [
      { key: 'producer',         colour: '#572e88' },
      { key: 'director',         colour: '#d1523d' },
      { key: 'choreographer',    colour: '#efab45' },
      { key: 'vocal director',   colour: '#476aaa' },
      { key: 'music director',   colour: '#476aaa' },
      { key: 'musical director', colour: '#476aaa' },
    ];
    const CREATIVE_ROLE_KEYS = new Set(CREATIVE_ROLE_DEFS.map(r => r.key));

    function roleColour(role) {
      const r = String(role || '').toLowerCase().trim();
      return CREATIVE_ROLE_DEFS.find(d => d.key === r)?.colour || '#769e7b';
    }

    function isCreative(m) {
      const r = String(m.role || '').toLowerCase().trim();
      const d = String(m.department || '').toLowerCase().trim();
      return CREATIVE_ROLE_KEYS.has(r) || d === 'creative team';
    }

    // ── State ─────────────────────────────────────────────
    let members = [];
    let prodName = '';
    let prodCountry = 'CA';
    let _editId = null;
    let _toastTimer;

    // ── Phone formatting ──────────────────────────────────
    const NANP_COUNTRIES = new Set(['CA','US','PR','VI','GU','AS','MP','DO','JM','TT','BB','LC','VC','GD','AG','DM','KN','BS','TC','AI','MS','KY','BM','VG','IM']);

    function formatPhone(raw, country) {
      const digits = String(raw || '').replace(/\D/g, '');
      if (!digits) return '';
      const isNANP = NANP_COUNTRIES.has(String(country || 'CA').toUpperCase());
      if (isNANP) {
        const d = digits.startsWith('1') && digits.length > 10 ? digits.slice(1) : digits;
        if (d.length <= 3)  return d;
        if (d.length <= 6)  return `(${d.slice(0,3)}) ${d.slice(3)}`;
        return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6,10)}`;
      }
      if (digits.length <= 2)  return '+' + digits;
      if (digits.length <= 5)  return '+' + digits.slice(0,2) + ' ' + digits.slice(2);
      if (digits.length <= 9)  return '+' + digits.slice(0,2) + ' ' + digits.slice(2,5) + ' ' + digits.slice(5);
      return '+' + digits.slice(0,2) + ' ' + digits.slice(2,5) + ' ' + digits.slice(5,8) + ' ' + digits.slice(8,12);
    }

    function onPhoneInput(e) {
      const input = e.target;
      const cursorAtEnd = input.selectionStart === input.value.length;
      const formatted = formatPhone(input.value, prodCountry);
      input.value = formatted;
      if (cursorAtEnd) input.setSelectionRange(formatted.length, formatted.length);
    }

    // ── Toast ─────────────────────────────────────────────
    function showToast(msg, isError = false) {
      const t = document.getElementById('ctm-toast');
      clearTimeout(_toastTimer);
      t.textContent = msg;
      t.classList.toggle('error', isError);
      t.classList.add('visible');
      _toastTimer = setTimeout(() => t.classList.remove('visible'), 2800);
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // ── Load ──────────────────────────────────────────────
    async function loadData() {
      if (!prodId) { renderEmpty('No production selected.'); return; }

      const [prodRes, membersRes] = await Promise.all([
        sb.from('productions').select('title, subtitle, holiday_country').eq('id', prodId).single(),
        sb.from('production_team_members').select('*').eq('production_id', prodId).eq('is_active', true).order('created_at', { ascending: true }),
      ]);

      prodName    = prodRes.data?.title || 'Your Production';
      prodCountry = prodRes.data?.holiday_country || 'CA';
      members     = (membersRes.data || []).filter(isCreative);
      render();
    }

    // ── Render ────────────────────────────────────────────
    function render() {
      const wrap = document.getElementById('ctm-grid-wrap');
      if (!members.length) {
        wrap.innerHTML = `
          <div class="ctm-empty">
            <div class="ctm-empty-title">No creative team members yet</div>
            <div class="ctm-empty-sub">Add your Producer, Director, Choreographer, and other creative leads here.<br>Send their portal access when you're ready.</div>
          </div>`;
        return;
      }

      // Use the existing renderProductionTeamCard template verbatim
      const cardsHtml = members.map(m => {
        // Map our colour onto note_color so the template reads it correctly
        if (!m.note_color) m.note_color = roleColour(m.role);
        return renderProductionTeamCard(m, { showManagement: true });
      }).join('');

      wrap.innerHTML = `<div class="ctm-grid">${cardsHtml}</div>`;

      // Run fit hooks for role identifier text sizing
      requestAnimationFrame(() => requestAnimationFrame(() => {
        if (typeof fitVolunteerRoleIdentifiers === 'function') fitVolunteerRoleIdentifiers();
      }));
    }

    function renderEmpty(msg) {
      document.getElementById('ctm-grid-wrap').innerHTML = `<div class="ctm-empty"><div class="ctm-empty-sub">${esc(msg)}</div></div>`;
    }

    // ── Action stubs called by the card template ──────────
    // These override the names the card back buttons call so we
    // don't need the full production-team-access.js on this page.

    function openProductionTeamMemberEdit(memberId) {
      openEditModal(memberId);
    }

    function emailTeamInvite(memberId, btn) {
      sendPortal(memberId, btn);
    }

    function copyTeamPortalLink(memberId, btn) {
      const m = members.find(x => String(x.id) === String(memberId));
      if (!m) return;
      const link = buildPortalLink(m.portal_token || m.id);
      navigator.clipboard.writeText(link)
        .then(() => showToast('Portal link copied!'))
        .catch(() => showToast('Could not copy link.', true));
    }

    function removeProductionTeamMember(memberId, btn) {
      removeMember(memberId);
    }

    // ── Portal ────────────────────────────────────────────
    function buildPortalLink(token) {
      const base = location.origin + '/SYSTEM/Organisations/Productions/Workspace/audition-team.html';
      return `${base}?id=${encodeURIComponent(prodId)}&token=${encodeURIComponent(token || '')}`;
    }

    async function sendPortal(memberId, btn) {
      const m = members.find(x => String(x.id) === String(memberId));
      if (!m) return;
      if (!m.email) { showToast('Add an email address first.', true); return; }

      const orig = btn?.textContent;
      if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }

      try {
        const portalLink = buildPortalLink(m.portal_token || m.id);
        const accessCode = m.passcode || String(m.portal_token || m.id).slice(0, 8).toUpperCase();

        const { error } = await sb.functions.invoke('send-email', {
          body: {
            production_id: prodId,
            category: 'team_invite',
            trigger: 'team_invite',
            email: m.email,
            name: m.name,
            context: {
              show_name: prodName,
              team_member_name: m.name,
              team_member_role: m.role,
              team_member_email: m.email,
              portal_link: portalLink,
              team_access_code: accessCode,
            },
          },
        });

        if (error) throw error;

        await sb.from('production_team_members').update({ invite_sent_at: new Date().toISOString() }).eq('id', memberId);
        m.invite_sent_at = new Date().toISOString();
        showToast(`Portal invite sent to ${m.email}`);
      } catch (err) {
        console.error('[BTS] sendPortal failed', err);
        showToast('Could not send invite. Try again.', true);
        if (btn) { btn.disabled = false; btn.textContent = orig; }
      }
    }

    // ── Remove ────────────────────────────────────────────
    async function removeMember(memberId) {
      const m = members.find(x => String(x.id) === String(memberId));
      if (!m) return;
      if (!confirm(`Remove ${m.name} from the creative team?`)) return;
      const { error } = await sb.from('production_team_members').update({ is_active: false }).eq('id', memberId);
      if (error) { showToast('Could not remove. Try again.', true); return; }
      members = members.filter(x => String(x.id) !== String(memberId));
      showToast('Removed.');
      render();
    }

    // ── Modal ─────────────────────────────────────────────
    function openAddModal() {
      _editId = null;
      document.getElementById('ctm-modal-title').textContent = 'Add Team Member';
      document.getElementById('ctm-modal-sub').textContent = "Add someone to the creative team. Send their portal invite when you're ready.";
      document.getElementById('ctm-modal-save-btn').textContent = 'Add Member';
      document.getElementById('ctm-f-role').value = 'producer';
      document.getElementById('ctm-f-role-custom').style.display = 'none';
      document.getElementById('ctm-f-name').value = '';
      document.getElementById('ctm-f-email').value = '';
      document.getElementById('ctm-f-phone').value = '';
      document.getElementById('ctm-modal-error').textContent = '';
      document.getElementById('ctm-modal-overlay').classList.remove('hidden');
      document.getElementById('ctm-f-name').focus();
    }

    function openEditModal(memberId) {
      const m = members.find(x => String(x.id) === String(memberId));
      if (!m) return;
      _editId = memberId;
      document.getElementById('ctm-modal-title').textContent = 'Edit Team Member';
      document.getElementById('ctm-modal-sub').textContent = 'Update their details below.';
      document.getElementById('ctm-modal-save-btn').textContent = 'Save Changes';
      const roleEl = document.getElementById('ctm-f-role');
      const roleKey = String(m.role || '').toLowerCase().trim();
      const isStandard = CREATIVE_ROLE_KEYS.has(roleKey);
      roleEl.value = isStandard ? roleKey : '__custom__';
      const customEl = document.getElementById('ctm-f-role-custom');
      customEl.style.display = isStandard ? 'none' : 'block';
      customEl.value = isStandard ? '' : (m.role || '');
      document.getElementById('ctm-f-name').value = m.name || '';
      document.getElementById('ctm-f-email').value = m.email || '';
      document.getElementById('ctm-f-phone').value = formatPhone(m.phone || '', prodCountry);
      document.getElementById('ctm-modal-error').textContent = '';
      document.getElementById('ctm-modal-overlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('ctm-modal-overlay').classList.add('hidden');
      _editId = null;
    }

    document.getElementById('ctm-f-role').addEventListener('change', function () {
      const customEl = document.getElementById('ctm-f-role-custom');
      customEl.style.display = this.value === '__custom__' ? 'block' : 'none';
      if (this.value === '__custom__') customEl.focus();
    });

    document.getElementById('ctm-f-phone').addEventListener('input', onPhoneInput);

    async function saveModal() {
      const errEl  = document.getElementById('ctm-modal-error');
      const saveBtn = document.getElementById('ctm-modal-save-btn');
      errEl.textContent = '';

      const roleSelect = document.getElementById('ctm-f-role').value;
      const roleCustom = document.getElementById('ctm-f-role-custom').value.trim();
      const role  = roleSelect === '__custom__' ? roleCustom : roleSelect;
      const name  = document.getElementById('ctm-f-name').value.trim();
      const email = document.getElementById('ctm-f-email').value.trim().toLowerCase();
      const phone = document.getElementById('ctm-f-phone').value.trim();

      if (!role)  { errEl.textContent = 'Please enter a role.'; return; }
      if (!name)  { errEl.textContent = 'Please enter a name.'; return; }
      if (!email) { errEl.textContent = 'Please enter an email address.'; return; }
      if (!email.includes('@')) { errEl.textContent = 'Please enter a valid email address.'; return; }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        if (_editId) {
          const { error } = await sb.from('production_team_members').update({
            name, email, phone: phone || null, role,
            note_color: roleColour(role),
          }).eq('id', _editId);
          if (error) throw error;
          const idx = members.findIndex(x => String(x.id) === String(_editId));
          if (idx !== -1) Object.assign(members[idx], { name, email, phone: phone || null, role, note_color: roleColour(role) });
          showToast('Saved!');
        } else {
          const token   = crypto.randomUUID();
          const passcode = Array.from({ length: 6 }, () => Math.floor(Math.random() * 10)).join('');
          const { data, error } = await sb.from('production_team_members').insert({
            production_id: prodId,
            name, email,
            phone: phone || null,
            role,
            department: 'Creative Team',
            note_color: roleColour(role),
            is_active: true,
            portal_token: token,
            passcode,
            access_level: 'creative',
            menu_access: [],
          }).select().single();
          if (error) throw error;
          members.push(data);
          showToast(`${name} added to the creative team.`);
        }
        closeModal();
        render();
      } catch (err) {
        console.error('[BTS] saveModal failed', err);
        errEl.textContent = err.message || 'Something went wrong. Try again.';
        saveBtn.disabled = false;
        saveBtn.textContent = _editId ? 'Save Changes' : 'Add Member';
      }
    }

    document.getElementById('ctm-modal-overlay').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // ── Init ──────────────────────────────────────────────
    loadData();
  </script>
</body>
</html>
