const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── Role → module keys (sidebar order) ────────────────────────────
const ROLE_MODULES = {

// ── Module key → page (all possible portal destinations) ───────────
const MODULE_CONFIG = {

  'org-dashboard':       { page: 'production-overview.html' },

  'plan-timeline':       { page: 'plan-timeline.html' },

  'shifts':              { page: 'volunteers.html' },

// ── Maps from the REAL shared sidebar partial's elements to module keys ──
// The portal injects SHARED/Navigation/production-sidebar.html verbatim, then
// uses these maps to show/hide the actual elements — same elements, same
// CSS, same behaviour as the regular production sidebar. No parallel markup.
//
// Items with a stable id in the partial are matched by id. Plain direct
// items (Overview/Plan/Financials) are matched by the page filename in
// their onclick="btsProdNav('...')" attribute.
const ID_TO_KEY = {
  'cast-group-dashboard-nav': 'cast-dashboard',
  'asub-dashboard':    'aud-dashboard',
  'asub-audschedule':  'aud-schedule',
  'asub-allperformers':'aud-performers',
  'asub-selftapes':    'aud-selftapes',
  'asub-setup':        'aud-setup',
  'csub-dashboard':    'cast-board-dash',
  'csub-castingboard': 'cast-board',
  'rsub-dashboard':    'reg-dashboard',
  'rsub-publicview':   'reg-form',
  'rsub-payments':     'reg-status',
  'rsub-settings':     'reg-settings',
};

// Inverted from MODULE_CONFIG: page filename → module key
const FILE_TO_KEY = {};
Object.keys(MODULE_CONFIG).forEach(function(key) {
  const page = MODULE_CONFIG[key].page;
  if (page && !FILE_TO_KEY[page]) FILE_TO_KEY[page] = key;
});

function resolveModuleKey(el) {
  if (ID_TO_KEY[el.id]) return ID_TO_KEY[el.id];
  const oc = el.getAttribute('onclick') || '';
  const m = oc.match(/'([a-z0-9_-]+\.html)'/i);
  return m ? FILE_TO_KEY[m[1]] : undefined;
}

// ── State ──────────────────────────────────────────────────────────
let _prodId = '';
let _prod = null;
let _org = null;
let _role = '';
let _modules = [];
let _previewPerson = null;
let _pendingSavedPortalSession = null;

function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

// ── Passcode hash ──────────────────────────────────────────────────
function portalPasscode(email, productionId) {
  const str = (email || '').toLowerCase().trim() + (productionId || '');
  let h = 0;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return String(Math.abs(h) % 900000 + 100000);
}

// ── Auth ───────────────────────────────────────────────────────────
async function prLogin(emailOverride = '', codeOverride = '', errOverride = null) {
  const email = String(emailOverride || document.getElementById('pr-login-email')?.value || '').trim().toLowerCase();
  const code  = String(codeOverride || document.getElementById('pr-login-code')?.value || '').trim();
  const errEl = errOverride || document.getElementById('pr-login-error');
  if (!email || !code) { errEl.textContent = 'Enter your email and access code.'; return; }
  errEl.textContent = 'Checking...';

  const parts = window.location.pathname.replace(/\/+$/, '').split('/').filter(Boolean);
  const orgAbbrev = parts[0] || '';
  const showSlug  = parts[1] || '';

  try {
    const { data: prodData, error: prodErr } = await sb.rpc('resolve_team_portal', {
      p_org_abbrev: orgAbbrev,
      p_show_slug:  showSlug,
    });
    if (prodErr || !prodData) { errEl.textContent = 'Production not found. Check your link.'; return; }
    _prodId = prodData;

    const { data: vol, error: volErr } = await sb
      .from('volunteer_signups')
      .select('id,name,email,role_name,production_id,volunteer_passcode')
      .eq('production_id', _prodId)
      .eq('email', email)
      .in('status', ['approved','checked_in','completed'])
      .maybeSingle();

    const roleName = vol?.role_name || '';
    const modules  = ROLE_MODULES[roleName];
    if (!modules || !modules.length) {
      errEl.textContent = 'Your role does not have portal access. Contact your production team.';
      return;
    }

    const expectedCode = String(vol?.volunteer_passcode || '').trim() || portalPasscode(email, _prodId);
    if (volErr || !vol || expectedCode !== code) {
      errEl.textContent = 'That email and code did not match. Contact your production team.';
      return;
    }

    _role    = roleName;
    _modules = modules;
    sessionStorage.setItem('bts_portal_session', JSON.stringify({ email, code, prodId: _prodId, role: _role }));
    bootPortal();
  } catch (e) {
    errEl.textContent = 'Something went wrong. Try again.';
    console.error('[Portal] login error', e);
  }
}

async function prResumeSavedSession(saved) {
  if (!saved?.email || !saved?.code) return;
  const continueBtn = document.getElementById('pr-continue-btn');
  const switchBtn = document.getElementById('pr-switch-btn');
  const errEl = document.getElementById('pr-login-error');
  if (continueBtn) continueBtn.disabled = true;
  if (switchBtn) switchBtn.disabled = true;
  if (errEl) errEl.textContent = 'Opening saved access...';
  await prLogin(saved.email, saved.code, errEl);
}

function prForgetSavedSession(reload = false) {
  try { sessionStorage.removeItem('bts_portal_session'); } catch (_) {}
  _pendingSavedPortalSession = null;
  if (reload) {
    window.location.reload();
    return;
  }
}

function prShowSavedSessionChoice(saved) {
  const cleanEmail = String(saved?.email || '').trim();
  _pendingSavedPortalSession = saved || null;
  const box = document.querySelector('.pr-login-box');
  if (!box) return;
  box.innerHTML = `
    <img src="/ASSETS/Images/LogoBrand/logo-long-black.png" alt="Build The Show" class="pr-login-logo" />
    <div class="pr-login-title">Welcome Back</div>
    <div class="pr-login-sub">This browser still has saved portal access for this production.</div>
    <div style="border:1.5px solid rgba(87,46,136,0.14);border-radius:12px;padding:1rem 1rem 0.9rem;margin-bottom:1rem;background:rgba(87,46,136,0.03);">
      <div style="font-size:0.72rem;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;color:rgba(26,21,48,0.45);margin-bottom:0.3rem;">Saved access</div>
      <div style="font-size:1rem;font-weight:900;color:#1a1530;">${esc(cleanEmail || 'Saved portal user')}</div>
    </div>
    <button class="pr-login-btn" id="pr-continue-btn" type="button">Continue as ${esc(cleanEmail || 'saved user')}</button>
    <button class="pr-login-btn pr-login-btn-secondary" id="pr-switch-btn" type="button" style="margin-top:0.75rem;">Use different email</button>
    <div class="pr-login-error" id="pr-login-error"></div>
  `;
  document.getElementById('pr-continue-btn')?.addEventListener('click', () => prResumeSavedSession(saved));
  document.getElementById('pr-switch-btn')?.addEventListener('click', () => {
    prForgetSavedSession(false);
    window.location.reload();
  });
}

async function prInit() {
  const params   = new URLSearchParams(window.location.search);
  const pvwToken = params.get('pvw_token');
  const pvwEmail = params.get('pvw_email');
  const pvwCode  = params.get('pvw_code');
  if (pvwToken) document.body.classList.add('pr-preview-mode');

  if (pvwToken) {
    const key = 'bts_portal_preview:' + pvwToken;
    let preview = null;
    try { preview = JSON.parse(sessionStorage.getItem(key) || localStorage.getItem(key) || 'null'); } catch (_) {}
    if (preview?.prodId && Date.now() - Number(preview.createdAt || 0) < 10 * 60 * 1000) {
      const KIND_TO_ROLE = { 'treasurer': 'Treasurer', 'dept_lead': 'Dept Lead', 'volunteer': 'Volunteer', 'cast': 'Cast', 'team': 'Team', 'producer': 'Producer', 'board': 'Board' };
      _prodId        = preview.prodId;
      _role          = preview.role || KIND_TO_ROLE[preview.kind] || '';
      _modules       = ROLE_MODULES[_role] || [];
      _previewPerson = preview.person || null;
      try { sessionStorage.removeItem(key); } catch (_) {}
      try { localStorage.removeItem(key); } catch (_) {}
      await bootPortal();
      return;
    }
  }

  if (pvwEmail && pvwCode) {
    await prLogin(pvwEmail, pvwCode, document.getElementById('pr-login-error'));
    return;
  }

  const saved = sessionStorage.getItem('bts_portal_session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (s.email && s.code && s.prodId) {
        prShowSavedSessionChoice(s);
        return;
      }
    } catch (_) {}
  }
}

async function bootPortal() {
  const { data, error } = await sb
    .from('productions')
    .select('*,organizations(id,name,email,logo_url,logo_white_url,slug)')
    .eq('id', _prodId)
    .single();
  if (error || !data) { document.getElementById('pr-login-error').textContent = 'Could not load production.'; return; }
  _prod = data;
  _org  = data.organizations || null;
  await setupPortalSidebar();
  renderPortalBranding();
  document.getElementById('pr-login-overlay').style.display = 'none';
  document.getElementById('pr-shell').style.display = '';
  if (_modules.length) prAutoOpenAndLoad();
}

// ── Branding (writes into the real injected partial's own elements) ──
const STATUS_LABELS = { setup: 'In Planning', auditions: 'Auditions Launched', casting: 'Show Cast', rehearsals: 'Rehearsing', performances: 'Performing', wrapped: 'Wrapped' };

function renderPortalBranding() {
  ['sidebar-poster-wrap', 'sidebar-mobile-poster-wrap'].forEach(function(id) {
    const el = document.getElementById(id);
    if (!el) return;
    if (_prod?.poster_url) {
      el.innerHTML = '<img src="' + esc(_prod.poster_url) + '" alt="' + esc(_prod.title || 'Production') + ' poster" />';
      el.classList.remove('hidden');
    } else {
      el.innerHTML = '';
      el.classList.add('hidden');
    }
  });
  ['hdr-title', 'hdr-mobile-title'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.textContent = _prod?.title || 'Production';
  });
  ['hdr-sub', 'hdr-mobile-sub'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.textContent = 'Welcome back, ' + prFirstName() + '.';
  });
  const statusLabel = STATUS_LABELS[_prod?.status] || 'Setup';
  ['hdr-status', 'hdr-mobile-status'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.textContent = statusLabel;
  });
  // Org-level links don't apply inside the portal — this user has no org session
  ['sidebar-org-back', 'sidebar-mobile-org-back', 'sidebar-public-link'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });

  const orgLogoEl = document.getElementById('pr-sidebar-org-logo');
  if (orgLogoEl) {
    const logoUrl = _org?.logo_white_url || _org?.logo_url || '';
    orgLogoEl.innerHTML = logoUrl
      ? '<img src="' + esc(logoUrl) + '" alt="' + esc(_org?.name || 'Organisation') + ' logo" />'
      : esc(_org?.name || 'Build The Show');
  }
  const volLink = document.getElementById('pr-volunteer-link');
  if (volLink) volLink.href = prVolunteerUrl();
}

function prFirstName() {
  const raw = _previewPerson?.name
    || document.getElementById('pr-login-email')?.value
    || _previewPerson?.email
    || 'there';
  const clean = String(raw).trim();
  if (!clean || clean.includes('@')) return 'there';
  return clean.split(/\s+/)[0] || 'there';
}

function prVolunteerUrl() {
  const orgSlug  = _org?.slug || '';
  const showSlug = _prod?.slug || '';
  if (orgSlug && showSlug) return '/' + encodeURIComponent(orgSlug) + '/' + encodeURIComponent(showSlug) + '/volunteers';
  const url = new URL('/volunteers', window.location.origin);
  if (_prodId) url.searchParams.set('prod', _prodId);
  return url.pathname + url.search;
}

function prForgetDevice() {
  prForgetSavedSession(true);
}

// ── Sidebar: fetch the real shared partial, inject it verbatim, then ─
// restrict visible items to this role's modules (same pattern as the
// existing window.applyTeamSidebarRestriction in production-sidebar-nav.js).
async function setupPortalSidebar() {
  const host = document.getElementById('prod-sidebar-host');
  if (!host) return;
  const res = await fetch('/SHARED/Navigation/production-sidebar.html?v=sidebar-v62-20260630');
  host.innerHTML = await res.text();

  if (window.enhanceSidebarNavControls) window.enhanceSidebarNavControls(host);
  applyPortalModuleRestriction();
  injectPortalSidebarExtras();
  installPortalNavIntercept();
}

function applyPortalModuleRestriction() {
  const host = document.getElementById('prod-sidebar-host');
  if (!host) return;
  const moduleSet = new Set(_modules);

  // Direct leaf items (not subgroup toggle headers) and sub-items
  host.querySelectorAll('.sidebar-group-items > .prod-tab, .prod-sub-item').forEach(function(el) {
    const key = resolveModuleKey(el);
    el.style.display = (key && moduleSet.has(key)) ? '' : 'none';
  });

  // Subgroup wraps: only show if at least one sub-item inside is visible
  host.querySelectorAll('.prod-tab-submenu-wrap').forEach(function(wrap) {
    const anyVisible = Array.from(wrap.querySelectorAll('.prod-sub-item')).some(function(si) { return si.style.display !== 'none'; });
    wrap.style.display = anyVisible ? '' : 'none';
  });

  // Top-level groups: only show if anything inside survived
  host.querySelectorAll('.sidebar-group').forEach(function(grp) {
    const items = grp.querySelector('.sidebar-group-items');
    const anyVisible = items && Array.from(items.children).some(function(child) { return child.style.display !== 'none'; });
    grp.style.display = anyVisible ? '' : 'none';
    if (anyVisible) grp.classList.add('open');
  });
}

// Appends the portal-only footer (volunteer link, org logo, forget-device)
// onto the real injected .prod-sidebar element.
function injectPortalSidebarExtras() {
  const sidebarEl = document.querySelector('#prod-sidebar-host .prod-sidebar');
  if (!sidebarEl || sidebarEl.querySelector('.pr-sidebar-footer')) return;
  const extra = document.createElement('div');
  extra.innerHTML =
    '<div class="pr-sidebar-standard-links">' +
      '<a class="pr-sidebar-standard-link" id="pr-volunteer-link" href="#" target="_blank" rel="noopener">' +
        '<img src="/ASSETS/Images/Icons/Volunteers.svg?v=20260617" alt="" aria-hidden="true" />' +
        '<span>Volunteer Opportunities</span>' +
      '</a>' +
    '</div>' +
    '<div class="pr-sidebar-footer">' +
      '<div class="pr-sidebar-org-logo" id="pr-sidebar-org-logo">Build The Show</div>' +
      '<button class="pr-sidebar-forget" type="button" onclick="prForgetDevice()">Not you? Forget this device.</button>' +
    '</div>';
  while (extra.firstChild) sidebarEl.appendChild(extra.firstChild);
}

// ── Navigation: intercept clicks on the real sidebar's nav items ────
// Group/subgroup toggle headers resolve to no key and fall through to
// their native onclick (toggleSidebarGroup / toggleRegistrationMenu etc).
function installPortalNavIntercept() {
  const host = document.getElementById('prod-sidebar-host');
  if (!host || host.dataset.prIntercepted) return;
  host.dataset.prIntercepted = 'true';
  host.addEventListener('click', function(e) {
    const el = e.target.closest('.prod-tab, .prod-sub-item');
    if (!el) return;
    const key = resolveModuleKey(el);
    if (!key || !_modules.includes(key)) return;
    e.preventDefault();
    e.stopPropagation();
    prNavToModule(key, el);
  }, true);
}

function prNavToModule(key, el) {
  document.querySelectorAll('#prod-sidebar-host .prod-tab.active, #prod-sidebar-host .prod-sub-item.active').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');

  const cfg = MODULE_CONFIG[key];
  if (!cfg?.page) return;
  const frame = document.getElementById('portal-frame');
  if (frame) frame.src = cfg.page + '?id=' + encodeURIComponent(_prodId) + '&portal=1';
}

// Opens the group/subgroup containing the first accessible module and loads it.
function prAutoOpenAndLoad() {
  const firstKey = _modules[0];
  if (!firstKey) return;
  const host = document.getElementById('prod-sidebar-host');
  if (!host) return;
  let target = null;
  host.querySelectorAll('.sidebar-group-items > .prod-tab, .prod-sub-item').forEach(function(el) {
    if (!target && resolveModuleKey(el) === firstKey) target = el;
  });
  if (target) {
    const wrap = target.closest('.prod-tab-submenu-wrap');
    if (wrap) wrap.classList.add('open');
  }
  prNavToModule(firstKey, target);
}

// ── Boot ───────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', prInit);
</script>
