// ── Module: Registration Status ────────────────────────────────────
async function loadRegStatus() {
  setContent('<p class="pr-loading">Loading...</p>');
  var results = await Promise.all([
    sb.from('casting_assignments').select('*').eq('production_id', _prodId).eq('state', 'offer_accepted'),
    sb.from('registration_payment_records').select('*').eq('production_id', _prodId),
    sb.from('productions').select('registration_settings,registration_households').eq('id', _prodId).single(),
  ]);
  var assignments = results[0].data || [];
  var payments    = results[1].data || [];
  var prodData    = results[2].data || {};
  var settings    = prodData?.registration_settings || {};

  var applicantIds = Array.from(new Set(assignments.map(function(a) { return String(a.applicant_id || ''); }).filter(Boolean)));
  var appRes = { data: [] }, bookingRes = { data: [] };
  if (applicantIds.length) {
    var fetchResults = await Promise.all([
      sb.from('audition_applications').select('*').in('id', applicantIds),
      sb.from('audition_bookings').select('*').in('id', applicantIds),
    ]);
    appRes     = fetchResults[0];
    bookingRes = fetchResults[1];
  }

  _rptPaymentRecords = {};
  payments.forEach(function(r) {
    var id = String(r.casting_assignment_id || r.assignment_id || '');
    if (!id) return;
    if (!_rptPaymentRecords[id]) _rptPaymentRecords[id] = [];
    _rptPaymentRecords[id].push(r);
  });

  _rptHouseholds = (Array.isArray(prodData.registration_households) ? prodData.registration_households : []).map(function(h) {
    return { id: String(h.id || ''), name: h.family_name || h.name || '', member_ids: (h.member_ids || h.member_assignment_ids || []).map(String) };
  }).filter(function(h) { return h.id && h.member_ids.length; });

  var applicantMap = {};
  (bookingRes.data || []).forEach(function(b) { applicantMap[String(b.id)] = b; });
  (appRes.data || []).forEach(function(a) { applicantMap[String(a.id)] = a; });

  var seenApplicants = new Set();
  _rptCastItems = assignments.reduce(function(acc, a) {
    var appId = String(a.applicant_id || '');
    if (!appId || seenApplicants.has(appId)) return acc;
    var app = applicantMap[appId] || {};
    seenApplicants.add(appId);
    acc.push({ assignment: a, app: app });
    return acc;
  }, []);

  var paySettings = settings?.payment_settings || settings || {};
  var modeSettings = {
    mode: paySettings.payment_mode || paySettings.mode || 'none',
    flat_fee: paySettings.flat_fee || '',
    installment_1_amount: paySettings.installment_1_amount || '',
    installment_1_due: paySettings.installment_1_due || '',
    installment_2_amount: paySettings.installment_2_amount || '',
    installment_2_due: paySettings.installment_2_due || '',
    installment_1_label: paySettings.installment_1_label || '',
    installment_2_label: paySettings.installment_2_label || '',
    currency: paySettings.currency || 'CAD',
    sibling_discount_enabled: paySettings.sibling_discount_enabled || false,
    sibling_first_child: paySettings.sibling_first_child || '',
    sibling_additional: paySettings.sibling_additional || '',
    volunteer_discount_enabled: paySettings.volunteer_discount_enabled || false,
    volunteer_hours: paySettings.volunteer_hours || '',
    volunteer_discount: paySettings.volunteer_discount || '',
  };

  var totalDue = 0, totalPaid = 0;
  _rptCastItems.forEach(function(item) {
    var ef = rptEffectiveFee(item, modeSettings);
    var paidAmt = ((_rptPaymentRecords[String(item.assignment?.id)] || [])
      .filter(function(r) { return r.paid; })
      .reduce(function(s, r) { return s + (ef.installments[r.installment_index]?.amount || 0); }, 0));
    totalDue  += ef.total;
    totalPaid += paidAmt;
  });

  var sym = { CAD: '$', USD: '$', GBP: '£' }[modeSettings.currency] || '$';
  var html = '<div class="rpt-summary-bar">' +
    '<div class="rpt-summary-stat"><div class="rpt-summary-stat-label">Cast</div><div class="rpt-summary-stat-value">' + _rptCastItems.length + '</div></div>' +
    '<div class="rpt-summary-divider"></div>' +
    '<div class="rpt-summary-stat"><div class="rpt-summary-stat-label">Total Due</div><div class="rpt-summary-stat-value">' + sym + Math.round(totalDue).toLocaleString('en-CA') + '</div></div>' +
    '<div class="rpt-summary-divider"></div>' +
    '<div class="rpt-summary-stat"><div class="rpt-summary-stat-label">Collected</div><div class="rpt-summary-stat-value">' + sym + Math.round(totalPaid).toLocaleString('en-CA') + '</div></div>' +
    '<div class="rpt-summary-divider"></div>' +
    '<div class="rpt-summary-stat"><div class="rpt-summary-stat-label">Outstanding</div><div class="rpt-summary-stat-value" style="color:#d1523d">' + sym + Math.round(Math.max(0, totalDue - totalPaid)).toLocaleString('en-CA') + '</div></div>' +
  '</div>';

  html += rptBuildGridHtml(_rptCastItems, modeSettings);
  setContent(html);
}

// ── Registration helpers (ported from treasurer-portal.html) ───────
function rptHouseholdFor(assignmentId) {
  return _rptHouseholds.find(function(h) { return (h.member_ids || []).includes(String(assignmentId)); }) || null;
}

function rptFormatDate(iso) {
  if (!iso) return '';
  var d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
  return isNaN(d) ? '' : d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
}

function registrationPaymentCurrency(settings) { return settings?.currency || 'CAD'; }

function rptGetInstallments(settings) {
  if (settings.mode === 'flat') {
    var amt = parseFloat(String(settings.flat_fee || '').replace(/[^0-9.]/g, '')) || 0;
    return [{ amount: amt, label: 'Payment', dueDate: '' }];
  }
  if (settings.mode === 'split') {
    var i1 = parseFloat(String(settings.installment_1_amount || '').replace(/[^0-9.]/g, '')) || 0;
    var i2 = parseFloat(String(settings.installment_2_amount || '').replace(/[^0-9.]/g, '')) || 0;
    return [
      { amount: i1, label: settings.installment_1_label || 'First Payment',  dueDate: settings.installment_1_due || '' },
      { amount: i2, label: settings.installment_2_label || 'Final Payment',  dueDate: settings.installment_2_due || '' },
    ].filter(function(i) { return i.amount > 0; });
  }
  return [];
}

function rptScaleInstallments(base, total) {
  var baseTotal = base.reduce(function(s, i) { return s + i.amount; }, 0);
  if (!baseTotal || baseTotal === total) return base;
  return base.map(function(i) { return Object.assign({}, i, { amount: Math.round((i.amount / baseTotal) * total * 100) / 100 }); });
}

function rscVolunteerDiscountEarned(assignment, settings) {
  if (!assignment) return false;
  if (assignment.volunteer_discount_approved) return true;
  var required = parseFloat(String(settings.volunteer_hours || '').replace(/[^0-9.]/g, '')) || 0;
  if (!required) return false;
  var completed = parseFloat(String(assignment.volunteer_hours_completed || '').replace(/[^0-9.]/g, '')) || 0;
  return completed >= required;
}

function rptEffectiveFee(item, settings) {
  var assignId = String(item.assignment?.id || '');
  var household = rptHouseholdFor(assignId);
  var base = rptGetInstallments(settings);
  var baseTotal = base.reduce(function(s, i) { return s + i.amount; }, 0);
  var householdMemberIds = household ? (household.member_ids || []).map(String) : [];
  var householdPos = household ? householdMemberIds.indexOf(assignId) : -1;
  var effectiveBase = baseTotal;
  if (settings.sibling_discount_enabled && household) {
    var rate = householdPos === 0
      ? parseFloat(String(settings.sibling_first_child || '').replace(/[^0-9.]/g, '')) || 0
      : parseFloat(String(settings.sibling_additional || '').replace(/[^0-9.]/g, '')) || 0;
    if (rate > 0) effectiveBase = rate;
  }
  var volAdj = 0;
  if (settings.volunteer_discount_enabled && rscVolunteerDiscountEarned(item.assignment, settings)) {
    volAdj = parseFloat(String(settings.volunteer_discount || '').replace(/[^0-9.]/g, '')) || 0;
  }
  var schAdj = 0;
  if (item.assignment?.scholarship_status === 'approved') {
    schAdj = parseFloat(String(item.assignment?.scholarship_amount || '').replace(/[^0-9.]/g, '')) || 0;
  }
  var total = Math.max(0, effectiveBase - volAdj - schAdj);
  var adjustments = [];
  if (effectiveBase !== baseTotal) {
    var pct = baseTotal > 0 ? Math.round((1 - effectiveBase / baseTotal) * 100) : 0;
    adjustments.push({ type: 'sibling', label: 'Sibling Rate', value: effectiveBase, isRate: true, pct: pct });
  }
  if (volAdj) adjustments.push({ type: 'volunteer', label: 'Volunteer Discount', deduct: volAdj, hours: String(settings.volunteer_hours || '') });
  if (schAdj) adjustments.push({ type: 'scholarship', label: 'Scholarship', deduct: schAdj });
  return { installments: rptScaleInstallments(base, total), total: total, baseTotal: baseTotal, adjustments: adjustments };
}

function rscMoneyShort(amount, settings) {
  var n   = Number(amount || 0);
  var sym = { CAD: '$', USD: '$', GBP: '£' }[registrationPaymentCurrency(settings)] || '$';
  return sym + (Number.isFinite(n) ? (n % 1 === 0 ? String(Math.round(n)) : n.toFixed(2)) : '0');
}

function rscPersonInitials(name) {
  var parts = String(name || '').trim().split(/\s+/).filter(Boolean);
  return (parts[0]?.[0] || '?') + (parts.length > 1 ? parts[parts.length - 1][0] : '');
}

function rptPersonName(app) {
  app = app || {};
  return app.name || app.child_name || app.performer_name || app.student_name || [app.first_name, app.last_name].filter(Boolean).join(' ') || 'Unknown';
}

function rptPersonEmail(app) {
  app = app || {};
  return app.email || app.parent_email || app.guardian_email || app.contact_email || '';
}

async function trTogglePaid(assignmentId, installmentIndex, currentlyPaid) {
  var btn = document.getElementById('rsc-inst-' + assignmentId + '-' + installmentIndex);
  if (btn) { btn.disabled = true; btn.style.opacity = '0.55'; }
  var newPaid = !currentlyPaid;
  try {
    var res = await sb.from('registration_payment_records').upsert({
      production_id: _prodId, casting_assignment_id: assignmentId,
      installment_index: installmentIndex, paid: newPaid,
      paid_at: newPaid ? new Date().toISOString() : null,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'casting_assignment_id,installment_index' });
    if (res.error) throw res.error;
    await loadRegStatus();
  } catch (err) {
    console.error('[Portal] payment update failed', err);
    alert('Could not update payment. Try again.');
    if (btn) { btn.disabled = false; btn.style.opacity = ''; }
  }
}

async function trLogHouseholdInstallment(householdId, installmentIndex) {
  var hh = _rptHouseholds.find(function(h) { return String(h.id) === String(householdId); });
  if (!hh) return;
  var btn = document.getElementById('rsc-hh-inst-' + householdId + '-' + installmentIndex);
  if (btn) { btn.disabled = true; btn.style.opacity = '0.55'; }
  try {
    await Promise.all((hh.member_ids || []).map(async function(memberId) {
      var existing = (_rptPaymentRecords[String(memberId)] || []).find(function(r) { return Number(r.installment_index) === Number(installmentIndex); });
      if (existing?.paid) return;
      var res = await sb.from('registration_payment_records').upsert({
        production_id: _prodId, casting_assignment_id: memberId,
        installment_index: installmentIndex, paid: true,
        paid_at: new Date().toISOString(), updated_at: new Date().toISOString(),
      }, { onConflict: 'casting_assignment_id,installment_index' });
      if (res.error) throw res.error;
    }));
    await loadRegStatus();
  } catch (err) {
    console.error('[Portal] household payment update failed', err);
    alert('Could not update household payment. Try again.');
    if (btn) { btn.disabled = false; btn.style.opacity = ''; }
  }
}

function rscPaymentCellHtml(primaryItem, settings, items, household) {
  items = Array.isArray(items) ? items : [primaryItem];
  var sym = { CAD: '$', USD: '$', GBP: '£' }[registrationPaymentCurrency(settings)] || '$';
  var fmt = function(n) { return sym + (Number.isFinite(Number(n)) ? Math.round(Number(n)) : 0); };

  function buildStmtHtml(o) {
    return '<div class="rsc-stmt-status-bar ' + o.stateClass + '">' + esc(o.statusLabel) + '</div>' +
      '<div class="rsc-stmt-block"><div class="rsc-stmt-block-label">Fee</div>' + o.feeBreakdownHtml + '</div>' +
      '<div class="rsc-stmt-block"><div class="rsc-stmt-block-label">Payments</div>' + o.ledgerHtml +
        '<div class="rsc-stmt-row rsc-stmt-balance ' + o.stateClass + '"><span>Balance</span><span>' + esc(fmt(o.balance)) + '</span></div>' +
      '</div>' +
      (o.cardsHtml && o.cardsHtml.trim() ? '<div class="rsc-inst-row">' + o.cardsHtml + '</div>' : '');
  }

  function feeBreakdown(ef) {
    var html = '<div class="rsc-stmt-row"><span>Production Fee</span><span>' + esc(fmt(ef.baseTotal)) + '</span></div>';
    (ef.adjustments || []).forEach(function(adj) {
      if (adj.type === 'sibling') {
        var saving = ef.baseTotal - adj.value;
        html += '<div class="rsc-stmt-row rsc-stmt-deduct rsc-stmt-member-line"><span>Sibling Discount (' + esc(fmt(saving)) + ' off)</span><span>-' + esc(fmt(saving)) + '</span></div>';
      } else if (adj.type === 'volunteer') {
        var hrsLabel = adj.hours ? ' (' + adj.hours + ' hrs)' : '';
        html += '<div class="rsc-stmt-row rsc-stmt-deduct rsc-stmt-member-line"><span>Volunteer Discount' + esc(hrsLabel) + '</span><span>-' + esc(fmt(adj.deduct)) + '</span></div>';
      } else if (adj.type === 'scholarship') {
        html += '<div class="rsc-stmt-row rsc-stmt-deduct rsc-stmt-member-line"><span>Scholarship</span><span>-' + esc(fmt(adj.deduct)) + '</span></div>';
      }
    });
    if ((ef.adjustments || []).length) html += '<div class="rsc-stmt-row rsc-stmt-total"><span>Total Due</span><span>' + esc(fmt(ef.total)) + '</span></div>';
    return html;
  }

  if (household && items.length > 1) {
    var data = items.map(function(item) {
      var id = String(item.assignment?.id || '');
      var ef = rptEffectiveFee(item, settings);
      var records = _rptPaymentRecords[id] || [];
      var paid = records.filter(function(r) { return r.paid; }).reduce(function(sum, r) { return sum + (ef.installments[r.installment_index]?.amount || 0); }, 0);
      return { item: item, id: id, ef: ef, records: records, paid: paid };
    });
    if (!(settings.mode === 'flat' || settings.mode === 'split') || !data.some(function(d) { return d.ef.total > 0; }))
      return '<div class="rsc-stmt-empty">No fee configured.</div>';
    var hhTotalFee  = data.reduce(function(s, d) { return s + d.ef.total; }, 0);
    var hhTotalPaid = data.reduce(function(s, d) { return s + d.paid; }, 0);
    var hhBalance   = Math.max(0, hhTotalFee - hhTotalPaid);
    var allPaid     = hhBalance === 0 && hhTotalPaid > 0;
    var stateClass  = allPaid ? 'full' : hhTotalPaid > 0 ? 'partial' : 'unpaid';
    var statusLabel = allPaid ? 'Paid in Full' : hhTotalPaid > 0 ? 'Partially Paid' : 'Unpaid';
    var feeLines = data.map(function(d) {
      var firstName = rptPersonName(d.item.app || {}).trim().split(/\s+/)[0].toUpperCase() || 'MEMBER';
      return '<div class="rsc-stmt-row"><span>Production Fee &ndash; ' + esc(firstName) + '</span><span>' + esc(fmt(d.ef.baseTotal)) + '</span></div>';
    }).join('');
    var allAdj = [];
    data.forEach(function(d) { (d.ef.adjustments || []).forEach(function(adj) { if (!allAdj.find(function(a) { return a.type === adj.type; })) allAdj.push(Object.assign({}, adj, { baseTotal: d.ef.baseTotal })); }); });
    var discountLines = allAdj.map(function(adj) {
      if (adj.type === 'sibling') { var saving = adj.baseTotal - adj.value; return '<div class="rsc-stmt-row rsc-stmt-deduct"><span>Sibling Discount (' + esc(fmt(saving)) + ' off)</span><span>-' + esc(fmt(saving)) + '</span></div>'; }
      if (adj.type === 'volunteer') { var hrsLabel = adj.hours ? ' (' + adj.hours + ' hrs)' : ''; return '<div class="rsc-stmt-row rsc-stmt-deduct"><span>Volunteer Discount' + esc(hrsLabel) + '</span><span>-' + esc(fmt(adj.deduct)) + '</span></div>'; }
      if (adj.type === 'scholarship') return '<div class="rsc-stmt-row rsc-stmt-deduct"><span>Scholarship</span><span>-' + esc(fmt(adj.deduct)) + '</span></div>';
      return '';
    }).join('');
    var feeBreakdownHtml = feeLines + discountLines + '<div class="rsc-stmt-row rsc-stmt-total rsc-stmt-hh-total"><span>Total Due</span><span>' + esc(fmt(hhTotalFee)) + '</span></div>';
    var allRecords = data.flatMap(function(d) { return d.records.filter(function(r) { return r.paid; }).map(function(r) { return { paid_at: r.paid_at, amount: d.ef.installments[r.installment_index]?.amount || 0 }; }); });
    allRecords.sort(function(a, b) { return new Date(a.paid_at || 0) - new Date(b.paid_at || 0); });
    var ledgerHtml = allRecords.length
      ? allRecords.map(function(r) { return '<div class="rsc-stmt-row rsc-stmt-paid-row"><span>' + esc(rptFormatDate(r.paid_at)) + '</span><span>' + esc(fmt(r.amount)) + '</span></div>'; }).join('')
      : '<div class="rsc-stmt-row rsc-stmt-none">No payments yet</div>';
    var maxInst = Math.max.apply(null, [0].concat(data.map(function(d) { return d.ef.installments.length; })));
    var cardsHtml = Array.from({ length: maxInst }, function(_, idx) {
      var parts2 = data.map(function(d) { var inst = d.ef.installments[idx]; if (!inst || inst.amount <= 0) return null; var rec = d.records.find(function(r) { return r.installment_index === idx; }); return { inst: inst, rec: rec, isPaid: !!rec?.paid }; }).filter(Boolean);
      if (!parts2.length) return '';
      var isPaid = parts2.every(function(p) { return p.isPaid; });
      var firstDue = (parts2.find(function(p) { return p.inst.dueDate; }) || {}).inst?.dueDate || '';
      var isOverdue = !isPaid && firstDue && new Date(firstDue) < new Date(new Date().toDateString());
      var label = (parts2[0].inst.label || '').replace(/\s*\(.*\)$/, '') || ('Payment ' + (idx + 1));
      var sub = isPaid ? 'Paid' : (firstDue ? 'Due ' + rptFormatDate(firstDue) : 'Due date not set');
      return '<button type="button" class="rsc-inst-card ' + (isPaid ? 'paid' : isOverdue ? 'overdue' : '') + '" id="rsc-hh-inst-' + esc(household.id) + '-' + idx + '" ' + (isPaid ? 'disabled' : 'onclick="trLogHouseholdInstallment(\'' + esc(household.id) + '\',' + idx + ')"') + '>' +
        '<div class="rsc-inst-label">' + esc(label) + '</div>' +
        '<div class="rsc-inst-sub">' + esc(sub) + (isPaid ? '' : ' · click to mark received') + '</div>' +
      '</button>';
    }).join('');
    return buildStmtHtml({ totalFee: hhTotalFee, totalPaid: hhTotalPaid, balance: hhBalance, allPaid: allPaid, stateClass: stateClass, statusLabel: statusLabel, feeBreakdownHtml: feeBreakdownHtml, ledgerHtml: ledgerHtml, cardsHtml: cardsHtml });
  }

  var item = primaryItem || {};
  var assignId = String(item.assignment?.id || '');
  var ef = rptEffectiveFee(item, settings);
  var records = _rptPaymentRecords[assignId] || [];
  var hasFee = (settings.mode === 'flat' || settings.mode === 'split') && ef.total > 0;
  if (!hasFee) return '<div class="rsc-stmt-empty">No fee configured.</div>';
  var paidAmt = records.filter(function(r) { return r.paid; }).reduce(function(s, r) { return s + (ef.installments[r.installment_index]?.amount || 0); }, 0);
  var balance = Math.max(0, ef.total - paidAmt);
  var allPaid = balance === 0 && paidAmt > 0;
  var stateClass  = allPaid ? 'full' : paidAmt > 0 ? 'partial' : 'unpaid';
  var statusLabel = allPaid ? 'Paid in Full' : paidAmt > 0 ? 'Partially Paid' : 'Unpaid';
  var paidRecords = ef.installments.map(function(inst, idx) { var rec = records.find(function(r) { return r.installment_index === idx && r.paid; }); return rec ? { paid_at: rec.paid_at, amount: inst.amount } : null; }).filter(Boolean);
  paidRecords.sort(function(a, b) { return new Date(a.paid_at || 0) - new Date(b.paid_at || 0); });
  var ledgerHtml = paidRecords.length
    ? paidRecords.map(function(r) { return '<div class="rsc-stmt-row rsc-stmt-paid-row"><span>' + esc(rptFormatDate(r.paid_at)) + '</span><span>' + esc(fmt(r.amount)) + '</span></div>'; }).join('')
    : '<div class="rsc-stmt-row rsc-stmt-none">No payments yet</div>';
  var cardsHtml = ef.installments.map(function(inst, idx) {
    var rec = records.find(function(r) { return r.installment_index === idx; });
    var isPaid = !!rec?.paid;
    var label = (inst.label || '').replace(/\s*\(.*\)$/, '') || (ef.installments.length === 1 ? 'Payment' : 'Payment ' + (idx + 1));
    var sub = isPaid ? ('Paid ' + (rptFormatDate(rec.paid_at) || '')).trim() : (inst.dueDate ? 'Due ' + rptFormatDate(inst.dueDate) : 'Due date not set');
    var isOverdue = !isPaid && inst.dueDate && new Date(inst.dueDate) < new Date(new Date().toDateString());
    return '<button type="button" class="rsc-inst-card ' + (isPaid ? 'paid' : isOverdue ? 'overdue' : '') + '" id="rsc-inst-' + esc(assignId) + '-' + idx + '" onclick="trTogglePaid(\'' + esc(assignId) + '\',' + idx + ',' + (isPaid ? 'true' : 'false') + ')">' +
      '<div class="rsc-inst-label">' + esc(label) + '</div>' +
      '<div class="rsc-inst-sub">' + esc(sub) + (isPaid ? ' · click to undo' : ' · click to mark received') + '</div>' +
    '</button>';
  }).join('');
  return buildStmtHtml({ totalFee: ef.total, totalPaid: paidAmt, balance: balance, allPaid: allPaid, stateClass: stateClass, statusLabel: statusLabel, feeBreakdownHtml: feeBreakdown(ef), ledgerHtml: ledgerHtml, cardsHtml: cardsHtml });
}

function rscConnectionsCellHtml(item, settings, household) {
  var app = item.app || {};
  var assignment = item.assignment || {};
  var familyRequested = !!(app.registration_answers?.['__bts_registration_household_requested'] || app.registration_answers?.['pf_sibling_discount']);
  var volApproved = rscVolunteerDiscountEarned(assignment, settings);
  var volRequested = !!(app.registration_answers?.['pf_volunteer_discount'] || app.registration_answers?.['__bts_registration_volunteer_discount_requested']);
  var schRequested = !!(app.registration_answers?.['pf_scholarship_request'] || app.registration_answers?.['__bts_registration_scholarship_requested']);
  var schStatus = String(assignment.scholarship_status || (schRequested ? 'requested' : 'none'));
  var hhChipLabel = household ? (household.name || 'Connected') : familyRequested ? 'Review' : 'Add';
  var hhChipClass = household ? 'ok' : familyRequested ? 'warn' : 'muted';
  var volLabel = volApproved ? 'Approved' : volRequested ? 'Interested' : 'No';
  var volClass = volApproved ? 'ok' : volRequested ? 'info' : 'muted';
  var schLabel = { none: 'No', requested: 'Requested', approved: 'Yes', declined: 'Declined' }[schStatus] || schStatus;
  var schClass = schStatus === 'approved' ? 'ok' : schStatus === 'requested' ? 'warn' : 'muted';
  return '<div class="rsc-connect-list">' +
    '<div class="rsc-connect-item"><div><img class="rsc-connect-svg-icon" src="/ASSETS/Images/Icons/household-yes.svg" alt="" /></div><span class="rsc-connect-title">Household</span><span class="rsc-connect-chip ' + hhChipClass + '">' + esc(hhChipLabel) + '</span></div>' +
    '<div class="rsc-connect-item"><div><img class="rsc-connect-svg-icon" src="/ASSETS/Images/Icons/volunteer-not-interested.svg" alt="" /></div><span class="rsc-connect-title">Volunteer</span><span class="rsc-connect-chip ' + volClass + '">' + esc(volLabel) + '</span></div>' +
    '<div class="rsc-connect-item"><div><img class="rsc-connect-svg-icon" src="/ASSETS/Images/Icons/scolarships-no.svg" alt="" /></div><span class="rsc-connect-title">Scholarship</span><span class="rsc-connect-chip ' + schClass + '">' + esc(schLabel) + '</span></div>' +
  '</div>';
}

function rptLastName(name) {
  var parts = String(name || '').trim().split(/\s+/);
  return (parts.length > 1 ? parts[parts.length - 1] : parts[0] || '').toLowerCase();
}

function rptSortKey(item) {
  var assignId = String(item.assignment?.id || '');
  var hh = rptHouseholdFor(assignId);
  return hh ? rptLastName(hh.name) : rptLastName(rptPersonName(item.app || {}));
}

function rptBuildGridHtml(items, settings) {
  var sorted = items.slice().sort(function(a, b) {
    var ka = rptSortKey(a), kb = rptSortKey(b);
    return _rptSortOrder === 'az' ? ka.localeCompare(kb) : kb.localeCompare(ka);
  });

  var assignedToHousehold = new Set();
  var groups = [];
  _rptHouseholds.forEach(function(hh) {
    var members = hh.member_ids.map(function(mid) { return sorted.find(function(i) { return String(i.assignment?.id) === mid; }); }).filter(Boolean);
    if (members.length > 1) {
      members.forEach(function(m) { assignedToHousehold.add(String(m.assignment?.id)); });
      groups.push({ hh: hh, members: members });
    }
  });
  groups.sort(function(a, b) { return rptLastName(a.hh.name).localeCompare(rptLastName(b.hh.name)); });
  var ungrouped = sorted.filter(function(i) { return !assignedToHousehold.has(String(i.assignment?.id)); });

  var html = '';
  groups.forEach(function(g) {
    var payHtml  = rscPaymentCellHtml(g.members[0], settings, g.members, g.hh);
    var connHtml = rscConnectionsCellHtml(g.members[0], settings, g.hh);
    html += '<div class="rsc-hh-group">' +
      '<div class="rsc-hh-group-header">' +
        '<img class="rsc-hh-group-icon" src="/ASSETS/Images/Icons/household-yes.svg" alt="" />' +
        '<span class="rsc-hh-group-name">' + esc(g.hh.name) + '</span>' +
        '<span class="rsc-hh-group-membercount">' + g.members.length + ' members</span>' +
      '</div>' +
      '<div class="rsc-status-row">' +
        '<div class="rsc-status-cell"><div class="rsc-col-header">Cast Members</div>' +
          g.members.map(function(m) {
            var name = rptPersonName(m.app || {});
            return '<div class="rsc-cast-initials" style="width:40px;height:40px;font-size:0.8rem;border-radius:7px;margin-bottom:0.3rem">' + esc(rscPersonInitials(name)) + '</div><div style="font-size:0.85rem;font-weight:950;color:#1a1530">' + esc(name) + '</div>';
          }).join('') +
        '</div>' +
        '<div class="rsc-status-cell">' + payHtml + '</div>' +
        '<div class="rsc-status-cell">' + connHtml + '</div>' +
        '<div class="rsc-status-cell"></div>' +
      '</div>' +
    '</div>';
  });

  if (ungrouped.length && groups.length) html += '<div class="rsc-hh-ungrouped-divider">Individual Cast</div>';
  ungrouped.forEach(function(item) {
    var assignId = String(item.assignment?.id || '');
    var name     = rptPersonName(item.app || {});
    var payHtml  = rscPaymentCellHtml(item, settings);
    var connHtml = rscConnectionsCellHtml(item, settings, null);
    html += '<div class="rsc-status-row" id="rpt-row-' + esc(assignId) + '">' +
      '<div class="rsc-status-cell"><div class="rsc-cast-cell">' +
        '<div class="rsc-cast-initials">' + esc(rscPersonInitials(name)) + '</div>' +
        '<div><div class="rsc-cast-name">' + esc(name) + '</div><div class="rsc-cast-email">' + esc(rptPersonEmail(item.app || {})) + '</div></div>' +
      '</div></div>' +
      '<div class="rsc-status-cell">' + payHtml + '</div>' +
      '<div class="rsc-status-cell">' + connHtml + '</div>' +
      '<div class="rsc-status-cell"></div>' +
    '</div>';
  });

  if (!sorted.length) html = '<p style="color:rgba(87,46,136,0.45);font-style:italic;font-size:0.85rem">No accepted cast members yet.</p>';
  return html;
}

// ── Utility ────────────────────────────────────────────────────────
function setContent(html) { document.getElementById('pr-content').innerHTML = html; }

// ── Boot ───────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', prInit);
