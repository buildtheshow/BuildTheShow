<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal | Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v48-20260617" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: var(--bts-font, 'Inter', sans-serif); color: #1a1530; }

    /* ── Login overlay ─────────────────────────────────────────────── */
    .pr-login-overlay { position: fixed; inset: 0; background: #572e88; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .pr-login-box { background: #fff; border-radius: 18px; padding: 2.5rem 2rem; width: min(400px, 92vw); box-shadow: 0 24px 64px rgba(26,21,48,0.28); }
    .pr-login-logo { display: block; height: 38px; margin-bottom: 1.8rem; }
    .pr-login-title { font-size: 1.35rem; font-weight: 950; color: #1a1530; margin: 0 0 0.35rem; }
    .pr-login-sub { font-size: 0.82rem; color: rgba(26,21,48,0.55); margin: 0 0 1.6rem; }
    .pr-login-field { margin-bottom: 1rem; }
    .pr-login-field label { display: block; font-size: 0.75rem; font-weight: 800; color: rgba(26,21,48,0.6); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .pr-login-field input { width: 100%; border: 1.5px solid rgba(87,46,136,0.22); border-radius: 8px; padding: 0.65rem 0.85rem; font-size: 0.9rem; font-family: var(--bts-font, 'Inter', sans-serif); color: #1a1530; outline: none; }
    .pr-login-field input:focus { border-color: #572e88; }
    .pr-login-btn { width: 100%; background: #572e88; color: #fff; border: none; border-radius: 8px; padding: 0.8rem; font-size: 0.9rem; font-weight: 950; cursor: pointer; margin-top: 0.5rem; font-family: var(--bts-font, 'Inter', sans-serif); }
    .pr-login-btn:hover { filter: brightness(1.1); }
    .pr-login-error { font-size: 0.78rem; color: #d1523d; font-weight: 700; margin-top: 0.75rem; min-height: 1em; }

    /* ── Shell layout: sidebar + iframe ────────────────────────────── */
    .pr-shell { display: flex; height: 100vh; overflow: hidden; }
    /* Override production-sidebar.css which sets position:fixed — must stay in flex flow */
    .pr-sidebar-wrap { position: relative !important; width: 220px; flex-shrink: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
    .pr-frame-wrap { flex: 1; height: 100vh; overflow: hidden; position: relative; }
    #portal-frame { width: 100%; height: 100%; border: none; display: block; background: #f5f4f8; }

    /* ── Sidebar footer links ──────────────────────────────────────── */
    .pr-sidebar-standard-links { border-top: 1px solid rgba(255,255,255,0.1); }
    .pr-sidebar-standard-link { min-height: 52px; width: 100%; display: flex; align-items: center; gap: 0.72rem; padding: 0.85rem 1.25rem; border: 0; border-bottom: 1px solid rgba(255,255,255,0.1); background: transparent; color: rgba(255,255,255,0.78); text-decoration: none; font-family: var(--bts-font,'Inter',sans-serif); font-size: 0.84rem; font-weight: 850; line-height: 1.15; text-align: left; cursor: pointer; }
    .pr-sidebar-standard-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .pr-sidebar-standard-link img { width: 20px; height: 20px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.78; flex-shrink: 0; }
    .pr-sidebar-footer { padding: 1rem 1rem 1.05rem; }
    .pr-sidebar-org-logo { min-height: 34px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.76rem; font-weight: 950; letter-spacing: 0.08em; line-height: 1.15; text-align: center; text-transform: uppercase; }
    .pr-sidebar-org-logo img { display: block; max-width: 150px; max-height: 54px; object-fit: contain; }
    .pr-sidebar-forget { display: block; width: 100%; margin-top: 1.05rem; padding: 0; border: 0; background: transparent; color: rgba(255,255,255,0.48); font: inherit; font-size: 0.72rem; font-weight: 800; line-height: 1.3; text-align: left; text-decoration: underline; cursor: pointer; }
    .pr-sidebar-forget:hover { color: rgba(255,255,255,0.75); }
  </style>
</head>
<body>

<!-- Login overlay -->
<div class="pr-login-overlay" id="pr-login-overlay">
  <div class="pr-login-box">
    <img src="/ASSETS/Images/LogoBrand/logo-long-black.png" alt="Build The Show" class="pr-login-logo" />
    <div class="pr-login-title">Production Portal</div>
    <div class="pr-login-sub">Enter your email and access code to continue.</div>
    <div class="pr-login-field">
      <label>Email</label>
      <input type="email" id="pr-login-email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="pr-login-field">
      <label>Access Code</label>
      <input type="text" id="pr-login-code" placeholder="6-digit code" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
    </div>
    <button class="pr-login-btn" onclick="prLogin()">Sign In</button>
    <div class="pr-login-error" id="pr-login-error"></div>
  </div>
</div>

<!-- Portal shell: sidebar + iframe -->
<div class="pr-shell" id="pr-shell" style="display:none">

  <!-- Sidebar -->
  <div class="pr-sidebar-wrap prod-sidebar" id="prod-sidebar">
    <div class="sidebar-top">
      <img src="/ASSETS/Images/LogoBrand/logo-long-white.png" alt="Build The Show" class="sidebar-logo-img" />
    </div>
    <div class="sidebar-poster hidden" id="pr-sidebar-poster"></div>
    <div class="sidebar-prod">
      <div class="sidebar-prod-title" id="pr-sidebar-title">Loading...</div>
      <div class="sidebar-prod-sub" id="pr-sidebar-sub"></div>
    </div>
    <nav class="prod-tabs" id="pr-nav"></nav>
    <div class="pr-sidebar-standard-links">
      <a class="pr-sidebar-standard-link" id="pr-volunteer-link" href="#" target="_blank" rel="noopener">
        <img src="/ASSETS/Images/Icons/Volunteers.svg?v=20260617" alt="" aria-hidden="true" />
        <span>Volunteer Opportunities</span>
      </a>
    </div>
    <div class="pr-sidebar-footer">
      <div class="pr-sidebar-org-logo" id="pr-sidebar-org-logo">Build The Show</div>
      <button class="pr-sidebar-forget" type="button" onclick="prForgetDevice()">Not you? Forget this device.</button>
    </div>
  </div>

  <!-- Content iframe -->
  <div class="pr-frame-wrap">
    <iframe id="portal-frame" src="about:blank" title="Portal content"></iframe>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';

const SUPA_URL = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── Role → module keys (sidebar order) ────────────────────────────
const ROLE_MODULES = {
  'Treasurer': [
    'fin-dashboard',
    'budgeting',
    'budget-receipts',
    'fin-reports',
    'fin-settlements',
    'reg-status',    // Registration > Status
  ],
};

// ── Module key → page + label + group (+ optional subgroup) ────────
// group    = top-level sidebar section (matches internal nav group names)
// subgroup = second-level collapsible menu inside that group (optional)
const MODULE_CONFIG = {
  // Financials
  'fin-dashboard':   { label: 'Dashboard',              group: 'Financials',  page: 'financials-dashboard.html' },
  'budgeting':       { label: 'Budgeting',              group: 'Financials',  page: 'budgeting.html' },
  'budget-receipts': { label: 'Receipts',               group: 'Financials',  page: 'budget-receipts.html' },
  'fin-reports':     { label: 'Reports',                group: 'Financials',  page: 'financials-reports.html' },
  'fin-settlements': { label: 'Settlements',            group: 'Financials',  page: 'financials-settlements.html' },
  // Cast > Registration
  'reg-dashboard':   { label: 'Dashboard',              group: 'Cast', subgroup: 'Registration', page: 'registration-dashboard.html' },
  'reg-status':      { label: 'Status',                 group: 'Cast', subgroup: 'Registration', page: 'registration-status.html' },
  // Future: Cast > Casting
  'cast-board':      { label: 'Casting Board',          group: 'Cast', subgroup: 'Casting',      page: 'casting-board.html' },
  'cast-list':       { label: 'Cast List',              group: 'Cast', subgroup: 'Casting',      page: 'casting-castlist.html' },
  // Plan
  'schedule':        { label: 'Production Schedule',    group: 'Plan',        page: 'plan-calendar.html' },
  'team':            { label: 'Team Contacts',          group: 'Plan',        page: 'plan-team.html' },
  // Volunteers
  'shifts':          { label: 'My Shifts',              group: 'Volunteers',  page: 'volunteers.html' },
  'hours':           { label: 'Hours Log',              group: 'Volunteers',  page: 'volunteers.html' },
  // Overview
  'org-dashboard':   { label: 'Organisation Dashboard', group: 'Overview',    page: 'production-overview.html' },
};

// Top-level group order and icons — names match internal nav groups
const GROUP_ORDER = ['Overview', 'Plan', 'Cast', 'Financials', 'Volunteers'];
const GROUP_ICONS = {
  'Overview':   'navoverview.svg',
  'Plan':       'navproductioncalendar.svg',
  'Cast':       'Star.svg',
  'Financials': 'Budgeting-total-spent-cad-usd.svg',
  'Volunteers': 'page-volunteers.svg',
};

// ── State ──────────────────────────────────────────────────────────
let _prodId = '';
let _prod = null;
let _org = null;
let _role = '';
let _modules = [];
let _previewPerson = null;

function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

// ── Passcode hash ──────────────────────────────────────────────────
function portalPasscode(email, productionId) {
  const str = (email || '').toLowerCase().trim() + (productionId || '');
  let h = 0;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return String(Math.abs(h) % 900000 + 100000);
}

// ── Auth ───────────────────────────────────────────────────────────
async function prLogin() {
  const email = document.getElementById('pr-login-email')?.value?.trim().toLowerCase() || '';
  const code  = document.getElementById('pr-login-code')?.value?.trim() || '';
  const errEl = document.getElementById('pr-login-error');
  if (!email || !code) { errEl.textContent = 'Enter your email and access code.'; return; }
  errEl.textContent = 'Checking...';

  const parts = window.location.pathname.replace(/\/+$/, '').split('/').filter(Boolean);
  const orgAbbrev = parts[0] || '';
  const showSlug  = parts[1] || '';

  try {
    const { data: prodData, error: prodErr } = await sb.rpc('resolve_team_portal', {
      p_org_abbrev: orgAbbrev,
      p_show_slug:  showSlug,
    });
    if (prodErr || !prodData) { errEl.textContent = 'Production not found. Check your link.'; return; }
    _prodId = prodData;

    const { data: vol, error: volErr } = await sb
      .from('volunteer_signups')
      .select('id,name,email,role_name,production_id,volunteer_passcode')
      .eq('production_id', _prodId)
      .eq('email', email)
      .in('status', ['approved','checked_in','completed'])
      .maybeSingle();

    const roleName = vol?.role_name || '';
    const modules  = ROLE_MODULES[roleName];
    if (!modules || !modules.length) {
      errEl.textContent = 'Your role does not have portal access. Contact your production team.';
      return;
    }

    const expectedCode = String(vol?.volunteer_passcode || '').trim() || portalPasscode(email, _prodId);
    if (volErr || !vol || expectedCode !== code) {
      errEl.textContent = 'That email and code did not match. Contact your production team.';
      return;
    }

    _role    = roleName;
    _modules = modules;
    sessionStorage.setItem('bts_portal_session', JSON.stringify({ email, code, prodId: _prodId, role: _role }));
    bootPortal();
  } catch (e) {
    errEl.textContent = 'Something went wrong. Try again.';
    console.error('[Portal] login error', e);
  }
}

async function prInit() {
  const params   = new URLSearchParams(window.location.search);
  const pvwToken = params.get('pvw_token');
  const pvwEmail = params.get('pvw_email');
  const pvwCode  = params.get('pvw_code');
  if (pvwToken) document.body.classList.add('pr-preview-mode');

  if (pvwToken) {
    const key = 'bts_portal_preview:' + pvwToken;
    let preview = null;
    try { preview = JSON.parse(sessionStorage.getItem(key) || localStorage.getItem(key) || 'null'); } catch (_) {}
    if (preview?.prodId && Date.now() - Number(preview.createdAt || 0) < 10 * 60 * 1000) {
      const KIND_TO_ROLE = { 'treasurer': 'Treasurer', 'dept_lead': 'Dept Lead', 'volunteer': 'Volunteer', 'cast': 'Cast', 'team': 'Team', 'producer': 'Producer', 'board': 'Board' };
      _prodId        = preview.prodId;
      _role          = preview.role || KIND_TO_ROLE[preview.kind] || '';
      _modules       = ROLE_MODULES[_role] || [];
      _previewPerson = preview.person || null;
      try { sessionStorage.removeItem(key); } catch (_) {}
      try { localStorage.removeItem(key); } catch (_) {}
      await bootPortal();
      return;
    }
  }

  if (pvwEmail && pvwCode) {
    document.getElementById('pr-login-email').value = pvwEmail;
    document.getElementById('pr-login-code').value  = pvwCode;
    await prLogin();
    return;
  }

  const saved = sessionStorage.getItem('bts_portal_session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (s.email && s.code && s.prodId) {
        _prodId  = s.prodId;
        _role    = s.role || '';
        _modules = ROLE_MODULES[_role] || [];
        document.getElementById('pr-login-email').value = s.email;
        document.getElementById('pr-login-code').value  = s.code;
        await prLogin();
        return;
      }
    } catch (_) {}
  }
}

async function bootPortal() {
  const { data, error } = await sb
    .from('productions')
    .select('*,organizations(id,name,email,logo_url,logo_white_url,slug)')
    .eq('id', _prodId)
    .single();
  if (error || !data) { document.getElementById('pr-login-error').textContent = 'Could not load production.'; return; }
  _prod = data;
  _org  = data.organizations || null;
  renderPortalBranding();
  buildSidebar(_modules);
  document.getElementById('pr-login-overlay').style.display = 'none';
  document.getElementById('pr-shell').style.display = '';
  if (_modules.length) prNav(_modules[0]);
}

// ── Branding ───────────────────────────────────────────────────────
function renderPortalBranding() {
  const posterEl = document.getElementById('pr-sidebar-poster');
  if (posterEl) {
    if (_prod?.poster_url) {
      posterEl.innerHTML = '<img src="' + esc(_prod.poster_url) + '" alt="' + esc(_prod.title || 'Production') + ' poster" />';
      posterEl.classList.remove('hidden');
    } else {
      posterEl.innerHTML = '';
      posterEl.classList.add('hidden');
    }
  }
  const titleEl = document.getElementById('pr-sidebar-title');
  if (titleEl) titleEl.textContent = _prod?.title || 'Production';
  const subEl = document.getElementById('pr-sidebar-sub');
  if (subEl) subEl.textContent = 'Welcome back, ' + prFirstName() + '.';
  const orgLogoEl = document.getElementById('pr-sidebar-org-logo');
  if (orgLogoEl) {
    const logoUrl = _org?.logo_white_url || _org?.logo_url || '';
    orgLogoEl.innerHTML = logoUrl
      ? '<img src="' + esc(logoUrl) + '" alt="' + esc(_org?.name || 'Organisation') + ' logo" />'
      : esc(_org?.name || 'Build The Show');
  }
  const volLink = document.getElementById('pr-volunteer-link');
  if (volLink) volLink.href = prVolunteerUrl();
}

function prFirstName() {
  const raw = _previewPerson?.name
    || document.getElementById('pr-login-email')?.value
    || _previewPerson?.email
    || 'there';
  const clean = String(raw).trim();
  if (!clean || clean.includes('@')) return 'there';
  return clean.split(/\s+/)[0] || 'there';
}

function prVolunteerUrl() {
  const orgSlug  = _org?.slug || '';
  const showSlug = _prod?.slug || '';
  if (orgSlug && showSlug) return '/' + encodeURIComponent(orgSlug) + '/' + encodeURIComponent(showSlug) + '/volunteers';
  const url = new URL('/volunteers', window.location.origin);
  if (_prodId) url.searchParams.set('prod', _prodId);
  return url.pathname + url.search;
}

function prForgetDevice() {
  try { sessionStorage.removeItem('bts_portal_session'); } catch (_) {}
  window.location.reload();
}

// ── Sidebar builder ────────────────────────────────────────────────
// Builds a 3-level nav: group > subgroup (optional) > item
function buildSidebar(modules) {
  // Build structure: { groupName: { _direct: [keys], subgroupName: [keys] } }
  const tree = {};
  modules.forEach(function(key) {
    const cfg = MODULE_CONFIG[key];
    if (!cfg) return;
    if (!tree[cfg.group]) tree[cfg.group] = { _direct: [] };
    if (cfg.subgroup) {
      if (!tree[cfg.group][cfg.subgroup]) tree[cfg.group][cfg.subgroup] = [];
      tree[cfg.group][cfg.subgroup].push(key);
    } else {
      tree[cfg.group]._direct.push(key);
    }
  });

  const nav = document.getElementById('pr-nav');
  if (!nav) return;

  const groups = GROUP_ORDER.filter(function(g) { return tree[g]; });
  nav.innerHTML = groups.map(function(groupName) {
    const groupData = tree[groupName];
    const groupId   = 'pr-group-' + groupName.replace(/[^a-z0-9]/gi, '-').toLowerCase();
    const iconFile  = GROUP_ICONS[groupName] || 'Overview.svg';

    // Direct items (no subgroup)
    const directHtml = groupData._direct.map(function(key) {
      const cfg = MODULE_CONFIG[key];
      return '<div class="prod-tab prod-sub-item" id="prnav-' + key + '" onclick="prNav(\'' + key + '\')">' + esc(cfg.label) + '</div>';
    }).join('');

    // Subgroups
    const subgroupNames = Object.keys(groupData).filter(function(k) { return k !== '_direct'; });
    const subgroupHtml = subgroupNames.map(function(sgName) {
      const sgId = groupId + '-sg-' + sgName.replace(/[^a-z0-9]/gi, '-').toLowerCase();
      const itemsHtml = groupData[sgName].map(function(key) {
        const cfg = MODULE_CONFIG[key];
        return '<div class="prod-sub-item" id="prnav-' + key + '" onclick="prNav(\'' + key + '\')">' + esc(cfg.label) + '</div>';
      }).join('');
      return '<div class="prod-tab-submenu-wrap" id="' + sgId + '">' +
        '<div class="prod-tab" onclick="prToggleSubgroup(\'' + sgId + '\')" style="cursor:pointer">' +
          esc(sgName) +
          '<span class="tab-chevron" aria-hidden="true">&#9660;</span>' +
        '</div>' +
        '<div class="prod-submenu" id="' + sgId + '-items">' + itemsHtml + '</div>' +
      '</div>';
    }).join('');

    return '<div class="sidebar-group open" id="' + groupId + '" style="--group-color:#572e88">' +
      '<div class="sidebar-group-header" onclick="prToggleGroup(\'' + groupId + '\')" role="button" tabindex="0" aria-expanded="true">' +
        '<span class="sidebar-group-label">' +
          '<span class="tab-icon-slot"><img src="/ASSETS/Images/Icons/' + iconFile + '?v=20260617" class="tab-icon" alt="" aria-hidden="true" /></span>' +
          esc(groupName) +
        '</span>' +
        '<span class="sidebar-group-chevron">&#9660;</span>' +
      '</div>' +
      '<div class="sidebar-group-items" id="' + groupId + '-items" style="display:flex;flex-direction:column">' +
        directHtml + subgroupHtml +
      '</div>' +
    '</div>';
  }).join('');

  // Open any subgroup that has an active item
  subgroupsOpenByDefault();
}

function subgroupsOpenByDefault() {
  document.querySelectorAll('.prod-submenu').forEach(function(el) {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
  });
}

function prToggleGroup(groupId) {
  const wrap  = document.getElementById(groupId);
  const items = document.getElementById(groupId + '-items');
  if (!wrap || !items) return;
  const open = wrap.classList.toggle('open');
  items.style.display = open ? 'flex' : 'none';
  items.style.flexDirection = 'column';
  const trigger = wrap.querySelector('.sidebar-group-header');
  if (trigger) trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
}

function prToggleSubgroup(sgId) {
  const items = document.getElementById(sgId + '-items');
  const wrap  = document.getElementById(sgId);
  if (!items) return;
  const open = items.style.display === 'none';
  items.style.display = open ? 'flex' : 'none';
  if (open) items.style.flexDirection = 'column';
  const chevron = wrap?.querySelector('.tab-chevron');
  if (chevron) chevron.style.transform = open ? '' : 'rotate(-90deg)';
}

// ── Navigation: load the real page in the iframe ───────────────────
function prNav(key) {
  document.querySelectorAll('.prod-tab, .prod-sub-item, .pr-sidebar-standard-link').forEach(function(el) { el.classList.remove('active'); });
  const active = document.getElementById('prnav-' + key);
  if (active) active.classList.add('active');

  if (!_modules.includes(key)) return;

  const cfg = MODULE_CONFIG[key];
  if (!cfg?.page) return;

  const frame = document.getElementById('portal-frame');
  if (frame) frame.src = cfg.page + '?id=' + encodeURIComponent(_prodId) + '&portal=1';
}

// ── Boot ───────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', prInit);
</script>
</body>
</html>
