<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production Files - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v51-20260704" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem 2.25rem 3rem;
      max-width: calc(100vw - 220px);
      overflow-x: clip;
      position: relative;
      z-index: 0;
    }
    .prod-main::before {
      content: '';
      position: fixed;
      inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.04;
      pointer-events: none;
      z-index: -1;
    }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    .files-shell {
      display: grid;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .files-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.15rem;
      border-radius: 20px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(87,46,136,0.1);
      box-shadow: 0 18px 45px rgba(61, 29, 104, 0.08);
      backdrop-filter: blur(12px);
    }
    .files-summary-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      color: #472674;
    }
    .files-summary-copy {
      margin: 0.25rem 0 0;
      color: rgba(71,38,116,0.74);
      font-size: 0.92rem;
    }
    .files-status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.7rem 0.95rem;
      border-radius: 999px;
      background: rgba(87,46,136,0.08);
      color: #472674;
      font-size: 0.86rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .files-status-pill::before {
      content: '';
      width: 0.6rem;
      height: 0.6rem;
      border-radius: 50%;
      background: #f0aa31;
      box-shadow: 0 0 0 4px rgba(240,170,49,0.16);
    }
    .files-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.35rem;
    }
    .file-slot {
      position: relative;
      display: grid;
      gap: 1rem;
      padding: 1.35rem;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,244,255,0.94));
      border: 1px solid rgba(87,46,136,0.14);
      box-shadow: 0 24px 55px rgba(61, 29, 104, 0.1);
      overflow: hidden;
    }
    .file-slot::after {
      content: '';
      position: absolute;
      inset: auto -30px -55px auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.16), rgba(124,58,237,0));
      pointer-events: none;
    }
    .file-slot-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.9rem;
    }
    .file-slot-icon {
      width: 3rem;
      height: 3rem;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(87,46,136,0.1);
      color: #572e88;
      font-size: 1.25rem;
      font-weight: 800;
      flex-shrink: 0;
    }
    .file-slot-label {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.32rem 0.62rem;
      border-radius: 999px;
      background: rgba(87,46,136,0.08);
      color: #6b42a1;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .file-slot-title {
      margin: 0.8rem 0 0.35rem;
      font-size: 1.28rem;
      line-height: 1.05;
      color: #2d1748;
    }
    .file-slot-copy {
      margin: 0;
      color: rgba(45,23,72,0.72);
      font-size: 0.94rem;
      line-height: 1.45;
    }
    .file-slot-body {
      display: grid;
      gap: 0.85rem;
      min-height: 11.75rem;
    }
    .file-current {
      position: relative;
      padding: 1rem;
      border-radius: 18px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(87,46,136,0.12);
      display: grid;
      gap: 0.6rem;
    }
    .file-current.empty {
      border-style: dashed;
      background: rgba(255,255,255,0.58);
    }
    .file-current-title {
      margin: 0;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(71,38,116,0.65);
    }
    .file-current-name {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      color: #311751;
      word-break: break-word;
    }
    .file-current-meta {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      color: rgba(49,23,81,0.68);
      font-size: 0.82rem;
    }
    .file-current-note {
      margin: 0;
      color: rgba(49,23,81,0.66);
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .file-slot-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
    }
    .file-action-btn,
    .file-action-link {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 0.78rem 1rem;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease, color 120ms ease, opacity 120ms ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
    }
    .file-action-btn:hover,
    .file-action-link:hover {
      transform: translateY(-1px);
    }
    .file-action-btn.primary {
      background: linear-gradient(135deg, #5d2d91, #7a45b3);
      color: #fff;
      box-shadow: 0 16px 30px rgba(93,45,145,0.24);
    }
    .file-action-btn.secondary,
    .file-action-link.secondary {
      background: rgba(87,46,136,0.09);
      color: #51297f;
    }
    .file-action-btn.ghost {
      background: transparent;
      color: #8a5ab8;
      border: 1px solid rgba(138,90,184,0.2);
    }
    .file-action-btn:disabled {
      cursor: wait;
      opacity: 0.65;
      transform: none;
      box-shadow: none;
    }
    .file-hidden-input {
      display: none;
    }
    .files-footer {
      display: grid;
      gap: 1rem;
      padding: 1.25rem 1.35rem;
      border-radius: 22px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(87,46,136,0.1);
      box-shadow: 0 18px 45px rgba(61, 29, 104, 0.08);
    }
    .files-footer h2 {
      margin: 0;
      color: #472674;
      font-size: 1.05rem;
    }
    .files-footer p {
      margin: 0.3rem 0 0;
      color: rgba(71,38,116,0.72);
      font-size: 0.92rem;
      line-height: 1.45;
    }
    .files-tips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.85rem;
    }
    .files-tip {
      padding: 0.95rem 1rem;
      border-radius: 18px;
      background: rgba(87,46,136,0.05);
      border: 1px solid rgba(87,46,136,0.08);
    }
    .files-tip strong {
      display: block;
      color: #3c1f64;
      font-size: 0.88rem;
      margin-bottom: 0.3rem;
    }
    .files-tip span {
      display: block;
      color: rgba(60,31,100,0.72);
      font-size: 0.84rem;
      line-height: 1.4;
    }
    .files-banner {
      display: none;
      padding: 0.95rem 1rem;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.45;
      border: 1px solid transparent;
    }
    .files-banner.show { display: block; }
    .files-banner.info {
      background: rgba(87,46,136,0.08);
      color: #4b2679;
      border-color: rgba(87,46,136,0.13);
    }
    .files-banner.error {
      background: rgba(165,44,44,0.08);
      color: #8b1f1f;
      border-color: rgba(165,44,44,0.16);
    }
    .page-loading,
    .page-error {
      padding: 1.3rem 1.4rem;
      border-radius: 20px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(87,46,136,0.1);
      box-shadow: 0 16px 35px rgba(61, 29, 104, 0.08);
      color: #472674;
    }
    .page-error {
      border-color: rgba(165,44,44,0.16);
      color: #7b1f1f;
    }
    @media (max-width: 1180px) {
      .files-grid,
      .files-tips {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
      .files-summary { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">
      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Plan</span></span>
            </div>
            <h1 class="aud-visual-title">Files</h1>
            <p class="aud-visual-copy">The director's script and piano/vocal score, in one place for your team.</p>
          </div>
        </div>
      </div>

      <div class="files-shell">
        <div id="files-banner" class="files-banner info" role="status" aria-live="polite"></div>
        <div id="files-page-state" class="page-loading">Loading production files…</div>
        <div id="files-app" hidden></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=70-20260705"></script>
  <script>
    window.initProductionPage('plan');
  </script>
  <script>
    (function () {
      'use strict';

      const PLAN_FOLDER_NAME = 'Plan Files';
      const PLAN_FOLDER_COLOR = '#6f4aa6';
      const FILE_BUCKET = 'production-files';
      const PRODUCTION_QUERY = 'id,title,organization_id';
      const SLOT_DEFS = [
        {
          key: 'directors-script',
          label: 'Directors Script',
          badge: 'Creative Copy',
          icon: 'DS',
          description: 'Keep the annotated director version here so the team always knows which working copy is current.',
        },
        {
          key: 'piano-vocal-score',
          label: 'Piano/Vocal Score',
          badge: 'Music Copy',
          icon: 'PV',
          description: 'Store the current rehearsal score or vocal reference packet in one reliable place.',
        }
      ];

      const state = {
        sb: null,
        user: null,
        prodId: new URLSearchParams(window.location.search).get('id') || '',
        production: null,
        folder: null,
        files: [],
        busyKey: '',
        supportsDocumentType: false,
      };

      const bannerEl = document.getElementById('files-banner');
      const pageStateEl = document.getElementById('files-page-state');
      const appEl = document.getElementById('files-app');

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function showBanner(message, type = 'info', persist = false) {
        if (!bannerEl) return;
        bannerEl.textContent = message || '';
        bannerEl.className = `files-banner ${type} show`;
        if (!persist) {
          window.clearTimeout(showBanner._timer);
          showBanner._timer = window.setTimeout(() => {
            bannerEl.className = 'files-banner info';
            bannerEl.textContent = '';
          }, 4200);
        }
      }

      function setPageState(message, isError = false) {
        if (!pageStateEl) return;
        pageStateEl.textContent = message || '';
        pageStateEl.className = isError ? 'page-error' : 'page-loading';
        pageStateEl.hidden = false;
        appEl.hidden = true;
      }

      function clearPageState() {
        if (pageStateEl) pageStateEl.hidden = true;
        appEl.hidden = false;
      }

      function slotFiles(slotKey) {
        return state.files
          .filter(file => (
            String(file?.document_type || '').trim() === slotKey
            || (Array.isArray(file.tags) && file.tags.includes(slotKey))
          ))
          .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
      }

      function currentFile(slotKey) {
        return slotFiles(slotKey)[0] || null;
      }

      function fileSizeLabel(size) {
        const bytes = Number(size || 0);
        if (!bytes || !Number.isFinite(bytes)) return '';
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1).replace(/\.0$/, '')} KB`;
        if (bytes < 1024 * 1024 * 1024) return `${(bytes / (1024 * 1024)).toFixed(1).replace(/\.0$/, '')} MB`;
        return `${(bytes / (1024 * 1024 * 1024)).toFixed(1).replace(/\.0$/, '')} GB`;
      }

      function fileDateLabel(value) {
        if (!value) return '';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '';
        return date.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
      }

      function sanitizeFileName(name) {
        return String(name || 'file')
          .trim()
          .replace(/\s+/g, '_')
          .replace(/[^a-zA-Z0-9._-]/g, '_');
      }

      function appMarkup() {
        const totalFiles = state.files.length;
        return `
          <section class="files-summary">
            <div>
              <h2 class="files-summary-title">Core production documents</h2>
              <p class="files-summary-copy">Upload the three versions your team is most likely to reach for quickly. Re-uploading replaces the current file for that slot.</p>
            </div>
            <div class="files-status-pill">${totalFiles} live file${totalFiles === 1 ? '' : 's'}</div>
          </section>
          <section class="files-grid">
            ${SLOT_DEFS.map(renderSlotCard).join('')}
          </section>
          <section class="files-footer">
            <div>
              <h2>What this page is doing</h2>
              <p>Each upload is stored in the existing production file bucket, grouped into a dedicated <strong>${escapeHtml(PLAN_FOLDER_NAME)}</strong> folder, and marked with an explicit document type so we can reliably use these files later.</p>
            </div>
            <div class="files-tips">
              <div class="files-tip">
                <strong>Best format</strong>
                <span>PDF is safest for clean viewing and printing across devices.</span>
              </div>
              <div class="files-tip">
                <strong>Replace flow</strong>
                <span>Uploading a new version removes the old one for that slot so no one grabs the wrong file.</span>
              </div>
              <div class="files-tip">
                <strong>Structured type</strong>
                <span>These uploads can carry a dedicated <code>document_type</code> value like <code>actors-script</code> instead of relying on random filenames.</span>
              </div>
            </div>
          </section>
        `;
      }

      function renderSlotCard(slot) {
        const file = currentFile(slot.key);
        const allFiles = slotFiles(slot.key);
        const hasFile = !!file;
        const busy = state.busyKey === slot.key;
        const meta = [];
        if (file?.file_type) meta.push(escapeHtml(file.file_type));
        if (file?.file_size) meta.push(escapeHtml(fileSizeLabel(file.file_size)));
        if (file?.created_at) meta.push(escapeHtml(fileDateLabel(file.created_at)));
        const previousCount = Math.max(0, allFiles.length - 1);

        return `
          <article class="file-slot">
            <div class="file-slot-head">
              <div>
                <span class="file-slot-label">${escapeHtml(slot.badge)}</span>
                <h2 class="file-slot-title">${escapeHtml(slot.label)}</h2>
                <p class="file-slot-copy">${escapeHtml(slot.description)}</p>
              </div>
              <div class="file-slot-icon" aria-hidden="true">${escapeHtml(slot.icon)}</div>
            </div>
            <div class="file-slot-body">
              <div class="file-current${hasFile ? '' : ' empty'}">
                <p class="file-current-title">${hasFile ? 'Current file' : 'Waiting for upload'}</p>
                ${hasFile
                  ? `
                    <p class="file-current-name">${escapeHtml(file.name || 'Untitled file')}</p>
                    <div class="file-current-meta">${meta.map(item => `<span>${item}</span>`).join('')}</div>
                    <p class="file-current-note">${previousCount > 0 ? `${previousCount} older upload${previousCount === 1 ? '' : 's'} hidden behind this current version.` : 'This is the active version for the team to use.'}</p>
                  `
                  : `<p class="file-current-note">No file yet. Upload a PDF, Word doc, or score file for this slot.</p>`
                }
              </div>
              <div class="file-slot-actions">
                <button type="button" class="file-action-btn primary" onclick="planFilesPick('${escapeHtml(slot.key)}')" ${busy ? 'disabled' : ''}>
                  ${busy ? 'Uploading…' : hasFile ? 'Replace File' : 'Upload File'}
                </button>
                <input class="file-hidden-input" type="file" id="file-input-${escapeHtml(slot.key)}" accept=".pdf,.doc,.docx,.rtf,.txt,.musicxml,.xml,.mxl" onchange="planFilesSelected('${escapeHtml(slot.key)}', this)" />
                ${hasFile ? `<a class="file-action-link secondary" href="${escapeHtml(file.file_url || '#')}" target="_blank" rel="noopener">Open</a>` : ''}
                ${hasFile ? `<button type="button" class="file-action-btn ghost" onclick="planFilesRemove('${escapeHtml(slot.key)}')" ${busy ? 'disabled' : ''}>Remove</button>` : ''}
              </div>
            </div>
          </article>
        `;
      }

      function render() {
        appEl.innerHTML = appMarkup();
        clearPageState();
      }

      async function initSupabase() {
        if (typeof supabase === 'undefined') throw new Error('Supabase failed to load.');
        const { createClient } = supabase;
        state.sb = createClient(
          'https://tkmaiktxpwqfbgeojbnf.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
        );
        const { data: sessionData } = await state.sb.auth.getSession();
        const session = sessionData?.session || null;
        if (!session) {
          window.location.href = '/login';
          throw new Error('Redirecting to login…');
        }
        const { data: userData, error: userError } = await state.sb.auth.getUser();
        if (userError || !userData?.user) throw userError || new Error('Could not verify your session.');
        state.user = userData.user;
      }

      async function loadProduction() {
        if (!state.prodId) throw new Error('Production ID missing from this page URL.');
        const { data: production, error } = await state.sb.from('productions').select(PRODUCTION_QUERY).eq('id', state.prodId).single();
        if (error || !production) throw error || new Error('Production not found.');
        state.production = production;

        const { data: org, error: orgError } = await state.sb
          .from('organizations')
          .select('id,admin_id')
          .eq('id', production.organization_id)
          .single();
        if (orgError || !org?.id) throw orgError || new Error('Organisation access could not be checked.');

        if (String(org.admin_id || '') === String(state.user.id || '')) return;

        const { data: membership, error: membershipError } = await state.sb
          .from('org_members')
          .select('id')
          .eq('org_id', production.organization_id)
          .eq('user_id', state.user.id)
          .limit(1)
          .maybeSingle();
        if (membershipError) throw membershipError;
        if (!membership?.id) throw new Error('You do not have access to manage files for this production.');
      }

      async function ensureFolder() {
        const { data: found, error: findError } = await state.sb
          .from('production_folders')
          .select('*')
          .eq('production_id', state.prodId)
          .ilike('name', PLAN_FOLDER_NAME)
          .limit(1);
        if (findError) throw findError;
        if (found && found[0]) {
          state.folder = found[0];
          return;
        }

        const { data: created, error: createError } = await state.sb
          .from('production_folders')
          .insert({
            production_id: state.prodId,
            name: PLAN_FOLDER_NAME,
            color: PLAN_FOLDER_COLOR,
            is_default: false,
            sort_order: 999
          })
          .select()
          .single();
        if (createError || !created) throw createError || new Error('Could not create the Plan Files folder.');
        state.folder = created;
      }

      async function detectDocumentTypeSupport() {
        const { error } = await state.sb
          .from('production_files')
          .select('document_type')
          .limit(1);
        state.supportsDocumentType = !error;
      }

      async function loadFiles() {
        const { data, error } = await state.sb
          .from('production_files')
          .select('*')
          .eq('production_id', state.prodId)
          .eq('folder_id', state.folder.id)
          .contains('tags', ['plan-files'])
          .order('created_at', { ascending: false });
        if (error) throw error;
        state.files = Array.isArray(data) ? data : [];
      }

      async function deleteFileRow(file) {
        if (!file?.id) return;
        if (file.file_path) {
          await state.sb.storage.from(FILE_BUCKET).remove([file.file_path]).catch(() => {});
        }
        const { error } = await state.sb.from('production_files').delete().eq('id', file.id);
        if (error) throw error;
      }

      async function replaceSlotFile(slotKey, file) {
        if (!file) return;
        const slot = SLOT_DEFS.find(item => item.key === slotKey);
        if (!slot) throw new Error('Unknown file slot.');
        state.busyKey = slotKey;
        render();
        try {
          const existing = slotFiles(slotKey);
          for (const row of existing) {
            await deleteFileRow(row);
          }

          const safeName = sanitizeFileName(file.name);
          const path = `${state.prodId}/${state.folder.id}/plan-files/${slotKey}/${Date.now()}_${safeName}`;
          const { error: uploadError } = await state.sb.storage.from(FILE_BUCKET).upload(path, file, {
            upsert: false,
            contentType: file.type || 'application/octet-stream'
          });
          if (uploadError) throw uploadError;

          const { data: publicUrlData } = state.sb.storage.from(FILE_BUCKET).getPublicUrl(path);
          const payload = {
            production_id: state.prodId,
            folder_id: state.folder.id,
            name: file.name,
            file_url: publicUrlData?.publicUrl || '',
            file_path: path,
            file_type: file.type || null,
            file_size: file.size || null,
            tags: ['plan-files', slotKey, slot.label]
          };
          if (state.supportsDocumentType) payload.document_type = slot.key;
          const { data: saved, error: saveError } = await state.sb.from('production_files').insert(payload).select().single();
          if (saveError || !saved) throw saveError || new Error('The uploaded file could not be saved.');
          await loadFiles();
          showBanner(`${slot.label} uploaded.`, 'info');
        } finally {
          state.busyKey = '';
          render();
        }
      }

      async function removeSlotFiles(slotKey) {
        const slot = SLOT_DEFS.find(item => item.key === slotKey);
        const files = slotFiles(slotKey);
        if (!slot || !files.length) return;
        if (!window.confirm(`Remove the current ${slot.label}? This will delete it from storage.`)) return;
        state.busyKey = slotKey;
        render();
        try {
          for (const row of files) {
            await deleteFileRow(row);
          }
          await loadFiles();
          showBanner(`${slot.label} removed.`, 'info');
        } catch (error) {
          console.error('[BTS] remove plan file failed', error);
          showBanner(error.message || 'Could not remove that file.', 'error', true);
        } finally {
          state.busyKey = '';
          render();
        }
      }

      window.planFilesPick = function (slotKey) {
        const input = document.getElementById(`file-input-${slotKey}`);
        if (input) input.click();
      };

      window.planFilesSelected = async function (slotKey, input) {
        const file = input?.files?.[0] || null;
        if (input) input.value = '';
        if (!file) return;
        try {
          await replaceSlotFile(slotKey, file);
        } catch (error) {
          console.error('[BTS] upload plan file failed', error);
          state.busyKey = '';
          render();
          showBanner(error.message || 'Could not upload that file.', 'error', true);
        }
      };

      window.planFilesRemove = function (slotKey) {
        removeSlotFiles(slotKey);
      };

      async function boot() {
        try {
          await initSupabase();
          setPageState('Checking production access…');
          await loadProduction();
          setPageState('Preparing file slots…');
          await ensureFolder();
          await detectDocumentTypeSupport();
          await loadFiles();
          render();
        } catch (error) {
          if (String(error?.message || '').startsWith('Redirecting to login')) return;
          console.error('[BTS] plan files boot failed', error);
          setPageState(error.message || 'Could not load the production files page.', true);
        }
      }

      boot();
    }());
  </script>
</body>
</html>
