<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audition Schedule - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v48-20260617" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    .page-kicker { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,21,48,0.38); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .page-kicker-dot { width: 6px; height: 6px; border-radius: 50%; background: #572e88; flex-shrink: 0; }
    .page-title { font-size: 2rem; font-weight: 950; color: #1a1530; margin: 0 0 1.5rem; }

    .sched-layout { display: grid; grid-template-columns: 220px 1fr; gap: 1.5rem; align-items: start; }
    @media (max-width: 780px) { .sched-layout { grid-template-columns: 1fr; } }

    .sched-sidebar { display: flex; flex-direction: column; gap: 0.35rem; }
    .sched-session-btn { display: flex; align-items: center; gap: 0.65rem; padding: 0.7rem 0.85rem; border-radius: 8px; border: none; background: none; cursor: pointer; font-family: var(--bts-font); text-align: left; width: 100%; transition: background 0.12s; }
    .sched-session-btn:hover { background: rgba(87,46,136,0.06); }
    .sched-session-btn.active { background: rgba(87,46,136,0.1); }
    .sched-session-marker { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .sched-session-name { font-size: 0.82rem; font-weight: 800; color: #1a1530; line-height: 1.2; }
    .sched-session-date { font-size: 0.72rem; color: rgba(26,21,48,0.5); margin-top: 0.1rem; }

    .sched-main { min-width: 0; }
    .sched-head { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .sched-head-name { font-size: 1.2rem; font-weight: 950; }
    .sched-head-date { font-size: 0.82rem; color: rgba(26,21,48,0.5); font-weight: 700; }
    .sched-head-actions { margin-left: auto; display: flex; gap: 0.5rem; }
    .sched-action-btn { font-size: 0.76rem; font-weight: 800; border-radius: 8px; padding: 0.4rem 0.9rem; cursor: pointer; font-family: var(--bts-font); border: 1.5px solid rgba(87,46,136,0.25); background: #fff; color: #572e88; transition: background 0.12s; }
    .sched-action-btn:hover { background: #f0ecfc; }
    .sched-action-btn.primary { background: #572e88; color: #fff; border-color: #572e88; }
    .sched-action-btn.primary:hover { background: #3d1f66; }

    .sched-slots { display: flex; flex-direction: column; gap: 0.35rem; }
    .sched-slot { display: grid; grid-template-columns: 70px 1fr auto; align-items: center; gap: 0.75rem; padding: 0.7rem 1rem; border-radius: 8px; border: 1px solid rgba(87,46,136,0.1); background: #fff; }
    .sched-slot.booked { background: rgba(87,46,136,0.04); }
    .sched-slot-time { font-size: 0.78rem; font-weight: 900; color: #572e88; }
    .sched-slot-name { font-size: 0.85rem; font-weight: 700; }
    .sched-slot-meta { font-size: 0.72rem; color: rgba(26,21,48,0.45); margin-top: 0.1rem; }
    .sched-slot-avail { font-size: 0.7rem; font-weight: 800; color: rgba(26,21,48,0.3); }
    .sched-slot-badge { font-size: 0.68rem; font-weight: 850; border-radius: 100px; padding: 0.18rem 0.5rem; background: #e5f0e7; color: #2e6639; }

    .sched-empty { text-align: center; padding: 3rem 1rem; color: rgba(26,21,48,0.38); font-size: 0.88rem; }
    .sched-loading { color: rgba(26,21,48,0.38); font-size: 0.88rem; padding: 1rem 0; }
    .sched-no-sessions { padding: 2rem; text-align: center; color: rgba(26,21,48,0.4); font-size: 0.88rem; }
    .sched-no-sessions a { color: #572e88; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>
  <div class="prod-main">
    <div class="prod-main-inner">
      <div class="page-kicker"><span class="page-kicker-dot"></span>AUDITIONS</div>
      <h1 class="page-title">Audition Schedule</h1>
      <div id="sched-root"><div class="sched-loading">Loading...</div></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=23"></script>
  <script>
    window.initProductionPage('cast');

    const SESSION_COLORS = {
      audition: '#572e88', general: '#572e88',
      dance_call: '#78bbd4', dance: '#78bbd4',
      callback: '#efab45',
      selftape: '#ca7ea7', self_tape: '#ca7ea7',
    };
    const SESSION_LABELS = {
      audition: 'General Auditions', general: 'General Auditions',
      dance_call: 'Dance Call', dance: 'Dance Call',
      callback: 'Callback', selftape: 'Self Tape', self_tape: 'Self Tape',
    };
    function sessionColor(type) { return SESSION_COLORS[String(type||'').toLowerCase()] || '#572e88'; }
    function sessionLabel(s) { return s.name || SESSION_LABELS[String(s.type||'').toLowerCase()] || 'Audition'; }

    function fmtDate(d) {
      if (!d) return 'Date TBD';
      return new Date(d + 'T00:00:00').toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    function fmtDateShort(d) {
      if (!d) return 'TBD';
      return new Date(d + 'T00:00:00').toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
    }
    function fmtTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
    }
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    let _sessions = [];
    let _slots    = [];
    let _apps     = [];
    let _activeId = null;
    let _sb       = null;

    async function init() {
      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      const prodId  = new URLSearchParams(location.search).get('id') || '';
      if (!prodId) return;
      _sb = supabase.createClient(SB_URL, SB_ANON);

      const [sessRes, appRes] = await Promise.all([
        _sb.from('audition_sessions').select('id,name,type,date,start_time,end_time,location').eq('production_id', prodId).order('sort_order').order('date'),
        _sb.from('audition_applications').select('id,name,pronouns,email,slot_id,slot_assignments,session_id').eq('production_id', prodId),
      ]);

      _sessions = sessRes.data || [];
      _apps     = appRes.data || [];

      if (!_sessions.length) {
        document.getElementById('sched-root').innerHTML = `<div class="sched-no-sessions">No audition sessions yet. <a href="#" onclick="btsProdNav('auditions-settings.html');return false;">Set them up in Settings</a></div>`;
        return;
      }

      const urlSession = new URLSearchParams(location.search).get('session');
      _activeId = (urlSession && _sessions.find(s => s.id === urlSession)) ? urlSession : _sessions[0].id;

      await loadSlots(prodId);
      render();
    }

    async function loadSlots(prodId) {
      if (!_sessions.length) return;
      const { data } = await _sb.from('audition_time_slots').select('id,session_id,slot_time,slot_date,label,is_available').in('session_id', _sessions.map(s => s.id)).order('slot_date').order('slot_time');
      _slots = data || [];
    }

    function setActive(id) {
      _activeId = id;
      render();
    }

    function render() {
      const sidebarHtml = _sessions.map(s => {
        const color = sessionColor(s.type);
        const active = s.id === _activeId ? 'active' : '';
        return `<button class="sched-session-btn ${active}" onclick="setActive('${esc(s.id)}')">
          <span class="sched-session-marker" style="background:${esc(color)};"></span>
          <span>
            <div class="sched-session-name">${esc(sessionLabel(s))}</div>
            <div class="sched-session-date">${esc(fmtDateShort(s.date))}</div>
          </span>
        </button>`;
      }).join('');

      const activeSession = _sessions.find(s => s.id === _activeId);
      const color = sessionColor(activeSession?.type);
      const sessionSlots = _slots.filter(sl => sl.session_id === _activeId);

      const appsBySlot = {};
      _apps.forEach(a => {
        if (a.slot_id) {
          if (!appsBySlot[a.slot_id]) appsBySlot[a.slot_id] = [];
          appsBySlot[a.slot_id].push(a);
        }
        if (Array.isArray(a.slot_assignments)) {
          a.slot_assignments.forEach(sa => {
            if (sa.session_id === _activeId && sa.slot_id && sa.slot_id !== a.slot_id) {
              if (!appsBySlot[sa.slot_id]) appsBySlot[sa.slot_id] = [];
              if (!appsBySlot[sa.slot_id].find(x => x.id === a.id)) appsBySlot[sa.slot_id].push(a);
            }
          });
        }
      });

      let slotsHtml = '';
      if (!sessionSlots.length) {
        slotsHtml = `<div class="sched-empty">No time slots set up for this session yet.</div>`;
      } else {
        slotsHtml = `<div class="sched-slots">${sessionSlots.map(sl => {
          const booked = appsBySlot[sl.id] || [];
          const isBooked = booked.length > 0;
          const timeStr = fmtTime(sl.slot_time);
          let inner = '';
          if (isBooked) {
            inner = booked.map(a => `<div class="sched-slot-name">${esc(a.name || 'Performer')}${a.pronouns ? ` <span style="font-weight:600;color:rgba(26,21,48,0.45);font-size:0.74rem;">(${esc(a.pronouns)})</span>` : ''}</div>`).join('');
          } else {
            inner = `<div class="sched-slot-avail">Available</div>`;
          }
          return `<div class="sched-slot${isBooked ? ' booked' : ''}">
            <div class="sched-slot-time" style="color:${esc(color)};">${esc(timeStr)}</div>
            <div>${inner}</div>
            <div>${isBooked ? `<span class="sched-slot-badge">Booked</span>` : ''}</div>
          </div>`;
        }).join('')}</div>`;
      }

      const mainHtml = activeSession ? `
        <div class="sched-main">
          <div class="sched-head">
            <div>
              <div class="sched-head-name" style="color:${esc(color)};">${esc(sessionLabel(activeSession))}</div>
              <div class="sched-head-date">${fmtDate(activeSession.date)}${activeSession.location ? ' · ' + esc(activeSession.location) : ''}</div>
            </div>
            <div class="sched-head-actions">
              <button class="sched-action-btn" onclick="btsProdNav('auditions-checkin.html?session=${esc(_activeId)}')">Check In</button>
              <button class="sched-action-btn primary" onclick="btsProdNav('auditions-inroom.html?session=${esc(_activeId)}')">In Room</button>
            </div>
          </div>
          ${slotsHtml}
        </div>` : '';

      document.getElementById('sched-root').innerHTML = `
        <div class="sched-layout">
          <div class="sched-sidebar">${sidebarHtml}</div>
          ${mainHtml}
        </div>`;
    }

    init();
  </script>
</body>
</html>
