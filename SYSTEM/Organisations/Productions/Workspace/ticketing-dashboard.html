<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticketing at a glance - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v49-20260618" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px; flex: 1; min-height: 100vh; min-height: 100dvh;
      padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative;
    }
    .prod-main::before {
      content: ''; position: fixed; inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0;
    }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }
    .aud-floating-status-layer {
      position: fixed; top: calc(env(safe-area-inset-top, 0px) + 1rem);
      right: calc(env(safe-area-inset-right, 0px) + 1.25rem); z-index: 2200;
      max-width: min(360px, calc(100vw - 2rem)); padding: 0.52rem 0.72rem;
      border: 1px solid rgba(87,46,136,0.12); border-radius: 15px;
      background: rgba(255,255,255,0.94);
      box-shadow: 0 16px 42px rgba(87,46,136,0.14), 0 2px 0 rgba(87,46,136,0.05);
      backdrop-filter: blur(12px); pointer-events: auto;
    }

    /* ── Metric cards ── */
    .td-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-top: 1.5rem; }
    @media (max-width: 900px) { .td-metrics { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .td-metrics { grid-template-columns: 1fr; } }
    .td-metric {
      padding: 1.25rem; border-radius: 14px; color: #fff; display: flex; flex-direction: column; gap: 0.3rem;
      box-shadow: 0 4px 18px rgba(26,21,48,0.12);
    }
    .td-metric-icon { width: 28px; height: 28px; filter: brightness(0) invert(1); opacity: 0.7; }
    .td-metric-label { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.85; }
    .td-metric-value { font-size: 2rem; font-weight: 950; line-height: 1.1; }
    .td-metric-sub { font-size: 0.68rem; opacity: 0.72; font-weight: 700; }

    /* ── Recent orders ── */
    .td-section { margin-top: 2rem; }
    .td-section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .td-section-title { font-size: 1.1rem; font-weight: 950; color: #1a1530; margin: 0; }
    .td-section-link { font-size: 0.72rem; font-weight: 800; color: #572e88; text-decoration: none; cursor: pointer; }
    .td-orders-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(26,21,48,0.06); border: 1.5px solid rgba(87,46,136,0.08); }
    .td-orders-table th {
      text-align: left; font-size: 0.62rem; font-weight: 900; color: #8e82a7;
      text-transform: uppercase; letter-spacing: 0.08em; padding: 0.65rem 0.85rem;
      border-bottom: 1.5px solid #eceaf3; background: #faf9fd;
    }
    .td-orders-table td { padding: 0.7rem 0.85rem; font-size: 0.82rem; border-bottom: 1px solid #f5f3fa; }
    .td-orders-table tr:last-child td { border-bottom: none; }
    .td-order-name { font-weight: 800; color: #1a1530; }
    .td-order-email { font-size: 0.72rem; color: #8e82a7; }
    .td-badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 20px; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; }
    .td-badge--confirmed { background: rgba(118,158,123,0.15); color: #4a7a50; }
    .td-badge--pending { background: rgba(239,171,69,0.15); color: #b05a0a; }

    /* ── Performance breakdown ── */
    .td-perf-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .td-perf-row {
      display: grid; grid-template-columns: 100px 1fr auto auto; align-items: center; gap: 1rem;
      padding: 0.85rem 1rem; border: 1.5px solid rgba(87,46,136,0.08); border-radius: 10px; background: #fff;
    }
    @media (max-width: 600px) { .td-perf-row { grid-template-columns: 1fr auto; } .td-perf-row .td-perf-venue { display: none; } }
    .td-perf-date { font-size: 0.78rem; font-weight: 900; color: #572e88; }
    .td-perf-info { font-size: 0.82rem; font-weight: 800; color: #1a1530; }
    .td-perf-venue { font-size: 0.72rem; color: #8e82a7; }
    .td-perf-sold { font-size: 0.82rem; font-weight: 900; color: #1a1530; }
    .td-perf-bar { height: 4px; border-radius: 2px; background: #e8e4f0; margin-top: 0.25rem; }
    .td-perf-bar-fill { height: 100%; border-radius: 2px; background: #572e88; }

    /* ── Empty state ── */
    .td-empty { text-align: center; padding: 2.5rem 1.5rem; color: #b0a8c8; font-size: 0.88rem; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Ticketing</span></span>
            </div>
            <h1 class="aud-visual-title">Dashboard</h1>
            <p class="aud-visual-copy">Sales, events, and revenue for this production.</p>
          </div>
        </div>
      </div>

      <!-- Metric cards -->
      <div class="td-metrics" id="td-metrics">
        <div class="td-metric" style="background:#572e88;">
          <img class="td-metric-icon" src="/ASSETS/Images/Icons/Budgeting-Sponsorship.svg" alt="" />
          <span class="td-metric-label">Revenue</span>
          <span class="td-metric-value" id="td-revenue">$0</span>
          <span class="td-metric-sub" id="td-revenue-sub">No orders yet</span>
        </div>
        <div class="td-metric" style="background:#78bbd4;">
          <img class="td-metric-icon" src="/ASSETS/Images/Icons/page-tickets.svg" alt="" />
          <span class="td-metric-label">Tickets Sold</span>
          <span class="td-metric-value" id="td-tickets">0</span>
          <span class="td-metric-sub" id="td-tickets-sub">Across all performances</span>
        </div>
        <div class="td-metric" style="background:#769e7b;">
          <img class="td-metric-icon" src="/ASSETS/Images/Icons/Messages.svg" alt="" />
          <span class="td-metric-label">Orders</span>
          <span class="td-metric-value" id="td-orders">0</span>
          <span class="td-metric-sub" id="td-orders-sub">Total orders placed</span>
        </div>
        <div class="td-metric" style="background:#efab45;">
          <img class="td-metric-icon" src="/ASSETS/Images/Icons/navproductioncalendar.svg" alt="" />
          <span class="td-metric-label">Performances</span>
          <span class="td-metric-value" id="td-perfs">0</span>
          <span class="td-metric-sub" id="td-perfs-sub">Scheduled</span>
        </div>
      </div>

      <!-- Performance breakdown -->
      <div class="td-section">
        <div class="td-section-head">
          <h2 class="td-section-title">By Performance</h2>
        </div>
        <div class="td-perf-list" id="td-perf-list"></div>
      </div>

      <!-- Recent orders -->
      <div class="td-section">
        <div class="td-section-head">
          <h2 class="td-section-title">Recent Orders</h2>
          <a class="td-section-link" onclick="btsProdNav('ticketing-sales.html')">View all orders</a>
        </div>
        <div id="td-orders-wrap"></div>
      </div>

    </div>
  </div>

  <bts-audition-status-strip id="tkt-public-status-strip" class="aud-floating-status-layer" style="display:none"></bts-audition-status-strip>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Components/audition-status-strip.js"></script>
  <script src="/SHARED/Components/ticketing-status-strip.js?v=1"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=26"></script>
  <script>
    window.initProductionPage('ticketing');

    var SB_URL = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
    var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
    var sb = supabase.createClient(SB_URL, SB_KEY);
    var prodId = new URLSearchParams(location.search).get('id') || '';

    function fmtMoney(cents) { return '$' + (cents / 100).toFixed(2); }
    function fmtDate(iso) {
      var d = new Date(iso);
      return d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    function fmtTime(iso) {
      return new Date(iso).toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit', hour12: true });
    }
    function fmtDateTime(iso) {
      return new Date(iso).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
    }
    function esc(v) { return String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function loadDashboard() {
      if (!prodId) return;

      var [ordersRes, perfsRes, settingsRes] = await Promise.all([
        sb.from('ticket_orders').select('*').eq('production_id', prodId).order('created_at', { ascending: false }),
        sb.from('production_events').select('id,title,start_time,venue').eq('production_id', prodId).eq('event_type', 'performance').order('start_time'),
        sb.from('productions').select('registration_settings').eq('id', prodId).single(),
      ]);

      var orders = ordersRes.data || [];
      var perfs = perfsRes.data || [];
      var settings = (settingsRes.data && settingsRes.data.registration_settings) || {};
      var tktSettings = settings.ticketing || {};
      var defaultCap = tktSettings.default_capacity || 0;

      // Metrics
      var totalRevenue = 0;
      var totalTickets = 0;
      orders.forEach(function(o) {
        totalRevenue += o.total_cents || 0;
        (o.items || []).forEach(function(it) { totalTickets += it.quantity || 0; });
      });

      document.getElementById('td-revenue').textContent = fmtMoney(totalRevenue);
      document.getElementById('td-revenue-sub').textContent = orders.length ? orders.length + ' order' + (orders.length !== 1 ? 's' : '') : 'No orders yet';
      document.getElementById('td-tickets').textContent = totalTickets;
      document.getElementById('td-tickets-sub').textContent = 'Across ' + perfs.length + ' performance' + (perfs.length !== 1 ? 's' : '');
      document.getElementById('td-orders').textContent = orders.length;
      document.getElementById('td-perfs').textContent = perfs.length;

      // Per-performance breakdown
      var perfMap = {};
      orders.forEach(function(o) {
        var pid = o.performance_event_id;
        if (!pid) return;
        if (!perfMap[pid]) perfMap[pid] = { tickets: 0, revenue: 0 };
        (o.items || []).forEach(function(it) { perfMap[pid].tickets += it.quantity || 0; });
        perfMap[pid].revenue += o.total_cents || 0;
      });

      if (perfs.length) {
        document.getElementById('td-perf-list').innerHTML = perfs.map(function(p) {
          var stats = perfMap[p.id] || { tickets: 0, revenue: 0 };
          var pct = defaultCap > 0 ? Math.min(100, Math.round(stats.tickets / defaultCap * 100)) : 0;
          var capText = defaultCap > 0 ? stats.tickets + ' / ' + defaultCap + ' sold' : stats.tickets + ' tickets sold';
          return '<div class="td-perf-row">' +
            '<div class="td-perf-date">' + fmtDate(p.start_time) + '</div>' +
            '<div><div class="td-perf-info">' + fmtTime(p.start_time) + (p.title ? ' - ' + esc(p.title) : '') + '</div>' +
            (p.venue ? '<div class="td-perf-venue">' + esc(p.venue) + '</div>' : '') + '</div>' +
            '<div class="td-perf-sold">' + capText + '</div>' +
            '<div style="min-width:80px"><div class="td-perf-bar"><div class="td-perf-bar-fill" style="width:' + pct + '%"></div></div></div>' +
            '</div>';
        }).join('');
      } else {
        document.getElementById('td-perf-list').innerHTML = '<div class="td-empty">No performances scheduled yet. Add them in the Zeus calendar.</div>';
      }

      // Recent orders (last 10)
      var recent = orders.slice(0, 10);
      if (recent.length) {
        var html = '<table class="td-orders-table"><thead><tr><th>Customer</th><th>Performance</th><th>Tickets</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody>';
        recent.forEach(function(o) {
          var perf = perfs.find(function(p) { return p.id === o.performance_event_id; });
          var perfLabel = perf ? fmtDate(perf.start_time) + ' ' + fmtTime(perf.start_time) : '-';
          var tix = 0;
          (o.items || []).forEach(function(it) { tix += it.quantity || 0; });
          var badge = o.status === 'confirmed'
            ? '<span class="td-badge td-badge--confirmed">Confirmed</span>'
            : '<span class="td-badge td-badge--pending">' + esc(o.status || 'Pending') + '</span>';
          html += '<tr>' +
            '<td><div class="td-order-name">' + esc(o.first_name + ' ' + o.last_name) + '</div><div class="td-order-email">' + esc(o.email) + '</div></td>' +
            '<td>' + perfLabel + '</td>' +
            '<td>' + tix + '</td>' +
            '<td style="font-weight:800">' + fmtMoney(o.total_cents || 0) + '</td>' +
            '<td>' + badge + '</td>' +
            '<td style="font-size:0.72rem;color:#8e82a7">' + fmtDateTime(o.created_at) + '</td>' +
            '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById('td-orders-wrap').innerHTML = html;
      } else {
        document.getElementById('td-orders-wrap').innerHTML = '<div class="td-empty">No orders yet. Share your public tickets page to start selling.</div>';
      }
    }

    loadDashboard();
  </script>
</body>
</html>
