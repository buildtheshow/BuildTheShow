  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; min-height: 100dvh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; }

    /* ── Phase timeline ── */
    .phase-timeline {
      display: grid;

      align-items: flex-start;

    .phase-stage { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; min-width: 0; }
    .phase-dot { width: 22px; height: 22px; border-radius: 50%; background: #ebe6f1; border: 2px solid #ccc4de; z-index: 1; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .phase-stage.done .phase-dot { background: #572e88; border-color: #572e88; }
    .phase-stage.done .phase-dot::after { content: ''; display: block; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px,-1px); }

    .phase-stage.active .phase-dot::after { content: ''; display: block; width: 8px; height: 8px; background: rgba(255,255,255,0.95); border-radius: 50%; }
    .phase-label { width: 100%; min-width: 0; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(87,46,136,0.5); margin-top: 0.55rem; text-align: center; line-height: 1.15; }

    .phase-stage.active .phase-label { color: #dd8233; font-weight: 800; }
    @media (max-width: 900px) {
      .phase-timeline { overflow-x: auto; grid-template-columns: repeat(6, minmax(96px, 1fr)); }
    }

    /* ── Stats row ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: #fff; border: 1px solid rgba(87,46,136,0.1); border-radius: 12px; padding: 1.1rem 1.25rem; box-shadow: 0 2px 8px rgba(87,46,136,0.05); }

    .card { background: #fff; border: 1px solid rgba(87,46,136,0.1); border-radius: 12px; padding: 1.4rem; box-shadow: 0 2px 10px rgba(87,46,136,0.05); margin-bottom: 1.25rem; }

    .qa-btn:hover { background: rgba(87,46,136,0.05); border-color: rgba(87,46,136,0.28); }

  <script>
    const SUPABASE_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    const prodId = new URLSearchParams(location.search).get('id');

    function ovEsc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    function ovFmtDate(str) {
      if (!str) return '';
      const d = new Date(str + 'T12:00:00');
      if (isNaN(d.getTime())) return str;
      return d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    const OV_EVENT_COLOURS = {
      audition:'#572e88', dance_call:'#572e88', callback:'#572e88', other_audition:'#572e88',
      rehearsal:'#74a2b4', music_rehearsal:'#74a2b4', choreography:'#74a2b4',
      tech:'#5b9fc0', dress:'#4f78a8', performance:'#446aa4',
      strike:'#d45239', costume_moveout:'#d17431', cast_party:'#aa2943',
      event:'#6c956f', meeting:'#efab45', crew:'#986fc8', deadline:'#c976a5',
    };

    const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

    function ovRenderHero(prod) {
      const setEl = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
      const sub = [prod.subtitle, prod.season_year].filter(Boolean).join(' · ');
      setEl('ov-id', prod.custom_id || '');
      setEl('ov-title', prod.title || 'Production');
      setEl('ov-sub', sub);
      setEl('ov-venue', prod.venue || '');
      const dates = prod.start_date && prod.end_date
        ? ovFmtDate(prod.start_date) + ' – ' + ovFmtDate(prod.end_date)
        : prod.start_date ? 'From ' + ovFmtDate(prod.start_date) : '';
      setEl('ov-dates', dates);

      const posterWrap = document.getElementById('hero-poster-wrap');
      if (posterWrap) {
        if (prod.poster_url) {
          posterWrap.innerHTML = '<img src="' + prod.poster_url + '" alt="Production poster" />';
          posterWrap.classList.remove('hidden');
        } else {
          posterWrap.innerHTML = '';
          posterWrap.classList.add('hidden');
        }
      }

      document.title = (prod.title || 'Production') + ' - Build The Show';

      const phases = ['setup','auditions','casting','rehearsals','performances','wrapped'];
      const curIdx = phases.indexOf(prod.status || 'setup');
      document.querySelectorAll('.phase-stage').forEach(function(el, i) {
        el.classList.remove('active','done');
        if (i === curIdx) el.classList.add('active');
        else if (i < curIdx) el.classList.add('done');
      });
    }

    async function ovLoadStats() {
      if (!prodId) return;
      const [appRes, castRes, evRes] = await Promise.all([
        sb.from('audition_applications').select('id', { count: 'exact', head: true }).eq('production_id', prodId),
        sb.from('casting_assignments').select('id', { count: 'exact', head: true }).eq('production_id', prodId).eq('status', 'confirmed'),
        sb.from('production_events').select('id', { count: 'exact', head: true }).eq('production_id', prodId),
      ]);
      const setEl = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
      setEl('ov-applicant-count', appRes.count ?? '-');
      setEl('ov-cast-count', castRes.count ?? '-');
      setEl('ov-event-count', evRes.count ?? '-');
    }

    async function ovLoadUpNext() {
      const body = document.getElementById('ov-upnext-body');
      if (!body || !prodId) return;
      const n = new Date();
      const pad = v => String(v).padStart(2, '0');
      const now = n.getFullYear() + '-' + pad(n.getMonth() + 1) + '-' + pad(n.getDate()) + 'T' + pad(n.getHours()) + ':' + pad(n.getMinutes()) + ':00';
      const { data } = await sb.from('production_events')
        .select('title, start_time, end_time, venue, event_type')
        .eq('production_id', prodId)
        .gt('start_time', now)
        .order('start_time', { ascending: true })
        .limit(3);
      if (!data || !data.length) {
        body.innerHTML = '<div class="ov-upnext-empty">Nothing coming up. Head to the Calendar to add your next event.</div>';
        return;
      }
      const rows = data.map(function(ev) {
        const s = (ev.start_time || '').slice(0, 19);
        const parts = s.split('T');
        const datePart = parts[0] || '';
        const timePart = parts[1] || '';
        const dmParts = (datePart).split('-').map(Number);
        const mm = dmParts[1]; const dd = dmParts[2];
        const timeSplit = timePart.split(':').map(Number);
        const hh = timeSplit[0] || 0; const mn = timeSplit[1] || 0;
        const month = MONTHS[(mm || 1) - 1];
        const day = dd || 1;
        const ap = hh >= 12 ? 'pm' : 'am';
        const timeStr = timePart ? (hh % 12 || 12) + ':' + String(mn).padStart(2, '0') + ap : '';
        const colour = OV_EVENT_COLOURS[ev.event_type] || '#572e88';
        return '<div class="ov-upnext-event" onclick="btsProdNav(\'plan-calendar.html\')">'
          + '<div class="ov-cal-page" style="--pc:' + colour + ';">'
          + '<div class="ov-cal-page-month">' + month + '</div>'
          + '<div class="ov-cal-page-day">' + day + '</div>'
          + '</div>'
          + '<div class="ov-upnext-info">'
          + '<div class="ov-upnext-title">' + ovEsc(ev.title) + '</div>'
          + '<div class="ov-upnext-meta"><span>' + timeStr + '</span>' + (ev.venue ? '<span>' + ovEsc(ev.venue) + '</span>' : '') + '</div>'
          + '</div>'
          + '</div>';
      }).join('');
      body.innerHTML = '<div style="display:flex;flex-direction:row;gap:1.25rem;flex-wrap:wrap;">' + rows + '</div>';
    }

    async function ovLoadChecklist() {
      const body = document.getElementById('ov-checklist-body');
      const countEl = document.getElementById('ov-task-count');
      if (!body || !prodId) return;
      const [msRes, taskRes] = await Promise.all([
        sb.from('checklist_items').select('id, title, status').eq('production_id', prodId).order('sort_order'),
        sb.from('producer_tasks').select('id, status, checklist_item_id').eq('production_id', prodId),
      ]);
      const milestones = msRes.data || [];
      const tasks = taskRes.data || [];

      const msIds = new Set(milestones.map(function(m) { return m.id; }));
      const linkedTasks = tasks.filter(function(t) { return msIds.has(t.checklist_item_id); });
      const taskTotal = linkedTasks.length;
      const taskDone = linkedTasks.filter(function(t) { return t.status === 'complete'; }).length;
      const msTotal = milestones.length;
      const msDone = milestones.filter(function(m) { return m.status === 'complete'; }).length;

      if (countEl) countEl.textContent = taskTotal || msTotal || '-';

      if (!msTotal && !taskTotal) {
        body.innerHTML = '<div class="ov-checklist-empty">Your checklists are waiting. Set them up in the Checklists tab.</div>';
        return;
      }

      const msPct = msTotal ? Math.round((msDone / msTotal) * 100) : 0;
      const msBar = '<div style="margin-bottom:0.6rem;">'
        + '<div style="display:flex;justify-content:space-between;font-size:0.75rem;color:rgba(87,46,136,0.5);margin-bottom:0.2rem;">'
        + '<span>' + msDone + ' of ' + msTotal + ' milestone' + (msTotal !== 1 ? 's' : '') + ' complete</span>'
        + (taskTotal ? '<span>' + taskDone + ' of ' + taskTotal + ' task' + (taskTotal !== 1 ? 's' : '') + '</span>' : '')
        + '</div>'
        + '<div style="height:5px;border-radius:3px;background:rgba(87,46,136,0.12);overflow:hidden;">'
        + '<div style="height:100%;width:' + msPct + '%;background:#572e88;border-radius:3px;transition:width 0.3s;"></div>'
        + '</div></div>';

      const incomplete = milestones.filter(function(m) { return m.status !== 'complete'; });
      if (!incomplete.length) {
        body.innerHTML = msBar + '<div class="ov-checklist-empty" style="margin-top:0.4rem;">All milestones complete. Nice work.</div>';
        return;
      }

      const items = incomplete.slice(0, 3).map(function(m) {
        const colour = m.status === 'in_progress' ? '#572e88' : m.status === 'complete' ? '#16a34a' : '#9ca3af';
        return '<div class="ov-checklist-item">'
          + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + colour + ';margin-right:0.4rem;flex-shrink:0;"></span>'
          + '<label>' + ovEsc(m.title) + '</label>'
          + '</div>';
      }).join('');

      const viewAll = incomplete.length > 3
        ? '<span class="ov-checklist-viewall">View all ' + incomplete.length + ' milestones →</span>'
        : '';

      body.innerHTML = msBar + items + viewAll;
    }

    async function ovInit() {
      if (!prodId) return;
      const { data: prod } = await sb
        .from('productions')
        .select('id, title, subtitle, season_year, status, venue, poster_url, custom_id, start_date, end_date')
        .eq('id', prodId)
        .single();
      if (!prod) return;
      ovRenderHero(prod);
      await Promise.all([ovLoadStats(), ovLoadUpNext(), ovLoadChecklist()]);
    }

    window.initProductionPage('overview');
    ovInit();
  </script>
</body>
</html>
