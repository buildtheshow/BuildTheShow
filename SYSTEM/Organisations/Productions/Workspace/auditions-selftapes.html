<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self Tapes - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v49-20260618" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    .page-kicker { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,21,48,0.38); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .page-kicker-dot { width: 6px; height: 6px; border-radius: 50%; background: #572e88; flex-shrink: 0; }
    .page-title { font-size: 2rem; font-weight: 950; color: #1a1530; margin: 0 0 1.25rem; }

    .st-toolbar { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .st-search { flex: 1; min-width: 200px; max-width: 340px; position: relative; }
    .st-search input { width: 100%; border: 1.5px solid rgba(87,46,136,0.18); border-radius: 8px; padding: 0.48rem 0.9rem 0.48rem 2.1rem; font-size: 0.85rem; font-family: var(--bts-font); background: #fff; color: #1a1530; outline: none; transition: border-color 0.12s; }
    .st-search input:focus { border-color: #572e88; }
    .st-search-icon { position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); opacity: 0.35; pointer-events: none; }
    .st-filters { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .st-filter-pill { font-size: 0.72rem; font-weight: 800; border-radius: 100px; padding: 0.28rem 0.7rem; border: 1.5px solid rgba(87,46,136,0.2); background: #fff; color: rgba(26,21,48,0.6); cursor: pointer; font-family: var(--bts-font); transition: all 0.12s; }
    .st-filter-pill:hover { border-color: #572e88; color: #572e88; }
    .st-filter-pill.active { background: #572e88; color: #fff; border-color: #572e88; }
    .st-count { font-size: 0.78rem; color: rgba(26,21,48,0.4); font-weight: 700; margin-left: auto; white-space: nowrap; }

    .st-table { width: 100%; border-collapse: collapse; }
    .st-table th { font-size: 0.68rem; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(26,21,48,0.4); padding: 0.6rem 0.85rem; border-bottom: 1.5px solid rgba(87,46,136,0.1); text-align: left; }
    .st-table td { padding: 0.7rem 0.85rem; border-bottom: 1px solid rgba(87,46,136,0.06); vertical-align: middle; }
    .st-table tbody tr { cursor: default; transition: background 0.1s; }
    .st-table tbody tr:hover { background: rgba(87,46,136,0.03); }

    .st-avatar { width: 32px; height: 32px; border-radius: 50%; background: #ece8ff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.75rem; color: #572e88; overflow: hidden; flex-shrink: 0; }
    .st-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .st-name-cell { display: flex; align-items: center; gap: 0.7rem; }
    .st-name { font-size: 0.88rem; font-weight: 800; }

    .st-scope-pill { font-size: 0.68rem; font-weight: 850; border-radius: 100px; padding: 0.2rem 0.55rem; white-space: nowrap; }
    .scope-general  { background: #f0ecfc; color: #572e88; }
    .scope-callback { background: #fef4e2; color: #a06b00; }

    .st-platform { font-size: 0.78rem; color: rgba(26,21,48,0.6); font-weight: 600; }
    .st-date { font-size: 0.78rem; color: rgba(26,21,48,0.5); }

    .st-link { color: #572e88; font-weight: 700; font-size: 0.8rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem; }
    .st-link:hover { text-decoration: underline; }

    .st-empty { text-align: center; padding: 3rem 1rem; color: rgba(26,21,48,0.38); font-size: 0.88rem; }
    .st-loading { color: rgba(26,21,48,0.38); font-size: 0.88rem; padding: 1rem 0; }

    .st-video-count { font-size: 0.78rem; color: rgba(26,21,48,0.5); font-weight: 700; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>
  <div class="prod-main">
    <div class="prod-main-inner">
      <div class="page-kicker"><span class="page-kicker-dot"></span>AUDITIONS</div>
      <h1 class="page-title">Self Tapes</h1>
      <div id="st-root"><div class="st-loading">Loading...</div></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=27"></script>
  <script>
    window.initProductionPage('cast');

    const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgxMTI0NjYsImV4cCI6MjA1MzY4ODQ2Nn0.5w1M_Fy_8mOFLfMFNjJzNaSwlMLOCxJaE-B1SURkFBY';

    let _sb, _prodId, _allSubs = [], _allApps = [], _filter = 'all';

    async function stInit() {
      const params = new URLSearchParams(window.location.search);
      _prodId = params.get('production_id');
      if (!_prodId) { document.getElementById('st-root').innerHTML = '<div class="st-empty">No production selected.</div>'; return; }

      const stored = localStorage.getItem('sb-tkmaiktxpwqfbgeojbnf-auth-token');
      _sb = window.supabase.createClient(SB_URL, SB_ANON);
      if (stored) {
        try {
          const t = JSON.parse(stored);
          if (t?.access_token) await _sb.auth.setSession({ access_token: t.access_token, refresh_token: t.refresh_token });
        } catch (e) { console.warn('Auth restore failed', e); }
      }

      const [subsRes, appsRes, bookRes] = await Promise.all([
        _sb.from('self_tape_submissions').select('*').eq('production_id', _prodId).order('submitted_at', { ascending: false }),
        _sb.from('audition_applications').select('id, name, email, headshot_url').eq('production_id', _prodId),
        _sb.from('audition_bookings').select('id, name, email, headshot_url').eq('production_id', _prodId),
      ]);

      _allSubs = subsRes.data || [];

      var appMap = {};
      (appsRes.data || []).forEach(function(a) { appMap[a.id] = a; });
      (bookRes.data || []).forEach(function(b) { appMap[b.id] = b; });
      _allApps = appMap;

      stRender();
    }

    function stRender() {
      var root = document.getElementById('st-root');
      var filtered = _filter === 'all' ? _allSubs :
        _filter === 'general' ? _allSubs.filter(function(s) { return s.scope === 'general_audition'; }) :
        _allSubs.filter(function(s) { return s.scope === 'callback'; });

      var search = (document.getElementById('st-search-input') || {}).value || '';
      if (search.trim()) {
        var q = search.trim().toLowerCase();
        filtered = filtered.filter(function(s) {
          var app = _allApps[s.applicant_id];
          return (app && app.name && app.name.toLowerCase().includes(q)) ||
                 (app && app.email && app.email.toLowerCase().includes(q)) ||
                 (s.label && s.label.toLowerCase().includes(q)) ||
                 (s.platform && s.platform.toLowerCase().includes(q));
        });
      }

      var scopes = {};
      _allSubs.forEach(function(s) { scopes[s.scope || 'general_audition'] = true; });

      var html = '<div class="st-toolbar">';
      html += '<div class="st-search"><svg class="st-search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="5"/><line x1="10" y1="10" x2="13" y2="13"/></svg>';
      html += '<input id="st-search-input" type="text" placeholder="Search by name, email, or label..." value="' + (search || '') + '" oninput="stRender()" /></div>';
      html += '<div class="st-filters">';
      html += '<div class="st-filter-pill' + (_filter === 'all' ? ' active' : '') + '" onclick="stSetFilter(\'all\')">All</div>';
      if (scopes['general_audition']) html += '<div class="st-filter-pill' + (_filter === 'general' ? ' active' : '') + '" onclick="stSetFilter(\'general\')">General Audition</div>';
      if (scopes['callback']) html += '<div class="st-filter-pill' + (_filter === 'callback' ? ' active' : '') + '" onclick="stSetFilter(\'callback\')">Callback</div>';
      html += '</div>';
      html += '<div class="st-count">' + filtered.length + ' submission' + (filtered.length !== 1 ? 's' : '') + '</div>';
      html += '</div>';

      if (filtered.length === 0) {
        html += '<div class="st-empty">No self tape submissions yet.</div>';
        root.innerHTML = html;
        return;
      }

      var grouped = {};
      filtered.forEach(function(s) {
        if (!grouped[s.applicant_id]) grouped[s.applicant_id] = [];
        grouped[s.applicant_id].push(s);
      });

      html += '<table class="st-table"><thead><tr>';
      html += '<th>Performer</th><th>Videos</th><th>Type</th><th>Submitted</th><th></th>';
      html += '</tr></thead><tbody>';

      Object.keys(grouped).forEach(function(appId) {
        var subs = grouped[appId];
        var app = _allApps[appId] || {};
        var initials = (app.name || '?').split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
        var latest = subs[0];

        var scopeLabel = latest.scope === 'callback' ? 'Callback' : 'General Audition';
        var scopeClass = latest.scope === 'callback' ? 'scope-callback' : 'scope-general';

        var hasMultipleScopes = subs.some(function(s) { return s.scope !== subs[0].scope; });

        var dateStr = '';
        if (latest.submitted_at) {
          var d = new Date(latest.submitted_at);
          dateStr = d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        html += '<tr>';
        html += '<td><div class="st-name-cell">';
        html += '<div class="st-avatar">';
        if (app.headshot_url) {
          html += '<img src="' + app.headshot_url + '" alt="" />';
        } else {
          html += initials;
        }
        html += '</div>';
        html += '<div><div class="st-name">' + (app.name || 'Unknown') + '</div>';
        if (app.email) html += '<div style="font-size:0.72rem;color:rgba(26,21,48,0.45);">' + app.email + '</div>';
        html += '</div></div></td>';
        html += '<td><span class="st-video-count">' + subs.length + ' video' + (subs.length !== 1 ? 's' : '') + '</span></td>';
        html += '<td>';
        if (hasMultipleScopes) {
          html += '<span class="st-scope-pill scope-general" style="margin-right:0.3rem;">General</span>';
          html += '<span class="st-scope-pill scope-callback">Callback</span>';
        } else {
          html += '<span class="st-scope-pill ' + scopeClass + '">' + scopeLabel + '</span>';
        }
        html += '</td>';
        html += '<td><span class="st-date">' + dateStr + '</span></td>';
        html += '<td><a class="st-link" href="javascript:void(0)" onclick="stShowDetail(\'' + appId + '\')">View</a></td>';
        html += '</tr>';
      });

      html += '</tbody></table>';
      root.innerHTML = html;
    }

    function stSetFilter(f) {
      _filter = f;
      stRender();
    }

    function stShowDetail(appId) {
      var subs = _allSubs.filter(function(s) { return s.applicant_id === appId; });
      var app = _allApps[appId] || {};

      var html = '<div style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9000;display:flex;align-items:center;justify-content:center;" onclick="if(event.target===this)this.remove()">';
      html += '<div style="background:#fff;border-radius:14px;padding:1.75rem;max-width:640px;width:90%;max-height:85vh;overflow-y:auto;" onclick="event.stopPropagation()">';

      html += '<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;">';
      html += '<div class="st-avatar" style="width:42px;height:42px;font-size:0.9rem;">';
      if (app.headshot_url) {
        html += '<img src="' + app.headshot_url + '" alt="" />';
      } else {
        var initials = (app.name || '?').split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
        html += initials;
      }
      html += '</div>';
      html += '<div><div style="font-size:1.1rem;font-weight:900;">' + (app.name || 'Unknown') + '</div>';
      if (app.email) html += '<div style="font-size:0.78rem;color:rgba(26,21,48,0.5);">' + app.email + '</div>';
      html += '</div>';
      html += '<div style="margin-left:auto;cursor:pointer;font-size:1.5rem;color:rgba(26,21,48,0.3);line-height:1;" onclick="this.closest(\'div[style*=fixed]\').remove()">&#10005;</div>';
      html += '</div>';

      subs.forEach(function(s) {
        var scopeLabel = s.scope === 'callback' ? 'Callback' : 'General Audition';
        var scopeClass = s.scope === 'callback' ? 'scope-callback' : 'scope-general';
        var dateStr = s.submitted_at ? new Date(s.submitted_at).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';

        html += '<div style="border:1.5px solid rgba(87,46,136,0.1);border-radius:10px;padding:1rem;margin-bottom:0.75rem;">';
        html += '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;flex-wrap:wrap;">';
        if (s.label) html += '<span style="font-weight:800;font-size:0.85rem;">' + s.label + '</span>';
        html += '<span class="st-scope-pill ' + scopeClass + '">' + scopeLabel + '</span>';
        if (s.platform) html += '<span class="st-platform">' + stPlatformLabel(s.platform) + '</span>';
        html += '</div>';
        html += '<a href="' + s.video_url + '" target="_blank" rel="noopener" class="st-link" style="font-size:0.82rem;word-break:break-all;">' + s.video_url + '</a>';
        html += '<div style="margin-top:0.4rem;"><span class="st-date">' + dateStr + '</span></div>';
        html += '</div>';
      });

      html += '</div></div>';

      var overlay = document.createElement('div');
      overlay.innerHTML = html;
      document.body.appendChild(overlay.firstChild);
    }

    function stPlatformLabel(p) {
      var map = { youtube: 'YouTube', vimeo: 'Vimeo', google_drive: 'Google Drive', dropbox: 'Dropbox', tiktok: 'TikTok', instagram: 'Instagram' };
      return map[p] || p;
    }

    stInit();
  </script>
</body>
</html>
