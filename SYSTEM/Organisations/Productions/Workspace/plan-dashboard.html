<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v51-20260704" />
  <link rel="stylesheet" href="/ASSETS/styles/production-team-card.css?v=volunteer-left-text-20260511" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; min-height: 100dvh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; z-index: 0; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: -1; }
    .prod-main-inner { position: relative; z-index: 1; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    /* ── Team cards grid ── */
    .plan-team-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      align-items: flex-start;
    }
    /* Render at natural 304px so cqw/rem text sizes work, then scale down */
    .plan-team-cards .production-team-card-wrap {
      zoom: 0.55;
      flex: 0 0 auto;
    }

    /* ── Custom small-card back face ── */
    .plan-ptcard-back {
      position: absolute;
      inset: 0;
      background: #fff;
      border-radius: 4px;
      border-top: 0.52rem solid var(--pt-card-color, #572e88);
      display: flex;
      flex-direction: column;
      padding: 0.85rem 1rem 0.9rem;
      box-sizing: border-box;
      box-shadow: 0 6px 16px rgba(15,23,42,0.12);
      gap: 0.7rem;
      overflow: hidden;
    }
    .plan-ptcard-back-header {
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
      padding-bottom: 0.65rem;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    .plan-ptcard-back-role {
      font-size: 0.68rem;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--pt-card-color, #572e88);
      line-height: 1;
      overflow-wrap: anywhere;
    }
    .plan-ptcard-back-name {
      font-size: 1.08rem;
      font-weight: 800;
      color: #1a1530;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }
    .plan-ptcard-back-details {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      flex: 1;
      min-height: 0;
    }
    .plan-ptcard-detail {
      display: flex;
      flex-direction: column;
      gap: 0.12rem;
      text-decoration: none;
      color: inherit;
    }
    .plan-ptcard-detail-label {
      font-size: 0.6rem;
      font-weight: 950;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pt-card-color, #572e88);
      line-height: 1;
    }
    .plan-ptcard-detail-value-row {
      display: flex;
      align-items: flex-start;
      gap: 0.35rem;
    }
    .plan-ptcard-detail-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1a1530;
      line-height: 1.3;
      overflow-wrap: anywhere;
      word-break: break-all;
      flex: 1;
    }
    .plan-ptcard-copy-btn {
      flex-shrink: 0;
      width: 1.4rem;
      height: 1.4rem;
      margin-top: 0.05rem;
      background: none;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: rgba(26,21,48,0.4);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      font-family: var(--bts-font);
    }
    .plan-ptcard-copy-btn:hover { border-color: var(--pt-card-color, #572e88); color: var(--pt-card-color, #572e88); }
    .plan-ptcard-copy-btn svg { width: 0.72rem; height: 0.72rem; }
    .plan-ptcard-copy-btn.did-copy {
      background: var(--pt-card-color, #572e88);
      border-color: var(--pt-card-color, #572e88);
      color: #fff;
    }
    .plan-ptcard-back-bio {
      font-size: 0.75rem;
      color: rgba(26,21,48,0.5);
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ── Open roles compact list ── */
    .creative-team-template-list {
      display: grid;
      gap: 0.72rem;
    }
    .creative-team-template-member {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      column-gap: 0.58rem;
      align-items: start;
      min-width: 0;
    }
    .creative-team-template-dot {
      width: 0.82rem;
      height: 0.82rem;
      margin-top: 0.05rem;
      border-radius: 999px;
      background: var(--ctm-dot-colour, #572e88);
      box-shadow: 0 0 0 0.18rem var(--ctm-dot-halo, rgba(87,46,136,0.18));
      flex: 0 0 auto;
    }
    .creative-team-template-copy { min-width: 0; }
    .creative-team-template-role {
      color: #111;
      font-size: 1.18rem;
      font-weight: 950;
      letter-spacing: 0;
      line-height: 1;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }
    .creative-team-template-name {
      margin-top: 0.22rem;
      color: #202020;
      font-size: 0.98rem;
      font-weight: 450;
      letter-spacing: 0;
      line-height: 1.1;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }
    .creative-team-template-name.is-open {
      color: rgba(26,21,48,0.28);
      font-style: italic;
      text-transform: none;
      font-size: 0.88rem;
    }

    /* chips use shared .dash-nav-chip* classes from production-sidebar.css */
    .aud-visual-hero { margin-bottom: 0.4rem; }

    /* ── Dashboard layout ── */
    .plan-dash-body {
      display: grid;
      grid-template-columns: minmax(0,1fr) minmax(0,0.52fr);
      gap: 2.5rem;
      align-items: start;
      margin-top: 1.5rem;
    }
    @media (max-width: 680px) { .plan-dash-body { grid-template-columns: 1fr; } }

    /* ── Manage link ── */
    .plan-manage-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 2rem;
      font-size: 0.78rem;
      font-weight: 800;
      color: #572e88;
      text-decoration: none;
      background: none;
      cursor: pointer;
      font-family: var(--bts-font);
      border: 1.5px solid rgba(87,46,136,0.2);
      border-radius: 8px;
      padding: 0.4rem 0.9rem;
      transition: border-color 0.15s, background 0.15s;
    }
    .plan-manage-link:hover { border-color: #572e88; background: rgba(87,46,136,0.04); }

    /* ── Empty state ── */
    .plan-empty {
      color: rgba(26,21,48,0.35);
      font-size: 0.9rem;
      font-style: italic;
      padding: 1rem 0;
    }

    /* ── Section heading ── */
    .plan-section-label {
      font-size: 0.65rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(26,21,48,0.35);
      margin-bottom: 0.85rem;
    }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Plan</span></span>
            </div>
            <h1 class="aud-visual-title" id="prod-title">Dashboard</h1>
            <p class="aud-visual-copy">Who's in place and where things stand.</p>
          </div>
        </div>
      </div>

      <nav class="dash-nav-chips" id="dash-nav-chips" aria-label="Plan sections"></nav>

      <div class="plan-dash-body">

        <!-- Left: Creative Team flip cards -->
        <div>
          <div class="plan-section-label">Creative Team</div>
          <div id="team-cards" class="plan-team-cards"></div>
          <button class="plan-manage-link" onclick="btsProdNav('plan-team.html')">Manage Team &rarr;</button>
        </div>

        <!-- Right: Unfilled standard roles -->
        <div id="open-roles-block" style="display:none;">
          <div class="plan-section-label">Still needed</div>
          <div class="creative-team-template-list" id="team-credits-open"></div>
        </div>

      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/ASSETS/scripts/production-team-card.js?v=volunteer-modal-template-20260511"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=68-20260704"></script>
  <script>
    window.initProductionPage('plan');
  </script>
  <script>
    const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
    const sb      = supabase.createClient(SB_URL, SB_ANON);
    const prodId  = new URLSearchParams(location.search).get('id') || '';
    const base    = '/SYSTEM/Organisations/Productions/Workspace/';

    function nav(file) {
      return base + file + '?id=' + encodeURIComponent(prodId);
    }

    // ── Role colours ──────────────────────────────────────
    const ROLE_COLOURS = {
      'producer':         { dot: '#572e88', halo: 'rgba(87,46,136,0.18)' },
      'director':         { dot: '#d1523d', halo: 'rgba(209,82,61,0.18)' },
      'choreographer':    { dot: '#efab45', halo: 'rgba(239,171,69,0.22)' },
      'vocal director':   { dot: '#476aaa', halo: 'rgba(71,106,170,0.18)' },
      'music director':   { dot: '#476aaa', halo: 'rgba(71,106,170,0.18)' },
      'musical director': { dot: '#476aaa', halo: 'rgba(71,106,170,0.18)' },
    };
    const DEFAULT_COLOUR = { dot: '#769e7b', halo: 'rgba(118,158,123,0.18)' };

    // Standard creative roles — shown even if unfilled
    const STANDARD_ROLES = ['Producer', 'Director', 'Choreographer', 'Vocal Director'];

    function roleStyle(role) {
      const c = ROLE_COLOURS[String(role || '').toLowerCase().trim()] || DEFAULT_COLOUR;
      return `--ctm-dot-colour:${c.dot};--ctm-dot-halo:${c.halo};`;
    }

    function isCreative(m) {
      const r = String(m.role || '').toLowerCase().trim();
      const d = String(m.department || '').toLowerCase().trim();
      return Object.keys(ROLE_COLOURS).includes(r) || d === 'creative team';
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // ── Copy to clipboard ─────────────────────────────────
    function planCardCopy(e, text, btn) {
      e.stopPropagation();
      e.preventDefault();
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('did-copy');
        btn.innerHTML = checkIconSvg;
        setTimeout(() => {
          btn.classList.remove('did-copy');
          btn.innerHTML = copyIconSvg;
        }, 1500);
      });
    }
    const copyIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    const checkIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

    // ── Custom back face for small plan-dashboard cards ──
    function renderPlanCardBack(m) {
      const color    = esc(m.note_color || '#572e88');
      const role     = esc(m.role     || 'Team Member');
      const name     = esc(m.name     || '');
      const phone    = esc(m.phone    || '');
      const email    = esc(m.email    || '');
      const passcode = esc(m.passcode || '');
      const bio      = esc(m.bio      || '');

      const copyBtn = (raw) =>
        `<button type="button" class="plan-ptcard-copy-btn" onclick="planCardCopy(event,${JSON.stringify(raw)},this)" aria-label="Copy">${copyIconSvg}</button>`;

      const detailRow = (label, value, raw, href) => {
        const labelEl = `<span class="plan-ptcard-detail-label">${label}</span>`;
        const valueEl = href
          ? `<a class="plan-ptcard-detail-value" href="${href}" onclick="event.stopPropagation();">${value}</a>`
          : `<span class="plan-ptcard-detail-value">${value}</span>`;
        const valueRow = `<div class="plan-ptcard-detail-value-row">${valueEl}${raw ? copyBtn(raw) : ''}</div>`;
        return `<div class="plan-ptcard-detail">${labelEl}${valueRow}</div>`;
      };

      return `
        <div class="plan-ptcard-back" style="--pt-card-color:${color};">
          <div class="plan-ptcard-back-header">
            <span class="plan-ptcard-back-role">${role}</span>
            <span class="plan-ptcard-back-name">${name}</span>
          </div>
          <div class="plan-ptcard-back-details">
            ${phone    ? detailRow('Phone',          phone,               m.phone,    `tel:${phone}`)    : ''}
            ${email    ? detailRow('Email',          email,               m.email,    `mailto:${email}`) : ''}
            ${detailRow('Volunteer Code', passcode || 'Not set', m.passcode || '', '')}
            ${!phone && !email ? `<span style="font-size:0.78rem;color:rgba(26,21,48,0.35);font-style:italic;">No contact info saved.</span>` : ''}
          </div>
          ${bio ? `<div class="plan-ptcard-back-bio">${bio}</div>` : ''}
        </div>`;
    }

    // ── Render creative team flip cards ──────────────────
    function renderTeamCards(members) {
      const cardsEl  = document.getElementById('team-cards');
      const openEl   = document.getElementById('team-credits-open');
      const openBlock = document.getElementById('open-roles-block');

      const filledRoles = new Set(members.map(m => String(m.role || '').toLowerCase().trim()));
      const unfilledStandard = STANDARD_ROLES.filter(r => !filledRoles.has(r.toLowerCase()));

      if (!members.length) {
        cardsEl.innerHTML = '<div class="plan-empty">No team members added yet.</div>';
      } else {
        const T = window.BTSProductionTeamTemplates;
        cardsEl.innerHTML = members.map(m => {
          const color = esc(m.note_color || '#572e88');
          const name  = esc(m.name || '');
          return `
            <div class="production-team-card-wrap production-team-card-wrap--volunteer" style="--pt-card-color:${color};--volunteer-card-color:${color};">
              <div class="production-team-card production-team-card--volunteer"
                   role="button" tabindex="0"
                   aria-label="Flip ${name} card"
                   onclick="flipProductionTeamCard(this)"
                   onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();flipProductionTeamCard(this);}">
                <div class="production-team-card-inner">
                  <div class="production-team-card-face production-team-card-volunteer-face">
                    ${T.renderVolunteerCard(m)}
                  </div>
                  <div class="production-team-card-face production-team-card-volunteer-face production-team-card-volunteer-back-face">
                    ${renderPlanCardBack(m)}
                  </div>
                </div>
              </div>
            </div>`;
        }).join('');
        requestAnimationFrame(() => requestAnimationFrame(() => {
          T.fitVolunteerRoleIdentifiers(cardsEl);
        }));
      }

      if (unfilledStandard.length) {
        openEl.innerHTML = unfilledStandard.map(role => {
          const style = roleStyle(role);
          return `
            <div class="creative-team-template-member" style="${style}">
              <span class="creative-team-template-dot" aria-hidden="true" style="opacity:0.3;"></span>
              <div class="creative-team-template-copy">
                <div class="creative-team-template-role">${esc(role)}</div>
                <div class="creative-team-template-name is-open">Not yet assigned</div>
              </div>
            </div>`;
        }).join('');
        openBlock.style.display = '';
      }
    }

    // ── Per-file metadata: icon, description, colour ──────
    // Source of truth for ORDER + LABELS is the sidebar nav DOM.
    // This map only enriches — add a new row when a new plan page is added to the sidebar.
    const CHIP_META = {
      'plan-timeline.html':    { icon: '/ASSETS/Images/Icons/Producers To-do list.svg?v=20260704c', desc: 'Your master task list for the whole show',   colour: '#78bbd4' },
      'plan-team.html':        { icon: '/ASSETS/Images/Icons/Creative Team.svg?v=20260704',          desc: 'Add your creative leads and send portals',   colour: '#d1523d' },
      'plan-calendar.html':    { icon: '/ASSETS/Images/Icons/navproductioncalendar.svg?v=20260704',  desc: 'All rehearsals, shows, and key dates',        colour: '#efab45' },
      'script-breakdown.html': { icon: '/ASSETS/Images/Icons/script-script.svg?v=20260704',          desc: 'Scenes, characters, songs, and cues',         colour: '#dd8233' },
      'plan-files.html':       { icon: '/ASSETS/Images/Icons/Files.svg?v=20260704',                  desc: 'Scripts, schedules, and team documents',      colour: '#476aaa' },
      'plan-setup.html':       { icon: '/ASSETS/Images/Icons/navsettings.svg?v=20260704e',           desc: 'Show name, dates, venue, and season',         colour: '#769e7b' },
    };
    const FALLBACK_META = { icon: '/ASSETS/Images/Icons/navsettings.svg?v=20260704e', desc: '', colour: '#ca7ea7' };

    // ── Read Plan tabs from the rendered sidebar DOM ───────
    // Skips plan-dashboard.html (this page) and any hidden items (feature-gated).
    function readNavSections() {
      const groupEl = document.getElementById('group-plan-items');
      if (!groupEl) return [];
      return Array.from(groupEl.querySelectorAll('.prod-tab')).filter(el => {
        if (el.style.display === 'none') return false;
        const match = (el.getAttribute('onclick') || '').match(/btsProdNav\(['"]([^'"]+)['"]\)/);
        const file  = match?.[1] || '';
        return file && file !== 'plan-dashboard.html';
      }).map(el => {
        const match = (el.getAttribute('onclick') || '').match(/btsProdNav\(['"]([^'"]+)['"]\)/);
        const file  = match?.[1] || '';
        const meta  = CHIP_META[file] || FALLBACK_META;
        return { label: el.textContent.trim(), file, ...meta };
      });
    }

    // ── Render nav chips ──────────────────────────────────
    function renderChips(sections) {
      document.getElementById('dash-nav-chips').innerHTML = sections.map(s => `
        <button class="dash-nav-chip" onclick="btsProdNav('${s.file}')" style="--chip-colour:${s.colour};">
          <div class="dash-nav-chip-top">
            <img class="dash-nav-chip-icon" src="${s.icon}" alt="" aria-hidden="true" />
            <div class="dash-nav-chip-label">${esc(s.label)}</div>
          </div>
          <div class="dash-nav-chip-desc">${esc(s.desc)}</div>
        </button>`).join('');
    }

    function refreshChips() {
      renderChips(readNavSections());
    }
    const _origApply = window.applyNavModuleVisibility;
    window.applyNavModuleVisibility = function(m) { if (_origApply) _origApply(m); refreshChips(); };

    // ── Init ──────────────────────────────────────────────
    async function init() {
      (function tryChips() {
        if (!document.getElementById('group-plan-items')) { requestAnimationFrame(tryChips); return; }
        refreshChips();
      })();

      if (!prodId) {
        document.getElementById('team-cards').innerHTML = '<div class="plan-empty">No production selected.</div>';
        return;
      }

      const [prodRes, membersRes] = await Promise.all([
        sb.from('productions').select('title').eq('id', prodId).single(),
        sb.from('production_team_members').select('id,name,role,department,note_color,is_active,headshot_url,email,phone,bio,passcode').eq('production_id', prodId).eq('is_active', true).order('created_at', { ascending: true }),
      ]);

      const members = (membersRes.data || []).filter(isCreative);
      renderTeamCards(members);
    }

    init();
  </script>
</body>
</html>
