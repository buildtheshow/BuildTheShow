<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budgeting - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v45-20260605" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #f5f4f8; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      max-width: calc(100vw - 220px);
      overflow-x: clip;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .prod-main::before {
      content: '';
      position: fixed;
      inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }
    .hero-wrap { padding: 2rem 2.25rem 0; position: relative; z-index: 1; }
    .aud-visual-hero { margin-bottom: 0; overflow: hidden; }
    .hero-deco {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 220px; display: flex; align-items: center; justify-content: flex-end;
      pointer-events: none; overflow: hidden;
    }
    .hero-deco img { height: 130px; width: auto; object-fit: contain; opacity: 0.15; filter: brightness(0) invert(1); }
    .page-heading-lockup { display: flex; align-items: flex-start; gap: 1rem; min-width: 0; }
    .page-icon-cluster { position: relative; width: 66px; height: 58px; flex: 0 0 66px; margin-top: 0.08rem; }
    .page-icon-toss {
      position: absolute;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 8px 18px rgba(26,21,48,0.16);
      backdrop-filter: blur(3px);
    }
    .page-icon-toss img { width: 68%; height: 68%; object-fit: contain; filter: brightness(0) invert(1); }
    .page-icon-toss.page { left: 0; top: 0; width: 46px; height: 46px; transform: rotate(-8deg); }
    .page-icon-toss.sub { right: 0; bottom: 0; width: 34px; height: 34px; border-radius: 11px; background: rgba(239,171,69,0.22); transform: rotate(9deg); }
    .page-hierarchy { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 0.4rem; color: rgba(255,255,255,0.88); font-size: 0.78rem; letter-spacing: 0; text-transform: none; }
    .page-hierarchy-page { color: #efab45; font-weight: 950; letter-spacing: 0.08em; text-transform: uppercase; }
    .page-hierarchy-sep,
    .page-hierarchy-sub { color: rgba(255,255,255,0.82); font-weight: 500; letter-spacing: 0; text-transform: none; }
    .page-subtitle { margin: 0.35rem 0 0; color: #fff; font-size: clamp(2.1rem, 4.6vw, 3.7rem); line-height: 0.98; font-weight: 950; letter-spacing: 0; }
    .financials-content { flex: 1; padding: 1.75rem 2.25rem 2.5rem; position: relative; z-index: 1; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; }
      .prod-main::before { inset: 0; }
      .hero-wrap { padding: 4.5rem 1rem 0; }
      .financials-content { padding: 1.5rem 1rem 2rem; }
      .page-heading-lockup { gap: 0.75rem; }
      .page-icon-cluster { width: 54px; height: 50px; flex-basis: 54px; }
      .page-icon-toss.page { width: 40px; height: 40px; }
      .page-icon-toss.sub { width: 30px; height: 30px; }
      .hero-deco { display: none; }
    }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="hero-wrap">
      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div class="page-heading-lockup">

            <div>
              <div class="aud-visual-kicker">
                <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
                <span class="page-hierarchy">
                  <span class="page-hierarchy-page">Financials</span>
                  <span class="page-hierarchy-sep">-</span>
                  <span class="page-hierarchy-sub">Budgeting</span>
                </span>
              </div>
              <h1 class="page-subtitle">Budgeting</h1>
            </div>
          </div>
        </div>
        <div class="hero-deco">
          <img src="/ASSETS/Images/Finance - Schedule.svg" alt="" />
        </div>
      </div>
    </div>

    <div class="financials-content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=12"></script>
  <script>
    window.initProductionPage('financials');
  </script>
</body>
</html>
