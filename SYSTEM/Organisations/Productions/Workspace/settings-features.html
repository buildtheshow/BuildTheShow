<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Features - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v49-20260618" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem 2.25rem;
      max-width: calc(100vw - 220px);
      overflow-x: clip;
      position: relative;
      z-index: 0;
    }
    .prod-main::before {
      content: '';
      position: fixed;
      inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.04;
      pointer-events: none;
      z-index: -1;
    }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    /* ── Feature cards (matches wizard step 11) ── */
    .feature-card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.85rem;
      margin: 1.5rem 0 2rem;
    }
    .feature-card {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding: 1.1rem 1rem 1rem;
      border-radius: 12px;
      border: 2.5px solid transparent;
      cursor: pointer;
      user-select: none;
      position: relative;
      transition: filter 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .feature-card:hover { filter: brightness(0.93); }
    .feature-card--on { border-color: rgba(255,255,255,0.55); box-shadow: 0 3px 14px rgba(0,0,0,0.18); }
    .feature-card--soon {
      opacity: 0.6; cursor: default;
      border-style: dashed; border-color: rgba(87,46,136,0.2);
      background: #c8c4d4 !important;
    }
    .feature-card--soon:hover { filter: none; }
    .feature-card-header { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; }
    .feature-card-header-left { display: flex; align-items: center; gap: 0.6rem; flex: 1; min-width: 0; }
    .feature-card-icon {
      width: 40px; height: 40px; object-fit: contain; flex-shrink: 0;
      filter: brightness(0) invert(1); opacity: 0.9;
    }
    .feature-card--soon .feature-card-icon { filter: grayscale(1); opacity: 0.5; }
    .feature-card-check {
      width: 18px; height: 18px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.6);
    }
    .feature-card--on .feature-card-check { background: #fff; border-color: #fff; }
    .feature-card-check svg { display: block; }
    .feature-card-empty-check {
      width: 18px; height: 18px;
      border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.45);
    }
    .feature-card-soon-badge {
      font-size: 0.55rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.07em; color: #9a90b0;
      background: rgba(87,46,136,0.08); border-radius: 20px;
      padding: 0.12rem 0.45rem;
    }
    .feature-card-name { font-size: 0.85rem; font-weight: 700; color: #fff; }
    .feature-card--soon .feature-card-name { color: #2e2a40; }
    .feature-card-desc { font-size: 0.71rem; color: rgba(255,255,255,0.82); line-height: 1.55; }
    .feature-card--soon .feature-card-desc { color: #3a3555; }
    @media (max-width: 640px) { .feature-card-grid { grid-template-columns: 1fr 1fr; } }

    /* ── Toast ── */
    .sf-toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: #1a1530; color: #fff;
      padding: 0.65rem 1.1rem; border-radius: 8px;
      font-size: 0.8rem; font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 9999;
    }
    .sf-toast.visible { opacity: 1; transform: translateY(0); }
    .sf-toast.error { background: #d1523d; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Settings</span></span>
            </div>
            <h1 class="aud-visual-title">Features</h1>
            <p class="aud-visual-copy">Turn sections on or off. Changes apply immediately and update the sidebar.</p>
          </div>
        </div>
      </div>

      <div id="features-grid"></div>

    </div>
  </div>

  <div class="sf-toast" id="sf-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=65-20260704"></script>
  <script>
    window.initProductionPage('settings');
  </script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    const prodId = new URLSearchParams(location.search).get('id');

    // Feature definitions — must match wizard step 11
    const FEATURES = [
      { key: 'auditions',         colour: '#572e88', icon: '/ASSETS/Images/Icons/Auditions.svg?v=20260704c',              name: 'Auditions',         live: true,  desc: 'Find your cast from start to finish. Publish your audition notice, let performers register online, schedule times, check in arrivals, record notes, run callbacks, and send offers.' },
      { key: 'registration',      colour: '#476aaa', icon: '/ASSETS/Images/Icons/Applications.svg?v=20260704c',           name: 'Registration',      live: true,  desc: 'Collect production fees, emergency contacts, measurements, permissions, and signed forms from your cast in one place.' },
      { key: 'budget',            colour: '#dd8233', icon: '/ASSETS/Images/Icons/Financial - Reports.svg?v=20260704c',    name: 'Budget',            live: true,  desc: 'Create your production budget, track spending by department, collect receipts, and run financial reports at any time.' },
      { key: 'producer_timeline', colour: '#74a2b4', icon: '/ASSETS/Images/Icons/Producers To-do list.svg?v=20260704c',  name: 'Producer To-Do List', live: true,  desc: 'Map out every task from first rehearsal to closing night with deadlines, milestones, and department assignments.' },
      { key: 'volunteers',        colour: '#769e7b', icon: '/ASSETS/Images/Icons/Volunteers.svg?v=20260704c',             name: 'Volunteers',        live: true,  desc: 'Create roles, collect applications, assign shifts, and keep your volunteer team organized across the whole production.' },
      { key: 'sponsors',          colour: '#d1523d', icon: '/ASSETS/Images/Icons/Budgeting-Sponsorship.svg?v=20260704c',  name: 'Sponsors',          live: true,  desc: 'Track sponsors, packages, payments, artwork, and deliverables from first conversation to closing night.' },
      { key: 'marketing',         colour: '#efefef', icon: '/ASSETS/Images/Icons/Messages.svg?v=20260704c',               name: 'Marketing',         live: false, desc: 'Store posters, logos, production photos, social media graphics, press releases, and marketing schedules in one place.' },
      { key: 'tickets',           colour: '#efefef', icon: '/ASSETS/Images/Icons/Tickets 2.svg?v=20260704c',              name: 'Tickets',           live: false, desc: 'Sell tickets, manage seating, scan guests at the door, and track sales across all your performances.' },
    ];

    // Maps feature keys → enabled_modules keys + element IDs (must match workspace)
    const MODULES_FROM_FEATURES = (f) => ({
      cast:              !!(f.auditions || f.registration),
      departments:       false,
      promote:           !!(f.marketing || f.sponsors),
      ticketing:         !!f.tickets,
      volunteers:        !!f.volunteers,
      financials:        !!f.budget,
      wrapup:            !!f.budget,
      producer_timeline: !!f.producer_timeline,
    });

    let currentFeatures = {};
    let currentWizardData = {};
    let saving = false;
    let toastTimer;

    function showToast(msg, isError) {
      const t = document.getElementById('sf-toast');
      clearTimeout(toastTimer);
      t.textContent = msg;
      t.classList.toggle('error', !!isError);
      t.classList.add('visible');
      toastTimer = setTimeout(() => t.classList.remove('visible'), 2500);
    }

    function renderGrid() {
      const checkIcon = `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#572e88" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>`;

      const html = FEATURES.map(feat => {
        if (!feat.live) {
          return `
            <div class="feature-card feature-card--soon">
              <div class="feature-card-header">
                <div class="feature-card-header-left">
                  <img class="feature-card-icon" src="${feat.icon}" alt="" aria-hidden="true" />
                  <div class="feature-card-name">${feat.name}</div>
                </div>
                <span class="feature-card-soon-badge">Coming Soon</span>
              </div>
              <div class="feature-card-desc">${feat.desc}</div>
            </div>`;
        }
        const isOn = !!currentFeatures[feat.key];
        return `
          <div class="feature-card${isOn ? ' feature-card--on' : ''}" style="background:${feat.colour};" onclick="toggleFeature('${feat.key}')">
            <div class="feature-card-header">
              <div class="feature-card-header-left">
                <img class="feature-card-icon" src="${feat.icon}" alt="" aria-hidden="true" />
                <div class="feature-card-name">${feat.name}</div>
              </div>
              ${isOn
                ? `<div class="feature-card-check">${checkIcon}</div>`
                : `<div class="feature-card-empty-check"></div>`}
            </div>
            <div class="feature-card-desc">${feat.desc}</div>
          </div>`;
      }).join('');

      document.getElementById('features-grid').innerHTML = `<div class="feature-card-grid">${html}</div>`;
    }

    async function toggleFeature(key) {
      if (saving) return;
      currentFeatures[key] = !currentFeatures[key];
      renderGrid();
      await saveFeatures();
    }

    async function saveFeatures() {
      if (!prodId) return;
      saving = true;
      try {
        const newModules = MODULES_FROM_FEATURES(currentFeatures);
        const newWizardData = Object.assign({}, currentWizardData, { features: currentFeatures });

        const { error } = await sb.from('productions').update({
          enabled_modules: newModules,
          wizard_data: newWizardData,
        }).eq('id', prodId);

        if (error) throw error;

        currentWizardData = newWizardData;

        // Update sidebar visibility live
        if (window.applyNavModuleVisibility) window.applyNavModuleVisibility(newModules);

        showToast('Saved');
      } catch (err) {
        showToast('Save failed: ' + (err.message || 'Unknown error'), true);
        // Roll back the toggle visually
        currentFeatures[Object.keys(currentFeatures).pop()] = !currentFeatures[Object.keys(currentFeatures).pop()];
        renderGrid();
      } finally {
        saving = false;
      }
    }

    async function init() {
      if (!prodId) {
        document.getElementById('features-grid').innerHTML = '<p style="color:#d1523d;">No production ID found.</p>';
        return;
      }

      const { data, error } = await sb.from('productions')
        .select('wizard_data, enabled_modules')
        .eq('id', prodId).single();

      if (error || !data) {
        document.getElementById('features-grid').innerHTML = '<p style="color:#d1523d;">Could not load production.</p>';
        return;
      }

      currentWizardData = data.wizard_data || {};
      currentFeatures = (currentWizardData.features) || {};

      // If enabled_modules has existing keys, back-fill features from them for older productions
      const em = data.enabled_modules || {};
      if (!currentFeatures.auditions && !currentFeatures.registration && em.cast) {
        currentFeatures.auditions = true;
      }
      if (!currentFeatures.budget && em.financials) currentFeatures.budget = true;
      if (!currentFeatures.volunteers && em.volunteers) currentFeatures.volunteers = true;
      if (!currentFeatures.sponsors && em.promote) currentFeatures.sponsors = true;
      if (!currentFeatures.producer_timeline && em.producer_timeline) currentFeatures.producer_timeline = true;

      renderGrid();
    }

    init();
  </script>
</body>
</html>
