<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In &amp; Sign Out - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=20260718b" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v51-20260704" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #f7f5fc; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; min-height: 100dvh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; z-index: 0; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: -1; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    /* ── Toolbar (date nav + buttons) ── */
    .dci-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .dci-date-group { display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }
    .dci-date-nav { width: 30px; height: 30px; border-radius: 7px; border: 1.5px solid rgba(87,46,136,0.18); background: #fff; color: #572e88; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; line-height: 1; padding: 0; }
    .dci-date-nav:hover { background: rgba(87,46,136,0.05); }
    .dci-date-display { font-size: 0.9rem; font-weight: 800; color: #1a1530; padding: 0 0.1rem; }
    .dci-date-picker-hidden { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
    .dci-choose-date-btn { padding: 0.33rem 0.75rem; border-radius: 7px; border: 1.5px solid rgba(87,46,136,0.18); background: #fff; color: #572e88; font-size: 0.74rem; font-weight: 800; cursor: pointer; font-family: var(--bts-font); display: flex; align-items: center; gap: 0.3rem; white-space: nowrap; }
    .dci-choose-date-btn:hover { background: rgba(87,46,136,0.04); }
    .dci-event-tags-bar { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
    .dci-event-tag-sm { display: inline-flex; padding: 0.18rem 0.6rem; border-radius: 20px; font-size: 0.68rem; font-weight: 800; color: #fff; white-space: nowrap; }
    .dci-action-btns { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .dci-btn-ghost { padding: 0.35rem 0.8rem; border-radius: 7px; border: 1.5px solid rgba(87,46,136,0.18); background: #fff; color: #1a1530; font-size: 0.74rem; font-weight: 800; cursor: pointer; font-family: var(--bts-font); display: flex; align-items: center; gap: 0.3rem; white-space: nowrap; }
    .dci-btn-ghost:hover { border-color: rgba(87,46,136,0.3); background: rgba(87,46,136,0.03); }
    .dci-btn-ghost.active { background: #572e88; color: #fff; border-color: #572e88; }
    .dci-btn-danger { padding: 0.35rem 0.8rem; border-radius: 7px; border: 1.5px solid rgba(209,82,61,0.25); background: #fff; color: #d1523d; font-size: 0.74rem; font-weight: 800; cursor: pointer; font-family: var(--bts-font); white-space: nowrap; }
    .dci-btn-danger:hover { background: rgba(209,82,61,0.04); }

    /* ── Stats row ── */
    .dci-stats-row { display: flex; align-items: flex-start; gap: 2rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .dci-stat { display: flex; flex-direction: column; gap: 0.05rem; }
    .dci-stat-num { font-size: 1.65rem; font-weight: 900; color: #1a1530; line-height: 1; }
    .dci-stat-lbl { font-size: 0.58rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(26,21,48,0.36); white-space: nowrap; }
    .dci-stat.s-here .dci-stat-num { color: #2d6e35; }
    .dci-stat.s-not .dci-stat-num { color: #dd8233; }
    .dci-stat.s-away .dci-stat-num { color: #78bbd4; }
    .dci-stat.s-out .dci-stat-num { color: #572e88; }

    /* ── Alert strip ── */
    .dci-alert-strip { background: rgba(239,171,69,0.07); border: 1.5px solid rgba(239,171,69,0.28); border-radius: 8px; padding: 0.55rem 0.9rem; display: flex; gap: 0; flex-wrap: wrap; align-items: stretch; margin-bottom: 1rem; }
    .dci-alert-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.74rem; font-weight: 700; color: #5c4200; padding: 0.15rem 1rem 0.15rem 0; margin-right: 1rem; border-right: 1px solid rgba(239,171,69,0.25); }
    .dci-alert-item:last-child { border-right: none; padding-right: 0; margin-right: 0; }
    .dci-alert-icon { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Tab bar ── */
    .dci-tab-bar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .dci-tabs { display: flex; gap: 0; border-bottom: 2px solid rgba(87,46,136,0.09); }
    .dci-tab { padding: 0.5rem 1.1rem; font-size: 0.8rem; font-weight: 800; color: rgba(26,21,48,0.4); border-bottom: 2.5px solid transparent; margin-bottom: -2px; cursor: pointer; white-space: nowrap; transition: color 0.12s; }
    .dci-tab:hover { color: #572e88; }
    .dci-tab.active { color: #572e88; border-color: #572e88; }
    .dci-tab-right { display: flex; align-items: center; gap: 0.5rem; }
    .dci-search { border: 1.5px solid rgba(87,46,136,0.15); border-radius: 7px; padding: 0.35rem 0.7rem; font-family: var(--bts-font); font-size: 0.8rem; outline: none; background: #fff; width: 170px; }
    .dci-search:focus { border-color: #572e88; }
    .dci-filter-sel { border: 1.5px solid rgba(87,46,136,0.15); border-radius: 7px; padding: 0.35rem 0.55rem; font-family: var(--bts-font); font-size: 0.8rem; outline: none; background: #fff; color: #1a1530; cursor: pointer; }
    .dci-filter-sel:focus { border-color: #572e88; }

    /* ── Content sections ── */
    .dci-content { display: flex; flex-direction: column; gap: 1rem; }
    .dci-section { background: #fff; border-radius: 12px; border: 1.5px solid rgba(87,46,136,0.08); overflow: hidden; }
    .dci-sec-hdr { padding: 0.8rem 1.1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(87,46,136,0.07); gap: 0.75rem; flex-wrap: wrap; }
    .dci-sec-title { display: flex; align-items: center; gap: 0.5rem; font-size: 0.72rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.09em; color: rgba(26,21,48,0.42); }
    .dci-sec-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dci-sec-meta { font-size: 0.72rem; color: rgba(26,21,48,0.32); font-weight: 700; }

    /* ── Table ── */
    table.dci-tbl { width: 100%; border-collapse: collapse; }
    .dci-tbl th { padding: 0.45rem 0.9rem; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(26,21,48,0.3); text-align: left; background: #faf9fd; border-bottom: 1px solid rgba(87,46,136,0.07); white-space: nowrap; }
    .dci-tbl td { padding: 0.6rem 0.9rem; border-bottom: 1px solid rgba(87,46,136,0.05); vertical-align: middle; font-size: 0.82rem; }
    .dci-tbl tr:last-child td { border-bottom: none; }
    .dci-tbl tr:hover td { background: rgba(87,46,136,0.018); }
    .dci-tbl tr.r-here td { background: rgba(118,158,123,0.04); }
    .dci-tbl tr.r-out td { background: rgba(26,21,48,0.018); }
    .dci-tbl tr.r-away td { background: rgba(120,187,212,0.04); }

    /* person cell */
    .dci-person-cell { display: flex; align-items: center; gap: 0.6rem; }
    .dci-avatar { width: 32px; height: 32px; border-radius: 50%; background: #ece6f5; color: #572e88; font-size: 0.7rem; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    tr.r-here .dci-avatar { background: #769e7b; color: #fff; }
    tr.r-out .dci-avatar { background: rgba(26,21,48,0.1); color: rgba(26,21,48,0.38); }
    tr.r-away .dci-avatar { background: rgba(120,187,212,0.22); color: #2a6d8a; }
    .dci-pname { font-weight: 800; color: #1a1530; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .dci-prole { font-size: 0.72rem; color: rgba(26,21,48,0.42); margin-top: 0.05rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

    /* status pills */
    .dci-pill { display: inline-flex; align-items: center; padding: 0.17rem 0.6rem; border-radius: 20px; font-size: 0.67rem; font-weight: 900; white-space: nowrap; }
    .dci-pill.here { background: rgba(118,158,123,0.15); color: #2d6e35; }
    .dci-pill.not-arrived { background: rgba(221,130,51,0.12); color: #b06000; }
    .dci-pill.expected-later { background: rgba(71,106,170,0.1); color: #2a4a8a; }
    .dci-pill.away { background: rgba(120,187,212,0.14); color: #2a6d8a; }
    .dci-pill.signed-out { background: rgba(87,46,136,0.09); color: rgba(87,46,136,0.65); }

    /* time + hours */
    .dci-t { font-size: 0.8rem; font-weight: 700; color: #1a1530; white-space: nowrap; }
    .dci-t.empty { color: rgba(26,21,48,0.22); font-weight: 400; }
    .dci-hrs.done { font-size: 0.78rem; font-weight: 800; color: #2d6e35; }
    .dci-hrs.inprog { font-size: 0.78rem; font-weight: 800; color: #572e88; font-style: italic; }
    .dci-hrs.none { font-size: 0.78rem; color: rgba(26,21,48,0.22); }

    /* row action buttons */
    .dci-row-acts { display: flex; align-items: center; gap: 0.3rem; }
    .dci-rbtn { padding: 0.27rem 0.7rem; border-radius: 6px; font-size: 0.72rem; font-weight: 800; cursor: pointer; font-family: var(--bts-font); white-space: nowrap; border: 1.5px solid; display: inline-flex; align-items: center; gap: 0.25rem; transition: background 0.1s; }
    .dci-rbtn.signin { background: #572e88; color: #fff; border-color: #572e88; }
    .dci-rbtn.signin:hover { background: #4a2575; }
    .dci-rbtn.signout { background: #fff; color: #2d6e35; border-color: rgba(118,158,123,0.4); }
    .dci-rbtn.signout:hover { background: rgba(118,158,123,0.08); }
    .dci-rbtn.ghost { background: #fff; color: rgba(26,21,48,0.38); border-color: rgba(26,21,48,0.15); }
    .dci-rbtn.ghost:hover { background: rgba(26,21,48,0.04); }
    .dci-rbtn.away-btn { background: #fff; color: #2a6d8a; border-color: rgba(120,187,212,0.35); }
    .dci-rbtn.away-btn:hover { background: rgba(120,187,212,0.06); }

    /* empty / loading */
    .dci-cb { width: 16px; height: 16px; cursor: pointer; accent-color: #572e88; }
    .dci-empty { padding: 2rem 1rem; text-align: center; color: rgba(26,21,48,0.32); font-size: 0.82rem; }
    .dci-loading { padding: 2.5rem; text-align: center; color: rgba(26,21,48,0.4); }
    .dci-no-data { text-align: center; padding: 4rem 2rem; color: rgba(26,21,48,0.38); }
    .dci-no-data strong { display: block; font-size: 1rem; font-weight: 800; margin-bottom: 0.3rem; color: rgba(26,21,48,0.5); }

    /* ── Kiosk mode ── */
    body.kiosk-mode .dci-action-btns > *:not(#dci-kiosk-btn) { display: none; }
    body.kiosk-mode .dci-tbl td { padding: 0.95rem 0.9rem; }
    body.kiosk-mode .dci-pname { font-size: 1rem; max-width: 200px; }
    body.kiosk-mode .dci-avatar { width: 40px; height: 40px; font-size: 0.85rem; }
    body.kiosk-mode .dci-rbtn { padding: 0.45rem 1.1rem; font-size: 0.82rem; }

    /* ── Kiosk confirm overlay ── */
    .kiosk-overlay { position: fixed; inset: 0; background: rgba(23,18,43,0.75); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .kiosk-overlay.visible { display: flex; }
    .kiosk-box { background: #fff; border-radius: 20px; padding: 2.5rem; text-align: center; max-width: 360px; width: 90%; }
    .kiosk-avatar { width: 60px; height: 60px; border-radius: 50%; background: #ece6f5; color: #572e88; font-size: 1.3rem; font-weight: 900; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .kiosk-name { font-size: 1.45rem; font-weight: 900; color: #1a1530; margin-bottom: 0.2rem; }
    .kiosk-role { font-size: 0.88rem; color: rgba(26,21,48,0.42); margin-bottom: 1.5rem; }
    .kiosk-confirm-btn { width: 100%; padding: 0.85rem; border-radius: 12px; border: none; background: #769e7b; color: #fff; font-size: 0.98rem; font-weight: 900; font-family: var(--bts-font); cursor: pointer; }
    .kiosk-confirm-btn:hover { background: #5c8661; }
    .kiosk-cancel-btn { margin-top: 0.65rem; font-size: 0.77rem; color: rgba(26,21,48,0.32); background: none; border: none; cursor: pointer; font-family: var(--bts-font); width: 100%; }

    /* ── Add someone modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(23,18,43,0.5); display: none; align-items: center; justify-content: center; z-index: 9000; }
    .modal-overlay.visible { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; padding: 2rem; max-width: 400px; width: 90%; }
    .modal-title { font-size: 1.05rem; font-weight: 900; color: #1a1530; margin-bottom: 1.1rem; }
    .modal-field { margin-bottom: 0.8rem; }
    .modal-lbl { font-size: 0.68rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(26,21,48,0.42); margin-bottom: 0.28rem; display: block; }
    .modal-inp { width: 100%; border: 1.5px solid rgba(87,46,136,0.18); border-radius: 8px; padding: 0.48rem 0.7rem; font-family: var(--bts-font); font-size: 0.84rem; outline: none; }
    .modal-inp:focus { border-color: #572e88; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.1rem; }
    .modal-cancel { padding: 0.42rem 0.95rem; border-radius: 7px; border: 1.5px solid rgba(87,46,136,0.18); background: #fff; color: rgba(26,21,48,0.55); font-size: 0.78rem; font-weight: 800; cursor: pointer; font-family: var(--bts-font); }
    .modal-save { padding: 0.42rem 1.1rem; border-radius: 7px; border: none; background: #572e88; color: #fff; font-size: 0.78rem; font-weight: 800; cursor: pointer; font-family: var(--bts-font); }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .dci-tab-right { display: none; }
      .dci-tbl th.hm, .dci-tbl td.hm { display: none; }
      .dci-pname { max-width: 120px; }
      .dci-stats-row { gap: 1.25rem; }
    }

    /* ── Print ── */
    @media print {
      .dci-action-btns, .dci-tab-right, .dci-row-acts, .dci-sec-hdr button { display: none !important; }
      .prod-main { margin-left: 0 !important; max-width: 100% !important; }
      .prod-main::before { display: none; }
      .dci-section { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>

<div id="prod-sidebar-host"></div>

<div class="prod-main">
  <div class="prod-main-inner">

    <!-- Hero (locked template) -->
    <div class="aud-visual-hero">
      <div class="aud-visual-hero-content">
        <div>
          <div class="aud-visual-kicker">
            <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
            <span class="page-hierarchy"><span class="page-hierarchy-page" id="dci-prod-name">Production</span></span>
          </div>
          <h1 class="aud-visual-title">Sign In &amp; Sign Out</h1>
          <p class="aud-visual-copy">Track who is here for today's session.</p>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="dci-toolbar">
      <div class="dci-date-group">
        <button class="dci-date-nav" onclick="shiftDate(-1)" title="Previous day">&#8249;</button>
        <span class="dci-date-display" id="dci-date-display">Today</span>
        <button class="dci-date-nav" onclick="shiftDate(1)" title="Next day">&#8250;</button>
        <button class="dci-choose-date-btn" onclick="openDatePicker()">
          <img src="/ASSETS/Images/Icons/time.svg" style="width:12px;height:12px;opacity:0.65;" alt="" />
          Choose date
        </button>
        <input type="date" id="dci-date-hidden" class="dci-date-picker-hidden" onchange="onDatePickerChange(this.value)" />
        <span class="dci-event-tags-bar" id="dci-event-tags-bar"></span>
      </div>
      <div class="dci-action-btns">
        <button class="dci-btn-ghost" onclick="window.print()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
        <button class="dci-btn-ghost" onclick="openAddSomeone()">
          <img src="/ASSETS/Images/Icons/Performer.svg" style="width:13px;height:13px;opacity:0.6;" alt="" />
          Add someone
        </button>
        <button class="dci-btn-ghost" id="dci-kiosk-btn" onclick="toggleKioskMode()">
          <img src="/ASSETS/Images/Icons/tablet-kiosk.svg" style="width:13px;height:13px;opacity:0.65;" alt="" id="dci-kiosk-icon" />
          Kiosk Mode
        </button>
        <button class="dci-btn-danger" onclick="signEveryoneOut()">Sign everyone out</button>
      </div>
    </div>

    <!-- Stats row -->
    <div class="dci-stats-row">
      <div class="dci-stat"><div class="dci-stat-num" id="stat-expected">0</div><div class="dci-stat-lbl">Expected</div></div>
      <div class="dci-stat s-here"><div class="dci-stat-num" id="stat-here">0</div><div class="dci-stat-lbl">Here now</div></div>
      <div class="dci-stat s-not"><div class="dci-stat-num" id="stat-not">0</div><div class="dci-stat-lbl">Not arrived</div></div>
      <div class="dci-stat s-away"><div class="dci-stat-num" id="stat-away">0</div><div class="dci-stat-lbl">Away today</div></div>
      <div class="dci-stat s-out"><div class="dci-stat-num" id="stat-out">0</div><div class="dci-stat-lbl">Signed out</div></div>
    </div>

    <!-- Alert strip -->
    <div class="dci-alert-strip" id="dci-alert-strip" style="display:none;"></div>

    <!-- Tab bar -->
    <div class="dci-tab-bar">
      <div class="dci-tabs">
        <div class="dci-tab active" id="tab-everyone" onclick="switchTab('everyone')">Everyone</div>
        <div class="dci-tab" id="tab-cast" onclick="switchTab('cast')">Cast</div>
        <div class="dci-tab" id="tab-volunteers" onclick="switchTab('volunteers')">Volunteers</div>
      </div>
      <div class="dci-tab-right">
        <input class="dci-search" type="text" placeholder="Search by name" id="dci-search" oninput="onSearch(this.value)" />
        <select class="dci-filter-sel" id="dci-filter" onchange="onFilterChange(this.value)">
          <option value="">All statuses</option>
          <option value="here">Here now</option>
          <option value="not-arrived">Not arrived</option>
          <option value="expected-later">Expected later</option>
          <option value="away">Away today</option>
          <option value="signed-out">Signed out</option>
        </select>
      </div>
    </div>

    <!-- Content -->
    <div class="dci-content" id="dci-content">
      <div class="dci-loading">Loading...</div>
    </div>

  </div><!-- /prod-main-inner -->
</div><!-- /prod-main -->

<!-- Kiosk confirm overlay -->
<div class="kiosk-overlay" id="kiosk-overlay">
  <div class="kiosk-box">
    <div class="kiosk-avatar" id="ko-avatar"></div>
    <div class="kiosk-name" id="ko-name"></div>
    <div class="kiosk-role" id="ko-role"></div>
    <button class="kiosk-confirm-btn" onclick="closeKioskConfirm(true)">Sign In</button>
    <button class="kiosk-cancel-btn" onclick="closeKioskConfirm(false)">Cancel</button>
  </div>
</div>

<!-- Add someone modal -->
<div class="modal-overlay" id="modal-add">
  <div class="modal-box">
    <div class="modal-title">Add someone</div>
    <div class="modal-field">
      <label class="modal-lbl" for="as-name">Full name</label>
      <input type="text" id="as-name" class="modal-inp" placeholder="Name" />
    </div>
    <div class="modal-field">
      <label class="modal-lbl" for="as-role">Role</label>
      <input type="text" id="as-role" class="modal-inp" placeholder="e.g. Guest director, Parent helper" />
    </div>
    <div class="modal-field">
      <label class="modal-lbl" for="as-type">Category</label>
      <select id="as-type" class="modal-inp">

// ── Utilities ─────────────────────────────────────────────────────────────────

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}
function pad(n) { return String(n).padStart(2, '0'); }

function parseLocalDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmtDateLong(iso) {
  return parseLocalDate(iso).toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
}

function fmtTime(t) {
  if (!t) return '';
  const raw = String(t).includes('T') ? String(t).split('T')[1] : String(t);
  const [h, m] = raw.slice(0, 5).split(':').map(Number);
  return (h % 12 || 12) + (m ? ':' + pad(m) : '') + (h >= 12 ? 'pm' : 'am');
}

function fmtStamp(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const h = d.getHours(), m = d.getMinutes();
  return (h % 12 || 12) + ':' + pad(m) + (h >= 12 ? 'pm' : 'am');
}

function fmtHours(inIso, outIso) {
  if (!inIso || !outIso) return '';
  const diff = (new Date(outIso) - new Date(inIso)) / 3600000;
  if (diff <= 0) return '';
  const h = Math.floor(diff), m = Math.round((diff - h) * 60);
  return h > 0 ? h + 'h' + (m ? ' ' + m + 'm' : '') : m + 'm';
}

function initials(name) {
  const parts = String(name || '').trim().split(/\s+/);
  return (parts.length >= 2 ? parts[0][0] + parts[parts.length - 1][0] : (name || '?')[0]).toUpperCase();
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function personStatus(p, now) {
  if (p.awayToday) return 'away';
  if (p.checkedIn && p.signedOutAt) return 'signed-out';
  if (p.checkedIn) return 'here';
  const startStr = p.shiftStart || p.expectedStart || _eventStart;
  if (startStr) {
    const dt = new Date(_date + 'T' + String(startStr).slice(0, 5) + ':00');
    if (!isNaN(dt.getTime()) && now > dt) return 'not-arrived';
  }
  return 'expected-later';
}

function pillHtml(status) {
  const map = {
    'here':           ['Here', 'here'],
    'not-arrived':    ['Not arrived', 'not-arrived'],
    'expected-later': ['Expected later', 'expected-later'],
    'away':           ['Away today', 'away'],
    'signed-out':     ['Signed out', 'signed-out'],
  };
  const [lbl, cls] = map[status] || ['Unknown', 'not-arrived'];
  return '<span class="dci-pill ' + esc(cls) + '">' + esc(lbl) + '</span>';
}

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadAll() {
  const [evRes, volRes, regRes, assignRes, appsRes, booksRes, ciRes, prodRes] = await Promise.all([
    _sb.from('production_events')
       .select('id,title,event_type,start_time,end_time,is_deadline')
       .eq('production_id', _prodId)
       .gte('start_time', _date + 'T00:00:00')
       .lte('start_time', _date + 'T23:59:59'),
    _sb.from('volunteer_signups')
       .select('id,name,role_name,shift_date,required_dates,status,shift_start_time,shift_end_time')
       .eq('production_id', _prodId)
       .eq('status', 'approved'),
    _sb.from('registration_payment_records')
       .select('id,casting_assignment_id,performer_name')
       .eq('production_id', _prodId),
    _sb.from('casting_assignments')
       .select('id,applicant_id,role_name,character_name')
       .eq('production_id', _prodId),
    _sb.from('audition_applications')
       .select('id,name,first_name,last_name')
       .eq('production_id', _prodId),
    _sb.from('audition_bookings')
       .select('id,name,first_name,last_name')
       .eq('production_id', _prodId),
    _sb.from('daily_checkins')
       .select('*')
       .eq('production_id', _prodId)
       .eq('check_in_date', _date),
    _sb.from('productions')
       .select('title,enabled_modules')
       .eq('id', _prodId)
       .single(),
  ]);

  _todayEvents = (evRes.data || []).filter(e => !e.is_deadline);

  const firstEv = _todayEvents[0];
  _eventStart = firstEv && firstEv.start_time ? String(firstEv.start_time).split('T')[1].slice(0, 5) : null;
  const evEnd   = firstEv && firstEv.end_time   ? String(firstEv.end_time).split('T')[1].slice(0, 5)   : null;

  const ciMap = {};
  (ciRes.data || []).forEach(c => {
    ciMap[c.person_type + '::' + c.ref_id] = {
      checkedIn:   !!c.checked_in,
      checkedInAt: c.checked_in_at || null,
      signedOutAt: c.signed_out_at || null,
      awayToday:   !!c.away_today,
    };
  });

  const volRows = (volRes.data || []).filter(s => {
    if (s.shift_date) return s.shift_date === _date;
    const rd = Array.isArray(s.required_dates) ? s.required_dates : [];
    return rd.some(r => String(r || '').slice(0, 10) === _date);
  });
  _volunteers = volRows.map(s => {
    const ci = ciMap['volunteer::' + s.id] || {};
    return {
      id: s.id, name: s.name || 'Volunteer', role: s.role_name || '',
      refId: String(s.id), shiftStart: s.shift_start_time || null, shiftEnd: s.shift_end_time || null,
      checkedIn: !!ci.checkedIn, checkedInAt: ci.checkedInAt || null,
      signedOutAt: ci.signedOutAt || null, awayToday: !!ci.awayToday,
    };
  });
  _volunteers.sort((a, b) => a.name.localeCompare(b.name));

  // Build name map from audition records (fallback for cast name lookup)
  const nameMap = {};
  (appsRes.data || []).forEach(a => { nameMap[a.id] = [a.first_name, a.last_name].filter(Boolean).join(' ') || a.name; });
  (booksRes.data || []).forEach(b => { nameMap[b.id] = [b.first_name, b.last_name].filter(Boolean).join(' ') || b.name; });

  // Build casting assignment map for role/character lookup
  const assignMap = {};
  (assignRes.data || []).forEach(a => { assignMap[String(a.id)] = a; });

  // Cast = everyone registered for this production (registration is the source of truth)
  // Character/role comes from their casting assignment if linked
  _cast = (regRes.data || []).map(r => {
    const assignment = r.casting_assignment_id ? (assignMap[String(r.casting_assignment_id)] || {}) : {};
    const name = r.performer_name || nameMap[assignment.applicant_id] || 'Performer';
    const role = assignment.character_name || assignment.role_name || '';
    const ci = ciMap['cast::' + r.id] || {};
    return {
      id: r.id, name, role,
      refId: String(r.id), expectedStart: _eventStart, expectedEnd: evEnd,
      checkedIn: !!ci.checkedIn, checkedInAt: ci.checkedInAt || null,
      signedOutAt: ci.signedOutAt || null, awayToday: !!ci.awayToday,
    };
  });
  _cast.sort((a, b) => a.name.localeCompare(b.name));

  const prod = prodRes.data;
  if (prod) {
    const el = document.getElementById('dci-prod-name');
    if (el && prod.title) el.textContent = prod.title;
    if (prod.enabled_modules && window.applyNavModuleVisibility) {
      window.applyNavModuleVisibility(prod.enabled_modules);
    }
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderDateDisplay() {
  const el = document.getElementById('dci-date-display');
  if (el) el.textContent = fmtDateLong(_date);
  const hidden = document.getElementById('dci-date-hidden');
  if (hidden) hidden.value = _date;
}

function render() {
  renderDateDisplay();
  renderEventTagsBar();
  renderStats();
  renderAlerts();
  renderContent();
}

function renderEventTagsBar() {
  const el = document.getElementById('dci-event-tags-bar');
  if (!el) return;
  el.innerHTML = _todayEvents.map(ev => {
    const col = EV_COL[ev.event_type] || '#572e88';
    const lbl = ev.title || EV_LBL[ev.event_type] || 'Event';
    return '<span class="dci-event-tag-sm" style="background:' + esc(col) + '">' + esc(lbl) + '</span>';
  }).join('');
}

function renderStats() {
  const all = [..._volunteers, ..._cast];
  const now = new Date();
  let here = 0, notArr = 0, away = 0, out = 0;
  all.forEach(p => {
    const s = personStatus(p, now);
    if (s === 'here') here++;
    else if (s === 'not-arrived') notArr++;
    else if (s === 'away') away++;
    else if (s === 'signed-out') out++;
  });
  document.getElementById('stat-expected').textContent = all.length;
  document.getElementById('stat-here').textContent = here;
  document.getElementById('stat-not').textContent = notArr;
  document.getElementById('stat-away').textContent = away;
  document.getElementById('stat-out').textContent = out;
}

function renderAlerts() {
  const strip = document.getElementById('dci-alert-strip');
  const now = new Date();
  const alerts = [];

  const late = [..._volunteers, ..._cast].filter(p => personStatus(p, now) === 'not-arrived');
  if (late.length) {
    alerts.push('<div class="dci-alert-item"><img src="/ASSETS/Images/Icons/Alert.svg" class="dci-alert-icon" alt="" />' +
      esc(late.length) + ' ' + (late.length === 1 ? 'person has' : 'people have') + ' not yet arrived</div>');
  }

  const overdue = [..._volunteers, ..._cast].filter(p => {
    if (!p.checkedIn || p.signedOutAt) return false;
    const endStr = p.shiftEnd || p.expectedEnd;
    if (!endStr) return false;
    const dt = new Date(_date + 'T' + String(endStr).slice(0, 5) + ':00');
    return !isNaN(dt.getTime()) && now > dt;
  });
  if (overdue.length) {
    alerts.push('<div class="dci-alert-item"><img src="/ASSETS/Images/Icons/Information.svg" class="dci-alert-icon" alt="" />' +
      esc(overdue.length) + ' ' + (overdue.length === 1 ? 'person is' : 'people are') + ' still signed in past their scheduled end time</div>');
  }

  strip.style.display = alerts.length ? 'flex' : 'none';
  strip.innerHTML = alerts.join('');
}

function renderContent() {
  const el = document.getElementById('dci-content');
  const hasAny = _todayEvents.length > 0 || _volunteers.length > 0 || _cast.length > 0;
  if (!hasAny) {
    el.innerHTML = '<div class="dci-no-data"><strong>Nothing scheduled today</strong>No events, volunteers, or registered cast for ' + esc(_date) + '.</div>';
    return;
  }

  const now = new Date();
  const vf = filterList(_volunteers, now);
  const cf = filterList(_cast, now);

  let html = '';
  if (_activeTab === 'everyone' || _activeTab === 'cast') html += buildSection('cast', 'Cast', cf, _cast, now);
  if (_activeTab === 'everyone' || _activeTab === 'volunteers') html += buildSection('volunteers', 'Volunteers', vf, _volunteers, now);
  el.innerHTML = html || '<div class="dci-empty">No people match your search or filter.</div>';
}

function filterList(list, now) {
  return list.filter(p => {
    if (_search && !p.name.toLowerCase().includes(_search.toLowerCase()) && !p.role.toLowerCase().includes(_search.toLowerCase())) return false;
    if (_statusFilter && personStatus(p, now) !== _statusFilter) return false;
    return true;
  });
}

function buildSection(type, label, filtered, all, now) {
  const hereCount = all.filter(p => personStatus(p, now) === 'here').length;
  const dotCol = type === 'cast' ? '#572e88' : '#769e7b';
  const tableHtml = type === 'cast' ? castTable(filtered, now) : volTable(filtered, now);
  return '<div class="dci-section" id="sec-' + esc(type) + '">' +
    '<div class="dci-sec-hdr">' +
      '<div class="dci-sec-title"><div class="dci-sec-dot" style="background:' + dotCol + '"></div>' + esc(label) + ' (' + esc(String(all.length)) + ' expected)</div>' +
      '<div class="dci-sec-meta">' + esc(String(hereCount)) + ' here now</div>' +
    '</div>' +
    (filtered.length
      ? tableHtml
      : '<div class="dci-empty">' + (all.length ? 'No results match your search.' : 'None scheduled today.') + '</div>') +
  '</div>';
}

function castTable(people, now) {
  const rows = people.map(p => {
    const s = personStatus(p, now);
    const rowCls = s === 'here' ? 'r-here' : s === 'signed-out' ? 'r-out' : s === 'away' ? 'r-away' : '';
    const expected = p.expectedStart ? fmtTime(p.expectedStart) + (p.expectedEnd ? ' – ' + fmtTime(p.expectedEnd) : '') : '—';
    return '<tr class="' + esc(rowCls) + '" data-type="cast" data-ref="' + esc(p.refId) + '">' +
      '<td style="width:32px"><input type="checkbox" class="dci-cb" /></td>' +
      '<td><div class="dci-person-cell"><div class="dci-avatar">' + esc(initials(p.name)) + '</div>' +
        '<div><div class="dci-pname">' + esc(p.name) + '</div>' + (p.role ? '<div class="dci-prole">' + esc(p.role) + '</div>' : '') + '</div></div></td>' +
      '<td class="hm" style="font-size:0.78rem;color:rgba(26,21,48,0.45);">' + expected + '</td>' +
      '<td>' + pillHtml(s) + '</td>' +
      '<td class="dci-t' + (p.checkedInAt ? '' : ' empty') + '">' + (p.checkedInAt ? fmtStamp(p.checkedInAt) : '—') + '</td>' +
      '<td class="dci-t' + (p.signedOutAt ? '' : ' empty') + ' hm">' + (p.signedOutAt ? fmtStamp(p.signedOutAt) : '—') + '</td>' +
      '<td>' + rowActHtml(p, s, 'cast') + '</td>' +
    '</tr>';
  }).join('');
  return '<table class="dci-tbl"><thead><tr><th style="width:32px"></th><th>Performer</th><th class="hm">Expected</th><th>Status</th><th>Sign In</th><th class="hm">Sign Out</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function volTable(people, now) {
  const rows = people.map(p => {
    const s = personStatus(p, now);
    const rowCls = s === 'here' ? 'r-here' : s === 'signed-out' ? 'r-out' : s === 'away' ? 'r-away' : '';
    const shift = p.shiftStart ? fmtTime(p.shiftStart) + (p.shiftEnd ? ' – ' + fmtTime(p.shiftEnd) : '') : '';
    const hrs = p.checkedIn && p.signedOutAt ? fmtHours(p.checkedInAt, p.signedOutAt) : (p.checkedIn ? 'In progress' : '');
    const hrsCls = p.signedOutAt ? 'done' : p.checkedIn ? 'inprog' : 'none';
    return '<tr class="' + esc(rowCls) + '" data-type="volunteer" data-ref="' + esc(p.refId) + '">' +
      '<td style="width:32px"><input type="checkbox" class="dci-cb" /></td>' +
      '<td><div class="dci-person-cell"><div class="dci-avatar">' + esc(initials(p.name)) + '</div>' +
        '<div><div class="dci-pname">' + esc(p.name) + '</div>' + (p.role ? '<div class="dci-prole">' + esc(p.role) + '</div>' : '') + '</div></div></td>' +
      '<td class="hm" style="font-size:0.78rem;color:rgba(26,21,48,0.45);">' + (shift ? esc(shift) : '<span style="color:rgba(26,21,48,0.22);">—</span>') + '</td>' +
      '<td>' + pillHtml(s) + '</td>' +
      '<td class="dci-t' + (p.checkedInAt ? '' : ' empty') + '">' + (p.checkedInAt ? fmtStamp(p.checkedInAt) : '—') + '</td>' +
      '<td class="dci-t' + (p.signedOutAt ? '' : ' empty') + ' hm">' + (p.signedOutAt ? fmtStamp(p.signedOutAt) : '—') + '</td>' +
      '<td class="dci-hrs ' + esc(hrsCls) + ' hm">' + esc(hrs || '—') + '</td>' +
      '<td>' + rowActHtml(p, s, 'volunteer') + '</td>' +
    '</tr>';
  }).join('');
  return '<table class="dci-tbl"><thead><tr><th style="width:32px"></th><th>Volunteer</th><th class="hm">Shift</th><th>Status</th><th>Sign In</th><th class="hm">Sign Out</th><th class="hm">Hours</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function rowActHtml(p, status, type) {
  const t = esc(type), r = esc(p.refId);
  if (status === 'away') return '<div class="dci-row-acts"><button class="dci-rbtn ghost" onclick="markAway(\'' + t + '\',\'' + r + '\',false)">Remove away</button></div>';
  if (status === 'signed-out') return '<div class="dci-row-acts"><button class="dci-rbtn ghost" onclick="doSignIn(\'' + t + '\',\'' + r + '\')">Sign in again</button></div>';
  if (status === 'here') return '<div class="dci-row-acts"><button class="dci-rbtn signout" onclick="doSignOut(\'' + t + '\',\'' + r + '\')">Sign out</button><button class="dci-rbtn away-btn" onclick="markAway(\'' + t + '\',\'' + r + '\',true)">Away</button></div>';
  return '<div class="dci-row-acts"><button class="dci-rbtn signin" onclick="tapSignIn(\'' + t + '\',\'' + r + '\')">Sign in</button><button class="dci-rbtn away-btn" onclick="markAway(\'' + t + '\',\'' + r + '\',true)">Away</button></div>';
}

// ── Interactions ──────────────────────────────────────────────────────────────

function switchTab(tab) {
  _activeTab = tab;
  ['everyone','cast','volunteers'].forEach(t => document.getElementById('tab-' + t).classList.toggle('active', t === tab));
  renderContent();
}

function onSearch(val) { _search = val; renderContent(); }
function onFilterChange(val) { _statusFilter = val; renderContent(); }

async function shiftDate(delta) {
  const dir = delta > 0 ? 'next' : 'prev';
  const nearest = await findNearestScheduledDate(dir);
  if (nearest) {
    _date = nearest;
  } else {
    // No more scheduled dates in that direction — step one day
    const d = parseLocalDate(_date);
    d.setDate(d.getDate() + delta);
    _date = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }
  reloadDate();
}

async function findNearestScheduledDate(dir) {
  const isNext = dir === 'next';
  const evOp  = isNext ? 'gt' : 'lt';
  const volOp = isNext ? 'gt' : 'lt';
  const evBoundary  = isNext ? _date + 'T23:59:59' : _date + 'T00:00:00';

  const [evRes, volRes] = await Promise.all([
    _sb.from('production_events')
       .select('start_time')
       .eq('production_id', _prodId)
       .neq('is_deadline', true)
       .filter('start_time', evOp, evBoundary)
       .order('start_time', { ascending: isNext })
       .limit(1),
    _sb.from('volunteer_signups')
       .select('shift_date')
       .eq('production_id', _prodId)
       .eq('status', 'approved')
       .not('shift_date', 'is', null)
       .filter('shift_date', volOp, _date)
       .order('shift_date', { ascending: isNext })
       .limit(1),
  ]);

  const evDate  = evRes.data && evRes.data[0] ? String(evRes.data[0].start_time).slice(0, 10) : null;
  const volDate = volRes.data && volRes.data[0] ? volRes.data[0].shift_date : null;

  if (!evDate && !volDate) return null;
  if (!evDate) return volDate;
  if (!volDate) return evDate;
  // Pick whichever is closer in the requested direction
  return isNext ? (evDate < volDate ? evDate : volDate) : (evDate > volDate ? evDate : volDate);
}

function openDatePicker() {
  const h = document.getElementById('dci-date-hidden');
  if (h) { try { h.showPicker(); } catch(_) { h.click(); } }
}

function onDatePickerChange(val) {
  if (!val) return;
  _date = val;
  reloadDate();
}

async function reloadDate() {
  _volunteers = []; _cast = []; _todayEvents = [];
  document.getElementById('dci-content').innerHTML = '<div class="dci-loading">Loading...</div>';
  renderDateDisplay();
  await loadAll();
  render();
}

function tapSignIn(type, refId) {
  const person = getPerson(type, refId);
  if (!person) return;
  if (_kioskMode) {
    _pendingKioskPerson = { type, refId };
    document.getElementById('ko-avatar').textContent = initials(person.name);
    document.getElementById('ko-name').textContent = person.name;
    document.getElementById('ko-role').textContent = person.role || (type === 'volunteer' ? 'Volunteer' : 'Cast Member');
    document.getElementById('kiosk-overlay').classList.add('visible');
    return;
  }
  doSignIn(type, refId);
}

function doSignIn(type, refId) {
  const person = getPerson(type, refId);
  if (!person) return;
  const now = new Date().toISOString();
  person.checkedIn = true; person.checkedInAt = now; person.signedOutAt = null; person.awayToday = false;
  persist(type, refId, person);
  renderStats(); renderAlerts(); renderContent();
}

function doSignOut(type, refId) {
  const person = getPerson(type, refId);
  if (!person || !person.checkedIn) return;
  person.signedOutAt = new Date().toISOString();
  persist(type, refId, person);
  renderStats(); renderAlerts(); renderContent();
}

function markAway(type, refId, isAway) {
  const person = getPerson(type, refId);
  if (!person) return;
  person.awayToday = isAway;
  if (isAway) { person.checkedIn = false; person.checkedInAt = null; person.signedOutAt = null; }
  persist(type, refId, person);
  renderStats(); renderAlerts(); renderContent();
}

function signEveryoneOut() {
  const now = new Date().toISOString();
  [..._volunteers, ..._cast].forEach(p => {
    if (p.checkedIn && !p.signedOutAt) {
      p.signedOutAt = now;
      persist(_cast.includes(p) ? 'cast' : 'volunteer', p.refId, p);
    }
  });
  renderStats(); renderAlerts(); renderContent();
}

function getPerson(type, refId) {
  return (type === 'volunteer' ? _volunteers : _cast).find(p => p.refId === refId) || null;
}

async function persist(type, refId, person) {
  try {
    await _sb.from('daily_checkins').upsert({
      production_id: _prodId, check_in_date: _date, person_type: type, ref_id: refId,
      person_name: person.name, role_name: person.role || null,
      checked_in: !!person.checkedIn, checked_in_at: person.checkedInAt || null,
      signed_out_at: person.signedOutAt || null, away_today: !!person.awayToday,
    }, { onConflict: 'production_id,check_in_date,person_type,ref_id' });
  } catch (e) { console.warn('[BTS] checkin persist failed:', e && e.message); }
}

function closeKioskConfirm(confirmed) {
  document.getElementById('kiosk-overlay').classList.remove('visible');
  if (confirmed && _pendingKioskPerson) doSignIn(_pendingKioskPerson.type, _pendingKioskPerson.refId);
  _pendingKioskPerson = null;
}

function toggleKioskMode() {
  _kioskMode = !_kioskMode;
  document.body.classList.toggle('kiosk-mode', _kioskMode);
  const btn = document.getElementById('dci-kiosk-btn');
  if (btn) {
    btn.classList.toggle('active', _kioskMode);
    btn.innerHTML = '<img src="/ASSETS/Images/Icons/tablet-kiosk.svg" style="width:13px;height:13px;opacity:0.65;" alt="" /> ' + (_kioskMode ? 'Exit Kiosk' : 'Kiosk Mode');
  }
}

function openAddSomeone() {
  document.getElementById('as-name').value = '';
  document.getElementById('as-role').value = '';
  document.getElementById('as-type').value = 'cast';
  document.getElementById('modal-add').classList.add('visible');
  document.getElementById('as-name').focus();
}
function closeAddSomeone() { document.getElementById('modal-add').classList.remove('visible'); }
async function saveAddSomeone() {
  const name = document.getElementById('as-name').value.trim();
  const role = document.getElementById('as-role').value.trim();
  const type = document.getElementById('as-type').value;
  if (!name) { document.getElementById('as-name').focus(); return; }
  const refId = 'manual-' + Date.now();
  const now = new Date().toISOString();
  const person = { id: refId, name, role, refId, shiftStart: null, shiftEnd: null, expectedStart: null, expectedEnd: null, checkedIn: true, checkedInAt: now, signedOutAt: null, awayToday: false };
  if (type === 'cast') _cast.push(person); else _volunteers.push(person);
  closeAddSomeone();
  await persist(type, refId, person);
  renderStats(); renderAlerts(); renderContent();
}
</script>
