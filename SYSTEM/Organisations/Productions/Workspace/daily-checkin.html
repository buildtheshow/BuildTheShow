  <style>
    * { box-sizing: border-box; }

    @media (max-width: 900px) { .prod-main { margin-left: 0; max-width: 100vw; } .prod-main::before { inset: 0; } }

    /* ── Header ── */
    .dci-header { background: #fff; border-bottom: 1px solid rgba(87,46,136,0.1); padding: 1.1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .dci-header-left { display: flex; flex-direction: column; gap: 0.1rem; }
    .dci-kicker { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(87,46,136,0.55); display: flex; align-items: center; gap: 0.4rem; }

    .dci-date-picker:focus { border-color: #572e88; }
    .dci-mode-btn { padding: 0.45rem 1rem; border-radius: 8px; border: 1.5px solid rgba(87,46,136,0.22); background: #fff; color: #572e88; font-size: 0.78rem; font-weight: 850; cursor: pointer; font-family: var(--bts-font); display: flex; align-items: center; gap: 0.4rem; white-space: nowrap; }
    .dci-mode-btn:hover { background: rgba(87,46,136,0.06); }
    .dci-mode-btn.active { background: #572e88; color: #fff; border-color: #572e88; }

    /* ── Stats bar ── */
    .dci-stats { display: flex; gap: 0; border-bottom: 1px solid rgba(87,46,136,0.08); background: #fff; }
    .dci-stat { flex: 1; padding: 0.85rem 1.25rem; display: flex; flex-direction: column; gap: 0.1rem; border-right: 1px solid rgba(87,46,136,0.08); }
    .dci-stat:last-child { border-right: none; }
    .dci-stat-num { font-size: 1.4rem; font-weight: 950; color: #1a1530; line-height: 1; }
    .dci-stat-lbl { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(26,21,48,0.4); }
    .dci-stat.s-in .dci-stat-num { color: #2d6e35; }
    .dci-stat.s-out .dci-stat-num { color: #8a2a1a; }

    /* ── No events banner ── */
    .dci-no-events { padding: 3rem 2rem; text-align: center; color: rgba(26,21,48,0.45); }
    .dci-no-events-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.35rem; }

    /* ── Event tag strip ── */
    .dci-events-strip { padding: 0.65rem 2rem; background: #f7f5fc; border-bottom: 1px solid rgba(87,46,136,0.08); display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; font-size: 0.75rem; }
    .dci-event-tag { padding: 0.22rem 0.7rem; border-radius: 20px; font-weight: 800; font-size: 0.7rem; color: #fff; white-space: nowrap; }

    /* ── Body / two-column layout ── */
    .dci-body { display: flex; flex: 1; gap: 0; }
    .dci-col { flex: 1; min-width: 0; padding: 1.5rem 1.75rem; border-right: 1px solid rgba(87,46,136,0.08); }
    .dci-col:last-child { border-right: none; }
    @media (max-width: 700px) { .dci-body { flex-direction: column; } .dci-col { border-right: none; border-bottom: 1px solid rgba(87,46,136,0.08); } }

    .dci-col-header { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .dci-col-title { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(26,21,48,0.45); }
    .dci-col-count { font-size: 0.72rem; font-weight: 800; color: #572e88; background: rgba(87,46,136,0.08); border-radius: 12px; padding: 0.1rem 0.55rem; }
    .dci-search { width: 100%; border: 1.5px solid rgba(87,46,136,0.15); border-radius: 8px; padding: 0.5rem 0.75rem; font-family: var(--bts-font); font-size: 0.82rem; outline: none; background: #fff; margin-bottom: 0.85rem; }
    .dci-search:focus { border-color: #572e88; }

    /* ── Person row ── */
    .dci-person { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0.85rem; border-radius: 10px; background: #fff; border: 1.5px solid rgba(87,46,136,0.08); margin-bottom: 0.5rem; cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s; user-select: none; }
    .dci-person:hover { border-color: rgba(87,46,136,0.25); }
    .dci-person.checked-in { border-color: #769e7b; background: #f0f7f1; }
    .dci-avatar { width: 36px; height: 36px; border-radius: 50%; background: #ece6f5; color: #572e88; font-size: 0.8rem; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .dci-person.checked-in .dci-avatar { background: #769e7b; color: #fff; }
    .dci-person-info { flex: 1; min-width: 0; }
    .dci-person-name { font-size: 0.9rem; font-weight: 800; color: #1a1530; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dci-person-role { font-size: 0.72rem; color: rgba(26,21,48,0.5); margin-top: 0.05rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dci-person.checked-in .dci-person-name { color: #1a3a1e; }
    .dci-check-icon { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(87,46,136,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.85rem; color: rgba(87,46,136,0.3); transition: all 0.12s; }
    .dci-person.checked-in .dci-check-icon { background: #769e7b; border-color: #769e7b; color: #fff; }
    .dci-check-time { font-size: 0.62rem; color: #769e7b; font-weight: 800; margin-top: 0.1rem; text-align: right; white-space: nowrap; }

    .dci-empty { text-align: center; padding: 2rem 1rem; color: rgba(26,21,48,0.35); font-size: 0.82rem; }

    /* ── Kiosk mode ── */
    body.kiosk-mode .prod-main::before { opacity: 0.06; }
    body.kiosk-mode .dci-header { padding: 1.5rem 2.5rem; }
    body.kiosk-mode .dci-title { font-size: 2rem; }
    body.kiosk-mode .dci-body { flex-direction: column; }
    body.kiosk-mode .dci-col { border-right: none; border-bottom: 1px solid rgba(87,46,136,0.08); padding: 1.5rem 2rem; }
    body.kiosk-mode .dci-col-title { font-size: 0.9rem; }
    body.kiosk-mode .dci-col-count { font-size: 0.82rem; }
    body.kiosk-mode .dci-person { padding: 1rem 1.25rem; border-radius: 14px; margin-bottom: 0.65rem; }
    body.kiosk-mode .dci-avatar { width: 48px; height: 48px; font-size: 1rem; }
    body.kiosk-mode .dci-person-name { font-size: 1.2rem; }
    body.kiosk-mode .dci-person-role { font-size: 0.88rem; }
    body.kiosk-mode .dci-check-icon { width: 38px; height: 38px; font-size: 1.1rem; }
    body.kiosk-mode .dci-search { font-size: 1rem; padding: 0.75rem 1rem; }
    body.kiosk-mode .dci-kiosk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0.65rem; }

    /* ── Loading ── */
    .dci-loading { padding: 3rem 2rem; text-align: center; color: rgba(26,21,48,0.4); font-size: 0.9rem; }

    /* ── Kiosk overlay (self-check-in confirm) ── */
    .kiosk-confirm-overlay { position: fixed; inset: 0; background: rgba(23,18,43,0.7); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .kiosk-confirm-overlay.visible { display: flex; }
    .kiosk-confirm-box { background: #fff; border-radius: 20px; padding: 2.5rem 3rem; text-align: center; max-width: 380px; box-shadow: 0 32px 80px rgba(26,21,48,0.35); }
    .kiosk-confirm-icon { font-size: 3.5rem; margin-bottom: 0.75rem; }
    .kiosk-confirm-name { font-size: 1.6rem; font-weight: 950; color: #1a1530; margin-bottom: 0.3rem; }
    .kiosk-confirm-role { font-size: 0.95rem; color: rgba(26,21,48,0.5); margin-bottom: 1.5rem; }
    .kiosk-confirm-btn { width: 100%; padding: 1rem; border-radius: 12px; border: none; background: #769e7b; color: #fff; font-size: 1.1rem; font-weight: 900; font-family: var(--bts-font); cursor: pointer; }
    .kiosk-confirm-undo { margin-top: 0.75rem; font-size: 0.8rem; color: rgba(26,21,48,0.4); background: none; border: none; cursor: pointer; font-family: var(--bts-font); }
  </style>
</head>

<script>
'use strict';

const SUPA_URL = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';

const EV_COLOURS = { rehearsal:'#572e88', music_rehearsal:'#572e88', choreography:'#efab45', tech:'#476aaa', dress:'#476aaa', performance:'#d1523d', cast_party:'#ca7ea7', strike:'#dd8233', meeting:'#769e7b', event:'#769e7b', audition:'#476aaa', crew:'#572e88', deadline:'#ca7ea7', other:'#572e88' };
const EV_LABELS = { rehearsal:'Rehearsal', music_rehearsal:'Music Rehearsal', choreography:'Choreography', tech:'Tech', dress:'Dress Rehearsal', performance:'Performance', cast_party:'Cast Party', strike:'Strike', meeting:'Meeting', event:'Event', other:'Event' };

let _sb, _prodId = '', _date = '', _kioskMode = false;
let _todayEvents = [];
let _volunteers = [];      // { id, name, role, refId, checkedIn, checkedInAt }
let _cast = [];            // { id, name, role, refId, checkedIn, checkedInAt }
let _checkins = {};        // key: `${type}::${refId}` → { checkedIn, checkedInAt }
let _searchVol = '', _searchCast = '';
let _pendingKioskPerson = null;

window.initProductionPage('checkin');

document.addEventListener('DOMContentLoaded', async () => {
  _sb = supabase.createClient(SUPA_URL, SUPA_KEY);
  const params = new URLSearchParams(location.search);
  _prodId = params.get('id') || '';
  _date = params.get('date') || todayISO();

  const picker = document.getElementById('dci-date');
  picker.value = _date;
  picker.max = '';

  if (!_prodId) {
    document.getElementById('dci-main-area').innerHTML = '<div class="dci-loading">No production ID in URL.</div>';
    return;
  }
  await loadAll();
  render();
});

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function fmtTime(t) {
  if (!t) return '';
  const part = String(t).includes('T') ? String(t).split('T')[1] : t;
  const [h, m] = part.slice(0, 5).split(':').map(Number);
  const ap = h >= 12 ? 'pm' : 'am';
  return (h % 12 || 12) + (m ? ':' + String(m).padStart(2, '0') : '') + ap;
}

function initials(name) {
  const parts = String(name || '').trim().split(/\s+/);
  return parts.length >= 2 ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase() : (name || '?')[0].toUpperCase();
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Data loading ─────────────────────────────────────────────────────

async function loadAll() {
  const [evRes, volRes, castRes, assignRes, appsRes, booksRes, checkinsRes] = await Promise.all([
    _sb.from('production_events')
       .select('id,title,event_type,start_time,end_time,is_deadline')
       .eq('production_id', _prodId)
       .gte('start_time', _date + 'T00:00:00')
       .lte('start_time', _date + 'T23:59:59'),
    _sb.from('volunteer_signups')
       .select('id,name,role_name,shift_date,required_dates,status,shift_start_time,shift_end_time')
       .eq('production_id', _prodId)
       .eq('status', 'approved'),
    _sb.from('registration_payment_records')
       .select('casting_assignment_id,performer_name')
       .eq('production_id', _prodId),
    _sb.from('casting_assignments')
       .select('id,applicant_id,role_name,character_name')
       .eq('production_id', _prodId),
    _sb.from('audition_applications')
       .select('id,name,first_name,last_name')
       .eq('production_id', _prodId),
    _sb.from('audition_bookings')
       .select('id,name,first_name,last_name')
       .eq('production_id', _prodId),
    _sb.from('daily_checkins')
       .select('*')
       .eq('production_id', _prodId)
       .eq('check_in_date', _date),
  ]);

  // Today's events (skip deadlines)
  _todayEvents = (evRes.data || []).filter(e => !e.is_deadline);

  // Checkins map
  _checkins = {};
  (checkinsRes.data || []).forEach(c => {
    _checkins[`${c.person_type}::${c.ref_id}`] = { checkedIn: c.checked_in, checkedInAt: c.checked_in_at, dbId: c.id };
  });

  // Volunteers for today
  const volunteerRows = (volRes.data || []).filter(s => {
    if (s.shift_date) return s.shift_date === _date;
    const rd = Array.isArray(s.required_dates) ? s.required_dates : [];
    if (rd.length) return rd.some(r => String(r || '').slice(0, 10) === _date);
    // Flexible with no date — only show if there's any event today
    return _todayEvents.length > 0;
  });
  const nameMap = {};
  (appsRes.data || []).forEach(a => { nameMap[a.id] = [a.first_name, a.last_name].filter(Boolean).join(' ') || a.name; });
  (booksRes.data || []).forEach(b => { nameMap[b.id] = [b.first_name, b.last_name].filter(Boolean).join(' ') || b.name; });

  _volunteers = volunteerRows.map(s => {
    const key = `volunteer::${s.id}`;
    const ci = _checkins[key] || {};
    return { id: s.id, name: s.name || 'Volunteer', role: s.role_name || '', refId: String(s.id), checkedIn: !!ci.checkedIn, checkedInAt: ci.checkedInAt || null };
  });
  _volunteers.sort((a, b) => a.name.localeCompare(b.name));

  // Cast from registered participants
  const regMap = {};
  (castRes.data || []).forEach(r => {
    if (r.casting_assignment_id) regMap[String(r.casting_assignment_id)] = r.performer_name || '';
  });
  const assignments = (assignRes.data || []).filter(a => regMap[String(a.id)] !== undefined);
  _cast = assignments.map(a => {
    const performerName = regMap[String(a.id)] || nameMap[a.applicant_id] || 'Performer';
    const role = a.character_name || a.role_name || '';
    const key = `cast::${a.id}`;
    const ci = _checkins[key] || {};
    return { id: a.id, name: performerName, role, refId: String(a.id), checkedIn: !!ci.checkedIn, checkedInAt: ci.checkedInAt || null };
  });
  _cast.sort((a, b) => a.name.localeCompare(b.name));

  // Update prod name in kicker
  try {
    const { data: p } = await _sb.from('productions').select('title').eq('id', _prodId).single();
    const kicker = document.getElementById('dci-kicker-prod');
    if (kicker && p?.title) kicker.textContent = p.title;
    window.applyNavModuleVisibility && window.applyNavModuleVisibility(p?.enabled_modules || {});
  } catch (_) {}
}

// ── Render ────────────────────────────────────────────────────────────

function render() {
  renderEventStrip();
  renderStats();
  renderMain();
}

function renderEventStrip() {
  const strip = document.getElementById('dci-events-strip');
  if (!_todayEvents.length) { strip.style.display = 'none'; return; }
  strip.style.display = 'flex';
  strip.innerHTML = '<span style="font-size:0.72rem;font-weight:700;color:rgba(26,21,48,0.4);">Today:</span> ' +
    _todayEvents.map(ev => {
      const col = EV_COLOURS[ev.event_type] || '#572e88';
      const label = ev.title || EV_LABELS[ev.event_type] || 'Event';
      const time = fmtTime(ev.start_time);
      return `<span class="dci-event-tag" style="background:${esc(col)}">${esc(label)}${time ? ' · ' + esc(time) : ''}</span>`;
    }).join('');
}

function renderStats() {
  const all = [..._volunteers, ..._cast];
  const inCount = all.filter(p => p.checkedIn).length;
  document.getElementById('stat-expected').textContent = all.length;
  document.getElementById('stat-in').textContent = inCount;
  document.getElementById('stat-out').textContent = all.length - inCount;
}

function renderMain() {
  const hasToday = _todayEvents.length > 0 || _volunteers.length > 0 || _cast.length > 0;
  if (!hasToday) {
    document.getElementById('dci-main-area').innerHTML = `
      <div class="dci-no-events">
        <div class="dci-no-events-title">Nothing scheduled on this date</div>
        <div class="dci-no-events-sub">No calendar events, volunteers, or registered cast for ${_date}.</div>
      </div>`;
    return;
  }

  const volFiltered = _volunteers.filter(p => !_searchVol || p.name.toLowerCase().includes(_searchVol.toLowerCase()) || p.role.toLowerCase().includes(_searchVol.toLowerCase()));
  const castFiltered = _cast.filter(p => !_searchCast || p.name.toLowerCase().includes(_searchCast.toLowerCase()) || p.role.toLowerCase().includes(_searchCast.toLowerCase()));

  document.getElementById('dci-main-area').innerHTML = `
    <div class="dci-body">
      <div class="dci-col">
        <div class="dci-col-header">
          <div class="dci-col-title">Volunteers</div>
          <div class="dci-col-count">${_volunteers.filter(p => p.checkedIn).length} / ${_volunteers.length}</div>
        </div>
        <input class="dci-search" type="text" placeholder="Search volunteers..." value="${esc(_searchVol)}" oninput="onSearchVol(this.value)" />
        <div id="vol-list">
          ${volFiltered.length ? volFiltered.map(p => personRowHtml(p, 'volunteer')).join('') : '<div class="dci-empty">' + (_volunteers.length ? 'No results' : 'No volunteers scheduled today') + '</div>'}
        </div>
      </div>
      <div class="dci-col">
        <div class="dci-col-header">
          <div class="dci-col-title">Cast</div>
          <div class="dci-col-count">${_cast.filter(p => p.checkedIn).length} / ${_cast.length}</div>
        </div>
        <input class="dci-search" type="text" placeholder="Search cast..." value="${esc(_searchCast)}" oninput="onSearchCast(this.value)" />
        <div id="cast-list">
          ${castFiltered.length ? castFiltered.map(p => personRowHtml(p, 'cast')).join('') : '<div class="dci-empty">' + (_cast.length ? 'No results' : 'No registered cast found') + '</div>'}
        </div>
      </div>
    </div>`;
}

function personRowHtml(p, type) {
  const timeStr = p.checkedIn && p.checkedInAt ? fmtCheckedInTime(p.checkedInAt) : '';
  return `<div class="dci-person${p.checkedIn ? ' checked-in' : ''}" onclick="handlePersonTap('${esc(type)}','${esc(p.refId)}')" data-type="${esc(type)}" data-ref="${esc(p.refId)}">
    <div class="dci-avatar">${esc(initials(p.name))}</div>
    <div class="dci-person-info">
      <div class="dci-person-name">${esc(p.name)}</div>
      ${p.role ? `<div class="dci-person-role">${esc(p.role)}</div>` : ''}
      ${timeStr ? `<div class="dci-check-time">${esc(timeStr)}</div>` : ''}
    </div>
    <div class="dci-check-icon">${p.checkedIn ? '&#10003;' : ''}</div>
  </div>`;
}

function fmtCheckedInTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'pm' : 'am';
  return 'In at ' + (h % 12 || 12) + ':' + String(m).padStart(2, '0') + ap;
}

// ── Interactions ──────────────────────────────────────────────────────

function onDateChange(val) {
  _date = val;
  _checkins = {};
  _volunteers = [];
  _cast = [];
  document.getElementById('dci-main-area').innerHTML = '<div class="dci-loading">Loading...</div>';
  loadAll().then(render);
}

function onSearchVol(val) {
  _searchVol = val;
  renderMain();
}

function onSearchCast(val) {
  _searchCast = val;
  renderMain();
}

function handlePersonTap(type, refId) {
  const list = type === 'volunteer' ? _volunteers : _cast;
  const person = list.find(p => p.refId === refId);
  if (!person) return;
  if (_kioskMode && !person.checkedIn) {
    _pendingKioskPerson = { type, refId, person };
    document.getElementById('kc-name').textContent = person.name;
    document.getElementById('kc-role').textContent = person.role || (type === 'volunteer' ? 'Volunteer' : 'Cast Member');
    document.getElementById('kiosk-confirm').classList.add('visible');
    return;
  }
  toggleCheckIn(type, refId, person);
}

function closeKioskConfirm(confirm) {
  document.getElementById('kiosk-confirm').classList.remove('visible');
  if (confirm && _pendingKioskPerson) {
    const { type, refId, person } = _pendingKioskPerson;
    toggleCheckIn(type, refId, person);
  }
  _pendingKioskPerson = null;
}

async function toggleCheckIn(type, refId, person) {
  const newVal = !person.checkedIn;
  const now = newVal ? new Date().toISOString() : null;

  // Optimistic update
  person.checkedIn = newVal;
  person.checkedInAt = now;
  _checkins[`${type}::${refId}`] = { checkedIn: newVal, checkedInAt: now };
  renderStats();
  updatePersonRow(type, refId, person);

  // Persist
  try {
    const existing = _checkins[`${type}::${refId}`];
    const payload = {
      production_id: _prodId,
      check_in_date: _date,
      person_type: type,
      ref_id: refId,
      person_name: person.name,
      role_name: person.role || null,
      checked_in: newVal,
      checked_in_at: now,
    };
    await _sb.from('daily_checkins').upsert(payload, { onConflict: 'production_id,check_in_date,person_type,ref_id' });
  } catch (e) {
    console.warn('[BTS] checkin save failed:', e?.message);
  }
}

function updatePersonRow(type, refId, person) {
  const el = document.querySelector(`.dci-person[data-type="${CSS.escape(type)}"][data-ref="${CSS.escape(refId)}"]`);
  if (!el) return;
  el.outerHTML = personRowHtml(person, type);
}

function toggleKioskMode() {
  _kioskMode = !_kioskMode;
  document.body.classList.toggle('kiosk-mode', _kioskMode);
  const btn = document.getElementById('dci-mode-btn');
  btn.classList.toggle('active', _kioskMode);
  btn.querySelector('svg + span') && (btn.lastChild.textContent = _kioskMode ? ' Exit Kiosk' : ' Kiosk Mode');
  // Rebuild button text properly
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg> ${_kioskMode ? 'Exit Kiosk' : 'Kiosk Mode'}`;
}
</script>

</body>
</html>
