<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promote at a glance - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v51-20260704" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem 2.25rem;
      max-width: calc(100vw - 220px);
      overflow-x: clip;
      position: relative;
     z-index: 0; }
    .prod-main::before {
      content: '';
      position: fixed;
      inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.04;
      pointer-events: none;
      z-index: -1;
    }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero" style="margin-bottom:0.4rem;">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Promote</span></span>
            </div>
            <h1 class="aud-visual-title">Dashboard</h1>
            <p class="aud-visual-copy">Marketing, sponsors, and your programme all in one place.</p>
          </div>
        </div>
      </div>

      <nav class="dash-nav-chips" id="dash-nav-chips" aria-label="Promote sections"></nav>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=67-20260704"></script>
  <script>
    window.initProductionPage('promote');
  </script>
  <script>
    const CHIPS = [
      { label: 'Marketing',  file: 'marketing-dashboard.html', icon: '/ASSETS/Images/Icons/Messages.svg?v=20260704',                colour: '#efab45', desc: 'Assets, media, tasks, and calendar' },
      { label: 'Sponsors',   file: 'promote-sponsors.html',    icon: '/ASSETS/Images/Icons/Budgeting-Sponsorship.svg?v=20260704c', colour: '#d1523d', desc: 'Track sponsors and deliverables' },
      { label: 'Programme',  file: 'promote-programme.html',   icon: '/ASSETS/Images/Icons/script-script.svg?v=20260704',          colour: '#769e7b', desc: 'Build your show programme' },
    ];
    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    document.getElementById('dash-nav-chips').innerHTML = CHIPS.map(c => `
      <button class="dash-nav-chip" onclick="btsProdNav('${c.file}')" style="--chip-colour:${c.colour};">
        <div class="dash-nav-chip-top">
          <img class="dash-nav-chip-icon" src="${c.icon}" alt="" aria-hidden="true" />
          <div class="dash-nav-chip-label">${esc(c.label)}</div>
        </div>
        <div class="dash-nav-chip-desc">${esc(c.desc)}</div>
      </button>`).join('');
  </script>
</body>
</html>
