<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Registration Status - Build The Show</title></head>
<body>
<script>
  (function () {
    var p = new URLSearchParams(location.search);
    var id = p.get('id') || '';
    var dest = '/SYSTEM/Organisations/Productions/Workspace/production-workspace.html'
      + (id ? '?id=' + encodeURIComponent(id) + '&' : '?')
      + 'tab=registration&sub=payments'
      + (p.get('portal') ? '&portal=1' : '');
    window.location.replace(dest);
  })();
</script>
</body>
</html>
