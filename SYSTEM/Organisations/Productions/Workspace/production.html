<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css" />
  <style>
    /* ── Layout ───────────────────────────────────────────────── */
    body {
      margin: 0;
      min-height: 100vh;
      position: relative;
      background: #ffffff;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('/ASSETS/Images/Grid-purple.png');
      background-repeat: repeat;
      background-size: 50%;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }

    .prod-main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
    }

    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 57px);
      color: #7a7490;
      font-size: 0.9375rem;
    }

    /* ── Nav link ─────────────────────────────────────────────── */
    .nav-link {
      color: #7a7490;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: #f0ecf8;
    }

    /* ── Section spacing ──────────────────────────────────────── */
    .prod-section {
      margin-bottom: 3rem;
    }

    /* ── Production Header ────────────────────────────────────── */
    .prod-header {
      margin-bottom: 2.5rem;
    }

    .prod-header-top {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .prod-title {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #f0ecf8;
      line-height: 1.15;
      flex: 1;
    }

    .status-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      margin-top: 0.35rem;
    }

    .status-badge--draft {
      background: rgba(122, 116, 144, 0.15);
      color: #7a7490;
      border: 1px solid rgba(122, 116, 144, 0.25);
    }

    .status-badge--published {
      background: rgba(52, 199, 89, 0.12);
      color: #4cd96a;
      border: 1px solid rgba(52, 199, 89, 0.3);
    }

    .status-badge::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .prod-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn--primary-sm {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      background: #572e88;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 700;
      font-family: inherit;
      border: none;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .btn--primary-sm:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(87, 46, 136, 0.4);
    }

    .btn--primary-sm:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn--accent-sm {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      background: #efab45;
      color: #1a1008;
      font-size: 0.875rem;
      font-weight: 700;
      font-family: inherit;
      border: none;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .btn--accent-sm:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(239, 171, 69, 0.35);
    }

    .btn--delete-link {
      background: none;
      border: none;
      color: #e05555;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      padding: 0.4rem 0;
      text-decoration: underline;
      text-decoration-color: rgba(224, 85, 85, 0.4);
      transition: color 0.2s, text-decoration-color 0.2s;
    }

    .btn--delete-link:hover {
      color: #f08080;
      text-decoration-color: rgba(240, 128, 128, 0.6);
    }

    .btn--ghost-sm {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 7px;
      background: transparent;
      color: #7a7490;
      font-size: 0.8125rem;
      font-weight: 600;
      font-family: inherit;
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .btn--ghost-sm:hover {
      color: #f0ecf8;
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.04);
    }

    /* ── Section heading ──────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      gap: 1rem;
    }

    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f0ecf8;
      letter-spacing: -0.01em;
    }

    .section-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 3rem 0;
    }

    /* ── Cards ────────────────────────────────────────────────── */
    .content-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(87, 46, 136, 0.4);
      border-radius: 14px;
      padding: 2rem;
      margin-bottom: 1rem;
    }

    /* ── Edit form ────────────────────────────────────────────── */
    .edit-form-wrap {
      display: none;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(87, 46, 136, 0.4);
      border-radius: 14px;
      padding: 2rem;
      margin-top: 1.5rem;
    }

    .edit-form-wrap.visible {
      display: block;
    }

    .edit-form-title {
      font-size: 1rem;
      font-weight: 700;
      color: #f0ecf8;
      margin-bottom: 1.5rem;
    }

    /* ── Inline forms (audition / role add) ───────────────────── */
    .inline-form-wrap {
      display: none;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(87, 46, 136, 0.35);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1rem;
    }

    .inline-form-wrap.visible {
      display: block;
    }

    .inline-form-buttons {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    /* ── Form elements ────────────────────────────────────────── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }

    .form-label {
      display: block;
      color: #7a7490;
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .form-input,
    .form-textarea {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f0ecf8;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      width: 100%;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-textarea {
      resize: vertical;
      min-height: 90px;
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: #4a4460;
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: #572e88;
      box-shadow: 0 0 0 3px rgba(87, 46, 136, 0.15);
    }

    /* ── Status radio (edit form) ─────────────────────────────── */
    .status-options {
      display: flex;
      gap: 0.75rem;
    }

    .status-option {
      flex: 1;
    }

    .status-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .status-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      color: #7a7490;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: none;
      letter-spacing: 0;
      margin-bottom: 0;
    }

    .status-option label:hover {
      border-color: rgba(87, 46, 136, 0.5);
      color: #f0ecf8;
      background: rgba(87, 46, 136, 0.1);
    }

    .status-option input[type="radio"]:checked + label {
      border-color: rgba(87, 46, 136, 0.8);
      background: rgba(87, 46, 136, 0.2);
      color: #f0ecf8;
      box-shadow: 0 0 16px rgba(87, 46, 136, 0.25);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── Audition cards ───────────────────────────────────────── */
    .audition-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .audition-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(87, 46, 136, 0.3);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.2s;
    }

    .audition-card:hover {
      border-color: rgba(87, 46, 136, 0.55);
    }

    .audition-card-body {
      flex: 1;
      min-width: 0;
    }

    .audition-type {
      font-size: 0.9375rem;
      font-weight: 700;
      color: #f0ecf8;
      margin-bottom: 0.25rem;
    }

    .audition-dates {
      font-size: 0.8125rem;
      color: #efab45;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .audition-instructions {
      font-size: 0.8375rem;
      color: #7a7490;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .btn--icon-delete {
      background: none;
      border: none;
      color: #7a7490;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn--icon-delete:hover {
      color: #e05555;
      background: rgba(224, 85, 85, 0.1);
    }

    /* ── Role pills ───────────────────────────────────────────── */
    .roles-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 0.25rem;
    }

    .role-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(87, 46, 136, 0.18);
      border: 1px solid rgba(87, 46, 136, 0.4);
      border-radius: 20px;
      padding: 0.3rem 0.75rem 0.3rem 0.9rem;
      color: #d4c4f0;
      font-size: 0.8375rem;
      font-weight: 600;
    }

    .role-pill-delete {
      background: none;
      border: none;
      color: #7a7490;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color 0.2s;
      font-family: inherit;
    }

    .role-pill-delete:hover {
      color: #e05555;
    }

    /* ── Role inline add form ─────────────────────────────────── */
    .role-add-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .role-add-row .form-input {
      flex: 1;
    }

    /* ── Casting board placeholder ────────────────────────────── */
    .casting-placeholder {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(87, 46, 136, 0.25);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .casting-placeholder p {
      color: #7a7490;
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    /* ── Inline error/success ─────────────────────────────────── */
    .form-error {
      display: none;
      background: rgba(220, 60, 60, 0.12);
      border: 1px solid rgba(220, 60, 60, 0.35);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.875rem;
      color: #f08080;
      margin-bottom: 1rem;
    }

    .form-error.visible {
      display: block;
    }

    .empty-state {
      background: rgba(15, 14, 28, 0.5);
      border: 1px dashed rgba(87, 46, 136, 0.3);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      color: #7a7490;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 640px) {
      .prod-main {
        padding: 2rem 1rem 5rem;
      }

      .prod-header-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .status-options {
        flex-direction: column;
      }
    }
    /* ── Toast ── */
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); color:#e8e0ff; padding:0.7rem 1.2rem; border-radius:0.5rem; font-size:0.87rem; opacity:0; transform:translateY(6px); transition:opacity 0.2s,transform 0.2s; pointer-events:none; z-index:9999; }
    .toast.visible { opacity:1; transform:translateY(0); }
    .toast.toast--error { background:rgba(220,60,60,0.12); border-color:rgba(220,60,60,0.35); color:#f08080; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="grid-bg"></div>

  <div id="nav"></div>

  <main class="prod-main" id="prod-main">
    <div class="loading-state" id="loading-state">Opening the curtain...</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    let toastTimer;
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      clearTimeout(toastTimer);
      t.textContent = msg;
      t.classList.toggle('toast--error', isError);
      t.classList.add('visible');
      toastTimer = setTimeout(() => t.classList.remove('visible'), 3000);
    }

    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    // ── Helper: escape user text ──────────────────────────────────
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    const params = new URLSearchParams(window.location.search);
    let productionId = params.get('id');

// DEV fallback so page works when opened directly
    if (!productionId) {
    productionId = '1'; // temporary test ID
  }

    const main = document.getElementById('prod-main');

    // State
    let currentProduction = null;
    let currentAuditions = [];
    let currentRoles = [];

    // ── Redirect guard ────────────────────────────────────────────
    async function init() {
      if (!productionId) {
      main.innerHTML = `<div class="loading-state" style="color:#f08080;">No production ID found in the URL.</div>`;
      return;
    }

      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = '../../../Members/Account/login.html';
        return;
      }

      await loadAll();
    }

    // ── Load all data ─────────────────────────────────────────────
    async function loadAll() {
      const [prodResult, audResult, rolesResult] = await Promise.all([
        sb.from('productions').select('*').eq('id', productionId).single(),
        sb.from('auditions').select('*').eq('production_id', productionId).order('created_at', { ascending: true }),
        sb.from('roles').select('*').eq('production_id', productionId).order('created_at', { ascending: true }),
      ]);

      if (prodResult.error || !prodResult.data) {
        main.innerHTML = `<div class="loading-state" style="color:#f08080;">Production not found.</div>`;
        return;
      }

      currentProduction = prodResult.data;
      currentAuditions = audResult.data || [];
      currentRoles = rolesResult.data || [];

      render();
    }

    // ── Status badge HTML ─────────────────────────────────────────
    function statusBadgeHTML(status) {
      const cls = status === 'published' ? 'status-badge--published' : 'status-badge--draft';
      const label = status === 'published' ? 'Published' : 'Draft';
      return `<span class="status-badge ${cls}">${label}</span>`;
    }

    // ── Render full page ──────────────────────────────────────────
    function render() {
      const p = currentProduction;
      const hasAuditions = currentAuditions.length > 0;
      const hasRoles = currentRoles.length > 0;
      const castingEnabled = hasAuditions && hasRoles;

      const auditonsHTML = hasAuditions
        ? `<div class="audition-list" id="audition-list">${currentAuditions.map(auditionCardHTML).join('')}</div>`
        : `<div class="empty-state" id="audition-list">No auditions added yet.</div>`;

      const rolesHTML = hasRoles
        ? `<div class="roles-list" id="roles-list">${currentRoles.map(rolePillHTML).join('')}</div>`
        : `<div class="empty-state" id="roles-list" style="margin-bottom:0.5rem;">No roles added yet.</div>`;

      main.innerHTML = `

        <!-- ── SECTION 1: Production Header ── -->
        <div class="prod-section">
          <div class="prod-header">
            <div class="prod-header-top">
              <h1 class="prod-title" id="prod-title-display">${esc(p.title)}</h1>
              ${statusBadgeHTML(p.status)}
            </div>
            <div class="prod-actions">
              <button class="btn--primary-sm" id="edit-toggle-btn">Edit Production</button>
              <button class="btn--delete-link" id="delete-prod-btn">Delete Production</button>
            </div>
          </div>

          <!-- Edit form (hidden by default) -->
          <div class="edit-form-wrap" id="edit-form-wrap">
            <p class="edit-form-title">Edit Production</p>
            <div class="form-error" id="edit-error"></div>
            <div class="form-group">
              <label class="form-label" for="edit-title">Production Title</label>
              <input class="form-input" type="text" id="edit-title" value="${esc(p.title)}" />
            </div>
            <div class="form-group">
              <label class="form-label" for="edit-description">Description</label>
              <textarea class="form-textarea" id="edit-description" rows="4">${esc(p.description || '')}</textarea>
            </div>
            <div class="form-group">
              <span class="form-label">Status</span>
              <div class="status-options">
                <div class="status-option">
                  <input type="radio" name="edit-status" id="edit-status-draft" value="draft" ${p.status !== 'published' ? 'checked' : ''} />
                  <label for="edit-status-draft"><span class="status-dot"></span>Draft</label>
                </div>
                <div class="status-option">
                  <input type="radio" name="edit-status" id="edit-status-published" value="published" ${p.status === 'published' ? 'checked' : ''} />
                  <label for="edit-status-published"><span class="status-dot"></span>Published</label>
                </div>
              </div>
            </div>
            <div class="inline-form-buttons">
              <button class="btn--primary-sm" id="edit-save-btn">Save Changes</button>
              <button class="btn--ghost-sm" id="edit-cancel-btn">Cancel</button>
            </div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- ── SECTION 2: Auditions ── -->
        <div class="prod-section">
          <div class="section-header">
            <span class="section-title">Auditions</span>
            <button class="btn--primary-sm" id="add-audition-btn">+ Add Audition</button>
          </div>

          ${auditonsHTML}

          <!-- Add audition inline form -->
          <div class="inline-form-wrap" id="audition-form-wrap">
            <div class="form-error" id="audition-error"></div>
            <div class="form-group">
              <label class="form-label" for="aud-type">Type</label>
              <input class="form-input" type="text" id="aud-type" placeholder="e.g. Open Call, Callback" />
            </div>
            <div class="form-group">
              <label class="form-label" for="aud-dates">Dates</label>
              <input class="form-input" type="text" id="aud-dates" placeholder="e.g. March 20-21, 2026" />
            </div>
            <div class="form-group">
              <label class="form-label" for="aud-instructions">Instructions</label>
              <textarea class="form-textarea" id="aud-instructions" rows="3" placeholder="Preparation notes, what to bring, etc."></textarea>
            </div>
            <div class="inline-form-buttons">
              <button class="btn--primary-sm" id="aud-save-btn">Save Audition</button>
              <button class="btn--ghost-sm" id="aud-cancel-btn">Cancel</button>
            </div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- ── SECTION 3: Roles ── -->
        <div class="prod-section">
          <div class="section-header">
            <span class="section-title">Roles</span>
            <button class="btn--primary-sm" id="add-role-btn">+ Add Role</button>
          </div>

          ${rolesHTML}

          <!-- Add role inline form -->
          <div class="inline-form-wrap" id="role-form-wrap">
            <div class="form-error" id="role-error"></div>
            <div class="form-group">
              <label class="form-label" for="role-name">Role Name</label>
              <div class="role-add-row">
                <input class="form-input" type="text" id="role-name" placeholder="e.g. Cinderella" />
                <button class="btn--primary-sm" id="role-save-btn">Add</button>
              </div>
            </div>
            <div class="inline-form-buttons" style="margin-top:0;">
              <button class="btn--ghost-sm" id="role-cancel-btn">Cancel</button>
            </div>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- ── SECTION 4: Casting Board ── -->
        <div class="prod-section">
          <div class="section-header">
            <span class="section-title">Casting Board</span>
          </div>
          <div class="casting-placeholder">
            <p>${castingEnabled
              ? 'Your production is ready for casting. Open the casting board to assign roles to auditionees.'
              : 'Casting opens once you have auditions and roles set up.'
            }</p>
            ${castingEnabled
              ? `<a href="production-workspace.html?id=${esc(productionId)}&tab=casting&sub=castboard" class="btn--primary-sm">Open Casting Board</a>`
              : `<button class="btn--primary-sm" disabled>Open Casting Board</button>`
            }
          </div>
        </div>
      `;

      bindEvents();
    }

    // ── Audition card HTML ────────────────────────────────────────
    function auditionCardHTML(a) {
      return `
        <div class="audition-card" data-id="${esc(a.id)}">
          <div class="audition-card-body">
            <div class="audition-type">${esc(a.type)}</div>
            ${a.dates ? `<div class="audition-dates">${esc(a.dates)}</div>` : ''}
            ${a.instructions ? `<div class="audition-instructions">${esc(a.instructions)}</div>` : ''}
          </div>
          <button class="btn--icon-delete" data-id="${esc(a.id)}" aria-label="Delete audition" title="Delete audition">&#x2715;</button>
        </div>
      `;
    }

    // ── Role pill HTML ────────────────────────────────────────────
    function rolePillHTML(r) {
      return `
        <span class="role-pill" data-id="${esc(r.id)}">
          ${esc(r.name)}
          <button class="role-pill-delete" data-id="${esc(r.id)}" aria-label="Delete role" title="Delete role">&#x2715;</button>
        </span>
      `;
    }

    // ── Bind all event listeners ──────────────────────────────────
    function bindEvents() {
      // Edit toggle
      document.getElementById('edit-toggle-btn').addEventListener('click', () => {
        const wrap = document.getElementById('edit-form-wrap');
        wrap.classList.toggle('visible');
        document.getElementById('edit-toggle-btn').textContent =
          wrap.classList.contains('visible') ? 'Cancel Editing' : 'Edit Production';
      });

      document.getElementById('edit-cancel-btn').addEventListener('click', () => {
        document.getElementById('edit-form-wrap').classList.remove('visible');
        document.getElementById('edit-toggle-btn').textContent = 'Edit Production';
      });

      document.getElementById('edit-save-btn').addEventListener('click', saveEdit);

      // Delete production
      document.getElementById('delete-prod-btn').addEventListener('click', deleteProduction);

      // Audition toggle
      document.getElementById('add-audition-btn').addEventListener('click', () => {
        const wrap = document.getElementById('audition-form-wrap');
        wrap.classList.toggle('visible');
      });

      document.getElementById('aud-cancel-btn').addEventListener('click', () => {
        document.getElementById('audition-form-wrap').classList.remove('visible');
        clearAuditionForm();
      });

      document.getElementById('aud-save-btn').addEventListener('click', saveAudition);

      // Audition delete (event delegation)
      main.addEventListener('click', (e) => {
        const deleteBtn = e.target.closest('.btn--icon-delete');
        if (deleteBtn) {
          deleteAudition(deleteBtn.dataset.id);
        }

        const rolePillDelete = e.target.closest('.role-pill-delete');
        if (rolePillDelete) {
          deleteRole(rolePillDelete.dataset.id);
        }
      });

      // Role toggle
      document.getElementById('add-role-btn').addEventListener('click', () => {
        const wrap = document.getElementById('role-form-wrap');
        wrap.classList.toggle('visible');
        if (wrap.classList.contains('visible')) {
          document.getElementById('role-name').focus();
        }
      });

      document.getElementById('role-cancel-btn').addEventListener('click', () => {
        document.getElementById('role-form-wrap').classList.remove('visible');
        document.getElementById('role-name').value = '';
      });

      document.getElementById('role-save-btn').addEventListener('click', saveRole);

      document.getElementById('role-name').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveRole(); }
      });
    }

    // ── Save edit ─────────────────────────────────────────────────
    async function saveEdit() {
      const errorEl = document.getElementById('edit-error');
      errorEl.classList.remove('visible');

      const title = document.getElementById('edit-title').value.trim();
      const description = document.getElementById('edit-description').value.trim();
      const status = document.querySelector('input[name="edit-status"]:checked').value;

      if (!title) {
        errorEl.textContent = 'Title is required.';
        errorEl.classList.add('visible');
        return;
      }

      const saveBtn = document.getElementById('edit-save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      const { error } = await supabase
        .from('productions')
        .update({ title, description, status })
        .eq('id', productionId);

      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('visible');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
        return;
      }

      await loadAll();
    }

    // ── Delete production ─────────────────────────────────────────
    async function deleteProduction() {
      if (!confirm('Are you sure you want to delete this production? This cannot be undone.')) return;

      const { error } = await supabase
        .from('productions')
        .delete()
        .eq('id', productionId);

      if (error) {
        showToast('Error deleting production: ' + error.message, true);
        return;
      }

      window.location.href = '../../org-dashboard.html';
    }

    // ── Save audition ─────────────────────────────────────────────
    async function saveAudition() {
      const errorEl = document.getElementById('audition-error');
      errorEl.classList.remove('visible');

      const type = document.getElementById('aud-type').value.trim();
      const dates = document.getElementById('aud-dates').value.trim();
      const instructions = document.getElementById('aud-instructions').value.trim();

      if (!type) {
        errorEl.textContent = 'Audition type is required.';
        errorEl.classList.add('visible');
        return;
      }

      const saveBtn = document.getElementById('aud-save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      const { error } = await supabase
        .from('auditions')
        .insert({ production_id: productionId, type, instructions, dates });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('visible');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Audition';
        return;
      }

      clearAuditionForm();
      document.getElementById('audition-form-wrap').classList.remove('visible');
      await loadAll();
    }

    function clearAuditionForm() {
      document.getElementById('aud-type').value = '';
      document.getElementById('aud-dates').value = '';
      document.getElementById('aud-instructions').value = '';
    }

    // ── Delete audition ───────────────────────────────────────────
    async function deleteAudition(id) {
      if (!confirm('Delete this audition?')) return;

      const { error } = await supabase
        .from('auditions')
        .delete()
        .eq('id', id);

      if (error) {
        showToast('Error deleting audition: ' + error.message, true);
        return;
      }

      await loadAll();
    }

    // ── Save role ─────────────────────────────────────────────────
    async function saveRole() {
      const errorEl = document.getElementById('role-error');
      errorEl.classList.remove('visible');

      const name = document.getElementById('role-name').value.trim();

      if (!name) {
        errorEl.textContent = 'Role name is required.';
        errorEl.classList.add('visible');
        return;
      }

      const saveBtn = document.getElementById('role-save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Adding...';

      const { error } = await supabase
        .from('roles')
        .insert({ production_id: productionId, name });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('visible');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Add';
        return;
      }

      document.getElementById('role-name').value = '';
      document.getElementById('role-form-wrap').classList.remove('visible');
      await loadAll();
    }

    // ── Delete role ───────────────────────────────────────────────
    async function deleteRole(id) {
      if (!confirm('Delete this role?')) return;

      const { error } = await supabase
        .from('roles')
        .delete()
        .eq('id', id);

      if (error) {
        showToast('Error deleting role: ' + error.message, true);
        return;
      }

      await loadAll();
    }

    init();

// ── Load shared production nav ──
   fetch('../../../../SHARED/Navigation/production-nav.html')
     .then(res => res.text())
     .then(html => {
    document.getElementById('nav').innerHTML = html;
  });
  </script>

  <script defer src="../../../../SHARED/Components/legal-footer.js"></script>
  <script defer src="/SHARED/Components/text-fit.js"></script>
</body>
</html>
