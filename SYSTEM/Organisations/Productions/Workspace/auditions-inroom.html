<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In The Room - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v49-20260618" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    .page-kicker { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,21,48,0.38); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .page-kicker-dot { width: 6px; height: 6px; border-radius: 50%; background: #572e88; flex-shrink: 0; }
    .page-title { font-size: 2rem; font-weight: 950; color: #1a1530; margin: 0 0 1.25rem; }

    .ir-session-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .ir-session-pill { font-size: 0.78rem; font-weight: 800; border-radius: 100px; padding: 0.35rem 0.85rem; border: 1.5px solid rgba(87,46,136,0.18); background: #fff; color: rgba(26,21,48,0.55); cursor: pointer; font-family: var(--bts-font); transition: all 0.12s; display: flex; align-items: center; gap: 0.4rem; }
    .ir-session-pill:hover { border-color: #572e88; color: #572e88; }
    .ir-session-pill.active { color: #fff; border-color: transparent; }
    .ir-session-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .ir-layout { display: grid; grid-template-columns: 240px 1fr; gap: 1.5rem; align-items: start; }
    @media (max-width: 840px) { .ir-layout { grid-template-columns: 1fr; } }

    .ir-queue { display: flex; flex-direction: column; gap: 0; }
    .ir-queue-head { font-size: 0.68rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(26,21,48,0.38); padding-bottom: 0.5rem; border-bottom: 1.5px solid rgba(87,46,136,0.1); margin-bottom: 0.5rem; }
    .ir-queue-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0.75rem; border-radius: 7px; cursor: pointer; transition: background 0.1s; }
    .ir-queue-item:hover { background: rgba(87,46,136,0.05); }
    .ir-queue-item.active { background: rgba(87,46,136,0.09); }
    .ir-queue-avatar { width: 30px; height: 30px; border-radius: 50%; background: #ece8ff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.7rem; color: #572e88; overflow: hidden; flex-shrink: 0; }
    .ir-queue-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .ir-queue-name { font-size: 0.8rem; font-weight: 800; }
    .ir-queue-sub { font-size: 0.68rem; color: rgba(26,21,48,0.45); margin-top: 0.05rem; }
    .ir-queue-scored { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: #208348; flex-shrink: 0; }

    .ir-panel { min-width: 0; }
    .ir-empty-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 280px; color: rgba(26,21,48,0.35); font-size: 0.9rem; text-align: center; border: 1.5px dashed rgba(87,46,136,0.14); border-radius: 12px; padding: 2rem; }

    .ir-card { border: 1.5px solid rgba(87,46,136,0.12); border-radius: 12px; overflow: hidden; }
    .ir-card-head { display: flex; align-items: flex-start; gap: 1.1rem; padding: 1.4rem 1.5rem; background: rgba(87,46,136,0.04); border-bottom: 1px solid rgba(87,46,136,0.08); }
    .ir-card-headshot { width: 72px; height: 86px; border-radius: 7px; object-fit: cover; object-position: top; flex-shrink: 0; background: #ece8ff; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 900; color: #572e88; overflow: hidden; }
    .ir-card-headshot img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .ir-card-name { font-size: 1.35rem; font-weight: 950; }
    .ir-card-meta { font-size: 0.8rem; color: rgba(26,21,48,0.5); margin-top: 0.25rem; }
    .ir-card-roles { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.55rem; }
    .ir-role-pill { font-size: 0.68rem; font-weight: 850; border-radius: 100px; padding: 0.18rem 0.5rem; background: #f0ecfc; color: #572e88; }

    .ir-scores { padding: 1.25rem 1.5rem; border-bottom: 1px solid rgba(87,46,136,0.08); }
    .ir-score-label { font-size: 0.68rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(26,21,48,0.38); margin-bottom: 0.75rem; }
    .ir-score-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.65rem; flex-wrap: wrap; }
    .ir-score-cat { font-size: 0.8rem; font-weight: 800; width: 60px; flex-shrink: 0; }
    .ir-imp-btns { display: flex; gap: 0.35rem; }
    .ir-imp-btn { font-size: 0.72rem; font-weight: 850; border-radius: 7px; padding: 0.3rem 0.65rem; border: 1.5px solid rgba(87,46,136,0.18); background: #fff; cursor: pointer; font-family: var(--bts-font); transition: all 0.12s; color: rgba(26,21,48,0.6); }
    .ir-imp-btn:hover { border-color: #572e88; color: #572e88; }
    .ir-imp-btn.sel-yes    { background: #208348; color: #fff; border-color: #208348; }
    .ir-imp-btn.sel-maybe  { background: #efab45; color: #1a1530; border-color: #efab45; }
    .ir-imp-btn.sel-no     { background: #d1523d; color: #fff; border-color: #d1523d; }

    .ir-notes { padding: 1.25rem 1.5rem; }
    .ir-notes-label { font-size: 0.68rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(26,21,48,0.38); margin-bottom: 0.5rem; }
    .ir-notes textarea { width: 100%; border: 1.5px solid rgba(87,46,136,0.16); border-radius: 8px; padding: 0.65rem 0.85rem; font-size: 0.85rem; font-family: var(--bts-font); color: #1a1530; resize: vertical; min-height: 80px; outline: none; transition: border-color 0.12s; }
    .ir-notes textarea:focus { border-color: #572e88; }

    .ir-actions { padding: 1rem 1.5rem; display: flex; gap: 0.65rem; align-items: center; border-top: 1px solid rgba(87,46,136,0.08); }
    .ir-save-btn { font-size: 0.8rem; font-weight: 850; border-radius: 8px; padding: 0.5rem 1.1rem; border: none; background: #572e88; color: #fff; cursor: pointer; font-family: var(--bts-font); transition: background 0.12s; }
    .ir-save-btn:hover { background: #3d1f66; }
    .ir-callback-btn { font-size: 0.78rem; font-weight: 800; border-radius: 8px; padding: 0.48rem 0.9rem; border: 1.5px solid rgba(87,46,136,0.22); background: #fff; color: #572e88; cursor: pointer; font-family: var(--bts-font); transition: all 0.12s; }
    .ir-callback-btn:hover { background: #f0ecfc; }
    .ir-callback-btn.active { background: #efab45; color: #1a1530; border-color: #efab45; }
    .ir-saved-msg { font-size: 0.75rem; font-weight: 800; color: #208348; }

    .ir-loading { color: rgba(26,21,48,0.38); font-size: 0.88rem; padding: 1rem 0; }
    .ir-no-checkins { padding: 2rem; text-align: center; color: rgba(26,21,48,0.38); font-size: 0.88rem; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>
  <div class="prod-main">
    <div class="prod-main-inner">
      <div class="page-kicker"><span class="page-kicker-dot"></span>AUDITIONS</div>
      <h1 class="page-title">In The Room</h1>
      <div id="ir-root"><div class="ir-loading">Loading...</div></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=26"></script>
  <script>
    window.initProductionPage('cast');

    const SESSION_COLORS = {
      audition: '#572e88', general: '#572e88',
      dance_call: '#78bbd4', dance: '#78bbd4',
      callback: '#efab45', selftape: '#ca7ea7', self_tape: '#ca7ea7',
    };
    const SESSION_LABELS = {
      audition: 'General Auditions', general: 'General Auditions',
      dance_call: 'Dance Call', dance: 'Dance Call',
      callback: 'Callback', selftape: 'Self Tape', self_tape: 'Self Tape',
    };
    function sessionColor(type) { return SESSION_COLORS[String(type||'').toLowerCase()] || '#572e88'; }
    function sessionLabel(s)    { return s.name || SESSION_LABELS[String(s.type||'').toLowerCase()] || 'Audition'; }
    function initials(name)     { return String(name||'').trim().split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase() || '?'; }
    function esc(s)             { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    const SCORE_CATS = ['Acting', 'Vocals', 'Dance'];

    let _sb       = null;
    let _sessions = [];
    let _apps     = [];
    let _activeId = null;
    let _currentAppId = null;
    let _scores   = {};
    let _notes    = {};
    let _savedMsg = {};

    function isCheckedIn(app) {
      const checkins = Array.isArray(app.session_checkins) ? app.session_checkins : [];
      return checkins.some(c => c.session_id === _activeId && c.checked_in);
    }

    function hasScore(app) {
      const s = _scores[app.id];
      return s && Object.values(s).some(v => v);
    }

    function queueApps() {
      return _apps.filter(a => {
        return a.session_id === _activeId
          || (Array.isArray(a.slot_assignments) && a.slot_assignments.some(sa => sa.session_id === _activeId));
      }).filter(a => isCheckedIn(a));
    }

    function currentApp() {
      return _apps.find(a => a.id === _currentAppId) || null;
    }

    function getScore(appId, cat) {
      return (_scores[appId] || {})[cat] || '';
    }

    function setScore(appId, cat, val) {
      if (!_scores[appId]) _scores[appId] = {};
      _scores[appId][cat] = _scores[appId][cat] === val ? '' : val;
      renderPanel();
    }

    function renderQueue() {
      const queue = queueApps();
      if (!queue.length) {
        return `<div class="ir-no-checkins">No performers checked in yet. <a href="#" onclick="btsProdNav('auditions-checkin.html');return false;" style="color:#572e88;">Go to Check-In</a></div>`;
      }
      return `<div class="ir-queue">
        <div class="ir-queue-head">Checked In (${queue.length})</div>
        ${queue.map(a => {
          const active  = a.id === _currentAppId ? ' active' : '';
          const scored  = hasScore(a);
          const avatarInner = a.headshot_url ? `<img src="${esc(a.headshot_url)}" alt="" />` : esc(initials(a.name));
          return `<div class="ir-queue-item${active}" onclick="selectApp('${esc(a.id)}')">
            <div class="ir-queue-avatar">${avatarInner}</div>
            <div>
              <div class="ir-queue-name">${esc(a.name || 'Unknown')}</div>
              <div class="ir-queue-sub">${a.pronouns ? esc(a.pronouns) : esc(a.email || '')}</div>
            </div>
            ${scored ? '<div class="ir-queue-scored"></div>' : ''}
          </div>`;
        }).join('')}
      </div>`;
    }

    function renderPanel() {
      const app = currentApp();
      const panelEl = document.getElementById('ir-panel');
      if (!panelEl) return;

      if (!app) {
        panelEl.innerHTML = `<div class="ir-empty-panel">Select a performer from the queue to start scoring.</div>`;
        return;
      }

      const appId   = app.id;
      const roles   = Array.isArray(app.roles_requested) ? app.roles_requested : (app.role_interest ? [app.role_interest] : []);
      const rolesHtml = roles.map(r => `<span class="ir-role-pill">${esc(String(r).trim())}</span>`).join('');
      const avatarInner = app.headshot_url ? `<img src="${esc(app.headshot_url)}" alt="" />` : esc(initials(app.name));
      const isCallback = app.callback_status && app.callback_status !== 'none';

      const scoreRows = SCORE_CATS.map(cat => {
        const current = getScore(appId, cat);
        return `<div class="ir-score-row">
          <div class="ir-score-cat">${cat}</div>
          <div class="ir-imp-btns">
            <button class="ir-imp-btn${current==='yes'?' sel-yes':''}"   onclick="setScore('${esc(appId)}','${cat}','yes')">Yes</button>
            <button class="ir-imp-btn${current==='maybe'?' sel-maybe':''}" onclick="setScore('${esc(appId)}','${cat}','maybe')">Maybe</button>
            <button class="ir-imp-btn${current==='no'?' sel-no':''}"    onclick="setScore('${esc(appId)}','${cat}','no')">No</button>
          </div>
        </div>`;
      }).join('');

      const savedTxt = _savedMsg[appId] ? `<span class="ir-saved-msg">${esc(_savedMsg[appId])}</span>` : '';

      panelEl.innerHTML = `<div class="ir-card">
        <div class="ir-card-head">
          <div class="ir-card-headshot">${avatarInner}</div>
          <div>
            <div class="ir-card-name">${esc(app.name || 'Unknown')}</div>
            <div class="ir-card-meta">${app.pronouns ? esc(app.pronouns) + ' · ' : ''}${esc(app.email || '')}</div>
            ${rolesHtml ? `<div class="ir-card-roles">${rolesHtml}</div>` : ''}
          </div>
        </div>
        <div class="ir-scores">
          <div class="ir-score-label">Impressions</div>
          ${scoreRows}
        </div>
        <div class="ir-notes">
          <div class="ir-notes-label">Notes</div>
          <textarea id="ir-notes-ta" placeholder="Casting notes for this performer..." oninput="onNotesInput('${esc(appId)}',this.value)">${esc(_notes[appId] || '')}</textarea>
        </div>
        <div class="ir-actions">
          <button class="ir-save-btn" onclick="saveScores('${esc(appId)}')">Save</button>
          <button class="ir-callback-btn${isCallback?' active':''}" onclick="toggleCallback('${esc(appId)}')">
            ${isCallback ? 'Callback Marked' : 'Mark Callback'}
          </button>
          ${savedTxt}
        </div>
      </div>`;
    }

    function selectApp(id) {
      _currentAppId = id;
      const app = currentApp();
      if (app) {
        const stored = app.callback_rating || {};
        if (!_scores[id]) {
          _scores[id] = {
            Acting: stored.acting || '',
            Vocals: stored.vocals || '',
            Dance:  stored.dance  || '',
          };
        }
        if (_notes[id] === undefined) _notes[id] = app.org_notes || '';
      }
      document.getElementById('ir-queue-wrap')?.replaceChildren();
      const qWrap = document.getElementById('ir-queue-wrap');
      if (qWrap) qWrap.innerHTML = renderQueue();
      renderPanel();
    }

    function onNotesInput(appId, val) { _notes[appId] = val; }

    async function saveScores(appId) {
      const s = _scores[appId] || {};
      const update = {
        callback_rating: { acting: s.Acting||'', vocals: s.Vocals||'', dance: s.Dance||'' },
        org_notes: _notes[appId] || '',
      };
      const { error } = await _sb.from('audition_applications').update(update).eq('id', appId);
      const app = _apps.find(a => a.id === appId);
      if (app) {
        app.callback_rating = update.callback_rating;
        app.org_notes = update.org_notes;
      }
      _savedMsg[appId] = error ? 'Could not save.' : 'Saved!';
      renderPanel();
      setTimeout(() => { delete _savedMsg[appId]; renderPanel(); }, 2500);
    }

    async function toggleCallback(appId) {
      const app = _apps.find(a => a.id === appId);
      if (!app) return;
      const isCallback = app.callback_status && app.callback_status !== 'none';
      const newStatus  = isCallback ? 'none' : 'called_back';
      app.callback_status = newStatus;
      renderPanel();
      await _sb.from('audition_applications').update({ callback_status: newStatus }).eq('id', appId);
    }

    function setSession(id) {
      _activeId     = id;
      _currentAppId = null;
      renderAll();
    }

    function renderAll() {
      const sessionBar = _sessions.map(s => {
        const color  = sessionColor(s.type);
        const active = s.id === _activeId;
        return `<button class="ir-session-pill${active?' active':''}" style="${active?`background:${esc(color)};`:''}" onclick="setSession('${esc(s.id)}')">
          <span class="ir-session-dot" style="background:${active?'#fff':esc(color)};"></span>
          ${esc(sessionLabel(s))}
        </button>`;
      }).join('');

      document.getElementById('ir-root').innerHTML = `
        <div class="ir-session-bar">${sessionBar}</div>
        <div class="ir-layout">
          <div id="ir-queue-wrap">${renderQueue()}</div>
          <div id="ir-panel"></div>
        </div>`;
      renderPanel();
    }

    (async function () {
      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      const params  = new URLSearchParams(location.search);
      const prodId  = params.get('id') || '';
      const urlSess = params.get('session') || '';
      if (!prodId) return;
      _sb = supabase.createClient(SB_URL, SB_ANON);

      const [sessRes, appRes] = await Promise.all([
        _sb.from('audition_sessions').select('id,name,type,date').eq('production_id', prodId).order('sort_order').order('date'),
        _sb.from('audition_applications').select('id,name,email,pronouns,headshot_url,roles_requested,role_interest,org_notes,callback_status,callback_rating,session_id,slot_assignments,session_checkins').eq('production_id', prodId).order('name'),
      ]);

      _sessions = sessRes.data || [];
      _apps     = appRes.data || [];

      if (!_sessions.length) {
        document.getElementById('ir-root').innerHTML = '<div class="ir-loading">No sessions found. <a href="#" onclick="btsProdNav(\'auditions-settings.html\');return false;" style="color:#572e88;">Set up sessions</a></div>';
        return;
      }

      _activeId = (urlSess && _sessions.find(s => s.id === urlSess)) ? urlSess : _sessions[0].id;
      renderAll();
    })();
  </script>
</body>
</html>
