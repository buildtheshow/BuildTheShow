<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Dashboard - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v51-20260704" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative;  z-index: 0; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: -1; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1200px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    /* ── Page header ── */
    .page-kicker { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,21,48,0.38); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .page-kicker-dot { width: 6px; height: 6px; border-radius: 50%; background: #572e88; flex-shrink: 0; }
    .page-title { font-size: 2rem; font-weight: 950; color: #1a1530; margin: 0 0 0.25rem; }
    .page-subtitle { font-size: 0.85rem; color: rgba(26,21,48,0.45); margin: 0 0 1.75rem; }

    /* ── Sub-nav ── */
    .reg-subnav { display: flex; gap: 0.35rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
    .reg-subnav-item { font-size: 0.78rem; font-weight: 850; padding: 0.4rem 0.9rem; border-radius: 8px; border: 1.5px solid rgba(87,46,136,0.15); background: #fff; color: rgba(26,21,48,0.55); cursor: pointer; font-family: var(--bts-font); text-decoration: none; transition: all 0.12s; }
    .reg-subnav-item:hover { background: #f0ecfc; color: #572e88; border-color: rgba(87,46,136,0.3); }
    .reg-subnav-item.active { background: #572e88; color: #fff; border-color: #572e88; }

    /* ── Summary stats ── */
    .reg-stats { display: flex; gap: 0.85rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
    .reg-stat { background: #fff; border: 1.5px solid rgba(87,46,136,0.1); border-radius: 12px; padding: 1rem 1.25rem; min-width: 120px; }
    .reg-stat-value { font-size: 1.6rem; font-weight: 950; color: #1a1530; line-height: 1; }
    .reg-stat-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(26,21,48,0.4); margin-top: 0.3rem; }
    .reg-stat.complete .reg-stat-value { color: #769e7b; }
    .reg-stat.pending .reg-stat-value { color: #efab45; }
    .reg-stat.payment .reg-stat-value { color: #476aaa; }

    /* ── Kanban board ── */
    .reg-board { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; align-items: start; }
    @media (max-width: 800px) { .reg-board { grid-template-columns: 1fr; } }

    .reg-col { background: rgba(87,46,136,0.03); border: 1.5px solid rgba(87,46,136,0.09); border-radius: 14px; overflow: hidden; }
    .reg-col-header { padding: 0.85rem 1rem; display: flex; align-items: center; justify-content: space-between; }
    .reg-col-title { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; }
    .reg-col-count { font-size: 0.72rem; font-weight: 800; background: rgba(255,255,255,0.5); border-radius: 100px; padding: 0.15rem 0.5rem; color: inherit; opacity: 0.75; }
    .reg-col.col-forms .reg-col-header { background: rgba(239,171,69,0.12); color: #b87d00; }
    .reg-col.col-payment .reg-col-header { background: rgba(71,106,170,0.1); color: #476aaa; }
    .reg-col.col-done .reg-col-header { background: rgba(118,158,123,0.12); color: #4a7d52; }

    .reg-col-body { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.6rem; min-height: 80px; }
    .reg-col-empty { font-size: 0.8rem; color: rgba(26,21,48,0.35); text-align: center; padding: 1.25rem 0.5rem; font-style: italic; }

    /* ── Performer card ── */
    .reg-card { background: #fff; border: 1.5px solid rgba(87,46,136,0.1); border-radius: 10px; padding: 0.75rem; display: flex; align-items: flex-start; gap: 0.65rem; transition: box-shadow 0.12s; }
    .reg-card:hover { box-shadow: 0 2px 12px rgba(87,46,136,0.1); }
    .reg-card-photo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #efefef; }
    .reg-card-initials { width: 36px; height: 36px; border-radius: 50%; background: #572e88; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 900; flex-shrink: 0; }
    .reg-card-info { flex: 1; min-width: 0; }
    .reg-card-name { font-size: 0.85rem; font-weight: 900; color: #1a1530; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reg-card-role { font-size: 0.72rem; color: rgba(26,21,48,0.5); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reg-card-actions { display: flex; flex-direction: column; gap: 0.35rem; align-items: flex-end; flex-shrink: 0; margin-top: 0.1rem; }
    .reg-card-chip { font-size: 0.65rem; font-weight: 800; border-radius: 100px; padding: 0.18rem 0.5rem; white-space: nowrap; }
    .chip-forms { background: rgba(239,171,69,0.15); color: #b87d00; }
    .chip-payment { background: rgba(71,106,170,0.12); color: #476aaa; }
    .chip-done { background: rgba(118,158,123,0.15); color: #4a7d52; }
    .chip-emergency { background: rgba(209,82,61,0.1); color: #d1523d; }

    .reg-copy-btn { font-size: 0.65rem; font-weight: 800; padding: 0.2rem 0.5rem; border-radius: 6px; border: 1.5px solid rgba(87,46,136,0.2); background: #fff; color: #572e88; cursor: pointer; font-family: var(--bts-font); white-space: nowrap; transition: all 0.12s; }
    .reg-copy-btn:hover { background: #f0ecfc; }
    .reg-copy-btn.copied { background: #769e7b; color: #fff; border-color: #769e7b; }

    .reg-loading { color: rgba(26,21,48,0.38); font-size: 0.88rem; padding: 3rem 0; text-align: center; }
    .reg-error { color: #d1523d; font-size: 0.85rem; padding: 2rem 0; text-align: center; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="page-kicker"><span class="page-kicker-dot"></span>Registration</div>
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">Track who has completed forms and paid.</p>

      <nav class="reg-subnav">
        <span class="reg-subnav-item active">Dashboard</span>
        <a class="reg-subnav-item" id="nav-status" href="#">Payment Status</a>
        <a class="reg-subnav-item" id="nav-form" href="#">Registration Form</a>
        <a class="reg-subnav-item" id="nav-settings" href="#">Settings</a>
      </nav>

      <div id="reg-stats" class="reg-stats"></div>
      <div id="reg-root"><div class="reg-loading">Loading...</div></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=70-20260705"></script>
  <script>
    window.initProductionPage('cast');

    const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
    const prodId  = new URLSearchParams(location.search).get('id') || '';

    // Wire sub-nav links
    ['nav-status','nav-form','nav-settings'].forEach(function(id) {
      const map = { 'nav-status': 'registration-status.html', 'nav-form': 'registration-form.html', 'nav-settings': 'registration-settings.html' };
      const el = document.getElementById(id);
      if (el && prodId) el.href = '/SYSTEM/Organisations/Productions/Workspace/' + map[id] + '?id=' + encodeURIComponent(prodId);
    });

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function customAnswers(app) {
      if (!app || !app.custom_answers) return {};
      if (typeof app.custom_answers === 'string') { try { return JSON.parse(app.custom_answers) || {}; } catch { return {}; } }
      return app.custom_answers || {};
    }

    function answerTruthy(ca, keys) {
      const truthy = new Set(['yes','true','complete','completed','signed','paid','received','done']);
      return keys.some(function(k) {
        const v = ca[k];
        if (v === true) return true;
        if (typeof v === 'number') return v > 0;
        return truthy.has(String(v||'').trim().toLowerCase());
      });
    }

    function answerPresent(ca, keys) {
      return keys.some(function(k) { const v = ca[k]; return v !== undefined && v !== null && String(v).trim() !== ''; });
    }

    function formsComplete(app, regSettings) {
      const ca = customAnswers(app);
      if (answerTruthy(ca, ['__bts_registration_complete','__bts_registration_completed','registration_complete','registration_completed'])) return true;
      if (answerPresent(ca, ['__bts_registration_submitted_at','__bts_registration_completed_at','__bts_registration_pdf_url'])) return true;
      const needsAgreement = regSettings.require_agreements !== false;
      const needsEmergency = regSettings.require_emergency !== false || regSettings.require_medical !== false;
      const agreementDone = !needsAgreement || answerTruthy(ca, ['__bts_registration_agreement_signed','__bts_registration_agreements_signed','registration_agreement_signed','cast_agreement_signed','agreement_signed']);
      const emergencyDone = !needsEmergency || answerTruthy(ca, ['__bts_registration_emergency_complete','__bts_registration_emergency_form_complete','registration_emergency_complete','emergency_form_complete','emergency_contact_complete']);
      return agreementDone && emergencyDone;
    }

    function paymentRequired(regSettings) {
      const ps = regSettings.payment_settings || {};
      return regSettings.require_payment === true
        || String(regSettings.payment_rule||'').toLowerCase() === 'required for completion'
        || !!String(regSettings.fee||'').trim()
        || ps.mode === 'flat' || ps.mode === 'split'
        || !!String(ps.fee||'').trim();
    }

    function paymentComplete(app) {
      const ca = customAnswers(app);
      return answerTruthy(ca, ['__bts_registration_payment_received','__bts_registration_paid','registration_payment_received','registration_paid','payment_received','payment_paid']);
    }

    function registrationCode(app) {
      return customAnswers(app)['__bts_cast_offer_code'] || '';
    }

    function registrationUrl(app, prod) {
      const code = registrationCode(app);
      const orgSlug = prod.organizations && prod.organizations.slug;
      const showSlug = prod.slug;
      if (orgSlug && showSlug && code) {
        return window.location.origin + '/' + encodeURIComponent(orgSlug) + '/' + encodeURIComponent(showSlug) + '/registration/' + encodeURIComponent(code);
      }
      const hash = new URLSearchParams({ prod: prodId });
      if (app.id) hash.set('app', app.id);
      if (code) hash.set('code', code);
      return window.location.origin + '/SYSTEM/Public/registration#' + hash.toString();
    }

    function characterName(assignment, characters) {
      const charId = String(assignment.character_id || '');
      if (charId) {
        const ch = characters.find(function(c) { return String(c.id) === charId; });
        if (ch && ch.name) return ch.name;
      }
      return assignment.role_name || assignment.role || assignment.character_name || 'Ensemble';
    }

    function performerName(app) {
      const ca = customAnswers(app);
      const preferred = String(ca['Preferred Name']||'').trim();
      const base = String(app.name||'').trim();
      if (preferred) {
        const parts = base.split(/\s+/);
        return [preferred, ...parts.slice(1)].join(' ').trim() || preferred;
      }
      return base || 'Unknown';
    }

    function initials(name) {
      const parts = name.trim().split(/\s+/);
      return parts.length >= 2 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
    }

    function photoOrInitials(app, name) {
      if (app.headshot_url) return '<img class="reg-card-photo" src="' + esc(app.headshot_url) + '" alt="" />';
      return '<div class="reg-card-initials">' + esc(initials(name)) + '</div>';
    }

    function copyLink(btn, url) {
      navigator.clipboard.writeText(url).then(function() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 1800);
      });
    }

    function renderCard(app, assignment, characters, prod) {
      const name = performerName(app);
      const role = characterName(assignment, characters);
      const url  = registrationUrl(app, prod);
      const code = registrationCode(app);
      const hasLink = !!code;
      const linkBtn = hasLink
        ? '<button class="reg-copy-btn" onclick="copyLink(this,' + JSON.stringify(url) + ')">Copy Link</button>'
        : '';
      return '<div class="reg-card">'
        + photoOrInitials(app, name)
        + '<div class="reg-card-info">'
        + '<div class="reg-card-name">' + esc(name) + '</div>'
        + '<div class="reg-card-role">' + esc(role) + '</div>'
        + '</div>'
        + (linkBtn ? '<div class="reg-card-actions">' + linkBtn + '</div>' : '')
        + '</div>';
    }

    function renderColumn(colClass, headerClass, title, items, emptyMsg, characters, prod) {
      const count = items.length;
      const cards = items.map(function(item) { return renderCard(item.app, item.assignment, characters, prod); }).join('');
      return '<div class="reg-col ' + colClass + '">'
        + '<div class="reg-col-header ' + headerClass + '">'
        + '<span class="reg-col-title">' + esc(title) + '</span>'
        + '<span class="reg-col-count">' + count + '</span>'
        + '</div>'
        + '<div class="reg-col-body">'
        + (cards || '<div class="reg-col-empty">' + esc(emptyMsg) + '</div>')
        + '</div>'
        + '</div>';
    }

    function renderStats(needsForms, needsPayment, complete, total, payReq) {
      const statsEl = document.getElementById('reg-stats');
      if (!statsEl) return;
      statsEl.innerHTML = [
        '<div class="reg-stat"><div class="reg-stat-value">' + total + '</div><div class="reg-stat-label">Total Cast</div></div>',
        '<div class="reg-stat pending"><div class="reg-stat-value">' + needsForms + '</div><div class="reg-stat-label">Needs Forms</div></div>',
        payReq ? '<div class="reg-stat payment"><div class="reg-stat-value">' + needsPayment + '</div><div class="reg-stat-label">Awaiting Payment</div></div>' : '',
        '<div class="reg-stat complete"><div class="reg-stat-value">' + complete + '</div><div class="reg-stat-label">Complete</div></div>',
      ].join('');
    }

    (async function() {
      if (!prodId) { document.getElementById('reg-root').innerHTML = '<div class="reg-error">No production specified.</div>'; return; }

      const sb = supabase.createClient(SB_URL, SB_ANON);

      // Load production (for org slug, show slug, and registration settings)
      const { data: prod } = await sb.from('productions')
        .select('id, title, slug, registration_settings, organizations(slug)')
        .eq('id', prodId).single();

      if (!prod) { document.getElementById('reg-root').innerHTML = '<div class="reg-error">Could not load production.</div>'; return; }

      const regSettings = (typeof prod.registration_settings === 'object' && prod.registration_settings) ? prod.registration_settings : {};
      const payReq = paymentRequired(regSettings);

      // Load accepted cast assignments
      const { data: assignments, error: assignErr } = await sb.from('casting_assignments')
        .select('*').eq('production_id', prodId).eq('state', 'offer_accepted');
      if (assignErr) { document.getElementById('reg-root').innerHTML = '<div class="reg-error">Could not load cast.</div>'; return; }
      if (!assignments || !assignments.length) {
        renderStats(0, 0, 0, 0, payReq);
        document.getElementById('reg-root').innerHTML = '<div class="reg-error" style="color:rgba(26,21,48,0.4)">No accepted cast yet. Send offers from the <a href="casting-offers.html?id=' + esc(prodId) + '" style="color:#572e88;">Offers</a> page.</div>';
        return;
      }

      // Load performer data (applications first, bookings fallback)
      const appIds = [...new Set(assignments.map(function(a) { return a.applicant_id; }).filter(Boolean))];
      const { data: applications } = await sb.from('audition_applications').select('*').in('id', appIds);
      const foundIds = new Set((applications||[]).map(function(a) { return String(a.id); }));
      const missingIds = appIds.filter(function(id) { return !foundIds.has(String(id)); });
      let bookings = [];
      if (missingIds.length) {
        const { data: b } = await sb.from('audition_bookings').select('*').in('id', missingIds);
        bookings = b || [];
      }
      const appMap = new Map([...(applications||[]), ...bookings].map(function(a) { return [String(a.id), a]; }));

      // Load characters
      const { data: characters } = await sb.from('production_characters').select('id,name,role_type').eq('production_id', prodId);

      // Build unique cast items (one per applicant)
      const seen = new Set();
      const castItems = assignments.reduce(function(acc, row) {
        const appId = String(row.applicant_id||'');
        if (!appId || seen.has(appId)) return acc;
        const app = appMap.get(appId);
        if (app) { seen.add(appId); acc.push({ app, assignment: row }); }
        return acc;
      }, []);

      // Bucket into 3 groups
      const needsForms = [], needsPayment = [], complete = [];
      castItems.forEach(function(item) {
        const formsDone = formsComplete(item.app, regSettings);
        const paidDone  = !payReq || paymentComplete(item.app);
        if (!formsDone) { needsForms.push(item); }
        else if (!paidDone) { needsPayment.push(item); }
        else { complete.push(item); }
      });

      renderStats(needsForms.length, needsPayment.length, complete.length, castItems.length, payReq);

      const cols = [
        renderColumn('col-forms',   '', 'Needs Forms',    needsForms,   'Everyone has completed their forms.', characters||[], prod),
        payReq
          ? renderColumn('col-payment', '', 'Awaiting Payment', needsPayment, 'No outstanding payments.', characters||[], prod)
          : renderColumn('col-payment', '', 'Payment Not Required', [], 'Payment is not required for this production.', characters||[], prod),
        renderColumn('col-done',    '', 'Complete',       complete,     'No one is fully complete yet.', characters||[], prod),
      ];

      document.getElementById('reg-root').innerHTML = '<div class="reg-board">' + cols.join('') + '</div>';
    })();
  </script>
</body>
</html>
