  <title>Budget - Build The Show</title>

<body>
<script>
  (function () {
    var p   = new URLSearchParams(location.search);
    var sub = location.hash.replace('#', '') || 'dashboard';
    var id  = p.get('id') || '';
    var dest = '/SYSTEM/Organisations/Productions/Workspace/production-workspace.html'
      + (id ? '?id=' + encodeURIComponent(id) + '&' : '?')
      + 'tab=budget&sub=' + encodeURIComponent(sub);
    window.location.replace(dest);
  })();
</script>
