<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auditions - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v47-20260610" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    .aud-hero { background: #572e88; border-radius: 14px; padding: 2rem 2.25rem; display: flex; align-items: center; justify-content: space-between; gap: 2rem; margin-bottom: 1.75rem; }
    .aud-hero-kicker { display: flex; align-items: center; gap: 0.5rem; font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.65); margin-bottom: 0.6rem; }
    .aud-hero-kicker-dot { width: 7px; height: 7px; border-radius: 50%; background: #efab45; flex-shrink: 0; }
    .aud-hero-title { color: #fff; font-size: 2.4rem; font-weight: 950; line-height: 1.05; margin: 0 0 0.5rem; }
    .aud-hero-copy { color: rgba(255,255,255,0.65); font-size: 0.88rem; margin: 0; }
    .aud-hero-metric { text-align: center; flex-shrink: 0; }
    .aud-hero-metric-num { color: #fff; font-size: 3.2rem; font-weight: 950; line-height: 1; }
    .aud-hero-metric-label { color: rgba(255,255,255,0.55); font-size: 0.65rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.3rem; }

    .aud-sessions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .aud-session-card { border-radius: 12px; padding: 1.4rem 1.5rem 1.25rem; border: 1.5px solid; position: relative; }
    .aud-session-name { font-size: 1.05rem; font-weight: 900; margin-bottom: 0.3rem; }
    .aud-session-next { font-size: 0.78rem; opacity: 0.7; margin-bottom: 0.65rem; }
    .aud-session-counts { font-size: 0.8rem; font-weight: 800; margin-bottom: 1rem; opacity: 0.8; }
    .aud-session-counts .sep { opacity: 0.45; margin: 0 0.35rem; }
    .aud-session-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .aud-session-btn { font-size: 0.72rem; font-weight: 800; border: 1.5px solid currentColor; border-radius: 100px; padding: 0.28rem 0.7rem; cursor: pointer; background: rgba(255,255,255,0.55); transition: background 0.12s; font-family: var(--bts-font); }
    .aud-session-btn:hover { background: rgba(255,255,255,0.85); }

    .aud-section-head { font-size: 0.7rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,21,48,0.4); margin-bottom: 0.75rem; }
    .aud-performer-row { display: flex; align-items: center; gap: 0.85rem; padding: 0.75rem 0; border-bottom: 1px solid rgba(87,46,136,0.07); }
    .aud-performer-row:last-child { border-bottom: none; }
    .aud-performer-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: #ece8ff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.78rem; color: #572e88; overflow: hidden; }
    .aud-performer-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .aud-performer-name { font-size: 0.88rem; font-weight: 800; }
    .aud-performer-meta { font-size: 0.74rem; color: rgba(26,21,48,0.48); margin-top: 0.1rem; }
    .aud-performer-status { margin-left: auto; font-size: 0.68rem; font-weight: 850; border-radius: 100px; padding: 0.2rem 0.55rem; flex-shrink: 0; }
    .s-pending { background: #f0ecfc; color: #572e88; }
    .s-callback { background: #fef4e2; color: #a06b00; }
    .s-cast { background: #e5f0e7; color: #2e6639; }

    .aud-empty { text-align: center; padding: 3rem 1rem; color: rgba(26,21,48,0.38); font-size: 0.88rem; }
    .aud-empty a { color: #572e88; }
    .aud-loading { color: rgba(26,21,48,0.38); font-size: 0.88rem; padding: 2rem 0; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>
  <div class="prod-main">
    <div class="prod-main-inner" id="page-root">
      <div class="aud-loading">Loading...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=17"></script>
  <script>
    window.initProductionPage('cast');

    (async function () {
      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      const prodId  = new URLSearchParams(location.search).get('id') || '';
      if (!prodId) return;
      const sb = supabase.createClient(SB_URL, SB_ANON);

      const SESSION_COLORS = {
        audition: '#572e88', general: '#572e88',
        dance_call: '#78bbd4', dance: '#78bbd4',
        callback: '#efab45',
        selftape: '#ca7ea7', self_tape: '#ca7ea7',
      };
      const SESSION_LABELS = {
        audition: 'General Auditions', general: 'General Auditions',
        dance_call: 'Dance Call', dance: 'Dance Call',
        callback: 'Callback',
        selftape: 'Self Tape', self_tape: 'Self Tape',
      };
      function sessionColor(type) { return SESSION_COLORS[String(type||'').toLowerCase()] || '#572e88'; }
      function sessionLabel(s) { return s.name || SESSION_LABELS[String(s.type||'').toLowerCase()] || 'Audition'; }

      function fmtDate(d) {
        if (!d) return '';
        return new Date(d + 'T00:00:00').toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
      }
      function fmtTime(t) {
        if (!t) return '';
        const [h, m] = t.split(':').map(Number);
        return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
      }
      function initials(name) {
        return String(name || '').trim().split(/\s+/).map(w => w[0] || '').slice(0, 2).join('').toUpperCase() || '?';
      }
      function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

      const [sessRes, appRes] = await Promise.all([
        sb.from('audition_sessions').select('id,name,type,date,start_time').eq('production_id', prodId).order('sort_order').order('created_at'),
        sb.from('audition_applications').select('id,name,email,headshot_url,status,callback_status,session_id,created_at', { count: 'exact' }).eq('production_id', prodId).order('created_at', { ascending: false }),
      ]);

      const sessions = sessRes.data || [];
      const apps     = appRes.data || [];
      const total    = appRes.count || apps.length;

      let slotCounts = {};
      if (sessions.length) {
        const { data: slots } = await sb.from('audition_time_slots').select('session_id').in('session_id', sessions.map(s => s.id));
        (slots || []).forEach(sl => { slotCounts[sl.session_id] = (slotCounts[sl.session_id] || 0) + 1; });
      }

      const signupCounts = {};
      apps.forEach(a => { if (a.session_id) signupCounts[a.session_id] = (signupCounts[a.session_id] || 0) + 1; });

      function sessionCardHtml(s) {
        const color   = sessionColor(s.type);
        const label   = sessionLabel(s);
        const slots   = slotCounts[s.id] || 0;
        const signups = signupCounts[s.id] || 0;
        const nextTxt = s.date
          ? `Next: ${fmtDate(s.date)}${s.start_time ? ' at ' + fmtTime(s.start_time) : ''}`
          : 'Date not set';
        const sid = esc(s.id);
        return `<div class="aud-session-card" style="color:${esc(color)};border-color:${esc(color)};background:${esc(color)}18;">
          <div class="aud-session-name">${esc(label)}</div>
          <div class="aud-session-next">${esc(nextTxt)}</div>
          <div class="aud-session-counts">${slots} slots<span class="sep">·</span>${signups} signups</div>
          <div class="aud-session-actions">
            <button class="aud-session-btn" onclick="btsProdNav('auditions-schedule.html')">Schedule</button>
            <button class="aud-session-btn" onclick="btsProdNav('auditions-checkin.html?session=${sid}')">Check In</button>
            <button class="aud-session-btn" onclick="btsProdNav('auditions-inroom.html?session=${sid}')">In Room</button>
          </div>
        </div>`;
      }

      function performerStatusClass(a) {
        if (a.callback_status && a.callback_status !== 'none') return 's-callback';
        if (a.status === 'cast' || a.status === 'chosen') return 's-cast';
        return 's-pending';
      }
      function performerStatusLabel(a) {
        if (a.callback_status && a.callback_status !== 'none') return 'Callback';
        if (a.status === 'cast' || a.status === 'chosen') return 'Cast';
        return 'Registered';
      }

      const recentHtml = apps.slice(0, 5).map(a => {
        const avatarInner = a.headshot_url
          ? `<img src="${esc(a.headshot_url)}" alt="${esc(a.name)}" />`
          : esc(initials(a.name));
        return `<div class="aud-performer-row">
          <div class="aud-performer-avatar">${avatarInner}</div>
          <div>
            <div class="aud-performer-name">${esc(a.name || 'Unknown')}</div>
            <div class="aud-performer-meta">${esc(a.email || '')}</div>
          </div>
          <div class="aud-performer-status ${performerStatusClass(a)}">${performerStatusLabel(a)}</div>
        </div>`;
      }).join('') || '<div class="aud-empty">No performers yet.</div>';

      const sessionsHtml = sessions.length
        ? `<div class="aud-sessions-grid">${sessions.map(sessionCardHtml).join('')}</div>`
        : `<div class="aud-empty">No sessions set up yet. <a href="#" onclick="btsProdNav('auditions-settings.html');return false;">Set up auditions</a></div>`;

      document.getElementById('page-root').innerHTML = `
        <div class="aud-hero">
          <div>
            <div class="aud-hero-kicker"><span class="aud-hero-kicker-dot"></span>AUDITIONS</div>
            <h1 class="aud-hero-title">Auditions at a glance.</h1>
            <p class="aud-hero-copy">Your audition overview is ready. Add dates or open a room to keep the flow moving.</p>
          </div>
          <div class="aud-hero-metric">
            <div class="aud-hero-metric-num">${total}</div>
            <div class="aud-hero-metric-label">Performers</div>
          </div>
        </div>
        ${sessionsHtml}
        <div class="aud-section-head">Recent Performers</div>
        ${recentHtml}
      `;
    })();
  </script>
</body>
</html>
