<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Team Portal — Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100vh; }
    body {
      background: #1a1530;
      font-family: var(--bts-font, 'Inter', sans-serif);
      color: #1a1530;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }

    .tp-wrap {
      position: relative;
      z-index: 1;
      width: min(420px, 100%);
    }

    /* ── Show identity ── */
    .tp-show-badge {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      margin-bottom: 1.25rem;
    }
    .tp-poster {
      width: 42px;
      height: 42px;
      border-radius: 7px;
      object-fit: cover;
      background: rgba(87,46,136,0.4);
      flex-shrink: 0;
    }
    .tp-show-name {
      font-size: 0.95rem;
      font-weight: 950;
      color: #fff;
      line-height: 1.2;
    }
    .tp-show-sub {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.1rem;
    }

    /* ── Login card ── */
    .tp-card {
      background: #fff;
      border-radius: 18px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    .tp-kicker {
      font-size: 0.67rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #572e88;
      margin-bottom: 0.35rem;
    }
    .tp-title {
      font-size: 1.55rem;
      font-weight: 950;
      color: #1a1530;
      margin: 0 0 0.3rem;
      line-height: 1.1;
    }
    .tp-subtitle {
      font-size: 0.82rem;
      color: rgba(26,21,48,0.5);
      margin: 0 0 1.8rem;
    }

    .tp-field {
      margin-bottom: 1rem;
    }
    .tp-field label {
      display: block;
      font-size: 0.73rem;
      font-weight: 800;
      color: rgba(26,21,48,0.6);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tp-field input {
      width: 100%;
      border: 1.5px solid rgba(87,46,136,0.22);
      border-radius: 8px;
      padding: 0.68rem 0.85rem;
      font-size: 0.9rem;
      font-family: var(--bts-font, 'Inter', sans-serif);
      color: #1a1530;
      outline: none;
      transition: border-color 0.12s;
    }
    .tp-field input:focus { border-color: #572e88; }

    .tp-btn {
      width: 100%;
      background: #572e88;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.82rem;
      font-size: 0.9rem;
      font-weight: 950;
      cursor: pointer;
      margin-top: 0.5rem;
      font-family: var(--bts-font, 'Inter', sans-serif);
      transition: filter 0.12s;
    }
    .tp-btn:hover { filter: brightness(1.12); }
    .tp-btn:disabled { opacity: 0.6; cursor: not-allowed; filter: none; }

    .tp-error {
      font-size: 0.78rem;
      color: #d1523d;
      font-weight: 700;
      margin-top: 0.85rem;
      min-height: 1em;
    }

    /* ── Loading / spinner state ── */
    .tp-loading {
      text-align: center;
      padding: 2.5rem 1rem;
    }
    .tp-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(87,46,136,0.18);
      border-top-color: #572e88;
      border-radius: 50%;
      animation: tp-spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes tp-spin { to { transform: rotate(360deg); } }
    .tp-loading-text {
      font-size: 0.85rem;
      color: rgba(26,21,48,0.55);
    }
  </style>
</head>
<body>
  <div class="tp-wrap">
    <div class="tp-show-badge" id="tp-show-badge" style="display:none">
      <img class="tp-poster" id="tp-poster" src="" alt="" />
      <div>
        <div class="tp-show-name" id="tp-show-name">Loading...</div>
        <div class="tp-show-sub" id="tp-show-sub"></div>
      </div>
    </div>

    <div class="tp-card" id="tp-card">
      <div id="tp-body">
        <div class="tp-loading">
          <div class="tp-spinner"></div>
          <div class="tp-loading-text">Setting up...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (async function () {
      'use strict';

      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      const SESSION_KEY = 'bts-team-portal-v1';
      const STORAGE_KEY_PREFIX = 'bts-team-access:';

      const params  = new URLSearchParams(location.search);
      const prodId  = params.get('id') || '';
      const pvwEmail    = params.get('pvw_email') || '';
      const pvwPasscode = params.get('pvw_passcode') || '';

      if (!prodId) { showError('No production specified.'); return; }

      const sb = supabase.createClient(SB_URL, SB_ANON);

      // ── Load production info ──
      const { data: prod } = await sb
        .from('productions')
        .select('id, title, subtitle, season_year, poster_url')
        .eq('id', prodId)
        .single();

      if (prod) {
        const badge = document.getElementById('tp-show-badge');
        const poster = document.getElementById('tp-poster');
        badge.style.display = '';
        document.getElementById('tp-show-name').textContent = prod.title || '';
        const sub = [prod.subtitle, prod.season_year].filter(Boolean).join(' · ');
        document.getElementById('tp-show-sub').textContent = sub;
        if (prod.poster_url) {
          poster.src = prod.poster_url;
        } else {
          poster.style.display = 'none';
        }
        document.title = (prod.title || 'Creative Team') + ' — Build The Show';
      }

      // ── Auto-login via pvw params ──
      if (pvwEmail && pvwPasscode) {
        await attemptLogin(pvwEmail, pvwPasscode, null);
        return;
      }

      // ── Resume saved session ──
      const saved = loadSavedSession();
      if (saved && saved.sessionToken) {
        await attemptResume(saved.sessionToken, saved.email);
        return;
      }

      // ── Show login form ──
      showLoginForm();

      // ── Auth helpers ──

      function loadSavedSession() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY_PREFIX + prodId);
          return raw ? JSON.parse(raw) : null;
        } catch { return null; }
      }

      function saveSession(email, token) {
        try {
          localStorage.setItem(STORAGE_KEY_PREFIX + prodId, JSON.stringify({ email, sessionToken: token }));
        } catch {}
      }

      async function attemptLogin(email, passcode, errEl) {
        const cleanEmail    = (email || '').trim().toLowerCase();
        const cleanPasscode = (passcode || '').replace(/\D+/g, '').slice(0, 6);
        if (!cleanEmail || cleanPasscode.length !== 6) {
          if (errEl) errEl.textContent = 'Enter your email and 6-digit access code.';
          return;
        }

        if (errEl) errEl.textContent = '';
        const btn = document.getElementById('tp-signin-btn');
        if (btn) btn.disabled = true;

        const { data, error } = await sb.rpc('team_member_start_session', {
          p_production_id: prodId,
          p_email: cleanEmail,
          p_passcode: cleanPasscode,
          p_user_agent: navigator.userAgent,
        });

        if (error || !data || !data.team_member) {
          if (btn) btn.disabled = false;
          const msg = (data && data.error) ? data.error : (error?.message || 'Access denied. Check your email and code.');
          if (errEl) { errEl.textContent = msg; } else { showError(msg, true); }
          return;
        }

        const member = data.team_member;
        const token  = data.session_token || '';
        saveSession(cleanEmail, token);
        storePortalSession(member, token);
        redirect();
      }

      async function attemptResume(token, email) {
        const { data, error } = await sb.rpc('team_member_resume_session', {
          p_production_id: prodId,
          p_session_token: token,
        });

        if (error || !data || !data[0]) {
          // Session expired — show login form with notice
          showLoginForm('Your session has expired. Please sign in again.');
          return;
        }

        const member = data[0];
        storePortalSession(member, token);
        redirect();
      }

      function storePortalSession(member, token) {
        const role = String(member.role || member.access_level || '').trim().toLowerCase();
        const menuKeys = buildMenuKeys(member);
        const roleLabel = getRoleLabel(normalizeRole(role));
        const context = {
          memberId: member.id || '',
          name: member.name || '',
          role,
          roleLabel,
          email: member.email || '',
          menuKeys,
          sessionToken: token,
          prodId,
        };
        try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(context)); } catch {}
      }

      function redirect() {
        const raw = sessionStorage.getItem(SESSION_KEY);
        if (!raw) { location.href = pageUrl('auditions-dashboard.html'); return; }
        let ctx;
        try { ctx = JSON.parse(raw); } catch { ctx = {}; }
        const firstPage = getFirstPage(ctx.menuKeys || []);
        location.href = pageUrl(firstPage);
      }

      // ── Role / menu logic ──

      const CREATIVE_LEADERSHIP_ROLES = new Set(['director', 'choreographer', 'vocal director', 'vocal_director']);
      const CREATIVE_MENU_KEYS = [
        'auditions', 'auditions:dashboard', 'auditions:schedule',
        'casting', 'casting:castingboard', 'casting:castlist',
      ];

      const ROLE_MENU_DEFAULTS = {
        admin:        ['auditions', 'auditions:dashboard', 'auditions:schedule', 'auditions:allperformers', 'auditions:settings', 'casting', 'casting:castingboard', 'casting:castlist', 'casting:offers'],
        producer:     ['auditions', 'auditions:dashboard', 'auditions:schedule', 'auditions:allperformers', 'casting', 'casting:castingboard', 'casting:castlist'],
        creative:     ['auditions', 'auditions:dashboard', 'auditions:schedule'],
        room:         ['auditions', 'auditions:dashboard', 'auditions:schedule'],
        check_in:     ['auditions', 'auditions:dashboard'],
        schedule:     ['auditions', 'auditions:schedule'],
        view_only:    ['auditions', 'auditions:dashboard'],
      };

      const ROLE_LABELS = {
        admin: 'Admin', producer: 'Producer', director: 'Director',
        creative: 'Creative Team', room: 'Audition Room', check_in: 'Check-In',
        schedule: 'Schedule Support', view_only: 'View Only',
        vocal_director: 'Vocal Director', choreographer: 'Choreographer',
      };

      function normalizeRole(role) {
        const raw = String(role || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
        if (raw === 'musical_director' || raw === 'music_director') return 'vocal_director';
        if (raw === 'administrator' || raw === 'full_access') return 'admin';
        if (raw === 'audition_room') return 'room';
        if (raw === 'checkin') return 'check_in';
        return raw;
      }

      function getRoleLabel(normRole) {
        return ROLE_LABELS[normRole] || 'Creative Team';
      }

      function buildMenuKeys(member) {
        const role = String(member.role || '').trim().toLowerCase();
        if (CREATIVE_LEADERSHIP_ROLES.has(role)) return [...CREATIVE_MENU_KEYS];
        const raw = Array.isArray(member.menu_access) && member.menu_access.length ? member.menu_access : null;
        const norm = normalizeRole(role);
        return raw || ROLE_MENU_DEFAULTS[norm] || ROLE_MENU_DEFAULTS.creative;
      }

      function getFirstPage(menuKeys) {
        const keys = new Set(menuKeys);
        if (keys.has('auditions:dashboard') || keys.has('auditions')) return 'auditions-dashboard.html';
        if (keys.has('casting:castingboard')) return 'casting-board.html';
        if (keys.has('casting:castlist')) return 'casting-castlist.html';
        return 'auditions-dashboard.html';
      }

      function pageUrl(file) {
        return '/SYSTEM/Organisations/Productions/Workspace/' + file + '?id=' + encodeURIComponent(prodId);
      }

      // ── UI helpers ──

      function showLoginForm(notice) {
        document.getElementById('tp-body').innerHTML = `
          <div class="tp-kicker">Creative Team</div>
          <h1 class="tp-title">Sign In</h1>
          <p class="tp-subtitle">Enter your email and the access code you were given.</p>
          ${notice ? `<div style="font-size:0.8rem;color:#d1523d;font-weight:700;margin-bottom:1rem;">${esc(notice)}</div>` : ''}
          <div class="tp-field">
            <label for="tp-email">Email</label>
            <input type="email" id="tp-email" name="email" autocomplete="email" placeholder="your@email.com" />
          </div>
          <div class="tp-field">
            <label for="tp-code">Access Code</label>
            <input type="text" id="tp-code" name="code" autocomplete="one-time-code" inputmode="numeric" maxlength="6" placeholder="6-digit code" />
          </div>
          <button class="tp-btn" id="tp-signin-btn" onclick="handleSignIn()">Sign In</button>
          <div class="tp-error" id="tp-err"></div>
        `;
        const emailEl = document.getElementById('tp-email');
        if (emailEl) emailEl.focus();

        // Allow Enter key to submit
        [document.getElementById('tp-email'), document.getElementById('tp-code')].forEach(el => {
          if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });
        });
      }

      window.handleSignIn = async function () {
        const email = (document.getElementById('tp-email')?.value || '').trim();
        const code  = (document.getElementById('tp-code')?.value || '').trim();
        const errEl = document.getElementById('tp-err');
        await attemptLogin(email, code, errEl);
      };

      function showError(msg, showRetry) {
        document.getElementById('tp-body').innerHTML = `
          <div style="text-align:center;padding:1rem 0">
            <div style="font-size:0.88rem;color:#d1523d;font-weight:700;margin-bottom:1rem;">${esc(msg)}</div>
            ${showRetry ? `<button class="tp-btn" style="width:auto;padding:0.6rem 1.5rem" onclick="showLoginForm()">Try Again</button>` : ''}
          </div>`;
        if (showRetry) window.showLoginForm = showLoginForm;
      }

      function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

    })();
  </script>
</body>
</html>
