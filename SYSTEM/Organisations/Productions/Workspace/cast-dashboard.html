<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cast Dashboard - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v51-20260704" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #f5f4f8; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; min-height: 100dvh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; z-index: 0; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: -1; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) { .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; } .prod-main::before { inset: 0; } }

    /* ── Phase badge in header ── */
    .cd-phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 0.4rem;
    }

    /* ── Stat cards ── */
    .cd-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin: 1.5rem 0 1.25rem;
    }
    .cd-stat {
      background: #fff;
      border-radius: 14px;
      padding: 1.2rem 1.4rem;
      box-shadow: 0 4px 16px rgba(26,21,48,0.06);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .cd-stat-number {
      font-size: 2.2rem;
      font-weight: 950;
      color: #1a1530;
      line-height: 1;
    }
    .cd-stat-number.accent { color: var(--cd-accent, #572e88); }
    .cd-stat-label {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(26,21,48,0.45);
    }
    .cd-stat-sub {
      font-size: 0.78rem;
      color: rgba(26,21,48,0.5);
      font-weight: 600;
      margin-top: 0.15rem;
    }

    /* ── Two-column body ── */
    .cd-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.1rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 860px) { .cd-body { grid-template-columns: 1fr; } .cd-stats { grid-template-columns: repeat(2, 1fr); } }

    .cd-section {
      background: #fff;
      border-radius: 14px;
      padding: 1.3rem 1.4rem;
      box-shadow: 0 4px 16px rgba(26,21,48,0.06);
    }
    .cd-section-title {
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(26,21,48,0.4);
      margin: 0 0 1rem;
    }

    /* Attention items */
    .cd-attention-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      border-radius: 10px;
      background: rgba(209,82,61,0.05);
      border: 1px solid rgba(209,82,61,0.13);
      margin-bottom: 0.55rem;
      font-size: 0.82rem;
      line-height: 1.45;
    }
    .cd-attention-item:last-child { margin-bottom: 0; }
    .cd-attention-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1523d;
      flex-shrink: 0;
      margin-top: 0.35rem;
    }
    .cd-attention-dot.warn { background: #dd8233; }
    .cd-attention-dot.ok { background: #769e7b; }
    .cd-attention-text { flex: 1; color: #1a1530; font-weight: 600; }
    .cd-attention-text small { display: block; font-weight: 400; color: rgba(26,21,48,0.55); font-size: 0.76rem; margin-top: 0.1rem; }
    .cd-attention-empty { font-size: 0.82rem; color: rgba(26,21,48,0.4); font-style: italic; }

    /* Coming up items */
    .cd-event-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(26,21,48,0.06);
      font-size: 0.83rem;
    }
    .cd-event-item:last-child { border-bottom: none; padding-bottom: 0; }
    .cd-event-date {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 38px;
      background: rgba(87,46,136,0.07);
      border-radius: 8px;
      padding: 0.3rem 0.4rem;
      text-align: center;
    }
    .cd-event-date-month { font-size: 0.58rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; color: #572e88; line-height: 1; }
    .cd-event-date-day { font-size: 1.05rem; font-weight: 950; color: #572e88; line-height: 1.1; }
    .cd-event-info { flex: 1; }
    .cd-event-name { font-weight: 800; color: #1a1530; }
    .cd-event-meta { font-size: 0.74rem; color: rgba(26,21,48,0.5); font-weight: 500; }
    .cd-events-empty { font-size: 0.82rem; color: rgba(26,21,48,0.4); font-style: italic; }

    /* ── Quick Actions ── */
    .cd-actions {
      background: #fff;
      border-radius: 14px;
      padding: 1.3rem 1.4rem;
      box-shadow: 0 4px 16px rgba(26,21,48,0.06);
      margin-bottom: 2rem;
    }
    .cd-actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 0.9rem;
    }
    .cd-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.1rem;
      border-radius: 9px;
      font: inherit;
      font-size: 0.8rem;
      font-weight: 800;
      cursor: pointer;
      border: none;
      transition: filter 0.14s;
      text-decoration: none;
      white-space: nowrap;
    }
    .cd-action-btn.primary { background: var(--cd-accent, #572e88); color: #fff; }
    .cd-action-btn.secondary { background: rgba(87,46,136,0.09); color: #572e88; }
    .cd-action-btn.gold { background: #efab45; color: #000; }
    .cd-action-btn:hover { filter: brightness(0.91); }

    /* ── Nav chips ── */
    /* uses shared .dash-nav-chip* classes from production-sidebar.css */

    /* ── Loading skeleton ── */
    .cd-loading {
      padding: 3rem 0;
      text-align: center;
      color: rgba(26,21,48,0.35);
      font-size: 0.88rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero" style="margin-bottom:0;">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Cast</span></span>
            </div>
            <h1 class="aud-visual-title" id="cd-title">Cast Dashboard</h1>
            <p class="aud-visual-copy" id="cd-subtitle">Loading...</p>
          </div>
          <div class="cd-phase-badge" id="cd-phase-badge" style="display:none;"></div>
        </div>
      </div>

      <nav class="dash-nav-chips" id="cd-nav-chips" aria-label="Cast sections" style="margin-top:1.5rem;"></nav>

      <div id="cd-body"><div class="cd-loading">Loading cast data...</div></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=70-20260705"></script>
  <script>
    window.initProductionPage('cast');

    const CD_CHIPS = [
      { label: 'Auditions',    file: 'auditions-dashboard.html',    icon: '/ASSETS/Images/Icons/Auditions.svg?v=20260705',              desc: 'Sessions, bookings, check-in, and self tapes',  colour: '#572e88' },
      { label: 'Casting',      file: 'casting-board.html',           icon: '/ASSETS/Images/Icons/Casting Board.svg?v=20260705',          desc: 'Casting board, cast list, and role offers',     colour: '#d1523d' },
      { label: 'Registration', file: 'registration-dashboard.html',  icon: '/ASSETS/Images/Icons/Budgeting-Registration.svg?v=20260705', desc: 'Track form submissions and payments',            colour: '#769e7b' },
      { label: 'Check-In',     file: 'cast-checkin.html',            icon: '/ASSETS/Images/Icons/navcastlist.svg?v=20260705',            desc: 'Attendance tracking for rehearsals and shows',  colour: '#74a2b4' },
    ];

    (function renderCastChips() {
      const nav = document.getElementById('cd-nav-chips');
      if (!nav) return;
      const pid = new URLSearchParams(location.search).get('id') || '';
      nav.innerHTML = CD_CHIPS.map(c => {
        const href = '/SYSTEM/Organisations/Productions/Workspace/' + c.file + '?id=' + encodeURIComponent(pid);
        return `<a class="dash-nav-chip" href="${href}" style="--chip-colour:${c.colour};">
          <div class="dash-nav-chip-top">
            <img class="dash-nav-chip-icon" src="${c.icon}" alt="" aria-hidden="true" />
            <div class="dash-nav-chip-label">${c.label}</div>
          </div>
          <div class="dash-nav-chip-desc">${c.desc}</div>
        </a>`;
      }).join('');
    })();
  </script>
  <script>
    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function fmtDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt)) return '';
      return dt.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    function dateBadge(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt)) return '';
      const mon = dt.toLocaleDateString('en-CA', { month: 'short' }).toUpperCase();
      const day = dt.getDate();
      return `<div class="cd-event-date"><div class="cd-event-date-month">${mon}</div><div class="cd-event-date-day">${day}</div></div>`;
    }
    function pluralise(n, singular, plural) { return n === 1 ? `${n} ${singular}` : `${n} ${plural || singular + 's'}`; }

    const params = new URLSearchParams(location.search);
    const prodId = params.get('id') || params.get('prod') || params.get('production_id');
    const sb = supabase.createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    const PHASES = {
      pre:          { label: 'Planning',    accent: '#476aaa', title: 'Cast Dashboard', desc: 'Set up your audition process before opening bookings.' },
      auditions:    { label: 'Auditions',   accent: '#572e88', title: 'Cast Dashboard', desc: 'What do you need to know about your auditions right now?' },
      callbacks:    { label: 'Callbacks',   accent: '#d1523d', title: 'Cast Dashboard', desc: 'What do you need to know about casting decisions right now?' },
      registration: { label: 'Registration', accent: '#769e7b', title: 'Cast Dashboard', desc: 'What do you need to know about your cast right now?' },
      rehearsals:   { label: 'Rehearsals',  accent: '#dd8233', title: 'Cast Dashboard', desc: 'What do you need to know about your cast right now?' },
      wrapup:       { label: 'Wrap Up',     accent: '#74a2b4', title: 'Cast Dashboard', desc: 'Final cast records, reports, and archive tasks.' },
    };

    function detectPhase(status, assignments, characters) {
      if (status === 'wrapped') return 'wrapup';
      if (status === 'rehearsals' || status === 'performances') return 'rehearsals';
      if (status === 'auditions') {
        if (characters > 0 && assignments >= Math.ceil(characters * 0.8)) return 'registration';
        if (assignments > 0) return 'callbacks';
        return 'auditions';
      }
      return 'pre';
    }

    function statCard(number, label, sub, accent) {
      return `<div class="cd-stat">
        <div class="cd-stat-number${accent ? ' accent' : ''}">${esc(String(number))}</div>
        <div class="cd-stat-label">${esc(label)}</div>
        ${sub ? `<div class="cd-stat-sub">${esc(sub)}</div>` : ''}
      </div>`;
    }

    function attentionItem(text, sub, severity) {
      const cls = severity === 'warn' ? 'warn' : severity === 'ok' ? 'ok' : '';
      return `<div class="cd-attention-item">
        <div class="cd-attention-dot${cls ? ' ' + cls : ''}"></div>
        <div class="cd-attention-text">${esc(text)}${sub ? `<small>${esc(sub)}</small>` : ''}</div>
      </div>`;
    }

    function eventItem(dateStr, name, meta) {
      return `<div class="cd-event-item">${dateBadge(dateStr)}<div class="cd-event-info"><div class="cd-event-name">${esc(name)}</div>${meta ? `<div class="cd-event-meta">${esc(meta)}</div>` : ''}</div></div>`;
    }

    function actionBtn(label, onclick, style) {
      const cls = style || 'secondary';
      return `<button class="cd-action-btn ${cls}" onclick="${esc(onclick)}">${esc(label)}</button>`;
    }

    function renderDashboard(phase, data) {
      const cfg = PHASES[phase];
      document.getElementById('cd-title').textContent = cfg.title;
      document.getElementById('cd-subtitle').textContent = cfg.desc;
      const badge = document.getElementById('cd-phase-badge');
      badge.textContent = cfg.label;
      badge.style.display = 'inline-flex';
      document.documentElement.style.setProperty('--cd-accent', cfg.accent);

      let statsHtml = '', attentionHtml = '', comingUpHtml = '', actionsHtml = '';

      if (phase === 'pre') {
        statsHtml = [
          statCard(data.characters || 0, 'Roles to Cast'),
          statCard(data.sessions || 0, 'Audition Sessions'),
          statCard(data.totalBookings || 0, 'Bookings So Far'),
          statCard('--', 'Days Until Auditions'),
        ].join('');
        const att = [];
        if (!data.sessions) att.push(attentionItem('No audition sessions scheduled yet', 'Go to Calendar to add your audition dates'));
        if (!data.characters) att.push(attentionItem('No roles added yet', 'Add characters in Script Resources'));
        if (!att.length) att.push(`<div class="cd-attention-empty">All set. Open audition bookings when ready.</div>`);
        attentionHtml = att.join('');
        comingUpHtml = data.upcomingSessions.length
          ? data.upcomingSessions.slice(0,4).map(s => eventItem(s.date, s.name || 'Audition Session', s.venue_name || '')).join('')
          : `<div class="cd-events-empty">No upcoming sessions yet.</div>`;
        actionsHtml = [
          actionBtn('Open Audition Bookings', "btsProdNav('auditions-dashboard.html')", 'primary'),
          actionBtn('View Calendar', "btsProdNav('plan-calendar.html')", 'secondary'),
          actionBtn('Add Roles', "btsProdNav('script-breakdown.html')", 'secondary'),
        ].join('');
      }

      else if (phase === 'auditions') {
        const checkedIn = data.checkedIn || 0;
        const totalBooked = data.totalBookings || 0;
        const todaySessions = data.todaySessions || 0;
        statsHtml = [
          statCard(totalBooked, 'Total Booked', null, true),
          statCard(checkedIn, 'Checked In', todaySessions ? `across ${todaySessions} session${todaySessions > 1 ? 's' : ''} today` : 'today'),
          statCard(data.noShows || 0, 'No Shows'),
          statCard(data.sessionsRemaining || 0, 'Sessions Remaining'),
        ].join('');
        const att = [];
        if (data.noShows > 0) att.push(attentionItem(`${data.noShows} no-shows`, 'People who booked but did not check in', 'warn'));
        if (data.sessionsWithoutCheckin > 0) att.push(attentionItem(`${data.sessionsWithoutCheckin} session${data.sessionsWithoutCheckin > 1 ? 's' : ''} with no check-ins`, 'Check-in may not have been opened', 'warn'));
        if (data.upcomingSessions.length === 0 && !data.sessionsRemaining) att.push(attentionItem('Auditions appear to be complete', 'Ready to move to callbacks and casting', 'ok'));
        if (!att.length) att.push(`<div class="cd-attention-empty">No issues right now.</div>`);
        attentionHtml = att.join('');
        comingUpHtml = data.upcomingSessions.length
          ? data.upcomingSessions.slice(0,4).map(s => eventItem(s.date, s.name || 'Audition Session', s.venue_name || '')).join('')
          : `<div class="cd-events-empty">No more sessions scheduled.</div>`;
        actionsHtml = [
          actionBtn('Open Check-In', "btsProdNav('auditions-dashboard.html')", 'primary'),
          actionBtn('View Bookings', "btsProdNav('auditions-dashboard.html')", 'secondary'),
          actionBtn('Casting Board', "btsProdNav('casting-board.html')", 'secondary'),
          actionBtn('View Calendar', "btsProdNav('plan-calendar.html')", 'secondary'),
        ].join('');
      }

      else if (phase === 'callbacks') {
        const assigned = data.assignments || 0;
        const chars = data.characters || 0;
        const pct = chars ? Math.round((assigned / chars) * 100) : 0;
        statsHtml = [
          statCard(chars, 'Roles to Fill', null, true),
          statCard(assigned, 'Roles Assigned', `${pct}% complete`),
          statCard(Math.max(0, chars - assigned), 'Roles Remaining'),
          statCard(data.auditioners || 0, 'Auditioners'),
        ].join('');
        const att = [];
        if (chars - assigned > 0) att.push(attentionItem(`${chars - assigned} role${chars - assigned > 1 ? 's' : ''} still need a decision`, 'Open the casting board to assign', 'warn'));
        if (data.callbacksScheduled === 0 && assigned < chars) att.push(attentionItem('No callback sessions on the calendar', 'Add callback dates in Calendar', 'warn'));
        if (!att.length) att.push(`<div class="cd-attention-empty">All roles assigned.</div>`);
        attentionHtml = att.join('');
        comingUpHtml = data.upcomingSessions.length
          ? data.upcomingSessions.slice(0,4).map(s => eventItem(s.date, s.name || 'Session', s.venue_name || '')).join('')
          : `<div class="cd-events-empty">No upcoming sessions.</div>`;
        actionsHtml = [
          actionBtn('Casting Board', "btsProdNav('casting-board.html')", 'primary'),
          actionBtn('View Auditioners', "btsProdNav('auditions-dashboard.html')", 'secondary'),
          actionBtn('Open Registration', "btsProdNav('registration-dashboard.html')", 'gold'),
        ].join('');
      }

      else if (phase === 'registration') {
        const castSize = data.assignments || 0;
        const regComplete = data.regComplete || 0;
        const missing = Math.max(0, castSize - regComplete);
        statsHtml = [
          statCard(castSize, 'Cast Members', null, true),
          statCard(regComplete, 'Registrations Complete', `${castSize ? Math.round((regComplete/castSize)*100) : 0}% done`),
          statCard(missing, 'Missing Registrations'),
          statCard(data.paymentsPending || 0, 'Payments Pending'),
        ].join('');
        const att = [];
        if (missing > 0) att.push(attentionItem(`${missing} cast member${missing > 1 ? 's' : ''} haven\'t registered`, 'Send a reminder to prompt them to complete registration', 'warn'));
        if (data.paymentsPending > 0) att.push(attentionItem(`${data.paymentsPending} payment${data.paymentsPending > 1 ? 's' : ''} outstanding`, null, 'warn'));
        if (!att.length) att.push(`<div class="cd-attention-empty">All registrations complete.</div>`);
        attentionHtml = att.join('');
        comingUpHtml = data.upcomingEvents.length
          ? data.upcomingEvents.slice(0,4).map(e => eventItem(e.date, e.name, e.meta || '')).join('')
          : `<div class="cd-events-empty">No upcoming cast events.</div>`;
        actionsHtml = [
          actionBtn('View Cast', "btsProdNav('casting-board.html')", 'primary'),
          actionBtn('Registration Dashboard', "btsProdNav('registration-dashboard.html')", 'secondary'),
          actionBtn('Send Reminder', "btsProdNav('registration-dashboard.html')", 'gold'),
          actionBtn('Cast List', "btsProdNav('casting-board.html')", 'secondary'),
        ].join('');
      }

      else if (phase === 'rehearsals') {
        statsHtml = [
          statCard(data.castSize || 0, 'Cast Members', null, true),
          statCard(data.todayCount || '--', 'Expected Today'),
          statCard(data.absences || 0, 'Absences This Week', null, data.absences > 0),
          statCard(data.daysToShow || '--', 'Days to Opening'),
        ].join('');
        const att = [];
        if (data.absences > 0) att.push(attentionItem(`${data.absences} absence${data.absences > 1 ? 's' : ''} this week`, 'Review attendance for patterns', 'warn'));
        if (data.missingForms > 0) att.push(attentionItem(`${data.missingForms} cast member${data.missingForms > 1 ? 's' : ''} with incomplete forms`, null, 'warn'));
        if (data.paymentsPending > 0) att.push(attentionItem(`${data.paymentsPending} outstanding payment${data.paymentsPending > 1 ? 's' : ''}`, null, 'warn'));
        if (!att.length) att.push(`<div class="cd-attention-empty">Nothing urgent right now.</div>`);
        attentionHtml = att.join('');
        comingUpHtml = data.upcomingEvents.length
          ? data.upcomingEvents.slice(0,5).map(e => eventItem(e.date, e.name, e.meta || '')).join('')
          : `<div class="cd-events-empty">No upcoming events found.</div>`;
        actionsHtml = [
          actionBtn('Take Attendance', "btsProdNav('auditions-dashboard.html')", 'primary'),
          actionBtn('View Cast', "btsProdNav('casting-board.html')", 'secondary'),
          actionBtn('Cast List', "btsProdNav('casting-board.html')", 'secondary'),
          actionBtn('Send Announcement', "btsProdNav('registration-dashboard.html')", 'gold'),
          actionBtn('View Calendar', "btsProdNav('plan-calendar.html')", 'secondary'),
        ].join('');
      }

      else if (phase === 'wrapup') {
        statsHtml = [
          statCard(data.castSize || 0, 'Total Cast Members', null, true),
          statCard(data.regComplete || 0, 'Records Complete'),
          statCard(data.paymentsPending || 0, 'Unresolved Payments'),
          statCard(data.missingForms || 0, 'Incomplete Forms'),
        ].join('');
        const att = [];
        if (data.paymentsPending > 0) att.push(attentionItem(`${data.paymentsPending} payment${data.paymentsPending > 1 ? 's' : ''} still outstanding`, 'Resolve before archiving', 'warn'));
        if (data.missingForms > 0) att.push(attentionItem(`${data.missingForms} incomplete form${data.missingForms > 1 ? 's' : ''}`, 'Chase before closing the production', 'warn'));
        if (!att.length) att.push(`<div class="cd-attention-empty">All records complete. Ready to archive.</div>`);
        attentionHtml = att.join('');
        comingUpHtml = `<div class="cd-events-empty">Production complete.</div>`;
        actionsHtml = [
          actionBtn('Export Cast List', "btsProdNav('casting-board.html')", 'primary'),
          actionBtn('View Reports', "btsProdNav('registration-dashboard.html')", 'secondary'),
          actionBtn('Registration Records', "btsProdNav('registration-dashboard.html')", 'secondary'),
        ].join('');
      }

      document.getElementById('cd-body').innerHTML = `
        <div class="cd-stats">${statsHtml}</div>
        <div class="cd-body">
          <div class="cd-section">
            <div class="cd-section-title">Needs Your Attention</div>
            ${attentionHtml}
          </div>
          <div class="cd-section">
            <div class="cd-section-title">Coming Up</div>
            ${comingUpHtml}
          </div>
        </div>
        <div class="cd-actions">
          <div class="cd-section-title">Quick Actions</div>
          <div class="cd-actions-row">${actionsHtml}</div>
        </div>`;
    }

    async function loadDashboard() {
      if (!prodId) {
        document.getElementById('cd-body').innerHTML = '<div class="cd-loading">No production selected.</div>';
        return;
      }

      try {
        const [prodRes, sessRes, bookRes, charRes, assignRes] = await Promise.all([
          sb.from('productions').select('id,name,status,production_type,performance_start_date,performance_end_date').eq('id', prodId).single(),
          sb.from('audition_sessions').select('id,date,venue_name,name,session_type').eq('production_id', prodId).order('date'),
          sb.from('audition_bookings').select('id,email,checked_in,slot_id').eq('production_id', prodId),
          sb.from('production_characters').select('id,name').eq('production_id', prodId),
          sb.from('casting_assignments').select('id,character_id,status').eq('production_id', prodId),
        ]);

        const prod       = prodRes.data || {};
        const sessions   = sessRes.data || [];
        const bookings   = bookRes.data || [];
        const characters = charRes.data || [];
        const assignments = assignRes.data || [];

        const status       = prod.status || 'setup';
        const assignCount  = assignments.filter(a => a.status !== 'declined').length;
        const phase        = detectPhase(status, assignCount, characters.length);

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const todayStr = today.toISOString().slice(0, 10);

        const upcomingSessions = sessions.filter(s => s.date >= todayStr).slice(0, 5);
        const pastSessions     = sessions.filter(s => s.date < todayStr);
        const todaySessions    = sessions.filter(s => s.date && s.date.slice(0, 10) === todayStr);

        const totalBookings   = bookings.length;
        const checkedIn       = bookings.filter(b => b.checked_in).length;
        const sessionsRemaining = upcomingSessions.length;

        let upcomingEvents = [];
        try {
          const { data: evts } = await sb.from('production_events')
            .select('id,title,start_date,event_type,location')
            .eq('production_id', prodId)
            .gte('start_date', todayStr)
            .order('start_date')
            .limit(6);
          upcomingEvents = (evts || []).map(e => ({ date: e.start_date, name: e.title, meta: e.location || e.event_type || '' }));
        } catch (_) {}

        if (!upcomingEvents.length) {
          upcomingEvents = upcomingSessions.slice(0, 5).map(s => ({ date: s.date, name: s.name || 'Audition Session', meta: s.venue_name || '' }));
        }

        let regComplete = 0, paymentsPending = 0, missingForms = 0;
        try {
          const { data: regs } = await sb.from('production_registrations')
            .select('id,status,payment_status')
            .eq('production_id', prodId);
          if (regs) {
            regComplete     = regs.filter(r => r.status === 'complete' || r.status === 'approved').length;
            paymentsPending = regs.filter(r => r.payment_status === 'pending' || r.payment_status === 'overdue').length;
            missingForms    = Math.max(0, assignCount - regs.length);
          }
        } catch (_) {}

        let daysToShow = '--';
        if (prod.performance_start_date) {
          const showDate = new Date(prod.performance_start_date);
          const diff = Math.ceil((showDate - today) / (1000 * 60 * 60 * 24));
          if (diff > 0) daysToShow = diff;
        }

        const sessionsWithoutCheckin = pastSessions.filter(s => {
          const sessionBookings = bookings.filter(b => b.slot_id === s.id || bookings.some(bk => bk.checked_in));
          return sessionBookings.length === 0;
        }).length;

        const noShows = bookings.filter(b => {
          const inPastSession = pastSessions.some(s => s.id === b.slot_id);
          return inPastSession && !b.checked_in;
        }).length;

        const data = {
          characters: characters.length,
          sessions: sessions.length,
          totalBookings,
          checkedIn,
          noShows,
          sessionsRemaining,
          todaySessions: todaySessions.length,
          sessionsWithoutCheckin,
          upcomingSessions,
          assignments: assignCount,
          auditioners: totalBookings,
          callbacksScheduled: upcomingSessions.filter(s => s.session_type === 'callback').length,
          regComplete,
          paymentsPending,
          missingForms,
          castSize: assignCount || totalBookings,
          todayCount: todaySessions.reduce((n, s) => n + bookings.filter(b => b.slot_id === s.id).length, 0) || '--',
          absences: noShows,
          daysToShow,
          upcomingEvents,
        };

        renderDashboard(phase, data);

      } catch (err) {
        console.error('[BTS] cast-dashboard error', err);
        document.getElementById('cd-body').innerHTML = '<div class="cd-loading">Could not load cast data.</div>';
      }
    }

    loadDashboard();
  </script>
</body>
</html>
