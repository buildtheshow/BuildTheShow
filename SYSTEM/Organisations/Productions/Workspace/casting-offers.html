<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casting Offers - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v47-20260610" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1100px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    .page-kicker { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,21,48,0.38); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .page-kicker-dot { width: 6px; height: 6px; border-radius: 50%; background: #572e88; flex-shrink: 0; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
    .page-title { font-size: 2rem; font-weight: 950; color: #1a1530; margin: 0; }
    .page-subtitle { font-size: 0.85rem; color: rgba(26,21,48,0.45); margin: 0.25rem 0 0; }

    .offers-summary { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .offers-stat { border: 1.5px solid rgba(87,46,136,0.12); border-radius: 10px; padding: 0.85rem 1.1rem; min-width: 110px; }
    .offers-stat-num { font-size: 1.6rem; font-weight: 950; color: #572e88; line-height: 1; }
    .offers-stat-label { font-size: 0.65rem; font-weight: 900; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(26,21,48,0.4); margin-top: 0.25rem; }

    .bulk-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .bulk-btn { font-size: 0.8rem; font-weight: 850; border-radius: 8px; padding: 0.48rem 1rem; border: none; background: #572e88; color: #fff; cursor: pointer; font-family: var(--bts-font); transition: background 0.12s; }
    .bulk-btn:hover { background: #3d1f66; }
    .bulk-btn:disabled { opacity: 0.5; cursor: default; }
    .bulk-note { font-size: 0.75rem; color: rgba(26,21,48,0.45); }

    .offers-table { width: 100%; border-collapse: collapse; }
    .offers-table th { font-size: 0.68rem; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(26,21,48,0.4); padding: 0.6rem 0.9rem; border-bottom: 1.5px solid rgba(87,46,136,0.1); text-align: left; }
    .offers-table td { padding: 0.8rem 0.9rem; border-bottom: 1px solid rgba(87,46,136,0.06); vertical-align: middle; }
    .offers-table tbody tr:hover { background: rgba(87,46,136,0.02); }
    .off-avatar { width: 34px; height: 34px; border-radius: 50%; background: #f0ecfc; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.72rem; color: #572e88; overflow: hidden; flex-shrink: 0; }
    .off-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .off-name-cell { display: flex; align-items: center; gap: 0.65rem; }
    .off-name { font-size: 0.88rem; font-weight: 800; }
    .off-email { font-size: 0.74rem; color: rgba(26,21,48,0.45); margin-top: 0.1rem; }
    .off-role-tag { font-size: 0.72rem; font-weight: 850; border-radius: 100px; padding: 0.18rem 0.5rem; background: rgba(87,46,136,0.1); color: #572e88; white-space: nowrap; }
    .off-state-pill { font-size: 0.68rem; font-weight: 850; border-radius: 100px; padding: 0.2rem 0.55rem; white-space: nowrap; }
    .off-chosen { background: #fef4e2; color: #a06b00; }
    .off-offer_sent { background: rgba(71,106,170,0.12); color: #476aaa; }
    .off-offer_accepted { background: #e5f0e7; color: #2e6639; }
    .off-not_cast { background: rgba(209,82,61,0.1); color: #d1523d; }
    .off-send-btn { font-size: 0.74rem; font-weight: 850; border-radius: 7px; padding: 0.32rem 0.7rem; border: 1.5px solid rgba(87,46,136,0.2); background: #fff; color: #572e88; cursor: pointer; font-family: var(--bts-font); transition: all 0.12s; white-space: nowrap; }
    .off-send-btn:hover { background: #f0ecfc; border-color: #572e88; }
    .off-send-btn:disabled { opacity: 0.45; cursor: default; }
    .off-sent-label { font-size: 0.72rem; color: rgba(26,21,48,0.4); font-style: italic; }

    .offers-empty { text-align: center; padding: 3rem 1rem; color: rgba(26,21,48,0.35); font-size: 0.88rem; }
    .offers-loading { color: rgba(26,21,48,0.38); font-size: 0.88rem; padding: 2rem 0; }

    /* Toast */
    .off-toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1a1530; color: #fff; font-size: 0.82rem; font-weight: 800; border-radius: 9px; padding: 0.7rem 1.1rem; z-index: 9999; transform: translateY(120%); transition: transform 0.22s; box-shadow: 0 4px 20px rgba(0,0,0,0.22); }
    .off-toast.show { transform: translateY(0); }
    .off-toast.error { background: #d1523d; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>
  <div class="prod-main">
    <div class="prod-main-inner">
      <div class="page-kicker"><span class="page-kicker-dot"></span>CASTING</div>
      <div class="page-header">
        <div>
          <h1 class="page-title">Offers</h1>
          <p class="page-subtitle">Send role offers to confirmed cast members.</p>
        </div>
      </div>
      <div id="offers-root"><div class="offers-loading">Loading...</div></div>
    </div>
  </div>

  <div class="off-toast" id="off-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=20"></script>
  <script>
    window.initProductionPage('cast');

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function initials(name) { return String(name||'').trim().split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'?'; }

    let _sb, _prodId;
    let _rows = [];   // { perf, char, assignment }

    function showToast(msg, isError = false) {
      const t = document.getElementById('off-toast');
      t.textContent = msg;
      t.className = 'off-toast show' + (isError ? ' error' : '');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2800);
    }

    function offerStateClass(state) {
      return { chosen: 'off-chosen', offer_sent: 'off-offer_sent', offer_accepted: 'off-offer_accepted', not_cast: 'off-not_cast' }[state] || 'off-chosen';
    }
    function offerStateLabel(state) {
      return { chosen: 'Chosen', offer_sent: 'Offer Sent', offer_accepted: 'Offer Accepted', not_cast: 'Not Cast' }[state] || state;
    }

    async function bulkSendOffers() {
      const pending = _rows.filter(r => r.assignment.state === 'chosen' && r.perf?.email);
      if (!pending.length) return;
      if (!confirm(`Mark ${pending.length} offer${pending.length === 1 ? '' : 's'} as sent?`)) return;
      const ids = pending.map(r => r.assignment.id);
      const { error } = await _sb.from('casting_assignments')
        .update({ state: 'offer_sent' })
        .in('id', ids);
      if (error) { showToast('Could not update. Try again.', true); return; }
      pending.forEach(r => { r.assignment.state = 'offer_sent'; });
      renderTable();
      showToast(`${pending.length} offer${pending.length === 1 ? '' : 's'} marked as sent.`);
    }

    async function sendOffer(assignmentId, perfName, charName, perfEmail) {
      if (!perfEmail) { showToast('No email on file for this performer.', true); return; }
      const btn = document.getElementById(`off-btn-${assignmentId}`);
      if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; }

      // Mark as offer sent in casting_assignments (using a custom_answers JSONB field or a dedicated column if available)
      // For now we update state to offer_sent if it's 'chosen'
      const { error } = await _sb.from('casting_assignments')
        .update({ state: 'offer_sent' })
        .eq('id', assignmentId)
        .eq('state', 'chosen');

      if (error) {
        if (btn) { btn.textContent = 'Send Offer'; btn.disabled = false; }
        showToast('Could not update. Check console.', true);
        return;
      }

      // Update local data
      const row = _rows.find(r => String(r.assignment.id) === String(assignmentId));
      if (row) row.assignment.state = 'offer_sent';

      if (btn) {
        btn.textContent = 'Sent';
        btn.disabled = true;
        btn.classList.add('off-sent-label');
      }
      showToast(`Offer marked for ${perfName} (${charName}). Send them an email manually or via Communications.`);
    }

    async function markNotCast(assignmentId) {
      if (!confirm('Mark as not cast? This will remove them from the confirmed list.')) return;
      const { error } = await _sb.from('casting_assignments')
        .update({ state: 'not_cast' })
        .eq('id', assignmentId);
      if (error) { showToast('Could not update.', true); return; }
      const row = _rows.find(r => String(r.assignment.id) === String(assignmentId));
      if (row) row.assignment.state = 'not_cast';
      renderTable();
      showToast('Marked as not cast.');
    }

    function renderTable() {
      const activeRows = _rows.filter(r => r.assignment.state !== 'not_cast');
      const chosen = activeRows.filter(r => r.assignment.state === 'chosen');
      const accepted = activeRows.filter(r => r.assignment.state === 'offer_accepted');
      const sent = activeRows.filter(r => r.assignment.state === 'offer_sent');

      document.getElementById('stat-total').textContent = activeRows.length;
      document.getElementById('stat-chosen').textContent = chosen.length;
      document.getElementById('stat-accepted').textContent = accepted.length;
      document.getElementById('stat-sent').textContent = sent.length;

      const pendingOffers = chosen.filter(r => r.perf?.email);
      const bulkBtn = document.getElementById('bulk-offer-btn');
      if (bulkBtn) {
        bulkBtn.disabled = pendingOffers.length === 0;
        bulkBtn.textContent = `Send All Offers (${pendingOffers.length})`;
      }

      const tbody = document.getElementById('offers-tbody');
      if (!tbody) return;

      if (!_rows.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="offers-empty">No confirmed cast yet. Use the <a href="#" onclick="btsProdNav('casting-board.html');return false;" style="color:#572e88;">Casting Board</a> to mark performers as Chosen.</div></td></tr>`;
        return;
      }

      tbody.innerHTML = _rows.map(r => {
        const { perf, char, assignment } = r;
        const avatarInner = perf?.headshot_url
          ? `<img src="${esc(perf.headshot_url)}" alt="${esc(perf?.name)}" />`
          : esc(initials(perf?.name));
        const stateClass = offerStateClass(assignment.state);
        const stateLabel = offerStateLabel(assignment.state);

        let actionCell = '';
        if (assignment.state === 'chosen') {
          actionCell = `<button class="off-send-btn" id="off-btn-${esc(String(assignment.id))}" onclick="sendOffer('${esc(String(assignment.id))}','${esc(perf?.name||'')}','${esc(char?.name||'')}','${esc(perf?.email||'')}')">Send Offer</button>`;
        } else if (assignment.state === 'offer_accepted') {
          actionCell = `<span class="off-sent-label">Accepted</span>`;
        } else if (assignment.state === 'offer_sent') {
          actionCell = `<span class="off-sent-label">Offer Sent</span>`;
        } else if (assignment.state === 'not_cast') {
          actionCell = `<span class="off-sent-label">Not Cast</span>`;
        }

        return `<tr>
          <td>
            <div class="off-name-cell">
              <div class="off-avatar">${avatarInner}</div>
              <div>
                <div class="off-name">${esc(perf?.name||'Unknown')}</div>
                ${perf?.email ? `<div class="off-email">${esc(perf.email)}</div>` : ''}
              </div>
            </div>
          </td>
          <td><span class="off-role-tag">${esc(char?.name||'Unknown role')}</span></td>
          <td>${char?.role_type ? `<span style="font-size:0.78rem;color:rgba(26,21,48,0.55);">${esc(char.role_type)}</span>` : ''}</td>
          <td><span class="off-state-pill ${stateClass}">${esc(stateLabel)}</span></td>
          <td style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
            ${actionCell}
            ${assignment.state !== 'not_cast' ? `<button class="off-send-btn" style="color:#d1523d;border-color:rgba(209,82,61,0.2);" onclick="markNotCast('${esc(String(assignment.id))}')">Not Cast</button>` : ''}
          </td>
        </tr>`;
      }).join('');
    }

    (async function () {
      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      _prodId = new URLSearchParams(location.search).get('id') || '';
      if (!_prodId) return;
      _sb = supabase.createClient(SB_URL, SB_ANON);

      const [charRes, assignRes, appRes, bookRes] = await Promise.all([
        _sb.from('production_characters').select('id,name,role_type').eq('production_id', _prodId),
        _sb.from('casting_assignments').select('*').eq('production_id', _prodId)
          .in('state', ['chosen','offer_sent','offer_accepted','not_cast']),
        _sb.from('audition_applications').select('id,name,email,headshot_url').eq('production_id', _prodId),
        _sb.from('audition_bookings').select('id,name,email').eq('production_id', _prodId),
      ]);

      const chars = charRes.data || [];
      const assignments = assignRes.data || [];
      const apps = appRes.data || [];
      const appIds = new Set(apps.map(a => String(a.id)));
      const performers = [
        ...apps,
        ...(bookRes.data || []).filter(b => !appIds.has(String(b.id))),
      ];

      const charMap = new Map(chars.map(c => [c.id, c]));
      const perfMap = new Map(performers.map(p => [String(p.id), p]));

      _rows = assignments.map(a => ({
        assignment: a,
        char: charMap.get(a.character_id) || null,
        perf: perfMap.get(String(a.applicant_id)) || null,
      })).sort((a, b) => (a.perf?.name||'').localeCompare(b.perf?.name||''));

      document.getElementById('offers-root').innerHTML = `
        <div class="offers-summary">
          <div class="offers-stat">
            <div class="offers-stat-num" id="stat-total">0</div>
            <div class="offers-stat-label">Total Cast</div>
          </div>
          <div class="offers-stat">
            <div class="offers-stat-num" id="stat-chosen" style="color:#dd8233;">0</div>
            <div class="offers-stat-label">Chosen</div>
          </div>
          <div class="offers-stat">
            <div class="offers-stat-num" id="stat-sent" style="color:#476aaa;">0</div>
            <div class="offers-stat-label">Offer Sent</div>
          </div>
          <div class="offers-stat">
            <div class="offers-stat-num" id="stat-accepted" style="color:#769e7b;">0</div>
            <div class="offers-stat-label">Accepted</div>
          </div>
        </div>
        <div class="bulk-bar">
          <button class="bulk-btn" id="bulk-offer-btn" disabled onclick="bulkSendOffers()">Send All Offers (0)</button>
          <span class="bulk-note">Offers are tracked here. Email via Communications.</span>
        </div>
        <table class="offers-table">
          <thead><tr>
            <th>Performer</th>
            <th>Role</th>
            <th>Type</th>
            <th>Status</th>
            <th>Actions</th>
          </tr></thead>
          <tbody id="offers-tbody"></tbody>
        </table>`;

      renderTable();
    })();
  </script>
</body>
</html>
