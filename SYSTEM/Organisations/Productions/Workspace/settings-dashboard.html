<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v49-20260618" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem 2.25rem;
      max-width: calc(100vw - 220px);
      overflow-x: clip;
      position: relative;
      z-index: 0;
    }
    .prod-main::before {
      content: '';
      position: fixed;
      inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.04;
      pointer-events: none;
      z-index: -1;
    }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    /* ── Settings card grid ── */
    .settings-card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 1.75rem;
    }
    @media (max-width: 1100px) { .settings-card-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .settings-card-grid { grid-template-columns: 1fr; } }

    .settings-card {
      background: #fff;
      border: 1.5px solid #ebebf2;
      border-radius: 14px;
      padding: 1.35rem 1.25rem 1.2rem;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .settings-card:hover {
      border-color: #572e88;
      box-shadow: 0 4px 18px rgba(87,46,136,0.10);
      transform: translateY(-2px);
    }
    .settings-card-top {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .settings-card-icon-wrap {
      width: 42px; height: 42px;
      background: #f3eeff;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .settings-card-icon-wrap img {
      width: 22px; height: 22px;
      object-fit: contain;
      filter: invert(20%) sepia(60%) saturate(500%) hue-rotate(240deg) brightness(70%);
    }
    .settings-card-title {
      font-size: 0.92rem;
      font-weight: 800;
      color: #1a1530;
      line-height: 1.2;
    }
    .settings-card-desc {
      font-size: 0.76rem;
      color: #5a5470;
      line-height: 1.6;
    }
    .settings-card-arrow {
      margin-top: auto;
      padding-top: 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      color: #572e88;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span id="settings-kicker">SETTINGS</span>
            </div>
            <h1 class="aud-visual-title">Settings</h1>
            <p class="aud-visual-copy">Manage everything about how this production is set up and who can access what.</p>
          </div>
        </div>
      </div>

      <div class="settings-card-grid" id="settings-grid"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=63-20260703"></script>
  <script>
    window.initProductionPage('settings');
  </script>
  <script>
    const prodId = new URLSearchParams(location.search).get('id');

    const SETTINGS_PAGES = [
      {
        file:  'production-settings.html',
        icon:  '/ASSETS/Images/Icons/navsettings.svg',
        title: 'Production Settings',
        desc:  'Your show\'s name, dates, venue, slug, and public visibility. The basics that appear everywhere.',
      },
      {
        file:  'settings-features.html',
        icon:  '/ASSETS/Images/Icons/navsettings.svg',
        title: 'Features',
        desc:  'Turn sections on or off. Only show the parts of the workspace that apply to this production. Changes update the sidebar instantly.',
      },
      {
        file:  'settings-team.html',
        icon:  '/ASSETS/Images/Icons/navproductionteam.svg',
        title: 'Team & Permissions',
        desc:  'Add team members, assign roles, and control what each person can see and do inside this production.',
      },
      {
        file:  'settings-communications.html',
        icon:  '/ASSETS/Images/Icons/navemailtemplate.svg',
        title: 'Communications',
        desc:  'Email notification preferences and how the system contacts your team when things change.',
      },
      {
        file:  'emails.html',
        icon:  '/ASSETS/Images/Icons/navemailtemplate.svg',
        title: 'Email Templates',
        desc:  'Customise every email the system sends. Audition confirmations, cast offers, registration receipts, and more.',
      },
      {
        file:  'settings-forms.html',
        icon:  '/ASSETS/Images/Icons/navsettings.svg',
        title: 'Forms',
        desc:  'Build and manage the forms performers and cast members fill out. Control which fields are required and what gets collected.',
      },
      {
        file:  'settings-payments.html',
        icon:  '/ASSETS/Images/Icons/navsettings.svg',
        title: 'Payments',
        desc:  'Payment gateways, production fee structures, instalment plans, and how money is collected from your cast.',
      },
      {
        file:  'settings-integrations.html',
        icon:  '/ASSETS/Images/Icons/navsettings.svg',
        title: 'Integrations',
        desc:  'Connect third-party tools and services. Square for payments, calendar exports, and more.',
      },
    ];

    function nav(file) {
      const id = prodId || '';
      location.href = '/SYSTEM/Organisations/Productions/Workspace/' + file + '?id=' + encodeURIComponent(id);
    }

    function render() {
      const grid = document.getElementById('settings-grid');
      grid.innerHTML = SETTINGS_PAGES.map(p => `
        <div class="settings-card" onclick="nav('${p.file}')">
          <div class="settings-card-top">
            <div class="settings-card-icon-wrap">
              <img src="${p.icon}" alt="" aria-hidden="true" />
            </div>
            <div class="settings-card-title">${p.title}</div>
          </div>
          <div class="settings-card-desc">${p.desc}</div>
          <div class="settings-card-arrow">Open <span aria-hidden="true">→</span></div>
        </div>
      `).join('');
    }

    render();
  </script>
</body>
</html>
