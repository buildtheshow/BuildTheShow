<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v49-20260618" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem 2.25rem;
      max-width: calc(100vw - 220px);
      overflow-x: clip;
      position: relative;
      z-index: 0;
    }
    .prod-main::before {
      content: '';
      position: fixed;
      inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.04;
      pointer-events: none;
      z-index: -1;
    }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    /* ── Settings card grid ── */
    .settings-card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.85rem;
      margin-top: 1.75rem;
    }
    @media (max-width: 1100px) { .settings-card-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .settings-card-grid { grid-template-columns: 1fr 1fr; } }

    .settings-card {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      padding: 1.1rem 1rem 1rem;
      border-radius: 12px;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .settings-card:hover { filter: brightness(0.88); }

    .settings-card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .settings-card-icon {
      width: 40px; height: 40px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 0.9;
      flex-shrink: 0;
    }
    .settings-card-name {
      font-size: 1.54rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }
    .settings-card-sub {
      font-size: 0.75rem;
      color: #fff;
      line-height: 1.35;
    }
    .settings-card-bullets {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
      flex: 1;
    }
    .settings-card-bullets li {
      font-size: 0.71rem;
      color: #fff;
      line-height: 1.4;
      padding-left: 0.85rem;
      position: relative;
    }
    .settings-card-bullets li::before {
      content: '\2013';
      position: absolute;
      left: 0;
      color: #fff;
    }
    .settings-card-arrow {
      margin-top: auto;
      padding-top: 0.5rem;
      font-size: 0.71rem;
      font-weight: 700;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span id="settings-kicker">SETTINGS</span>
            </div>
            <h1 class="aud-visual-title">Settings</h1>
            <p class="aud-visual-copy">Manage everything about how this production is set up and who can access what.</p>
          </div>
        </div>
      </div>

      <div class="settings-card-grid" id="settings-grid"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=64-20260704"></script>
  <script>
    window.initProductionPage('settings');
  </script>
  <script>
    const prodId = new URLSearchParams(location.search).get('id');

    const SETTINGS_PAGES = [
      {
        file:    'production-settings.html',
        colour:  '#572e88',
        icon:    '/ASSETS/Images/Icons/page-cast.svg?v=20260704c',
        title:   'Production Settings',
        sub:     'Everything about this production in one place.',
        bullets: [
          'Change your production name, dates, venue, and season',
          'Update your public web address',
          'Manage the information shown throughout Build The Show',
        ],
      },
      {
        file:    'settings-features.html',
        colour:  '#efab45',
        icon:    '/ASSETS/Images/Icons/navsettings.svg?v=20260704c',
        title:   'Features',
        sub:     'Choose which tools this production uses.',
        bullets: [
          'Turn sections of Build The Show on or off',
          'Hide anything you don\'t need',
          'Your sidebar updates automatically as you make changes',
        ],
      },
      {
        file:    'settings-integrations.html',
        colour:  '#d1523d',
        icon:    '/ASSETS/Images/Icons/Hexagon.svg?v=20260704c',
        title:   'Integrations',
        sub:     'Connect Build The Show with the services you already use.',
        bullets: [
          'Connect Square for payments',
          'Sync calendars and other supported apps',
          'Manage all connected services in one place',
        ],
      },
    ];

    function nav(file) {
      const id = prodId || '';
      location.href = '/SYSTEM/Organisations/Productions/Workspace/' + file + '?id=' + encodeURIComponent(id);
    }

    function render() {
      const grid = document.getElementById('settings-grid');
      grid.innerHTML = SETTINGS_PAGES.map(p => `
        <div class="settings-card" style="background:${p.colour};" onclick="nav('${p.file}')">
          <div class="settings-card-header">
            <img class="settings-card-icon" src="${p.icon}" alt="" aria-hidden="true" />
            <div class="settings-card-name">${p.title}</div>
          </div>
          <div class="settings-card-sub">${p.sub}</div>
          <ul class="settings-card-bullets">
            ${p.bullets.map(b => `<li>${b}</li>`).join('')}
          </ul>
          <div class="settings-card-arrow">Open &rarr;</div>
        </div>
      `).join('');
    }

    render();
  </script>
</body>
</html>
