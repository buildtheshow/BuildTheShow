<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v49-20260618" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem 2.25rem;
      max-width: calc(100vw - 220px);
      overflow-x: clip;
      position: relative;
      z-index: 0;
    }
    .prod-main::before {
      content: '';
      position: fixed;
      inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.04;
      pointer-events: none;
      z-index: -1;
    }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    /* ── Settings card grid ── */
    .settings-card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.85rem;
      margin-top: 1.75rem;
    }
    @media (max-width: 1100px) { .settings-card-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .settings-card-grid { grid-template-columns: 1fr 1fr; } }

    .settings-card {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      padding: 1.1rem 1rem 1rem;
      border-radius: 12px;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .settings-card:hover { filter: brightness(0.88); }

    .settings-card-icon {
      width: 40px; height: 40px;
      object-fit: contain;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }
    .settings-card-name {
      font-size: 0.88rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }
    .settings-card-bullets {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
      flex: 1;
    }
    .settings-card-bullets li {
      font-size: 0.71rem;
      color: rgba(255,255,255,0.82);
      line-height: 1.4;
      padding-left: 0.85rem;
      position: relative;
    }
    .settings-card-bullets li::before {
      content: '\2013';
      position: absolute;
      left: 0;
      color: rgba(255,255,255,0.5);
    }
    .settings-card-arrow {
      margin-top: auto;
      padding-top: 0.5rem;
      font-size: 0.71rem;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span id="settings-kicker">SETTINGS</span>
            </div>
            <h1 class="aud-visual-title">Settings</h1>
            <p class="aud-visual-copy">Manage everything about how this production is set up and who can access what.</p>
          </div>
        </div>
      </div>

      <div class="settings-card-grid" id="settings-grid"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=63-20260703"></script>
  <script>
    window.initProductionPage('settings');
  </script>
  <script>
    const prodId = new URLSearchParams(location.search).get('id');

    const SETTINGS_PAGES = [
      {
        file:    'production-settings.html',
        colour:  '#572e88',
        icon:    '/ASSETS/Images/Icons/navsettings.svg',
        title:   'Production Settings',
        bullets: [
          'Show name, dates, and venue',
          'Public URL slug and visibility',
          'Core info that appears everywhere',
        ],
      },
      {
        file:    'settings-features.html',
        colour:  '#efab45',
        icon:    '/ASSETS/Images/Icons/navwizard.svg',
        title:   'Features',
        bullets: [
          'Turn sections on or off',
          'Sidebar updates instantly',
          'Works for any production type',
        ],
      },
      {
        file:    'settings-team.html',
        colour:  '#476aaa',
        icon:    '/ASSETS/Images/Icons/navproductionteam.svg',
        title:   'Team & Permissions',
        bullets: [
          'Add team members and assign roles',
          'Control what each person can see',
          'Department lead access settings',
        ],
      },
      {
        file:    'settings-communications.html',
        colour:  '#74a2b4',
        icon:    '/ASSETS/Images/Icons/Messages.svg',
        title:   'Communications',
        bullets: [
          'Notification preferences per event',
          'Who gets CC\'d on what',
          'Team-facing alerts and updates',
        ],
      },
      {
        file:    'emails.html',
        colour:  '#ca7ea7',
        icon:    '/ASSETS/Images/Icons/navemailtemplate.svg',
        title:   'Email Templates',
        bullets: [
          'Customise every automated email',
          'Audition, cast, and registration messages',
          'Your tone, your words',
        ],
      },
      {
        file:    'settings-forms.html',
        colour:  '#769e7b',
        icon:    '/ASSETS/Images/Icons/Applications.svg',
        title:   'Forms',
        bullets: [
          'Build cast and performer forms',
          'Control required fields',
          'Collect what matters to your production',
        ],
      },
      {
        file:    'settings-payments.html',
        colour:  '#dd8233',
        icon:    '/ASSETS/Images/Icons/Financial - Reports.svg',
        title:   'Payments',
        bullets: [
          'Production fee structures',
          'Instalment plans and due dates',
          'Payment gateway and Square setup',
        ],
      },
      {
        file:    'settings-integrations.html',
        colour:  '#d1523d',
        icon:    '/ASSETS/Images/Icons/navsettings.svg',
        title:   'Integrations',
        bullets: [
          'Connect Square for payments',
          'Calendar export and sync',
          'Third-party tools and services',
        ],
      },
    ];

    function nav(file) {
      const id = prodId || '';
      location.href = '/SYSTEM/Organisations/Productions/Workspace/' + file + '?id=' + encodeURIComponent(id);
    }

    function render() {
      const grid = document.getElementById('settings-grid');
      grid.innerHTML = SETTINGS_PAGES.map(p => `
        <div class="settings-card" style="background:${p.colour};" onclick="nav('${p.file}')">
          <img class="settings-card-icon" src="${p.icon}" alt="" aria-hidden="true" />
          <div class="settings-card-name">${p.title}</div>
          <ul class="settings-card-bullets">
            ${p.bullets.map(b => `<li>${b}</li>`).join('')}
          </ul>
          <div class="settings-card-arrow">Open &rarr;</div>
        </div>
      `).join('');
    }

    render();
  </script>
</body>
</html>
