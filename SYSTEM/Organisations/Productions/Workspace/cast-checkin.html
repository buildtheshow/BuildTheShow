    /* ── Check-in stats ────────────────────────────────────────────── */

    .ci-person-info { flex: 1; min-width: 0; }
    .ci-person-name { font-size: 0.88rem; font-weight: 850; color: #1a1530; }
    .ci-person-sub { font-size: 0.75rem; color: rgba(26,21,48,0.5); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ci-person-badges { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.3rem; }

    .ci-badge-cast { background: rgba(87,46,136,0.1); color: #572e88; }
    .ci-badge-vol { background: rgba(118,158,123,0.15); color: #4a7e50; }

    .ci-person-card.is-here   { border-color: rgba(70,155,66,0.35);  background: rgba(70,155,66,0.04); }

    .ci-checkin-col { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; flex-shrink: 0; }
    .ci-status-btns { display: flex; gap: 0.3rem; }
    .ci-status-btn { padding: 0.38rem 0.7rem; border-radius: 7px; border: 1.5px solid rgba(87,46,136,0.18); background: #fff; font-size: 0.72rem; font-weight: 850; cursor: pointer; font-family: var(--bts-font); white-space: nowrap; color: rgba(26,21,48,0.55); }
    .ci-status-btn:hover { background: rgba(87,46,136,0.05); }

    .ci-status-btn.s-late   { background: #efab45; color: #fff; border-color: #efab45; }
    .ci-status-btn.s-absent { background: #d1523d; color: #fff; border-color: #d1523d; }
    .ci-checkin-time { font-size: 0.65rem; color: rgba(26,21,48,0.4); white-space: nowrap; }

    @media (max-width: 900px) {
      .ci-layout { flex-direction: column; }
      .ci-events-panel { width: 100%; position: static; max-height: 260px; }
    }
  </style>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="ci-hero">

          Cast

      </div>

      <div class="ci-layout">

        <!-- Left: events list -->
        <div class="ci-events-panel">
          <div class="ci-panel-head">
            <div class="ci-panel-title">Events</div>
            <div class="ci-filter-chips">
              <button class="ci-chip" id="chip-today"    onclick="setFilter('today')">Today</button>
              <button class="ci-chip" id="chip-upcoming" onclick="setFilter('upcoming')">Upcoming</button>
              <button class="ci-chip" id="chip-all"      onclick="setFilter('all')">All</button>
              <button class="ci-chip" id="chip-past"     onclick="setFilter('past')">Past</button>
            </div>
          </div>
          <div class="ci-events-list" id="ci-events-list">
            <div style="padding:1.5rem;text-align:center;color:rgba(26,21,48,0.4);font-size:0.82rem;">Loading...</div>
          </div>
        </div>

        <!-- Right: event detail -->
        <div class="ci-detail" id="ci-detail">
          <div class="ci-detail-empty" id="ci-detail-empty">
            <img src="/ASSETS/Images/Icons/Zeus-Calendar.svg?v=20260617" alt="" />
            Select an event to set the call list and check people in.
          </div>
          <div id="ci-detail-inner" style="display:none">
            <div class="ci-event-header" id="ci-event-header"></div>
            <div class="ci-tabs">
              <button class="ci-tab-btn active" id="tab-calllist" onclick="switchTab('calllist')">Call List</button>
              <button class="ci-tab-btn"         id="tab-checkin"  onclick="switchTab('checkin')">Check-In</button>
            </div>
            <div id="ci-calllist-panel"></div>
            <div id="ci-checkin-panel" style="display:none"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=28"></script>
  <script>
  'use strict';

  const SUPA_URL = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';

  const CHECKIN_TYPES = ['rehearsal','music_rehearsal','choreography','tech','dress','performance','meeting','event','cast_party','strike'];

  const EVENT_COLOURS = {
    rehearsal:'#7fcae3', music_rehearsal:'#7fcae3', choreography:'#7fcae3',
    tech:'#7ac177', dress:'#469b42', performance:'#2b6529',
    strike:'#7497e7', cast_party:'#aa2943', event:'#aa2943', meeting:'#7b7b7b',
  };

  const EVENT_LABELS = {
    rehearsal:'Rehearsal', music_rehearsal:'Music Rehearsal', choreography:'Choreography',
    tech:'Tech', dress:'Dress Rehearsal', performance:'Performance',
    strike:'Strike', cast_party:'Cast Party', event:'Event', meeting:'Meeting',
  };

  let _sb, _prodId;
  let _events = [], _chars = [], _assignments = [], _volunteers = [];
  let _people = {};
  let _selectedEvent = null;
  let _activeTab = 'calllist';
  let _filter = 'today';
  let _searchQuery = '';
  let _pendingCallIds = new Set();
  let _callListDirty = false;

  window.initProductionPage('cast');

  document.addEventListener('DOMContentLoaded', async function () {
    _sb = supabase.createClient(SUPA_URL, SUPA_KEY);
    const params = new URLSearchParams(window.location.search);
    _prodId = params.get('id') || '';
    if (!_prodId) {
      document.getElementById('ci-events-list').innerHTML = '<div style="padding:1.5rem;color:#d1523d;font-size:0.82rem;">No production ID in URL.</div>';
      return;
    }
    await loadData();
    // Default to today; fall back to upcoming if nothing today
    const today = todayDate();
    const hasToday = _events.some(e => e.start_time?.slice(0, 10) === today);
    setFilter(hasToday ? 'today' : 'upcoming');
    // Auto-select first today event
    const firstToday = _events.find(e => e.start_time?.slice(0, 10) === today);
    if (firstToday) selectEvent(firstToday.id);
  });

  // ── Data loading ───────────────────────────────────────────────────
  async function loadData() {
    const [evRes, chRes, asRes] = await Promise.all([
      _sb.from('production_events')
        .select('id,title,event_type,start_time,end_time,venue,called_character_ids,event_checkins')
        .eq('production_id', _prodId)
        .in('event_type', CHECKIN_TYPES)
        .order('start_time'),
      _sb.from('production_characters')
        .select('id,name,sort_order')
        .eq('production_id', _prodId)
        .order('sort_order'),
      _sb.from('casting_assignments')
        .select('id,character_id,applicant_id,state')
        .eq('production_id', _prodId)
        .eq('state', 'chosen'),
    ]);
    _events      = evRes.data || [];
    _chars       = chRes.data || [];
    _assignments = asRes.data || [];

    const appIds = [...new Set(_assignments.map(a => a.applicant_id).filter(Boolean))];
    const volsQuery = _sb.from('volunteer_signups')
      .select('id,name,email,role_name,shift_date,required_dates,status')
      .eq('production_id', _prodId)
      .in('status', ['approved', 'checked_in', 'completed']);

    if (appIds.length) {
      const [appsRes, booksRes, volsRes] = await Promise.all([
        _sb.from('audition_applications').select('id,name,headshot_url,date_conflicts').in('id', appIds),
        _sb.from('audition_bookings').select('id,name,headshot_url').in('id', appIds),
        volsQuery,
      ]);
      (appsRes.data || []).forEach(a => {
        _people[a.id] = { name: a.name, headshot_url: a.headshot_url, date_conflicts: a.date_conflicts };
      });
      (booksRes.data || []).forEach(b => {
        if (!_people[b.id]) _people[b.id] = { name: b.name, headshot_url: b.headshot_url, date_conflicts: null };
      });
      _volunteers = volsRes.data || [];
    } else {
      const volsRes = await volsQuery;
      _volunteers = volsRes.data || [];
    }
  }

  // ── Date helpers ───────────────────────────────────────────────────
  function todayDate() { return new Date().toISOString().slice(0, 10); }

  function fmtEventDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function fmtTime(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function fmtDateGroupLabel(dateStr) {
    const today = todayDate();
    const diff = Math.round((new Date(dateStr) - new Date(today)) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    if (diff === -1) return 'Yesterday';
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function isPast(ev) {
    const end = ev.end_time || ev.start_time;
    return end ? new Date(end) < new Date() : false;
  }

  // ── Event list ─────────────────────────────────────────────────────
  function setFilter(f) {
    _filter = f;
    document.querySelectorAll('.ci-chip').forEach(c => c.classList.remove('active'));
    const chip = document.getElementById('chip-' + f);
    if (chip) chip.classList.add('active');
    renderEventList();
  }

  function filteredEvents() {
    const today = todayDate();
    if (_filter === 'today')    return _events.filter(e => e.start_time?.slice(0, 10) === today);
    if (_filter === 'upcoming') return _events.filter(e => (e.start_time?.slice(0, 10) || '') >= today);
    if (_filter === 'past')     return _events.filter(e => (e.start_time?.slice(0, 10) || '') < today).reverse();
    return _events;
  }

  function renderEventList() {
    const el = document.getElementById('ci-events-list');
    const evs = filteredEvents();
    if (!evs.length) {
      el.innerHTML = '<div style="padding:1.5rem;text-align:center;color:rgba(26,21,48,0.4);font-size:0.82rem;">No events found.</div>';
      return;
    }
    const groups = {};
    evs.forEach(e => {
      const d = e.start_time?.slice(0, 10) || 'unknown';
      (groups[d] = groups[d] || []).push(e);
    });
    let html = '';
    Object.keys(groups).sort().forEach(function (dateStr) {
      html += '<div class="ci-date-label">' + esc(fmtDateGroupLabel(dateStr)) + '</div>';
      groups[dateStr].forEach(function (e) {
        const colour  = EVENT_COLOURS[e.event_type] || '#572e88';
        const past    = isPast(e) ? ' past' : '';
        const sel     = _selectedEvent?.id === e.id ? ' selected' : '';
        const checkins = e.event_checkins || [];
        const attendees = resolveAttendees(e);
        const total = attendees.length;
        const present = checkins.filter(c => c.status === 'here' || c.status === 'late').length;
        const count = total > 0 ? '<div class="ci-event-count">' + present + '/' + total + '</div>' : '';
        html +=
          '<div class="ci-event-row' + past + sel + '" onclick="selectEvent(\'' + e.id + '\')">' +
            '<div class="ci-event-dot" style="background:' + colour + '"></div>' +
            '<div class="ci-event-info">' +
              '<div class="ci-event-name">' + esc(e.title || EVENT_LABELS[e.event_type] || 'Event') + '</div>' +
              '<div class="ci-event-time">' + esc(fmtTime(e.start_time)) + (e.end_time ? ' – ' + fmtTime(e.end_time) : '') + '</div>' +
            '</div>' +
            count +
          '</div>';
      });
    });
    el.innerHTML = html;
  }

  // ── Event selection ────────────────────────────────────────────────
  function selectEvent(id) {
    _selectedEvent = _events.find(e => e.id === id) || null;
    if (!_selectedEvent) return;
    _pendingCallIds = new Set(_selectedEvent.called_character_ids || []);
    _callListDirty = false;
    _searchQuery = '';
    document.getElementById('ci-detail-empty').style.display = 'none';
    document.getElementById('ci-detail-inner').style.display = '';
    renderEventList();
    renderEventHeader();
    switchTab(_activeTab, true);
  }

  function renderEventHeader() {
    const e = _selectedEvent;
    const colour = EVENT_COLOURS[e.event_type] || '#572e88';
    const label  = EVENT_LABELS[e.event_type]  || 'Event';
    const timeStr = e.start_time
      ? fmtTime(e.start_time) + (e.end_time ? ' – ' + fmtTime(e.end_time) : '')
      : '';
    document.getElementById('ci-event-header').innerHTML =
      '<div class="ci-event-type-pill" style="background:' + colour + '">' + esc(label) + '</div>' +
      '<div class="ci-detail-title">' + esc(e.title || label) + '</div>' +
      '<div class="ci-detail-meta">' +
        '<span>' + esc(fmtEventDate(e.start_time)) + '</span>' +
        (timeStr ? '<span>' + esc(timeStr) + '</span>' : '') +
        (e.venue ? '<span>' + esc(e.venue) + '</span>' : '') +
      '</div>';
  }

  function switchTab(tab, force) {
    if (!force && tab === _activeTab) return;
    _activeTab = tab;
    document.querySelectorAll('.ci-tab-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('tab-' + tab);
    if (btn) btn.classList.add('active');
    document.getElementById('ci-calllist-panel').style.display = tab === 'calllist' ? '' : 'none';
    document.getElementById('ci-checkin-panel').style.display  = tab === 'checkin'  ? '' : 'none';
    if (tab === 'calllist') renderCallList();
    else renderCheckinPanel();
  }

  // ── Call list ──────────────────────────────────────────────────────
  function renderCallList() {
    const panel = document.getElementById('ci-calllist-panel');
    if (!_chars.length) {
      panel.innerHTML = '<div class="ci-empty-state">No characters set up for this production yet.</div>';
      return;
    }
    // Map character_id → cast person names
    const castMap = {};
    _assignments.forEach(function (a) {
      const person = _people[a.applicant_id];
      if (!castMap[a.character_id]) castMap[a.character_id] = [];
      if (person?.name) castMap[a.character_id].push(person.name);
    });

    const rows = _chars.map(function (c) {
      const called = _pendingCallIds.has(c.id);
      const names  = (castMap[c.id] || []);
      const castLine = names.length
        ? '<div class="ci-char-cast">Cast: ' + esc(names.join(', ')) + '</div>'
        : '<div class="ci-char-uncasted">Not yet cast</div>';
      return '<div class="ci-char-row' + (called ? ' called' : '') + '" onclick="toggleCharCall(\'' + c.id + '\')">' +
        '<div class="ci-char-checkbox">' + (called ? '<span class="ci-check-icon">&#10003;</span>' : '') + '</div>' +
        '<div>' +
          '<div class="ci-char-name">' + esc(c.name) + '</div>' +
          castLine +
        '</div>' +
      '</div>';
    }).join('');

    const calledCount = _pendingCallIds.size;
    panel.innerHTML =
      '<div class="ci-calllist-top">' +
        '<div class="ci-calllist-hint">Tick which characters are called to this event. The Check-In tab will show the matching cast members plus any volunteers scheduled for this date.</div>' +
        '<div class="ci-calllist-actions">' +
          '<button class="ci-btn-secondary" onclick="selectAllChars()">Select All</button>' +
          '<button class="ci-btn-primary" id="ci-save-btn" onclick="saveCallList()" ' + (_callListDirty ? '' : 'disabled') + '>' +
            'Save' + (calledCount ? ' (' + calledCount + ')' : '') +
          '</button>' +
        '</div>' +
      '</div>' +
      '<div class="ci-char-grid">' + rows + '</div>';
  }

  function toggleCharCall(charId) {
    if (_pendingCallIds.has(charId)) _pendingCallIds.delete(charId);
    else _pendingCallIds.add(charId);
    _callListDirty = true;
    renderCallList();
  }

  function selectAllChars() {
    const allIds = _chars.map(c => c.id);
    const allSelected = allIds.every(id => _pendingCallIds.has(id));
    if (allSelected) {
      _pendingCallIds.clear();
    } else {
      allIds.forEach(id => _pendingCallIds.add(id));
    }
    _callListDirty = true;
    renderCallList();
  }

  async function saveCallList() {
    const btn = document.getElementById('ci-save-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

    const calledIds = [..._pendingCallIds];
    const tmpEv = { ..._selectedEvent, called_character_ids: calledIds };
    const attendees = resolveAttendees(tmpEv);
    const merged = mergeCheckins(_selectedEvent.event_checkins || [], attendees);

    const { error } = await _sb.from('production_events')
      .update({ called_character_ids: calledIds, event_checkins: merged })
      .eq('id', _selectedEvent.id);

    if (error) {
      if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
      alert('Could not save. Try again.');
      return;
    }
    _selectedEvent.called_character_ids = calledIds;
    _selectedEvent.event_checkins = merged;
    _events = _events.map(e => e.id === _selectedEvent.id ? _selectedEvent : e);
    _callListDirty = false;
    renderCallList();
    renderEventList();
  }

  function mergeCheckins(existing, attendees) {
    const existingMap = {};
    (existing || []).forEach(c => { existingMap[c.id] = c; });
    return attendees.map(a => existingMap[a.id]
      ? { ...existingMap[a.id], name: a.name }
      : { id: a.id, type: a.type, name: a.name, status: null, checked_in_at: null }
    );
  }

  // ── Check-in panel ─────────────────────────────────────────────────
  function renderCheckinPanel() {
    const panel = document.getElementById('ci-checkin-panel');
    const attendees = resolveAttendees(_selectedEvent);
    const checkins  = _selectedEvent.event_checkins || [];

    if (!attendees.length) {
      panel.innerHTML = '<div class="ci-empty-state">No one is called to this event yet. Set up the call list first.</div>';
      return;
    }

    const hereCount     = checkins.filter(c => c.status === 'here').length;
    const lateCount     = checkins.filter(c => c.status === 'late').length;
    const absentCount   = checkins.filter(c => c.status === 'absent').length;
    const unmarked      = attendees.length - hereCount - lateCount - absentCount;
    const conflictCount = attendees.filter(a => a.has_conflict).length;

    let html =
      '<div class="ci-stats-bar">' +
        '<div class="ci-stat"><div class="ci-stat-num">' + attendees.length + '</div><div class="ci-stat-label">Expected</div></div>' +
        '<div class="ci-stat s-present"><div class="ci-stat-num">' + hereCount + '</div><div class="ci-stat-label">Here</div></div>' +
        '<div class="ci-stat" style="--n-col:#efab45"><div class="ci-stat-num" style="color:#b87b0e">' + lateCount + '</div><div class="ci-stat-label">Late</div></div>' +
        '<div class="ci-stat"><div class="ci-stat-num" style="color:#d1523d">' + absentCount + '</div><div class="ci-stat-label">Absent</div></div>' +
        '<div class="ci-stat"><div class="ci-stat-num">' + unmarked + '</div><div class="ci-stat-label">Not Marked</div></div>' +
        (conflictCount ? '<div class="ci-stat s-conflict"><div class="ci-stat-num">' + conflictCount + '</div><div class="ci-stat-label">Conflicts</div></div>' : '') +
      '</div>' +
      '<div class="ci-search-wrap">' +
        '<img src="/ASSETS/Images/Icons/Search.svg?v=20260617" alt="" />' +
        '<input class="ci-search" type="text" placeholder="Search by name..." value="' + esc(_searchQuery) + '" oninput="onSearch(this.value)" />' +
      '</div>';

    const q = _searchQuery.toLowerCase();
    const filtered = q ? attendees.filter(a => (a.name || '').toLowerCase().includes(q)) : attendees;

    const castList = filtered.filter(a => a.type === 'cast');
    const volList  = filtered.filter(a => a.type === 'volunteer');

    html += '<div class="ci-person-list">';
    if (castList.length) {
      html += '<div class="ci-group-label">Cast</div>';
      castList.forEach(a => { html += personCardHtml(a, getCheckinState(checkins, a.id)); });
    }
    if (volList.length) {
      html += '<div class="ci-group-label">Volunteers</div>';
      volList.forEach(a => { html += personCardHtml(a, getCheckinState(checkins, a.id)); });
    }
    if (!filtered.length) html += '<div class="ci-empty-state">No results.</div>';
    html += '</div>';

    panel.innerHTML = html;
  }

  function personCardHtml(a, state) {
    const status   = state.status || null;
    const cardClass = status ? ' is-' + status : (a.has_conflict ? ' has-conflict' : '');
    const initials = (a.name || '?').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
    const avatar   = a.headshot_url
      ? '<img class="ci-avatar" src="' + esc(a.headshot_url) + '" alt="" />'
      : '<div class="ci-avatar-init">' + esc(initials) + '</div>';
    const sub = a.type === 'cast'
      ? (a.characters || []).join(', ')
      : (a.role_name || 'Volunteer');
    const badges =
      (a.type === 'cast'      ? '<span class="ci-badge ci-badge-cast">Cast</span>' : '') +
      (a.type === 'volunteer' ? '<span class="ci-badge ci-badge-vol">Volunteer</span>' : '') +
      (a.has_conflict         ? '<span class="ci-badge ci-badge-conflict">Conflict Submitted</span>' : '');
    const id = esc(a.id), name = esc(a.name || '');
    // Clicking the active status button a second time clears it back to null
    const absentActive = status === 'absent' ? ' s-absent' : '';
    const lateActive   = status === 'late'   ? ' s-late'   : '';
    const hereActive   = status === 'here'   ? ' s-here'   : '';
    const timeStr = status && state.checked_in_at ? fmtTime(state.checked_in_at) : '';

    return '<div class="ci-person-card' + cardClass + '">' +
      avatar +
      '<div class="ci-person-info">' +
        '<div class="ci-person-name">' + esc(a.name || 'Unknown') + '</div>' +
        (sub ? '<div class="ci-person-sub">' + esc(sub) + '</div>' : '') +
        (badges ? '<div class="ci-person-badges">' + badges + '</div>' : '') +
      '</div>' +
      '<div class="ci-checkin-col">' +
        '<div class="ci-status-btns">' +
          '<button class="ci-status-btn' + absentActive + '" onclick="setStatus(\'' + id + '\',\'' + name + '\',\'absent\')" title="Mark absent">Absent</button>' +
          '<button class="ci-status-btn' + lateActive   + '" onclick="setStatus(\'' + id + '\',\'' + name + '\',\'late\')"   title="Mark late">Late</button>' +
          '<button class="ci-status-btn' + hereActive   + '" onclick="setStatus(\'' + id + '\',\'' + name + '\',\'here\')"   title="Mark here">Here</button>' +
        '</div>' +
        (timeStr ? '<div class="ci-checkin-time">' + esc(timeStr) + '</div>' : '') +
      '</div>' +
    '</div>';
  }

  function onSearch(val) {
    _searchQuery = val;
    renderCheckinPanel();
  }

  // ── Attendee resolution ────────────────────────────────────────────
  function resolveAttendees(ev) {
    const calledIds = new Set(ev.called_character_ids || []);
    // Deduplicate cast by applicant_id (one person may play multiple called characters)
    const personMap = {};
    _assignments
      .filter(a => calledIds.has(a.character_id))
      .forEach(function (a) {
        const person = _people[a.applicant_id] || { name: 'Unknown' };
        const char   = _chars.find(c => c.id === a.character_id);
        if (!personMap[a.applicant_id]) {
          personMap[a.applicant_id] = {
            id:           a.applicant_id,
            type:         'cast',
            name:         person.name || 'Unknown',
            headshot_url: person.headshot_url || null,
            characters:   [],
            has_conflict: checkConflict(person.date_conflicts, ev),
          };
        }
        if (char) personMap[a.applicant_id].characters.push(char.name);
      });
    const castList = Object.values(personMap);

    // Volunteers scheduled for this event's date
    const evDate = ev.start_time?.slice(0, 10) || '';
    const volList = _volunteers
      .filter(function (v) {
        const extra = Array.isArray(v.required_dates) ? v.required_dates : [];
        return v.shift_date === evDate || extra.includes(evDate);
      })
      .map(function (v) {
        return {
          id:           v.id,
          type:         'volunteer',
          name:         v.name || v.email || 'Volunteer',
          headshot_url: null,
          characters:   [],
          role_name:    v.role_name || '',
          has_conflict: false,
        };
      });

    return [...castList, ...volList].sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  }

  function checkConflict(dateConflicts, ev) {
    if (!dateConflicts) return false;
    const raw = typeof dateConflicts === 'string'
      ? (() => { try { return JSON.parse(dateConflicts) || {}; } catch { return {}; } })()
      : (dateConflicts || {});
    // Match by event ID (set when the performer filled out the booking wizard)
    const byId = raw[ev.id];
    if (byId === true || byId?.conflict === true) return true;
    // Fallback: match by date
    const evDate = ev.start_time?.slice(0, 10);
    if (!evDate) return false;
    return Object.values(raw).some(v => typeof v === 'object' && v?.date === evDate && v?.conflict === true);
  }

  function getCheckinState(checkins, id) {
    const entry = (checkins || []).find(c => c.id === id);
    if (!entry) return { status: null, checked_in_at: null };
    // Handle legacy boolean checked_in from old data
    if (entry.status === undefined && entry.checked_in) return { status: 'here', checked_in_at: entry.checked_in_at };
    return entry;
  }

  // ── Attendance status setter ───────────────────────────────────────
  async function setStatus(attendeeId, attendeeName, newStatus) {
    if (!_selectedEvent) return;
    const checkins = [...(_selectedEvent.event_checkins || [])];
    const idx = checkins.findIndex(c => c.id === attendeeId);
    const now = new Date().toISOString();
    // Clicking the active status again clears it (unmark)
    const resolvedStatus = (idx >= 0 && checkins[idx].status === newStatus) ? null : newStatus;
    if (idx >= 0) {
      checkins[idx] = { ...checkins[idx], status: resolvedStatus, checked_in_at: resolvedStatus ? now : null };
    } else {
      checkins.push({ id: attendeeId, name: attendeeName, status: resolvedStatus, checked_in_at: resolvedStatus ? now : null });
    }
    const { error } = await _sb.from('production_events')
      .update({ event_checkins: checkins })
      .eq('id', _selectedEvent.id);
    if (!error) {
      _selectedEvent.event_checkins = checkins;
      _events = _events.map(e => e.id === _selectedEvent.id ? _selectedEvent : e);
      renderCheckinPanel();
      renderEventList();
    }
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s ?? '');
    return d.innerHTML;
  }
  </script>
</body>
