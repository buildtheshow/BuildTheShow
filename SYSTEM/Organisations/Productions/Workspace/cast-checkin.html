  <div class="prod-main">

      <div class="ci-hero">
        <div class="ci-hero-kicker"><span class="ci-hero-kicker-dot"></span>Cast</div>

        <p class="ci-hero-copy">Set call lists for each event and track who shows up to rehearsals, tech, and performances.</p>

      <div class="ci-layout">

        <div class="ci-events-panel">
          <div class="ci-panel-head">

              <button class="ci-chip" id="chip-today"    onclick="setFilter('today')">Today</button>
              <button class="ci-chip" id="chip-upcoming" onclick="setFilter('upcoming')">Upcoming</button>

        <div class="ci-detail" id="ci-detail">
          <div class="ci-detail-empty" id="ci-detail-empty">

            <div id="ci-calllist-panel"></div>
            <div id="ci-checkin-panel" style="display:none">
              <div class="ci-bulk-bar" id="ci-bulk-bar"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=28"></script>
  <script>
  'use strict';

  const SUPA_URL = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';

  const CHECKIN_TYPES = ['rehearsal','music_rehearsal','choreography','tech','dress','performance','meeting','event','cast_party','strike'];

  const EVENT_COLOURS = {
    rehearsal:'#7fcae3', music_rehearsal:'#7fcae3', choreography:'#7fcae3',
    tech:'#7ac177', dress:'#469b42', performance:'#2b6529',
    strike:'#7497e7', cast_party:'#aa2943', event:'#aa2943', meeting:'#7b7b7b',
  };
  const EVENT_LABELS = {
    rehearsal:'Rehearsal', music_rehearsal:'Music Rehearsal', choreography:'Choreography',
    tech:'Tech', dress:'Dress Rehearsal', performance:'Performance',
    strike:'Strike', cast_party:'Cast Party', event:'Event', meeting:'Meeting',
  };

  const STATUS_CONF = {
    here:    { label:'Here',        icon:'&#10003;', colour:'#3a8036', bg:'rgba(70,155,66,0.15)'   },
    late:    { label:'Late',        icon:'&#9203;',  colour:'#9b6b00', bg:'rgba(239,171,69,0.18)'  },
    absent:  { label:'Absent',      icon:'&#10005;', colour:'#bf3a24', bg:'rgba(209,82,61,0.15)'   },
    excused: { label:'Excused',     icon:'&#9675;',  colour:'#3b5a9b', bg:'rgba(71,106,170,0.15)'  },
    _none:   { label:'Not Marked',  icon:'&#8212;',  colour:'rgba(26,21,48,0.3)', bg:'rgba(26,21,48,0.07)' },
  };
  const HIST_CONF = {
    here:    { letter:'H', label:'Here',       colour:'#3a8036', bg:'rgba(70,155,66,0.18)'   },
    late:    { letter:'L', label:'Late',        colour:'#9b6b00', bg:'rgba(239,171,69,0.2)'   },
    absent:  { letter:'A', label:'Absent',      colour:'#bf3a24', bg:'rgba(209,82,61,0.16)'   },
    excused: { letter:'E', label:'Excused',     colour:'#3b5a9b', bg:'rgba(71,106,170,0.16)'  },
    _none:   { letter:'?', label:'Not recorded',colour:'rgba(26,21,48,0.28)', bg:'rgba(26,21,48,0.06)' },
  };

  let _sb, _prodId;
  let _events = [], _chars = [], _assignments = [], _volunteers = [];
  let _people = {};
  let _selectedEvent = null;
  let _allAttendees  = [];
  let _activeTab  = 'calllist';
  let _filter     = 'today';
  let _filterTab  = 'everyone';
  let _searchQuery = '';
  let _pendingCallIds = new Set();
  let _callListDirty  = false;
  let _bulkSelected   = new Set();
  let _openPickerId   = null;
  let _openPanelId    = null;

  window.initProductionPage('cast');

  document.addEventListener('DOMContentLoaded', async function () {
    _sb = supabase.createClient(SUPA_URL, SUPA_KEY);
    const params = new URLSearchParams(window.location.search);
    _prodId = params.get('id') || '';
    if (!_prodId) {
      document.getElementById('ci-events-list').innerHTML = '<div style="padding:1.5rem;color:#d1523d;font-size:0.82rem;">No production ID in URL.</div>';
      return;
    }
    await loadData();
    const today = todayDate();
    const hasToday = _events.some(e => e.start_time?.slice(0, 10) === today);
    setFilter(hasToday ? 'today' : 'upcoming');
    const firstToday = _events.find(e => e.start_time?.slice(0, 10) === today);
    if (firstToday) selectEvent(firstToday.id);
  });

  // Close picker on outside click
  document.addEventListener('click', function () { closePicker(); });

  // ── Data loading ─────────────────────────────────────────────────
  async function loadData() {
    const [evRes, chRes, asRes] = await Promise.all([
      _sb.from('production_events')
        .select('id,title,event_type,start_time,end_time,venue,called_character_ids,event_checkins,is_locked,locked_at')
        .eq('production_id', _prodId)
        .in('event_type', CHECKIN_TYPES)
        .order('start_time'),
      _sb.from('production_characters')
        .select('id,name,sort_order')
        .eq('production_id', _prodId)
        .order('sort_order'),
      _sb.from('casting_assignments')
        .select('id,character_id,applicant_id,state')
        .eq('production_id', _prodId)
        .eq('state', 'chosen'),
    ]);
    _events      = evRes.data || [];
    _chars       = chRes.data || [];
    _assignments = asRes.data || [];

    const appIds = [...new Set(_assignments.map(a => a.applicant_id).filter(Boolean))];
    const volsQ  = _sb.from('volunteer_signups')
      .select('id,name,email,role_name,shift_date,required_dates,status')
      .eq('production_id', _prodId)
      .in('status', ['approved','checked_in','completed']);

    if (appIds.length) {
      const [appsRes, booksRes, volsRes] = await Promise.all([
        _sb.from('audition_applications')
          .select('id,name,email,phone,pronouns,guardian_name,guardian_contact,guardian_phone,is_minor,headshot_url,date_conflicts')
          .in('id', appIds),
        _sb.from('audition_bookings')
          .select('id,name,headshot_url,guardian_name,guardian_email,phone')
          .in('id', appIds),
        volsQ,
      ]);
      (appsRes.data || []).forEach(a => {
        _people[a.id] = {
          name: a.name, email: a.email, phone: a.phone, pronouns: a.pronouns,
          guardian_name: a.guardian_name, guardian_contact: a.guardian_contact,
          guardian_phone: a.guardian_phone, is_minor: a.is_minor,
          headshot_url: a.headshot_url, date_conflicts: a.date_conflicts,
        };
      });
      (booksRes.data || []).forEach(b => {
        if (!_people[b.id]) _people[b.id] = {
          name: b.name, headshot_url: b.headshot_url,
          guardian_name: b.guardian_name, guardian_contact: b.guardian_email,
          phone: b.phone,
        };
      });
      _volunteers = volsRes.data || [];
    } else {
      const volsRes = await volsQ;
      _volunteers = volsRes.data || [];
    }
  }

  // ── Date helpers ─────────────────────────────────────────────────
  function todayDate() { return new Date().toISOString().slice(0, 10); }
  function fmtEventDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleDateString('en-CA', { weekday:'long', month:'long', day:'numeric' });
  }
  function fmtTime(ts) {
    if (!ts) return '';
    const m = String(ts).match(/T(\d{2}):(\d{2})/);
    if (!m) return '';
    let h = parseInt(m[1], 10);
    const min = m[2];
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + min + ' ' + ampm;
  }
  function fmtDateGroupLabel(dateStr) {
    const today = todayDate();
    const diff  = Math.round((new Date(dateStr) - new Date(today)) / 86400000);
    if (diff === 0)  return 'Today';
    if (diff === 1)  return 'Tomorrow';
    if (diff === -1) return 'Yesterday';
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-CA', { weekday:'long', month:'long', day:'numeric' });
  }
  function isPast(ev) {
    const end = ev.end_time || ev.start_time;
    return end ? new Date(end) < new Date() : false;
  }

  // ── Event list ───────────────────────────────────────────────────
  function setFilter(f) {
    _filter = f;
    document.querySelectorAll('.ci-chip').forEach(c => c.classList.remove('active'));
    const chip = document.getElementById('chip-' + f);
    if (chip) chip.classList.add('active');
    renderEventList();
  }
  function filteredEvents() {
    const today = todayDate();
    if (_filter === 'today')    return _events.filter(e => e.start_time?.slice(0,10) === today);
    if (_filter === 'upcoming') return _events.filter(e => (e.start_time?.slice(0,10) || '') >= today);
    if (_filter === 'past')     return _events.filter(e => (e.start_time?.slice(0,10) || '') < today).reverse();
    return _events;
  }
  function renderEventList() {
    const el  = document.getElementById('ci-events-list');
    const evs = filteredEvents();
    if (!evs.length) {
      el.innerHTML = '<div style="padding:1.5rem;text-align:center;color:rgba(26,21,48,0.4);font-size:0.82rem;">No events found.</div>';
      return;
    }
    const groups = {};
    evs.forEach(e => { const d = e.start_time?.slice(0,10) || 'unknown'; (groups[d] = groups[d]||[]).push(e); });
    let html = '';
    Object.keys(groups).sort().forEach(dateStr => {
      html += '<div class="ci-date-label">' + esc(fmtDateGroupLabel(dateStr)) + '</div>';
      groups[dateStr].forEach(e => {
        const colour    = EVENT_COLOURS[e.event_type] || '#572e88';
        const past      = isPast(e) ? ' past' : '';
        const sel       = _selectedEvent?.id === e.id ? ' selected' : '';
        const checkins  = e.event_checkins || [];
        const attendees = resolveAttendees(e);
        const total     = attendees.length;
        const present   = checkins.filter(c => c.status === 'here' || c.status === 'late').length;
        const count     = total > 0 ? '<div class="ci-event-count">' + present + '/' + total + '</div>' : '';
        html +=
          '<div class="ci-event-row' + past + sel + '" onclick="selectEvent(\'' + e.id + '\')">' +
            '<div class="ci-event-dot" style="background:' + colour + '"></div>' +
            '<div class="ci-event-info">' +
              '<div class="ci-event-name">' + esc(e.title || EVENT_LABELS[e.event_type] || 'Event') + '</div>' +
              '<div class="ci-event-time">' + esc(fmtTime(e.start_time)) + (e.end_time ? ' – ' + fmtTime(e.end_time) : '') + '</div>' +
            '</div>' + count +
          '</div>';
      });
    });
    el.innerHTML = html;
  }

  // ── Event selection ──────────────────────────────────────────────
  function selectEvent(id) {
    _selectedEvent = _events.find(e => e.id === id) || null;
    if (!_selectedEvent) return;
    _pendingCallIds = new Set(_selectedEvent.called_character_ids || []);
    _callListDirty = false;
    _searchQuery   = '';
    _filterTab     = 'everyone';
    _bulkSelected.clear();
    document.getElementById('ci-detail-empty').style.display  = 'none';
    document.getElementById('ci-detail-inner').style.display  = '';
    renderEventList();
    renderEventHeader();
    switchTab(_activeTab, true);
  }

  function renderEventHeader() {
    const e      = _selectedEvent;
    const colour = EVENT_COLOURS[e.event_type] || '#572e88';
    const label  = EVENT_LABELS[e.event_type]  || 'Event';
    const timeStr = e.start_time
      ? fmtTime(e.start_time) + (e.end_time ? ' – ' + fmtTime(e.end_time) : '') : '';
    const locked = e.is_locked || false;
    const rightBtn = locked
      ? '<span class="ci-locked-badge">Rehearsal Ended</span>'
      : '<button class="ci-end-btn" onclick="endRehearsal()">End Rehearsal</button>';
    document.getElementById('ci-event-header').innerHTML =
      '<div>' +
        '<div class="ci-event-type-pill" style="background:' + colour + '">' + esc(label) + '</div>' +
        '<div class="ci-detail-title">' + esc(e.title || label) + '</div>' +
        '<div class="ci-detail-meta">' +
          '<span>' + esc(fmtEventDate(e.start_time)) + '</span>' +
          (timeStr ? '<span>' + esc(timeStr) + '</span>' : '') +
          (e.venue ? '<span>' + esc(e.venue) + '</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="ci-header-btns">' + rightBtn + '</div>';
  }

  function switchTab(tab, force) {
    if (!force && tab === _activeTab) return;
    _activeTab = tab;
    document.querySelectorAll('.ci-tab-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('tab-' + tab);
    if (btn) btn.classList.add('active');
    document.getElementById('ci-calllist-panel').style.display = tab === 'calllist' ? '' : 'none';
    document.getElementById('ci-checkin-panel').style.display  = tab === 'checkin'  ? '' : 'none';
    if (tab === 'calllist') renderCallList();
    else renderCheckinPanel();
  }

  // ── Call list ────────────────────────────────────────────────────
  function renderCallList() {
    const panel = document.getElementById('ci-calllist-panel');
    if (!_chars.length) { panel.innerHTML = '<div class="ci-empty-state">No characters set up yet.</div>'; return; }
    const castMap = {};
    _assignments.forEach(a => {
      const p = _people[a.applicant_id];
      if (!castMap[a.character_id]) castMap[a.character_id] = [];
      if (p?.name) castMap[a.character_id].push(p.name);
    });
    const rows = _chars.map(c => {
      const called = _pendingCallIds.has(c.id);
      const names  = castMap[c.id] || [];
      const castLine = names.length
        ? '<div class="ci-char-cast">Cast: ' + esc(names.join(', ')) + '</div>'
        : '<div class="ci-char-uncasted">Not yet cast</div>';
      return '<div class="ci-char-row' + (called ? ' called' : '') + '" onclick="toggleCharCall(\'' + c.id + '\')">' +
        '<div class="ci-char-checkbox">' + (called ? '<span class="ci-check-icon">&#10003;</span>' : '') + '</div>' +
        '<div><div class="ci-char-name">' + esc(c.name) + '</div>' + castLine + '</div>' +
      '</div>';
    }).join('');
    const cnt = _pendingCallIds.size;
    panel.innerHTML =
      '<div class="ci-calllist-top">' +
        '<div class="ci-calllist-hint">Tick which characters are called to this event. Check-In will show the matching cast plus volunteers scheduled for this date.</div>' +
        '<div class="ci-calllist-actions">' +
          '<button class="ci-btn-secondary" onclick="selectAllChars()">Select All</button>' +
          '<button class="ci-btn-primary" id="ci-save-btn" onclick="saveCallList()"' + (_callListDirty ? '' : ' disabled') + '>Save' + (cnt ? ' (' + cnt + ')' : '') + '</button>' +
        '</div>' +
      '</div>' +
      '<div class="ci-char-grid">' + rows + '</div>';
  }

  function toggleCharCall(charId) {
    if (_pendingCallIds.has(charId)) _pendingCallIds.delete(charId);
    else _pendingCallIds.add(charId);
    _callListDirty = true;
    renderCallList();
  }
  function selectAllChars() {
    const allIds = _chars.map(c => c.id);
    if (allIds.every(id => _pendingCallIds.has(id))) _pendingCallIds.clear();
    else allIds.forEach(id => _pendingCallIds.add(id));
    _callListDirty = true;
    renderCallList();
  }
  async function saveCallList() {
    const btn = document.getElementById('ci-save-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
    const calledIds  = [..._pendingCallIds];
    const tmpEv      = { ..._selectedEvent, called_character_ids: calledIds };
    const attendees  = resolveAttendees(tmpEv);
    const merged     = mergeCheckins(_selectedEvent.event_checkins || [], attendees);
    const { error }  = await _sb.from('production_events')
      .update({ called_character_ids: calledIds, event_checkins: merged })
      .eq('id', _selectedEvent.id);
    if (error) { if (btn) { btn.disabled = false; btn.textContent = 'Save'; } alert('Could not save.'); return; }
    _selectedEvent.called_character_ids = calledIds;
    _selectedEvent.event_checkins = merged;
    _events = _events.map(e => e.id === _selectedEvent.id ? _selectedEvent : e);
    _callListDirty = false;
    renderCallList();
    renderEventList();
  }

  function mergeCheckins(existing, attendees) {
    const map = {};
    (existing || []).forEach(c => { map[c.id] = c; });
    return attendees.map(a => map[a.id]
      ? { ...map[a.id], name: a.name }
      : { id: a.id, type: a.type, name: a.name, status: null, checked_in_at: null, left_at: null, notes: null }
    );
  }

  // ── Check-in panel ───────────────────────────────────────────────
  function renderCheckinPanel() {
    const panel     = document.getElementById('ci-checkin-panel');
    _allAttendees   = resolveAttendees(_selectedEvent);
    const checkins  = _selectedEvent.event_checkins || [];
    const isLocked  = _selectedEvent.is_locked || false;

    if (!_allAttendees.length) {
      const bulk = document.getElementById('ci-bulk-bar');
      if (bulk) bulk.after(Object.assign(document.createElement('div'), { className:'ci-empty-state', textContent:'No one is called to this event yet. Set up the call list first.' }));
      return;
    }

    const stateMap = {};
    _allAttendees.forEach(a => { stateMap[a.id] = getCheckinState(checkins, a.id); });

    const hereCount    = _allAttendees.filter(a => stateMap[a.id].status === 'here').length;
    const lateCount    = _allAttendees.filter(a => stateMap[a.id].status === 'late').length;
    const absentCount  = _allAttendees.filter(a => stateMap[a.id].status === 'absent').length;
    const excusedCount = _allAttendees.filter(a => stateMap[a.id].status === 'excused').length;
    const notHereCount = _allAttendees.filter(a => !stateMap[a.id].status).length;
    const total        = _allAttendees.length;
    const pct          = n => total ? Math.round(n / total * 100) : 0;

    // Apply filter + search
    let filtered = [..._allAttendees];
    if (_filterTab === 'not_here') filtered = filtered.filter(a => !stateMap[a.id].status);
    else if (_filterTab !== 'everyone') filtered = filtered.filter(a => stateMap[a.id].status === _filterTab);
    if (_searchQuery) {
      const q = _searchQuery.toLowerCase();
      filtered = filtered.filter(a =>
        (a.name||'').toLowerCase().includes(q) ||
        (a.characters||[]).some(c => c.toLowerCase().includes(q)) ||
        (a.role_name||'').toLowerCase().includes(q)
      );
    }

    let html =
      '<div class="ci-stats-bar">' +
        '<div class="ci-stat-box"><div class="ci-stat-num">' + total + '</div><div class="ci-stat-lbl">Expected</div></div>' +
        '<div class="ci-stat-box s-here"><div class="ci-stat-num">' + hereCount + '</div><div class="ci-stat-pct">' + pct(hereCount) + '%</div><div class="ci-stat-lbl">Here</div></div>' +
        '<div class="ci-stat-box s-late"><div class="ci-stat-num">' + lateCount + '</div><div class="ci-stat-pct">' + pct(lateCount) + '%</div><div class="ci-stat-lbl">Late</div></div>' +
        '<div class="ci-stat-box s-absent"><div class="ci-stat-num">' + absentCount + '</div><div class="ci-stat-pct">' + pct(absentCount) + '%</div><div class="ci-stat-lbl">Absent</div></div>' +
        '<div class="ci-stat-box s-excused"><div class="ci-stat-num">' + excusedCount + '</div><div class="ci-stat-pct">' + pct(excusedCount) + '%</div><div class="ci-stat-lbl">Excused</div></div>' +
      '</div>' +
      '<div class="ci-controls">' +
        '<div class="ci-filter-tabs">' +
          ftab('everyone', 'Everyone', total) +
          ftab('not_here', 'Not Here', notHereCount) +
          ftab('late',     'Late',     lateCount) +
          ftab('absent',   'Absent',   absentCount) +
          ftab('excused',  'Excused',  excusedCount) +
        '</div>' +
        '<div class="ci-controls-right">' +
          '<input class="ci-search" type="text" placeholder="Search..." value="' + esc(_searchQuery) + '" oninput="onSearch(this.value)" />' +
          '<button class="ci-btn-secondary" onclick="exportCsv()">Export .csv</button>' +
        '</div>' +
      '</div>';

    if (!filtered.length) {
      html += '<div class="ci-empty-state">No results.</div>';
    } else {
      html +=
        '<div class="ci-table-wrap"><table class="ci-table">' +
        '<colgroup>' +
          '<col style="width:36px">' +
          '<col>' +
          '<col style="width:148px">' +
          '<col style="width:145px">' +
          '<col style="width:95px">' +
          '<col style="width:95px">' +
          '<col style="width:90px">' +
        '</colgroup>' +
        '<thead><tr>' +
          '<th class="ci-th"><input type="checkbox" id="ci-check-all" onchange="toggleSelectAll(this)" /></th>' +
          '<th class="ci-th">Performer</th>' +
          '<th class="ci-th">Role / Character</th>' +
          '<th class="ci-th">Status</th>' +
          '<th class="ci-th">Arrived</th>' +
          '<th class="ci-th">Left</th>' +
          '<th class="ci-th"></th>' +
        '</tr></thead>' +
        '<tbody id="ci-table-body">' +
        filtered.map(a => buildRow(a, stateMap[a.id], isLocked)).join('') +
        '</tbody></table></div>';
    }

    // Replace content of checkin panel (preserving bulk bar)
    const bulkBar = document.getElementById('ci-bulk-bar');
    document.getElementById('ci-checkin-panel').innerHTML = '';
    document.getElementById('ci-checkin-panel').appendChild(bulkBar || (() => {
      const d = document.createElement('div');
      d.id = 'ci-bulk-bar';
      d.className = 'ci-bulk-bar';
      return d;
    })());
    document.getElementById('ci-checkin-panel').insertAdjacentHTML('beforeend', html);
    _bulkSelected.clear();
    updateBulkBar();
  }

  function ftab(key, label, count) {
    return '<button class="ci-ftab' + (_filterTab === key ? ' active' : '') + '" onclick="setFilterTab(\'' + key + '\')">' + label + ' <span>' + count + '</span></button>';
  }

  function buildRow(a, state, isLocked) {
    const status = state.status;
    const rowClass = status ? ' ci-tr-' + status : '';
    const initials = (a.name||'?').split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
    const avatar = a.headshot_url
      ? '<img class="ci-row-avatar" src="' + esc(a.headshot_url) + '" alt="" />'
      : '<div class="ci-row-avatar-init">' + esc(initials) + '</div>';
    const subLabel = a.type === 'cast' ? (a.characters||[]).join(', ') : (a.role_name||'Volunteer');
    const id = esc(a.id);
    const conflictDot = a.has_conflict ? '<span class="ci-conflict-dot" title="Conflict submitted">!</span>' : '';
    const volBadge = a.type === 'volunteer' ? '<br><span class="ci-badge-vol">Volunteer</span>' : '';

    // Status pill
    const sc = STATUS_CONF[status] || STATUS_CONF._none;
    const pillEl = isLocked
      ? '<span class="ci-spill s-' + (status||'none') + '">' + sc.icon + ' ' + sc.label + '</span>'
      : '<button class="ci-spill s-' + (status||'none') + '" data-id="' + id + '" onclick="togglePicker(this,event)">' + sc.icon + ' ' + sc.label + '</button>';

    // Arrived / Left
    const arrivedISO = state.checked_in_at;
    const leftISO    = state.left_at;
    let arrivedHtml = '--', leftHtml = '--';
    if (arrivedISO) {
      const minsLate = _selectedEvent.start_time
        ? Math.round((new Date(arrivedISO) - new Date(_selectedEvent.start_time)) / 60000)
        : 0;
      arrivedHtml = fmtTime(arrivedISO) + (minsLate > 0 ? ' <span class="ci-late-note">(' + minsLate + 'm)</span>' : '');
    }
    if (leftISO) leftHtml = fmtTime(leftISO);

    const arrivedCell = isLocked ? arrivedHtml : '<button class="ci-time-btn" data-id="' + id + '" data-field="arrived" onclick="editTime(this,event)">' + arrivedHtml + '</button>';
    const leftCell    = isLocked ? leftHtml    : '<button class="ci-time-btn" data-id="' + id + '" data-field="left"    onclick="editTime(this,event)">' + leftHtml + '</button>';

    // Action icons
    const person = _people[a.id] || {};
    const emailIcon = person.email ? '<a class="ci-icon-btn" href="mailto:' + esc(person.email) + '" onclick="event.stopPropagation()" title="Email">&#x2709;</a>' : '';
    const phoneIcon = person.phone ? '<a class="ci-icon-btn" href="tel:'    + esc(person.phone) + '" onclick="event.stopPropagation()" title="Call">&#x260E;</a>'   : '';

    return '<tr class="ci-tr' + rowClass + '" id="ci-row-' + id + '">' +
      '<td class="ci-td" onclick="event.stopPropagation()"><input type="checkbox" class="ci-row-check" data-id="' + id + '" onchange="toggleRowSelect(this)" /></td>' +
      '<td class="ci-td"><div class="ci-performer-cell">' + avatar + '<div><div class="ci-performer-name">' + esc(a.name||'Unknown') + conflictDot + '</div>' + volBadge + '</div></div></td>' +
      '<td class="ci-td ci-td-role">' + esc(subLabel) + '</td>' +
      '<td class="ci-td">' + pillEl + '</td>' +
      '<td class="ci-td">' + arrivedCell + '</td>' +
      '<td class="ci-td">' + leftCell + '</td>' +
      '<td class="ci-td"><div style="display:flex;gap:0.15rem">' +
        '<button class="ci-icon-btn" data-id="' + id + '" onclick="openPanel(this,event)" title="Details">&#x24D8;</button>' +
        emailIcon + phoneIcon +
      '</div></td>' +
    '</tr>';
  }

  // ── Status picker ────────────────────────────────────────────────
  function togglePicker(btn, event) {
    event.stopPropagation();
    const id = btn.dataset.id;
    closePicker();
    if (_openPickerId === id) { _openPickerId = null; return; }
    _openPickerId = id;

    const state  = getCheckinStateById(id);
    const status = state.status;

    const picker = document.createElement('div');
    picker.id = 'ci-picker-float';
    picker.className = 'ci-picker-float';
    picker.addEventListener('click', e => e.stopPropagation());

    const opts = ['here','late','absent','excused'].map(s => {
      const sc = STATUS_CONF[s];
      return '<button class="ci-picker-opt s-' + s + (status === s ? ' is-active' : '') + '" data-id="' + esc(id) + '" data-status="' + s + '" onclick="pickerSetStatus(this,event)">' + sc.icon + ' ' + sc.label + '</button>';
    });
    if (status) opts.push('<button class="ci-picker-opt s-clear" data-id="' + esc(id) + '" data-status="" onclick="pickerSetStatus(this,event)">&#8212; Clear</button>');
    picker.innerHTML = opts.join('');
    document.body.appendChild(picker);

    const rect = btn.getBoundingClientRect();
    picker.style.left = Math.min(rect.left, window.innerWidth - 155) + 'px';
    picker.style.top  = (rect.bottom + window.scrollY + 4) + 'px';
  }

  function closePicker() {
    const p = document.getElementById('ci-picker-float');
    if (p) p.remove();
    _openPickerId = null;
  }

  function pickerSetStatus(btn, event) {
    event.stopPropagation();
    const id     = btn.dataset.id;
    const status = btn.dataset.status || null;
    const a      = _allAttendees.find(x => x.id === id);
    setStatus(id, a?.name || '', status);
  }

  // ── Status setter ────────────────────────────────────────────────
  async function setStatus(id, name, newStatus) {
    closePicker();
    if (!_selectedEvent) return;
    const checkins = [...(_selectedEvent.event_checkins || [])];
    const idx      = checkins.findIndex(c => c.id === id);
    const now      = new Date().toISOString();
    const existing = idx >= 0 ? checkins[idx].status : null;
    const resolved = (newStatus !== null && existing === newStatus) ? null : newStatus;
    const arrived  = resolved === 'here' || resolved === 'late';
    if (idx >= 0) {
      checkins[idx] = {
        ...checkins[idx],
        status: resolved,
        checked_in_at: arrived && !checkins[idx].checked_in_at ? now : checkins[idx].checked_in_at,
      };
    } else {
      const a = _allAttendees.find(x => x.id === id);
      checkins.push({ id, type: a?.type||'cast', name: a?.name||name, status: resolved, checked_in_at: arrived ? now : null, left_at: null, notes: null });
    }
    await saveCheckins(checkins);
  }

  // ── Time editing ─────────────────────────────────────────────────
  async function editTime(btn, event) {
    event.stopPropagation();
    const id    = btn.dataset.id;
    const field = btn.dataset.field;
    const state = getCheckinStateById(id);
    const iso   = field === 'arrived' ? state.checked_in_at : state.left_at;
    const cur   = iso ? new Date(iso).toTimeString().slice(0,5) : '';

    const input = document.createElement('input');
    input.type  = 'time';
    input.value = cur;
    input.style.cssText = 'width:85px;padding:0.25rem 0.4rem;border:1.5px solid #572e88;border-radius:5px;font-size:0.8rem;font-family:inherit;outline:none;';
    btn.replaceWith(input);
    input.focus();

    let done = false;
    async function commit() {
      if (done) return; done = true;
      const val = input.value;
      const day = _selectedEvent.start_time?.slice(0,10) || todayDate();
      const newIso = val ? day + 'T' + val + ':00' : null;
      const a = _allAttendees.find(x => x.id === id);
      const checkins = [...(_selectedEvent.event_checkins || [])];
      const idx = checkins.findIndex(c => c.id === id);
      const key = field === 'arrived' ? 'checked_in_at' : 'left_at';
      if (idx >= 0) {
        checkins[idx] = { ...checkins[idx], [key]: newIso };
      } else {
        checkins.push({ id, type: a?.type||'cast', name: a?.name||'', status: null, checked_in_at: null, left_at: null, [key]: newIso });
      }
      await saveCheckins(checkins);
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { done = true; renderCheckinPanel(); }
    });
  }

  // ── Save checkins to DB ──────────────────────────────────────────
  async function saveCheckins(checkins) {
    const { error } = await _sb.from('production_events')
      .update({ event_checkins: checkins })
      .eq('id', _selectedEvent.id);
    if (!error) {
      _selectedEvent.event_checkins = checkins;
      _events = _events.map(e => e.id === _selectedEvent.id ? _selectedEvent : e);
      renderCheckinPanel();
      renderEventList();
      if (_openPanelId) renderRightPanel(_openPanelId);
    }
  }

  // ── Filter / search ──────────────────────────────────────────────
  function setFilterTab(tab) { _filterTab = tab; renderCheckinPanel(); }
  function onSearch(val)     { _searchQuery = val; renderCheckinPanel(); }

  // ── Bulk selection ───────────────────────────────────────────────
  function toggleRowSelect(cb) {
    const id = cb.dataset.id;
    const row = document.getElementById('ci-row-' + id);
    if (cb.checked) { _bulkSelected.add(id); row?.classList.add('is-selected'); }
    else            { _bulkSelected.delete(id); row?.classList.remove('is-selected'); }
    updateBulkBar();
  }
  function toggleSelectAll(cb) {
    document.querySelectorAll('.ci-row-check').forEach(check => {
      check.checked = cb.checked;
      const row = document.getElementById('ci-row-' + check.dataset.id);
      if (cb.checked) { _bulkSelected.add(check.dataset.id); row?.classList.add('is-selected'); }
      else            { _bulkSelected.delete(check.dataset.id); row?.classList.remove('is-selected'); }
    });
    updateBulkBar();
  }
  function clearSelection() {
    _bulkSelected.clear();
    document.querySelectorAll('.ci-row-check').forEach(cb => { cb.checked = false; });
    const all = document.getElementById('ci-check-all');
    if (all) all.checked = false;
    document.querySelectorAll('.ci-tr').forEach(r => r.classList.remove('is-selected'));
    updateBulkBar();
  }
  function updateBulkBar() {
    const bar = document.getElementById('ci-bulk-bar');
    if (!bar) return;
    if (_bulkSelected.size === 0) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    bar.innerHTML =
      '<span class="ci-bulk-lbl">' + _bulkSelected.size + ' selected:</span>' +
      '<button class="ci-bulk-opt s-here"    onclick="bulkSetStatus(\'here\')">Here</button>' +
      '<button class="ci-bulk-opt s-late"    onclick="bulkSetStatus(\'late\')">Late</button>' +
      '<button class="ci-bulk-opt s-absent"  onclick="bulkSetStatus(\'absent\')">Absent</button>' +
      '<button class="ci-bulk-opt s-excused" onclick="bulkSetStatus(\'excused\')">Excused</button>' +
      '<button class="ci-bulk-opt s-clear"   onclick="bulkSetStatus(null)">Clear</button>' +
      '<button class="ci-bulk-desel" onclick="clearSelection()">Deselect all</button>';
  }
  async function bulkSetStatus(status) {
    if (!_selectedEvent || !_bulkSelected.size) return;
    const checkins = [...(_selectedEvent.event_checkins || [])];
    const now = new Date().toISOString();
    const arrived = status === 'here' || status === 'late';
    _bulkSelected.forEach(id => {
      const idx = checkins.findIndex(c => c.id === id);
      const a   = _allAttendees.find(x => x.id === id);
      if (idx >= 0) {
        checkins[idx] = { ...checkins[idx], status, checked_in_at: arrived && !checkins[idx].checked_in_at ? now : checkins[idx].checked_in_at };
      } else if (a) {
        checkins.push({ id, type: a.type, name: a.name, status, checked_in_at: arrived ? now : null, left_at: null, notes: null });
      }
    });
    await saveCheckins(checkins);
    clearSelection();
  }

  // ── End Rehearsal ────────────────────────────────────────────────
  async function endRehearsal() {
    if (!_selectedEvent) return;
    if (!confirm('End this event?\n\nEveryone not yet marked will be recorded as Absent. The record will be locked from further edits.')) return;
    const attendees = resolveAttendees(_selectedEvent);
    const checkins  = [...(_selectedEvent.event_checkins || [])];
    const now = new Date().toISOString();
    attendees.forEach(a => {
      if (!getCheckinState(checkins, a.id).status) {
        const idx = checkins.findIndex(c => c.id === a.id);
        if (idx >= 0) checkins[idx] = { ...checkins[idx], status: 'absent' };
        else checkins.push({ id: a.id, type: a.type, name: a.name, status: 'absent', checked_in_at: null, left_at: null, notes: null });
      }
    });
    const { error } = await _sb.from('production_events')
      .update({ event_checkins: checkins, is_locked: true, locked_at: now })
      .eq('id', _selectedEvent.id);
    if (!error) {
      _selectedEvent.event_checkins = checkins;
      _selectedEvent.is_locked  = true;
      _selectedEvent.locked_at  = now;
      _events = _events.map(e => e.id === _selectedEvent.id ? _selectedEvent : e);
      renderEventHeader();
      renderCheckinPanel();
      renderEventList();
    }
  }

  // ── Export CSV ───────────────────────────────────────────────────
  function exportCsv() {
    if (!_selectedEvent) return;
    const checkins = _selectedEvent.event_checkins || [];
    const rows = [['Name','Type','Role / Character','Status','Arrived','Left','Conflict']];
    _allAttendees.forEach(a => {
      const s = getCheckinState(checkins, a.id);
      const sub = a.type === 'cast' ? (a.characters||[]).join(' / ') : (a.role_name||'Volunteer');
      rows.push([a.name||'', a.type, sub, s.status||'not marked', s.checked_in_at ? fmtTime(s.checked_in_at) : '', s.left_at ? fmtTime(s.left_at) : '', a.has_conflict ? 'yes' : '']);
    });
    const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = 'checkin-' + (_selectedEvent.title||'event').replace(/\s+/g,'-').toLowerCase() + '.csv';
    a.click();
  }

  // ── Right panel ──────────────────────────────────────────────────
  function openPanel(btn, event) {
    event.stopPropagation();
    _openPanelId = btn.dataset.id;
    renderRightPanel(_openPanelId);
    document.getElementById('ci-overlay').classList.add('open');
    document.getElementById('ci-right-panel').classList.add('open');
  }
  function closePanel() {
    _openPanelId = null;
    document.getElementById('ci-overlay').classList.remove('open');
    document.getElementById('ci-right-panel').classList.remove('open');
  }

  function renderRightPanel(id) {
    const a = _allAttendees.find(x => x.id === id);
    if (!a) return;
    const state  = getCheckinStateById(id);
    const person = _people[id] || {};
    const initials = (a.name||'?').split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
    const avatar = a.headshot_url
      ? '<img class="ci-rp-avatar" src="' + esc(a.headshot_url) + '" alt="" />'
      : '<div class="ci-rp-avatar-init">' + esc(initials) + '</div>';
    const subLabel = a.type === 'cast' ? (a.characters||[]).join(', ') : (a.role_name||'Volunteer');
    const sc = STATUS_CONF[state.status] || STATUS_CONF._none;
    const arrivedNote = state.checked_in_at ? 'Arrived ' + fmtTime(state.checked_in_at) : '';
    const leftNote    = state.left_at       ? 'Left '    + fmtTime(state.left_at)        : '';

    // Actions
    const callBtn  = person.phone ? '<a class="ci-rp-action-btn" href="tel:' + esc(person.phone)  + '"><span class="ci-rp-action-icon">&#x260E;</span>Call</a>'  : '';
    const textBtn  = person.phone ? '<a class="ci-rp-action-btn" href="sms:' + esc(person.phone)  + '"><span class="ci-rp-action-icon">&#x1F4AC;</span>Text</a>'  : '';
    const emailBtn = person.email ? '<a class="ci-rp-action-btn" href="mailto:' + esc(person.email) + '"><span class="ci-rp-action-icon">&#x2709;</span>Email</a>' : '';

    // Guardian
    const gName    = person.guardian_name    || '';
    const gContact = person.guardian_contact || person.guardian_phone || '';
    const guardianHtml = (gName || person.is_minor)
      ? '<div class="ci-rp-section">' +
          '<div class="ci-rp-section-title">Parent / Guardian</div>' +
          (gName ? '<div class="ci-rp-row"><span class="ci-rp-label">' + esc(gName) + '</span>' + (gContact ? '<br><a href="tel:' + esc(gContact) + '">' + esc(gContact) + '</a>' : '') + '</div>' : '') +
          (!gName && !gContact ? '<div class="ci-rp-empty">No guardian on file</div>' : '') +
        '</div>'
      : '';

    // Attendance history
    const histHtml = buildAttendanceHistory(id);

    // Existing note
    const existingNote = state.notes || '';

    document.getElementById('ci-rp-content').innerHTML =
      '<div class="ci-rp-top"><button class="ci-rp-close" onclick="closePanel()">&#10005;</button></div>' +
      '<div class="ci-rp-hero">' + avatar +
        '<div>' +
          '<div class="ci-rp-name">' + esc(a.name||'Unknown') + '</div>' +
          '<div class="ci-rp-role">' + esc(subLabel) + '</div>' +
          '<div class="ci-rp-status-row">' +
            '<span class="ci-spill s-' + (state.status||'none') + '">' + sc.icon + ' ' + sc.label + '</span>' +
            (arrivedNote ? '<span class="ci-rp-time">' + esc(arrivedNote) + '</span>' : '') +
            (leftNote    ? '<span class="ci-rp-time">' + esc(leftNote)    + '</span>' : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      (callBtn || textBtn || emailBtn ? '<div class="ci-rp-actions">' + callBtn + textBtn + emailBtn + '</div>' : '') +
      guardianHtml +
      '<div class="ci-rp-section">' +
        '<div class="ci-rp-section-title">Attendance History</div>' +
        histHtml +
      '</div>' +
      '<div class="ci-rp-section">' +
        '<div class="ci-rp-section-title">Notes</div>' +
        '<textarea class="ci-notes-area" id="ci-notes-ta" placeholder="Add a note...">' + esc(existingNote) + '</textarea>' +
        '<button class="ci-notes-save" data-id="' + esc(id) + '" onclick="saveNote(this)">Save Note</button>' +
      '</div>';
  }

  function buildAttendanceHistory(personId) {
    const pastEvs = _events.filter(e => isPast(e)).slice(-14);
    const cur = _events.find(e => e.id === _selectedEvent?.id);
    const toShow = cur && !pastEvs.find(e => e.id === cur.id) ? [...pastEvs, cur] : pastEvs;
    if (!toShow.length) return '<div class="ci-rp-empty">No attendance history yet.</div>';
    const dots = toShow.map(ev => {
      const entry  = (ev.event_checkins||[]).find(c => c.id === personId);
      const status = entry?.status || null;
      const conf   = status ? (HIST_CONF[status]||HIST_CONF._none) : HIST_CONF._none;
      const evLbl  = esc(ev.title || EVENT_LABELS[ev.event_type] || 'Event');
      return '<div class="ci-hist-dot" style="background:' + conf.bg + ';color:' + conf.colour + '" title="' + evLbl + ' — ' + conf.label + '">' + conf.letter + '</div>';
    }).join('');
    return '<div class="ci-hist-row">' + dots + '</div>' +
           '<div class="ci-hist-legend">H = Here &nbsp;&#183;&nbsp; L = Late &nbsp;&#183;&nbsp; A = Absent &nbsp;&#183;&nbsp; E = Excused</div>';
  }

  async function saveNote(btn) {
    const id = btn.dataset.id;
    const ta = document.getElementById('ci-notes-ta');
    if (!ta || !_selectedEvent) return;
    const noteText = ta.value.trim();
    const checkins = [...(_selectedEvent.event_checkins||[])];
    const idx      = checkins.findIndex(c => c.id === id);
    const a        = _allAttendees.find(x => x.id === id);
    if (idx >= 0) checkins[idx] = { ...checkins[idx], notes: noteText||null };
    else checkins.push({ id, type: a?.type||'cast', name: a?.name||'', status: null, checked_in_at: null, left_at: null, notes: noteText||null });
    await saveCheckins(checkins);
    ta.style.borderColor = '#469b42';
    setTimeout(() => { ta.style.borderColor = ''; }, 1500);
  }

  // ── Attendee resolution ──────────────────────────────────────────
  function resolveAttendees(ev) {
    const calledIds = new Set(ev.called_character_ids || []);
    const personMap = {};
    _assignments.filter(a => calledIds.has(a.character_id)).forEach(a => {
      const person = _people[a.applicant_id] || { name:'Unknown' };
      const char   = _chars.find(c => c.id === a.character_id);
      if (!personMap[a.applicant_id]) {
        personMap[a.applicant_id] = {
          id: a.applicant_id, type:'cast',
          name: person.name||'Unknown', headshot_url: person.headshot_url||null,
          characters: [], has_conflict: checkConflict(person.date_conflicts, ev),
        };
      }
      if (char) personMap[a.applicant_id].characters.push(char.name);
    });
    const evDate = ev.start_time?.slice(0,10) || '';
    const volList = _volunteers
      .filter(v => { const extra = Array.isArray(v.required_dates) ? v.required_dates : []; return v.shift_date === evDate || extra.includes(evDate); })
      .map(v => ({ id: v.id, type:'volunteer', name: v.name||v.email||'Volunteer', headshot_url: null, characters: [], role_name: v.role_name||'', has_conflict: false }));
    return [...Object.values(personMap), ...volList].sort((a,b) => (a.name||'').localeCompare(b.name||''));
  }

  function checkConflict(dateConflicts, ev) {
    if (!dateConflicts) return false;
    const raw = typeof dateConflicts === 'string' ? (()=>{ try{ return JSON.parse(dateConflicts)||{}; }catch{ return {}; }})() : (dateConflicts||{});
    const byId = raw[ev.id];
    if (byId === true || byId?.conflict === true) return true;
    const evDate = ev.start_time?.slice(0,10);
    if (!evDate) return false;
    return Object.values(raw).some(v => typeof v === 'object' && v?.date === evDate && v?.conflict === true);
  }

  function getCheckinState(checkins, id) {
    const entry = (checkins||[]).find(c => c.id === id);
    if (!entry) return { status:null, checked_in_at:null, left_at:null, notes:null };
    if (entry.status === undefined && entry.checked_in) return { status:'here', checked_in_at:entry.checked_in_at, left_at:null, notes:null };
    return entry;
  }
  function getCheckinStateById(id) {
    return getCheckinState(_selectedEvent?.event_checkins || [], id);
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s ?? '');
    return d.innerHTML;
  }
  </script>
</body>
</html>
