<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Team - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css" />
  <link rel="stylesheet" href="/ASSETS/styles/casting-card.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin:0; background:#f7f5fb; color:#1a1530; }
    .team-shell { max-width:1180px; margin:0 auto; padding:1.5rem clamp(1rem,3vw,2rem) 4rem; }
    .team-top { display:flex; justify-content:space-between; gap:1rem; align-items:flex-start; margin-bottom:1.2rem; }
    .team-kicker { font-size:0.72rem; font-weight:900; letter-spacing:0.12em; text-transform:uppercase; color:#86799f; }
    .team-title { font-size:clamp(1.7rem,4vw,2.5rem); font-weight:950; letter-spacing:-0.04em; margin:0.15rem 0; }
    .team-sub { color:#6a5a80; font-size:0.9rem; font-weight:650; }
    .team-badge { border-left:4px solid #572e88; background:#fff; padding:0.65rem 0.8rem; border-radius:10px; min-width:220px; }
    .team-badge-name { font-weight:950; }
    .team-badge-role { color:#86799f; font-size:0.78rem; font-weight:800; margin-top:0.1rem; }
    .team-login { min-height:100vh; display:grid; place-items:center; padding:1.5rem; background:linear-gradient(160deg, #1f1138 0%, #3d1d6e 50%, #572e88 100%); }
    .team-login-card { width:min(440px,100%); background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 28px 70px rgba(15,6,35,0.45); }
    .team-login-header { background:#572e88; padding:1.25rem 1.5rem; display:flex; flex-direction:column; align-items:flex-start; gap:0.55rem; position:relative; overflow:hidden; }
    .team-login-header::before { content:''; position:absolute; inset:0; background-image:url('/ASSETS/Images/Grid-Glow-Purple.png'); background-size:cover; background-position:center; opacity:0.07; pointer-events:none; }
    .team-login-logo { height:22px; display:block; position:relative; z-index:1; }
    .team-login-label { font-size:0.68rem; font-weight:900; letter-spacing:0.13em; text-transform:uppercase; color:rgba(255,255,255,0.55); position:relative; z-index:1; }
    .team-login-body { padding:1.5rem; }
    .team-login-body h1 { margin:0 0 0.3rem; font-size:1.45rem; font-weight:950; letter-spacing:-0.03em; color:#1a1530; }
    .team-login-body p { color:#6a5a80; margin:0 0 1.1rem; line-height:1.5; font-size:0.88rem; }
    .team-tabs { display:flex; gap:0.35rem; flex-wrap:wrap; border-bottom:1px solid rgba(87,46,136,0.12); margin-bottom:1rem; }
    .team-tab { border:0; background:transparent; color:#6a5a80; font:inherit; font-size:0.82rem; font-weight:900; padding:0.65rem 0.75rem; cursor:pointer; border-bottom:3px solid transparent; }
    .team-tab.active { color:#572e88; border-bottom-color:#572e88; }
    .team-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:0.85rem; }
    .team-card { background:#fff; border:1px solid rgba(87,46,136,0.12); border-radius:14px; padding:0.9rem; }
    .team-card-title { font-weight:950; margin-bottom:0.35rem; }
    .team-card-sub { color:#86799f; font-size:0.8rem; font-weight:700; line-height:1.45; }
    .profile-layout { display:grid; grid-template-columns:260px minmax(0,1fr); gap:1rem; align-items:start; }
    .profile-photo { width:100%; aspect-ratio:1; border-radius:18px; background:rgba(87,46,136,0.08); overflow:hidden; display:grid; place-items:center; color:#572e88; font-size:3rem; font-weight:950; }
    .profile-photo img { width:100%; height:100%; object-fit:cover; object-position:top; }
    .profile-actions { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.75rem; }
    .color-grid { display:flex; gap:0.5rem; flex-wrap:wrap; margin:0.55rem 0 0.25rem; }
    .color-dot { width:2rem; height:2rem; border-radius:999px; border:2px solid transparent; background:var(--team-note-color); box-shadow:0 0 0.55rem color-mix(in srgb, var(--team-note-color) 45%, transparent); cursor:pointer; }
    .color-dot.active { border-color:#1a1530; }
    .color-dot:disabled { opacity:0.22; cursor:not-allowed; box-shadow:none; }
    .type-row { display:flex; align-items:center; gap:0.55rem; padding:0.5rem 0; border-bottom:1px solid rgba(87,46,136,0.08); }
    .type-dot { width:0.62rem; height:0.62rem; border-radius:50%; background:var(--c,#572e88); box-shadow:0 0 0.55rem color-mix(in srgb,var(--c,#572e88) 50%,transparent); }
    .type-name { font-weight:900; }
    .type-meta { color:#86799f; font-size:0.78rem; margin-left:auto; }
    .session-strip { display:flex; gap:0.5rem; overflow-x:auto; padding-bottom:0.35rem; margin-bottom:0.8rem; }
    .session-btn { border:1px solid rgba(87,46,136,0.12); background:#fff; color:#4a3d6b; font:inherit; font-size:0.8rem; font-weight:900; border-radius:12px; padding:0.55rem 0.7rem; white-space:nowrap; cursor:pointer; }
    .session-btn.active { background:var(--c,#572e88); border-color:var(--c,#572e88); color:#fff; }
    .room-layout { display:grid; grid-template-columns:260px minmax(0,1fr); gap:1rem; align-items:start; }
    .performer-list { background:#fff; border:1px solid rgba(87,46,136,0.12); border-radius:14px; padding:0.6rem; display:grid; gap:0.35rem; max-height:72vh; overflow:auto; }
    .performer-btn { border:0; background:transparent; text-align:left; font:inherit; padding:0.45rem; border-radius:10px; cursor:pointer; color:#2c2443; font-weight:850; }
    .performer-btn.active, .performer-btn:hover { background:rgba(87,46,136,0.07); color:#572e88; }
    .room-main { display:grid; grid-template-columns:240px minmax(0,1fr); gap:1rem; align-items:start; }
    .card-face { background:#fff; border:1px solid rgba(87,46,136,0.12); border-radius:14px; padding:0.8rem; }
    .card-face .casting-card { width:100%; }
    .notes-panel { background:#fff; border:1px solid rgba(87,46,136,0.12); border-radius:14px; padding:0.9rem; }
    .notes-title { font-weight:950; margin-bottom:0.55rem; }
    .note-thread { display:grid; gap:0.5rem; margin:0.65rem 0; }
    .note-item { border-left:3px solid var(--note-color,#572e88); padding:0.4rem 0.55rem; background:color-mix(in srgb, var(--note-color,#572e88) 8%, transparent); border-radius:0 7px 7px 0; }
    .note-meta { font-size:0.64rem; font-weight:950; letter-spacing:0.06em; text-transform:uppercase; color:var(--note-color,#572e88); margin-bottom:0.18rem; }
    .note-body { font-size:0.82rem; line-height:1.45; white-space:pre-wrap; color:#2c2443; }
    .compose { display:grid; gap:0.45rem; margin-top:0.7rem; }
    .compose textarea { min-height:92px; resize:vertical; }
    .callback-list { display:grid; gap:0.7rem; }
    .callback-row { display:grid; grid-template-columns:210px minmax(0,1fr); gap:0.75rem; background:#fff; border:1px solid rgba(87,46,136,0.12); border-left:4px solid #E3A46F; border-radius:12px; padding:0.75rem; }
    .callback-name { font-weight:950; }
    .callback-meta { color:#86799f; font-size:0.78rem; font-weight:750; margin-top:0.2rem; }
    .empty { text-align:center; color:#9a90b0; padding:2rem 1rem; }
    .error { color:#b91c1c; font-size:0.82rem; font-weight:800; margin-top:0.55rem; }
    .btn-primary {
      display:inline-flex; align-items:center; gap:0.35rem;
      padding:0.58rem 1.15rem;
      background:#efab45; color:#1a1008;
      border:none; border-radius:8px;
      font-size:0.84rem; font-weight:700; font-family:inherit;
      cursor:pointer; transition:opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
    .btn-secondary {
      display:inline-flex; align-items:center; gap:0.35rem;
      padding:0.52rem 1.05rem;
      background:#fff; color:#572e88;
      border:1.5px solid rgba(87,46,136,0.28); border-radius:8px;
      font-size:0.84rem; font-weight:600; font-family:inherit;
      cursor:pointer; transition:background 0.15s, border-color 0.15s;
      text-decoration:none;
    }
    .btn-secondary:hover { background:rgba(87,46,136,0.04); border-color:rgba(87,46,136,0.45); }
    .form-input, .form-textarea {
      width:100%; background:#f5f3fc; border:1px solid rgba(87,46,136,0.2);
      color:#1a1530; border-radius:8px; padding:0.65rem 1rem;
      font-size:0.9rem; font-family:inherit; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s; box-sizing:border-box;
    }
    .form-input:focus, .form-textarea:focus {
      border-color:rgba(87,46,136,0.5); box-shadow:0 0 0 3px rgba(87,46,136,0.1);
    }
    .form-input::placeholder, .form-textarea::placeholder { color:#9a90b0; }
    .form-textarea { resize:vertical; min-height:90px; }
    .note-type-picker { display:flex; gap:0.3rem; flex-wrap:wrap; margin-bottom:0.45rem; }
    .note-type-btn { border:1px solid rgba(87,46,136,0.18); background:#fff; color:#5e4c79; font:inherit; font-size:0.72rem; font-weight:800; border-radius:999px; padding:0.28rem 0.6rem; cursor:pointer; transition:background 0.12s, border-color 0.12s, color 0.12s; white-space:nowrap; }
    .note-type-btn.active { background:#572e88; border-color:#572e88; color:#fff; }
    .note-rating-row { display:flex; align-items:center; gap:0.3rem; margin-bottom:0.45rem; }
    .note-rating-label { font-size:0.72rem; font-weight:800; color:#86799f; flex-shrink:0; }
    .note-rating-btn { width:1.75rem; height:1.75rem; border-radius:50%; border:1.5px solid rgba(87,46,136,0.2); background:#fff; color:#7a6b99; font:inherit; font-size:0.72rem; font-weight:900; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 0.12s, border-color 0.12s, color 0.12s; flex-shrink:0; }
    .note-rating-btn.active { background:#efab45; border-color:#d4922c; color:#1a1008; }
    .performer-nav { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.65rem; }
    .performer-nav-btn { border:1px solid rgba(87,46,136,0.18); background:#fff; color:#572e88; font:inherit; font-size:0.78rem; font-weight:800; border-radius:8px; padding:0.4rem 0.75rem; cursor:pointer; transition:background 0.12s; flex-shrink:0; }
    .performer-nav-btn:hover { background:rgba(87,46,136,0.06); }
    .performer-nav-btn:disabled { opacity:0.3; cursor:not-allowed; }
    .performer-nav-counter { flex:1; text-align:center; font-size:0.8rem; font-weight:900; color:#1a1530; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .note-type-badge { display:inline-block; font-size:0.6rem; font-weight:900; letter-spacing:0.06em; text-transform:uppercase; background:rgba(87,46,136,0.1); color:#572e88; border-radius:3px; padding:0.08rem 0.32rem; margin-right:0.25rem; vertical-align:middle; }
    .note-rating-badge { display:inline-block; font-size:0.65rem; font-weight:900; color:#b07d00; margin-right:0.2rem; vertical-align:middle; }
    @media (max-width: 860px) {
      .team-top, .room-layout, .room-main, .profile-layout { grid-template-columns:1fr; display:grid; }
      .team-grid { grid-template-columns:1fr; }
      .team-badge { width:100%; }
    }
  </style>
</head>
<body>
  <div id="app" class="team-login">
    <div class="team-login-card">
      <div class="team-login-header">
        <img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" class="team-login-logo" />
        <div class="team-login-label">Audition &amp; Creative Team Portal</div>
      </div>
      <div class="team-login-body">
        <h1>Welcome</h1>
        <p>Use the email address and access code from your invite to get in.</p>
        <input class="form-input" id="team-email" placeholder="Your email address" type="email" autocomplete="email" />
        <input class="form-input" id="team-passcode" placeholder="Access code (e.g. A7BK2X)" autocomplete="one-time-code" style="margin-top:0.55rem;" />
        <button class="btn-primary" onclick="loginTeam()" style="width:100%;justify-content:center;margin-top:0.85rem;">Open Auditions</button>
        <div class="error" id="login-error"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/ASSETS/scripts/casting-card.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );
    const params = new URLSearchParams(location.search);
    const prodId = params.get('id') || params.get('prod');
    let passcode = params.get('code') || '';
    let teamEmail = params.get('email') || '';
    let member = null;
    let prod = null;
    let sessions = [];
    let applicants = [];
    let notes = [];
    let takenColors = [];
    let activeTab = 'dashboard';
    let activeSessionId = '';
    let activeApplicantId = '';
    let activeNoteType = 'general';
    let activeNoteRating = null;
    const NOTE_TYPES = [
      { value:'acting',           label:'Acting' },
      { value:'vocals',           label:'Vocals' },
      { value:'dance',            label:'Dance' },
      { value:'general',         label:'General' },
      { value:'callback_interest', label:'Callback' },
      { value:'role_suggestion',  label:'Role' },
    ];

    function esc(v) {
      const d = document.createElement('div');
      d.textContent = v ?? '';
      return d.innerHTML;
    }
    function colorForType(type) {
      return ({ audition:'#7FAF8B', dance_call:'#D68CB2', callback:'#E3A46F', other:'#B8AECF', other_audition:'#B8AECF' })[type] || '#7FAF8B';
    }
    function labelForType(type) {
      return ({ audition:'General Auditions', dance_call:'Dance Call', callback:'Callbacks', other:'Other Audition', other_audition:'Other Audition' })[type] || 'Audition';
    }
    const TEAM_NOTE_COLORS = ['#572e88', '#7FAF8B', '#D68CB2', '#E3A46F', '#55acda', '#22cdd4', '#c2487a', '#8a7aac'];
    function customAnswers(app) {
      if (!app?.custom_answers) return {};
      if (typeof app.custom_answers === 'string') { try { return JSON.parse(app.custom_answers || '{}') || {}; } catch { return {}; } }
      return app.custom_answers || {};
    }
    function applicantAge(app) {
      const ca = customAnswers(app);
      const raw = app?.date_of_birth || ca['Date of Birth'] || '';
      if (!raw) return app?.age || null;
      const dob = new Date(String(raw).includes('T') ? raw : `${raw}T00:00:00`);
      if (Number.isNaN(dob.getTime())) return app?.age || null;
      const today = new Date();
      let age = today.getFullYear() - dob.getFullYear();
      if (today.getMonth() < dob.getMonth() || (today.getMonth() === dob.getMonth() && today.getDate() < dob.getDate())) age--;
      return age >= 0 ? age : null;
    }
    function cardHtml(app) {
      const parts = String(app?.name || 'Unknown').split(' ');
      const ca = customAnswers(app);
      const first = ca['Preferred Name'] || parts[0] || '';
      return renderCastingCard({
        first_name: `${first}${applicantAge(app) ? ` (${applicantAge(app)})` : ''}`,
        last_name: parts.slice(1).join(' '),
        age: null,
        pronouns: ca.Pronouns || app.pronouns || '',
        headshot_url: app.headshot_url || '',
        casting_categories: [],
        role_openness: ''
      }, { size:'compact', hasPadding:true, hasIcons:true });
    }
    async function loginTeam() {
      passcode = document.getElementById('team-passcode')?.value?.trim() || passcode;
      teamEmail = document.getElementById('team-email')?.value?.trim() || teamEmail;
      const err = document.getElementById('login-error');
      if (err) err.textContent = '';
      if (!prodId || !teamEmail || !passcode) { if (err) err.textContent = 'Enter your email and access code.'; return; }
      const { data, error } = await sb.rpc('team_member_login', { p_production_id: prodId, p_email: teamEmail, p_passcode: passcode });
      if (error || !data?.length) { if (err) err.textContent = 'That email and access code did not match.'; return; }
      member = data[0];
      await loadData();
      renderShell();
    }
    async function loadData() {
      const [prodRes, sessionRes, appRes, notesRes, colorRes] = await Promise.all([
        sb.from('productions').select('*').eq('id', prodId).single(),
        sb.from('audition_sessions').select('*').eq('production_id', prodId).order('sort_order', { ascending: true }),
        sb.from('audition_applications').select('id,production_id,session_id,slot_id,name,pronouns,date_of_birth,headshot_url,role_interest,roles_requested,experience_level,experience,shirt_size,pant_size,dress_size,hair_length,skills,notes,custom_answers,date_conflicts,slot_assignments,session_checkins,performer_number,contact_name,callback_status,callback_notes,created_at').eq('production_id', prodId).order('created_at', { ascending: false }),
        sb.rpc('team_note_list', { p_production_id: prodId, p_email: teamEmail, p_passcode: passcode }),
        sb.rpc('team_member_colour_list', { p_production_id: prodId, p_email: teamEmail, p_passcode: passcode })
      ]);
      prod = prodRes.data || {};
      sessions = sessionRes.data || [];
      applicants = appRes.data || [];
      notes = notesRes.data || [];
      takenColors = colorRes.data || [];
      activeSessionId = activeSessionId || sessions[0]?.id || '';
      activeApplicantId = activeApplicantId || applicants[0]?.id || '';
    }
    function renderShell() {
      document.getElementById('app').className = 'team-shell';
      document.getElementById('app').innerHTML = `
        <div class="team-top">
          <div>
            <div class="team-kicker">Audition &amp; Creative Team</div>
            <h1 class="team-title">${esc(prod.title || prod.name || 'Production')}</h1>
            <div class="team-sub">Dashboard, schedule, audition types, casting/card notes, and callbacks.</div>
          </div>
          <div class="team-badge">
            <div class="team-badge-name">${esc(member.name)}</div>
            <div class="team-badge-role"><span style="display:inline-block;width:0.55rem;height:0.55rem;border-radius:999px;background:${esc(member.note_color || '#572e88')};box-shadow:0 0 0.5rem ${esc(member.note_color || '#572e88')};margin-right:0.35rem;"></span>${esc(member.role)}</div>
          </div>
        </div>
        <div class="team-tabs">
          ${['dashboard','schedule','types','inroom','callbacks','profile'].map(t => `<button class="team-tab${activeTab === t ? ' active' : ''}" onclick="setTab('${t}')">${({dashboard:'Dashboard',schedule:'Schedule',types:'All Audition Types',inroom:'In The Room',callbacks:'Callback List',profile:'Profile'})[t]}</button>`).join('')}
        </div>
        <div id="team-content"></div>`;
      renderTab();
    }
    function setTab(tab) { activeTab = tab; renderShell(); }
    function renderTab() {
      const el = document.getElementById('team-content');
      if (activeTab === 'dashboard') {
        el.innerHTML = `<div class="team-grid">
          <div class="team-card"><div class="team-card-title">${applicants.length}</div><div class="team-card-sub">Audition performers</div></div>
          <div class="team-card"><div class="team-card-title">${sessions.length}</div><div class="team-card-sub">Audition types</div></div>
          <div class="team-card"><div class="team-card-title">${notes.length}</div><div class="team-card-sub">Team notes written</div></div>
        </div>`;
      } else if (activeTab === 'schedule' || activeTab === 'types') {
        el.innerHTML = `<div class="team-card">${sessions.map(s => `<div class="type-row" style="--c:${colorForType(s.type)};"><span class="type-dot"></span><span class="type-name">${esc(s.name || labelForType(s.type))}</span><span class="type-meta">${esc(labelForType(s.type))}</span></div>`).join('') || '<div class="empty">No audition types yet.</div>'}</div>`;
      } else if (activeTab === 'callbacks') {
        renderCallbacks();
      } else if (activeTab === 'profile') {
        renderProfile();
      } else {
        renderInRoom();
      }
    }
    function colorOptionsHtml() {
      const current = String(member?.note_color || '#572e88').toLowerCase();
      const usedByOthers = new Set((takenColors || [])
        .filter(row => row.team_member_id !== member.id)
        .map(row => String(row.note_color || '').toLowerCase())
        .filter(Boolean));
      return TEAM_NOTE_COLORS.map(color => {
        const taken = usedByOthers.has(color.toLowerCase());
        const active = current === color.toLowerCase();
        return `<button type="button" class="color-dot${active ? ' active' : ''}" style="--team-note-color:${esc(color)};" ${taken ? 'disabled title="Already chosen by another team member"' : ''} onclick="selectProfileColor('${esc(color)}')"></button>`;
      }).join('');
    }
    function selectProfileColor(color) {
      member.note_color = color;
      renderProfile();
      renderShell();
      activeTab = 'profile';
      renderTab();
    }
    function renderProfile() {
      document.getElementById('team-content').innerHTML = `
        <div class="profile-layout">
          <div class="team-card">
            <div class="profile-photo" id="profile-photo-preview">
              ${member.headshot_url ? `<img src="${esc(member.headshot_url)}" alt="" />` : esc((member.name || '?').trim().charAt(0).toUpperCase())}
            </div>
            <div class="profile-actions">
              <input type="file" id="profile-headshot-input" accept="image/*" style="display:none;" onchange="uploadProfileHeadshot(this.files?.[0])" />
              <button class="btn-secondary" onclick="document.getElementById('profile-headshot-input').click()">Upload Headshot</button>
              ${member.headshot_url ? `<a class="btn-secondary" href="${esc(member.headshot_url)}" target="_blank" download style="text-decoration:none;">Download</a>` : ''}
            </div>
          </div>
          <div class="team-card">
            <div class="team-card-title">Your Profile</div>
            <div class="team-card-sub">Choose the colour your notes use, then add a headshot and bio the producer can download.</div>
            <label style="display:block;font-weight:900;margin-top:1rem;">Note colour</label>
            <div class="color-grid">${colorOptionsHtml()}</div>
            <label style="display:block;font-weight:900;margin-top:1rem;">Bio</label>
            <textarea class="form-textarea" id="profile-bio" placeholder="Short bio for programs, websites, or marketing..." style="min-height:160px;">${esc(member.bio || '')}</textarea>
            <button class="btn-primary" onclick="saveProfile()" style="margin-top:0.75rem;">Save Profile</button>
            <div class="error" id="profile-error"></div>
          </div>
        </div>`;
    }
    async function uploadProfileHeadshot(file) {
      if (!file) return;
      const err = document.getElementById('profile-error');
      if (err) err.textContent = '';
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]+/g, '-');
      const path = `${prodId}/team/${member.id}-${Date.now()}-${safeName}`;
      const { data, error } = await sb.storage.from('audition-headshots').upload(path, file, { upsert: true, contentType: file.type });
      if (error) { if (err) err.textContent = 'Upload failed: ' + error.message; return; }
      const { data: urlData } = sb.storage.from('audition-headshots').getPublicUrl(data.path);
      member.headshot_url = urlData?.publicUrl || '';
      member.headshot_path = data.path;
      await saveProfile(false);
      renderProfile();
    }
    async function saveProfile(showSaved = true) {
      const err = document.getElementById('profile-error');
      if (err) err.textContent = '';
      const bio = document.getElementById('profile-bio')?.value || member.bio || '';
      const { data, error } = await sb.rpc('team_member_update_profile', {
        p_production_id: prodId,
        p_email: teamEmail,
        p_passcode: passcode,
        p_note_color: member.note_color || '#572e88',
        p_bio: bio,
        p_headshot_url: member.headshot_url || null,
        p_headshot_path: member.headshot_path || null
      });
      if (error || !data?.length) {
        if (err) err.textContent = error?.message || 'Could not save profile.';
        return;
      }
      member = data[0];
      const colorRes = await sb.rpc('team_member_colour_list', { p_production_id: prodId, p_email: teamEmail, p_passcode: passcode });
      takenColors = colorRes.data || [];
      if (showSaved) {
        if (err) { err.style.color = '#2f7d43'; err.textContent = 'Profile saved.'; }
      }
      renderShell();
      activeTab = 'profile';
      renderTab();
    }
    function sessionStrip() {
      return `<div class="session-strip">${sessions.map(s => `<button class="session-btn${s.id === activeSessionId ? ' active' : ''}" style="--c:${colorForType(s.type)};" onclick="activeSessionId='${esc(s.id)}';renderTab();">${esc(s.name || labelForType(s.type))}</button>`).join('')}</div>`;
    }
    function setNoteType(type) {
      activeNoteType = type;
      document.querySelectorAll('.note-type-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.type === type));
    }
    function setNoteRating(r) {
      activeNoteRating = (activeNoteRating === r) ? null : r;
      document.querySelectorAll('.note-rating-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.rating) === activeNoteRating));
    }
    function noteComposer(appId, area, textareaId) {
      const typeBtns = NOTE_TYPES.map(t =>
        `<button type="button" class="note-type-btn${activeNoteType === t.value ? ' active' : ''}" data-type="${esc(t.value)}" onclick="setNoteType('${esc(t.value)}')">${esc(t.label)}</button>`
      ).join('');
      const ratingBtns = [1,2,3,4,5].map(r =>
        `<button type="button" class="note-rating-btn${activeNoteRating === r ? ' active' : ''}" data-rating="${r}" onclick="setNoteRating(${r})">${r}</button>`
      ).join('');
      return `<div class="compose">
        <div class="note-type-picker">${typeBtns}</div>
        <div class="note-rating-row"><span class="note-rating-label">Rating</span>${ratingBtns}</div>
        <textarea class="form-textarea" id="${esc(textareaId)}" placeholder="Write your note..."></textarea>
        <button class="btn-primary" onclick="addTeamNote('${esc(appId)}','${esc(area)}','${esc(textareaId)}')">Add Note</button>
      </div>`;
    }
    function renderInRoom() {
      const app = applicants.find(a => a.id === activeApplicantId) || applicants[0];
      if (app) activeApplicantId = app.id;
      const list = applicants.map(a => `<button class="performer-btn${a.id === activeApplicantId ? ' active' : ''}" onclick="activeApplicantId='${esc(a.id)}';renderInRoom();">${esc(a.name || 'Performer')}</button>`).join('');
      document.getElementById('team-content').innerHTML = `
        ${sessionStrip()}
        <div class="room-layout">
          <div class="performer-list">${list || '<div class="empty">No performers yet.</div>'}</div>
          ${app ? renderRoomMain(app) : '<div class="empty">No performer selected.</div>'}
        </div>`;
    }
    function renderRoomMain(app) {
      const idx = applicants.findIndex(a => a.id === app.id);
      const prev = applicants[idx - 1] || null;
      const next = applicants[idx + 1] || null;
      return `<div>
        <div class="performer-nav">
          <button class="performer-nav-btn" ${!prev ? 'disabled' : ''} onclick="activeApplicantId='${prev ? esc(prev.id) : ''}';renderInRoom();">← Prev</button>
          <span class="performer-nav-counter">${esc(app.name || 'Performer')} <span style="font-weight:600;color:#86799f;">${idx + 1} / ${applicants.length}</span></span>
          <button class="performer-nav-btn" ${!next ? 'disabled' : ''} onclick="activeApplicantId='${next ? esc(next.id) : ''}';renderInRoom();">Next →</button>
        </div>
        <div class="room-main">
          <div class="card-face">${cardHtml(app)}</div>
          <div class="notes-panel">
            <div class="notes-title">Team Notes</div>
            ${noteThread(app.id, 'in_room')}
            ${noteComposer(app.id, 'in_room', 'team-note-body')}
          </div>
        </div>
      </div>`;
    }
    function renderCallbacks() {
      const callbackSessions = sessions.filter(s => s.type === 'callback');
      if (callbackSessions.length && !callbackSessions.some(s => s.id === activeSessionId)) activeSessionId = callbackSessions[0].id;
      const rows = applicants.map(app => `
        <div class="callback-row">
          <div>
            <div class="callback-name">${esc(app.name || 'Performer')}</div>
          </div>
          <div>
            ${noteThread(app.id, 'callback_list')}
            ${noteComposer(app.id, 'callback_list', `callback-note-${esc(app.id)}`)}
          </div>
        </div>`).join('');
      document.getElementById('team-content').innerHTML = `${sessionStrip()}<div class="callback-list">${rows || '<div class="empty">No performers yet.</div>'}</div>`;
    }
    function noteTypeLabelFor(type) {
      return NOTE_TYPES.find(t => t.value === type)?.label || '';
    }
    function noteThread(appId, area, characterId = null) {
      const rows = notes.filter(n => n.applicant_id === appId && n.note_area === area && (!activeSessionId || n.session_id === activeSessionId) && (!characterId || n.character_id === characterId));
      if (!rows.length) return '<div class="team-card-sub">No team notes yet.</div>';
      return `<div class="note-thread">${rows.map(n => {
        const typeLabel = noteTypeLabelFor(n.note_type);
        const ratingStars = n.note_rating ? '★'.repeat(n.note_rating) + '☆'.repeat(5 - n.note_rating) : '';
        return `<div class="note-item" style="--note-color:${esc(n.author_color || '#572e88')};"><div class="note-meta">${typeLabel ? `<span class="note-type-badge">${esc(typeLabel)}</span>` : ''}${ratingStars ? `<span class="note-rating-badge">${ratingStars}</span>` : ''}${esc([n.author_name,n.author_role].filter(Boolean).join(' · '))}</div><div class="note-body">${esc(n.body)}</div></div>`;
      }).join('')}</div>`;
    }
    function renderRoomMain(app) {
      return `<div class="room-main">
        <div class="card-face">${cardHtml(app)}</div>
        <div class="notes-panel">
          <div class="notes-title">Team Notes</div>
          ${noteThread(app.id, 'in_room')}
          <div class="compose">
            <textarea class="form-textarea" id="team-note-body" placeholder="Write what you noticed. Everyone on the team will see this."></textarea>
            <button class="btn-primary" onclick="addTeamNote('${esc(app.id)}','in_room','team-note-body')">Add Note</button>
          </div>
        </div>
      </div>`;
    }
    async function addTeamNote(appId, area = 'in_room', textareaId = 'team-note-body') {
      const ta = document.getElementById(textareaId);
      const body = ta?.value?.trim();
      if (!body) return;
      const { data, error } = await sb.rpc('team_note_add', {
        p_production_id: prodId,
        p_email: teamEmail,
        p_passcode: passcode,
        p_applicant_id: appId,
        p_session_id: activeSessionId || null,
        p_character_id: null,
        p_note_area: area,
        p_body: body,
        p_note_type: activeNoteType || 'general',
        p_note_rating: activeNoteRating || null
      });
      if (error) { alert('Could not save note: ' + error.message); return; }
      if (data) notes.push(...(Array.isArray(data) ? data : [data]));
      if (ta) ta.value = '';
      if (activeTab === 'callbacks') renderCallbacks();
      else renderInRoom();
    }
    // Simplify login when the private link already carries the email
    (function initLogin() {
      const emailInput = document.getElementById('team-email');
      const passcodeInput = document.getElementById('team-passcode');
      const heading = document.querySelector('.team-login-body h1');
      const subtext = document.querySelector('.team-login-body p');
      if (teamEmail && emailInput) {
        emailInput.closest('.login-email-wrap') && (emailInput.closest('.login-email-wrap').style.display = 'none');
        emailInput.style.display = 'none';
        if (heading) heading.textContent = 'Enter your access code';
        if (subtext) subtext.innerHTML = `You've been invited to this production. Enter your 6-digit code to get in.`;
      }
      if (emailInput) emailInput.value = teamEmail;
      if (passcodeInput) passcodeInput.value = passcode;
      if (passcode && teamEmail) loginTeam();
    })();
  </script>
</body>
</html>
