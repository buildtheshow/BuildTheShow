<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Dashboard - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; min-height: 100vh; min-height: 100dvh; background: #ffffff; font-family: var(--bts-font); color: #1a1530; }
    body.mobile-sidebar-open { overflow: hidden; }
    .mkt-shell {
      margin-left: 220px;
      min-height: 100vh; min-height: 100dvh;
      position: relative;
      padding: 2.25rem;
    }
    .mkt-shell::before {
      content: '';
      position: fixed;
      inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }
    .mkt-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
    .mkt-page-header { margin-bottom: 2rem; }
    .mkt-page-kicker { font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #9a90b0; margin-bottom: 0.35rem; }
    .mkt-page-title { font-size: 1.9rem; font-weight: 900; color: #1a1530; line-height: 1.1; margin: 0 0 0.35rem; }
    .mkt-page-subtitle { font-size: 0.95rem; color: #6a5a80; line-height: 1.5; margin: 0; }
    .mkt-card { background: #ffffff; border: 1px solid rgba(87,46,136,0.1); border-radius: 20px; padding: 2rem; box-shadow: 0 4px 24px rgba(87,46,136,0.06); }
    .mkt-coming-soon { text-align: center; padding: 4rem 2rem; color: #9a90b0; }
    .mkt-coming-soon h3 { font-size: 1.05rem; font-weight: 800; color: #4a3d6b; margin: 0 0 0.6rem; }
    .mkt-coming-soon p { font-size: 0.9rem; line-height: 1.6; max-width: 42ch; margin: 0 auto; }
    @media (max-width: 900px) {
      .mkt-shell { margin-left: 0; padding: 4rem 1.25rem 1.25rem; }
      .mkt-shell::before { inset: 0; }
      .prod-sidebar { display: none; }
    }
    @media (max-width: 600px) { .mkt-shell { padding: 4rem 1rem 1rem; } }
  </style>
</head>
<body>

  <div id="prod-sidebar-host"></div>

  <div class="mkt-shell">
    <div class="mkt-inner">
      <header class="mkt-page-header">
        <div class="mkt-page-kicker" id="mkt-prod-kicker">Marketing</div>
        <h1 class="mkt-page-title">Dashboard</h1>
        <p class="mkt-page-subtitle">At-a-glance view of your marketing activity and upcoming deadlines</p>
      </header>
      <div class="mkt-card">
        <div class="mkt-coming-soon">
          <h3>Marketing dashboard coming soon</h3>
          <p>An overview of your marketing activity, upcoming deadlines, and asset status across the whole production.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDc4NTI4NTYsImV4cCI6MjAyMzQyODg1Nn0.tVxOMkaMdBnuqQbLdHl00h4WA7DV8LHuVxCt6z5LFCY';

    function navigateToMarketing(section) {
      const id = new URLSearchParams(location.search).get('id');
      const page = 'marketing-' + (section || 'dashboard');
      window.location.href = '/SYSTEM/Organisations/Productions/Workspace/' + page + '.html' + (id ? '?id=' + encodeURIComponent(id) : '');
    }
    function navigateToWorkspace(tab, sub) {
      const id = new URLSearchParams(location.search).get('id');
      const base = '/SYSTEM/Organisations/Productions/Workspace/production-workspace.html';
      const params = new URLSearchParams();
      if (id) params.set('id', id);
      if (tab) params.set('tab', tab);
      if (sub) params.set('subtab', sub);
      window.location.href = base + '?' + params.toString();
    }
    function switchProdTab(tab) { navigateToWorkspace(tab); }
    function openAuditionsSubTab(sub) { navigateToWorkspace('auditions', sub); }
    function openRegistrationSubTab(sub) { navigateToWorkspace('registration', sub); }
    function toggleAuditionsMenu(e) { e.stopPropagation(); document.getElementById('auditions-wrap')?.classList.toggle('open'); }
    function toggleRegistrationMenu(e) { e.stopPropagation(); document.getElementById('registration-wrap')?.classList.toggle('open'); }
    function toggleMarketingMenu(e) { e.stopPropagation(); document.getElementById('marketing-wrap')?.classList.toggle('open'); }
    function handleSidebarChevronKey(e, section) {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      e.preventDefault();
      if (section === 'auditions') toggleAuditionsMenu(e);
      else if (section === 'registration') toggleRegistrationMenu(e);
      else if (section === 'marketing') toggleMarketingMenu(e);
    }
    function toggleMobileSidebar() {
      document.body.classList.toggle('mobile-sidebar-open');
      document.getElementById('mobile-nav-toggle')?.setAttribute('aria-expanded', document.body.classList.contains('mobile-sidebar-open'));
    }
    function closeMobileSidebar() {
      document.body.classList.remove('mobile-sidebar-open');
      document.getElementById('mobile-nav-toggle')?.setAttribute('aria-expanded', 'false');
    }

    fetch('/SHARED/Navigation/production-sidebar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('prod-sidebar-host').innerHTML = html;
        document.getElementById('marketing-wrap')?.classList.add('open');
        document.getElementById('marketing-parent-tab')?.classList.add('is-open-parent');
        document.getElementById('msub-dashboard')?.classList.add('active');
      })
      .catch(() => {});

    (async function loadProductionContext() {
      const prodId = new URLSearchParams(location.search).get('id');
      if (!prodId) return;
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/productions?id=eq.${encodeURIComponent(prodId)}&select=title,org_id`,
          { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
        );
        const data = await res.json();
        if (data?.[0]?.title) {
          const title = data[0].title;
          document.title = title + ' — Dashboard — Marketing';
          document.getElementById('mkt-prod-kicker').textContent = title + ' / Marketing';
          const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
          set('hdr-title', title);
          set('hdr-mobile-title', title);
          const orgHref = data[0].org_id
            ? `/SYSTEM/Organisations/org-dashboard.html?id=${encodeURIComponent(data[0].org_id)}`
            : '/SYSTEM/Organisations/org-dashboard.html';
          ['sidebar-org-back', 'sidebar-mobile-org-back'].forEach(id => { const el = document.getElementById(id); if (el) el.href = orgHref; });
        }
      } catch {}
    })();
  </script>

  <script defer src="/SHARED/Components/legal-footer.js"></script>
</body>
</html>
