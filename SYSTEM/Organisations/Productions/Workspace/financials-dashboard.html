<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Dashboard - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v47-20260610" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #f5f4f8; font-family: var(--bts-font, 'Inter', sans-serif); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }

    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; display: flex; flex-direction: column; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }

    /* Hero */
    .hero-wrap { padding: 2rem 2.25rem 0; position: relative; z-index: 1; }
    .aud-visual-hero { margin-bottom: 0; overflow: hidden; }
    .hero-deco { position: absolute; right: 0; top: 0; bottom: 0; width: 220px; display: flex; align-items: center; justify-content: flex-end; pointer-events: none; overflow: hidden; }
    .hero-deco img { height: 130px; width: auto; object-fit: contain; opacity: 0.15; filter: brightness(0) invert(1); }
    .page-hierarchy { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 0.4rem; color: rgba(255,255,255,0.88); font-size: 0.78rem; }
    .page-hierarchy-page { color: #efab45; font-weight: 950; letter-spacing: 0.08em; text-transform: uppercase; }
    .page-hierarchy-sep, .page-hierarchy-sub { color: rgba(255,255,255,0.82); font-weight: 500; }
    .page-subtitle { margin: 0.35rem 0 0; color: #fff; font-size: clamp(2.1rem, 4.6vw, 3.7rem); line-height: 0.98; font-weight: 950; }

    /* Content */
    .dash-content { flex: 1; padding: 1.5rem 2.25rem 2.5rem; position: relative; z-index: 1; }

    /* Grid */
    .fd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem; }

    /* Cards */
    .fd-card { border-radius: 18px; padding: 1.5rem 1.6rem; background: #fff; border: 1px solid rgba(87,46,136,0.09); box-shadow: 0 2px 12px rgba(87,46,136,0.06); }

    /* ── Budget Remaining ─────────────────────────────────────────────────── */
    .fd-budget { background: linear-gradient(145deg, #edf7ef 0%, #d6f0da 100%); border-color: rgba(118,158,123,0.25); position: relative; overflow: hidden; }
    .fd-budget-inner { display: flex; gap: 1.1rem; align-items: flex-start; }
    .fd-budget-icon { width: 58px; height: 58px; border-radius: 50%; background: rgba(118,158,123,0.18); display: flex; align-items: center; justify-content: center; font-size: 1.55rem; flex: 0 0 auto; }
    .fd-budget-label { font-size: 0.8rem; font-weight: 900; color: #4a7a55; letter-spacing: 0.04em; margin-bottom: 0.15rem; }
    .fd-budget-val { font-size: 2.8rem; font-weight: 950; color: #2e6038; line-height: 1; margin-bottom: 0.55rem; }
    .fd-budget-tag { display: inline-flex; align-items: center; gap: 0.35rem; background: rgba(46,96,56,0.12); color: #2e6038; font-size: 0.76rem; font-weight: 900; border-radius: 999px; padding: 0.28rem 0.65rem; }
    .fd-budget-tag--warn { background: rgba(221,130,51,0.14); color: #884a00; }
    .fd-budget-tag--over  { background: rgba(209,82,61,0.12); color: #8a1a0a; }
    .fd-budget-wave { position: absolute; bottom: 0; left: 0; right: 0; height: 38px; opacity: 0.25; }

    /* ── Needs Attention ──────────────────────────────────────────────────── */
    .fd-attn { background: linear-gradient(145deg, #fdf9ee 0%, #fef3d0 100%); border-color: rgba(221,130,51,0.22); }
    .fd-attn-inner { display: flex; gap: 1.1rem; align-items: flex-start; }
    .fd-attn-icon { width: 54px; height: 54px; border-radius: 50%; background: #efab45; display: flex; align-items: center; justify-content: center; font-size: 1.35rem; flex: 0 0 auto; color: #fff; font-weight: 900; }
    .fd-attn-title { font-size: 1rem; font-weight: 950; color: #1a1530; margin-bottom: 0.65rem; }
    .fd-attn-rows { display: flex; flex-direction: column; gap: 0.45rem; }
    .fd-attn-row { display: flex; align-items: center; gap: 0.6rem; }
    .fd-attn-num { font-size: 1.4rem; font-weight: 950; min-width: 1.5rem; text-align: right; line-height: 1; }
    .fd-attn-num--red    { color: #d1523d; }
    .fd-attn-num--orange { color: #dd8233; }
    .fd-attn-num--purple { color: #572e88; }
    .fd-attn-num--green  { color: #769e7b; }
    .fd-attn-desc { font-size: 0.88rem; font-weight: 700; color: #2a2040; }
    .fd-attn-link { margin-left: auto; color: #dd8233; font-size: 0.9rem; cursor: pointer; opacity: 0.7; flex-shrink: 0; }
    .fd-attn-empty { font-size: 0.88rem; font-weight: 700; color: #769e7b; }

    /* ── Departments ──────────────────────────────────────────────────────── */
    .fd-depts { background: linear-gradient(145deg, #fdf0f2 0%, #fde4e8 100%); border-color: rgba(209,82,61,0.18); }
    .fd-depts-inner { display: flex; gap: 1.1rem; align-items: flex-start; }
    .fd-depts-icon { width: 54px; height: 54px; border-radius: 50%; background: #d1523d; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex: 0 0 auto; color: #fff; }
    .fd-depts-title { font-size: 1rem; font-weight: 950; color: #1a1530; margin-bottom: 0.65rem; }
    .fd-dept-rows { display: flex; flex-direction: column; gap: 0; }
    .fd-dept-row { display: flex; align-items: center; gap: 0.7rem; padding: 0.55rem 0; border-bottom: 1px solid rgba(209,82,61,0.1); cursor: pointer; transition: background 0.1s; border-radius: 6px; padding-left: 0.3rem; padding-right: 0.3rem; }
    .fd-dept-row:last-child { border-bottom: none; }
    .fd-dept-row:hover { background: rgba(209,82,61,0.05); }
    .fd-dept-row-icon { font-size: 1.2rem; flex: 0 0 24px; text-align: center; }
    .fd-dept-row-name { font-size: 0.88rem; font-weight: 800; color: #1a1530; flex: 1; }
    .fd-dept-row-status { font-size: 0.8rem; font-weight: 800; }
    .fd-dept-row-status--red    { color: #d1523d; }
    .fd-dept-row-status--orange { color: #dd8233; }
    .fd-dept-row-status--green  { color: #769e7b; }
    .fd-depts-footer { margin-top: 0.9rem; }
    .fd-depts-link { background: none; border: none; font-family: inherit; font-size: 0.86rem; font-weight: 800; color: #572e88; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 0.35rem; }
    .fd-depts-link:hover { opacity: 0.75; }

    /* ── Recent Activity ──────────────────────────────────────────────────── */
    .fd-activity { background: linear-gradient(145deg, #f3f1fa 0%, #e9e5f4 100%); border-color: rgba(87,46,136,0.18); }
    .fd-activity-inner { display: flex; gap: 1.1rem; align-items: flex-start; }
    .fd-activity-icon { width: 54px; height: 54px; border-radius: 50%; background: #572e88; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex: 0 0 auto; color: #fff; }
    .fd-activity-title { font-size: 1rem; font-weight: 950; color: #1a1530; margin-bottom: 0.65rem; }
    .fd-act-rows { display: flex; flex-direction: column; gap: 0; }
    .fd-act-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid rgba(87,46,136,0.08); }
    .fd-act-row:last-child { border-bottom: none; }
    .fd-act-bullet { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex: 0 0 30px; }
    .fd-act-bullet--green  { background: rgba(118,158,123,0.18); }
    .fd-act-bullet--pink   { background: rgba(202,126,167,0.18); }
    .fd-act-bullet--orange { background: rgba(221,130,51,0.18); }
    .fd-act-bullet--blue   { background: rgba(120,187,212,0.2); }
    .fd-act-bullet--purple { background: rgba(87,46,136,0.12); }
    .fd-act-text { font-size: 0.84rem; font-weight: 700; color: #2a2040; flex: 1; }
    .fd-act-when { font-size: 0.72rem; font-weight: 700; color: #b0a8c8; white-space: nowrap; }
    .fd-activity-footer { margin-top: 0.9rem; }
    .fd-activity-link { background: none; border: none; font-family: inherit; font-size: 0.86rem; font-weight: 800; color: #572e88; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 0.35rem; }
    .fd-activity-link:hover { opacity: 0.75; }
    .fd-act-empty { font-size: 0.86rem; color: #b0a8c8; font-style: italic; font-weight: 600; padding: 0.5rem 0; }

    /* Responsive */
    @media (max-width: 900px) { .prod-main { margin-left: 0; max-width: 100vw; } .prod-main::before { inset: 0; } .hero-wrap { padding: 4.5rem 1rem 0; } .dash-content { padding: 1.25rem 1rem 2rem; } .fd-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="hero-wrap">
      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy">
                <span class="page-hierarchy-page">Financials</span>
                <span class="page-hierarchy-sep">-</span>
                <span class="page-hierarchy-sub">Dashboard</span>
              </span>
            </div>
            <h1 class="page-subtitle">Dashboard</h1>
          </div>
        </div>
        <div class="hero-deco"><img src="/ASSETS/Images/Finance - Schedule.svg" alt="" /></div>
      </div>
    </div>

    <div class="dash-content">
      <div class="fd-grid">

        <!-- Budget Remaining -->
        <div class="fd-card fd-budget">
          <div class="fd-budget-inner">
            <div class="fd-budget-icon">&#128181;</div>
            <div>
              <div class="fd-budget-label">Budget Remaining</div>
              <div class="fd-budget-val" id="fd-remaining">--</div>
              <div id="fd-status-tag" class="fd-budget-tag">&#10003; On Track</div>
            </div>
          </div>
          <svg class="fd-budget-wave" viewBox="0 0 400 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,20 Q50,5 100,20 T200,20 T300,20 T400,20 L400,40 L0,40 Z" fill="#769e7b"/>
          </svg>
        </div>

        <!-- Needs Attention -->
        <div class="fd-card fd-attn">
          <div class="fd-attn-inner">
            <div class="fd-attn-icon">&#9888;</div>
            <div style="flex:1;min-width:0">
              <div class="fd-attn-title">Needs Attention</div>
              <div class="fd-attn-rows" id="fd-attn-rows">
                <div style="color:#9a90b0;font-size:0.86rem">Loading...</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Departments Needing Attention -->
        <div class="fd-card fd-depts">
          <div class="fd-depts-inner">
            <div class="fd-depts-icon">&#9888;</div>
            <div style="flex:1;min-width:0">
              <div class="fd-depts-title">Departments Needing Attention</div>
              <div class="fd-dept-rows" id="fd-dept-rows">
                <div style="color:#9a90b0;font-size:0.86rem">Loading...</div>
              </div>
              <div class="fd-depts-footer">
                <button class="fd-depts-link" onclick="FD.goTo('budgeting')">Go to budgeting &#8594;</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Recent Activity -->
        <div class="fd-card fd-activity">
          <div class="fd-activity-inner">
            <div class="fd-activity-icon">&#128336;</div>
            <div style="flex:1;min-width:0">
              <div class="fd-activity-title">Recent Activity</div>
              <div class="fd-act-rows" id="fd-act-rows">
                <div style="color:#9a90b0;font-size:0.86rem">Loading...</div>
              </div>
              <div class="fd-activity-footer">
                <button class="fd-activity-link" onclick="FD.goTo('receipts')">View all activity &#8594;</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=14"></script>
  <script>
  'use strict';

  const FD = {
    URL: 'https://tkmaiktxpwqfbgeojbnf.supabase.co',
    KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDc4NTI4NTYsImV4cCI6MjAyMzQyODg1Nn0.tVxOMkaMdBnuqQbLdHl00h4WA7DV8LHuVxCt6z5LFCY',

    DEPT_ICONS: {
      costume: '&#128248;', dress: '&#128248;',
      set: '&#128296;', construct: '&#128296;', scenery: '&#128296;',
      prop: '&#127897;',
      market: '&#128226;', promot: '&#128226;',
      music: '&#127925;', sound: '&#127925;',
      hair: '&#9988;', makeup: '&#128132;',
      light: '&#128161;', technical: '&#127916;',
      transport: '&#128656;', venue: '&#127980;',
      hospitality: '&#127829;',
    },

    prodId: '',
    cats: [],
    items: [],
    receipts: [],

    init() {
      this.prodId = new URLSearchParams(location.search).get('id') || '';
      if (!this.prodId) return;
      this.load();
    },

    _h() { return { apikey: this.KEY, Authorization: 'Bearer ' + this.KEY }; },

    async load() {
      try {
        const [cRes, iRes, rRes] = await Promise.all([
          fetch(this.URL + '/rest/v1/budget_categories?production_id=eq.' + this.prodId + '&order=sort_order.asc,created_at.asc', { headers: this._h() }),
          fetch(this.URL + '/rest/v1/budget_items?production_id=eq.' + this.prodId, { headers: this._h() }),
          fetch(this.URL + '/rest/v1/budget_receipts?production_id=eq.' + this.prodId + '&order=created_at.desc&limit=20', { headers: this._h() }),
        ]);
        this.cats     = cRes.ok ? await cRes.json() : [];
        this.items    = iRes.ok ? await iRes.json() : [];
        this.receipts = rRes.ok ? await rRes.json() : [];
      } catch(_) {}
      this.render();
    },

    render() {
      this.renderBudget();
      this.renderAttention();
      this.renderDepts();
      this.renderActivity();
    },

    renderBudget() {
      const expCats   = this.cats.filter(c => c.type === 'expense');
      const incomeCats= this.cats.filter(c => c.type === 'income');
      const totalBudget   = expCats.reduce((a, c) => a + (c.planned_cents || 0), 0);
      const totalCommitted= this.items.filter(i => { const c = this.cats.find(x => x.id === i.category_id); return c && c.type === 'expense'; }).reduce((a, i) => a + (i.committed_cents || 0), 0);
      const totalIncome   = incomeCats.reduce((a, c) => a + (c.planned_cents || 0), 0);
      const remaining     = totalBudget - totalCommitted;
      const pct           = totalBudget > 0 ? totalCommitted / totalBudget : 0;

      const valEl = document.getElementById('fd-remaining');
      const tagEl = document.getElementById('fd-status-tag');
      if (valEl) valEl.textContent = this.fmt$(remaining);
      if (tagEl) {
        if (remaining < 0) {
          tagEl.textContent = '! Over Budget';
          tagEl.className = 'fd-budget-tag fd-budget-tag--over';
          valEl && (valEl.style.color = '#d1523d');
        } else if (pct >= 0.85) {
          tagEl.textContent = '! Running Low';
          tagEl.className = 'fd-budget-tag fd-budget-tag--warn';
          valEl && (valEl.style.color = '#884a00');
        } else {
          tagEl.textContent = '✓ On Track';
          tagEl.className = 'fd-budget-tag';
        }
      }
    },

    renderAttention() {
      const el = document.getElementById('fd-attn-rows');
      if (!el) return;

      const pendingReceipts = this.receipts.filter(r => r.status === 'pending').length;
      const overBudgetCats  = this.cats.filter(c => {
        if (c.type !== 'expense') return false;
        const committed = this.items.filter(i => i.category_id === c.id).reduce((a, i) => a + (i.committed_cents || 0), 0);
        return committed > (c.planned_cents || 0) && c.planned_cents > 0;
      }).length;
      const approvedNotPaid = this.receipts.filter(r => r.status === 'approved').length;

      const rows = [];
      if (pendingReceipts > 0) rows.push({ num: pendingReceipts, cls: 'red',    label: 'Receipt' + (pendingReceipts !== 1 ? 's' : '') + ' awaiting approval', href: 'receipts' });
      if (approvedNotPaid > 0) rows.push({ num: approvedNotPaid, cls: 'orange', label: 'Approved receipt' + (approvedNotPaid !== 1 ? 's' : '') + ' not yet paid', href: 'receipts' });
      if (overBudgetCats  > 0) rows.push({ num: overBudgetCats,  cls: 'purple', label: 'Budget categor' + (overBudgetCats !== 1 ? 'ies' : 'y') + ' over budget', href: 'budgeting' });

      if (!rows.length) {
        el.innerHTML = '<div class="fd-attn-empty">&#10003; Everything looks good right now.</div>';
        return;
      }

      el.innerHTML = rows.map(r =>
        '<div class="fd-attn-row">' +
          '<span class="fd-attn-num fd-attn-num--' + r.cls + '">' + r.num + '</span>' +
          '<span class="fd-attn-desc">' + r.label + '</span>' +
          '<span class="fd-attn-link" onclick="FD.goTo(\'' + r.href + '\')">&#8250;</span>' +
        '</div>'
      ).join('');
    },

    renderDepts() {
      const el = document.getElementById('fd-dept-rows');
      if (!el) return;
      const expCats = this.cats.filter(c => c.type === 'expense');
      if (!expCats.length) {
        el.innerHTML = '<div style="font-size:0.86rem;color:#b0a8c8;font-style:italic">No expense categories set up yet.</div>';
        return;
      }

      el.innerHTML = expCats.map(c => {
        const committed  = this.items.filter(i => i.category_id === c.id).reduce((a, i) => a + (i.committed_cents || 0), 0);
        const isOverBudget = c.planned_cents > 0 && committed > c.planned_cents;
        const pendingRecs  = this.receipts.filter(r => r.category_id === c.id && r.status === 'pending').length;
        const icon = this._deptIcon(c.name);

        let statusLabel, statusCls, href;
        if (pendingRecs > 0) {
          statusLabel = pendingRecs + ' pending receipt' + (pendingRecs !== 1 ? 's' : '');
          statusCls = 'fd-dept-row-status--red';
          href = 'receipts';
        } else if (isOverBudget) {
          statusLabel = 'Over budget';
          statusCls = 'fd-dept-row-status--orange';
          href = 'budgeting';
        } else {
          statusLabel = 'Good';
          statusCls = 'fd-dept-row-status--green';
          href = 'budgeting';
        }

        return (
          '<div class="fd-dept-row" onclick="FD.goTo(\'' + href + '\')">' +
            '<span class="fd-dept-row-icon">' + icon + '</span>' +
            '<span class="fd-dept-row-name">' + this.esc(c.name) + '</span>' +
            '<span class="fd-dept-row-status ' + statusCls + '">' + statusLabel + '</span>' +
          '</div>'
        );
      }).join('');
    },

    renderActivity() {
      const el = document.getElementById('fd-act-rows');
      if (!el) return;

      const events = [];

      // Build activity from receipts (most recent first, up to 5)
      this.receipts.slice(0, 8).forEach(r => {
        const when = this._relTime(r.created_at);
        const cat  = this.cats.find(c => c.id === r.category_id);
        const dept = cat ? cat.name : 'a department';

        if (r.status === 'paid' && r.paid_at) {
          events.push({ icon: '&#128181;', cls: 'pink', text: this.esc(dept) + ' reimbursement paid', when, ts: new Date(r.paid_at).getTime() });
        } else if (r.status === 'approved' && r.approved_at) {
          events.push({ icon: '&#10003;', cls: 'green', text: 'Receipt approved in ' + this.esc(dept), when, ts: new Date(r.approved_at).getTime() });
        } else if (r.status === 'pending') {
          const by = r.submitted_by ? r.submitted_by.split(' ')[0] + (r.submitted_by.split(' ')[1] ? ' ' + r.submitted_by.split(' ')[1][0] + '.' : '') : 'Someone';
          events.push({ icon: '&#128228;', cls: 'orange', text: this.esc(by) + ' submitted a receipt (' + this.esc(dept) + ')', when, ts: new Date(r.created_at).getTime() });
        }
      });

      events.sort((a, b) => b.ts - a.ts);
      const shown = events.slice(0, 5);

      if (!shown.length) {
        el.innerHTML = '<div class="fd-act-empty">No recent activity yet.</div>';
        return;
      }

      const bulletCls = { green: 'fd-act-bullet--green', pink: 'fd-act-bullet--pink', orange: 'fd-act-bullet--orange', blue: 'fd-act-bullet--blue', purple: 'fd-act-bullet--purple' };

      el.innerHTML = shown.map(e =>
        '<div class="fd-act-row">' +
          '<div class="fd-act-bullet ' + (bulletCls[e.cls] || '') + '">' + e.icon + '</div>' +
          '<div class="fd-act-text">' + e.text + '</div>' +
          '<div class="fd-act-when">' + e.when + '</div>' +
        '</div>'
      ).join('');
    },

    // Helpers ──────────────────────────────────────────────────────────────
    goTo(page) {
      const map = { budgeting: 'budgeting.html', receipts: 'budget-receipts.html' };
      const file = map[page] || page;
      location.href = '/SYSTEM/Organisations/Productions/Workspace/' + file + '?id=' + encodeURIComponent(this.prodId);
    },

    _deptIcon(name) {
      const n = (name || '').toLowerCase();
      for (const [key, icon] of Object.entries(this.DEPT_ICONS)) {
        if (n.includes(key)) return icon;
      }
      return '&#128193;';
    },

    fmt$(cents) {
      if (cents == null) return '$0';
      const abs = Math.abs(cents) / 100;
      return (cents < 0 ? '-' : '') + '$' + abs.toLocaleString('en-CA', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    },

    esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; },

    _relTime(ts) {
      if (!ts) return '';
      const diff = Date.now() - new Date(ts).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 60)  return m < 2 ? 'just now' : m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24)  return h + 'h ago';
      const d = Math.floor(h / 24);
      if (d < 7)   return d + 'd ago';
      return Math.floor(d / 7) + 'w ago';
    },
  };

  window.initProductionPage('financials');
  FD.init();
  </script>
</body>
</html>
