<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financials Dashboard - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v48-20260617" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #f5f4f8; font-family: var(--bts-font, 'Inter', sans-serif); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; display: flex; flex-direction: column; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }

    /* Hero */
    .hero-deco { position: absolute; right: 0; top: 0; bottom: 0; width: 180px; display: flex; align-items: center; justify-content: flex-end; pointer-events: none; overflow: hidden; }
    .hero-deco img { height: 120px; width: auto; object-fit: contain; opacity: 0.12; filter: brightness(0) invert(1); }

    /* Content */
    .fd-content { flex: 1; padding: 1.5rem 2.25rem 2.5rem; position: relative; z-index: 1; }

    /* Section label */
    .fd-section-label { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(87,46,136,0.55); margin-bottom: 0.85rem; }

    /* ── Overview 3-stat row ── */
    .fd-overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
    .fd-ov-card { background: #fff; border: 1px solid rgba(87,46,136,0.08); border-radius: 16px; padding: 1.4rem 1.6rem; display: flex; align-items: center; gap: 1.1rem; box-shadow: 0 1px 6px rgba(87,46,136,0.05); }
    .fd-ov-icon { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .fd-ov-icon--income   { background: #e8f5ec; }
    .fd-ov-icon--expenses { background: #fde8e5; }
    .fd-ov-icon--net      { background: #f0ecfc; }
    .fd-ov-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(26,21,48,0.45); margin-bottom: 0.3rem; }
    .fd-ov-val { font-size: 1.75rem; font-weight: 950; line-height: 1; }
    .fd-ov-val--income   { color: #2e6639; }
    .fd-ov-val--expenses { color: #c0312b; }
    .fd-ov-val--net      { color: #572e88; }

    /* ── Mid grid: chart + budget status ── */
    .fd-mid-grid { display: grid; grid-template-columns: 1fr 320px; gap: 1.25rem; margin-bottom: 1.25rem; align-items: start; }
    .fd-card { background: #fff; border: 1px solid rgba(87,46,136,0.08); border-radius: 16px; box-shadow: 0 1px 6px rgba(87,46,136,0.05); }
    .fd-card-head { padding: 1.25rem 1.6rem 0; }
    .fd-card-title { font-size: 0.88rem; font-weight: 800; color: #1a1530; text-transform: uppercase; letter-spacing: 0.06em; }
    .fd-chart-wrap { padding: 1rem 1.4rem 1.25rem; }

    /* Budget Status */
    .fd-budget-status { padding: 1.25rem 1.6rem 1.5rem; }
    .fd-budget-empty { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 1.5rem 0.5rem; gap: 0.75rem; }
    .fd-budget-empty-icon { width: 60px; height: 60px; border-radius: 50%; background: #f0ecfc; display: flex; align-items: center; justify-content: center; }
    .fd-budget-empty-title { font-size: 0.95rem; font-weight: 800; color: #1a1530; margin: 0; }
    .fd-budget-empty-copy { font-size: 0.8rem; color: rgba(26,21,48,0.5); line-height: 1.5; margin: 0; max-width: 220px; }
    .fd-create-btn { display: inline-flex; align-items: center; gap: 0.4rem; background: #572e88; color: #fff; border: none; border-radius: 10px; padding: 0.6rem 1.2rem; font-size: 0.84rem; font-weight: 800; cursor: pointer; font-family: inherit; margin-top: 0.25rem; }
    .fd-create-btn:hover { background: #3e1f6b; }

    /* Budget summary (when exists) */
    .fd-bgt-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.5rem 0; border-bottom: 1px solid rgba(87,46,136,0.06); font-size: 0.84rem; }
    .fd-bgt-row:last-child { border-bottom: none; }
    .fd-bgt-key { color: rgba(26,21,48,0.6); font-weight: 600; }
    .fd-bgt-val { font-weight: 800; color: #1a1530; }
    .fd-bgt-val--green { color: #2e6639; }
    .fd-bgt-val--red   { color: #c0312b; }
    .fd-progress-track { height: 6px; background: #edeaf6; border-radius: 99px; overflow: hidden; margin: 0.75rem 0 0.35rem; }
    .fd-progress-fill  { height: 6px; border-radius: 99px; background: #769e7b; transition: width 0.4s; }
    .fd-progress-fill--warn { background: #dd8233; }
    .fd-progress-fill--over { background: #d1523d; }
    .fd-progress-pct   { font-size: 0.7rem; color: rgba(26,21,48,0.45); }

    /* ── Recent Activity ── */
    .fd-activity-card { padding: 1.25rem 1.6rem 1.5rem; }
    .fd-act-rows { display: flex; flex-direction: column; }
    .fd-act-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0; border-bottom: 1px solid rgba(87,46,136,0.06); }
    .fd-act-row:last-child { border-bottom: none; }
    .fd-act-bullet { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .fd-act-bullet--green  { background: rgba(118,158,123,0.15); }
    .fd-act-bullet--pink   { background: rgba(202,126,167,0.15); }
    .fd-act-bullet--orange { background: rgba(221,130,51,0.15); }
    .fd-act-text { font-size: 0.84rem; font-weight: 700; color: #2a2040; flex: 1; }
    .fd-act-when { font-size: 0.72rem; font-weight: 600; color: #b0a8c8; white-space: nowrap; }
    .fd-act-empty { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 2rem 1rem; gap: 0.6rem; }
    .fd-act-empty-icon { width: 48px; height: 48px; border-radius: 50%; background: #f0ecfc; display: flex; align-items: center; justify-content: center; }
    .fd-act-empty-title { font-size: 0.9rem; font-weight: 800; color: #1a1530; margin: 0; }
    .fd-act-empty-copy  { font-size: 0.78rem; color: rgba(26,21,48,0.45); margin: 0; max-width: 280px; }
    .fd-act-footer { margin-top: 0.85rem; }
    .fd-act-link { background: none; border: none; font-family: inherit; font-size: 0.84rem; font-weight: 800; color: #572e88; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 0.3rem; }
    .fd-act-link:hover { opacity: 0.7; }

    /* ── Attention rows in budget status ── */
    .fd-attn-rows { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.75rem; }
    .fd-attn-row { display: flex; align-items: center; gap: 0.6rem; }
    .fd-attn-num { font-size: 1.3rem; font-weight: 950; min-width: 1.4rem; text-align: right; line-height: 1; }
    .fd-attn-num--red    { color: #d1523d; }
    .fd-attn-num--orange { color: #dd8233; }
    .fd-attn-num--purple { color: #572e88; }
    .fd-attn-desc { font-size: 0.82rem; font-weight: 700; color: #2a2040; flex: 1; }
    .fd-attn-link { color: #dd8233; font-size: 1rem; cursor: pointer; opacity: 0.7; flex-shrink: 0; }

    @media (max-width: 1100px) { .fd-mid-grid { grid-template-columns: 1fr; } }
    @media (max-width: 860px) {
      .prod-main { margin-left: 0; max-width: 100vw; }
      .prod-main::before { inset: 0; }
      .fd-content { padding: 1.25rem 1rem 2rem; }
      .fd-overview { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">

    <!-- Hero -->
    <div class="hero-wrap" style="padding:2rem 2.25rem 0;position:relative;z-index:1">
      <div class="aud-visual-hero" style="margin-bottom:0;overflow:hidden">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy" style="display:inline-flex;align-items:center;flex-wrap:wrap;gap:0.4rem;color:rgba(255,255,255,0.88);font-size:0.78rem">
                <span style="color:#efab45;font-weight:950;letter-spacing:0.08em;text-transform:uppercase">Financials</span>
                <span style="color:rgba(255,255,255,0.7)">-</span>
                <span style="color:rgba(255,255,255,0.82);font-weight:500">Dashboard</span>
              </span>
            </div>
            <h1 class="aud-visual-title">Financials</h1>
          </div>
        </div>
        <div class="hero-deco"><img src="/ASSETS/Images/Icons/Finance - Schedule.svg" alt="" /></div>
      </div>
    </div>

    <div class="fd-content">

      <!-- Overview -->
      <div class="fd-section-label">Overview</div>
      <div class="fd-overview">
        <div class="fd-ov-card">
          <div class="fd-ov-icon fd-ov-icon--income">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2e6639" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div>
            <div class="fd-ov-label">Total Income</div>
            <div class="fd-ov-val fd-ov-val--income" id="fd-total-income">$0.00</div>
          </div>
        </div>
        <div class="fd-ov-card">
          <div class="fd-ov-icon fd-ov-icon--expenses">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c0312b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
          </div>
          <div>
            <div class="fd-ov-label">Total Expenses</div>
            <div class="fd-ov-val fd-ov-val--expenses" id="fd-total-expenses">$0.00</div>
          </div>
        </div>
        <div class="fd-ov-card">
          <div class="fd-ov-icon fd-ov-icon--net">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#572e88" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="9" x2="19" y2="9"/><line x1="5" y1="15" x2="19" y2="15"/></svg>
          </div>
          <div>
            <div class="fd-ov-label">Net Position</div>
            <div class="fd-ov-val fd-ov-val--net" id="fd-net-position">$0.00</div>
          </div>
        </div>
      </div>

      <!-- Chart + Budget Status -->
      <div class="fd-mid-grid">

        <!-- Income vs Expenses chart -->
        <div class="fd-card">
          <div class="fd-card-head"><div class="fd-card-title">Income vs Expenses</div></div>
          <div class="fd-chart-wrap">
            <canvas id="fd-chart" height="200"></canvas>
          </div>
        </div>

        <!-- Budget Status -->
        <div class="fd-card">
          <div class="fd-card-head"><div class="fd-card-title">Budget Status</div></div>
          <div class="fd-budget-status" id="fd-budget-status">
            <div style="color:#b0a8c8;font-size:0.84rem">Loading...</div>
          </div>
        </div>

      </div>

      <!-- Recent Activity -->
      <div class="fd-card fd-activity-card">
        <div class="fd-card-title" style="margin-bottom:0.85rem">Recent Activity</div>
        <div id="fd-act-rows">
          <div style="color:#b0a8c8;font-size:0.84rem">Loading...</div>
        </div>
        <div class="fd-act-footer" id="fd-act-footer" style="display:none">
          <button class="fd-act-link" onclick="FD.goTo('receipts')">View all activity &#8594;</button>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=23"></script>
  <script>
  'use strict';

  const FD = {
    URL: 'https://tkmaiktxpwqfbgeojbnf.supabase.co',
    KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8',

    prodId: '',
    cats: [],
    items: [],
    receipts: [],
    _chart: null,

    init() {
      this.prodId = new URLSearchParams(location.search).get('id') || '';
      if (!this.prodId) return;
      this.load();
    },

    _h() { return { apikey: this.KEY, Authorization: 'Bearer ' + this.KEY }; },

    async load() {
      try {
        const [cRes, iRes, rRes] = await Promise.all([
          fetch(this.URL + '/rest/v1/budget_categories?production_id=eq.' + this.prodId + '&order=sort_order.asc,created_at.asc', { headers: this._h() }),
          fetch(this.URL + '/rest/v1/budget_items?production_id=eq.' + this.prodId, { headers: this._h() }),
          fetch(this.URL + '/rest/v1/budget_receipts?production_id=eq.' + this.prodId + '&order=created_at.desc&limit=50', { headers: this._h() }),
        ]);
        this.cats     = cRes.ok ? await cRes.json() : [];
        this.items    = iRes.ok ? await iRes.json() : [];
        this.receipts = rRes.ok ? await rRes.json() : [];
      } catch(_) {}
      this.render();
    },

    render() {
      this.renderOverview();
      this.renderChart();
      this.renderBudgetStatus();
      this.renderActivity();
    },

    // ── Overview 3 stats ──────────────────────────────────────────────────
    renderOverview() {
      const expCats    = this.cats.filter(c => c.type === 'expense');
      const incCats    = this.cats.filter(c => c.type === 'income');
      const totalIncome    = incCats.reduce((a, c) => a + (c.planned_cents || 0), 0);
      const totalExpenses  = expCats.reduce((a, c) => {
        const committed = this.items.filter(i => i.category_id === c.id).reduce((s, i) => s + (i.committed_cents || 0), 0);
        return a + committed;
      }, 0);
      const net = totalIncome - totalExpenses;

      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = this.fmt$(val); };
      set('fd-total-income',    totalIncome);
      set('fd-total-expenses',  totalExpenses);
      set('fd-net-position',    net);

      const netEl = document.getElementById('fd-net-position');
      if (netEl) {
        if (net < 0) netEl.style.color = '#c0312b';
        else if (net > 0) netEl.style.color = '#2e6639';
        else netEl.style.color = '#572e88';
      }
    },

    // ── Line chart ────────────────────────────────────────────────────────
    renderChart() {
      const canvas = document.getElementById('fd-chart');
      if (!canvas) return;

      const now = new Date();
      const labels = [];
      const incomeData = [];
      const expData = [];

      const totalIncome = this.cats.filter(c => c.type === 'income').reduce((a, c) => a + (c.planned_cents || 0), 0) / 100;

      for (let i = 5; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        labels.push(d.toLocaleString('en-CA', { month: 'short' }) + ' \'' + String(d.getFullYear()).slice(2));
        incomeData.push(totalIncome / 6);
        const mStart = new Date(d.getFullYear(), d.getMonth(), 1);
        const mEnd   = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59);
        const mExp   = this.receipts
          .filter(r => r.status === 'paid' && r.paid_at)
          .filter(r => { const pd = new Date(r.paid_at); return pd >= mStart && pd <= mEnd; })
          .reduce((a, r) => a + (r.amount_cents || 0), 0) / 100;
        expData.push(mExp);
      }

      if (this._chart) { this._chart.destroy(); }
      this._chart = new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Income',
              data: incomeData,
              borderColor: '#769e7b',
              backgroundColor: 'rgba(118,158,123,0.08)',
              borderWidth: 2.5,
              pointRadius: 4,
              pointBackgroundColor: '#769e7b',
              tension: 0.4,
              fill: false,
            },
            {
              label: 'Expenses',
              data: expData,
              borderColor: '#d1523d',
              backgroundColor: 'rgba(209,82,61,0.08)',
              borderWidth: 2.5,
              pointRadius: 4,
              pointBackgroundColor: '#d1523d',
              tension: 0.4,
              fill: false,
            },
          ],
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                usePointStyle: true,
                pointStyle: 'line',
                font: { size: 11, family: 'inherit', weight: '700' },
                color: '#7a6fa0',
                padding: 18,
              },
            },
            tooltip: {
              callbacks: {
                label: (ctx) => ' ' + ctx.dataset.label + ': ' + this.fmt$(Math.round(ctx.parsed.y * 100)),
              },
            },
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { size: 11, family: 'inherit' }, color: '#b0a8c8' },
              border: { display: false },
            },
            y: {
              grid: { color: 'rgba(87,46,136,0.06)' },
              ticks: {
                font: { size: 11, family: 'inherit' },
                color: '#b0a8c8',
                callback: (v) => '$' + v.toLocaleString('en-CA'),
              },
              border: { display: false },
            },
          },
        },
      });
    },

    // ── Budget Status ─────────────────────────────────────────────────────
    renderBudgetStatus() {
      const el = document.getElementById('fd-budget-status');
      if (!el) return;

      const expCats = this.cats.filter(c => c.type === 'expense');
      const hasBudget = expCats.length > 0;

      if (!hasBudget) {
        el.innerHTML = `
          <div class="fd-budget-empty">
            <div class="fd-budget-empty-icon">
              <img src="/ASSETS/Images/Icons/Budgeting-.svg" alt="" style="width:28px;height:28px;opacity:0.65" />
            </div>
            <p class="fd-budget-empty-title">No budget created yet</p>
            <p class="fd-budget-empty-copy">Create your first budget to start tracking income and expenses for your production.</p>
            <button class="fd-create-btn" onclick="FD.goTo('budgeting')">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              Create Budget
            </button>
          </div>`;
        return;
      }

      const totalPlanned   = expCats.reduce((a, c) => a + (c.planned_cents || 0), 0);
      const totalCommitted = expCats.reduce((a, c) => {
        return a + this.items.filter(i => i.category_id === c.id).reduce((s, i) => s + (i.committed_cents || 0), 0);
      }, 0);
      const remaining = totalPlanned - totalCommitted;
      const pct = totalPlanned > 0 ? Math.min(100, Math.round(totalCommitted / totalPlanned * 100)) : 0;
      const fillCls = pct >= 100 ? 'fd-progress-fill--over' : pct >= 85 ? 'fd-progress-fill--warn' : '';

      // Attention items
      const pendingReceipts = this.receipts.filter(r => r.status === 'pending').length;
      const approvedNotPaid = this.receipts.filter(r => r.status === 'approved').length;
      const overBudgetCats  = expCats.filter(c => {
        const committed = this.items.filter(i => i.category_id === c.id).reduce((s, i) => s + (i.committed_cents || 0), 0);
        return c.planned_cents > 0 && committed > c.planned_cents;
      }).length;

      const attnRows = [];
      if (pendingReceipts > 0) attnRows.push({ num: pendingReceipts, cls: 'red',    label: 'receipt' + (pendingReceipts !== 1 ? 's' : '') + ' awaiting approval', href: 'receipts' });
      if (approvedNotPaid > 0) attnRows.push({ num: approvedNotPaid, cls: 'orange', label: 'approved, not yet paid', href: 'receipts' });
      if (overBudgetCats  > 0) attnRows.push({ num: overBudgetCats,  cls: 'purple', label: 'categor' + (overBudgetCats !== 1 ? 'ies' : 'y') + ' over budget', href: 'budgeting' });

      const attnHtml = attnRows.length
        ? '<div class="fd-attn-rows">' + attnRows.map(r =>
            '<div class="fd-attn-row"><span class="fd-attn-num fd-attn-num--' + r.cls + '">' + r.num + '</span><span class="fd-attn-desc">' + this.esc(r.label) + '</span><span class="fd-attn-link" onclick="FD.goTo(\'' + r.href + '\')">&#8250;</span></div>'
          ).join('') + '</div>'
        : '<div style="font-size:0.82rem;color:#769e7b;font-weight:700;margin-top:0.5rem">Everything looks good.</div>';

      el.innerHTML = `
        <div class="fd-bgt-row"><span class="fd-bgt-key">Total Budget</span><span class="fd-bgt-val">${this.fmt$(totalPlanned)}</span></div>
        <div class="fd-bgt-row"><span class="fd-bgt-key">Committed</span><span class="fd-bgt-val">${this.fmt$(totalCommitted)}</span></div>
        <div class="fd-bgt-row"><span class="fd-bgt-key">Remaining</span><span class="fd-bgt-val ${remaining < 0 ? 'fd-bgt-val--red' : 'fd-bgt-val--green'}">${this.fmt$(remaining)}</span></div>
        <div class="fd-progress-track"><div class="fd-progress-fill ${fillCls}" style="width:${pct}%"></div></div>
        <div class="fd-progress-pct">${pct}% of budget used</div>
        ${attnHtml}
        <div style="margin-top:1rem">
          <button class="fd-act-link" onclick="FD.goTo('budgeting')">Go to budgeting &#8594;</button>
        </div>`;
    },

    // ── Recent Activity ───────────────────────────────────────────────────
    renderActivity() {
      const el = document.getElementById('fd-act-rows');
      if (!el) return;

      const relTime = (ts) => {
        if (!ts) return '';
        const diff = Date.now() - new Date(ts).getTime();
        const m = Math.floor(diff / 60000);
        if (m < 60)  return m < 2 ? 'Just now' : m + 'm ago';
        const h = Math.floor(m / 60);
        if (h < 24)  return h + 'h ago';
        const d = Math.floor(h / 24);
        if (d < 7)   return d + 'd ago';
        return Math.floor(d / 7) + 'w ago';
      };

      const events = [];
      this.receipts.slice(0, 10).forEach(r => {
        const cat  = this.cats.find(c => c.id === r.category_id);
        const dept = cat ? cat.name : 'a department';
        const icon = (file) => `<img src="/ASSETS/Images/Icons/${file}" alt="" style="width:16px;height:16px" />`;
        if (r.status === 'paid' && r.paid_at) {
          events.push({ cls: 'pink',   icon: icon('Budgeting-Reimbursed.svg'),                   text: this.esc(dept) + ' reimbursement paid',                                                          when: relTime(r.paid_at),    ts: new Date(r.paid_at).getTime() });
        } else if (r.status === 'approved' && r.approved_at) {
          events.push({ cls: 'green',  icon: icon('Budgeting-Receipts.svg'),                      text: 'Receipt approved in ' + this.esc(dept),                                                         when: relTime(r.approved_at), ts: new Date(r.approved_at).getTime() });
        } else if (r.status === 'pending') {
          const by = (r.submitted_by_name || r.submitted_by || 'Someone').split(' ').slice(0,2).join(' ');
          events.push({ cls: 'orange', icon: icon('Budgeting-Needs-reimbursement-cad.svg'),       text: this.esc(by) + ' submitted a receipt (' + this.esc(dept) + ')',                                 when: relTime(r.created_at),  ts: new Date(r.created_at).getTime() });
        }
      });

      events.sort((a, b) => b.ts - a.ts);
      const shown = events.slice(0, 5);

      if (!shown.length) {
        el.innerHTML = `
          <div class="fd-act-empty">
            <div class="fd-act-empty-icon">
              <img src="/ASSETS/Images/Icons/Budgeting-Receipts.svg" alt="" style="width:22px;height:22px;opacity:0.55" />
            </div>
            <p class="fd-act-empty-title">No recent activity</p>
            <p class="fd-act-empty-copy">Financial activity will appear here once you start adding income and expenses.</p>
          </div>`;
        return;
      }

      el.innerHTML = shown.map(e =>
        '<div class="fd-act-row">' +
          '<div class="fd-act-bullet fd-act-bullet--' + e.cls + '">' + e.icon + '</div>' +
          '<div class="fd-act-text">' + e.text + '</div>' +
          '<div class="fd-act-when">' + e.when + '</div>' +
        '</div>'
      ).join('');

      const footer = document.getElementById('fd-act-footer');
      if (footer) footer.style.display = '';
    },

    // ── Helpers ───────────────────────────────────────────────────────────
    goTo(page) {
      const map = { budgeting: 'budgeting.html', receipts: 'budget-receipts.html' };
      btsProdNav(map[page] || page);
    },

    fmt$(cents) {
      if (cents == null) return '$0.00';
      const abs = Math.abs(cents) / 100;
      return (cents < 0 ? '-' : '') + '$' + abs.toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },

    esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; },
  };

  window.initProductionPage('financials');
  FD.init();
  </script>
</body>
</html>
