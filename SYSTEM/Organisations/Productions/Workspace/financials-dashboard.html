<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financials Dashboard - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=20260718c" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=20260718c" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #f5f4f8; font-family: var(--bts-font, 'Inter', sans-serif); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; display: flex; flex-direction: column;  z-index: 0; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: -1; }

    /* Hero */
    .hero-deco { position: absolute; right: 0; top: 0; bottom: 0; width: 180px; display: flex; align-items: center; justify-content: flex-end; pointer-events: none; overflow: hidden; }
    .hero-deco img { height: 120px; width: auto; object-fit: contain; opacity: 0.12; filter: brightness(0) invert(1); }
    .fd-hero-sub { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.6); margin-top: 0.2rem; letter-spacing: 0.04em; }

    /* Content */
    .fd-content { flex: 1; padding: 1.75rem 2.25rem 2.5rem; position: relative; z-index: 1; }

    /* 4-stat grid */
    .fd-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .fd-stat { background: #fff; border: 1px solid rgba(87,46,136,0.08); border-radius: 16px; padding: 1.4rem 1.5rem; display: flex; align-items: center; gap: 1rem; box-shadow: 0 1px 6px rgba(87,46,136,0.05); }
    .fd-stat-icon { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .fd-stat-icon--budget   { background: #f0ecfc; }
    .fd-stat-icon--income   { background: #e8f5ec; }
    .fd-stat-icon--expenses { background: #fde8e5; }
    .fd-stat-icon--pending  { background: #fdf3e3; }
    .fd-stat-label { font-size: 0.67rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.09em; color: rgba(26,21,48,0.4); margin-bottom: 0.3rem; }
    .fd-stat-val { font-size: 1.65rem; font-weight: 900; line-height: 1; }
    .fd-stat-val--budget   { color: #572e88; }
    .fd-stat-val--income   { color: #2e6639; }
    .fd-stat-val--expenses { color: #c0312b; }
    .fd-stat-val--pending  { color: #dd8233; }

    /* Activity card */
    .fd-card { background: #fff; border: 1px solid rgba(87,46,136,0.08); border-radius: 16px; box-shadow: 0 1px 6px rgba(87,46,136,0.05); padding: 1.4rem 1.6rem 1.5rem; }
    .fd-card-title { font-size: 0.88rem; font-weight: 800; color: #1a1530; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.9rem; }
    .fd-act-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0; border-bottom: 1px solid rgba(87,46,136,0.06); }
    .fd-act-row:last-child { border-bottom: none; }
    .fd-act-bullet { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .fd-act-bullet--green  { background: rgba(118,158,123,0.15); }
    .fd-act-bullet--pink   { background: rgba(202,126,167,0.15); }
    .fd-act-bullet--orange { background: rgba(221,130,51,0.15); }
    .fd-act-text { font-size: 0.84rem; font-weight: 700; color: #2a2040; flex: 1; }
    .fd-act-when { font-size: 0.72rem; font-weight: 700; color: #b0a8c8; white-space: nowrap; }
    .fd-act-empty { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 2rem 1rem; gap: 0.6rem; }
    .fd-act-empty-icon { width: 48px; height: 48px; border-radius: 50%; background: #f0ecfc; display: flex; align-items: center; justify-content: center; }
    .fd-act-empty-title { font-size: 0.9rem; font-weight: 800; color: #1a1530; margin: 0; }
    .fd-act-empty-copy  { font-size: 0.78rem; color: rgba(26,21,48,0.45); margin: 0; max-width: 280px; }
    .fd-act-footer { margin-top: 0.85rem; }
    .fd-act-link { background: none; border: none; font-family: inherit; font-size: 0.84rem; font-weight: 800; color: #572e88; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 0.3rem; }
    .fd-act-link:hover { opacity: 0.7; }

    @media (max-width: 1000px) { .fd-stats { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 860px) {
      .prod-main { margin-left: 0; max-width: 100vw; }
      .prod-main::before { inset: 0; }
      .fd-content { padding: 1.25rem 1rem 2rem; }
      .fd-stats { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 520px) { .fd-stats { grid-template-columns: 1fr; } }

    /* Budget by category table — exact port of budgeting.html's .bg-tbl-* ledger */
    .bg-tbl-ledger { background:#fff; border:1px solid #e7e2f2; border-radius:16px; overflow:hidden; box-shadow:0 10px 26px rgba(87,46,136,0.06); }
    .bg-tbl-wrap { display:flex; flex-direction:column; gap:0; }
    .bg-tbl-cat-group { background:#fff; border-bottom:1px solid #f0ebf8; }
    .bg-tbl-cat-group:last-child { border-bottom:none; }
    .bg-tbl-th, .bg-tbl-td, .bg-tbl-cat-total, .bg-tbl-cat-spent { font-variant-numeric:tabular-nums; }
    .bg-tbl-col-head, .bg-tbl-section-head, .bg-tbl-cat-row, .bg-tbl-item-row { display:grid; grid-template-columns:30px minmax(280px,1fr) 120px 96px 104px 104px 128px 136px 42px; align-items:center; }
    .bg-tbl-col-head { background:#fff; border-bottom:1px solid #e8e3f4; padding:0.18rem 0; }
    .bg-tbl-th { font-size:0.7rem; font-weight:900; letter-spacing:0.08em; text-transform:uppercase; color:#70638d; padding:0.55rem 0.7rem; }
    .bg-tbl-th:first-child { padding-left:1rem; }
    .bg-tbl-th:last-child { padding-right:1rem; }
    .bg-tbl-th--r { text-align:right; }
    .bg-tbl-section-head { position:relative; padding:0.72rem 0; border-top:1px solid #ece7f5; border-bottom:1px solid #ece7f5; cursor:pointer; }
    .bg-tbl-section-head:first-of-type { border-top:none; }
    .bg-tbl-section-icon { display:flex; align-items:center; justify-content:center; padding-left:0.95rem; }
    .bg-tbl-section-icon img { width:20px !important; height:20px !important; object-fit:contain; display:block; }
    .bg-tbl-section-title { font-size:0.86rem; font-weight:900; text-transform:uppercase; letter-spacing:0.03em; }
    .bg-tbl-section-total, .bg-tbl-section-val { padding:0 0.7rem; text-align:right; font-size:0.86rem; font-weight:900; }
    .bg-tbl-section-toggle { display:flex; align-items:center; justify-content:center; font-size:0.76rem; }
    .bg-tbl-cat-row { min-height:44px; background:#fff; cursor:pointer; user-select:none; border-bottom:1px solid #f1edf8; transition:background 0.12s; }
    .bg-tbl-cat-row:hover { background:#faf8fd; }
    .bg-tbl-cat-row.collapsed .bg-tbl-cat-chev { transform:rotate(-90deg); }
    .bg-tbl-cat-chev { display:flex; align-items:center; justify-content:center; font-size:0.64rem; color:#7e709c; transition:transform 0.15s; }
    .bg-tbl-cat-name-cell { display:flex; align-items:center; gap:0.55rem; padding:0.55rem 0.7rem; min-width:0; }
    .bg-tbl-cat-icon { width:18px; height:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .bg-tbl-cat-icon img { width:18px !important; height:18px !important; object-fit:contain; display:block; }
    .bg-tbl-cat-icon--empty img { opacity:0.35; }
    .bg-tbl-cat-name { font-size:0.84rem; font-weight:900; color:#241b42; min-width:0; }
    .bg-tbl-cat-total, .bg-tbl-cat-spent, .bg-tbl-cell { padding:0 0.7rem; text-align:right; font-size:0.82rem; font-weight:800; color:#2d2450; }
    .bg-tbl-cell--muted { color:#9f93b9; }
    .bg-tbl-progress { display:flex; align-items:center; gap:0.55rem; padding:0 0.7rem; }
    .bg-tbl-progress-track { flex:1; height:7px; border-radius:999px; background:rgba(87,46,136,0.09); overflow:hidden; }
    .bg-tbl-progress-fill { height:100%; border-radius:999px; min-width:0; }
    .bg-tbl-progress-pct { width:34px; text-align:right; font-size:0.78rem; font-weight:900; color:#4a3d6b; }
    @media (max-width: 900px) {
      .bg-tbl-col-head { display: none; }
      .bg-tbl-section-head, .bg-tbl-cat-row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.3rem 0.9rem; padding: 0.65rem 0.9rem; }
      .bg-tbl-section-val, .bg-tbl-cell { text-align: left; padding: 0; }
      .bg-tbl-progress { flex: 1 1 100%; padding: 0.2rem 0 0; }
    }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">

    <!-- Hero -->
    <div class="hero-wrap" style="padding:2rem 2.25rem 0;position:relative;z-index:1">
      <div class="aud-visual-hero" style="margin-bottom:0.4rem;overflow:hidden">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Financials</span></span>
            </div>
            <h1 class="aud-visual-title">Dashboard</h1>
            <p class="aud-visual-copy">Budget, receipts, and financial reports for this production.</p>
          </div>
        </div>
      </div>
      <nav class="dash-nav-chips" id="dash-nav-chips" aria-label="Financials sections" style="margin-bottom:0;"></nav>
    </div>

    <div class="fd-content">

      <!-- 4 stat cards -->
      <div class="fd-stats">

        <div class="fd-stat">
          <div class="fd-stat-icon fd-stat-icon--budget">
            <img src="/ASSETS/Images/Icons/Budgeting-total-spent-cad-usd.svg" id="fd-budget-icon" width="26" height="26" style="object-fit:contain;opacity:0.85" alt="" />
          </div>
          <div>
            <div class="fd-stat-label">Total Budget</div>
            <div class="fd-stat-val fd-stat-val--budget" id="fd-total-budget">$0.00</div>
          </div>
        </div>

        <div class="fd-stat">
          <div class="fd-stat-icon fd-stat-icon--income">
            <img src="/ASSETS/Images/Icons/Budgeting-Fundraising.svg" width="26" height="26" style="object-fit:contain;opacity:0.85" alt="" />
          </div>
          <div>
            <div class="fd-stat-label">Total Income</div>
            <div class="fd-stat-val fd-stat-val--income" id="fd-total-income">$0.00</div>
          </div>
        </div>

        <div class="fd-stat">
          <div class="fd-stat-icon fd-stat-icon--expenses">
            <img src="/ASSETS/Images/Icons/Financial - Reports.svg" width="26" height="26" style="object-fit:contain;opacity:0.85" alt="" />
          </div>
          <div>
            <div class="fd-stat-label">Total Expenses</div>
            <div class="fd-stat-val fd-stat-val--expenses" id="fd-total-expenses">$0.00</div>
          </div>
        </div>

        <div class="fd-stat">
          <div class="fd-stat-icon fd-stat-icon--pending">
            <img src="/ASSETS/Images/Icons/Budgeting-Receipts.svg" width="26" height="26" style="object-fit:contain;opacity:0.85" alt="" />
          </div>
          <div>
            <div class="fd-stat-label">Pending Receipts</div>
            <div class="fd-stat-val fd-stat-val--pending" id="fd-pending-receipts">0</div>
          </div>
        </div>

      </div>

      <!-- Budget by Category -->
      <div class="fd-card" style="margin-bottom:1.5rem;">
        <div class="fd-card-title">Budget by Category</div>
        <div id="fd-cat-table"></div>
        <div class="fd-act-footer" style="display:flex;">
          <button class="fd-act-link" onclick="FD.goTo('budgeting')">Manage full budget &#8594;</button>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="fd-card">
        <div class="fd-card-title">Recent Activity</div>
        <div id="fd-act-rows">
          <div style="color:#b0a8c8;font-size:0.84rem">Loading...</div>
        </div>
        <div class="fd-act-footer" id="fd-act-footer" style="display:none">
          <button class="fd-act-link" onclick="FD.goTo('receipts')">View all receipts &#8594;</button>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=79-20260721-proposals"></script>
  <script>
  'use strict';

  const FD = {
    URL: 'https://tkmaiktxpwqfbgeojbnf.supabase.co',
    KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8',

    prodId: '',
    cats: [],
    items: [],
    receipts: [],

    init() {
      this.prodId = new URLSearchParams(location.search).get('id') || '';
      if (!this.prodId) return;
      this.load();
    },

    _h() { return { apikey: this.KEY, Authorization: 'Bearer ' + this.KEY }; },

    async load() {
      try {
        const [cRes, iRes, rRes, pRes] = await Promise.all([
          fetch(this.URL + '/rest/v1/budget_categories?production_id=eq.' + this.prodId + '&order=sort_order.asc,created_at.asc', { headers: this._h() }),
          fetch(this.URL + '/rest/v1/budget_items?production_id=eq.' + this.prodId, { headers: this._h() }),
          fetch(this.URL + '/rest/v1/budget_receipts?production_id=eq.' + this.prodId + '&order=created_at.desc&limit=50', { headers: this._h() }),
          fetch(this.URL + '/rest/v1/productions?id=eq.' + this.prodId + '&select=registration_settings', { headers: this._h() }),
        ]);
        this.cats     = cRes.ok ? await cRes.json() : [];
        this.items    = iRes.ok ? await iRes.json() : [];
        this.receipts = rRes.ok ? await rRes.json() : [];
        const prods   = pRes.ok ? await pRes.json() : [];
        const currency = prods[0]?.registration_settings?.payment_settings?.currency || 'CAD';
        const budgetIcon = document.getElementById('fd-budget-icon');
        if (budgetIcon && currency === 'GBP') budgetIcon.src = '/ASSETS/Images/Icons/Budgeting-total-spent-gbp.svg';
      } catch(_) {}
      this.renderStats();
      this.renderCategoryTable();
      this.renderActivity();
    },

    BW_SECTION_CATS: [
      { label:'Rights & Venue',       color:'#476aaa', names:['Rights & Licensing','Venue Rental','Venue & Rehearsal Space','Rehearsal Space'] },
      { label:'Production Elements',  color:'#769e7b', names:['Scripts','Set Construction','Props','Costumes','Hair & Makeup'] },
      { label:'Technical',            color:'#74a2b4', names:['Lighting','Sound','Photography & Videography','Music','Instrument Rental','Stage Management Supplies'] },
      { label:'People',               color:'#dd8233', names:['Contractor Fees','Volunteer Appreciation','Cast Appreciation'] },
      { label:'Events',               color:'#ca7ea7', names:['Auditions','Callbacks','Meet & Greet','Cast Party'] },
      { label:'Promotion & Audience', color:'#d1523d', names:['Printing & Programmes','Marketing & Advertising','Lobby Decorations','Concessions','Merchandise','Concessions & Merchandise'] },
      { label:'Safety Net',           color:'#572e88', names:['Insurance & Permits','Administration','Contingency'] },
    ],
    _secCollapsed: {},
    _svg(file, size) { return '<img src="/ASSETS/Images/Icons/' + file + '" style="width:' + size + 'px;height:' + size + 'px;object-fit:contain;" alt="" onerror="this.style.display=\'none\'">'; },
    _hexRgba(hex, a) { const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16); return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')'; },
    _catSectionLabel(name) {
      const key = (name || '').trim().toLowerCase();
      for (const sec of this.BW_SECTION_CATS) {
        if (sec.names.some(n => n.trim().toLowerCase() === key)) return sec.label;
      }
      return 'Other';
    },
    _catItems(catId) { return this.items.filter(i => i.category_id === catId); },
    toggleSection(label) {
      this._secCollapsed[label] = this._secCollapsed[label] === false ? true : false;
      this.renderCategoryTable();
    },

    renderCategoryTable() {
      const host = document.getElementById('fd-cat-table');
      if (!host) return;
      const expCats = this.cats.filter(c => c.type === 'expense');
      if (!expCats.length) {
        host.innerHTML = '<div style="color:#b0a8c8;font-size:0.84rem;padding:0.5rem 0;">No budget categories set up yet.</div>';
        return;
      }

      const sectionIcon = (label) => {
        const map = {
          'Rights & Venue': 'Location1.svg', 'Production Elements': 'script-props.svg',
          'Technical': 'ProductionTeam-sound.svg?v=2', 'People': 'Creative Team.svg',
          'Events': 'navauditions.svg', 'Promotion & Audience': 'Star.svg',
          'Safety Net': 'Producers To-do list.svg?v=2', 'Other': 'Finance - Schedule.svg'
        };
        return this._svg(map[label] || 'Finance - Schedule.svg', 18);
      };

      const usedIds = new Set();
      const grouped = this.BW_SECTION_CATS.map(sec => {
        const secCats = expCats.filter(c => this._catSectionLabel(c.name) === sec.label);
        secCats.forEach(c => usedIds.add(c.id));
        return { sec, cats: secCats };
      }).filter(g => g.cats.length);
      const otherCats = expCats.filter(c => !usedIds.has(c.id));
      if (otherCats.length) grouped.push({ sec: { label: 'Other', color: '#572e88' }, cats: otherCats });

      const dash = '<span class="bg-tbl-cell--muted">–</span>';
      const progressHtml = (budget, actual, color) => {
        const pct = budget > 0 ? Math.max(0, Math.min(100, Math.round(actual / budget * 100))) : 0;
        return '<div class="bg-tbl-progress">' +
          '<div class="bg-tbl-progress-track"><div class="bg-tbl-progress-fill" style="width:' + pct + '%;background:' + color + ';"></div></div>' +
          '<div class="bg-tbl-progress-pct">' + pct + '%</div>' +
        '</div>';
      };

      let html = '<div class="bg-tbl-ledger">';
      html += '<div class="bg-tbl-col-head">' +
        '<div></div>' +
        '<div class="bg-tbl-th">Category / Item</div>' +
        '<div class="bg-tbl-th bg-tbl-th--r">Budget</div>' +
        '<div class="bg-tbl-th bg-tbl-th--r">Spent</div>' +
        '<div class="bg-tbl-th bg-tbl-th--r">Pending</div>' +
        '<div class="bg-tbl-th bg-tbl-th--r">Total</div>' +
        '<div class="bg-tbl-th bg-tbl-th--r">Remaining</div>' +
        '<div class="bg-tbl-th">Progress</div>' +
        '<div class="bg-tbl-th"></div>' +
      '</div>';

      grouped.forEach((g, gi) => {
        const secBudget = g.cats.reduce((sum, c) => {
          const its = this._catItems(c.id);
          const itemSum = its.reduce((s, i) => s + (i.budgeted_cents || 0), 0);
          return sum + (itemSum || c.planned_cents || 0);
        }, 0);
        const secSpent = g.cats.reduce((sum, c) => sum + this._catItems(c.id).reduce((s, i) => s + (i.paid_cents || 0), 0), 0);
        const secPending = g.cats.reduce((sum, c) => sum + this._catItems(c.id).reduce((s, i) => s + Math.max(0, (i.committed_cents || 0) - (i.paid_cents || 0)), 0), 0);
        const secActual = secSpent + secPending;
        const secTotal = secActual || secBudget;
        const secRemaining = secBudget - secActual;
        const secCollapsed = this._secCollapsed[g.sec.label] !== false;

        html += '<div class="bg-tbl-section-head" onclick="FD.toggleSection(\'' + g.sec.label + '\')" style="margin-top:' + (gi > 0 ? '0.8rem' : '0') + ';background:linear-gradient(90deg,' + this._hexRgba(g.sec.color, 0.15) + ', ' + this._hexRgba(g.sec.color, 0.05) + ' 62%, ' + this._hexRgba(g.sec.color, 0.02) + ');">' +
          '<div class="bg-tbl-section-icon" style="color:' + g.sec.color + ';">' + sectionIcon(g.sec.label) + '</div>' +
          '<div class="bg-tbl-section-title" style="color:' + g.sec.color + ';">' + this.esc(g.sec.label) + '</div>' +
          '<div class="bg-tbl-section-val" style="color:' + g.sec.color + ';">' + (secBudget ? this.fmt$(secBudget) : dash) + '</div>' +
          '<div class="bg-tbl-section-val">' + (secSpent ? this.fmt$(secSpent) : dash) + '</div>' +
          '<div class="bg-tbl-section-val">' + (secPending ? this.fmt$(secPending) : dash) + '</div>' +
          '<div class="bg-tbl-section-val">' + (secTotal ? this.fmt$(secTotal) : dash) + '</div>' +
          '<div class="bg-tbl-section-val" style="color:' + (secRemaining < 0 ? '#d1523d' : '#13811f') + ';">' + (secRemaining ? this.fmt$(secRemaining) : dash) + '</div>' +
          '<div>' + progressHtml(secBudget, secActual, g.sec.color) + '</div>' +
          '<div class="bg-tbl-section-toggle" style="color:' + g.sec.color + ';">' + (secCollapsed ? '&#9654;' : '&#9660;') + '</div>' +
        '</div>';

        if (!secCollapsed) {
          html += '<div class="bg-tbl-wrap">';
          g.cats.forEach(c => {
            const color = c.color || g.sec.color;
            const its = this._catItems(c.id);
            const itemBudget = its.reduce((s, i) => s + (i.budgeted_cents || 0), 0);
            const catBudget = itemBudget || c.planned_cents || 0;
            const catSpent = its.reduce((s, i) => s + (i.paid_cents || 0), 0);
            const catPending = its.reduce((s, i) => s + Math.max(0, (i.committed_cents || 0) - (i.paid_cents || 0)), 0);
            const catActual = catSpent + catPending;
            const catTotal = catActual || catBudget;
            const catRemaining = catBudget - catActual;
            html += '<div class="bg-tbl-cat-group"><div class="bg-tbl-cat-row" style="cursor:default;">' +
              '<div></div>' +
              '<div class="bg-tbl-cat-name-cell"><div class="bg-tbl-cat-icon"><span style="display:block;width:9px;height:9px;border-radius:50%;background:' + color + ';"></span></div><span class="bg-tbl-cat-name">' + this.esc(c.name) + '</span></div>' +
              '<div class="bg-tbl-cat-total">' + (catBudget ? this.fmt$(catBudget) : dash) + '</div>' +
              '<div class="bg-tbl-cat-spent">' + (catSpent ? this.fmt$(catSpent) : dash) + '</div>' +
              '<div class="bg-tbl-cell">' + (catPending ? this.fmt$(catPending) : dash) + '</div>' +
              '<div class="bg-tbl-cell">' + (catTotal ? this.fmt$(catTotal) : dash) + '</div>' +
              '<div class="bg-tbl-cell" style="color:' + (catRemaining < 0 ? '#d1523d' : '#13811f') + ';">' + (catRemaining ? this.fmt$(catRemaining) : dash) + '</div>' +
              '<div>' + progressHtml(catBudget, catActual, color) + '</div>' +
              '<div></div>' +
            '</div></div>';
          });
          html += '</div>';
        }
      });

      html += '</div>';
      host.innerHTML = html;
    },

    renderStats() {
      const expCats = this.cats.filter(c => c.type === 'expense');
      const incCats = this.cats.filter(c => c.type === 'income');

      const totalBudget   = expCats.reduce((a, c) => a + (c.planned_cents || 0), 0);
      const totalIncome   = incCats.reduce((a, c) => a + (c.planned_cents || 0), 0);
      const totalExpenses = this.receipts.filter(r => r.status === 'paid').reduce((a, r) => a + (r.amount_cents || 0), 0);
      const pendingCount  = this.receipts.filter(r => r.status === 'pending').length;

      const setMoney = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = this.fmt$(val); };
      setMoney('fd-total-budget',   totalBudget);
      setMoney('fd-total-income',   totalIncome);
      setMoney('fd-total-expenses', totalExpenses);
      const pendingEl = document.getElementById('fd-pending-receipts');
      if (pendingEl) pendingEl.textContent = pendingCount;
    },

    renderActivity() {
      const el = document.getElementById('fd-act-rows');
      if (!el) return;

      const relTime = (ts) => {
        if (!ts) return '';
        const diff = Date.now() - new Date(ts).getTime();
        const m = Math.floor(diff / 60000);
        if (m < 60)  return m < 2 ? 'Just now' : m + 'm ago';
        const h = Math.floor(m / 60);
        if (h < 24)  return h + 'h ago';
        const d = Math.floor(h / 24);
        if (d < 7)   return d + 'd ago';
        return Math.floor(d / 7) + 'w ago';
      };

      const icon = (file) => `<img src="/ASSETS/Images/Icons/${file}" alt="" style="width:16px;height:16px" />`;
      const events = [];

      this.receipts.slice(0, 20).forEach(r => {
        const cat  = this.cats.find(c => c.id === r.category_id);
        const dept = cat ? cat.name : 'a department';
        if (r.status === 'paid' && r.paid_at) {
          events.push({ cls: 'pink',   icon: icon('Budgeting-Receipts.svg'), text: this.esc(dept) + ' reimbursement paid', when: relTime(r.paid_at), ts: new Date(r.paid_at).getTime() });
        } else if (r.status === 'approved' && r.approved_at) {
          events.push({ cls: 'green',  icon: icon('Budgeting-Receipts.svg'), text: 'Receipt approved in ' + this.esc(dept), when: relTime(r.approved_at), ts: new Date(r.approved_at).getTime() });
        } else if (r.status === 'pending') {
          const by = (r.submitted_by_name || r.submitted_by || 'Someone').split(' ').slice(0, 2).join(' ');
          events.push({ cls: 'orange', icon: icon('Budgeting-Receipts.svg'), text: this.esc(by) + ' submitted a receipt (' + this.esc(dept) + ')', when: relTime(r.created_at), ts: new Date(r.created_at).getTime() });
        }
      });

      events.sort((a, b) => b.ts - a.ts);
      const shown = events.slice(0, 6);

      if (!shown.length) {
        el.innerHTML = `
          <div class="fd-act-empty">
            <div class="fd-act-empty-icon">
              <img src="/ASSETS/Images/Icons/Budgeting-Receipts.svg" alt="" style="width:22px;height:22px;opacity:0.55" />
            </div>
            <p class="fd-act-empty-title">No recent activity</p>
            <p class="fd-act-empty-copy">Financial activity will appear here once you start adding receipts.</p>
          </div>`;
        return;
      }

      el.innerHTML = shown.map(e =>
        '<div class="fd-act-row">' +
          '<div class="fd-act-bullet fd-act-bullet--' + e.cls + '">' + e.icon + '</div>' +
          '<div class="fd-act-text">' + e.text + '</div>' +
          '<div class="fd-act-when">' + e.when + '</div>' +
        '</div>'
      ).join('');

      const footer = document.getElementById('fd-act-footer');
      if (footer) footer.style.display = '';
    },

    goTo(page) {
      const map = { budgeting: 'budgeting.html', receipts: 'budget-receipts.html' };
      btsProdNav(map[page] || page);
    },

    fmt$(cents) {
      if (cents == null) return '$0.00';
      const abs = Math.abs(cents) / 100;
      return (cents < 0 ? '-' : '') + '$' + abs.toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },

    esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; },
  };

  window.initProductionPage('financials');
  FD.init();

  (function() {
    const CHIPS = [
      { label: 'Budgeting', file: 'budgeting.html',          icon: '/ASSETS/Images/Icons/Financial - Reports.svg?v=20260704c',          colour: '#dd8233', desc: 'Plan and track your full budget' },
      { label: 'Receipts',  file: 'budget-receipts.html',    icon: '/ASSETS/Images/Icons/Budgeting-total-spent-cad-usd.svg?v=20260704', colour: '#769e7b', desc: 'Log and manage all expenses' },
      { label: 'Reports',   file: 'financials-reports.html', icon: '/ASSETS/Images/Icons/Finance - Schedule.svg?v=20260704',             colour: '#476aaa', desc: 'Run financial summaries' },
    ];
    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function renderChips() {
      const mods = window.enabledModules || {};
      const visible = CHIPS.filter(c => !c.moduleKey || mods[c.moduleKey] !== false);
      const _nav = document.getElementById('dash-nav-chips');
      _nav.innerHTML = visible.map(c => `
        <button class="dash-nav-chip" data-file="${c.file}" style="--chip-colour:${c.colour};">
          <div class="dash-nav-chip-top">
            <img class="dash-nav-chip-icon" src="${c.icon}" alt="" aria-hidden="true" />
            <div class="dash-nav-chip-label">${esc(c.label)}</div>
          </div>
          <div class="dash-nav-chip-desc">${esc(c.desc)}</div>
        </button>`).join('');
      _nav.querySelectorAll('[data-file]').forEach(function(btn) { btn.addEventListener('click', function() { btsProdNav(btn.dataset.file); }); });
    }
    (function tryInit() {
      if (window.enabledModules === undefined) { requestAnimationFrame(tryInit); return; }
      renderChips();
    })();
    const _origApply = window.applyNavModuleVisibility;
    window.applyNavModuleVisibility = function(m) { if (_origApply) _origApply(m); renderChips(); };
  })();
  </script>
</body>
</html>
