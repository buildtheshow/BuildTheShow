<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performers - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v49-20260618" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    .page-kicker { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,21,48,0.38); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .page-kicker-dot { width: 6px; height: 6px; border-radius: 50%; background: #572e88; flex-shrink: 0; }
    .page-title { font-size: 2rem; font-weight: 950; color: #1a1530; margin: 0 0 1.25rem; }

    .perf-toolbar { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .perf-search { flex: 1; min-width: 200px; max-width: 340px; position: relative; }
    .perf-search input { width: 100%; border: 1.5px solid rgba(87,46,136,0.18); border-radius: 8px; padding: 0.48rem 0.9rem 0.48rem 2.1rem; font-size: 0.85rem; font-family: var(--bts-font); background: #fff; color: #1a1530; outline: none; transition: border-color 0.12s; }
    .perf-search input:focus { border-color: #572e88; }
    .perf-search-icon { position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); opacity: 0.35; pointer-events: none; }
    .perf-filters { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .perf-filter-pill { font-size: 0.72rem; font-weight: 800; border-radius: 100px; padding: 0.28rem 0.7rem; border: 1.5px solid rgba(87,46,136,0.2); background: #fff; color: rgba(26,21,48,0.6); cursor: pointer; font-family: var(--bts-font); transition: all 0.12s; }
    .perf-filter-pill:hover { border-color: #572e88; color: #572e88; }
    .perf-filter-pill.active { background: #572e88; color: #fff; border-color: #572e88; }
    .perf-count { font-size: 0.78rem; color: rgba(26,21,48,0.4); font-weight: 700; margin-left: auto; white-space: nowrap; }

    .perf-table { width: 100%; border-collapse: collapse; }
    .perf-table th { font-size: 0.68rem; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(26,21,48,0.4); padding: 0.6rem 0.85rem; border-bottom: 1.5px solid rgba(87,46,136,0.1); text-align: left; }
    .perf-table td { padding: 0.7rem 0.85rem; border-bottom: 1px solid rgba(87,46,136,0.06); vertical-align: middle; }
    .perf-table tbody tr { cursor: default; transition: background 0.1s; }
    .perf-table tbody tr:hover { background: rgba(87,46,136,0.03); }
    .perf-avatar { width: 32px; height: 32px; border-radius: 50%; background: #ece8ff; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.75rem; color: #572e88; overflow: hidden; flex-shrink: 0; }
    .perf-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .perf-name-cell { display: flex; align-items: center; gap: 0.7rem; }
    .perf-name { font-size: 0.88rem; font-weight: 800; }
    .perf-pronouns { font-size: 0.72rem; color: rgba(26,21,48,0.45); margin-top: 0.1rem; }
    .perf-session-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 0.3rem; flex-shrink: 0; }
    .perf-session-label { font-size: 0.78rem; color: rgba(26,21,48,0.6); }
    .status-pill { font-size: 0.68rem; font-weight: 850; border-radius: 100px; padding: 0.2rem 0.55rem; white-space: nowrap; }
    .s-pending  { background: #f0ecfc; color: #572e88; }
    .s-callback { background: #fef4e2; color: #a06b00; }
    .s-cast     { background: #e5f0e7; color: #2e6639; }
    .s-checkedin { background: #dff1e5; color: #208348; }

    .perf-empty { text-align: center; padding: 3rem 1rem; color: rgba(26,21,48,0.38); font-size: 0.88rem; }
    .perf-loading { color: rgba(26,21,48,0.38); font-size: 0.88rem; padding: 1rem 0; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>
  <div class="prod-main">
    <div class="prod-main-inner">
      <div class="page-kicker"><span class="page-kicker-dot"></span>AUDITIONS</div>
      <h1 class="page-title">Performers</h1>
      <div id="perf-root"><div class="perf-loading">Loading...</div></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=25"></script>
  <script>
    window.initProductionPage('cast');

    const SESSION_COLORS = {
      audition: '#572e88', general: '#572e88',
      dance_call: '#78bbd4', dance: '#78bbd4',
      callback: '#efab45', selftape: '#ca7ea7', self_tape: '#ca7ea7',
    };
    const SESSION_LABELS = {
      audition: 'General Auditions', general: 'General Auditions',
      dance_call: 'Dance Call', dance: 'Dance Call',
      callback: 'Callback', selftape: 'Self Tape', self_tape: 'Self Tape',
    };
    function sessionColor(type) { return SESSION_COLORS[String(type||'').toLowerCase()] || '#572e88'; }
    function sessionLabel(s) { return s ? (s.name || SESSION_LABELS[String(s.type||'').toLowerCase()] || 'Audition') : ''; }
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function initials(name) { return String(name||'').trim().split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase() || '?'; }

    let _all      = [];
    let _sessions = {};
    let _filter   = 'all';
    let _query    = '';

    function statusClass(a) {
      if (a.callback_status && a.callback_status !== 'none') return 's-callback';
      if (a.status === 'cast' || a.status === 'chosen') return 's-cast';
      const checkins = Array.isArray(a.session_checkins) ? a.session_checkins : [];
      if (checkins.some(c => c.checked_in)) return 's-checkedin';
      return 's-pending';
    }
    function statusLabel(a) {
      if (a.callback_status && a.callback_status !== 'none') return 'Callback';
      if (a.status === 'cast' || a.status === 'chosen') return 'Cast';
      const checkins = Array.isArray(a.session_checkins) ? a.session_checkins : [];
      if (checkins.some(c => c.checked_in)) return 'Checked In';
      return 'Registered';
    }

    function filteredApps() {
      return _all.filter(a => {
        const matchFilter = _filter === 'all'
          || (_filter === 'callback' && a.callback_status && a.callback_status !== 'none')
          || (_filter === 'cast' && (a.status === 'cast' || a.status === 'chosen'))
          || (_filter === 'checkedin' && Array.isArray(a.session_checkins) && a.session_checkins.some(c => c.checked_in));
        if (!matchFilter) return false;
        if (!_query) return true;
        const q = _query.toLowerCase();
        return (a.name || '').toLowerCase().includes(q) || (a.email || '').toLowerCase().includes(q);
      });
    }

    function render() {
      const visible = filteredApps();
      const root    = document.getElementById('perf-root');

      const tableRows = visible.map(a => {
        const sc  = statusClass(a);
        const sl  = statusLabel(a);
        const sess = _sessions[a.session_id];
        const sessHtml = sess
          ? `<span class="perf-session-dot" style="background:${esc(sessionColor(sess.type))};"></span><span class="perf-session-label">${esc(sessionLabel(sess))}</span>`
          : '<span class="perf-session-label" style="color:rgba(26,21,48,0.3);">Unknown</span>';
        const avatarInner = a.headshot_url
          ? `<img src="${esc(a.headshot_url)}" alt="${esc(a.name)}" />`
          : esc(initials(a.name));
        return `<tr>
          <td>
            <div class="perf-name-cell">
              <div class="perf-avatar">${avatarInner}</div>
              <div>
                <div class="perf-name">${esc(a.name || 'Unknown')}</div>
                ${a.pronouns ? `<div class="perf-pronouns">${esc(a.pronouns)}</div>` : ''}
              </div>
            </div>
          </td>
          <td style="color:rgba(26,21,48,0.55);font-size:0.82rem;">${esc(a.email || '')}</td>
          <td>${sessHtml}</td>
          <td><span class="status-pill ${sc}">${sl}</span></td>
        </tr>`;
      }).join('') || `<tr><td colspan="4"><div class="perf-empty">No performers match.</div></td></tr>`;

      root.innerHTML = `
        <div class="perf-toolbar">
          <div class="perf-search">
            <svg class="perf-search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#1a1530" stroke-width="1.6"/><path d="M10 10l3.5 3.5" stroke="#1a1530" stroke-width="1.6" stroke-linecap="round"/></svg>
            <input type="search" id="perf-search-input" placeholder="Search performers..." value="${esc(_query)}" oninput="onSearch(this.value)" />
          </div>
          <div class="perf-filters">
            <button class="perf-filter-pill${_filter==='all'?' active':''}" onclick="setFilter('all')">All</button>
            <button class="perf-filter-pill${_filter==='checkedin'?' active':''}" onclick="setFilter('checkedin')">Checked In</button>
            <button class="perf-filter-pill${_filter==='callback'?' active':''}" onclick="setFilter('callback')">Callbacks</button>
            <button class="perf-filter-pill${_filter==='cast'?' active':''}" onclick="setFilter('cast')">Cast</button>
          </div>
          <div class="perf-count">${visible.length} of ${_all.length} performers</div>
        </div>
        <table class="perf-table">
          <thead><tr>
            <th>Performer</th>
            <th>Email</th>
            <th>Session</th>
            <th>Status</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>`;

      document.getElementById('perf-search-input')?.focus();
    }

    function setFilter(f) { _filter = f; render(); }
    function onSearch(q) { _query = q; render(); }

    (async function () {
      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      const prodId  = new URLSearchParams(location.search).get('id') || '';
      if (!prodId) return;
      const sb = supabase.createClient(SB_URL, SB_ANON);

      const [appRes, sessRes] = await Promise.all([
        sb.from('audition_applications').select('id,name,email,pronouns,headshot_url,status,callback_status,session_id,session_checkins,created_at').eq('production_id', prodId).order('name'),
        sb.from('audition_sessions').select('id,name,type').eq('production_id', prodId),
      ]);

      _all      = appRes.data  || [];
      const sessList = sessRes.data || [];
      sessList.forEach(s => { _sessions[s.id] = s; });

      if (!_all.length) {
        document.getElementById('perf-root').innerHTML = '<div class="perf-empty">No performers have registered yet.</div>';
        return;
      }

      render();
    })();
  </script>
</body>
</html>
