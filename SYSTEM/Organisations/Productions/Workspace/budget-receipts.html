<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipts - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v47-20260610" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #f5f4f8; font-family: var(--bts-font, 'Inter', sans-serif); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; display: flex; flex-direction: column; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }
    .hero-wrap { padding: 2rem 2.25rem 0; position: relative; z-index: 1; }
    .aud-visual-hero { margin-bottom: 0; overflow: hidden; }
    .hero-deco { position: absolute; right: 0; top: 0; bottom: 0; width: 220px; display: flex; align-items: center; justify-content: flex-end; pointer-events: none; overflow: hidden; }
    .hero-deco img { height: 130px; width: auto; object-fit: contain; opacity: 0.15; filter: brightness(0) invert(1); }
    .page-hierarchy { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 0.4rem; color: rgba(255,255,255,0.88); font-size: 0.78rem; }
    .page-hierarchy-page { color: #efab45; font-weight: 950; letter-spacing: 0.08em; text-transform: uppercase; }
    .page-hierarchy-sep, .page-hierarchy-sub { color: rgba(255,255,255,0.82); font-weight: 500; }
    .page-subtitle { margin: 0.35rem 0 0; color: #fff; font-size: clamp(2.1rem, 4.6vw, 3.7rem); line-height: 0.98; font-weight: 950; }
    .receipts-content { flex: 1; padding: 1.5rem 2.25rem 2.5rem; position: relative; z-index: 1; }
    @media (max-width: 900px) { .prod-main { margin-left: 0; max-width: 100vw; } .prod-main::before { inset: 0; } .hero-wrap { padding: 4.5rem 1rem 0; } .receipts-content { padding: 1.25rem 1rem 2rem; } }

    /* ── Stat cards ── */
    .fin-stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.85rem; margin-bottom: 1.5rem; }
    @media (max-width: 900px) { .fin-stat-row { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 520px) { .fin-stat-row { grid-template-columns: 1fr; } }
    .fin-stat-card { background: #fff; border: 1px solid #ece9f4; border-radius: 14px; padding: 1.1rem 1.25rem; display: flex; align-items: flex-start; gap: 0.9rem; box-shadow: 0 2px 8px rgba(87,46,136,0.05); }
    .fin-stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .fin-stat-icon svg { width: 20px; height: 20px; }
    .fin-stat-icon--purple { background: rgba(87,46,136,0.1); color: #572e88; }
    .fin-stat-icon--red    { background: rgba(209,82,61,0.1); color: #d1523d; }
    .fin-stat-icon--green  { background: rgba(118,158,123,0.12); color: #769e7b; }
    .fin-stat-icon--blue   { background: rgba(71,106,170,0.1); color: #476aaa; }
    .fin-stat-body { flex: 1; min-width: 0; }
    .fin-stat-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #9a90b0; margin-bottom: 0.2rem; }
    .fin-stat-val { font-size: 1.55rem; font-weight: 800; color: #1a1530; line-height: 1.1; margin-bottom: 0.2rem; }
    .fin-stat-sub { font-size: 0.72rem; color: #9a90b0; font-weight: 400; }
    .fin-stat-sub--warn { color: #d1523d; font-weight: 600; }

    /* ── Main grid ── */
    .fin-main-grid { display: grid; grid-template-columns: 1fr 280px; gap: 1.25rem; align-items: start; }
    @media (max-width: 1100px) { .fin-main-grid { grid-template-columns: 1fr 240px; } }
    @media (max-width: 860px)  { .fin-main-grid { grid-template-columns: 1fr; } }

    /* ── Section cards ── */
    .fin-section { background: #fff; border: 1px solid #ece9f4; border-radius: 14px; padding: 1.4rem 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(87,46,136,0.05); }
    .fin-section:last-child { margin-bottom: 0; }
    .fin-section-title { font-size: 1rem; font-weight: 700; color: #1a1530; margin: 0 0 0.2rem; }
    .fin-section-sub { font-size: 0.75rem; color: #9a90b0; margin-bottom: 1rem; font-weight: 400; }

    /* ── Tables ── */
    .fin-table { width: 100%; border-collapse: collapse; }
    .fin-table th { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #b0a8c8; padding: 0 0.75rem 0.6rem; text-align: left; border-bottom: 1px solid #f0eef8; white-space: nowrap; }
    .fin-table td { font-size: 0.84rem; color: #1a1530; padding: 0.75rem 0.75rem; border-bottom: 1px solid #f8f7fc; vertical-align: middle; }
    .fin-table tr:last-child td { border-bottom: none; }
    .fin-table tbody tr:hover td { background: #faf9fd; }

    /* Avatar */
    .fin-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; flex-shrink: 0; }
    .fin-person-cell { display: flex; align-items: center; gap: 0.6rem; }
    .fin-person-name { font-weight: 600; font-size: 0.84rem; }

    /* Status badges */
    .fin-badge { display: inline-flex; align-items: center; padding: 0.22rem 0.65rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
    .fin-badge--pending  { background: rgba(239,171,69,0.14); color: #a06b00; }
    .fin-badge--approved { background: rgba(71,106,170,0.12); color: #2a4a80; }
    .fin-badge--paid     { background: rgba(118,158,123,0.14); color: #2e6639; }

    /* Mark as paid button */
    .fin-mark-paid-btn { font-family: inherit; font-size: 0.76rem; font-weight: 500; color: #572e88; background: #fff; border: 1.5px solid rgba(87,46,136,0.25); border-radius: 7px; padding: 0.3rem 0.75rem; cursor: pointer; white-space: nowrap; transition: background 0.12s; }
    .fin-mark-paid-btn:hover { background: rgba(87,46,136,0.06); }

    /* Download btn */
    .fin-download-btn { background: none; border: none; cursor: pointer; color: #9a90b0; padding: 0.25rem; border-radius: 5px; transition: color 0.12s; display: flex; align-items: center; }
    .fin-download-btn:hover { color: #572e88; }
    .fin-download-btn svg { width: 16px; height: 16px; }

    /* Total owing row */
    .fin-total-row td { font-weight: 700; font-size: 0.84rem; color: #1a1530; border-top: 1.5px solid #f0eef8; padding-top: 0.85rem; border-bottom: none; }
    .fin-total-amount { font-size: 1rem; font-weight: 800; color: #d1523d; }

    /* View all link */
    .fin-view-all { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.8rem; font-weight: 600; color: #572e88; text-decoration: none; margin-top: 0.85rem; cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; }
    .fin-view-all:hover { text-decoration: underline; }

    /* Empty state */
    .fin-empty { padding: 1.5rem; text-align: center; color: #b0a8c8; font-size: 0.84rem; }

    /* ── Sidebar ── */
    .fin-sidebar-panel { background: #fff; border: 1px solid #ece9f4; border-radius: 14px; padding: 1.25rem 1.4rem; box-shadow: 0 2px 8px rgba(87,46,136,0.05); position: sticky; top: 1.5rem; }
    .fin-sidebar-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #572e88; padding-bottom: 0.65rem; border-bottom: 2px solid #572e88; margin-bottom: 1rem; }
    .fin-sidebar-section { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px dashed #e8e4f4; }
    .fin-sidebar-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .fin-sidebar-section-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #9a90b0; margin-bottom: 0.6rem; }
    .fin-sidebar-total { font-size: 1rem; font-weight: 700; color: #1a1530; }
    .fin-sidebar-row { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; margin-bottom: 0.4rem; }
    .fin-sidebar-row:last-child { margin-bottom: 0; }
    .fin-sidebar-row-label { font-size: 0.8rem; color: #4a3f6a; font-weight: 400; }
    .fin-sidebar-row-val { font-size: 0.8rem; font-weight: 600; color: #1a1530; }
    .fin-sidebar-row-val--green  { color: #2e6639; }
    .fin-sidebar-row-val--red    { color: #d1523d; }
    .fin-sidebar-row-val--purple { color: #572e88; }
    .fin-sidebar-dept-name { font-size: 0.8rem; font-weight: 500; color: #572e88; }
    .fin-sidebar-recent-label { font-size: 0.78rem; color: #4a3f6a; }
    .fin-sidebar-recent-sub { font-size: 0.7rem; color: #9a90b0; }
    .fin-sidebar-link { display: block; font-size: 0.78rem; font-weight: 600; color: #572e88; text-decoration: none; margin-top: 0.75rem; }
    .fin-sidebar-link:hover { text-decoration: underline; }
    .fin-sidebar-updated { display: flex; align-items: center; gap: 0.35rem; font-size: 0.68rem; color: #b0a8c8; margin-top: 0.85rem; }
    .fin-sidebar-updated svg { width: 12px; height: 12px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>
  <div class="prod-main">
    <div class="hero-wrap">
      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy">
                <span class="page-hierarchy-page">Financials</span>
                <span class="page-hierarchy-sep">-</span>
                <span class="page-hierarchy-sub">Receipts</span>
              </span>
            </div>
            <h1 class="page-subtitle">Receipts</h1>
          </div>
        </div>
        <div class="hero-deco"><img src="/ASSETS/Images/Finance - Schedule.svg" alt="" /></div>
      </div>
    </div>

    <div class="receipts-content" id="fin-content">
      <div style="padding:2rem;text-align:center;color:#9a90b0;font-size:0.9rem">Loading...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SYSTEM/config.js?v=20260610"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=15"></script>
  <script>
  'use strict';

  const FIN = {
    URL: window.SUPABASE_URL || 'https://tkmaiktxpwqfbgeojbnf.supabase.co',
    KEY: window.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8',
    prodId: '',
    receipts: [],
    categories: [],
    showAllReceipts: false,

    init() {
      window.initProductionPage('financials');
      this.prodId = new URLSearchParams(location.search).get('id') || '';
      if (!this.prodId) {
        document.getElementById('fin-content').innerHTML = '<div style="padding:2rem;color:#d1523d">No production ID in URL.</div>';
        return;
      }
      this.load();
    },

    _h()  { return { apikey: this.KEY, Authorization: 'Bearer ' + this.KEY }; },

    async load() {
      try {
        const [rRes, cRes] = await Promise.all([
          fetch(this.URL + '/rest/v1/budget_receipts?production_id=eq.' + this.prodId + '&order=receipt_date.desc,created_at.desc', { headers: this._h() }),
          fetch(this.URL + '/rest/v1/budget_categories?production_id=eq.' + this.prodId + '&type=eq.expense', { headers: this._h() }),
        ]);
        this.receipts   = rRes.ok ? await rRes.json() : [];
        this.categories = cRes.ok ? await cRes.json() : [];
      } catch(e) {
        this.receipts = []; this.categories = [];
      }
      this.render();
    },

    deptName(r) {
      if (r.department) return r.department;
      const cat = this.categories.find(c => c.id === r.category_id);
      return cat ? cat.name : 'Unknown';
    },

    paidByLabel(r) {
      if (r.paid_by === 'personal') return r.submitted_by || 'Personal';
      return 'Production';
    },

    fmt$(cents) {
      return '$' + ((cents || 0) / 100).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    },

    fmtDate(d) {
      if (!d) return '';
      const dt = new Date(d + (d.length === 10 ? 'T12:00:00' : ''));
      return dt.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
    },

    initials(name) {
      if (!name) return '?';
      return name.trim().split(/\s+/).slice(0, 2).map(w => w[0].toUpperCase()).join('');
    },

    avatarColor(name) {
      const colors = [
        ['#e8e4f8','#572e88'], ['#fce9e5','#d1523d'], ['#e5f0e7','#2e6639'],
        ['#e8f0f9','#2a4a80'], ['#fef4e2','#a06b00'], ['#f4e6f0','#8a2a6e'],
      ];
      let h = 0;
      for (let i = 0; i < (name || '').length; i++) h = (h * 31 + (name || '').charCodeAt(i)) & 0xffffffff;
      const c = colors[Math.abs(h) % colors.length];
      return 'background:' + c[0] + ';color:' + c[1];
    },

    esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); },

    // Reimbursements: personal receipts that aren't paid yet
    reimbursementsOwing() {
      const pending = this.receipts.filter(r => r.paid_by === 'personal' && r.status !== 'paid');
      const byPerson = {};
      pending.forEach(r => {
        const key = r.submitted_by || '__unknown__';
        if (!byPerson[key]) byPerson[key] = { name: r.submitted_by || 'Unknown', receipts: [], depts: new Set() };
        byPerson[key].receipts.push(r);
        byPerson[key].depts.add(this.deptName(r));
      });
      return Object.values(byPerson);
    },

    async markPersonPaid(name) {
      const toMark = this.receipts.filter(r =>
        r.paid_by === 'personal' && r.status !== 'paid' &&
        (r.submitted_by || '__unknown__') === (name || '__unknown__')
      );
      if (!toMark.length) return;
      const ids = toMark.map(r => r.id);
      try {
        const r = await fetch(this.URL + '/rest/v1/budget_receipts?id=in.(' + ids.join(',') + ')', {
          method: 'PATCH',
          headers: Object.assign({}, this._h(), { 'Content-Type': 'application/json', Prefer: 'return=minimal' }),
          body: JSON.stringify({ status: 'paid' }),
        });
        if (!r.ok) throw new Error(await r.text());
        await this.load();
      } catch(e) { alert('Could not mark as paid: ' + e.message); }
    },

    render() {
      const el = document.getElementById('fin-content');
      if (!el) return;

      const allReceipts   = this.receipts;
      const totalCents    = allReceipts.reduce((s, r) => s + (r.amount_cents || 0), 0);
      const paidCents     = allReceipts.filter(r => r.paid_by === 'personal' && r.status === 'paid').reduce((s, r) => s + (r.amount_cents || 0), 0);
      const owingPersonal = allReceipts.filter(r => r.paid_by === 'personal' && r.status !== 'paid');
      const owingCents    = owingPersonal.reduce((s, r) => s + (r.amount_cents || 0), 0);
      const owingPeople   = new Set(owingPersonal.map(r => r.submitted_by || 'unknown')).size;
      const allocatedCents= this.categories.reduce((s, c) => s + (c.planned_cents || 0), 0);

      const owing = this.reimbursementsOwing();
      const displayReceipts = this.showAllReceipts ? allReceipts : allReceipts.slice(0, 6);

      // Spending by department
      const byDept = {};
      allReceipts.forEach(r => {
        const d = this.deptName(r);
        byDept[d] = (byDept[d] || 0) + (r.amount_cents || 0);
      });
      const deptEntries = Object.entries(byDept).sort((a, b) => b[1] - a[1]);

      const now = new Date().toLocaleString('en-CA', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });

      el.innerHTML =
        // ── Stat cards ──
        '<div class="fin-stat-row">' +
          this._statCard('purple',
            '<path d="M21 4H3a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1z"/><path d="M1 10h22"/>',
            'Total Spent', this.fmt$(totalCents), 'Across all departments') +
          this._statCard('red',
            '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
            'Needs Reimbursement', this.fmt$(owingCents),
            owingPeople + ' ' + (owingPeople === 1 ? 'person' : 'people') + ' &bull; ' + owingPersonal.length + ' ' + (owingPersonal.length === 1 ? 'receipt' : 'receipts'),
            owingCents > 0) +
          this._statCard('green',
            '<polyline points="20 6 9 17 4 12"/>',
            'Reimbursed', this.fmt$(paidCents),
            allReceipts.filter(r => r.paid_by === 'personal' && r.status === 'paid').length + ' receipts') +
          this._statCard('blue',
            '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
            'Total Receipts', allReceipts.length.toString(), 'This production') +
        '</div>' +

        '<div class="fin-main-grid">' +

          // ── Left column ──
          '<div>' +

            // Reimbursements owing
            '<div class="fin-section">' +
              '<div class="fin-section-title">Reimbursements Owing</div>' +
              '<div class="fin-section-sub">People waiting to be paid</div>' +
              (owing.length ? (
                '<table class="fin-table">' +
                '<thead><tr>' +
                  '<th>Person</th><th>Department</th><th>Receipts</th><th>Amount</th><th>Action</th>' +
                '</tr></thead><tbody>' +
                owing.map(p => {
                  const total = p.receipts.reduce((s, r) => s + (r.amount_cents || 0), 0);
                  const depts = Array.from(p.depts).join(', ');
                  const init  = this.initials(p.name);
                  const avcol = this.avatarColor(p.name);
                  const safeName = this.esc(p.name).replace(/'/g, "\\'");
                  return '<tr>' +
                    '<td><div class="fin-person-cell"><div class="fin-avatar" style="' + avcol + '">' + init + '</div><span class="fin-person-name">' + this.esc(p.name) + '</span></div></td>' +
                    '<td style="color:#7a6e9a">' + this.esc(depts) + '</td>' +
                    '<td style="color:#7a6e9a">' + p.receipts.length + '</td>' +
                    '<td style="font-weight:600">' + this.fmt$(total) + '</td>' +
                    '<td><button class="fin-mark-paid-btn" onclick="FIN.markPersonPaid(\'' + safeName + '\')">Mark as Paid</button></td>' +
                  '</tr>';
                }).join('') +
                '</tbody>' +
                '<tfoot><tr class="fin-total-row">' +
                  '<td colspan="3">Total Owing</td>' +
                  '<td class="fin-total-amount" colspan="2">' + this.fmt$(owingCents) + '</td>' +
                '</tr></tfoot>' +
                '</table>'
              ) : '<div class="fin-empty">No reimbursements outstanding.</div>') +
            '</div>' +

            // All receipts
            '<div class="fin-section">' +
              '<div class="fin-section-title">All Receipts</div>' +
              '<div class="fin-section-sub">' + allReceipts.length + ' ' + (allReceipts.length === 1 ? 'receipt' : 'receipts') + '</div>' +
              (allReceipts.length ? (
                '<table class="fin-table">' +
                '<thead><tr>' +
                  '<th>Date</th><th>Department</th><th>Store / Supplier</th><th>Purpose</th><th>Amount</th><th>Paid By</th><th>Status</th><th>Download</th>' +
                '</tr></thead><tbody>' +
                displayReceipts.map(r => {
                  const badgeCls = r.status === 'paid' ? 'fin-badge--paid' : r.status === 'approved' ? 'fin-badge--approved' : 'fin-badge--pending';
                  const badgeLabel = r.status === 'paid' ? (r.paid_by === 'personal' ? 'Reimbursed' : 'Paid') : r.status === 'approved' ? 'Approved' : 'Pending';
                  const dl = r.receipt_url
                    ? '<a href="' + this.esc(r.receipt_url) + '" target="_blank" class="fin-download-btn" title="Download receipt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></a>'
                    : '<span style="color:#d6d0ea;display:flex;align-items:center"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>';
                  return '<tr>' +
                    '<td style="white-space:nowrap;color:#7a6e9a">' + this.esc(this.fmtDate(r.receipt_date || r.created_at)) + '</td>' +
                    '<td>' + this.esc(this.deptName(r)) + '</td>' +
                    '<td style="font-weight:500">' + this.esc(r.vendor || '') + '</td>' +
                    '<td style="color:#7a6e9a;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + this.esc(r.description || '') + '</td>' +
                    '<td style="font-weight:600;white-space:nowrap">' + this.fmt$(r.amount_cents) + '</td>' +
                    '<td style="color:#7a6e9a">' + this.esc(this.paidByLabel(r)) + '</td>' +
                    '<td><span class="fin-badge ' + badgeCls + '">' + badgeLabel + '</span></td>' +
                    '<td>' + dl + '</td>' +
                  '</tr>';
                }).join('') +
                '</tbody></table>' +
                (!this.showAllReceipts && allReceipts.length > 6
                  ? '<button class="fin-view-all" onclick="FIN.showAll()">View all ' + allReceipts.length + ' receipts &rarr;</button>'
                  : '')
              ) : '<div class="fin-empty">No receipts yet.</div>') +
            '</div>' +

          '</div>' + // end left col

          // ── Sidebar ──
          '<div class="fin-sidebar-panel">' +
            '<div class="fin-sidebar-title">Production Spending Summary</div>' +

            '<div class="fin-sidebar-section">' +
              '<div class="fin-sidebar-section-label">Total Spent</div>' +
              '<div class="fin-sidebar-total">' + this.fmt$(totalCents) + '</div>' +
            '</div>' +

            '<div class="fin-sidebar-section">' +
              '<div class="fin-sidebar-section-label">Reimbursements</div>' +
              '<div class="fin-sidebar-row"><span class="fin-sidebar-row-label">Paid (Reimbursed)</span><span class="fin-sidebar-row-val fin-sidebar-row-val--green">' + this.fmt$(paidCents) + '</span></div>' +
              '<div class="fin-sidebar-row"><span class="fin-sidebar-row-label">Owing</span><span class="fin-sidebar-row-val fin-sidebar-row-val--red">' + this.fmt$(owingCents) + '</span></div>' +
              (allocatedCents > 0 ? '<div class="fin-sidebar-row"><span class="fin-sidebar-row-label">Remaining (from budget)</span><span class="fin-sidebar-row-val fin-sidebar-row-val--purple">' + this.fmt$(Math.max(0, allocatedCents - totalCents)) + '</span></div>' : '') +
            '</div>' +

            (deptEntries.length ? (
              '<div class="fin-sidebar-section">' +
              '<div class="fin-sidebar-section-label">Spending by Department</div>' +
              deptEntries.slice(0, 6).map(([dept, cents]) =>
                '<div class="fin-sidebar-row"><span class="fin-sidebar-dept-name">' + this.esc(dept) + '</span><span class="fin-sidebar-row-val">' + this.fmt$(cents) + '</span></div>'
              ).join('') +
              '</div>'
            ) : '') +

            (allReceipts.length ? (
              '<div class="fin-sidebar-section">' +
              '<div class="fin-sidebar-section-label">Recent Purchases</div>' +
              allReceipts.slice(0, 5).map(r =>
                '<div class="fin-sidebar-row" style="margin-bottom:0.55rem">' +
                  '<div><div class="fin-sidebar-recent-label">' + this.esc(r.vendor || 'Unknown') + ' <span style="color:#b0a8c8;font-weight:400;font-size:0.7rem">(' + this.esc(r.description || '') + ')</span></div></div>' +
                  '<span class="fin-sidebar-row-val">' + this.fmt$(r.amount_cents) + '</span>' +
                '</div>'
              ).join('') +
              '<button class="fin-view-all" onclick="FIN.showAll()">View all receipts &rarr;</button>' +
              '</div>'
            ) : '') +

            '<div class="fin-sidebar-updated"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Last updated: ' + now + '</div>' +
          '</div>' + // end sidebar

        '</div>'; // end main grid
    },

    _statCard(type, svgPath, label, val, sub, warnSub) {
      return '<div class="fin-stat-card">' +
        '<div class="fin-stat-icon fin-stat-icon--' + type + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + svgPath + '</svg></div>' +
        '<div class="fin-stat-body">' +
          '<div class="fin-stat-label">' + label + '</div>' +
          '<div class="fin-stat-val">' + this.esc(val) + '</div>' +
          '<div class="fin-stat-sub' + (warnSub ? ' fin-stat-sub--warn' : '') + '">' + sub + '</div>' +
        '</div>' +
      '</div>';
    },

    showAll() {
      this.showAllReceipts = true;
      this.render();
    },
  };

  window.addEventListener('DOMContentLoaded', () => FIN.init());
  </script>
</body>
</html>
