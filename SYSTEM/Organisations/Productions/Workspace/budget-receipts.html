<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipts - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v46-20260610" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #f5f4f8; font-family: var(--bts-font, 'Inter', sans-serif); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }

    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; display: flex; flex-direction: column; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }

    /* Hero */
    .hero-wrap { padding: 2rem 2.25rem 0; position: relative; z-index: 1; }
    .aud-visual-hero { margin-bottom: 0; overflow: hidden; }
    .hero-deco { position: absolute; right: 0; top: 0; bottom: 0; width: 220px; display: flex; align-items: center; justify-content: flex-end; pointer-events: none; overflow: hidden; }
    .hero-deco img { height: 130px; width: auto; object-fit: contain; opacity: 0.15; filter: brightness(0) invert(1); }
    .page-hierarchy { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 0.4rem; color: rgba(255,255,255,0.88); font-size: 0.78rem; }
    .page-hierarchy-page { color: #efab45; font-weight: 950; letter-spacing: 0.08em; text-transform: uppercase; }
    .page-hierarchy-sep, .page-hierarchy-sub { color: rgba(255,255,255,0.82); font-weight: 500; }
    .page-subtitle { margin: 0.35rem 0 0; color: #fff; font-size: clamp(2.1rem, 4.6vw, 3.7rem); line-height: 0.98; font-weight: 950; }

    /* Content */
    .receipts-content { flex: 1; padding: 1.5rem 2.25rem 2.5rem; position: relative; z-index: 1; }

    /* Top summary strip */
    .rp-summary { display: flex; gap: 0.85rem; margin-bottom: 1.5rem; overflow-x: visible; flex-wrap: wrap; }
    .rp-dept-card { flex: 1 1 160px; min-width: 0; background: #fff; border: 1px solid rgba(87,46,136,0.1); border-radius: 14px; padding: 1rem 1.1rem; box-shadow: 0 2px 8px rgba(87,46,136,0.06); cursor: pointer; transition: box-shadow 0.14s, border-color 0.14s; position: relative; }
    .rp-dept-card:hover { box-shadow: 0 4px 16px rgba(87,46,136,0.12); }
    .rp-dept-card.active { border-color: var(--dept-color, #572e88); box-shadow: 0 4px 16px rgba(87,46,136,0.14); }
    .rp-card-badge { position: absolute; top: -6px; right: -6px; min-width: 22px; height: 22px; border-radius: 999px; font-size: 0.7rem; font-weight: 900; display: flex; align-items: center; justify-content: center; padding: 0 5px; border: 2px solid #fff; }
    .rp-card-badge--pending  { background: #d1523d; color: #fff; }
    .rp-card-badge--approved { background: #dd8233; color: #fff; }
    .rp-card-badge--done     { background: #769e7b; color: #fff; }
    .rp-card-icon { font-size: 1.75rem; margin-bottom: 0.3rem; line-height: 1; }
    .rp-card-name { font-size: 0.78rem; font-weight: 900; color: #1a1530; margin-bottom: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rp-card-big { font-size: 1.7rem; font-weight: 950; line-height: 1; margin-bottom: 0.15rem; }
    .rp-card-sub { font-size: 0.7rem; font-weight: 700; color: #9a90b0; margin-bottom: 0.5rem; }
    .rp-card-dots { display: flex; gap: 0.55rem; align-items: center; }
    .rp-dot-group { display: flex; align-items: center; gap: 0.2rem; font-size: 0.72rem; font-weight: 800; }
    .rp-dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
    .rp-dot--red    { background: #d1523d; }
    .rp-dot--yellow { background: #efab45; }
    .rp-dot--green  { background: #769e7b; }

    /* Outstanding card */
    .rp-outstanding-card { flex: 0 0 auto; min-width: 160px; background: linear-gradient(135deg, #572e88 0%, #476aaa 100%); border-radius: 14px; padding: 1rem 1.25rem; box-shadow: 0 4px 16px rgba(87,46,136,0.25); display: flex; flex-direction: column; justify-content: center; }
    .rp-outstanding-label { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.75); margin-bottom: 0.3rem; }
    .rp-outstanding-val { font-size: 1.65rem; font-weight: 950; color: #efab45; line-height: 1; margin-bottom: 0.2rem; }
    .rp-outstanding-sub { font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.7); }

    /* Main workspace */
    .rp-workspace { display: grid; grid-template-columns: 260px 1fr; gap: 1.25rem; align-items: start; }

    /* Left panel */
    .rp-left { }
    .rp-left-title { font-size: 1rem; font-weight: 950; color: #1a1530; margin: 0 0 0.2rem; }
    .rp-left-sub   { font-size: 0.78rem; color: #9a90b0; font-weight: 600; margin: 0 0 0.85rem; }
    .rp-dept-list { background: #fff; border: 1px solid rgba(87,46,136,0.1); border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(87,46,136,0.05); }
    .rp-dept-row { display: flex; align-items: center; gap: 0.65rem; padding: 0.8rem 0.9rem; border-bottom: 1px solid rgba(87,46,136,0.06); cursor: pointer; transition: background 0.12s; }
    .rp-dept-row:last-child { border-bottom: none; }
    .rp-dept-row:hover { background: rgba(87,46,136,0.03); }
    .rp-dept-row.active { background: rgba(87,46,136,0.055); }
    .rp-dept-row-icon { font-size: 1.35rem; flex: 0 0 auto; }
    .rp-dept-row-info { flex: 1; min-width: 0; }
    .rp-dept-row-name { font-size: 0.86rem; font-weight: 800; color: #1a1530; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rp-dept-row-pend { font-size: 0.72rem; font-weight: 700; }
    .rp-dept-row-pend--red    { color: #d1523d; }
    .rp-dept-row-pend--yellow { color: #dd8233; }
    .rp-dept-row-pend--ok     { color: #9a90b0; }
    .rp-dept-row-counts { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .rp-dept-row-chevron { color: #c8c0da; font-size: 0.65rem; flex-shrink: 0; }

    /* Great job card */
    .rp-great-job { background: #fff; border: 1px solid rgba(87,46,136,0.1); border-radius: 14px; padding: 1rem 1.1rem; margin-top: 0.85rem; box-shadow: 0 2px 8px rgba(87,46,136,0.05); }
    .rp-great-job-title { font-size: 0.88rem; font-weight: 900; color: #1a1530; margin-bottom: 0.2rem; }
    .rp-great-job-sub { font-size: 0.76rem; color: #9a90b0; font-weight: 600; }

    /* Right: kanban */
    .rp-right { min-width: 0; }
    .rp-kanban-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .rp-kanban-dept-icon { font-size: 1.4rem; }
    .rp-kanban-dept-name { font-size: 1.2rem; font-weight: 950; color: #1a1530; }
    .rp-kanban-badge { display: inline-flex; align-items: center; padding: 0.18rem 0.55rem; border-radius: 999px; font-size: 0.72rem; font-weight: 900; background: rgba(209,82,61,0.12); color: #d1523d; }
    .rp-view-summary { margin-left: auto; display: inline-flex; align-items: center; gap: 0.35rem; background: none; border: 1.5px solid rgba(87,46,136,0.2); border-radius: 8px; padding: 0.4rem 0.8rem; font-family: inherit; font-size: 0.8rem; font-weight: 800; color: #572e88; cursor: pointer; }
    .rp-view-summary:hover { background: rgba(87,46,136,0.07); }

    .rp-kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.85rem; align-items: start; }
    .rp-col { border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; }
    .rp-col--pending  { background: rgba(209,82,61,0.05); border: 1px solid rgba(209,82,61,0.15); }
    .rp-col--approved { background: rgba(221,130,51,0.05); border: 1px solid rgba(221,130,51,0.15); }
    .rp-col--paid     { background: rgba(118,158,123,0.06); border: 1px solid rgba(118,158,123,0.2); }
    .rp-col-head { padding: 0.75rem 1rem; font-size: 0.7rem; font-weight: 900; letter-spacing: 0.09em; text-transform: uppercase; display: flex; align-items: center; gap: 0.4rem; }
    .rp-col-head--pending  { color: #d1523d; }
    .rp-col-head--approved { color: #b86010; }
    .rp-col-head--paid     { color: #3d7a48; }
    .rp-col-count { font-size: 0.7rem; font-weight: 900; padding: 0.1rem 0.45rem; border-radius: 999px; }
    .rp-col-count--pending  { background: rgba(209,82,61,0.12); color: #d1523d; }
    .rp-col-count--approved { background: rgba(221,130,51,0.12); color: #b86010; }
    .rp-col-count--paid     { background: rgba(118,158,123,0.14); color: #3d7a48; }
    .rp-col-body { padding: 0 0.6rem; flex: 1; max-height: 56vh; overflow-y: auto; }
    .rp-col-foot { padding: 0.6rem; }

    /* Receipt card */
    .rp-card { background: #fff; border-radius: 10px; padding: 0.85rem; margin-bottom: 0.55rem; box-shadow: 0 1px 6px rgba(87,46,136,0.07); }
    .rp-card-top { display: flex; gap: 0.6rem; margin-bottom: 0.55rem; }
    .rp-receipt-thumb { width: 42px; height: 52px; background: rgba(87,46,136,0.06); border-radius: 6px; flex: 0 0 42px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #b0a8c8; overflow: hidden; }
    .rp-receipt-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .rp-card-info { flex: 1; min-width: 0; }
    .rp-card-vendor { font-size: 0.9rem; font-weight: 900; color: #1a1530; margin-bottom: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rp-card-amount--pending  { font-size: 0.92rem; font-weight: 900; color: #d1523d; }
    .rp-card-amount--approved { font-size: 0.92rem; font-weight: 900; color: #b86010; }
    .rp-card-amount--paid     { font-size: 0.92rem; font-weight: 900; color: #3d7a48; }
    .rp-card-desc { font-size: 0.76rem; color: #7a6e9a; font-weight: 600; margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rp-card-meta { font-size: 0.72rem; color: #9a90b0; font-weight: 600; margin-top: 0.1rem; }
    .rp-card-actions { display: flex; gap: 0.45rem; align-items: center; flex-wrap: wrap; }
    .rp-card-dot-menu { margin-left: auto; background: none; border: none; cursor: pointer; color: #b0a8c8; font-size: 1rem; padding: 0.1rem 0.3rem; border-radius: 5px; }
    .rp-card-dot-menu:hover { background: rgba(87,46,136,0.09); color: #572e88; }

    .rp-payment-tag { display: inline-flex; align-items: center; padding: 0.17rem 0.5rem; border-radius: 999px; font-size: 0.65rem; font-weight: 800; background: rgba(118,158,123,0.14); color: #3d7a48; margin-top: 0.5rem; }

    /* Action menu */
    .rp-action-wrap { position: relative; display: inline-block; }
    .rp-action-menu { display: none; position: absolute; right: 0; top: 100%; z-index: 400; background: #fff; border: 1px solid rgba(87,46,136,0.15); border-radius: 10px; box-shadow: 0 6px 20px rgba(87,46,136,0.14); min-width: 148px; padding: 0.3rem; }
    .rp-action-menu.open { display: block; }
    .rp-action-item { display: block; width: 100%; text-align: left; background: none; border: none; padding: 0.45rem 0.7rem; font-family: inherit; font-size: 0.82rem; font-weight: 700; color: #2a2040; border-radius: 7px; cursor: pointer; }
    .rp-action-item:hover { background: rgba(87,46,136,0.07); }
    .rp-action-item.danger { color: #d1523d; }
    .rp-action-item.danger:hover { background: rgba(209,82,61,0.07); }

    /* Buttons */
    .rp-btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.42rem 0.8rem; border-radius: 7px; font-family: inherit; font-size: 0.78rem; font-weight: 800; cursor: pointer; border: none; transition: background 0.12s; white-space: nowrap; }
    .rp-btn--approve { background: rgba(118,158,123,0.12); color: #3d7a48; }
    .rp-btn--approve:hover { background: rgba(118,158,123,0.22); }
    .rp-btn--reject { background: rgba(209,82,61,0.1); color: #d1523d; }
    .rp-btn--reject:hover { background: rgba(209,82,61,0.18); }
    .rp-btn--paid { background: rgba(71,106,170,0.1); color: #2a4a80; }
    .rp-btn--paid:hover { background: rgba(71,106,170,0.18); }
    .rp-btn--ghost { background: rgba(87,46,136,0.07); color: #572e88; }
    .rp-btn--ghost:hover { background: rgba(87,46,136,0.13); }
    .rp-btn--add { display: flex; align-items: center; justify-content: center; gap: 0.35rem; width: 100%; padding: 0.6rem; border-radius: 8px; font-family: inherit; font-size: 0.82rem; font-weight: 800; cursor: pointer; border: 1.5px dashed; background: transparent; transition: background 0.12s; }
    .rp-btn--add-pending  { border-color: rgba(209,82,61,0.3); color: #d1523d; }
    .rp-btn--add-pending:hover  { background: rgba(209,82,61,0.06); }
    .rp-btn--add-approved { border-color: rgba(221,130,51,0.3); color: #b86010; }
    .rp-btn--add-approved:hover { background: rgba(221,130,51,0.06); }
    .rp-btn--add-paid     { border-color: rgba(118,158,123,0.35); color: #3d7a48; }
    .rp-btn--add-paid:hover     { background: rgba(118,158,123,0.07); }

    /* Modals */
    .rp-modal-over { display: none; position: fixed; inset: 0; background: rgba(15,14,28,0.55); z-index: 9000; align-items: center; justify-content: center; padding: 1rem; }
    .rp-modal-over.open { display: flex; }
    .rp-modal { background: #fff; border-radius: 18px; padding: 2rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(87,46,136,0.2); }
    .rp-modal--wide { max-width: 600px; }
    .rp-modal-title { font-size: 1.05rem; font-weight: 900; color: #1a1530; margin: 0 0 1.25rem; }
    .rp-modal-footer { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.5rem; flex-wrap: wrap; }
    .rp-field { margin-bottom: 1rem; }
    .rp-field label { display: block; font-size: 0.74rem; font-weight: 800; color: #6b5f8a; margin-bottom: 0.3rem; }
    .rp-field input, .rp-field select, .rp-field textarea { width: 100%; padding: 0.58rem 0.8rem; border: 1.5px solid rgba(87,46,136,0.18); border-radius: 8px; font-family: inherit; font-size: 0.9rem; color: #1a1530; background: #fff; }
    .rp-field input:focus, .rp-field select:focus, .rp-field textarea:focus { outline: none; border-color: #572e88; }
    .rp-field textarea { resize: vertical; min-height: 60px; }
    .rp-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }

    /* Summary modal */
    .rp-sum-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; margin-top: 0.75rem; }
    .rp-sum-table th { text-align: left; padding: 0.45rem 0.6rem; font-size: 0.65rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: #9a90b0; border-bottom: 2px solid rgba(87,46,136,0.1); }
    .rp-sum-table td { padding: 0.6rem 0.6rem; border-bottom: 1px solid rgba(87,46,136,0.07); font-weight: 700; color: #1a1530; }
    .rp-sum-table tr:last-child td { border-bottom: none; font-weight: 900; }

    /* Empty state */
    .rp-empty { padding: 2.5rem 1rem; text-align: center; color: #b0a8c8; font-size: 0.86rem; font-weight: 700; font-style: italic; }

    /* No dept selected */
    .rp-no-dept { background: #fff; border: 1px solid rgba(87,46,136,0.1); border-radius: 14px; padding: 3rem; text-align: center; box-shadow: 0 2px 8px rgba(87,46,136,0.05); }
    .rp-no-dept-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.5; }
    .rp-no-dept-text { font-size: 0.9rem; font-weight: 700; color: #b0a8c8; }

    /* Mobile tabs for kanban columns */
    .rp-col-tabs { display: none; gap: 0; background: #fff; border: 1px solid rgba(87,46,136,0.12); border-radius: 10px; overflow: hidden; margin-bottom: 0.85rem; }
    .rp-col-tab { flex: 1; padding: 0.55rem 0.5rem; font-size: 0.78rem; font-weight: 800; text-align: center; cursor: pointer; border: none; background: none; font-family: inherit; color: #9a90b0; border-bottom: 2px solid transparent; }
    .rp-col-tab.active { color: #572e88; border-bottom-color: #572e88; }

    /* Responsive */
    @media (max-width: 1150px) { .rp-workspace { grid-template-columns: 230px 1fr; } }
    @media (max-width: 980px)  { .rp-workspace { grid-template-columns: 1fr; } }
    @media (max-width: 900px)  { .prod-main { margin-left: 0; max-width: 100vw; } .prod-main::before { inset: 0; } .hero-wrap { padding: 4.5rem 1rem 0; } .receipts-content { padding: 1.25rem 1rem 2rem; } .rp-summary { flex-wrap: wrap; } .rp-dept-card { flex: 1 1 130px; } }
    @media (max-width: 750px)  { .rp-kanban { grid-template-columns: 1fr; } .rp-col-tabs { display: flex; } .rp-col { display: none; } .rp-col.col-visible { display: flex; } }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="hero-wrap">
      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy">
                <span class="page-hierarchy-page">Financials</span>
                <span class="page-hierarchy-sep">-</span>
                <span class="page-hierarchy-sub">Receipts</span>
              </span>
            </div>
            <h1 class="page-subtitle">Receipts</h1>
          </div>
        </div>
        <div class="hero-deco"><img src="/ASSETS/Images/Finance - Schedule.svg" alt="" /></div>
      </div>
    </div>

    <div class="receipts-content">

      <!-- Top summary strip -->
      <div class="rp-summary" id="rp-summary">
        <div style="padding:1rem;color:#9a90b0;font-size:0.86rem">Loading...</div>
      </div>

      <!-- Main workspace -->
      <div class="rp-workspace">
        <!-- Left panel -->
        <div class="rp-left">
          <div class="rp-left-title">Departments</div>
          <div class="rp-left-sub">Click a department to review receipts</div>
          <div class="rp-dept-list" id="rp-dept-list">
            <div style="padding:1.25rem;color:#9a90b0;font-size:0.86rem;text-align:center">Loading...</div>
          </div>
          <div id="rp-great-job" style="display:none" class="rp-great-job">
            <div class="rp-great-job-title">&#10024; Great job!</div>
            <div class="rp-great-job-sub" id="rp-great-job-sub"></div>
          </div>
        </div>

        <!-- Right kanban -->
        <div class="rp-right">
          <div id="rp-kanban-area">
            <div class="rp-no-dept">
              <div class="rp-no-dept-icon">&#128194;</div>
              <div class="rp-no-dept-text">Select a department on the left<br>to review its receipts.</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Add / Edit receipt modal -->
  <div class="rp-modal-over" id="rp-receipt-modal">
    <div class="rp-modal">
      <div class="rp-modal-title" id="rp-receipt-modal-title">Add Receipt</div>
      <input type="hidden" id="rp-receipt-id" />
      <div class="rp-field"><label>Vendor / Store *</label><input type="text" id="rp-vendor" placeholder="e.g. Fabricland" /></div>
      <div class="rp-row-2">
        <div class="rp-field"><label>Amount ($) *</label><input type="number" id="rp-amount" min="0" step="0.01" placeholder="0.00" /></div>
        <div class="rp-field"><label>Date</label><input type="date" id="rp-date" /></div>
      </div>
      <div class="rp-field"><label>Description / Purchase</label><input type="text" id="rp-desc" placeholder="e.g. Mary Coat Fabric" /></div>
      <div class="rp-row-2">
        <div class="rp-field"><label>Submitted By</label><input type="text" id="rp-submitted-by" placeholder="Name" /></div>
        <div class="rp-field"><label>Status</label>
          <select id="rp-status">
            <option value="pending">Pending Approval</option>
            <option value="approved">Approved</option>
            <option value="paid">Paid</option>
          </select>
        </div>
      </div>
      <div class="rp-field" id="rp-payment-field"><label>Payment Method</label>
        <select id="rp-payment">
          <option value="E-Transfer">E-Transfer</option>
          <option value="Cash">Cash</option>
          <option value="Cheque">Cheque</option>
          <option value="Credit Applied">Credit Applied</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="rp-field"><label>Notes (optional)</label><textarea id="rp-notes" placeholder="Any additional notes..."></textarea></div>
      <div class="rp-modal-footer">
        <button class="rp-btn rp-btn--ghost" onclick="RP.closeReceiptModal()">Cancel</button>
        <button class="rp-btn rp-btn--approve" onclick="RP.saveReceipt()">Save Receipt</button>
      </div>
    </div>
  </div>

  <!-- View Summary modal -->
  <div class="rp-modal-over" id="rp-summary-modal">
    <div class="rp-modal rp-modal--wide">
      <div class="rp-modal-title" id="rp-summary-modal-title">Summary</div>
      <div id="rp-summary-modal-body"></div>
      <div class="rp-modal-footer">
        <button class="rp-btn rp-btn--ghost" onclick="RP.closeSummaryModal()">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=13"></script>
  <script>
  'use strict';

  const RP = {
    URL: 'https://tkmaiktxpwqfbgeojbnf.supabase.co',
    KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDc4NTI4NTYsImV4cCI6MjAyMzQyODg1Nn0.tVxOMkaMdBnuqQbLdHl00h4WA7DV8LHuVxCt6z5LFCY',

    DEPT_ICONS: {
      costume: '&#128248;', dress: '&#128248;', wear: '&#128248;',
      set: '&#128296;', construct: '&#128296;', build: '&#128296;', scenery: '&#128296;',
      prop: '&#127897;',
      market: '&#128226;', promot: '&#128226;', publicist: '&#128226;',
      music: '&#127925;', sound: '&#127925;', audio: '&#127925;',
      hair: '&#9988;',
      makeup: '&#128132;',
      light: '&#128161;', technical: '&#127916;',
      transport: '&#128656;', venue: '&#127980;',
      hospitality: '&#127829;',
    },

    prodId: '',
    depts: [],
    receipts: [],
    selectedDeptId: null,
    mobileTab: 'pending',

    init() {
      this.prodId = new URLSearchParams(location.search).get('id') || '';
      if (!this.prodId) {
        document.getElementById('rp-summary').innerHTML = '<div style="padding:1rem;color:#d1523d;font-size:0.9rem">No production ID found in URL.</div>';
        return;
      }
      document.getElementById('rp-status').addEventListener('change', () => {
        const pf = document.getElementById('rp-payment-field');
        if (pf) pf.style.display = document.getElementById('rp-status').value === 'paid' ? 'block' : 'none';
      });
      document.getElementById('rp-payment-field').style.display = 'none';
      this.load();
      document.addEventListener('click', e => {
        if (!e.target.closest('.rp-action-wrap')) {
          document.querySelectorAll('.rp-action-menu.open').forEach(m => m.classList.remove('open'));
        }
      });
    },

    // Data ─────────────────────────────────────────────────────────────────
    async load() {
      try {
        const [dRes, rRes] = await Promise.all([
          fetch(this.URL + '/rest/v1/budget_categories?production_id=eq.' + this.prodId + '&type=eq.expense&order=sort_order.asc,created_at.asc', { headers: this._h() }),
          fetch(this.URL + '/rest/v1/budget_receipts?production_id=eq.' + this.prodId + '&order=created_at.desc', { headers: this._h() }),
        ]);
        this.depts    = dRes.ok ? await dRes.json() : [];
        this.receipts = rRes.ok ? await rRes.json() : [];
      } catch(_) { this.depts = []; this.receipts = []; }
      this.renderAll();
    },

    _h()  { return { apikey: this.KEY, Authorization: 'Bearer ' + this.KEY }; },
    _hj() { return Object.assign({}, this._h(), { 'Content-Type': 'application/json', Prefer: 'return=representation' }); },

    async _post(table, data) {
      const r = await fetch(this.URL + '/rest/v1/' + table, { method: 'POST', headers: this._hj(), body: JSON.stringify(Object.assign({}, data, { production_id: this.prodId })) });
      if (!r.ok) throw new Error(await r.text());
      const t = await r.text(); return t ? JSON.parse(t) : [];
    },
    async _patch(table, id, data) {
      const r = await fetch(this.URL + '/rest/v1/' + table + '?id=eq.' + id, { method: 'PATCH', headers: this._hj(), body: JSON.stringify(data) });
      if (!r.ok) throw new Error(await r.text());
      const t = await r.text(); return t ? JSON.parse(t) : [];
    },
    async _del(table, id) {
      const r = await fetch(this.URL + '/rest/v1/' + table + '?id=eq.' + id, { method: 'DELETE', headers: this._h() });
      if (!r.ok) throw new Error(await r.text());
    },

    // Render ───────────────────────────────────────────────────────────────
    renderAll() {
      this.renderSummaryStrip();
      this.renderDeptList();
      if (this.selectedDeptId) this.renderKanban(this.selectedDeptId);
    },

    _deptReceipts(deptId) { return this.receipts.filter(r => r.category_id === deptId); },
    _deptStats(deptId) {
      const recs = this._deptReceipts(deptId);
      return {
        pending:  recs.filter(r => r.status === 'pending').length,
        approved: recs.filter(r => r.status === 'approved').length,
        paid:     recs.filter(r => r.status === 'paid').length,
        total:    recs.length,
        outstanding: recs.filter(r => r.status === 'approved').reduce((a, r) => a + (r.amount_cents || 0), 0),
      };
    },

    renderSummaryStrip() {
      const el = document.getElementById('rp-summary');
      if (!el) return;
      const totalOutstanding = this.receipts.filter(r => r.status === 'approved').reduce((a, r) => a + (r.amount_cents || 0), 0);

      const cards = this.depts.map(d => {
        const st = this._deptStats(d.id);
        const icon = this._deptIcon(d.name);
        const color = d.color || '#572e88';
        const badge = st.pending > 0
          ? '<span class="rp-card-badge rp-card-badge--pending">' + st.pending + '</span>'
          : st.approved > 0
            ? '<span class="rp-card-badge rp-card-badge--approved">' + st.approved + '</span>'
            : '<span class="rp-card-badge rp-card-badge--done">&#10003;</span>';
        return (
          '<div class="rp-dept-card' + (this.selectedDeptId === d.id ? ' active' : '') + '" style="--dept-color:' + color + '" onclick="RP.selectDept(\'' + d.id + '\')">' +
            badge +
            '<div class="rp-card-icon">' + icon + '</div>' +
            '<div class="rp-card-name">' + this.esc(d.name) + '</div>' +
            '<div class="rp-card-big" style="color:' + (st.pending > 0 ? '#d1523d' : st.approved > 0 ? '#dd8233' : '#769e7b') + '">' + (st.pending > 0 ? st.pending : st.approved > 0 ? st.approved : '&#10003;') + '</div>' +
            '<div class="rp-card-sub">' + (st.pending > 0 ? 'Pending' : st.approved > 0 ? 'Approved' : 'All Clear') + '</div>' +
            '<div class="rp-card-dots">' +
              '<div class="rp-dot-group"><span class="rp-dot rp-dot--red"></span>' + st.pending + '</div>' +
              '<div class="rp-dot-group"><span class="rp-dot rp-dot--yellow"></span>' + st.approved + '</div>' +
              '<div class="rp-dot-group"><span class="rp-dot rp-dot--green"></span>' + st.paid + '</div>' +
            '</div>' +
          '</div>'
        );
      }).join('');

      el.innerHTML = cards +
        '<div class="rp-outstanding-card">' +
          '<div class="rp-outstanding-label">Total Outstanding</div>' +
          '<div class="rp-outstanding-val">' + this.fmt$(totalOutstanding) + '</div>' +
          '<div class="rp-outstanding-sub">Across all departments</div>' +
        '</div>';
    },

    renderDeptList() {
      const el = document.getElementById('rp-dept-list');
      if (!el) return;
      if (!this.depts.length) {
        el.innerHTML = '<div style="padding:1.25rem;color:#9a90b0;font-size:0.86rem;text-align:center">No expense categories found.<br>Add categories on the Budgeting page.</div>';
        return;
      }
      el.innerHTML = this.depts.map(d => {
        const st = this._deptStats(d.id);
        const icon = this._deptIcon(d.name);
        const pendCls = st.pending > 0 ? 'rp-dept-row-pend--red' : st.approved > 0 ? 'rp-dept-row-pend--yellow' : 'rp-dept-row-pend--ok';
        const pendLabel = st.pending > 0 ? st.pending + ' Pending' : st.approved > 0 ? st.approved + ' Approved' : '0 Pending';
        return (
          '<div class="rp-dept-row' + (this.selectedDeptId === d.id ? ' active' : '') + '" onclick="RP.selectDept(\'' + d.id + '\')">' +
            '<div class="rp-dept-row-icon">' + icon + '</div>' +
            '<div class="rp-dept-row-info">' +
              '<div class="rp-dept-row-name">' + this.esc(d.name) + '</div>' +
              '<div class="rp-dept-row-pend ' + pendCls + '">' + pendLabel + '</div>' +
            '</div>' +
            '<div class="rp-dept-row-counts">' +
              '<div class="rp-dot-group"><span class="rp-dot rp-dot--red"></span>' + st.pending + '</div>' +
              '<div class="rp-dot-group"><span class="rp-dot rp-dot--yellow"></span>' + st.approved + '</div>' +
              '<div class="rp-dot-group"><span class="rp-dot rp-dot--green"></span>' + st.paid + '</div>' +
            '</div>' +
            '<span class="rp-dept-row-chevron">&#9654;</span>' +
          '</div>'
        );
      }).join('');

      const caughtUp = this.depts.filter(d => { const st = this._deptStats(d.id); return st.pending === 0 && st.approved === 0; });
      const gjEl  = document.getElementById('rp-great-job');
      const gjSub = document.getElementById('rp-great-job-sub');
      if (gjEl && gjSub) {
        if (caughtUp.length > 0) {
          gjEl.style.display = 'block';
          gjSub.textContent = 'You\'re all caught up in ' + caughtUp.length + ' department' + (caughtUp.length > 1 ? 's' : '') + '!';
        } else {
          gjEl.style.display = 'none';
        }
      }
    },

    renderKanban(deptId) {
      const el = document.getElementById('rp-kanban-area');
      if (!el) return;
      const dept = this.depts.find(d => d.id === deptId);
      if (!dept) return;
      const icon  = this._deptIcon(dept.name);
      const recs  = this._deptReceipts(deptId);
      const st    = this._deptStats(deptId);
      const color = dept.color || '#572e88';

      const pending  = recs.filter(r => r.status === 'pending');
      const approved = recs.filter(r => r.status === 'approved');
      const paid     = recs.filter(r => r.status === 'paid');

      el.innerHTML =
        '<div class="rp-kanban-header">' +
          '<span class="rp-kanban-dept-icon">' + icon + '</span>' +
          '<span class="rp-kanban-dept-name">' + this.esc(dept.name) + '</span>' +
          (st.pending > 0 ? '<span class="rp-kanban-badge">' + st.pending + ' Pending</span>' : '') +
          '<button class="rp-view-summary" onclick="RP.openSummaryModal(\'' + deptId + '\')">&#x1F4CA; View summary</button>' +
        '</div>' +
        '<div class="rp-col-tabs" id="rp-col-tabs">' +
          '<button class="rp-col-tab' + (this.mobileTab === 'pending'  ? ' active' : '') + '" onclick="RP.setMobileTab(\'pending\')">Pending (' + pending.length + ')</button>' +
          '<button class="rp-col-tab' + (this.mobileTab === 'approved' ? ' active' : '') + '" onclick="RP.setMobileTab(\'approved\')">Approved (' + approved.length + ')</button>' +
          '<button class="rp-col-tab' + (this.mobileTab === 'paid'     ? ' active' : '') + '" onclick="RP.setMobileTab(\'paid\')">Paid (' + paid.length + ')</button>' +
        '</div>' +
        '<div class="rp-kanban">' +
          '<div class="rp-col rp-col--pending' + (this.mobileTab === 'pending' ? ' col-visible' : '') + '" id="rp-col-pending">' +
            '<div class="rp-col-head rp-col-head--pending">Pending Approval <span class="rp-col-count rp-col-count--pending">' + pending.length + '</span></div>' +
            '<div class="rp-col-body">' + (pending.length ? pending.map(r => this._pendingCardHtml(r)).join('') : '<div class="rp-empty">No pending receipts.</div>') + '</div>' +
            '<div class="rp-col-foot"><button class="rp-btn--add rp-btn--add-pending" onclick="RP.openReceiptModal(null,\'pending\',\'' + deptId + '\')">+ Add receipt</button></div>' +
          '</div>' +
          '<div class="rp-col rp-col--approved' + (this.mobileTab === 'approved' ? ' col-visible' : '') + '" id="rp-col-approved">' +
            '<div class="rp-col-head rp-col-head--approved">Approved <span class="rp-col-count rp-col-count--approved">' + approved.length + '</span></div>' +
            '<div class="rp-col-body">' + (approved.length ? approved.map(r => this._approvedCardHtml(r)).join('') : '<div class="rp-empty">No approved receipts.</div>') + '</div>' +
            '<div class="rp-col-foot"><button class="rp-btn--add rp-btn--add-approved" onclick="RP.openReceiptModal(null,\'approved\',\'' + deptId + '\')">+ Add receipt</button></div>' +
          '</div>' +
          '<div class="rp-col rp-col--paid' + (this.mobileTab === 'paid' ? ' col-visible' : '') + '" id="rp-col-paid">' +
            '<div class="rp-col-head rp-col-head--paid">Paid <span class="rp-col-count rp-col-count--paid">' + paid.length + '</span></div>' +
            '<div class="rp-col-body">' + (paid.length ? paid.map(r => this._paidCardHtml(r)).join('') : '<div class="rp-empty">No paid receipts.</div>') + '</div>' +
            '<div class="rp-col-foot"><button class="rp-btn--add rp-btn--add-paid" onclick="RP.openReceiptModal(null,\'paid\',\'' + deptId + '\')">+ Add receipt</button></div>' +
          '</div>' +
        '</div>';
    },

    _pendingCardHtml(r) {
      return (
        '<div class="rp-card">' +
          '<div class="rp-card-top">' +
            '<div class="rp-receipt-thumb">&#128196;</div>' +
            '<div class="rp-card-info">' +
              '<div class="rp-card-vendor">' + this.esc(r.vendor) + '</div>' +
              '<div class="rp-card-amount--pending">' + this.fmt$(r.amount_cents || 0) + '</div>' +
              (r.description ? '<div class="rp-card-desc">' + this.esc(r.description) + '</div>' : '') +
              (r.submitted_by ? '<div class="rp-card-meta">Submitted by ' + this.esc(r.submitted_by) + '</div>' : '') +
              (r.receipt_date ? '<div class="rp-card-meta">' + this._fmtDate(r.receipt_date) + '</div>' : '') +
            '</div>' +
          '</div>' +
          '<div class="rp-card-actions">' +
            '<button class="rp-btn rp-btn--approve" onclick="RP.quickApprove(\'' + r.id + '\')">&#10003; Approve</button>' +
            '<button class="rp-btn rp-btn--reject"  onclick="RP.quickReject(\'' + r.id + '\')">&#10005; Reject</button>' +
            '<div class="rp-action-wrap">' +
              '<button class="rp-card-dot-menu" onclick="RP.toggleMenu(\'' + r.id + '\')" title="More">&#8943;</button>' +
              '<div class="rp-action-menu" id="rp-am-' + r.id + '">' +
                '<button class="rp-action-item" onclick="RP.openReceiptModal(\'' + r.id + '\',null,null)">Edit</button>' +
                '<button class="rp-action-item danger" onclick="RP.deleteReceipt(\'' + r.id + '\')">Delete</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
    },

    _approvedCardHtml(r) {
      return (
        '<div class="rp-card">' +
          '<div class="rp-card-top">' +
            '<div class="rp-receipt-thumb">&#128196;</div>' +
            '<div class="rp-card-info">' +
              '<div class="rp-card-vendor">' + this.esc(r.vendor) + '</div>' +
              '<div class="rp-card-amount--approved">' + this.fmt$(r.amount_cents || 0) + '</div>' +
              (r.description ? '<div class="rp-card-desc">' + this.esc(r.description) + '</div>' : '') +
              (r.approved_at ? '<div class="rp-card-meta">Approved ' + this._fmtDate(r.approved_at) + '</div>' : '') +
            '</div>' +
          '</div>' +
          '<div class="rp-card-actions">' +
            '<button class="rp-btn rp-btn--paid" onclick="RP.quickMarkPaid(\'' + r.id + '\')">Mark Paid</button>' +
            '<div class="rp-action-wrap">' +
              '<button class="rp-card-dot-menu" onclick="RP.toggleMenu(\'' + r.id + '\')" title="More">&#8943;</button>' +
              '<div class="rp-action-menu" id="rp-am-' + r.id + '">' +
                '<button class="rp-action-item" onclick="RP.openReceiptModal(\'' + r.id + '\',null,null)">Edit</button>' +
                '<button class="rp-action-item danger" onclick="RP.deleteReceipt(\'' + r.id + '\')">Delete</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
    },

    _paidCardHtml(r) {
      return (
        '<div class="rp-card">' +
          '<div class="rp-card-top">' +
            '<div class="rp-receipt-thumb">&#128196;</div>' +
            '<div class="rp-card-info">' +
              '<div class="rp-card-vendor">' + this.esc(r.vendor) + '</div>' +
              '<div class="rp-card-amount--paid">' + this.fmt$(r.amount_cents || 0) + '</div>' +
              (r.description ? '<div class="rp-card-desc">' + this.esc(r.description) + '</div>' : '') +
              (r.paid_at ? '<div class="rp-card-meta">Paid ' + this._fmtDate(r.paid_at) + '</div>' : '') +
            '</div>' +
          '</div>' +
          (r.payment_method ? '<div class="rp-payment-tag">' + this.esc(r.payment_method) + '</div>' : '') +
          '<div class="rp-card-actions" style="margin-top:0.5rem">' +
            '<div class="rp-action-wrap">' +
              '<button class="rp-card-dot-menu" onclick="RP.toggleMenu(\'' + r.id + '\')" title="More">&#8943;</button>' +
              '<div class="rp-action-menu" id="rp-am-' + r.id + '">' +
                '<button class="rp-action-item" onclick="RP.openReceiptModal(\'' + r.id + '\',null,null)">Edit</button>' +
                '<button class="rp-action-item danger" onclick="RP.deleteReceipt(\'' + r.id + '\')">Delete</button>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
    },

    // Interactions ─────────────────────────────────────────────────────────
    selectDept(deptId) {
      this.selectedDeptId = deptId;
      this.renderSummaryStrip();
      this.renderDeptList();
      this.renderKanban(deptId);
    },

    setMobileTab(tab) {
      this.mobileTab = tab;
      ['pending','approved','paid'].forEach(t => {
        const col = document.getElementById('rp-col-' + t);
        if (col) col.classList.toggle('col-visible', t === tab);
        document.querySelectorAll('.rp-col-tab').forEach((btn, i) => {
          btn.classList.toggle('active', ['pending','approved','paid'][i] === tab);
        });
      });
    },

    toggleMenu(id) {
      const menu = document.getElementById('rp-am-' + id);
      if (!menu) return;
      const wasOpen = menu.classList.contains('open');
      document.querySelectorAll('.rp-action-menu.open').forEach(m => m.classList.remove('open'));
      if (!wasOpen) menu.classList.add('open');
    },

    async quickApprove(id) {
      try {
        await this._patch('budget_receipts', id, { status: 'approved', approved_at: new Date().toISOString() });
        await this.load();
        if (this.selectedDeptId) this.renderKanban(this.selectedDeptId);
      } catch(e) { alert('Could not approve receipt: ' + e.message); }
    },

    async quickReject(id) {
      if (!confirm('Reject this receipt? It will be deleted.')) return;
      try {
        await this._del('budget_receipts', id);
        await this.load();
        if (this.selectedDeptId) this.renderKanban(this.selectedDeptId);
      } catch(e) { alert('Could not reject receipt: ' + e.message); }
    },

    async quickMarkPaid(id) {
      const method = prompt('Payment method:', 'E-Transfer');
      if (method === null) return;
      try {
        await this._patch('budget_receipts', id, { status: 'paid', paid_at: new Date().toISOString(), payment_method: method || 'E-Transfer' });
        await this.load();
        if (this.selectedDeptId) this.renderKanban(this.selectedDeptId);
      } catch(e) { alert('Could not mark as paid: ' + e.message); }
    },

    // Receipt modal ────────────────────────────────────────────────────────
    _editReceiptCatId: null,

    openReceiptModal(receiptId, defaultStatus, catId) {
      const rec = receiptId ? this.receipts.find(r => r.id === receiptId) : null;
      this._editReceiptCatId = catId || (rec ? rec.category_id : this.selectedDeptId) || null;
      document.getElementById('rp-receipt-modal-title').textContent = rec ? 'Edit Receipt' : 'Add Receipt';
      document.getElementById('rp-receipt-id').value    = rec ? rec.id : '';
      document.getElementById('rp-vendor').value        = rec ? rec.vendor : '';
      document.getElementById('rp-amount').value        = rec ? ((rec.amount_cents || 0) / 100).toFixed(2) : '';
      document.getElementById('rp-date').value          = rec ? (rec.receipt_date || '') : '';
      document.getElementById('rp-desc').value          = rec ? (rec.description || '') : '';
      document.getElementById('rp-submitted-by').value  = rec ? (rec.submitted_by || '') : '';
      document.getElementById('rp-status').value        = rec ? rec.status : (defaultStatus || 'pending');
      document.getElementById('rp-payment').value       = rec ? (rec.payment_method || 'E-Transfer') : 'E-Transfer';
      document.getElementById('rp-notes').value         = rec ? (rec.notes || '') : '';
      const pf = document.getElementById('rp-payment-field');
      if (pf) pf.style.display = document.getElementById('rp-status').value === 'paid' ? 'block' : 'none';
      document.getElementById('rp-receipt-modal').classList.add('open');
    },

    closeReceiptModal() { document.getElementById('rp-receipt-modal').classList.remove('open'); },

    async saveReceipt() {
      const id      = document.getElementById('rp-receipt-id').value;
      const vendor  = document.getElementById('rp-vendor').value.trim();
      const amount  = Math.round((parseFloat(document.getElementById('rp-amount').value) || 0) * 100);
      const date    = document.getElementById('rp-date').value;
      const desc    = document.getElementById('rp-desc').value.trim();
      const submBy  = document.getElementById('rp-submitted-by').value.trim();
      const status  = document.getElementById('rp-status').value;
      const payment = document.getElementById('rp-payment').value;
      const notes   = document.getElementById('rp-notes').value.trim();
      if (!vendor) { alert('Vendor is required.'); return; }
      const payload = {
        vendor, amount_cents: amount, receipt_date: date || null, description: desc || null,
        submitted_by: submBy || null, status, notes: notes || null,
        category_id: this._editReceiptCatId || null,
        payment_method: status === 'paid' ? payment : null,
        approved_at: status === 'approved' || status === 'paid' ? (new Date().toISOString()) : null,
        paid_at:     status === 'paid' ? (new Date().toISOString()) : null,
      };
      try {
        if (id) await this._patch('budget_receipts', id, payload);
        else    await this._post('budget_receipts', payload);
        this.closeReceiptModal();
        await this.load();
        if (this.selectedDeptId) this.renderKanban(this.selectedDeptId);
      } catch(e) { alert('Could not save receipt: ' + e.message); }
    },

    async deleteReceipt(id) {
      if (!confirm('Delete this receipt?')) return;
      try {
        await this._del('budget_receipts', id);
        await this.load();
        if (this.selectedDeptId) this.renderKanban(this.selectedDeptId);
      } catch(e) { alert('Could not delete: ' + e.message); }
    },

    // Summary modal ────────────────────────────────────────────────────────
    openSummaryModal(deptId) {
      const dept = this.depts.find(d => d.id === deptId);
      if (!dept) return;
      const title = document.getElementById('rp-summary-modal-title');
      const body  = document.getElementById('rp-summary-modal-body');
      if (title) title.textContent = dept.name + ' — Summary';

      const recs  = this._deptReceipts(deptId);
      const penAmt = recs.filter(r => r.status === 'pending').reduce((a, r)  => a + (r.amount_cents || 0), 0);
      const appAmt = recs.filter(r => r.status === 'approved').reduce((a, r) => a + (r.amount_cents || 0), 0);
      const paidAmt= recs.filter(r => r.status === 'paid').reduce((a, r)     => a + (r.amount_cents || 0), 0);
      const total  = penAmt + appAmt + paidAmt;

      const vendors = {};
      recs.forEach(r => { vendors[r.vendor] = (vendors[r.vendor] || 0) + (r.amount_cents || 0); });
      const vendorRows = Object.entries(vendors).sort((a,b) => b[1]-a[1]).map(([v,a]) =>
        '<tr><td>' + this.esc(v) + '</td><td style="text-align:right">' + this.fmt$(a) + '</td></tr>'
      ).join('');

      if (body) body.innerHTML =
        '<table class="rp-sum-table"><thead><tr><th>Status</th><th style="text-align:right">Amount</th><th style="text-align:right">Count</th></tr></thead><tbody>' +
          '<tr><td>Pending Approval</td><td style="text-align:right">' + this.fmt$(penAmt) + '</td><td style="text-align:right">' + recs.filter(r=>r.status==='pending').length + '</td></tr>' +
          '<tr><td>Approved (Not Paid)</td><td style="text-align:right">' + this.fmt$(appAmt) + '</td><td style="text-align:right">' + recs.filter(r=>r.status==='approved').length + '</td></tr>' +
          '<tr><td>Paid</td><td style="text-align:right">' + this.fmt$(paidAmt) + '</td><td style="text-align:right">' + recs.filter(r=>r.status==='paid').length + '</td></tr>' +
          '<tr><td><strong>Total</strong></td><td style="text-align:right"><strong>' + this.fmt$(total) + '</strong></td><td style="text-align:right"><strong>' + recs.length + '</strong></td></tr>' +
        '</tbody></table>' +
        (vendorRows ? '<div style="margin-top:1.25rem"><div style="font-size:0.72rem;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;color:#9a90b0;margin-bottom:0.5rem">By Vendor</div><table class="rp-sum-table"><thead><tr><th>Vendor</th><th style="text-align:right">Total</th></tr></thead><tbody>' + vendorRows + '</tbody></table></div>' : '');

      document.getElementById('rp-summary-modal').classList.add('open');
    },

    closeSummaryModal() { document.getElementById('rp-summary-modal').classList.remove('open'); },

    // Helpers ──────────────────────────────────────────────────────────────
    _deptIcon(name) {
      const n = (name || '').toLowerCase();
      for (const [key, icon] of Object.entries(this.DEPT_ICONS)) {
        if (n.includes(key)) return icon;
      }
      return '&#128193;';
    },

    fmt$(cents) {
      if (cents == null) return '$0';
      const abs = Math.abs(cents) / 100;
      return (cents < 0 ? '-' : '') + '$' + abs.toLocaleString('en-CA', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    },

    esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; },

    _fmtDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt)) return d;
      return dt.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
    },
  };

  window.initProductionPage('financials');
  RP.init();

  document.getElementById('rp-receipt-modal').addEventListener('click', function(e) { if (e.target === this) RP.closeReceiptModal(); });
  document.getElementById('rp-summary-modal').addEventListener('click', function(e) { if (e.target === this) RP.closeSummaryModal(); });
  </script>
</body>
</html>
