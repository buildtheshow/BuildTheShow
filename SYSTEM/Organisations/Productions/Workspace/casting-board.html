<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casting Board - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v47-20260610" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1440px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    .page-kicker { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,21,48,0.38); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .page-kicker-dot { width: 6px; height: 6px; border-radius: 50%; background: #572e88; flex-shrink: 0; }
    .page-title { font-size: 2rem; font-weight: 950; color: #1a1530; margin: 0 0 1.5rem; }

    .cb-layout { display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; align-items: start; }
    @media (max-width: 900px) { .cb-layout { grid-template-columns: 1fr; } }

    /* Performer pool (left) */
    .cb-pool { position: sticky; top: 1.5rem; }
    .cb-pool-head { font-size: 0.68rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(26,21,48,0.4); margin-bottom: 0.65rem; display: flex; align-items: center; justify-content: space-between; }
    .cb-pool-count { font-size: 0.72rem; font-weight: 700; color: rgba(26,21,48,0.4); }
    .cb-search { width: 100%; border: 1.5px solid rgba(87,46,136,0.18); border-radius: 8px; padding: 0.45rem 0.85rem; font-size: 0.84rem; font-family: var(--bts-font); background: #fff; color: #1a1530; outline: none; margin-bottom: 0.65rem; transition: border-color 0.12s; }
    .cb-search:focus { border-color: #572e88; }
    .cb-filter-pills { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .cb-filter-pill { font-size: 0.68rem; font-weight: 800; border-radius: 100px; padding: 0.22rem 0.6rem; border: 1.5px solid rgba(87,46,136,0.18); background: #fff; color: rgba(26,21,48,0.55); cursor: pointer; font-family: var(--bts-font); transition: all 0.12s; }
    .cb-filter-pill:hover { border-color: #572e88; color: #572e88; }
    .cb-filter-pill.active { background: #572e88; color: #fff; border-color: #572e88; }
    .cb-pool-list { display: flex; flex-direction: column; gap: 0.35rem; max-height: calc(100vh - 280px); overflow-y: auto; padding-right: 2px; }
    .cb-pool-list::-webkit-scrollbar { width: 4px; }
    .cb-pool-list::-webkit-scrollbar-track { background: transparent; }
    .cb-pool-list::-webkit-scrollbar-thumb { background: rgba(87,46,136,0.2); border-radius: 2px; }
    .cb-perf-card { display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0.8rem; border: 1.5px solid rgba(87,46,136,0.12); border-radius: 9px; background: #fff; cursor: pointer; transition: all 0.12s; user-select: none; }
    .cb-perf-card:hover { border-color: #572e88; background: rgba(87,46,136,0.03); }
    .cb-perf-card.assigned { opacity: 0.5; cursor: default; }
    .cb-perf-card.selected { border-color: #572e88; background: rgba(87,46,136,0.08); box-shadow: 0 0 0 3px rgba(87,46,136,0.12); }
    .cb-perf-avatar { width: 32px; height: 32px; border-radius: 50%; background: #f0ecfc; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.72rem; color: #572e88; overflow: hidden; flex-shrink: 0; }
    .cb-perf-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .cb-perf-name { font-size: 0.82rem; font-weight: 800; line-height: 1.2; }
    .cb-perf-sub { font-size: 0.68rem; color: rgba(26,21,48,0.45); margin-top: 0.1rem; }
    .cb-perf-assigned-tag { font-size: 0.62rem; font-weight: 850; border-radius: 100px; padding: 0.14rem 0.45rem; background: #e5f0e7; color: #2e6639; margin-top: 0.2rem; display: inline-block; }
    .cb-pool-empty { text-align: center; padding: 2rem 0.5rem; color: rgba(26,21,48,0.35); font-size: 0.82rem; }

    /* Characters grid (right) */
    .cb-chars-head { font-size: 0.68rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(26,21,48,0.4); margin-bottom: 0.85rem; display: flex; align-items: center; justify-content: space-between; }
    .cb-chars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.85rem; }
    .cb-char-card { border: 1.5px solid rgba(87,46,136,0.14); border-radius: 11px; overflow: hidden; background: #fff; transition: border-color 0.12s; }
    .cb-char-card.drop-target { border-color: #572e88; background: rgba(87,46,136,0.04); }
    .cb-char-header { padding: 0.75rem 0.9rem 0.6rem; border-bottom: 1px solid rgba(87,46,136,0.08); }
    .cb-char-name { font-size: 0.9rem; font-weight: 900; }
    .cb-char-type { font-size: 0.65rem; font-weight: 850; border-radius: 100px; padding: 0.15rem 0.45rem; background: rgba(87,46,136,0.1); color: #572e88; display: inline-block; margin-top: 0.25rem; }
    .cb-char-slots { padding: 0.6rem 0.9rem; min-height: 60px; display: flex; flex-direction: column; gap: 0.35rem; }
    .cb-slot-empty { font-size: 0.75rem; color: rgba(26,21,48,0.3); font-style: italic; padding: 0.3rem 0; }
    .cb-slot-row { display: flex; align-items: center; gap: 0.5rem; }
    .cb-slot-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cb-slot-dot.considering { background: #efab45; }
    .cb-slot-dot.chosen { background: #769e7b; }
    .cb-slot-dot.offer_accepted { background: #476aaa; }
    .cb-slot-name { font-size: 0.78rem; font-weight: 700; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cb-slot-state { font-size: 0.62rem; font-weight: 850; color: rgba(26,21,48,0.45); text-transform: uppercase; letter-spacing: 0.04em; }
    .cb-slot-remove { width: 18px; height: 18px; border-radius: 50%; border: none; background: rgba(209,82,61,0.1); color: #d1523d; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; padding: 0; transition: background 0.12s; }
    .cb-slot-remove:hover { background: rgba(209,82,61,0.2); }
    .cb-char-add-btn { width: 100%; padding: 0.5rem 0.9rem; border: none; background: transparent; border-top: 1px dashed rgba(87,46,136,0.12); font-size: 0.72rem; font-weight: 800; color: rgba(87,46,136,0.55); cursor: pointer; font-family: var(--bts-font); text-align: left; transition: background 0.12s; }
    .cb-char-add-btn:hover { background: rgba(87,46,136,0.04); color: #572e88; }
    .cb-chars-empty { text-align: center; padding: 3rem 1rem; color: rgba(26,21,48,0.35); font-size: 0.88rem; border: 1.5px dashed rgba(87,46,136,0.12); border-radius: 11px; }

    /* Assign modal */
    .cb-modal-overlay { position: fixed; inset: 0; background: rgba(26,21,48,0.5); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.16s; }
    .cb-modal-overlay.open { opacity: 1; pointer-events: auto; }
    .cb-modal { background: #fff; border-radius: 14px; padding: 1.6rem 1.75rem; width: 100%; max-width: 480px; position: relative; max-height: 86vh; overflow-y: auto; }
    .cb-modal-title { font-size: 1.05rem; font-weight: 950; margin-bottom: 0.3rem; }
    .cb-modal-sub { font-size: 0.8rem; color: rgba(26,21,48,0.5); margin-bottom: 1.1rem; }
    .cb-modal-close { position: absolute; top: 1rem; right: 1rem; width: 28px; height: 28px; border-radius: 50%; border: none; background: rgba(87,46,136,0.1); cursor: pointer; font-size: 0.9rem; color: #572e88; font-family: var(--bts-font); display: flex; align-items: center; justify-content: center; }
    .cb-modal-field { margin-bottom: 0.9rem; }
    .cb-modal-label { font-size: 0.72rem; font-weight: 850; color: rgba(26,21,48,0.6); margin-bottom: 0.3rem; display: block; }
    .cb-modal-select { width: 100%; border: 1.5px solid rgba(87,46,136,0.18); border-radius: 8px; padding: 0.48rem 0.8rem; font-size: 0.88rem; font-family: var(--bts-font); color: #1a1530; background: #fff; outline: none; transition: border-color 0.12s; }
    .cb-modal-select:focus { border-color: #572e88; }
    .cb-modal-actions { display: flex; gap: 0.6rem; margin-top: 1.1rem; }
    .cb-modal-save { flex: 1; font-size: 0.85rem; font-weight: 850; border-radius: 8px; padding: 0.52rem 1rem; border: none; background: #572e88; color: #fff; cursor: pointer; font-family: var(--bts-font); transition: background 0.12s; }
    .cb-modal-save:hover { background: #3d1f66; }
    .cb-modal-cancel { font-size: 0.82rem; font-weight: 800; border-radius: 8px; padding: 0.5rem 0.85rem; border: 1.5px solid rgba(87,46,136,0.2); background: #fff; color: rgba(26,21,48,0.55); cursor: pointer; font-family: var(--bts-font); }

    /* Toast */
    .cb-toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1a1530; color: #fff; font-size: 0.82rem; font-weight: 800; border-radius: 9px; padding: 0.7rem 1.1rem; z-index: 9999; transform: translateY(120%); transition: transform 0.22s; box-shadow: 0 4px 20px rgba(0,0,0,0.22); }
    .cb-toast.show { transform: translateY(0); }
    .cb-toast.error { background: #d1523d; }

    .cb-loading { color: rgba(26,21,48,0.38); font-size: 0.88rem; padding: 2rem 0; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>
  <div class="prod-main">
    <div class="prod-main-inner">
      <div class="page-kicker"><span class="page-kicker-dot"></span>CASTING</div>
      <h1 class="page-title">Casting Board</h1>
      <div id="cb-root"><div class="cb-loading">Loading...</div></div>
    </div>
  </div>

  <!-- Assign modal -->
  <div class="cb-modal-overlay" id="cb-modal">
    <div class="cb-modal">
      <button class="cb-modal-close" onclick="closeAssignModal()">x</button>
      <div class="cb-modal-title" id="cb-modal-title">Assign Role</div>
      <div class="cb-modal-sub" id="cb-modal-sub"></div>
      <div class="cb-modal-field">
        <label class="cb-modal-label">Character / Role</label>
        <select id="cb-modal-char-select" class="cb-modal-select"></select>
      </div>
      <div class="cb-modal-field">
        <label class="cb-modal-label">Status</label>
        <select id="cb-modal-state-select" class="cb-modal-select">
          <option value="considering">Considering</option>
          <option value="chosen">Chosen</option>
        </select>
      </div>
      <div class="cb-modal-actions">
        <button class="cb-modal-cancel" onclick="closeAssignModal()">Cancel</button>
        <button class="cb-modal-save" onclick="saveAssignment()">Assign</button>
      </div>
    </div>
  </div>

  <div class="cb-toast" id="cb-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=18"></script>
  <script>
    window.initProductionPage('cast');

    const ROLE_TYPE_LABELS = {
      lead: 'Lead', featured: 'Featured', supporting: 'Supporting',
      ensemble: 'Ensemble', dancer: 'Dancer', swing: 'Swing', other: 'Other',
    };
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function initials(name) { return String(name||'').trim().split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'?'; }

    let _sb, _prodId;
    let _chars = [];
    let _performers = [];       // audition_applications + audition_bookings merged
    let _assignments = [];      // casting_assignments rows
    let _selectedPerfId = null;
    let _filterStatus = 'all';
    let _searchQuery = '';

    function showToast(msg, isError = false) {
      const t = document.getElementById('cb-toast');
      t.textContent = msg;
      t.className = 'cb-toast show' + (isError ? ' error' : '');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2800);
    }

    function assignmentsForChar(charId) {
      return _assignments.filter(a => a.character_id === charId);
    }

    function assignmentsForPerf(perfId) {
      return _assignments.filter(a => String(a.applicant_id) === String(perfId));
    }

    function stateLabel(state) {
      return { considering: 'Considering', chosen: 'Chosen', offer_accepted: 'Offer Accepted' }[state] || state;
    }

    function filteredPerformers() {
      return _performers.filter(p => {
        if (_filterStatus === 'unassigned') {
          if (assignmentsForPerf(p.id).length > 0) return false;
        } else if (_filterStatus === 'assigned') {
          if (assignmentsForPerf(p.id).length === 0) return false;
        } else if (_filterStatus === 'callback') {
          if (!p.callback_status || p.callback_status === 'none') return false;
        }
        if (!_searchQuery) return true;
        const q = _searchQuery.toLowerCase();
        return (p.name||'').toLowerCase().includes(q) || (p.email||'').toLowerCase().includes(q);
      });
    }

    function renderPool() {
      const visible = filteredPerformers();
      const listEl = document.getElementById('cb-pool-list');
      const countEl = document.getElementById('cb-pool-count');
      if (countEl) countEl.textContent = `${visible.length} performers`;

      if (!visible.length) {
        listEl.innerHTML = `<div class="cb-pool-empty">No performers match.</div>`;
        return;
      }

      listEl.innerHTML = visible.map(p => {
        const assigned = assignmentsForPerf(p.id);
        const isAssigned = assigned.length > 0;
        const isSelected = _selectedPerfId === p.id;
        const avatarInner = p.headshot_url
          ? `<img src="${esc(p.headshot_url)}" alt="${esc(p.name)}" />`
          : esc(initials(p.name));
        const assignedTag = isAssigned
          ? `<div><span class="cb-perf-assigned-tag">${esc(assigned.map(a => {
              const c = _chars.find(ch => ch.id === a.character_id);
              return c ? c.name : 'Role';
            }).join(', '))}</span></div>`
          : '';
        return `<div class="cb-perf-card${isAssigned ? ' assigned' : ''}${isSelected ? ' selected' : ''}" onclick="selectPerformer('${esc(p.id)}')">
          <div class="cb-perf-avatar">${avatarInner}</div>
          <div style="min-width:0;">
            <div class="cb-perf-name">${esc(p.name||'Unknown')}</div>
            ${p.pronouns ? `<div class="cb-perf-sub">${esc(p.pronouns)}</div>` : ''}
            ${assignedTag}
          </div>
        </div>`;
      }).join('');
    }

    function renderChars() {
      const grid = document.getElementById('cb-chars-grid');
      if (!grid) return;
      if (!_chars.length) {
        grid.innerHTML = `<div class="cb-chars-empty">No characters added yet. Add them in <a href="#" onclick="btsProdNav('auditions-settings.html');return false;" style="color:#572e88;">Audition Settings</a>.</div>`;
        return;
      }

      grid.innerHTML = _chars.map(c => {
        const slots = assignmentsForChar(c.id);
        const slotsHtml = slots.length
          ? slots.map(a => {
              const p = _performers.find(x => String(x.id) === String(a.applicant_id));
              return `<div class="cb-slot-row">
                <span class="cb-slot-dot ${esc(a.state||'considering')}"></span>
                <span class="cb-slot-name">${esc(p?.name || 'Unknown')}</span>
                <span class="cb-slot-state">${esc(stateLabel(a.state))}</span>
                <button class="cb-slot-remove" title="Remove" onclick="removeAssignment('${esc(a.id)}')">x</button>
              </div>`;
            }).join('')
          : `<div class="cb-slot-empty">No one assigned yet</div>`;

        const typeLabel = ROLE_TYPE_LABELS[(c.role_type||'').toLowerCase()] || c.role_type || '';
        return `<div class="cb-char-card" id="char-card-${esc(c.id)}">
          <div class="cb-char-header">
            <div class="cb-char-name">${esc(c.name)}</div>
            ${typeLabel ? `<span class="cb-char-type">${esc(typeLabel)}</span>` : ''}
          </div>
          <div class="cb-char-slots">${slotsHtml}</div>
          <button class="cb-char-add-btn" onclick="openAssignModal('${esc(c.id)}')">+ Assign Performer</button>
        </div>`;
      }).join('');
    }

    function render() {
      renderPool();
      renderChars();
    }

    function selectPerformer(perfId) {
      if (_selectedPerfId === perfId) {
        _selectedPerfId = null;
      } else {
        _selectedPerfId = perfId;
      }
      renderPool();
    }

    // Modal
    let _modalCharId = null;

    function openAssignModal(charId) {
      _modalCharId = charId;
      const char = _chars.find(c => c.id === charId);
      document.getElementById('cb-modal-title').textContent = char ? `Assign to ${char.name}` : 'Assign Role';

      const perfForModal = _selectedPerfId
        ? _performers.find(p => String(p.id) === String(_selectedPerfId))
        : null;
      document.getElementById('cb-modal-sub').textContent = perfForModal
        ? `Selected: ${perfForModal.name}`
        : 'Select a performer from the list first, or choose one below.';

      // Build performer select
      const sel = document.getElementById('cb-modal-char-select');
      sel.innerHTML = '';

      // If performer already selected, make them first option
      const ordered = _selectedPerfId
        ? [
            ..._performers.filter(p => String(p.id) === String(_selectedPerfId)),
            ..._performers.filter(p => String(p.id) !== String(_selectedPerfId)),
          ]
        : _performers;

      ordered.forEach(p => {
        const alreadyOnChar = _assignments.some(a => a.character_id === charId && String(a.applicant_id) === String(p.id));
        if (alreadyOnChar) return;
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name || 'Unknown';
        sel.appendChild(opt);
      });

      if (!sel.options.length) {
        sel.innerHTML = '<option value="">No performers available</option>';
      }

      document.getElementById('cb-modal').classList.add('open');
    }

    function closeAssignModal() {
      document.getElementById('cb-modal').classList.remove('open');
      _modalCharId = null;
    }

    async function saveAssignment() {
      const perfId = document.getElementById('cb-modal-char-select').value;
      const state  = document.getElementById('cb-modal-state-select').value;
      if (!perfId || !_modalCharId) return;

      const btn = document.querySelector('.cb-modal-save');
      btn.textContent = 'Saving...'; btn.disabled = true;

      const { data, error } = await _sb.from('casting_assignments').insert({
        production_id: _prodId,
        applicant_id: perfId,
        character_id: _modalCharId,
        state,
      }).select().single();

      btn.textContent = 'Assign'; btn.disabled = false;

      if (error) { showToast('Could not save. Try again.', true); return; }
      _assignments.push(data);
      closeAssignModal();
      render();
      showToast('Assigned.');
    }

    async function removeAssignment(assignmentId) {
      if (!confirm('Remove this assignment?')) return;
      const { error } = await _sb.from('casting_assignments').delete().eq('id', assignmentId);
      if (error) { showToast('Could not remove.', true); return; }
      _assignments = _assignments.filter(a => String(a.id) !== String(assignmentId));
      render();
      showToast('Removed.');
    }

    function onSearch(q) { _searchQuery = q; renderPool(); }
    function setFilter(f) { _filterStatus = f; renderPool(); }

    (async function () {
      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      _prodId = new URLSearchParams(location.search).get('id') || '';
      if (!_prodId) return;
      _sb = supabase.createClient(SB_URL, SB_ANON);

      const [charRes, appRes, bookRes, assignRes] = await Promise.all([
        _sb.from('production_characters').select('id,name,role_type,vocal_usage,age_range').eq('production_id', _prodId).order('sort_order').order('name'),
        _sb.from('audition_applications').select('id,name,email,pronouns,headshot_url,callback_status,status').eq('production_id', _prodId).order('name'),
        _sb.from('audition_bookings').select('id,name,email,pronouns').eq('production_id', _prodId).order('name'),
        _sb.from('casting_assignments').select('*').eq('production_id', _prodId),
      ]);

      _chars = charRes.data || [];
      const apps = appRes.data || [];
      const bookings = (bookRes.data || []).map(b => ({ ...b, _source: 'booking' }));
      // Merge: deduplicate by id (application takes precedence)
      const appIds = new Set(apps.map(a => String(a.id)));
      _performers = [
        ...apps,
        ...bookings.filter(b => !appIds.has(String(b.id))),
      ];
      _assignments = assignRes.data || [];

      document.getElementById('cb-root').innerHTML = `
        <div class="cb-layout">
          <div class="cb-pool">
            <div class="cb-pool-head">
              <span>Performers</span>
              <span class="cb-pool-count" id="cb-pool-count">${_performers.length} performers</span>
            </div>
            <input class="cb-search" placeholder="Search performers..." oninput="onSearch(this.value)" />
            <div class="cb-filter-pills">
              <button class="cb-filter-pill active" onclick="setFilter('all');this.closest('.cb-filter-pills').querySelectorAll('.cb-filter-pill').forEach(b=>b.classList.remove('active'));this.classList.add('active');">All</button>
              <button class="cb-filter-pill" onclick="setFilter('unassigned');this.closest('.cb-filter-pills').querySelectorAll('.cb-filter-pill').forEach(b=>b.classList.remove('active'));this.classList.add('active');">Unassigned</button>
              <button class="cb-filter-pill" onclick="setFilter('assigned');this.closest('.cb-filter-pills').querySelectorAll('.cb-filter-pill').forEach(b=>b.classList.remove('active'));this.classList.add('active');">Assigned</button>
              <button class="cb-filter-pill" onclick="setFilter('callback');this.closest('.cb-filter-pills').querySelectorAll('.cb-filter-pill').forEach(b=>b.classList.remove('active'));this.classList.add('active');">Callbacks</button>
            </div>
            <div class="cb-pool-list" id="cb-pool-list"></div>
          </div>
          <div>
            <div class="cb-chars-head">
              <span>Characters &amp; Roles (${_chars.length})</span>
            </div>
            <div class="cb-chars-grid" id="cb-chars-grid"></div>
          </div>
        </div>`;

      render();
    })();
  </script>
</body>
</html>
