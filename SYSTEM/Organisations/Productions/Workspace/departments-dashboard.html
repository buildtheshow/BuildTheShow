  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem 2.25rem;
      max-width: calc(100vw - 220px);
      overflow-x: clip;
      position: relative;
     z-index: 0; }
    .prod-main::before {
      content: '';
      position: fixed;
      inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.04;
      pointer-events: none;
      z-index: -1;
    }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    .dept-dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      margin-top: 1.2rem;
    }
    .dept-dashboard-card {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 4px 18px rgba(26,21,48,0.045);
      min-width: 0;
    }
    .dept-dashboard-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 0.85rem;
    }
    .dept-dashboard-icon {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--dept-color);
    }
    .dept-dashboard-icon img {
      width: 25px;
      height: 25px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }
    .dept-dashboard-title {
      font-size: 0.98rem;
      font-weight: 900;
      color: #1a1530;
      overflow-wrap: anywhere;
    }
    .dept-dashboard-sub {
      margin-top: 0.16rem;
      font-size: 0.75rem;
      color: rgba(26,21,48,0.58);
    }
    .dept-dashboard-budget {
      display: flex;
      gap: 1rem;
      margin: 0.55rem 0 0.7rem;
      padding: 0.5rem 0.65rem;
      background: rgba(87,46,136,0.04);
      border-radius: 6px;
      border: 1px solid rgba(87,46,136,0.08);
    }
    .dept-budget-item {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .dept-budget-label {
      font-size: 0.67rem;

      color: rgba(26,21,48,0.45);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .dept-budget-value {
      font-size: 0.88rem;
      font-weight: 900;
      color: #1a1530;
    }
    .dept-budget-value.is-zero {
      color: rgba(26,21,48,0.3);
    }
    .dept-budget-value.is-over {
      color: #d1523d;
    }
    .dept-dashboard-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }
    .dept-dashboard-breakdown {
      margin: 0 0 0.75rem;
      border: 1px solid rgba(87,46,136,0.08);
      border-radius: 8px;
      background: rgba(87,46,136,0.025);
      overflow: hidden;
    }
    .dept-dashboard-breakdown-head,
    .dept-dashboard-breakdown-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 0.6rem;
      align-items: center;
      padding: 0.45rem 0.65rem;
    }
    .dept-dashboard-breakdown-head {
      background: rgba(87,46,136,0.04);
      border-bottom: 1px solid rgba(87,46,136,0.08);
      font-size: 0.64rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(26,21,48,0.5);
    }
    .dept-dashboard-breakdown-row + .dept-dashboard-breakdown-row {
      border-top: 1px solid rgba(87,46,136,0.06);
    }
    .dept-breakdown-name {
      font-size: 0.74rem;
      font-weight: 800;
      color: #1a1530;
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .dept-breakdown-value {
      font-size: 0.74rem;
      font-weight: 900;
      color: #1a1530;
      white-space: nowrap;
    }
    .dept-breakdown-value.is-zero {
      color: rgba(26,21,48,0.36);
    }
    .dept-breakdown-empty {
      padding: 0.65rem;
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(26,21,48,0.45);
    }
    .dept-dashboard-link {
      border: 1.5px solid rgba(87,46,136,0.14);
      background: rgba(87,46,136,0.04);
      color: #572e88;
      border-radius: 8px;
      min-height: 2rem;
      padding: 0.34rem 0.62rem;
      font-family: inherit;
      font-size: 0.74rem;
      font-weight: 900;
      cursor: pointer;
    }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }
  </style>

<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Production Departments</span></span>
            </div>
            <h1 class="aud-visual-title">Dashboard</h1>
            <p class="aud-visual-copy">An overview of every department and how they are tracking.</p>
          </div>
        </div>
      </div>

      <div id="dept-dashboard-root" class="dept-dashboard-grid"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/ASSETS/scripts/modules/department-config.js?v=20260610-dashboard"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=77-20260716"></script>
  <script>
    window.initProductionPage('departments');
    (function () {
      'use strict';
      const cfg = window.BTSDepartmentConfig;
      const root = document.getElementById('dept-dashboard-root');
      if (!cfg || !root) return;

      function esc(value) {
        return value == null ? '' : String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function fmtDollars(cents) {
        if (!cents) return '$0';
        const n = Math.abs(Math.round(cents));
        const str = '$' + Math.floor(n / 100).toLocaleString('en-CA');
        return cents < 0 ? '-' + str : str;
      }

      const STAFFING_ROLE_MAP = {
        dept_leads: [
          { dept: 'Backstage & Rehearsal Support', name: 'Stage Manager' }, { dept: 'Front of House', name: 'Front of House Manager' }, { dept: 'Front of House', name: 'Concession Manager' }, { dept: 'Technical Crew', name: 'Lighting Designer / Technician' }, { dept: 'Design & Construction', name: 'Lead Builder' }, { dept: 'Design & Construction', name: 'Lead Set Painter' }, { dept: 'Design & Construction', name: 'Lead Prop Person' }, { dept: 'Costume & Makeup', name: 'Costume Designer' }, { dept: 'Marketing & Publicity', name: 'Marketing Director' }, { dept: 'Backstage & Rehearsal Support', name: 'Cast Party Coordinator' }, { dept: 'Technical Crew', name: 'Sound / Audio Technician' },
        ],
        performance: [
          { dept: 'Front of House', name: 'Ushers' }, { dept: 'Front of House', name: 'Concession Workers' }, { dept: 'Front of House', name: 'Ticket Sales' }, { dept: 'Backstage & Rehearsal Support', name: 'Backstage Crew' }, { dept: 'Backstage & Rehearsal Support', name: 'Quick-Change Assistant' }, { dept: 'Backstage & Rehearsal Support', name: 'Child Wrangler' }, { dept: 'Technical Crew', name: 'Mic Wrangler' }, { dept: 'Technical Crew', name: 'Spotlight Operators' },
        ],
        tech: [
          { dept: 'Technical Crew', name: 'Mic Wrangler' }, { dept: 'Backstage & Rehearsal Support', name: 'Quick-Change Assistant' }, { dept: 'Backstage & Rehearsal Support', name: 'Backstage Crew' },
        ],
        dress: [
          { dept: 'Technical Crew', name: 'Mic Wrangler' }, { dept: 'Backstage & Rehearsal Support', name: 'Quick-Change Assistant' }, { dept: 'Backstage & Rehearsal Support', name: 'Backstage Crew' }, { dept: 'Backstage & Rehearsal Support', name: 'Child Wrangler' },
        ],
        rehearsal: [
          { dept: 'Backstage & Rehearsal Support', name: 'Rehearsal Assistant' }, { dept: 'Backstage & Rehearsal Support', name: 'Child Wrangler' },
        ],
        music_rehearsal: [{ dept: 'Backstage & Rehearsal Support', name: 'Rehearsal Assistant' }],
        choreography: [{ dept: 'Backstage & Rehearsal Support', name: 'Rehearsal Assistant' }],
        strike: [{ dept: 'Design & Construction', name: 'Set Strike Crew' }],
        costume_moveout: [{ dept: 'Costume & Makeup', name: 'Costume Move-Out Crew' }],
        cast_party: [{ dept: 'Backstage & Rehearsal Support', name: 'Cast Party Helper' }],
        crew: [{ dept: 'Design & Construction', name: 'Build Crew Helper' }],
        crew_set: [{ dept: 'Design & Construction', name: 'Set Builder' }],
        crew_set_painting: [{ dept: 'Design & Construction', name: 'Set Painter' }],
        crew_set_dressing: [{ dept: 'Design & Construction', name: 'Set Dresser' }],
        crew_costumes: [{ dept: 'Costume & Makeup', name: 'Costume Work Helper' }],
        crew_props: [{ dept: 'Design & Construction', name: 'Props Helper' }],
        crew_hair_makeup: [{ dept: 'Costume & Makeup', name: 'Hair & Makeup Crew' }],
        crew_wigs: [{ dept: 'Costume & Makeup', name: 'Wig Crew' }],
        crew_lighting: [{ dept: 'Technical Crew', name: 'Lighting Crew' }],
        crew_sound: [{ dept: 'Technical Crew', name: 'Sound Crew' }],
        other: [
          { dept: 'Costume & Makeup', name: 'Costume Washer' }, { dept: 'Front of House', name: 'Bakers / Treat Contributors' }, { dept: 'Marketing & Publicity', name: 'Promotion Distribution' },
        ],
      };

      // Build alias → group/section lookup from department config
      const aliasToGroupKey = {};
      const aliasToSection = {};
      cfg.groups.forEach(function (group) {
        aliasToGroupKey[group.label.trim().toLowerCase()] = group.key;
        group.sections.forEach(function (sec) {
          aliasToGroupKey[sec.label.trim().toLowerCase()] = group.key;
          aliasToSection[sec.label.trim().toLowerCase()] = { groupKey: group.key, sectionKey: sec.key };
          (sec.categoryAliases || []).forEach(function (alias) {
            const key = alias.trim().toLowerCase();
            if (!aliasToGroupKey[key]) aliasToGroupKey[key] = group.key;
            if (!aliasToSection[key]) aliasToSection[key] = { groupKey: group.key, sectionKey: sec.key };
          });
        });
      });

      function norm(value) {
        return String(value || '').trim().toLowerCase().replace(/&/g, 'and').replace(/\s+/g, ' ');
      }

      function canonicalVolunteerRoleName(name) {
        const raw = String(name || '').trim();
        const key = norm(raw);
        const renames = {
          'build crew helper': 'Set Builders',
          'set builder': 'Set Builders',
          'costume work helper': 'Costume Helper',
        };
        return renames[key] || raw;
      }

      function roleLookupMatch(text, lookup) {
        const key = norm(text);
        if (!key) return null;
        if (lookup[key]) return lookup[key];
        const keys = Object.keys(lookup);
        for (let i = 0; i < keys.length; i += 1) {
          const candidate = keys[i];
          if (key.includes(candidate) || candidate.includes(key)) return lookup[candidate];
        }
        return null;
      }

      function groupKeyForCategory(catName) {
        return roleLookupMatch(catName, aliasToGroupKey);
      }

      function sectionForRole(roleName, explicitDept, group) {
        const direct = roleLookupMatch(roleName, aliasToSection);
        if (direct && direct.groupKey === group.key) return direct.sectionKey;
        const byDept = roleLookupMatch(explicitDept, aliasToSection);
        if (byDept && byDept.groupKey === group.key) return byDept.sectionKey;
        return (group.sections[0] && group.sections[0].key) || '';
      }

      function groupKeyForRole(roleName, explicitDept) {
        return roleLookupMatch(explicitDept, aliasToGroupKey) || roleLookupMatch(roleName, aliasToGroupKey) || null;
      }

      function buildBudgetCategoryLookup(rolesByGroup) {
        const lookup = Object.assign({}, aliasToGroupKey);
        cfg.groups.forEach(function (group) {
          lookup[norm(group.label)] = group.key;
          group.sections.forEach(function (section) {
            lookup[norm(section.label)] = group.key;
            (section.categoryAliases || []).forEach(function (alias) {
              lookup[norm(alias)] = group.key;
            });
          });
        });
        Object.keys(rolesByGroup || {}).forEach(function (groupKey) {
          (rolesByGroup[groupKey] || []).forEach(function (role) {
            if (role && role.label) lookup[norm(role.label)] = groupKey;
          });
        });
        return lookup;
      }

      function groupKeyForBudgetCategory(catName, budgetLookup) {
        return roleLookupMatch(catName, budgetLookup || aliasToGroupKey);
      }

      function planEntryBaseType(key) {
        return Object.keys(STAFFING_ROLE_MAP)
          .sort(function (a, b) { return b.length - a.length; })
          .find(function (type) { return key === type || String(key || '').indexOf(type + '-') === 0; }) || '';
      }

      function planEntryRoleIndex(key, baseType) {
        const raw = String(key || '').slice(String(baseType || '').length + 1);
        const match = raw.match(/^(\d+)/);
        return match ? parseInt(match[1], 10) : -1;
      }

      function defaultPlanRole(key, entry) {
        const baseType = planEntryBaseType(key);
        const roles = STAFFING_ROLE_MAP[baseType] || [];
        const idx = planEntryRoleIndex(key, baseType);
        const fallback = idx >= 0 ? roles[idx] : null;
        return {
          name: canonicalVolunteerRoleName(entry.roleName || entry.role_name || (fallback && fallback.name) || ''),
          dept: entry.department || entry.dept || (fallback && fallback.dept) || '',
        };
      }

      function signupRole(signup) {
        return canonicalVolunteerRoleName(
          signup.production_title ||
          signup.volunteer_role ||
          signup.role_name ||
          signup.role ||
          signup.summary ||
          ''
        );
      }

      function collectLiveRoles(source) {
        const byGroup = {};
        cfg.groups.forEach(function (group) { byGroup[group.key] = []; });

        function addRole(groupKey, roleName, explicitDept) {
          if (!groupKey || !roleName) return;
          const group = cfg.groups.find(function (item) { return item.key === groupKey; });
          if (!group) return;
          const label = canonicalVolunteerRoleName(roleName);
          const key = norm(label);
          if (!key) return;
          if (byGroup[groupKey].some(function (item) { return item.key === key; })) return;
          byGroup[groupKey].push({
            key,
            label,
            sectionKey: sectionForRole(label, explicitDept, group),
          });
        }

        Object.keys(source.staffingPlan || {}).forEach(function (planKey) {
          const entry = source.staffingPlan[planKey] || {};
          if (entry.hidden) return;
          const count = parseInt(entry.count ?? entry.qty ?? entry.volunteers_needed, 10) || 0;
          if (count <= 0) return;
          const role = defaultPlanRole(planKey, entry);
          addRole(groupKeyForRole(role.name, role.dept), role.name, role.dept);
        });

        (source.opportunities || []).forEach(function (opp) {
          const roleName = canonicalVolunteerRoleName(opp.production_title || opp.volunteer_role || opp.summary || '');
          addRole(groupKeyForRole(roleName, opp.department || opp.dept_category || opp.volunteer_department), roleName, opp.department || opp.dept_category || opp.volunteer_department);
        });

        (source.signups || []).forEach(function (signup) {
          const roleName = signupRole(signup);
          addRole(groupKeyForRole(roleName, signup.department || signup.dept_category || signup.volunteer_department), roleName, signup.department || signup.dept_category || signup.volunteer_department);
        });

        (source.teamMembers || []).forEach(function (member) {
          const roleName = canonicalVolunteerRoleName(member.role_name || member.role || member.access_level || '');
          addRole(groupKeyForRole(roleName, member.department), roleName, member.department);
        });

        return byGroup;
      }

      function renderBudgetBreakdown(groupBudget) {
        if (!groupBudget || !Array.isArray(groupBudget.categories) || !groupBudget.categories.length) {
          return '<div class="dept-dashboard-breakdown"><div class="dept-breakdown-empty">No role-level budget breakdown yet.</div></div>';
        }
        const rows = groupBudget.categories.map(function (category) {
          const plannedClass = category.planned === 0 ? 'is-zero' : '';
          const spentClass = category.spent === 0 ? 'is-zero' : '';
          return '<div class="dept-dashboard-breakdown-row">' +
            '<div class="dept-breakdown-name">' + esc(category.name) + '</div>' +
            '<div class="dept-breakdown-value ' + plannedClass + '">' + fmtDollars(category.planned) + '</div>' +
            '<div class="dept-breakdown-value ' + spentClass + '">' + fmtDollars(category.spent) + '</div>' +
          '</div>';
        }).join('');
        return '<div class="dept-dashboard-breakdown">' +
          '<div class="dept-dashboard-breakdown-head"><div>Breakdown</div><div>Planned</div><div>Spent</div></div>' +
          rows +
        '</div>';
      }

      // Render cards immediately with placeholder budget slots
      function renderCards(budgetByGroup, rolesByGroup) {
        root.innerHTML = cfg.groups.map(function (group) {
          const roleItems = (rolesByGroup && rolesByGroup[group.key] && rolesByGroup[group.key].length)
            ? rolesByGroup[group.key]
            : group.sections.map(function (section) {
                return { label: section.label, sectionKey: section.key };
              });
          const links = roleItems.map(function (item) {
            return '<button type="button" class="dept-dashboard-link" onclick="btsDeptSectionNav(\'' + esc(group.key) + '\',\'' + esc(item.sectionKey) + '\')">' + esc(item.label) + '</button>';
          }).join('');

          let budgetHtml = '';
          if (budgetByGroup) {
            const b = budgetByGroup[group.key] || { planned: 0, spent: 0, categories: [] };
            const overBudget = b.spent > 0 && b.planned > 0 && b.spent > b.planned;
            const spentClass = overBudget ? 'is-over' : (b.spent === 0 ? 'is-zero' : '');
            const plannedClass = b.planned === 0 ? 'is-zero' : '';
            budgetHtml = '<div class="dept-dashboard-budget">' +
              '<div class="dept-budget-item"><div class="dept-budget-label">Planned</div><div class="dept-budget-value ' + plannedClass + '">' + fmtDollars(b.planned) + '</div></div>' +
              '<div class="dept-budget-item"><div class="dept-budget-label">Spent</div><div class="dept-budget-value ' + spentClass + '">' + fmtDollars(b.spent) + '</div></div>' +
            '</div>' + renderBudgetBreakdown(b);
          } else {
            budgetHtml = '<div class="dept-dashboard-budget" id="dept-budget-' + esc(group.key) + '">' +
              '<div class="dept-budget-item"><div class="dept-budget-label">Planned</div><div class="dept-budget-value is-zero">--</div></div>' +
              '<div class="dept-budget-item"><div class="dept-budget-label">Spent</div><div class="dept-budget-value is-zero">--</div></div>' +
            '</div><div class="dept-dashboard-breakdown"><div class="dept-breakdown-empty">Loading breakdown...</div></div>';
          }

          return '<section class="dept-dashboard-card" style="--dept-color:' + esc(group.color) + ';">' +
            '<div class="dept-dashboard-head">' +
              '<div class="dept-dashboard-icon"><img src="' + esc(group.icon) + '" alt="" /></div>' +
              '<div><div class="dept-dashboard-title">' + esc(group.label) + '</div><div class="dept-dashboard-sub">' + roleItems.length + ' role' + (roleItems.length === 1 ? '' : 's') + '</div></div>' +
            '</div>' +
            budgetHtml +
            '<div class="dept-dashboard-links">' + links + '</div>' +
          '</section>';
        }).join('');
      }

      // Render immediately with placeholders
      renderCards(null, null);

      // Fetch budget data from Supabase
      const prodId = new URLSearchParams(location.search).get('id');
      if (!prodId || typeof supabase === 'undefined') return;

      const sb = supabase.createClient(
        'https://tkmaiktxpwqfbgeojbnf.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
      );

      Promise.all([
        sb.from('budget_categories').select('id, name, planned_cents').eq('production_id', prodId),
        sb.from('budget_items').select('category_id, paid_cents').eq('production_id', prodId),
        sb.from('opportunities').select('id, production_title, volunteer_role, summary, department, dept_category, volunteer_department, volunteers_needed, status').eq('production_id', prodId).in('opportunity_type', ['volunteer', 'creative_team']),
        sb.from('volunteer_signups').select('id, role_name, volunteer_role, production_title, department, dept_category, volunteer_department, status').eq('production_id', prodId),
        sb.from('production_team_members').select('id, role_name, role, access_level, department, is_active').eq('production_id', prodId),
        sb.from('productions').select('volunteer_staffing_plan').eq('id', prodId).single(),
      ]).then(function (results) {
        const cats = (results[0].data || []);
        const items = (results[1].data || []);
        const opportunities = (results[2].data || []);
        const signups = (results[3].data || []);
        const teamMembers = (results[4].data || []).filter(function (member) { return member.is_active !== false; });
        const staffingPlan = (results[5].data && results[5].data.volunteer_staffing_plan) || {};

        // Sum paid_cents per category_id
        const paidByCat = {};
        items.forEach(function (item) {
          paidByCat[item.category_id] = (paidByCat[item.category_id] || 0) + (item.paid_cents || 0);
        });

        const rolesByGroup = collectLiveRoles({
          opportunities: opportunities,
          signups: signups,
          teamMembers: teamMembers,
          staffingPlan: staffingPlan,
        });

        const budgetLookup = buildBudgetCategoryLookup(rolesByGroup);

        // Aggregate by group, including custom role-level budget categories
        const byGroup = {};
        cats.forEach(function (cat) {
          const gk = groupKeyForBudgetCategory(cat.name, budgetLookup) || groupKeyForCategory(cat.name);
          if (!gk) return;
          if (!byGroup[gk]) byGroup[gk] = { planned: 0, spent: 0, categories: [] };
          byGroup[gk].planned += (cat.planned_cents || 0);
          byGroup[gk].spent += (paidByCat[cat.id] || 0);
          byGroup[gk].categories.push({
            name: cat.name || 'Untitled',
            planned: cat.planned_cents || 0,
            spent: paidByCat[cat.id] || 0,
          });
        });

        Object.keys(byGroup).forEach(function (groupKey) {
          byGroup[groupKey].categories.sort(function (a, b) {
            return (b.planned + b.spent) - (a.planned + a.spent) || String(a.name || '').localeCompare(String(b.name || ''));
          });
        });

        renderCards(byGroup, rolesByGroup);
      }).catch(function () {
        // Budget fetch failed — placeholders stay
      });
    })();
  </script>
</body>
</html>
