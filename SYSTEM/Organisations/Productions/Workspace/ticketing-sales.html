<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v49-20260618" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px; flex: 1; min-height: 100vh; min-height: 100dvh;
      padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative;
    }
    .prod-main::before {
      content: ''; position: fixed; inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0;
    }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }
    .aud-floating-status-layer {
      position: fixed; top: calc(env(safe-area-inset-top, 0px) + 1rem);
      right: calc(env(safe-area-inset-right, 0px) + 1.25rem); z-index: 2200;
      max-width: min(360px, calc(100vw - 2rem)); padding: 0.52rem 0.72rem;
      border: 1px solid rgba(87,46,136,0.12); border-radius: 15px;
      background: rgba(255,255,255,0.94);
      box-shadow: 0 16px 42px rgba(87,46,136,0.14), 0 2px 0 rgba(87,46,136,0.05);
      backdrop-filter: blur(12px); pointer-events: auto;
    }

    /* ── Filters ── */
    .ts-toolbar { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0; flex-wrap: wrap; }
    .ts-filter { padding: 0.4rem 0.85rem; border: 1.5px solid #e0dce8; border-radius: 8px; background: #fff; font: inherit; font-size: 0.75rem; color: #3a3050; cursor: pointer; }
    .ts-filter:focus { border-color: #572e88; outline: none; }
    .ts-count { font-size: 0.78rem; font-weight: 800; color: #8e82a7; margin-left: auto; }

    /* ── Orders table ── */
    .ts-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(26,21,48,0.06); border: 1.5px solid rgba(87,46,136,0.08); }
    .ts-table th {
      text-align: left; font-size: 0.62rem; font-weight: 900; color: #8e82a7;
      text-transform: uppercase; letter-spacing: 0.08em; padding: 0.65rem 0.85rem;
      border-bottom: 1.5px solid #eceaf3; background: #faf9fd; cursor: pointer; user-select: none;
    }
    .ts-table th:hover { color: #572e88; }
    .ts-table td { padding: 0.7rem 0.85rem; font-size: 0.82rem; border-bottom: 1px solid #f5f3fa; }
    .ts-table tr:last-child td { border-bottom: none; }
    .ts-name { font-weight: 800; color: #1a1530; }
    .ts-email { font-size: 0.72rem; color: #8e82a7; }
    .ts-badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 20px; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; }
    .ts-badge--confirmed { background: rgba(118,158,123,0.15); color: #4a7a50; }
    .ts-badge--pending { background: rgba(239,171,69,0.15); color: #b05a0a; }
    .ts-badge--cancelled { background: rgba(209,82,61,0.12); color: #a93a25; }
    .ts-items { font-size: 0.72rem; color: #6b5f8a; }
    .ts-empty { text-align: center; padding: 3rem 1.5rem; color: #b0a8c8; font-size: 0.88rem; }

    /* ── Order detail modal ── */
    .ts-modal-overlay { position: fixed; inset: 0; background: rgba(26,21,48,0.45); z-index: 3000; display: none; align-items: center; justify-content: center; }
    .ts-modal-overlay.ts-modal--open { display: flex; }
    .ts-modal { background: #fff; border-radius: 16px; width: min(560px, calc(100% - 2rem)); max-height: 85vh; overflow-y: auto; padding: 1.75rem; box-shadow: 0 24px 60px rgba(26,21,48,0.25); }
    .ts-modal-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
    .ts-modal-title { font-size: 1.1rem; font-weight: 950; color: #1a1530; margin: 0; }
    .ts-modal-close { background: none; border: none; font-size: 1.2rem; color: #8e82a7; cursor: pointer; padding: 0.25rem; }
    .ts-modal-section { font-size: 0.72rem; font-weight: 900; color: #572e88; text-transform: uppercase; letter-spacing: 0.08em; margin: 1rem 0 0.4rem; }
    .ts-modal-row { display: flex; justify-content: space-between; font-size: 0.82rem; padding: 0.25rem 0; }
    .ts-modal-row-label { color: #8e82a7; }
    .ts-modal-row-val { font-weight: 800; color: #1a1530; }
    .ts-modal-items { width: 100%; border-collapse: collapse; margin: 0.5rem 0; }
    .ts-modal-items th { text-align: left; font-size: 0.6rem; font-weight: 900; color: #8e82a7; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.35rem 0; border-bottom: 1px solid #eceaf3; }
    .ts-modal-items td { padding: 0.35rem 0; font-size: 0.78rem; border-bottom: 1px solid #f5f3fa; }
    .ts-modal-total { display: flex; justify-content: space-between; font-size: 1rem; font-weight: 950; color: #572e88; padding: 0.5rem 0; margin-top: 0.25rem; border-top: 1.5px solid #eceaf3; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Ticketing</span></span>
            </div>
            <h1 class="aud-visual-title">Sales</h1>
            <p class="aud-visual-copy">Every ticket order for this production.</p>
          </div>
        </div>
      </div>

      <div class="ts-toolbar">
        <select class="ts-filter" id="ts-filter-status" onchange="renderOrders()">
          <option value="">All statuses</option>
          <option value="confirmed">Confirmed</option>
          <option value="pending">Pending</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <select class="ts-filter" id="ts-filter-perf" onchange="renderOrders()">
          <option value="">All performances</option>
        </select>
        <span class="ts-count" id="ts-count"></span>
      </div>

      <div id="ts-table-wrap"></div>

    </div>
  </div>

  <!-- Order detail modal -->
  <div class="ts-modal-overlay" id="ts-modal" onclick="if(event.target===this)closeOrderModal()">
    <div class="ts-modal">
      <div class="ts-modal-head">
        <h3 class="ts-modal-title">Order Details</h3>
        <button class="ts-modal-close" onclick="closeOrderModal()">&#x2715;</button>
      </div>
      <div id="ts-modal-body"></div>
    </div>
  </div>

  <bts-audition-status-strip id="tkt-public-status-strip" class="aud-floating-status-layer" style="display:none"></bts-audition-status-strip>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Components/audition-status-strip.js"></script>
  <script src="/SHARED/Components/ticketing-status-strip.js?v=1"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=25"></script>
  <script>
    window.initProductionPage('ticketing');

    var SB_URL = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
    var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
    var sb = supabase.createClient(SB_URL, SB_KEY);
    var prodId = new URLSearchParams(location.search).get('id') || '';
    var allOrders = [];
    var allPerfs = [];

    function esc(v) { return String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function fmtMoney(c) { return '$' + (c / 100).toFixed(2); }
    function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' }); }
    function fmtTime(iso) { return new Date(iso).toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit', hour12: true }); }
    function fmtFull(iso) { return new Date(iso).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }); }

    function badgeHtml(status) {
      var cls = status === 'confirmed' ? 'ts-badge--confirmed' : status === 'cancelled' ? 'ts-badge--cancelled' : 'ts-badge--pending';
      return '<span class="ts-badge ' + cls + '">' + esc(status || 'pending') + '</span>';
    }

    function perfLabel(perfId) {
      var p = allPerfs.find(function(x) { return x.id === perfId; });
      return p ? fmtDate(p.start_time) + ' ' + fmtTime(p.start_time) : '-';
    }

    function orderTicketCount(order) {
      var n = 0;
      (order.items || []).forEach(function(it) { n += it.quantity || 0; });
      return n;
    }

    function itemsSummary(order) {
      return (order.items || []).map(function(it) { return it.quantity + 'x ' + (it.ticket_type_name || 'Ticket'); }).join(', ');
    }

    async function loadSales() {
      if (!prodId) return;
      var [ordersRes, perfsRes] = await Promise.all([
        sb.from('ticket_orders').select('*').eq('production_id', prodId).order('created_at', { ascending: false }),
        sb.from('production_events').select('id,title,start_time,venue').eq('production_id', prodId).eq('event_type', 'performance').order('start_time'),
      ]);
      allOrders = ordersRes.data || [];
      allPerfs = perfsRes.data || [];

      var perfSelect = document.getElementById('ts-filter-perf');
      allPerfs.forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = fmtDate(p.start_time) + ' ' + fmtTime(p.start_time);
        perfSelect.appendChild(opt);
      });

      renderOrders();
    }

    function renderOrders() {
      var statusFilter = document.getElementById('ts-filter-status').value;
      var perfFilter = document.getElementById('ts-filter-perf').value;

      var filtered = allOrders.filter(function(o) {
        if (statusFilter && o.status !== statusFilter) return false;
        if (perfFilter && o.performance_event_id !== perfFilter) return false;
        return true;
      });

      document.getElementById('ts-count').textContent = filtered.length + ' order' + (filtered.length !== 1 ? 's' : '');

      if (!filtered.length) {
        document.getElementById('ts-table-wrap').innerHTML = '<div class="ts-empty">No orders match your filters.</div>';
        return;
      }

      var html = '<table class="ts-table"><thead><tr><th>Customer</th><th>Performance</th><th>Tickets</th><th>Items</th><th>Total</th><th>Status</th><th>Ordered</th></tr></thead><tbody>';
      filtered.forEach(function(o) {
        html += '<tr style="cursor:pointer" onclick="openOrderModal(\'' + o.id + '\')">' +
          '<td><div class="ts-name">' + esc(o.first_name + ' ' + o.last_name) + '</div><div class="ts-email">' + esc(o.email) + '</div></td>' +
          '<td>' + perfLabel(o.performance_event_id) + '</td>' +
          '<td>' + orderTicketCount(o) + '</td>' +
          '<td><div class="ts-items">' + esc(itemsSummary(o)) + '</div></td>' +
          '<td style="font-weight:800">' + fmtMoney(o.total_cents || 0) + '</td>' +
          '<td>' + badgeHtml(o.status) + '</td>' +
          '<td style="font-size:0.72rem;color:#8e82a7">' + fmtFull(o.created_at) + '</td>' +
          '</tr>';
      });
      html += '</tbody></table>';
      document.getElementById('ts-table-wrap').innerHTML = html;
    }

    function openOrderModal(orderId) {
      var o = allOrders.find(function(x) { return x.id === orderId; });
      if (!o) return;

      var body = '<div class="ts-modal-section">Customer</div>' +
        '<div class="ts-modal-row"><span class="ts-modal-row-label">Name</span><span class="ts-modal-row-val">' + esc(o.first_name + ' ' + o.last_name) + '</span></div>' +
        '<div class="ts-modal-row"><span class="ts-modal-row-label">Email</span><span class="ts-modal-row-val">' + esc(o.email) + '</span></div>' +
        (o.phone ? '<div class="ts-modal-row"><span class="ts-modal-row-label">Phone</span><span class="ts-modal-row-val">' + esc(o.phone) + '</span></div>' : '') +
        '<div class="ts-modal-section">Performance</div>' +
        '<div class="ts-modal-row"><span class="ts-modal-row-label">Date</span><span class="ts-modal-row-val">' + perfLabel(o.performance_event_id) + '</span></div>' +
        '<div class="ts-modal-row"><span class="ts-modal-row-label">Status</span><span class="ts-modal-row-val">' + badgeHtml(o.status) + '</span></div>' +
        '<div class="ts-modal-row"><span class="ts-modal-row-label">Payment</span><span class="ts-modal-row-val">' + badgeHtml(o.payment_status) + '</span></div>' +
        '<div class="ts-modal-section">Tickets</div>' +
        '<table class="ts-modal-items"><thead><tr><th>Type</th><th>Qty</th><th style="text-align:right">Price</th></tr></thead><tbody>';

      (o.items || []).forEach(function(it) {
        body += '<tr><td>' + esc(it.ticket_type_name || 'Ticket') + '</td><td>' + (it.quantity || 0) + '</td><td style="text-align:right">' + fmtMoney((it.quantity || 0) * (it.price_cents || 0)) + '</td></tr>';
      });

      body += '</tbody></table>' +
        '<div class="ts-modal-total"><span>Total</span><span>' + fmtMoney(o.total_cents || 0) + '</span></div>' +
        '<div class="ts-modal-row" style="margin-top:0.75rem"><span class="ts-modal-row-label">Order ID</span><span class="ts-modal-row-val" style="font-size:0.68rem;color:#8e82a7">' + esc(o.id) + '</span></div>' +
        '<div class="ts-modal-row"><span class="ts-modal-row-label">Ordered</span><span class="ts-modal-row-val">' + fmtFull(o.created_at) + '</span></div>';

      document.getElementById('ts-modal-body').innerHTML = body;
      document.getElementById('ts-modal').classList.add('ts-modal--open');
    }

    function closeOrderModal() {
      document.getElementById('ts-modal').classList.remove('ts-modal--open');
    }

    loadSales();
  </script>
</body>
</html>
