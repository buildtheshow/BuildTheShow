<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Calendar - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=20260718c" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=20260718c" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; min-height: 100dvh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; z-index: 0; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: -1; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    .fc-wrap { background: #fff; border-radius: 12px; border: 1px solid rgba(87,46,136,0.1); overflow: hidden; box-shadow: 0 2px 8px rgba(87,46,136,0.05); padding: 1rem; }
    .fc-legend { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .fc-legend-item { font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 20px; background: var(--c); color: #fff; display: inline-flex; align-items: center; gap: 0.35rem; }
    .fc-legend-hint { font-size: 0.68rem; color: #b0a0cc; font-style: italic; }

    .zeus-event-time  { font-size: 0.62rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: clip; opacity: 0.9; }
    .zeus-event-label { font-size: 0.68rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: clip; }
    .fc .fc-scrollgrid { border-color: #e8e4f0; }
    .fc td, .fc th { border-color: #e8e4f0 !important; }
    .fc-event { cursor: pointer; }

    .vc-empty { text-align: center; padding: 3rem 1rem; color: rgba(26,21,48,0.35); font-size: 0.88rem; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,21,48,0.5); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 1.6rem 1.75rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(26,21,48,0.22); }
    .modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.9rem; gap: 0.75rem; }
    .modal-title { font-size: 1.05rem; font-weight: 900; color: #1a1530; }
    .modal-sub { font-size: 0.78rem; color: rgba(26,21,48,0.5); margin-top: 0.2rem; }
    .modal-close { background: none; border: none; font-size: 1rem; color: rgba(26,21,48,0.4); cursor: pointer; padding: 0.25rem; line-height: 1; }
    .modal-close:hover { color: #1a1530; }
    .vc-role-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0; border-bottom: 1px solid rgba(87,46,136,0.06); }
    .vc-role-row:last-child { border-bottom: none; }
    .vc-role-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .vc-role-name { font-size: 0.85rem; font-weight: 800; color: #1a1530; flex: 1; }
    .vc-role-dept { font-size: 0.72rem; color: rgba(26,21,48,0.4); }
    .vc-role-count { font-size: 0.78rem; font-weight: 900; }
    .btn-secondary { background: #fff; color: #572e88; border: 1.5px solid rgba(87,46,136,0.3); border-radius: 8px; padding: 0.52rem 1rem; font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: var(--bts-font); display: inline-flex; align-items: center; gap: 0.4rem; text-decoration: none; transition: border-color 0.14s; margin-top: 1.1rem; width: 100%; justify-content: center; }
    .btn-secondary:hover { border-color: #572e88; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>

  <div class="prod-main">
    <div class="prod-main-inner">

      <div class="aud-visual-hero" style="margin-bottom:0.75rem;">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Volunteers</span></span>
            </div>
            <h1 class="aud-visual-title">Volunteer Calendar</h1>
            <p class="aud-visual-copy">Every volunteer shift on the calendar, and whether it still needs people.</p>
          </div>
        </div>
      </div>

      <div class="fc-legend" id="fc-legend">
        <span class="fc-legend-item" style="--c:#769e7b">Filled</span>
        <span class="fc-legend-item" style="--c:#efab45">Partially filled</span>
        <span class="fc-legend-item" style="--c:#d1523d">Needs volunteers</span>
        <span class="fc-legend-hint">Click a shift for details</span>
      </div>

      <div class="fc-wrap">
        <div id="fc-calendar"></div>
        <div class="vc-empty" id="vc-empty" style="display:none;">No volunteer roles have been planned yet. Set them up in <a href="#" onclick="navigateToVolunteers('plan');return false;" style="color:#572e88;">Plan</a>.</div>
      </div>

    </div>
  </div>

  <div class="modal-overlay" id="vc-modal">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="vc-modal-title">Event</div>
          <div class="modal-sub" id="vc-modal-sub"></div>
        </div>
        <button class="modal-close" type="button" aria-label="Close" onclick="closeVcModal()">&#10005;</button>
      </div>
      <div id="vc-modal-roles"></div>
      <button type="button" class="btn-secondary" onclick="navigateToVolunteers('requests')">Review Requests &rarr;</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=78-20260720-cachebust"></script>
  <script>
    window.initProductionPage('volunteers');

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    const CALENDAR_DEADLINE_NOTE_MARKER = '[bts:is_deadline]';
    function calendarNotesHaveDeadlineMarker(notes) {
      return String(notes || '').includes(CALENDAR_DEADLINE_NOTE_MARKER) || String(notes || '').includes('[bts:deadline_area:');
    }
    function volCrewSubtypeFromTitle(title) {
      if (/costume/i.test(title)) return 'crew_costumes';
      if (/prop/i.test(title)) return 'crew_props';
      if (/paint/i.test(title)) return 'crew_set_painting';
      if (/(hair|make.?up)/i.test(title)) return 'crew_hair_makeup';
      if (/wig/i.test(title)) return 'crew_wigs';
      if (/light/i.test(title)) return 'crew_lighting';
      if (/sound/i.test(title)) return 'crew_sound';
      if (/(set\s*(build|dress)|build|construction)/i.test(title)) return 'crew_set';
      return null;
    }

    function volCalendarEventType(event = {}) {
      const rawType = event.event_type || 'event';
      const title = String(event.title || '').trim();
      if (event.is_deadline || rawType === 'deadline' || calendarNotesHaveDeadlineMarker(event.notes)) return 'deadline';
      if (/cast\s*party/i.test(title)) return 'cast_party';
      if (rawType === 'crew') return volCrewSubtypeFromTitle(title) || rawType;
      return rawType;
    }

    // Mirrors PLAN_ROLE_MAP in production-workspace.js, keep these in sync.
    const PLAN_ROLE_MAP = {
      dept_leads: [
        { name: 'Stage Manager', dept: 'Backstage & Rehearsal Support' },
        { name: 'Front of House Manager', dept: 'Front of House' },
        { name: 'Concession Manager', dept: 'Front of House' },
        { name: 'Lighting Designer / Technician', dept: 'Technical Crew' },
        { name: 'Lead Builder', dept: 'Design & Construction' },
        { name: 'Lead Set Painter', dept: 'Design & Construction' },
        { name: 'Lead Prop Person', dept: 'Design & Construction' },
        { name: 'Costume Designer', dept: 'Costume & Makeup' },
        { name: 'Marketing Director', dept: 'Marketing & Publicity' },
        { name: 'Cast Party Coordinator', dept: 'Backstage & Rehearsal Support' },
      ],
      performance: [
        { name: 'Ushers', dept: 'Front of House' },
        { name: 'Concession Workers', dept: 'Front of House' },
        { name: 'Ticket Sales', dept: 'Front of House' },
        { name: 'Backstage Crew', dept: 'Backstage & Rehearsal Support' },
        { name: 'Quick-Change Assistant', dept: 'Backstage & Rehearsal Support' },
        { name: 'Child Wrangler', dept: 'Backstage & Rehearsal Support' },
        { name: 'Mic Wrangler', dept: 'Technical Crew' },
        { name: 'Spotlight Operators', dept: 'Technical Crew' },
      ],
      tech: [
        { name: 'Mic Wrangler', dept: 'Technical Crew' },
        { name: 'Quick-Change Assistant', dept: 'Backstage & Rehearsal Support' },
        { name: 'Backstage Crew', dept: 'Backstage & Rehearsal Support' },
      ],
      dress: [
        { name: 'Mic Wrangler', dept: 'Technical Crew' },
        { name: 'Quick-Change Assistant', dept: 'Backstage & Rehearsal Support' },
        { name: 'Backstage Crew', dept: 'Backstage & Rehearsal Support' },
        { name: 'Child Wrangler', dept: 'Backstage & Rehearsal Support' },
      ],
      rehearsal: [
        { name: 'Rehearsal Assistant', dept: 'Backstage & Rehearsal Support' },
        { name: 'Child Wrangler', dept: 'Backstage & Rehearsal Support' },
      ],
      music_rehearsal: [{ name: 'Rehearsal Assistant', dept: 'Backstage & Rehearsal Support' }],
      choreography: [{ name: 'Rehearsal Assistant', dept: 'Backstage & Rehearsal Support' }],
      strike: [
        { name: 'Set Strike Crew', dept: 'Design & Construction' },
        { name: 'Costume Move-Out Crew', dept: 'Costume & Makeup' },
      ],
      costume_moveout: [{ name: 'Costume Move-Out Crew', dept: 'Costume & Makeup' }],
      cast_party: [{ name: 'Cast Party Helper', dept: 'Backstage & Rehearsal Support' }],
      crew: [{ name: 'Set Builder', dept: 'Design & Construction' }],
      crew_set: [{ name: 'Set Builder', dept: 'Design & Construction' }],
      crew_set_painting: [{ name: 'Set Painter', dept: 'Design & Construction' }],
      crew_set_dressing: [{ name: 'Set Dresser', dept: 'Design & Construction' }],
      crew_costumes: [{ name: 'Costume Work Helper', dept: 'Costume & Makeup' }],
      crew_props: [{ name: 'Props Helper', dept: 'Design & Construction' }],
      crew_hair_makeup: [{ name: 'Hair & Makeup Crew', dept: 'Costume & Makeup' }],
      crew_wigs: [{ name: 'Wig Crew', dept: 'Costume & Makeup' }],
      crew_lighting: [{ name: 'Lighting Crew', dept: 'Technical Crew' }],
      crew_sound: [{ name: 'Sound Crew', dept: 'Technical Crew' }],
      other: [
        { name: 'Costume Washer', dept: 'Costume & Makeup' },
        { name: 'Bakers / Treat Contributors', dept: 'Front of House' },
        { name: 'Promotion Distribution', dept: 'Marketing & Publicity' },
      ],
    };

    let _sb, _prodId;
    let _staffingPlan = {};
    let _events = [];
    let _approvedByRoleDate = {};
    let fcCalendar = null;

    function plannedRolesForType(eventType) {
      const fixed = (PLAN_ROLE_MAP[eventType] || []).map((role, ri) => {
        const count = _staffingPlan[`${eventType}-${ri}`]?.count ?? 0;
        return count > 0 ? { name: role.name, dept: role.dept, needed: count } : null;
      }).filter(Boolean);
      const custom = Object.entries(_staffingPlan)
        .filter(([k, v]) => k.startsWith(`${eventType}-custom-`) && v.roleName && (v.count ?? 0) > 0)
        .map(([, v]) => ({ name: v.roleName, dept: v.department || 'Other', needed: v.count }));
      const roles = [...fixed, ...custom];
      if (eventType !== 'dept_leads') {
        const deptsInScope = new Set(roles.map(r => r.dept));
        const leadRoles = (PLAN_ROLE_MAP.dept_leads || []).map((role, ri) => {
          if (!deptsInScope.has(role.dept)) return null;
          if (roles.some(r => r.name === role.name)) return null;
          const count = _staffingPlan[`dept_leads-${ri}`]?.count ?? 0;
          return count > 0 ? { name: role.name, dept: role.dept, needed: count } : null;
        }).filter(Boolean);
        roles.push(...leadRoles);
      }
      return roles;
    }

    function statusColor(filled, needed) {
      if (needed === 0) return '#b0a0cc';
      if (filled >= needed) return '#769e7b';
      if (filled > 0) return '#efab45';
      return '#d1523d';
    }

    function buildCalendarEvents() {
      const fcEvents = [];
      _events.forEach(ev => {
        const type = volCalendarEventType(ev);
        if (type === 'deadline') return;
        const planRoles = plannedRolesForType(type);
        if (!planRoles.length) return;
        const dateStr = (ev.start_time || '').slice(0, 10);
        planRoles.forEach(pr => {
          const filled = _approvedByRoleDate[`${pr.name.toLowerCase()}|${dateStr}`] || 0;
          const color = statusColor(filled, pr.needed);
          fcEvents.push({
            id: ev.id + '::' + pr.name,
            title: pr.name + ' ' + filled + '/' + pr.needed,
            start: (ev.start_time || '').slice(0, 19),
            end: ev.end_time ? ev.end_time.slice(0, 19) : null,
            backgroundColor: color,
            borderColor: color,
            textColor: '#ffffff',
            extendedProps: {
              eventTitle: ev.title || type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
              role: pr.name,
              dept: pr.dept,
              filled, needed: pr.needed,
            },
          });
        });
      });
      return fcEvents;
    }

    function openVcModal(dateEvents) {
      const first = dateEvents[0];
      document.getElementById('vc-modal-title').textContent = first.extendedProps.eventTitle;
      const d = new Date(first.start);
      document.getElementById('vc-modal-sub').textContent = d.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
      document.getElementById('vc-modal-roles').innerHTML = dateEvents.map(e => {
        const p = e.extendedProps;
        return '<div class="vc-role-row">' +
          '<span class="vc-role-dot" style="background:' + p.dot + ';"></span>' +
          '<div><div class="vc-role-name">' + esc(p.role) + '</div><div class="vc-role-dept">' + esc(p.dept) + '</div></div>' +
          '<span class="vc-role-count" style="color:' + p.dot + ';margin-left:auto;">' + p.filled + '/' + p.needed + '</span>' +
        '</div>';
      }).join('');
      document.getElementById('vc-modal').classList.add('open');
    }
    function closeVcModal() {
      document.getElementById('vc-modal').classList.remove('open');
    }

    function initCalendar(fcEvents) {
      if (typeof FullCalendar === 'undefined') {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js';
        s.onload = () => initCalendar(fcEvents);
        document.head.appendChild(s);
        return;
      }
      const isMobile = window.matchMedia('(max-width: 700px)').matches;
      fcCalendar = new FullCalendar.Calendar(document.getElementById('fc-calendar'), {
        initialView: isMobile ? 'listMonth' : 'dayGridMonth',
        headerToolbar: isMobile
          ? { left: 'prev,next', center: 'title', right: 'listMonth' }
          : { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
        editable: false,
        selectable: false,
        dayMaxEvents: 3,
        height: 'auto',
        fixedWeekCount: false,
        timeZone: false,
        eventDisplay: 'block',
        events: fcEvents,
        eventContent(arg) {
          const wrap = document.createElement('div');
          wrap.style.cssText = 'width:100%;overflow:hidden;text-align:center;line-height:1.2;';
          wrap.innerHTML = '<div class="zeus-event-label">' + esc(arg.event.title) + '</div>';
          return { domNodes: [wrap] };
        },
        eventClick(info) {
          const dateStr = info.event.startStr.slice(0, 10);
          const dayEvents = fcCalendar.getEvents()
            .filter(e => e.startStr.slice(0, 10) === dateStr && e.extendedProps.eventTitle === info.event.extendedProps.eventTitle)
            .map(e => ({ start: e.start, extendedProps: { ...e.extendedProps, dot: e.backgroundColor } }));
          openVcModal(dayEvents);
        },
      });
      fcCalendar.render();
    }

    (async function () {
      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      _prodId = new URLSearchParams(location.search).get('id') || '';
      if (!_prodId) return;
      _sb = supabase.createClient(SB_URL, SB_ANON);

      const [eventsRes, prodRes, signupsRes] = await Promise.all([
        _sb.from('production_events').select('id,title,event_type,start_time,end_time,is_deadline,notes').eq('production_id', _prodId).order('start_time'),
        _sb.from('productions').select('volunteer_staffing_plan').eq('id', _prodId).single(),
        _sb.from('volunteer_signups').select('*').eq('production_id', _prodId),
      ]);

      _events = eventsRes.data || [];
      _staffingPlan = prodRes.data?.volunteer_staffing_plan || {};

      _approvedByRoleDate = {};
      (signupsRes.data || []).forEach(s => {
        if (s.status !== 'approved') return;
        const role = (s.role_name || '').toLowerCase().trim();
        if (!role) return;
        const dates = [];
        if (s.shift_date) dates.push(String(s.shift_date).slice(0, 10));
        if (Array.isArray(s.required_dates)) s.required_dates.forEach(d => { if (d) dates.push(String(d).slice(0, 10)); });
        dates.forEach(d => {
          const k = role + '|' + d;
          _approvedByRoleDate[k] = (_approvedByRoleDate[k] || 0) + 1;
        });
      });

      const fcEvents = buildCalendarEvents();
      if (!fcEvents.length) document.getElementById('vc-empty').style.display = 'block';
      initCalendar(fcEvents);
    })();

    window.closeVcModal = closeVcModal;
  </script>
</body>
</html>
