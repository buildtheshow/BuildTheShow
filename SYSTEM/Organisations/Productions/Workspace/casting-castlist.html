<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cast List - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=20260718c" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=20260718c" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative;  z-index: 0; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: -1; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1100px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    .page-kicker { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,21,48,0.38); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .page-kicker-dot { width: 6px; height: 6px; border-radius: 50%; background: #572e88; flex-shrink: 0; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
    .page-title { font-size: 2rem; font-weight: 900; color: #1a1530; margin: 0; }
    .page-subtitle { font-size: 0.85rem; color: rgba(26,21,48,0.45); margin: 0.25rem 0 0; }
    .page-actions { display: flex; gap: 0.5rem; align-items: flex-start; flex-shrink: 0; }
    .btn-export { font-size: 0.8rem; font-weight: 900; border-radius: 8px; padding: 0.48rem 1rem; border: 1.5px solid rgba(87,46,136,0.22); background: #fff; color: #572e88; cursor: pointer; font-family: var(--bts-font); transition: all 0.12s; }
    .btn-export:hover { background: #f0ecfc; }

    /* View toggle */
    .view-toggle { display: flex; gap: 0; border: 1.5px solid rgba(87,46,136,0.15); border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; display: inline-flex; }
    .view-btn { font-size: 0.78rem; font-weight: 900; padding: 0.4rem 0.9rem; border: none; background: #fff; color: rgba(26,21,48,0.55); cursor: pointer; font-family: var(--bts-font); transition: all 0.12s; border-right: 1px solid rgba(87,46,136,0.12); }
    .view-btn:last-child { border-right: none; }
    .view-btn.active { background: #572e88; color: #fff; }

    /* Programme view */
    .cl-programme-card { background: #fff; border: 1.5px solid rgba(87,46,136,0.12); border-radius: 14px; padding: 2.5rem 3rem; max-width: 640px; }
    .cl-programme-title { font-size: 1.6rem; font-weight: 900; text-align: center; margin-bottom: 2rem; color: #1a1530; }
    .cl-section-label { font-size: 0.65rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(26,21,48,0.35); margin: 1.5rem 0 0.75rem; }
    .cl-section-label:first-of-type { margin-top: 0; }
    .cl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 1.5rem; padding: 0.25rem 0; border-bottom: 1px solid rgba(87,46,136,0.06); }
    .cl-row:last-child { border-bottom: none; }
    .cl-role { font-size: 0.85rem; font-weight: 900; color: #1a1530; }
    .cl-name { font-size: 0.85rem; color: rgba(26,21,48,0.7); }
    .cl-name.open { color: rgba(26,21,48,0.3); font-style: italic; }
    .cl-name.pending { color: #dd8233; font-style: italic; }

    /* Table view */
    .cl-table { width: 100%; border-collapse: collapse; }
    .cl-table th { font-size: 0.68rem; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(26,21,48,0.4); padding: 0.6rem 0.9rem; border-bottom: 1.5px solid rgba(87,46,136,0.1); text-align: left; }
    .cl-table td { padding: 0.75rem 0.9rem; border-bottom: 1px solid rgba(87,46,136,0.06); vertical-align: middle; }
    .cl-table tbody tr:hover { background: rgba(87,46,136,0.02); }
    .cl-char-name { font-size: 0.88rem; font-weight: 900; }
    .cl-perf-list { display: flex; flex-direction: column; gap: 0.2rem; }
    .cl-perf-name { font-size: 0.84rem; }
    .cl-perf-name.open { color: rgba(26,21,48,0.3); font-style: italic; }
    .cl-perf-name.pending { color: #dd8233; font-style: italic; }
    .cl-role-type { font-size: 0.68rem; font-weight: 900; border-radius: 100px; padding: 0.18rem 0.5rem; background: rgba(87,46,136,0.08); color: #572e88; }

    /* Performer cards */
    .cl-performer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }
    .cl-performer-card { border: 1.5px solid rgba(87,46,136,0.12); border-radius: 18px; background: linear-gradient(180deg, #fff 0%, #faf8ff 100%); padding: 1rem; box-shadow: 0 14px 30px rgba(87,46,136,0.06); cursor: pointer; transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease; }
    .cl-performer-card:hover { transform: translateY(-2px); border-color: rgba(87,46,136,0.24); box-shadow: 0 18px 36px rgba(87,46,136,0.12); }
    .cl-performer-top { display: flex; gap: 0.85rem; align-items: flex-start; }
    .cl-performer-photo { width: 68px; height: 84px; border-radius: 16px; object-fit: cover; object-position: top; flex-shrink: 0; background: #ede7fb; border: 2px solid rgba(87,46,136,0.08); }
    .cl-performer-photo-placeholder { width: 68px; height: 84px; border-radius: 16px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #efe7ff, #d9c7fb); color: #572e88; font-size: 1.3rem; font-weight: 900; flex-shrink: 0; border: 2px solid rgba(87,46,136,0.08); }
    .cl-performer-name { font-size: 1rem; font-weight: 900; color: #1a1530; line-height: 1.15; }
    .cl-performer-sub { margin-top: 0.18rem; font-size: 0.76rem; color: rgba(26,21,48,0.55); line-height: 1.4; }
    .cl-pill-row { display: flex; flex-wrap: wrap; gap: 0.38rem; margin-top: 0.65rem; }
    .cl-pill { font-size: 0.66rem; font-weight: 900; border-radius: 999px; padding: 0.2rem 0.52rem; letter-spacing: 0.02em; }
    .cl-pill.role { background: rgba(87,46,136,0.08); color: #572e88; }
    .cl-pill.good { background: rgba(118,158,123,0.14); color: #2d6a35; }
    .cl-pill.warn { background: rgba(239,171,69,0.16); color: #9a6200; }
    .cl-pill.soft { background: rgba(26,21,48,0.06); color: rgba(26,21,48,0.6); }
    .cl-performer-stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.6rem; margin-top: 0.9rem; }
    .cl-stat { border-radius: 12px; background: rgba(255,255,255,0.92); border: 1px solid rgba(87,46,136,0.08); padding: 0.65rem 0.7rem; min-height: 76px; }
    .cl-stat-label { font-size: 0.62rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(87,46,136,0.46); margin-bottom: 0.28rem; }
    .cl-stat-value { font-size: 0.78rem; font-weight: 800; color: #1a1530; line-height: 1.35; }
    .cl-stat-value.soft { color: rgba(26,21,48,0.56); font-weight: 700; }
    .cl-performer-footer { margin-top: 0.9rem; display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; font-size: 0.72rem; color: rgba(87,46,136,0.6); font-weight: 800; }

    /* Performer modal */
    .cl-modal-backdrop { position: fixed; inset: 0; background: rgba(38, 22, 64, 0.56); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; padding: 1.25rem; z-index: 1000; }
    .cl-modal-backdrop.open { display: flex; }
    .cl-modal-card { width: min(1080px, calc(100vw - 2rem)); max-height: calc(100vh - 2rem); overflow: auto; border-radius: 26px; background: #fff; box-shadow: 0 30px 80px rgba(22, 10, 44, 0.32); border: 1px solid rgba(87,46,136,0.08); }
    .cl-modal-top { display: flex; justify-content: space-between; gap: 1rem; padding: 1.4rem 1.4rem 1rem; border-bottom: 1px solid rgba(87,46,136,0.08); position: sticky; top: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(6px); z-index: 2; }
    .cl-modal-top button { border: none; background: none; font-size: 1.8rem; line-height: 1; color: rgba(87,46,136,0.56); cursor: pointer; font-family: inherit; }
    .cl-modal-top button:hover { color: #572e88; }
    .cl-modal-body { padding: 1.35rem 1.4rem 1.5rem; }
    .cl-modal-hero { display: grid; grid-template-columns: 140px minmax(0, 1fr); gap: 1.15rem; align-items: start; margin-bottom: 1.25rem; }
    .cl-modal-photo { width: 140px; aspect-ratio: 4 / 5; border-radius: 22px; object-fit: cover; object-position: top; background: #efe7ff; }
    .cl-modal-photo-placeholder { width: 140px; aspect-ratio: 4 / 5; border-radius: 22px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #efe7ff, #d9c7fb); color: #572e88; font-size: 2rem; font-weight: 900; }
    .cl-modal-name { font-size: 1.8rem; line-height: 1.05; font-weight: 900; color: #1a1530; margin: 0; }
    .cl-modal-sub { margin-top: 0.32rem; font-size: 0.84rem; color: rgba(26,21,48,0.55); line-height: 1.45; }
    .cl-modal-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; }
    .cl-modal-section { border: 1.5px solid rgba(87,46,136,0.1); border-radius: 18px; background: linear-gradient(180deg, #fff 0%, #fbf9ff 100%); padding: 1rem; }
    .cl-modal-section.full { grid-column: 1 / -1; }
    .cl-modal-section-title { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(87,46,136,0.54); margin-bottom: 0.8rem; }
    .cl-detail-list { display: grid; gap: 0.7rem; }
    .cl-detail-item { display: grid; gap: 0.18rem; }
    .cl-detail-label { font-size: 0.64rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(87,46,136,0.46); }
    .cl-detail-value { font-size: 0.83rem; color: #1a1530; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    .cl-detail-value.soft { color: rgba(26,21,48,0.55); }
    .cl-answer-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.7rem; }
    .cl-answer-card { border-radius: 14px; border: 1px solid rgba(87,46,136,0.08); background: rgba(255,255,255,0.88); padding: 0.75rem 0.8rem; }
    @media (max-width: 820px) {
      .cl-modal-hero { grid-template-columns: 1fr; }
      .cl-modal-grid { grid-template-columns: 1fr; }
      .cl-answer-grid { grid-template-columns: 1fr; }
    }

    .cl-empty { text-align: center; padding: 3rem 1rem; color: rgba(26,21,48,0.35); font-size: 0.88rem; }
    .cl-loading { color: rgba(26,21,48,0.38); font-size: 0.88rem; padding: 2rem 0; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>
  <div class="prod-main">
    <div class="prod-main-inner">
      <div class="aud-visual-hero">
        <div class="aud-visual-hero-content">
          <div>
            <div class="aud-visual-kicker">
              <span class="aud-visual-kicker-dot" aria-hidden="true"></span>
              <span class="page-hierarchy"><span class="page-hierarchy-page">Cast</span></span>
            </div>
            <h1 class="aud-visual-title">Cast List</h1>
            <p class="aud-visual-copy">Every character and grouping with current casting decisions.</p>
          </div>
          <button class="btn-export" onclick="exportCSV()" style="background:#efab45;color:#000;border:none;border-radius:8px;padding:0.55rem 1.1rem;font-weight:900;font-size:0.82rem;cursor:pointer;flex-shrink:0;">Export CSV</button>
        </div>
      </div>
      <div id="cl-root"><div class="cl-loading">Loading...</div></div>
    </div>
  </div>
  <div id="cl-performer-modal" class="cl-modal-backdrop" onclick="closePerformerCard(event)">
    <div class="cl-modal-card" onclick="event.stopPropagation()">
      <div class="cl-modal-top">
        <div>
          <div class="page-kicker"><span class="page-kicker-dot"></span>Performer Profile</div>
          <div style="font-size:0.84rem;color:rgba(26,21,48,0.52);">Registration, conflicts, contact details, and cast info in one place.</div>
        </div>
        <button type="button" aria-label="Close performer profile" onclick="closePerformerCard()">&times;</button>
      </div>
      <div id="cl-performer-modal-body" class="cl-modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=79-20260721-proposals"></script>
  <script>
    window.initProductionPage('cast');

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function initials(name) {
      return String(name || '').trim().split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0] || '').join('').toUpperCase() || 'P';
    }
    function parseMaybeObject(value) {
      if (!value) return {};
      if (typeof value === 'string') {
        try { return JSON.parse(value || '{}') || {}; } catch { return {}; }
      }
      return typeof value === 'object' ? value : {};
    }

    let _chars = [];
    let _assignments = [];
    let _performers = [];
    let _castMembers = [];
    let _performerDirectory = [];
    let _selectedPerformerId = null;
    let _view = 'programme';

    const SORT_RANKS = {
      lead: 0, featured: 1, supporting: 2,
      dancer: 3, swing: 4, ensemble: 5, group: 6, other: 7,
    };
    function sortRank(char) {
      return SORT_RANKS[(char.role_type||'').toLowerCase()] ?? 7;
    }
    function isEnsemble(char) {
      return ['ensemble', 'group'].includes((char.role_type||'').toLowerCase());
    }

    function charLooksLikeEnsemble(char) {
      const name = String(char?.name || '').trim().toLowerCase();
      const roleType = String(char?.role_type || '').trim().toLowerCase();
      return name === 'ensemble' || roleType === 'ensemble';
    }

    function isRegisteredStatus(status) {
      const value = String(status || '').trim().toLowerCase();
      return value === 'complete' || value === 'completed' || value === 'registered' || value === 'done';
    }

    function registrationAnswers(record) {
      return parseMaybeObject(record?.registration_answers);
    }

    function performerDateConflicts(record) {
      return parseMaybeObject(record?.date_conflicts);
    }

    function firstFilledValue(list) {
      for (const value of list || []) {
        const text = String(value || '').trim();
        if (text) return text;
      }
      return '';
    }

    function displayNameForRecord(record, answers) {
      return firstFilledValue([
        record.preferred_name,
        answers['Preferred Name'],
        answers['Preferred name'],
        answers['Performer preferred name'],
        record.name,
        [answers['First Name'], answers['Last Name']].filter(Boolean).join(' '),
        record.email,
      ]);
    }

    function answerValue(answers, keys) {
      return firstFilledValue((keys || []).map(key => answers?.[key]));
    }

    function registrationStatusLabel(answers) {
      const raw = answerValue(answers, ['__bts_registration_status', 'registration_status']);
      return isRegisteredStatus(raw) ? 'Registration Complete' : 'Registration In Progress';
    }

    function registrationStatusClass(answers) {
      const raw = answerValue(answers, ['__bts_registration_status', 'registration_status']);
      return isRegisteredStatus(raw) ? 'good' : 'warn';
    }

    function roleTypeLabel(roleTypes) {
      const uniq = Array.from(new Set((roleTypes || []).filter(Boolean)));
      return uniq.length ? uniq.join(', ') : 'Cast Member';
    }

    function formatDate(value) {
      const text = String(value || '').trim();
      if (!text) return '';
      const date = /^\d{4}-\d{2}-\d{2}$/.test(text) ? new Date(`${text}T12:00:00`) : new Date(text);
      if (Number.isNaN(date.getTime())) return text;
      return date.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatConflictLines(conflicts) {
      const lines = [];
      Object.entries(conflicts || {}).forEach(([key, value]) => {
        if (key === 'manual_notes') return;
        const entry = value && typeof value === 'object' ? value : { conflict: value === true || value === 'true' };
        if (!entry.conflict) return;
        const base = entry.date ? formatDate(entry.date) : (entry.title || key);
        const title = entry.title && entry.title !== base ? entry.title : '';
        const timeLabel = String(entry.time_label || entry.time || entry.details || '').trim();
        lines.push([base, title, timeLabel].filter(Boolean).join(' — '));
      });
      const manual = String(conflicts?.manual_notes || '').trim();
      if (manual) lines.push(manual);
      return lines.filter(Boolean);
    }

    function performerPhotoHtml(record, className, fallbackClass) {
      return record.headshot_url
        ? `<img class="${className}" src="${esc(record.headshot_url)}" alt="${esc(record.display_name || record.name || 'Performer')}" onerror="this.outerHTML='<div class=&quot;${fallbackClass}&quot;>${esc(initials(record.display_name || record.name || 'Performer'))}</div>'" />`
        : `<div class="${fallbackClass}">${esc(initials(record.display_name || record.name || 'Performer'))}</div>`;
    }

    function performerDirectoryRecords() {
      const charMap = new Map((_chars || []).map(char => [String(char.id || ''), char]));
      const byApplicant = new Map();
      (_castMembers || []).forEach(member => {
        const key = String(member.applicant_id || member.id || '');
        if (!key) return;
        const answers = registrationAnswers(member);
        const existing = byApplicant.get(key);
        const roleName = String(member.character_name || '').trim();
        const roleType = charMap.get(String(member.character_id || ''))?.role_type || '';
        const nextDisplayName = displayNameForRecord(member, answers);
        const nextContactName = firstFilledValue([
          member.name,
          [answers['First Name'], answers['Last Name']].filter(Boolean).join(' '),
          nextDisplayName,
        ]);
        const nextEmail = firstFilledValue([member.email, answers['Contact Email'], answers['Email'], answers['Email Address']]);
        const nextPhone = firstFilledValue([member.phone, answers['Contact Phone'], answers['Phone'], answers['Phone Number']]);
        const nextGuardianName = firstFilledValue([member.guardian_name, answers['Guardian Name'], answers['Parent/Guardian Name']]);
        const nextGuardianEmail = firstFilledValue([member.guardian_email, answers['Guardian Email'], answers['Parent/Guardian Email']]);
        const nextGuardianPhone = firstFilledValue([member.guardian_phone, answers['Guardian Phone'], answers['Parent/Guardian Phone'], answers['Emergency Contact Phone']]);
        const nextPronouns = firstFilledValue([member.pronouns, answers['Pronouns']]);
        const nextProgrammeName = firstFilledValue([
          answers['Exact first and last name'],
          answers['Name as it should appear in the programme'],
          answers['Programme Credit'],
          answers['Program Credit'],
        ]);
        if (existing) {
          if (roleName && !existing.roles.includes(roleName)) existing.roles.push(roleName);
          if (roleType && !existing.roleTypes.includes(roleType)) existing.roleTypes.push(roleType);
          if (nextProgrammeName && !existing.programmeName) existing.programmeName = nextProgrammeName;
          if (nextPronouns && !existing.pronouns) existing.pronouns = nextPronouns;
          if (nextEmail && !existing.email) existing.email = nextEmail;
          if (nextPhone && !existing.phone) existing.phone = nextPhone;
          if (nextGuardianName && !existing.guardian_name) existing.guardian_name = nextGuardianName;
          if (nextGuardianEmail && !existing.guardian_email) existing.guardian_email = nextGuardianEmail;
          if (nextGuardianPhone && !existing.guardian_phone) existing.guardian_phone = nextGuardianPhone;
          if (member.headshot_url && !existing.headshot_url) existing.headshot_url = member.headshot_url;
          if (member.date_of_birth && !existing.date_of_birth) existing.date_of_birth = member.date_of_birth;
          if (member.state === 'offer_accepted') existing.state = 'offer_accepted';
          existing.answers = { ...existing.answers, ...answers };
          return;
        }
        byApplicant.set(key, {
          id: key,
          applicant_id: key,
          display_name: nextDisplayName || nextContactName || 'Performer',
          legal_name: nextContactName || nextDisplayName || 'Performer',
          pronouns: nextPronouns,
          email: nextEmail,
          phone: nextPhone,
          guardian_name: nextGuardianName,
          guardian_email: nextGuardianEmail,
          guardian_phone: nextGuardianPhone,
          programmeName: nextProgrammeName,
          date_of_birth: member.date_of_birth || '',
          headshot_url: member.headshot_url || '',
          state: member.state || 'chosen',
          roles: roleName ? [roleName] : [],
          roleTypes: roleType ? [roleType] : [],
          answers,
          date_conflicts: performerDateConflicts(member),
        });
      });
      return Array.from(byApplicant.values()).sort((a, b) => (a.display_name || '').localeCompare(b.display_name || ''));
    }

    function humanAge(dateString) {
      const dob = String(dateString || '').trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dob)) return '';
      const birth = new Date(`${dob}T12:00:00`);
      if (Number.isNaN(birth.getTime())) return '';
      const today = new Date('2026-07-21T12:00:00');
      let age = today.getFullYear() - birth.getFullYear();
      const monthDelta = today.getMonth() - birth.getMonth();
      if (monthDelta < 0 || (monthDelta === 0 && today.getDate() < birth.getDate())) age -= 1;
      return age >= 0 ? `${age} yrs` : '';
    }

    function compactField(value, fallback = 'Not provided') {
      const text = String(value || '').trim();
      return text || fallback;
    }

    function cleanAnswerEntries(answers) {
      const hiddenKeys = new Set([
        '__bts_registration_status',
        '__bts_registration_complete',
        '__bts_registration_submitted_at',
        'registration_status',
        'registration_complete',
      ]);
      return Object.entries(answers || {})
        .filter(([key, value]) => {
          if (hiddenKeys.has(key)) return false;
          if (String(key || '').startsWith('__bts_')) return false;
          if (value === null || value === undefined) return false;
          if (typeof value === 'string' && !value.trim()) return false;
          return true;
        })
        .sort(([a], [b]) => a.localeCompare(b));
    }

    function formatAnswerValue(value) {
      if (Array.isArray(value)) return value.map(v => String(v || '').trim()).filter(Boolean).join(', ');
      if (typeof value === 'boolean') return value ? 'Yes' : 'No';
      if (typeof value === 'object' && value) return JSON.stringify(value, null, 2);
      return String(value || '').trim();
    }

    function answerLabel(key) {
      return String(key || '')
        .replace(/_/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function getAssigned(charId) {
      const char = _chars.find(c => c.id === charId);
      const matchesEnsembleFallback = char && charLooksLikeEnsemble(char);
      return _assignments
        .filter(a => (a.character_id === charId || (matchesEnsembleFallback && !a.character_id))
          && (a.state === 'chosen' || a.state === 'offer_accepted'))
        .map(a => ({
          perf: _performers.find(p => String(p.id) === String(a.applicant_id)),
          state: a.state,
        }))
        .filter(e => e.perf)
        .sort((a, b) => {
          if (a.state === 'offer_accepted' && b.state !== 'offer_accepted') return -1;
          if (b.state === 'offer_accepted' && a.state !== 'offer_accepted') return 1;
          return (a.perf?.name||'').localeCompare(b.perf?.name||'');
        });
    }

    function switchView(v, btn) {
      _view = v;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderContent();
    }

    function renderContent() {
      const el = document.getElementById('cl-content');
      if (!el) return;
      el.innerHTML = _view === 'programme' ? buildProgrammeHtml() : buildPerformerCardsHtml();
    }

    function namesHtml(charId, forTable) {
      const assigned = getAssigned(charId);
      if (!assigned.length) {
        return forTable
          ? `<div class="cl-perf-name open">Open</div>`
          : `<span class="cl-name open">Open</span>`;
      }
      const hasConsidering = _assignments.some(a => a.character_id === charId && a.state === 'considering');
      const items = assigned.map(e => {
        const name = e.perf.name || 'Unknown';
        return forTable
          ? `<div class="cl-perf-name">${esc(name)}</div>`
          : `<span class="cl-name">${esc(name)}</span>`;
      });
      if (hasConsidering && !assigned.length) {
        return forTable
          ? `<div class="cl-perf-name pending">Not yet confirmed</div>`
          : `<span class="cl-name pending">Not yet confirmed</span>`;
      }
      return items.join(forTable ? '' : '<br>');
    }

    function buildProgrammeHtml() {
      const sorted = [..._chars].sort((a, b) => sortRank(a) - sortRank(b) || (a.name||'').localeCompare(b.name||''));
      const named = sorted.filter(c => !isEnsemble(c));
      const ensemble = sorted.filter(c => isEnsemble(c));

      let html = '';
      if (named.length) {
        html += `<div class="cl-section-label">Named Roles</div>`;
        html += named.map(c => `<div class="cl-row">
          <div class="cl-role">${esc(c.name)}</div>
          <div>${namesHtml(c.id, false)}</div>
        </div>`).join('');
      }
      if (ensemble.length) {
        html += `<div class="cl-section-label">Ensemble &amp; Groups</div>`;
        html += ensemble.map(c => `<div class="cl-row">
          <div class="cl-role">${esc(c.name)}</div>
          <div>${namesHtml(c.id, false)}</div>
        </div>`).join('');
      }
      if (!_chars.length) {
        return `<div class="cl-empty">No characters added yet. Build the cast list from the <a href="#" onclick="btsProdNav('casting-board.html');return false;" style="color:#572e88;">Casting Board</a>.</div>`;
      }

      return `<div class="cl-programme-card">
        <div class="cl-programme-title">Cast List</div>
        ${html}
      </div>`;
    }

    function buildPerformerCardsHtml() {
      if (!_performerDirectory.length) {
        return `<div class="cl-empty">No cast performers yet. Once people are cast, they’ll show up here with their details.</div>`;
      }
      return `<div class="cl-performer-grid">
        ${_performerDirectory.map(record => {
          const answers = record.answers || {};
          const conflicts = formatConflictLines(record.date_conflicts || {});
          const programmeName = record.programmeName && record.programmeName !== record.display_name ? record.programmeName : '';
          return `<article class="cl-performer-card" onclick="openPerformerCard('${esc(record.id)}')">
            <div class="cl-performer-top">
              ${performerPhotoHtml(record, 'cl-performer-photo', 'cl-performer-photo-placeholder')}
              <div style="min-width:0;flex:1;">
                <div class="cl-performer-name">${esc(record.display_name)}</div>
                <div class="cl-performer-sub">
                  ${esc([humanAge(record.date_of_birth), record.pronouns].filter(Boolean).join(' · ') || 'Cast performer')}
                  ${programmeName ? `<br>Programme name: ${esc(programmeName)}` : ''}
                </div>
                <div class="cl-pill-row">
                  <span class="cl-pill ${registrationStatusClass(answers)}">${esc(registrationStatusLabel(answers))}</span>
                  <span class="cl-pill role">${esc(roleTypeLabel(record.roleTypes))}</span>
                  <span class="cl-pill soft">${record.roles.length} role${record.roles.length === 1 ? '' : 's'}</span>
                </div>
              </div>
            </div>
            <div class="cl-performer-stats">
              <div class="cl-stat">
                <div class="cl-stat-label">Roles</div>
                <div class="cl-stat-value">${esc(record.roles.join(', ') || 'No role title yet')}</div>
              </div>
              <div class="cl-stat">
                <div class="cl-stat-label">Days Off</div>
                <div class="cl-stat-value ${conflicts.length ? '' : 'soft'}">${esc(conflicts[0] || 'No conflicts recorded')}</div>
              </div>
              <div class="cl-stat">
                <div class="cl-stat-label">Contact</div>
                <div class="cl-stat-value ${record.email || record.phone ? '' : 'soft'}">${esc(record.email || record.phone || 'Not added yet')}</div>
              </div>
              <div class="cl-stat">
                <div class="cl-stat-label">Guardian / Family</div>
                <div class="cl-stat-value ${record.guardian_name || record.guardian_email || record.guardian_phone ? '' : 'soft'}">${esc(record.guardian_name || record.guardian_email || record.guardian_phone || 'Not needed / not provided')}</div>
              </div>
            </div>
            <div class="cl-performer-footer">
              <span>${esc(record.state === 'offer_accepted' ? 'Accepted cast member' : 'Chosen cast member')}</span>
              <span>Open profile ›</span>
            </div>
          </article>`;
        }).join('')}
      </div>`;
    }

    function detailItem(label, value, soft = false) {
      return `<div class="cl-detail-item">
        <div class="cl-detail-label">${esc(label)}</div>
        <div class="cl-detail-value${soft ? ' soft' : ''}">${esc(value)}</div>
      </div>`;
    }

    function openPerformerCard(id) {
      _selectedPerformerId = String(id || '');
      const record = _performerDirectory.find(item => String(item.id) === _selectedPerformerId);
      const modal = document.getElementById('cl-performer-modal');
      const body = document.getElementById('cl-performer-modal-body');
      if (!record || !modal || !body) return;
      const answers = record.answers || {};
      const conflicts = formatConflictLines(record.date_conflicts || {});
      const answerEntries = cleanAnswerEntries(answers);
      body.innerHTML = `
        <div class="cl-modal-hero">
          <div>${performerPhotoHtml(record, 'cl-modal-photo', 'cl-modal-photo-placeholder')}</div>
          <div>
            <h2 class="cl-modal-name">${esc(record.display_name)}</h2>
            <div class="cl-modal-sub">${esc([
              humanAge(record.date_of_birth),
              record.pronouns,
              record.state === 'offer_accepted' ? 'Offer accepted' : 'Chosen for cast'
            ].filter(Boolean).join(' · '))}</div>
            <div class="cl-pill-row" style="margin-top:0.8rem;">
              <span class="cl-pill ${registrationStatusClass(answers)}">${esc(registrationStatusLabel(answers))}</span>
              <span class="cl-pill role">${esc(roleTypeLabel(record.roleTypes))}</span>
              ${record.programmeName ? `<span class="cl-pill soft">Programme: ${esc(record.programmeName)}</span>` : ''}
            </div>
            <div class="cl-modal-sub" style="margin-top:0.8rem;">Roles: ${esc(record.roles.join(', ') || 'No roles set yet')}</div>
          </div>
        </div>
        <div class="cl-modal-grid">
          <section class="cl-modal-section">
            <div class="cl-modal-section-title">Contact</div>
            <div class="cl-detail-list">
              ${detailItem('Email', compactField(record.email), !record.email)}
              ${detailItem('Phone', compactField(record.phone), !record.phone)}
              ${detailItem('Legal / Full Name', compactField(record.legal_name), !record.legal_name)}
              ${detailItem('Date of Birth', compactField(formatDate(record.date_of_birth)), !record.date_of_birth)}
            </div>
          </section>
          <section class="cl-modal-section">
            <div class="cl-modal-section-title">Guardian / Family</div>
            <div class="cl-detail-list">
              ${detailItem('Guardian Name', compactField(record.guardian_name), !record.guardian_name)}
              ${detailItem('Guardian Email', compactField(record.guardian_email), !record.guardian_email)}
              ${detailItem('Guardian Phone', compactField(record.guardian_phone), !record.guardian_phone)}
            </div>
          </section>
          <section class="cl-modal-section">
            <div class="cl-modal-section-title">Registration</div>
            <div class="cl-detail-list">
              ${detailItem('Status', registrationStatusLabel(answers))}
              ${detailItem('Role Type', roleTypeLabel(record.roleTypes))}
              ${detailItem('Roles', compactField(record.roles.join(', ')), !record.roles.length)}
              ${detailItem('Programme Name', compactField(record.programmeName), !record.programmeName)}
            </div>
          </section>
          <section class="cl-modal-section">
            <div class="cl-modal-section-title">Days Off / Conflicts</div>
            <div class="cl-detail-list">
              ${conflicts.length
                ? conflicts.map(line => detailItem('Conflict', line)).join('')
                : detailItem('Conflicts', 'No conflicts recorded', true)}
            </div>
          </section>
          <section class="cl-modal-section full">
            <div class="cl-modal-section-title">Registration Answers</div>
            ${answerEntries.length
              ? `<div class="cl-answer-grid">${answerEntries.map(([key, value]) => `
                  <div class="cl-answer-card">
                    <div class="cl-detail-label">${esc(answerLabel(key))}</div>
                    <div class="cl-detail-value">${esc(formatAnswerValue(value))}</div>
                  </div>`).join('')}</div>`
              : `<div class="cl-detail-value soft">No registration answers have been saved yet for this performer.</div>`}
          </section>
        </div>`;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closePerformerCard(event) {
      if (event && event.target && event.target !== event.currentTarget) return;
      _selectedPerformerId = null;
      const modal = document.getElementById('cl-performer-modal');
      if (modal) modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    function exportCSV() {
      const sorted = [..._chars].sort((a, b) => sortRank(a) - sortRank(b) || (a.name||'').localeCompare(b.name||''));
      const rows = [['Character / Role', 'Performer(s)', 'Role Type', 'Status']];
      sorted.forEach(c => {
        const assigned = getAssigned(c.id);
        const names = assigned.length ? assigned.map(e => e.perf.name || '').join('; ') : 'Open';
        const status = assigned.length ? assigned[0].state : 'open';
        rows.push([c.name || '', names, c.role_type || '', status]);
      });
      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'cast-list.csv';
      a.click();
    }

    (async function () {
      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      const prodId  = new URLSearchParams(location.search).get('id') || '';
      if (!prodId) return;
      const sb = supabase.createClient(SB_URL, SB_ANON);

      const [charRes, assignRes, appRes, bookRes, castRes] = await Promise.all([
        sb.from('production_characters').select('id,name,role_type').eq('production_id', prodId).order('sort_order').order('name'),
        sb.from('casting_assignments').select('id,character_id,applicant_id,state').eq('production_id', prodId).in('state', ['chosen','offer_accepted','considering']),
        sb.from('audition_applications').select('id,name,date_conflicts').eq('production_id', prodId),
        sb.from('audition_bookings').select('id,name').eq('production_id', prodId),
        sb.from('cast_members').select('*').eq('production_id', prodId).in('state', ['chosen', 'offer_accepted']),
      ]);

      _chars = charRes.data || [];
      _assignments = assignRes.data || [];
      _castMembers = (castRes.data || []).map(member => {
        const app = (appRes.data || []).find(item => String(item.id) === String(member.applicant_id));
        return {
          ...member,
          date_conflicts: member.date_conflicts || app?.date_conflicts || null,
        };
      });
      const apps = appRes.data || [];
      const bookIds = new Set(apps.map(a => String(a.id)));
      _performers = [
        ...apps,
        ...(bookRes.data || []).filter(b => !bookIds.has(String(b.id))),
      ];
      _performerDirectory = performerDirectoryRecords();

      document.getElementById('cl-root').innerHTML = `
        <div class="view-toggle">
          <button class="view-btn active" onclick="switchView('programme',this)">Programme</button>
          <button class="view-btn" onclick="switchView('table',this)">Performers</button>
        </div>
        <div id="cl-content"></div>`;

      renderContent();
    })();
  </script>
</body>
