<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rehearsal Schedule - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=20260718c" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=20260718c" />
  <link rel="stylesheet" href="/ASSETS/styles/casting-card.css?v=20260718c" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: #f7f4fb;
      font-family: var(--bts-font);
      color: #1a1530;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem 2.25rem 3rem;
      max-width: calc(100vw - 220px);
      overflow-x: clip;
      position: relative;
      z-index: 0;
    }
    .prod-main::before {
      content: '';
      position: fixed;
      inset: 0 0 0 220px;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.04;
      pointer-events: none;
      z-index: -1;
    }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1460px; }
    :root {
      --sched-type-strong: 800;
      --sched-type-plain: 400;
      --sched-text-black: #1a1530;
      --sched-text-white: #ffffff;
      --sched-text-purple: #572e88;
      --sched-text-grey: #7b7690;
    }

    /* Keep this page locked to the two approved type weights. */
    .prod-main,
    .prod-main *,
    #prod-sidebar-host,
    #prod-sidebar-host * {
      font-family: var(--bts-font);
    }
    .aud-visual-kicker,
    .aud-visual-hero .page-hierarchy-page,
    .aud-visual-title,
    .sidebar-back,
    .sidebar-mobile-title,
    .sidebar-prod-title,
    .sidebar-group-label,
    .prod-tab,
    .tp-sb-name,
    .tp-sb-role,
    .tp-sb-exit,
    .casting-icon-category,
    .casting-icon-openness,
    .casting-card-skill-dot,
    .casting-card-inshow-name,
    .casting-card-lower-name,
    .casting-card-first-name,
    .casting-card-badge {
      font-weight: var(--sched-type-strong);
    }
    .aud-visual-copy,
    .sidebar-mobile-sub,
    .sidebar-prod-sub,
    .sidebar-org-back,
    .casting-card-inshow-char,
    .casting-card-inshow-meta,
    .casting-card-lower-role,
    .casting-card-last-name,
    .casting-card-meta-line {
      font-weight: var(--sched-type-plain);
    }

    .sched-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.85rem;
      margin-top: 1rem;
    }
    .sched-glance {
      border-radius: 20px;
      padding: 0.95rem 1rem;
      border: 1px solid rgba(87,46,136,0.1);
      background: #ffffff;
      box-shadow: 0 12px 28px rgba(61,29,104,0.06);
    }
    .sched-glance.is-purple { background: #572e88; color: #ffffff; border-color: transparent; }
    .sched-glance.is-blue { background: #476aaa; color: #ffffff; border-color: transparent; }
    .sched-glance.is-green { background: #769e7b; color: #ffffff; border-color: transparent; }
    .sched-glance.is-gold { background: #efab45; color: #ffffff; border-color: transparent; }
    .sched-glance-label {
      font-size: 0.66rem;
      font-weight: var(--sched-type-strong);
      opacity: 0.76;
      margin-bottom: 0.3rem;
    }
    .sched-glance-value {
      font-size: 1.55rem;
      line-height: 1;
      font-weight: var(--sched-type-strong);
      margin-bottom: 0.25rem;
    }
    .sched-glance-copy {
      font-size: 0.8rem;
      line-height: 1.4;
      font-weight: var(--sched-type-plain);
      opacity: 0.88;
    }
    .sched-shell {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 1.25rem;
      margin-top: 1.4rem;
      align-items: start;
    }
    .sched-rail {
      display: grid;
      gap: 1rem;
    }
    .sched-panel {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(87,46,136,0.11);
      border-radius: 26px;
      box-shadow: 0 18px 40px rgba(61,29,104,0.08);
      overflow: hidden;
    }
    .sched-panel-head {
      padding: 1.1rem 1.15rem 1rem;
      border-bottom: 1px solid rgba(87,46,136,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
    }
    .sched-panel-title {
      font-size: 0.95rem;
      font-weight: var(--sched-type-strong);
      color: #1a1530;
    }
    .sched-panel-sub {
      font-size: 0.78rem;
      font-weight: var(--sched-type-plain);
      color: rgba(26,21,48,0.52);
      margin-top: 0.18rem;
    }
    .sched-list {
      padding: 0.95rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      max-height: 72vh;
      overflow: auto;
    }
    .sched-card {
      border-radius: 22px;
      border: 1px solid rgba(87,46,136,0.12);
      background: #ffffff;
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      text-align: left;
    }
    .sched-card:hover {
      border-color: rgba(87,46,136,0.25);
      box-shadow: 0 14px 28px rgba(61,29,104,0.1);
      transform: translateY(-1px);
    }
    .sched-card.active {
      border-color: rgba(87,46,136,0.38);
      box-shadow: 0 10px 18px rgba(61,29,104,0.14);
      background: #ffffff;
    }
    .sched-card-layout {
      display: grid;
      row-gap: 0.8rem;
    }
    .sched-card-top-band {
      display: grid;
      grid-template-columns: 3.9rem minmax(0, 1fr);
      gap: 0.85rem;
      align-items: start;
    }
    .sched-card-date-rail {
      display: grid;
      justify-items: center;
      gap: 0.3rem;
    }
    .sched-card-top {
      display: block;
      margin-bottom: 0.28rem;
    }
    .sched-card-main {
      min-width: 0;
    }
    .sched-card-kicker {
      display: none;
    }
    .sched-card-title-wrap {
      min-width: 0;
    }
    .sched-card-title {
      font-size: 1.12rem;
      font-weight: var(--sched-type-strong);
      color: #1a1530;
      line-height: 1.04;
    }
    .sched-card-date {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-rows: 1.2rem 1fr;
      border-radius: 14px;
      overflow: hidden;
      border: 1.5px solid rgba(87,46,136,0.14);
      background: #fff;
      box-shadow: 0 6px 16px rgba(61,29,104,0.08);
    }
    .sched-card-date-month {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 0.08rem 0.22rem 0.04rem;
      color: #fff;
      font-size: 0.66rem;
      font-weight: var(--sched-type-strong);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .sched-card-date-day {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 0.08rem 0.2rem 0;
      color: #1a1530;
      font-size: 2.35rem;
      font-weight: var(--sched-type-strong);
      line-height: 0.9;
      background: #fff;
    }
    .sched-card-date-weekday {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 0.2rem 0;
      color: rgba(26,21,48,0.58);
      font-size: 0.6rem;
      font-weight: var(--sched-type-strong);
      line-height: 1.1;
      text-transform: uppercase;
    }
    .sched-card-indicators {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0;
    }
    .sched-card-indicator {
      display: inline-flex;
      align-items: center;
      min-height: 1.7rem;
      padding: 0.2rem 0.68rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: var(--sched-type-strong);
      letter-spacing: 0.02em;
      line-height: 1;
      white-space: nowrap;
    }
    .sched-card-indicator.is-next {
      background: #476aaa;
      color: #ffffff;
    }
    .sched-card-indicator.is-today {
      background: #572e88;
      color: #ffffff;
    }
    .sched-card-indicator.is-tomorrow {
      background: #769e7b;
      color: #ffffff;
    }
    .sched-card-indicator.is-past {
      background: #c8bad7;
      color: #1a1530;
    }
    .sched-card-type,
    .sched-card-status {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.24rem 0.78rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: var(--sched-type-strong);
      white-space: nowrap;
    }
    .sched-card-type {
      color: #572e88;
    }
    .sched-card-status.is-ready {
      background: #769e7b;
      color: #ffffff;
    }
    .sched-card-status.is-tbd {
      background: #efab45;
      color: #1a1530;
    }
    .sched-card-status.is-past {
      background: #c8bad7;
      color: #1a1530;
    }
    .sched-card-venue {
      display: block;
      font-size: 0.74rem;
      font-weight: var(--sched-type-plain);
      color: rgba(26,21,48,0.52);
      line-height: 1.22;
    }
    .sched-card-meta {
      display: grid;
      row-gap: 0.34rem;
      font-size: 0.74rem;
      font-weight: var(--sched-type-plain);
      color: rgba(26,21,48,0.62);
      line-height: 1.22;
      margin-top: 0.34rem;
    }
    .sched-card-callout {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      color: #572e88;
      font-size: 0.74rem;
      font-weight: var(--sched-type-strong);
      line-height: 1.1;
    }
    .sched-card-bottom {
      display: grid;
      row-gap: 0.62rem;
      margin-top: 0;
      padding-top: 0.72rem;
      border-top: 1px solid rgba(87,46,136,0.1);
    }
    .sched-card-bottom-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
    }
    .sched-card-called-label {
      font-size: 0.74rem;
      font-weight: var(--sched-type-strong);
      letter-spacing: 0;
      text-transform: none;
      color: rgba(87,46,136,0.72);
      line-height: 1.1;
    }
    .sched-card-meta-row,
    .sched-card-callout-row {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .sched-card-meta-text,
    .sched-card-callout-text,
    .sched-card-venue-text {
      min-width: 0;
    }
    .sched-card-meta-text.is-duration {
      display: block;
      margin-left: 1.3rem;
      margin-top: -0.2rem;
      color: rgba(26,21,48,0.48);
      font-size: 0.68rem;
    }
    .sched-card-icon {
      width: 0.88rem;
      height: 0.88rem;
      object-fit: contain;
      flex-shrink: 0;
      opacity: 0.82;
    }
    .sched-card-status .sched-card-icon {
      width: 0.68rem;
      height: 0.68rem;
      opacity: 1;
    }
    .sched-card-meta-divider {
      opacity: 0.42;
    }

    .sched-detail {
      padding: 1rem 1rem 1.15rem;
    }
    .sched-detail-empty {
      padding: 4rem 2rem;
      text-align: center;
      color: rgba(26,21,48,0.42);
      font-size: 0.95rem;
    }
    .sched-focus {
      display: grid;
      gap: 0.95rem;
    }
    .sched-focus-hero {
      border-radius: 24px;
      padding: 1.1rem 1.15rem 1rem;
      background: #ffffff;
      border: 1px solid rgba(87,46,136,0.11);
      box-shadow: 0 16px 34px rgba(61,29,104,0.07);
    }
    .sched-focus-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .sched-detail-kicker {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.68rem;
      font-weight: var(--sched-type-strong);
      color: #572e88;
      margin-bottom: 0.35rem;
    }
    .sched-detail-kicker::before {
      content: '';
      width: 0.48rem;
      height: 0.48rem;
      border-radius: 50%;
      background: #efab45;
      box-shadow: 0 0 0 5px rgba(239,171,69,0.14);
    }
    .sched-detail-title {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1.05;
      font-weight: var(--sched-type-strong);
      color: #1a1530;
    }
    .sched-detail-meta {
      margin-top: 0.7rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .sched-detail-chip {
      display: inline-flex;
      align-items: center;
      min-height: 2rem;
      padding: 0.38rem 0.72rem;
      border-radius: 999px;
      background: rgba(87,46,136,0.08);
      color: #572e88;
      font-size: 0.82rem;
      font-weight: var(--sched-type-strong);
      line-height: 1.25;
    }
    .sched-detail-chip.is-next {
      background: rgba(71,106,170,0.12);
      color: #476aaa;
    }
    .sched-detail-chip.is-today {
      background: rgba(87,46,136,0.12);
      color: #572e88;
    }
    .sched-detail-chip.is-tomorrow {
      background: rgba(118,158,123,0.18);
      color: #5f7f63;
    }
    .sched-detail-chip.is-past {
      background: rgba(26,21,48,0.08);
      color: rgba(26,21,48,0.58);
    }
    .sched-focus-notice {
      margin-top: 0.8rem;
      font-size: 0.83rem;
      font-weight: var(--sched-type-plain);
      color: rgba(26,21,48,0.58);
      line-height: 1.5;
    }
    .sched-link-btn,
    .sched-save-btn,
    .sched-secondary-btn {
      border-radius: 10px;
      font-family: var(--bts-font);
      font-size: 0.82rem;
      font-weight: var(--sched-type-strong);
      cursor: pointer;
      transition: filter 0.15s, background 0.15s, border-color 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      white-space: nowrap;
    }
    .sched-link-btn,
    .sched-secondary-btn {
      background: #fff;
      color: #572e88;
      border: 1.5px solid rgba(87,46,136,0.18);
      padding: 0.58rem 0.95rem;
    }
    .sched-save-btn {
      border: none;
      background: #572e88;
      color: #fff;
      padding: 0.68rem 1.15rem;
    }
    .sched-save-btn:disabled { opacity: 0.55; cursor: default; }

    .sched-focus-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }
    .sched-focus-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      min-height: 2rem;
      padding: 0.42rem 0.72rem;
      border-radius: 999px;
      background: #f5f1fb;
      border: 1px solid rgba(87,46,136,0.08);
      color: #572e88;
      font-size: 0.8rem;
      font-weight: var(--sched-type-strong);
      line-height: 1.25;
    }

    .sched-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.82fr) minmax(320px, 1fr);
      gap: 1rem;
      align-items: start;
    }
    .sched-block {
      border: 1px solid rgba(87,46,136,0.11);
      border-radius: 22px;
      background: rgba(255,255,255,0.96);
      padding: 1.05rem;
      box-shadow: 0 14px 30px rgba(61,29,104,0.06);
    }
    .sched-block-title {
      font-size: 0.72rem;
      font-weight: var(--sched-type-strong);
      color: rgba(87,46,136,0.56);
      margin-bottom: 0.65rem;
    }
    .sched-field-label {
      display: block;
      font-size: 0.68rem;
      font-weight: var(--sched-type-strong);
      color: rgba(26,21,48,0.46);
      margin-bottom: 0.35rem;
    }
    .sched-textarea {
      width: 100%;
      min-height: 136px;
      resize: vertical;
      border: 1.5px solid rgba(87,46,136,0.16);
      border-radius: 16px;
      padding: 0.9rem 0.95rem;
      font: inherit;
      color: #1a1530;
      background: #faf8fd;
      outline: none;
    }
    .sched-textarea:focus { border-color: rgba(87,46,136,0.36); }
    .sched-copy {
      font-size: 0.84rem;
      font-weight: var(--sched-type-plain);
      color: rgba(26,21,48,0.58);
      line-height: 1.5;
    }
    .sched-mode-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 0.7rem;
    }
    .sched-mode-btn {
      padding: 0.62rem 0.95rem;
      border-radius: 999px;
      border: 1.5px solid rgba(87,46,136,0.16);
      background: #fff;
      color: #572e88;
      font: inherit;
      font-size: 0.8rem;
      font-weight: var(--sched-type-strong);
      cursor: pointer;
    }
    .sched-mode-btn.active {
      background: #572e88;
      border-color: #572e88;
      color: #fff;
    }
    .sched-note {
      font-size: 0.82rem;
      font-weight: var(--sched-type-plain);
      color: rgba(26,21,48,0.56);
      margin-bottom: 0.8rem;
      line-height: 1.45;
    }
    .sched-checklist {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      max-height: 560px;
      overflow: auto;
      padding-right: 0.2rem;
    }
    .sched-cast-section {
      display: grid;
      gap: 0.7rem;
    }
    .sched-cast-section + .sched-cast-section {
      margin-top: 1rem;
      padding-top: 0.95rem;
      border-top: 1px solid rgba(87,46,136,0.08);
    }
    .sched-cast-section-label {
      font-size: 0.68rem;
      font-weight: var(--sched-type-strong);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(87,46,136,0.54);
    }
    .sched-cast-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.85rem;
    }
    .sched-cast-card-btn {
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
    }
    .sched-cast-card-shell {
      border-radius: 18px;
      border: 1.5px solid rgba(87,46,136,0.08);
      background: #faf8fd;
      padding: 0.7rem;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .sched-cast-card-btn:hover .sched-cast-card-shell {
      border-color: rgba(87,46,136,0.22);
      box-shadow: 0 10px 22px rgba(61,29,104,0.08);
      transform: translateY(-1px);
    }
    .sched-cast-card-btn.active .sched-cast-card-shell {
      border-color: rgba(87,46,136,0.34);
      box-shadow: 0 12px 24px rgba(61,29,104,0.1);
      background: #f3ecfb;
    }
    .sched-cast-card-btn .casting-card {
      display: block;
      width: 100%;
      max-width: 100%;
      cursor: inherit;
      box-shadow: 0 5px 16px rgba(15,23,42,0.12);
    }
    .sched-cast-card-btn .casting-card:hover {
      transform: none;
      box-shadow: 0 5px 16px rgba(15,23,42,0.12);
    }
    .sched-cast-card-role {
      margin-top: 0.55rem;
      font-size: 0.76rem;
      font-weight: var(--sched-type-strong);
      color: #572e88;
      text-align: center;
    }
    .sched-cast-card-note {
      margin-top: 0.18rem;
      font-size: 0.72rem;
      font-weight: var(--sched-type-plain);
      color: rgba(26,21,48,0.54);
      text-align: center;
    }
    .sched-char-row {
      display: flex;
      gap: 0.8rem;
      align-items: flex-start;
      padding: 0.9rem 0.95rem;
      border-radius: 18px;
      border: 1px solid rgba(87,46,136,0.08);
      background: #faf8fd;
      cursor: pointer;
      text-align: left;
    }
    .sched-char-row.active {
      border-color: rgba(87,46,136,0.3);
      background: rgba(239,231,255,0.95);
      box-shadow: inset 0 0 0 1px rgba(87,46,136,0.05);
    }
    .sched-char-cb {
      width: 1.15rem;
      height: 1.15rem;
      border-radius: 0.35rem;
      border: 1.5px solid rgba(87,46,136,0.35);
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
      font-size: 0.75rem;
      font-weight: var(--sched-type-strong);
      margin-top: 0.1rem;
    }
    .sched-char-row.active .sched-char-cb {
      background: #572e88;
      border-color: #572e88;
    }
    .sched-char-name {
      font-size: 0.9rem;

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s ?? '');
      return d.innerHTML;
    }

    function toLocalDateTimeValue(val) {
      if (!val) return '';
      if (typeof val === 'string') {
        if (val.length === 10) return val + 'T00:00';
        return val.slice(0, 16);
      }
      const pad = n => String(n).padStart(2, '0');
      return val.getUTCFullYear() + '-' + pad(val.getUTCMonth() + 1) + '-' + pad(val.getUTCDate()) +
        'T' + pad(val.getUTCHours()) + ':' + pad(val.getUTCMinutes());
    }

    function parseLocalDateTime(val) {
      const normalized = toLocalDateTimeValue(val);
      if (!normalized) return null;
      const [datePart, timePart = '00:00'] = normalized.split('T');
      const [year, month, day] = datePart.split('-').map(Number);
      const [hour, minute] = timePart.split(':').map(Number);
      if ([year, month, day, hour, minute].some(n => !Number.isFinite(n))) return null;
      return new Date(year, month - 1, day, hour, minute);
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = parseLocalDateTime(iso);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    function fmtTime(iso) {
      if (!iso) return '';
      const normalized = toLocalDateTimeValue(iso);
      if (!normalized) return '';
      const timePart = normalized.slice(11, 16);
      const [hourRaw, minuteRaw] = timePart.split(':').map(Number);
      if (!Number.isFinite(hourRaw) || !Number.isFinite(minuteRaw)) return '';
      const d = new Date(2000, 0, 1, hourRaw, minuteRaw);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit' });
    }

    function typeLabel(type) {
      return TYPE_LABELS[type] || 'Rehearsal';
    }

    function isPastEvent(ev) {
      const start = parseLocalDateTime(ev?.start_time || '');
      const today = new Date('2026-07-19T00:00:00');
      if (Number.isNaN(start.getTime())) return false;
      return start < today;
    }

    function eventDayStart(ev) {
      const start = parseLocalDateTime(ev?.start_time || '');
      if (!(start instanceof Date) || Number.isNaN(start.getTime())) return null;
      return new Date(start.getFullYear(), start.getMonth(), start.getDate());
    }

    function dayDiffFromToday(ev) {
      const day = eventDayStart(ev);
      if (!day) return null;
      const today = new Date(2026, 6, 19);
      return Math.round((day.getTime() - today.getTime()) / 86400000);
    }

    function eventTimeRange(ev) {
      if (!ev?.start_time) return '';
      const start = fmtTime(ev.start_time);
      const end = ev.end_time ? fmtTime(ev.end_time) : '';
      return end ? `${start} - ${end}` : start;
    }

    function eventDurationLabel(ev) {
      const start = parseLocalDateTime(ev?.start_time || '');
      const end = parseLocalDateTime(ev?.end_time || '');
      if (!(start instanceof Date) || Number.isNaN(start.getTime())) return '';
      if (!(end instanceof Date) || Number.isNaN(end.getTime())) return '';
      const diffMs = end.getTime() - start.getTime();
      if (diffMs <= 0) return '';
      const totalMinutes = Math.round(diffMs / 60000);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return `(${hours}h ${String(minutes).padStart(2, '0')}m)`;
    }

    function eventDateChip(ev) {
      if (!ev?.start_time) return 'No date';
      const d = parseLocalDateTime(ev.start_time);
      if (Number.isNaN(d.getTime())) return 'No date';
      return d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function eventDateParts(ev) {
      const d = parseLocalDateTime(ev?.start_time || '');
      if (!(d instanceof Date) || Number.isNaN(d.getTime())) {
        return { month: 'TBD', day: '--', weekday: '' };
      }
      return {
        month: d.toLocaleDateString('en-CA', { month: 'short' }).toUpperCase(),
        day: String(d.getDate()),
        weekday: d.toLocaleDateString('en-CA', { weekday: 'short' })
      };
    }

    function weekdayColour(ev) {
      const d = parseLocalDateTime(ev?.start_time || '');
      if (!(d instanceof Date) || Number.isNaN(d.getTime())) return '#74a2b4';
      const weekday = d.getDay();
      const colours = {
        0: '#dd8233', // Sunday
        1: '#74a2b4', // Monday
        2: '#476aaa', // Tuesday
        3: '#769e7b', // Wednesday
        4: '#ca7ea7', // Thursday
        5: '#572e88', // Friday
        6: '#d1523d'  // Saturday
      };
      return colours[weekday] || '#74a2b4';
    }

    function typeColour(type) {
      return TYPE_COLOURS[type] || '#572e88';
    }

    function typeIcon(type) {
      if (type === 'tech') return ICONS.tech;
      if (type === 'dress') return ICONS.dress;
      return ICONS.rehearsal;
    }

    function statusIcon(statusClass) {
      if (statusClass === 'is-ready') return ICONS.status;
      if (statusClass === 'is-tbd') return ICONS.performers;
      return ICONS.calendar;
    }

    function indicatorIcon(indicatorClass) {
      if (indicatorClass === 'is-next') return ICONS.calendar;
      if (indicatorClass === 'is-today') return ICONS.time;
      if (indicatorClass === 'is-tomorrow') return ICONS.calendar;
      return ICONS.status;
    }

    function eventStatusMeta(ev) {
      const mode = eventCallMode(ev);
      if (isPastEvent(ev)) return { label: 'Past session', className: 'is-past' };
      if (mode === 'tbd') return { label: 'Call list TBD', className: 'is-tbd' };
      return { label: 'Call list set', className: 'is-ready' };
    }

    function eventActionLabel(ev) {
      const status = eventStatusMeta(ev);
      if (status.className === 'is-ready') return 'Plan this rehearsal';
      if (status.className === 'is-tbd') return 'Plan call list';
      return 'Review session';
    }

    function softChipStyle(hex) {
      return `background:${hexToRgba(hex, 0.12)};color:${hex};`;
    }

    function hexToRgba(hex, alpha) {
      const raw = String(hex || '').replace('#', '').trim();
      if (raw.length !== 6) return `rgba(87,46,136,${alpha})`;
      const r = parseInt(raw.slice(0, 2), 16);
      const g = parseInt(raw.slice(2, 4), 16);
      const b = parseInt(raw.slice(4, 6), 16);
      if ([r, g, b].some(Number.isNaN)) return `rgba(87,46,136,${alpha})`;
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function sortedEventsForList() {
      return [..._events].sort((a, b) => {
        const aDiff = dayDiffFromToday(a);
        const bDiff = dayDiffFromToday(b);
        const aPast = aDiff != null && aDiff < 0;
        const bPast = bDiff != null && bDiff < 0;
        if (aPast !== bPast) return aPast ? 1 : -1;
        const aStart = parseLocalDateTime(a?.start_time || '');
        const bStart = parseLocalDateTime(b?.start_time || '');
        const aTime = aStart instanceof Date && !Number.isNaN(aStart.getTime()) ? aStart.getTime() : 0;
        const bTime = bStart instanceof Date && !Number.isNaN(bStart.getTime()) ? bStart.getTime() : 0;
        return aPast && bPast ? bTime - aTime : aTime - bTime;
      });
    }

    function eventIndicatorMeta(ev, sortedEvents) {
      const diff = dayDiffFromToday(ev);
      if (diff == null) return null;
      if (diff < 0) return { label: 'Past', className: 'is-past' };
      if (diff === 0) return { label: 'Today', className: 'is-today' };
      if (diff === 1) return { label: 'Tomorrow', className: 'is-tomorrow' };
      const nextUpcoming = sortedEvents.find(item => {
        const itemDiff = dayDiffFromToday(item);
        return itemDiff != null && itemDiff >= 0;
      });
      if (nextUpcoming && String(nextUpcoming.id) === String(ev.id)) {
        return { label: 'Next up', className: 'is-next' };
      }
      return null;
    }

    function eventCalledCharacterIds(ev) {
      const legacyIds = Array.isArray(ev?.called_character_ids) ? ev.called_character_ids.filter(Boolean).map(String) : [];
      if (legacyIds.length) return new Set(legacyIds);
      const calledCast = ev?.called_cast;
      if (!calledCast || typeof calledCast !== 'object') return new Set();
      if (calledCast.type === 'individuals') {
        return new Set((Array.isArray(calledCast.character_ids) ? calledCast.character_ids : []).filter(Boolean).map(String));
      }
      if (calledCast.type === 'all') {
        return new Set(_chars.map(c => String(c.id)));
      }
      return new Set();
    }

    function eventCallMode(ev) {
      if (ev?.called_cast?.type === 'all') return 'all';
      if (ev?.called_cast?.type === 'individuals') return 'individuals';
      if (Array.isArray(ev?.called_character_ids) && ev.called_character_ids.length) return 'individuals';
      return 'tbd';
    }

    function callSummary(ev) {
      const mode = eventCallMode(ev);
      if (mode === 'all') return 'All cast called';
      if (mode === 'individuals') {
        const count = eventCalledCharacterIds(ev).size;
        return count ? count + ' character' + (count === 1 ? '' : 's') + ' called' : 'Specific cast list';
      }
      return 'Call list still TBD';
    }

    function castNamesByCharacterId() {
      const byId = {};
      _assignments.forEach(a => {
        const charId = a.character_id ? String(a.character_id) : '';
        if (!charId) return;
        if (!byId[charId]) byId[charId] = [];
        const p = _people[a.applicant_id] || {};
        const name = p.name || p.email || '';
        if (name && !byId[charId].includes(name)) byId[charId].push(name);
      });
      return byId;
    }

    function castPeopleByCharacterId() {
      const byId = {};
      _assignments.forEach(a => {
        const charId = a.character_id ? String(a.character_id) : '';
        if (!charId || byId[charId]) return;
        const p = _people[a.applicant_id] || {};
        byId[charId] = p;
      });
      return byId;
    }

    function splitDisplayName(name) {
      const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return { first: 'Not yet', last: 'Assigned' };
      if (parts.length === 1) return { first: parts[0], last: '' };
      return { first: parts.slice(0, -1).join(' '), last: parts.slice(-1).join(' ') };
    }

    function renderCalledCharacterEntry(ch, active, castMap) {
      const id = String(ch.id);
      const castPerson = castMap[id] || null;
      if (castPerson && typeof renderCastingCard === 'function') {
        const split = splitDisplayName(castPerson.name || castPerson.email || 'Cast Member');
        const cardHtml = renderCastingCard({
          first_name: split.first,
          last_name: split.last,
          character_name: ch.name || '',
          headshot_url: castPerson.headshot_url || '',
        }, {
          size: 'compact',
          hasPadding: true,
          hasIcons: false,
          draggable: false,
          state: null,
          variant: 'inTheShow',
        });
        return '' +
          '<button type="button" class="sched-cast-card-btn' + (active ? ' active' : '') + '" onclick="toggleCharacter(\'' + esc(id) + '\')">' +
            '<div class="sched-cast-card-shell">' +
              cardHtml +
              '<div class="sched-cast-card-role">' + esc(ch.name) + '</div>' +
            '</div>' +
          '</button>';
      }

      return '' +
        '<button type="button" class="sched-char-row is-uncast' + (active ? ' active' : '') + '" onclick="toggleCharacter(\'' + esc(id) + '\')">' +
          '<span class="sched-char-cb">' + (active ? '&#10003;' : '') + '</span>' +
          '<span class="sched-char-meta">' +
            '<div class="sched-char-name">' + esc(ch.name) + '</div>' +
            '<div class="sched-char-cast">Not yet cast</div>' +
          '</span>' +
          '<span class="sched-char-tag">Needs casting</span>' +
        '</button>';
    }

    function currentEvent() {
      return _events.find(e => String(e.id) === String(_selectedEventId)) || null;
    }

    function syncDraftFromEvent(ev) {
      if (!ev) { _draft = null; return; }
      _draft = {
        id: ev.id,
        notes: ev.notes || '',
        mode: eventCallMode(ev),
        calledIds: eventCalledCharacterIds(ev),
        saving: false,
        message: '',
        dirty: false
      };
    }

    function updateSaveUi(message) {
      if (_draft) _draft.message = message || '';
      const msgEl = document.getElementById('sched-save-msg');
      if (msgEl) msgEl.textContent = message || '';
      const saveBtn = document.getElementById('sched-save-btn');
      if (saveBtn) saveBtn.disabled = !!(_draft && _draft.saving);
    }

    function markDraftDirty(message = 'Unsaved changes') {
      if (!_draft) return;
      _draft.dirty = true;
      updateSaveUi(message);
    }

    function queueAutosave(delay = 900) {
      if (!_draft) return;
      markDraftDirty('Saving automatically...');
      if (_autosaveTimer) clearTimeout(_autosaveTimer);
      _autosaveTimer = setTimeout(() => {
        _autosaveTimer = null;
        saveSchedule({ autosave: true });
      }, delay);
    }

    function currentDraftPayload() {
      const calledIds = _draft.mode === 'all'
        ? _chars.map(ch => Number(ch.id)).filter(n => !Number.isNaN(n))
        : _draft.mode === 'individuals'
          ? [..._draft.calledIds].map(Number).filter(n => !Number.isNaN(n))
          : [];

      const payload = {
        notes: _draft.notes || '',
        called_character_ids: calledIds
      };
      if (_hasCalledCastColumn) {
        payload.called_cast = _draft.mode === 'all'
          ? { type: 'all' }
          : _draft.mode === 'individuals'
            ? { type: 'individuals', character_ids: calledIds }
            : { type: 'tbd' };
      }
      return { payload, calledIds };
    }

    function renderSummary() {
      const total = _events.length;
      const setCount = _events.filter(ev => ['all', 'individuals'].includes(eventCallMode(ev))).length;
      const tbdCount = Math.max(total - setCount, 0);
      const current = currentEvent();
      const selectedState = current ? callSummary(current) : 'Pick a rehearsal to start planning.';
      const host = document.getElementById('sched-summary');
      host.innerHTML = '' +
        '<div class="sched-glance is-purple">' +
          '<div class="sched-glance-label">Rehearsals</div>' +
          '<div class="sched-glance-value">' + esc(String(total)) + '</div>' +
          '<div class="sched-glance-copy">Sessions currently on the calendar.</div>' +
        '</div>' +
        '<div class="sched-glance is-green">' +
          '<div class="sched-glance-label">Ready</div>' +
          '<div class="sched-glance-value">' + esc(String(setCount)) + '</div>' +
          '<div class="sched-glance-copy">Rehearsals with a cast call already set.</div>' +
        '</div>' +
        '<div class="sched-glance is-gold">' +
          '<div class="sched-glance-label">Still TBD</div>' +
          '<div class="sched-glance-value">' + esc(String(tbdCount)) + '</div>' +
          '<div class="sched-glance-copy">Sessions still waiting on a call list.</div>' +
        '</div>' +
        '<div class="sched-glance is-blue">' +
          '<div class="sched-glance-label">Selected</div>' +
          '<div class="sched-glance-value" style="font-size:1.05rem;line-height:1.15;">' + esc(current ? (current.title || typeLabel(current.event_type)) : 'No rehearsal selected') + '</div>' +
          '<div class="sched-glance-copy">' + esc(selectedState) + '</div>' +
        '</div>';
    }

    function renderList() {
      const host = document.getElementById('sched-list');
      if (!_events.length) {
        host.innerHTML = '<div class="sched-empty-list">No rehearsals yet. Add rehearsal events in Calendar, then plan them here.</div>';
        return;
      }
      const listEvents = sortedEventsForList();
      host.innerHTML = listEvents.map(ev => {
        const active = String(ev.id) === String(_selectedEventId);
        const title = ev.title || typeLabel(ev.event_type);
        const dateParts = eventDateParts(ev);
        const colour = weekdayColour(ev);
        const duration = eventDurationLabel(ev);
        return '' +
          '<button type="button" class="sched-card' + (active ? ' active' : '') + '" onclick="selectEvent(\'' + esc(ev.id) + '\')">' +
            '<div class="sched-card-layout">' +
              '<div class="sched-card-top-band">' +
                '<div class="sched-card-date-rail">' +
                  '<div class="sched-card-date">' +
                    '<div class="sched-card-date-month" style="background:' + esc(colour) + ';">' + esc(dateParts.month) + '</div>' +
                    '<div class="sched-card-date-day">' + esc(dateParts.day) + '</div>' +
                  '</div>' +
                  '<div class="sched-card-date-weekday">' + esc(dateParts.weekday) + '</div>' +
                '</div>' +
                '<div class="sched-card-main">' +
                  '<div class="sched-card-top">' +
                    '<div class="sched-card-title-wrap">' +
                      '<div class="sched-card-title">' + esc(title) + '</div>' +
                    '</div>' +
                  '</div>' +
                  '<div class="sched-card-meta">' +
                    '<div class="sched-card-meta-row"><img class="sched-card-icon" src="' + esc(ICONS.venue) + '" alt=""><span class="sched-card-meta-text">' + esc(ev.venue || 'No venue set') + '</span></div>' +
                    '<div><div class="sched-card-meta-row"><img class="sched-card-icon" src="' + esc(ICONS.time) + '" alt=""><span class="sched-card-meta-text">' + esc(eventTimeRange(ev) || 'Time TBD') + '</span></div>' + (duration ? '<span class="sched-card-meta-text is-duration">' + esc(duration) + '</span>' : '') + '</div>' +
                  '</div>' +
                '</div>' +
              '</div>' +
              '<div class="sched-card-bottom">' +
                '<div class="sched-card-called-label">Who Is Called</div>' +
                '<div class="sched-card-bottom-row"><div class="sched-card-callout"><img class="sched-card-icon" src="' + esc(ICONS.performers) + '" alt=""><span class="sched-card-callout-text">' + esc(callSummary(ev)) + '</span></div></div>' +
              '</div>' +
            '</div>' +
          '</button>';
      }).join('');
    }

    function renderDetail() {
      const host = document.getElementById('sched-detail');
      const ev = currentEvent();
      if (!ev || !_draft) {
        host.innerHTML = '<div class="sched-detail-empty">Choose a rehearsal on the left to plan who is called and what the session is for.</div>';
        return;
      }

      const byChar = castNamesByCharacterId();
      const castPeople = castPeopleByCharacterId();
      const selectedCount = _draft.mode === 'all' ? _chars.length : _draft.calledIds.size;
      const status = eventStatusMeta(ev);
      const indicator = eventIndicatorMeta(ev, sortedEventsForList());
      const castCopy = _draft.mode === 'tbd'
        ? 'This rehearsal has not been assigned a call list yet.'
        : _draft.mode === 'all'
          ? 'Every character is currently called for this rehearsal.'
          : selectedCount + ' character' + (selectedCount === 1 ? '' : 's') + ' selected for this rehearsal.';
      const castedChars = _chars.filter(ch => !!castPeople[String(ch.id)]);
      const uncastChars = _chars.filter(ch => !castPeople[String(ch.id)]);

      host.innerHTML = '' +
        '<div class="sched-focus">' +
          '<div class="sched-focus-hero">' +
            '<div class="sched-focus-top">' +
              '<div>' +
                '<div class="sched-detail-kicker">Plan rehearsal</div>' +
                '<h2 class="sched-detail-title">' + esc(ev.title || typeLabel(ev.event_type)) + '</h2>' +
                '<div class="sched-detail-meta">' +
                  (indicator ? '<span class="sched-detail-chip ' + esc(indicator.className) + '">' + esc(indicator.label) + '</span>' : '') +
                  '<span class="sched-detail-chip">' + esc(fmtDate(ev.start_time)) + '</span>' +
                  '<span class="sched-detail-chip">' + esc(eventTimeRange(ev) || 'Time TBD') + '</span>' +
                  '<span class="sched-detail-chip">' + esc(ev.venue || 'No venue set') + '</span>' +
                  '<span class="sched-detail-chip">' + esc(status.label) + '</span>' +
                '</div>' +
              '</div>' +
              '<a class="sched-link-btn" href="plan-calendar.html?id=' + encodeURIComponent(prodId) + '">Open in Calendar</a>' +
            '</div>' +
            '<div class="sched-focus-notice">Set the session goal, choose who is called, and save it once. This page should feel like one planning pass, not three separate admin tasks.</div>' +
          '</div>' +
          '<div class="sched-focus-bar">' +
            '<div class="sched-focus-pill">Called now: ' + esc(String(selectedCount)) + '</div>' +
            '<div class="sched-focus-pill">Call mode: ' + esc(_draft.mode === 'all' ? 'All cast' : _draft.mode === 'individuals' ? 'Specific cast' : 'Still TBD') + '</div>' +
            '<div class="sched-focus-pill">Type: ' + esc(typeLabel(ev.event_type)) + '</div>' +
          '</div>' +
          '<div class="sched-grid">' +
            '<div class="sched-block">' +
              '<div class="sched-block-title">Session Plan</div>' +
              '<label class="sched-field-label" for="sched-notes">What are you working on?</label>' +
              '<textarea class="sched-textarea" id="sched-notes" placeholder="Scenes, songs, choreography, department prep, reminders...">' + esc(_draft.notes) + '</textarea>' +
              '<div class="sched-copy" style="margin-top:0.7rem;">Keep the point of the rehearsal here so the notes and the called cast stay connected.</div>' +
              '<div class="sched-block-title" style="margin-top:1.2rem;">Called Cast</div>' +
              '<div class="sched-mode-list">' +
                '<button type="button" class="sched-mode-btn' + (_draft.mode === 'tbd' ? ' active' : '') + '" onclick="setMode(\'tbd\')">TBD</button>' +
                '<button type="button" class="sched-mode-btn' + (_draft.mode === 'all' ? ' active' : '') + '" onclick="setMode(\'all\')">All Cast</button>' +
                '<button type="button" class="sched-mode-btn' + (_draft.mode === 'individuals' ? ' active' : '') + '" onclick="setMode(\'individuals\')">Specific Cast</button>' +
              '</div>' +
              '<div class="sched-note">' + esc(castCopy) + '</div>' +
              '<div class="sched-actions">' +
                '<div class="sched-save-msg" id="sched-save-msg">' + esc(_draft.message || '') + '</div>' +
                '<div style="display:flex;gap:0.7rem;flex-wrap:wrap;">' +
                  '<button type="button" class="sched-secondary-btn" onclick="resetDraft()">Reset</button>' +
                  '<button type="button" class="sched-secondary-btn" onclick="applyPlanToAllRehearsals()">Apply to all rehearsals</button>' +
                  '<button type="button" class="sched-save-btn" id="sched-save-btn" onclick="saveSchedule()"' + (_draft.saving ? ' disabled' : '') + '>Save rehearsal plan</button>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="sched-block">' +
              '<div class="sched-cast-head">' +
                '<div>' +
                  '<div class="sched-cast-title">Who is called for this session?</div>' +
                  '<div class="sched-cast-sub">' + esc(castedChars.length ? 'Choose individual characters when the whole cast is not needed.' : 'No cast cards yet. Uncast roles stay condensed until casting is finished.') + '</div>' +
                '</div>' +
                '<div class="sched-cast-count">' + esc(String(selectedCount)) + '</div>' +
              '</div>' +
              '<div class="sched-checklist"' + (_draft.mode === 'individuals' ? '' : ' style="opacity:0.55;pointer-events:none;"') + '>' +
                (castedChars.length ? (
                  '<div class="sched-cast-section">' +
                    '<div class="sched-cast-section-label">Cast roles</div>' +
                    '<div class="sched-cast-card-grid">' +
                      castedChars.map(ch => {
                        const id = String(ch.id);
                        return renderCalledCharacterEntry(ch, _draft.calledIds.has(id), castPeople);
                      }).join('') +
                    '</div>' +
                  '</div>'
                ) : '') +
                (uncastChars.length ? (
                  '<div class="sched-cast-section">' +
                    '<div class="sched-cast-section-label">' + esc(castedChars.length ? 'Still uncast' : 'Roles still waiting on casting') + '</div>' +
                    uncastChars.map(ch => {
                      const id = String(ch.id);
                      return renderCalledCharacterEntry(ch, _draft.calledIds.has(id), castPeople);
                    }).join('') +
                  '</div>'
                ) : '') +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      const notesEl = document.getElementById('sched-notes');
      if (notesEl) notesEl.addEventListener('input', function () {
        if (_draft) {
          _draft.notes = this.value;
          queueAutosave();
        }
      });
      updateSaveUi(_draft.message || '');
    }

    function renderAll() {
      renderSummary();
      renderList();
      renderDetail();
    }

    function selectEvent(id) {
      _selectedEventId = id;
      syncDraftFromEvent(currentEvent());
      renderAll();
    }

    function setMode(mode) {
      if (!_draft) return;
      _draft.mode = mode;
      if (mode === 'all') {
        _draft.calledIds = new Set(_chars.map(ch => String(ch.id)));
      } else if (mode === 'tbd') {
        _draft.calledIds = new Set();
      }
      renderDetail();
      queueAutosave(500);
    }

    function toggleCharacter(id) {
      if (!_draft) return;
      if (_draft.mode !== 'individuals') return;
      if (_draft.calledIds.has(id)) _draft.calledIds.delete(id);
      else _draft.calledIds.add(id);
      renderDetail();
      queueAutosave(500);
    }

    function resetDraft() {
      if (_autosaveTimer) {
        clearTimeout(_autosaveTimer);
        _autosaveTimer = null;
      }
      const ev = currentEvent();
      syncDraftFromEvent(ev);
      renderDetail();
    }

    async function saveSchedule(options = {}) {
      const { autosave = false, suppressRerender = false } = options;
      const ev = currentEvent();
      if (!ev || !_draft) return;
      if (_draft.saving) {
        _autosaveQueued = true;
        return;
      }
      if (_autosaveTimer) {
        clearTimeout(_autosaveTimer);
        _autosaveTimer = null;
      }
      _draft.saving = true;
      updateSaveUi(autosave ? 'Saving automatically...' : 'Saving...');

      const { payload, calledIds } = currentDraftPayload();

      const { error } = await sb.from('production_events').update(payload).eq('id', ev.id);
      if (error) {
        _draft.saving = false;
        markDraftDirty('Could not save yet');
        if (!suppressRerender && !autosave) renderDetail();
        return;
      }

      ev.notes = payload.notes;
      ev.called_character_ids = calledIds;
      if (_hasCalledCastColumn) ev.called_cast = payload.called_cast;
      _draft.saving = false;
      _draft.dirty = false;
      updateSaveUi(autosave ? 'Saved automatically' : 'Saved');
      if (!suppressRerender) {
        if (autosave) {
          renderSummary();
          renderList();
        } else {
          renderAll();
        }
      }
      if (_autosaveQueued) {
        _autosaveQueued = false;
        queueAutosave(250);
      }
    }

    async function applyPlanToAllRehearsals() {
      const ev = currentEvent();
      if (!ev || !_draft || !_events.length) return;
      if (_autosaveTimer) {
        clearTimeout(_autosaveTimer);
        _autosaveTimer = null;
      }
      if (_draft.saving) {
        _autosaveQueued = true;
        return;
      }
      _draft.saving = true;
      updateSaveUi('Applying this plan to all rehearsals...');

      const { payload, calledIds } = currentDraftPayload();
      const updates = _events.map(row => sb.from('production_events').update(payload).eq('id', row.id));
      const results = await Promise.all(updates);
      const failed = results.find(result => result.error);
      if (failed) {
        _draft.saving = false;
        markDraftDirty('Could not apply to all rehearsals');
        return;
      }

      _events.forEach(row => {
        row.notes = payload.notes;
        row.called_character_ids = [...calledIds];
        if (_hasCalledCastColumn) row.called_cast = payload.called_cast;
      });
      _draft.saving = false;
      _draft.dirty = false;
      updateSaveUi('Applied to all rehearsals');
      renderAll();
    }

    async function loadData() {
      if (!prodId) return;
      const calledCastProbe = await sb.from('production_events').select('called_cast').eq('production_id', prodId).limit(1);
      _hasCalledCastColumn = !calledCastProbe.error;
      const eventSelect = _hasCalledCastColumn
        ? 'id,title,event_type,start_time,end_time,venue,notes,called_cast,called_character_ids'
        : 'id,title,event_type,start_time,end_time,venue,notes,called_character_ids';

      const [eventRes, charRes, assignRes, appRes, bookRes] = await Promise.all([
        sb.from('production_events').select(eventSelect).eq('production_id', prodId).in('event_type', REHEARSAL_TYPES).order('start_time'),
        sb.from('production_characters').select('id,name,sort_order').eq('production_id', prodId).order('sort_order'),
        sb.from('casting_assignments').select('id,character_id,applicant_id,state').eq('production_id', prodId).in('state', ['chosen', 'offer_accepted']),
        sb.from('audition_applications').select('id,name,email,pronouns,headshot_url,custom_answers').eq('production_id', prodId).order('name'),
        sb.from('audition_bookings').select('id,name,email,headshot_url,custom_answers').eq('production_id', prodId).order('name')
      ]);

      _events = eventRes.data || [];
      _chars = charRes.data || [];
      _assignments = assignRes.data || [];
      _people = {};
      (appRes.data || []).forEach(p => { _people[p.id] = p; });
      (bookRes.data || []).forEach(p => { if (!_people[p.id]) _people[p.id] = p; });

      _selectedEventId = _events[0]?.id || null;
      syncDraftFromEvent(currentEvent());
      renderAll();
    }

    document.addEventListener('DOMContentLoaded', function () {
      const calLink = document.getElementById('sched-calendar-link');
      if (calLink) calLink.href = 'plan-calendar.html?id=' + encodeURIComponent(prodId);
      if (!prodId) {
        document.getElementById('sched-list').innerHTML = '<div class="sched-empty-list">No production selected.</div>';
        document.getElementById('sched-detail').innerHTML = '<div class="sched-detail-empty">Open this page from a production to start planning rehearsals.</div>';
        return;
      }
      loadData();
    });

    window.selectEvent = selectEvent;
    window.setMode = setMode;
    window.toggleCharacter = toggleCharacter;
    window.resetDraft = resetDraft;
    window.saveSchedule = saveSchedule;
    window.applyPlanToAllRehearsals = applyPlanToAllRehearsals;
  </script>
  <script src="/ASSETS/scripts/casting-card.js?v=in-show-card-20260514"></script>
</body>
