  <script>

  </script>
  <script>
    const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
    const sb = supabase.createClient(SB_URL, SB_ANON);
    const prodId = new URLSearchParams(location.search).get('id') || '';

    const REHEARSAL_TYPES = ['rehearsal', 'music_rehearsal', 'choreography', 'tech', 'dress'];
    const TYPE_LABELS = {
      rehearsal: 'Rehearsal',
      music_rehearsal: 'Music Rehearsal',
      choreography: 'Choreography',
      tech: 'Tech',
      dress: 'Dress'
    };

    let _events = [];
    let _chars = [];
    let _assignments = [];
    let _people = {};
    let _selectedEventId = null;
    let _draft = null;
    let _hasCalledCastColumn = false;

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s ?? '');
      return d.innerHTML;
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit' });
    }

    function typeLabel(type) {
      return TYPE_LABELS[type] || 'Rehearsal';
    }

    function isPastEvent(ev) {
      const start = new Date(ev?.start_time || '');
      const today = new Date('2026-07-19T00:00:00');
      if (Number.isNaN(start.getTime())) return false;
      return start < today;
    }

    function eventTimeRange(ev) {
      if (!ev?.start_time) return '';
      const start = fmtTime(ev.start_time);
      const end = ev.end_time ? fmtTime(ev.end_time) : '';
      return end ? `${start} - ${end}` : start;
    }

    function eventDateChip(ev) {
      if (!ev?.start_time) return 'No date';
      const d = new Date(ev.start_time);
      if (Number.isNaN(d.getTime())) return 'No date';
      return d.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function eventStatusMeta(ev) {
      const mode = eventCallMode(ev);
      if (isPastEvent(ev)) return { label: 'Past session', className: 'is-past' };
      if (mode === 'tbd') return { label: 'Call list TBD', className: 'is-tbd' };
      return { label: 'Call list set', className: 'is-ready' };
    }

    function eventCalledCharacterIds(ev) {
      const legacyIds = Array.isArray(ev?.called_character_ids) ? ev.called_character_ids.filter(Boolean).map(String) : [];
      if (legacyIds.length) return new Set(legacyIds);
      const calledCast = ev?.called_cast;
      if (!calledCast || typeof calledCast !== 'object') return new Set();
      if (calledCast.type === 'individuals') {
        return new Set((Array.isArray(calledCast.character_ids) ? calledCast.character_ids : []).filter(Boolean).map(String));
      }
      if (calledCast.type === 'all') {
        return new Set(_chars.map(c => String(c.id)));
      }
      return new Set();
    }

    function eventCallMode(ev) {
      if (ev?.called_cast?.type === 'all') return 'all';
      if (ev?.called_cast?.type === 'individuals') return 'individuals';
      if (Array.isArray(ev?.called_character_ids) && ev.called_character_ids.length) return 'individuals';
      return 'tbd';
    }

    function callSummary(ev) {
      const mode = eventCallMode(ev);
      if (mode === 'all') return 'All cast called';
      if (mode === 'individuals') {
        const count = eventCalledCharacterIds(ev).size;
        return count ? count + ' character' + (count === 1 ? '' : 's') + ' called' : 'Specific cast list';
      }
      return 'Call list still TBD';
    }

    function castNamesByCharacterId() {
      const byId = {};
      _assignments.forEach(a => {
        const charId = a.character_id ? String(a.character_id) : '';
        if (!charId) return;
        if (!byId[charId]) byId[charId] = [];
        const p = _people[a.applicant_id] || {};
        const name = p.name || p.email || '';
        if (name && !byId[charId].includes(name)) byId[charId].push(name);
      });
      return byId;
    }

    function currentEvent() {
      return _events.find(e => String(e.id) === String(_selectedEventId)) || null;
    }

    function syncDraftFromEvent(ev) {
      if (!ev) { _draft = null; return; }
      _draft = {
        id: ev.id,
        notes: ev.notes || '',
        mode: eventCallMode(ev),
        calledIds: eventCalledCharacterIds(ev),
        saving: false,
        message: ''
      };
    }

    function renderSummary() {
      const total = _events.length;
      const setCount = _events.filter(ev => ['all', 'individuals'].includes(eventCallMode(ev))).length;
      const tbdCount = Math.max(total - setCount, 0);
      const current = currentEvent();
      const selectedState = current ? callSummary(current) : 'Pick a rehearsal to start planning.';
      const host = document.getElementById('sched-summary');
      host.innerHTML = '' +
        '<div class="sched-glance is-purple">' +
          '<div class="sched-glance-label">Rehearsals</div>' +
          '<div class="sched-glance-value">' + esc(String(total)) + '</div>' +
          '<div class="sched-glance-copy">Sessions currently on the calendar.</div>' +
        '</div>' +
        '<div class="sched-glance is-green">' +
          '<div class="sched-glance-label">Ready</div>' +
          '<div class="sched-glance-value">' + esc(String(setCount)) + '</div>' +
          '<div class="sched-glance-copy">Rehearsals with a cast call already set.</div>' +
        '</div>' +
        '<div class="sched-glance is-gold">' +
          '<div class="sched-glance-label">Still TBD</div>' +
          '<div class="sched-glance-value">' + esc(String(tbdCount)) + '</div>' +
          '<div class="sched-glance-copy">Sessions still waiting on a call list.</div>' +
        '</div>' +
        '<div class="sched-glance is-blue">' +
          '<div class="sched-glance-label">Selected</div>' +
          '<div class="sched-glance-value" style="font-size:1.05rem;line-height:1.15;">' + esc(current ? (current.title || typeLabel(current.event_type)) : 'No rehearsal selected') + '</div>' +
          '<div class="sched-glance-copy">' + esc(selectedState) + '</div>' +
        '</div>';
    }

    function renderList() {
      const host = document.getElementById('sched-list');
      if (!_events.length) {
        host.innerHTML = '<div class="sched-empty-list">No rehearsals yet. Add rehearsal events in Calendar, then plan them here.</div>';
        return;
      }
      host.innerHTML = _events.map(ev => {
        const active = String(ev.id) === String(_selectedEventId);
        const title = ev.title || typeLabel(ev.event_type);
        const status = eventStatusMeta(ev);
        return '' +
          '<button type="button" class="sched-card' + (active ? ' active' : '') + '" onclick="selectEvent(\'' + esc(ev.id) + '\')">' +
            '<div class="sched-card-date">' + esc(eventDateChip(ev)) + '</div>' +
            '<div class="sched-card-top">' +
              '<div>' +
                '<div class="sched-card-title">' + esc(title) + '</div>' +
                '<div class="sched-card-venue">' + esc(ev.venue || 'No venue set') + '</div>' +
              '</div>' +
              '<div class="sched-card-type">' + esc(typeLabel(ev.event_type)) + '</div>' +
            '</div>' +
            '<div class="sched-card-meta">' + esc(fmtDate(ev.start_time) || '') + ' · ' + esc(eventTimeRange(ev) || 'Time TBD') + '</div>' +
            '<div class="sched-card-callout">' + esc(callSummary(ev)) + '</div>' +
            '<div style="margin-top:0.65rem;"><span class="sched-card-status ' + esc(status.className) + '">' + esc(status.label) + '</span></div>' +
          '</button>';
      }).join('');
    }

    function renderDetail() {
      const host = document.getElementById('sched-detail');
      const ev = currentEvent();
      if (!ev || !_draft) {
        host.innerHTML = '<div class="sched-detail-empty">Choose a rehearsal on the left to plan who is called and what the session is for.</div>';
        return;
      }

      const byChar = castNamesByCharacterId();
      const selectedCount = _draft.mode === 'all' ? _chars.length : _draft.calledIds.size;
      const status = eventStatusMeta(ev);
      const castCopy = _draft.mode === 'tbd'
        ? 'This rehearsal has not been assigned a call list yet.'
        : _draft.mode === 'all'
          ? 'Every character is currently called for this rehearsal.'
          : selectedCount + ' character' + (selectedCount === 1 ? '' : 's') + ' selected for this rehearsal.';

      host.innerHTML = '' +
        '<div class="sched-focus">' +
          '<div class="sched-focus-hero">' +
            '<div class="sched-focus-top">' +
              '<div>' +
                '<div class="sched-detail-kicker">Plan rehearsal</div>' +
                '<h2 class="sched-detail-title">' + esc(ev.title || typeLabel(ev.event_type)) + '</h2>' +
                '<div class="sched-detail-meta">' +
                  '<span class="sched-detail-chip">' + esc(fmtDate(ev.start_time)) + '</span>' +
                  '<span class="sched-detail-chip">' + esc(eventTimeRange(ev) || 'Time TBD') + '</span>' +
                  '<span class="sched-detail-chip">' + esc(ev.venue || 'No venue set') + '</span>' +
                  '<span class="sched-detail-chip">' + esc(status.label) + '</span>' +
                '</div>' +
              '</div>' +
              '<a class="sched-link-btn" href="plan-calendar.html?id=' + encodeURIComponent(prodId) + '">Open in Calendar</a>' +
            '</div>' +
            '<div class="sched-focus-notice">Set the session goal, choose who is called, and save it once. This page should feel like one planning pass, not three separate admin tasks.</div>' +
          '</div>' +
          '<div class="sched-focus-bar">' +
            '<div class="sched-focus-pill">Called now: ' + esc(String(selectedCount)) + '</div>' +
            '<div class="sched-focus-pill">Call mode: ' + esc(_draft.mode === 'all' ? 'All cast' : _draft.mode === 'individuals' ? 'Specific cast' : 'Still TBD') + '</div>' +
            '<div class="sched-focus-pill">Type: ' + esc(typeLabel(ev.event_type)) + '</div>' +
          '</div>' +
          '<div class="sched-grid">' +
            '<div class="sched-block">' +
              '<div class="sched-block-title">Session Plan</div>' +
              '<label class="sched-field-label" for="sched-notes">What are you working on?</label>' +
              '<textarea class="sched-textarea" id="sched-notes" placeholder="Scenes, songs, choreography, department prep, reminders...">' + esc(_draft.notes) + '</textarea>' +
              '<div class="sched-copy" style="margin-top:0.7rem;">Keep the point of the rehearsal here so the notes and the called cast stay connected.</div>' +
              '<div class="sched-block-title" style="margin-top:1.2rem;">Called Cast</div>' +
              '<div class="sched-mode-list">' +
                '<button type="button" class="sched-mode-btn' + (_draft.mode === 'tbd' ? ' active' : '') + '" onclick="setMode(\'tbd\')">TBD</button>' +
                '<button type="button" class="sched-mode-btn' + (_draft.mode === 'all' ? ' active' : '') + '" onclick="setMode(\'all\')">All Cast</button>' +
                '<button type="button" class="sched-mode-btn' + (_draft.mode === 'individuals' ? ' active' : '') + '" onclick="setMode(\'individuals\')">Specific Cast</button>' +
              '</div>' +
              '<div class="sched-note">' + esc(castCopy) + '</div>' +
              '<div class="sched-actions">' +
                '<div class="sched-save-msg" id="sched-save-msg">' + esc(_draft.message || '') + '</div>' +
                '<div style="display:flex;gap:0.7rem;flex-wrap:wrap;">' +
                  '<button type="button" class="sched-secondary-btn" onclick="resetDraft()">Reset</button>' +
                  '<button type="button" class="sched-save-btn" id="sched-save-btn" onclick="saveSchedule()"' + (_draft.saving ? ' disabled' : '') + '>Save rehearsal plan</button>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="sched-block">' +
              '<div class="sched-cast-head">' +
                '<div>' +
                  '<div class="sched-cast-title">Who is called for this session?</div>' +
                  '<div class="sched-cast-sub">Choose individual characters when the whole cast is not needed.</div>' +
                '</div>' +
                '<div class="sched-cast-count">' + esc(String(selectedCount)) + '</div>' +
              '</div>' +
              '<div class="sched-checklist"' + (_draft.mode === 'individuals' ? '' : ' style="opacity:0.55;pointer-events:none;"') + '>' +
                _chars.map(ch => {
                  const id = String(ch.id);
                  const active = _draft.calledIds.has(id);
                  const castLine = (byChar[id] && byChar[id].length) ? byChar[id].join(', ') : 'Not yet cast';
                  return '' +
                    '<button type="button" class="sched-char-row' + (active ? ' active' : '') + '" onclick="toggleCharacter(\'' + esc(id) + '\')">' +
                      '<span class="sched-char-cb">' + (active ? '&#10003;' : '') + '</span>' +
                      '<span>' +
                        '<div class="sched-char-name">' + esc(ch.name) + '</div>' +
                        '<div class="sched-char-cast">' + esc(castLine) + '</div>' +
                      '</span>' +
                    '</button>';
                }).join('') +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      const notesEl = document.getElementById('sched-notes');
      if (notesEl) notesEl.addEventListener('input', function () {
        if (_draft) _draft.notes = this.value;
      });
    }

    function renderAll() {
      renderSummary();
      renderList();
      renderDetail();
    }

    function selectEvent(id) {
      _selectedEventId = id;
      syncDraftFromEvent(currentEvent());
      renderAll();
    }

    function setMode(mode) {
      if (!_draft) return;
      _draft.mode = mode;
      if (mode === 'all') {
        _draft.calledIds = new Set(_chars.map(ch => String(ch.id)));
      } else if (mode === 'tbd') {
        _draft.calledIds = new Set();
      }
      renderDetail();
    }

    function toggleCharacter(id) {
      if (!_draft) return;
      if (_draft.mode !== 'individuals') return;
      if (_draft.calledIds.has(id)) _draft.calledIds.delete(id);
      else _draft.calledIds.add(id);
      renderDetail();
    }

    function resetDraft() {
      const ev = currentEvent();
      syncDraftFromEvent(ev);
      renderDetail();
    }

    async function saveSchedule() {
      const ev = currentEvent();
      if (!ev || !_draft) return;
      _draft.saving = true;
      _draft.message = 'Saving...';
      renderDetail();

      const calledIds = _draft.mode === 'all'
        ? _chars.map(ch => Number(ch.id)).filter(n => !Number.isNaN(n))
        : _draft.mode === 'individuals'
          ? [..._draft.calledIds].map(Number).filter(n => !Number.isNaN(n))
          : [];

      const payload = {
        notes: _draft.notes || '',
        called_character_ids: calledIds
      };
      if (_hasCalledCastColumn) {
        payload.called_cast = _draft.mode === 'all'
          ? { type: 'all' }
          : _draft.mode === 'individuals'
            ? { type: 'individuals', character_ids: calledIds }
            : { type: 'tbd' };
      }

      const { error } = await sb.from('production_events').update(payload).eq('id', ev.id);
      if (error) {
        _draft.saving = false;
        _draft.message = 'Could not save yet.';
        renderDetail();
        return;
      }

      ev.notes = payload.notes;
      ev.called_character_ids = calledIds;
      if (_hasCalledCastColumn) ev.called_cast = payload.called_cast;
      _draft.saving = false;
      _draft.message = 'Saved.';
      renderAll();
    }

    async function loadData() {
      if (!prodId) return;
      const calledCastProbe = await sb.from('production_events').select('called_cast').eq('production_id', prodId).limit(1);
      _hasCalledCastColumn = !calledCastProbe.error;
      const eventSelect = _hasCalledCastColumn
        ? 'id,title,event_type,start_time,end_time,venue,notes,called_cast,called_character_ids'
        : 'id,title,event_type,start_time,end_time,venue,notes,called_character_ids';

      const [eventRes, charRes, assignRes, appRes, bookRes] = await Promise.all([
        sb.from('production_events').select(eventSelect).eq('production_id', prodId).in('event_type', REHEARSAL_TYPES).order('start_time'),
        sb.from('production_characters').select('id,name,sort_order').eq('production_id', prodId).order('sort_order'),
        sb.from('casting_assignments').select('id,character_id,applicant_id,state').eq('production_id', prodId).in('state', ['chosen', 'offer_accepted']),
        sb.from('audition_applications').select('id,name,email').eq('production_id', prodId).order('name'),
        sb.from('audition_bookings').select('id,name,email').eq('production_id', prodId).order('name')
      ]);

      _events = eventRes.data || [];
      _chars = charRes.data || [];
      _assignments = assignRes.data || [];
      _people = {};
      (appRes.data || []).forEach(p => { _people[p.id] = p; });
      (bookRes.data || []).forEach(p => { if (!_people[p.id]) _people[p.id] = p; });

      _selectedEventId = _events[0]?.id || null;
      syncDraftFromEvent(currentEvent());
      renderAll();
    }

    document.addEventListener('DOMContentLoaded', function () {
      const calLink = document.getElementById('sched-calendar-link');
      if (calLink) calLink.href = 'plan-calendar.html?id=' + encodeURIComponent(prodId);
      if (!prodId) {
        document.getElementById('sched-list').innerHTML = '<div class="sched-empty-list">No production selected.</div>';
        document.getElementById('sched-detail').innerHTML = '<div class="sched-detail-empty">Open this page from a production to start planning rehearsals.</div>';
        return;
      }
      loadData();
    });

    window.selectEvent = selectEvent;
    window.setMode = setMode;
    window.toggleCharacter = toggleCharacter;
    window.resetDraft = resetDraft;
    window.saveSchedule = saveSchedule;
  </script>
</body>
</html>
