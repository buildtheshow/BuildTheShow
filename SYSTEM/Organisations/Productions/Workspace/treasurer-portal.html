<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasurer Portal | Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v48-20260617" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #f5f4f8; font-family: var(--bts-font, 'Inter', sans-serif); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Login overlay ─────────────────────────────────────── */
    .tr-login-overlay { position: fixed; inset: 0; background: #572e88; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .tr-login-box { background: #fff; border-radius: 18px; padding: 2.5rem 2rem; width: min(400px, 92vw); box-shadow: 0 24px 64px rgba(26,21,48,0.28); }
    .tr-login-logo { display: block; height: 38px; margin-bottom: 1.8rem; }
    .tr-login-title { font-size: 1.35rem; font-weight: 950; color: #1a1530; margin: 0 0 0.35rem; }
    .tr-login-sub { font-size: 0.82rem; color: rgba(26,21,48,0.55); margin: 0 0 1.6rem; }
    .tr-login-field { margin-bottom: 1rem; }
    .tr-login-field label { display: block; font-size: 0.75rem; font-weight: 800; color: rgba(26,21,48,0.6); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .tr-login-field input { width: 100%; border: 1.5px solid rgba(87,46,136,0.22); border-radius: 8px; padding: 0.65rem 0.85rem; font-size: 0.9rem; font-family: var(--bts-font, 'Inter', sans-serif); color: #1a1530; outline: none; }
    .tr-login-field input:focus { border-color: #572e88; }
    .tr-login-btn { width: 100%; background: #572e88; color: #fff; border: none; border-radius: 8px; padding: 0.8rem; font-size: 0.9rem; font-weight: 950; cursor: pointer; margin-top: 0.5rem; font-family: var(--bts-font, 'Inter', sans-serif); }
    .tr-login-btn:hover { filter: brightness(1.1); }
    .tr-login-error { font-size: 0.78rem; color: #d1523d; font-weight: 700; margin-top: 0.75rem; min-height: 1em; }

    /* ── Main layout ────────────────────────────────────────── */
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; display: flex; flex-direction: column; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }

    /* ── Hero ───────────────────────────────────────────────── */
    .hero-wrap { padding: 2rem 2.25rem 0; position: relative; z-index: 1; }
    .page-hierarchy { display: inline-flex; align-items: center; flex-wrap: wrap; gap: 0.4rem; color: rgba(255,255,255,0.88); font-size: 0.78rem; }
    .page-hierarchy-page { color: #efab45; font-weight: 950; letter-spacing: 0.08em; text-transform: uppercase; }
    .page-hierarchy-sep, .page-hierarchy-sub { color: rgba(255,255,255,0.82); font-weight: 500; }
    .page-subtitle { margin: 0.35rem 0 0; color: #fff; font-size: clamp(2.1rem, 4.6vw, 3.7rem); line-height: 0.98; font-weight: 950; }

    /* ── Content ─────────────────────────────────────────────── */
    .tr-content { flex: 1; padding: 1.5rem 2.25rem 2.5rem; position: relative; z-index: 1; }

    /* ── Financials ──────────────────────────────────────────── */
    .tr-summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .tr-tile { background: #fff; border-radius: 14px; border: 1px solid rgba(87,46,136,0.09); box-shadow: 0 2px 12px rgba(87,46,136,0.06); padding: 1.4rem 1.5rem; }
    .tr-tile-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(87,46,136,0.5); margin-bottom: 0.4rem; }
    .tr-tile-value { font-size: 1.6rem; font-weight: 950; color: #1a1530; line-height: 1.1; }
    .tr-tile-sub { font-size: 0.72rem; color: rgba(26,21,48,0.45); margin-top: 0.25rem; }
    .tr-tile.green { background: linear-gradient(145deg, #edf7ef, #d6f0da); border-color: rgba(118,158,123,0.25); }
    .tr-tile.green .tr-tile-value { color: #2f7d4f; }
    .tr-tile.red .tr-tile-value { color: #d1523d; }
    .tr-tile.orange .tr-tile-value { color: #dd8233; }

    .tr-section-header { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(87,46,136,0.5); margin: 1.5rem 0 0.65rem; padding-bottom: 0.4rem; border-bottom: 1px solid rgba(87,46,136,0.1); }

    .tr-budget-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(87,46,136,0.06); border: 1px solid rgba(87,46,136,0.09); }
    .tr-budget-table th { font-size: 0.67rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(87,46,136,0.55); padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid rgba(87,46,136,0.09); background: rgba(87,46,136,0.03); }
    .tr-budget-table td { font-size: 0.8rem; font-weight: 700; padding: 0.7rem 1rem; border-bottom: 1px solid rgba(87,46,136,0.06); color: #1a1530; }
    .tr-budget-table tr:last-child td { border-bottom: none; }
    .tr-budget-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .tr-budget-table .over { color: #d1523d; }
    .tr-budget-table .ok { color: #769e7b; }
    .tr-progress { height: 5px; background: #efefef; border-radius: 99px; overflow: hidden; margin-top: 3px; }
    .tr-progress-fill { height: 100%; border-radius: 99px; background: #769e7b; transition: width 0.4s; }
    .tr-progress-fill.over { background: #d1523d; }

    /* ── Registration Status (mirrors production-workspace) ─── */
    .rsc-status-row { display:grid; grid-template-columns:minmax(270px,1.22fr) minmax(220px,1fr) minmax(180px,0.65fr) minmax(240px,1.3fr); gap:0; background:rgba(255,255,255,0.96); border:1px solid rgba(87,46,136,0.1); border-radius:8px; box-shadow:0 8px 24px rgba(26,21,48,0.06); overflow:hidden; }
    .rsc-status-cell { padding:1.2rem 1.1rem; border-right:1px solid rgba(87,46,136,0.07); display:flex; flex-direction:column; gap:0; min-width:0; }
    .rsc-status-cell:last-child { border-right:none; }
    .rsc-col-header { font-size:0.62rem; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; color:rgba(87,46,136,0.45); margin-bottom:0.65rem; display:flex; align-items:center; gap:0.5rem; }
    .rsc-cast-cell { display:grid; grid-template-columns:76px minmax(0,1fr); gap:1rem; align-items:start; }
    .rsc-cast-photo { width:64px; height:64px; border-radius:10px; object-fit:cover; background:#efefef; flex-shrink:0; }
    .rsc-cast-initials { width:64px; height:64px; border-radius:10px; background:#572e88; color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:950; flex-shrink:0; }
    .rsc-cast-name { font-size:0.95rem; font-weight:950; color:#1a1530; line-height:1.2; }
    .rsc-cast-role { font-size:0.72rem; font-weight:800; color:rgba(87,46,136,0.6); margin-top:0.18rem; }
    .rsc-cast-email { font-size:0.65rem; font-weight:700; color:rgba(26,21,48,0.45); margin-top:0.12rem; overflow-wrap:anywhere; }
    .rsc-sort-btn { font-size:0.65rem; font-weight:800; padding:0.2em 0.6em; border-radius:5px; border:1.5px solid rgba(87,46,136,0.22); background:#fff; color:#572e88; cursor:pointer; margin-left:auto; white-space:nowrap; }
    .rsc-sort-btn:hover { background:#f0ecfc; }
    .rsc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:0.75rem; margin-top:0.75rem; }

    /* Statement styles */
    .rsc-stmt-empty { font-size:0.72rem; color:rgba(0,0,0,0.4); }
    .rsc-stmt-status-bar { font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:0.06em; padding:0.3rem 0.5rem; border-radius:5px; margin-bottom:0.65rem; display:inline-block; }
    .rsc-stmt-status-bar.full { background:#dff1e5; color:#16823b; }
    .rsc-stmt-status-bar.partial { background:#fff1c8; color:#a26810; }
    .rsc-stmt-status-bar.unpaid { background:#fde8e5; color:#c0312b; }
    .rsc-stmt-block { margin-bottom:0.7rem; }
    .rsc-stmt-block-label { font-size:0.62rem; font-weight:800; text-transform:uppercase; letter-spacing:0.08em; color:rgba(0,0,0,0.35); margin-bottom:0.3rem; }
    .rsc-stmt-row { display:flex; justify-content:space-between; align-items:baseline; gap:0.5rem; font-size:0.72rem; font-weight:700; color:#1a1530; line-height:1.45; }
    .rsc-stmt-row span:last-child { white-space:nowrap; }
    .rsc-stmt-deduct { color:rgba(0,0,0,0.45); }
    .rsc-stmt-note { font-size:0.68rem; font-weight:700; color:rgba(0,0,0,0.4); line-height:1.4; margin-top:-0.1rem; }
    .rsc-stmt-subtotal { font-weight:800; border-top:1px solid rgba(0,0,0,0.1); padding-top:0.25rem; margin-top:0.1rem; }
    .rsc-stmt-total { font-size:0.88rem; font-weight:800; border-top:1px solid rgba(0,0,0,0.1); padding-top:0.3rem; margin-top:0.15rem; }
    .rsc-stmt-paid-row { color:rgba(0,0,0,0.55); }
    .rsc-stmt-none { color:rgba(0,0,0,0.3); font-style:italic; }
    .rsc-stmt-balance { font-size:0.88rem; font-weight:800; border-top:1px solid rgba(0,0,0,0.12); padding-top:0.3rem; margin-top:0.15rem; }
    .rsc-stmt-balance.full { color:#769e7b; }
    .rsc-stmt-balance.partial { color:#dd8233; }
    .rsc-stmt-balance.unpaid { color:#d1523d; }
    .rsc-stmt-member-gap { height:0.4rem; }
    .rsc-stmt-member-line { padding-left:0.5rem; }
    .rsc-stmt-hh-total { margin-top:0.4rem; }
    .rsc-inst-row { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:0.55rem; margin-top:0.7rem; }
    .rsc-inst-card { border:0; background:#769e7b; color:#fff; border-radius:6px; padding:0.55rem 0.65rem; min-width:0; cursor:pointer; font-family:var(--bts-font,'Inter',sans-serif); text-align:left; }
    .rsc-inst-card.paid { background:#769e7b; }
    .rsc-inst-card.overdue { background:#d1523d; }
    .rsc-inst-card:hover { filter:brightness(0.94); }
    .rsc-inst-label { color:#fff; font-size:0.7rem; font-weight:950; line-height:1.2; }
    .rsc-inst-sub { color:#fff; font-size:0.66rem; font-weight:800; line-height:1.25; margin-top:0.16rem; }

    /* Connections */
    .rsc-connect-list { display:flex; flex-direction:column; gap:0.42rem; }
    .rsc-connect-item { display:grid; grid-template-columns:1.1rem minmax(0,1fr) auto; gap:0.5rem; align-items:center; color:#1a1530; }
    .rsc-connect-svg-icon { width:1rem; height:1rem; object-fit:contain; display:block; }
    .rsc-connect-title { color:#476aaa; font-size:0.74rem; font-weight:950; line-height:1.25; background:none; border:none; cursor:default; padding:0; font-family:inherit; text-align:left; }
    .rsc-connect-chip { border:none; border-radius:5px; padding:0.38rem 0.55rem; font-family:var(--bts-font,'Inter',sans-serif); font-size:0.66rem; font-weight:950; line-height:1; white-space:nowrap; color:#fff; }
    .rsc-connect-chip.ok { background:#769e7b; }
    .rsc-connect-chip.warn { background:#dd8233; }
    .rsc-connect-chip.info { background:#476aaa; }
    .rsc-connect-chip.muted { background:#572e88; }

    /* Notes */
    .rsc-notes-list { display:flex; flex-direction:column; gap:0.55rem; margin-bottom:0.86rem; }
    .rsc-note-item { display:flex; gap:0.55rem; align-items:flex-start; color:#1a1530; font-size:0.82rem; font-weight:800; line-height:1.45; overflow-wrap:anywhere; }

    /* Household grouping */
    .rsc-hh-group { margin-bottom:2rem; }
    .rsc-hh-group-header { display:flex; align-items:center; gap:0.85rem; padding:0.6rem 0 0.75rem; margin-bottom:1rem; border-bottom:2px solid rgba(87,46,136,0.12); }
    .rsc-hh-group-icon { width:2.6rem; height:2.6rem; flex-shrink:0; opacity:0.82; }
    .rsc-hh-group-name { font-size:1.15rem; font-weight:950; color:#1a1530; text-transform:uppercase; letter-spacing:0.06em; }
    .rsc-hh-group-membercount { font-size:0.72rem; font-weight:700; color:rgba(87,46,136,0.45); margin-left:auto; }
    .rsc-hh-group-members { display:grid; grid-template-columns:repeat(auto-fill,min(700px,100%)); gap:1.25rem; }
    .rsc-hh-ungrouped-divider { font-size:0.68rem; font-weight:800; color:rgba(87,46,136,0.4); text-transform:uppercase; letter-spacing:0.08em; padding:0.5rem 0 0.65rem; border-bottom:1px solid rgba(87,46,136,0.1); margin-bottom:1rem; }

    /* Summary bar */
    .rpt-summary-bar { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.25rem; padding:1rem 1.25rem; background:#fff; border-radius:10px; border:1px solid rgba(87,46,136,0.09); box-shadow:0 2px 12px rgba(87,46,136,0.06); }
    .rpt-summary-stat { display:flex; flex-direction:column; gap:0.1rem; }
    .rpt-summary-stat-label { font-size:0.62rem; font-weight:800; text-transform:uppercase; letter-spacing:0.07em; color:rgba(87,46,136,0.5); }
    .rpt-summary-stat-value { font-size:1.1rem; font-weight:950; color:#1a1530; }
    .rpt-summary-divider { width:1px; background:rgba(87,46,136,0.1); align-self:stretch; }

    /* ── Embedded producer preview ─────────────────────────── */
    body.tr-preview-mode { min-height:100vh; background:#f7f5fb; }
    body.tr-preview-mode .prod-sidebar { width:232px; box-shadow:none; border-right:1px solid rgba(255,255,255,0.12); }
    body.tr-preview-mode .sidebar-top { padding:0.9rem 1rem 0.6rem; }
    body.tr-preview-mode .sidebar-logo-img { height:18px; }
    body.tr-preview-mode .sidebar-poster { width:calc(100% - 2rem); margin:0.45rem 1rem 0; border-radius:7px; }
    body.tr-preview-mode .sidebar-prod { padding:0.8rem 1rem 0.9rem; border-top:1px solid rgba(255,255,255,0.12); border-bottom:1px solid rgba(255,255,255,0.12); }
    body.tr-preview-mode .sidebar-prod-title { font-size:0.9rem; line-height:1.25; }
    body.tr-preview-mode .sidebar-prod-sub { font-size:0.72rem; line-height:1.32; color:rgba(255,255,255,0.55); }
    body.tr-preview-mode .prod-tabs { padding-top:0.55rem; gap:0.1rem; }
    body.tr-preview-mode .sidebar-group-header,
    body.tr-preview-mode .prod-tab { min-height:40px; padding:0.58rem 1rem; font-size:0.74rem; letter-spacing:0.03em; }
    body.tr-preview-mode .prod-sub-item { min-height:34px; padding:0.48rem 1rem 0.48rem 2.75rem; font-size:0.74rem; }
    body.tr-preview-mode .tab-icon-slot { width:22px; height:22px; }
    body.tr-preview-mode .tab-icon { width:19px; height:19px; }
    body.tr-preview-mode .prod-main { margin-left:232px; max-width:calc(100vw - 232px); background:#f8f6fb; }
    body.tr-preview-mode .prod-main::before { inset:0 0 0 232px; background-size:520px; opacity:0.025; }
    body.tr-preview-mode .aud-visual-hero.hero-wrap {
      min-height:0 !important;
      height:auto !important;
      padding:1rem 1.45rem 0.9rem;
      border-radius:0;
      background:#fff !important;
      box-shadow:none;
      border-bottom:1px solid rgba(87,46,136,0.1);
    }
    body.tr-preview-mode .page-hierarchy { font-size:0.66rem; gap:0.3rem; color:rgba(87,46,136,0.56); }
    body.tr-preview-mode .page-hierarchy-page { color:#9a4f78; letter-spacing:0.08em; }
    body.tr-preview-mode .page-hierarchy-sep,
    body.tr-preview-mode .page-hierarchy-sub { color:rgba(87,46,136,0.48); }
    body.tr-preview-mode .page-subtitle { margin-top:0.22rem; color:#1a1530; font-size:1.5rem; line-height:1.05; letter-spacing:0; }
    body.tr-preview-mode .tr-content { padding:1rem 1.45rem 1.4rem; }
    body.tr-preview-mode .tr-summary-grid { gap:0.65rem; margin-bottom:0.95rem; grid-template-columns:repeat(3,minmax(0,1fr)); }
    body.tr-preview-mode .tr-tile { border-radius:8px; padding:0.9rem 0.95rem; box-shadow:none; border-color:rgba(87,46,136,0.1); }
    body.tr-preview-mode .tr-tile.green { background:#e8f5ea; }
    body.tr-preview-mode .tr-tile-label { font-size:0.56rem; margin-bottom:0.24rem; letter-spacing:0.08em; }
    body.tr-preview-mode .tr-tile-value { font-size:1.18rem; }
    body.tr-preview-mode .tr-tile-sub { font-size:0.66rem; }
    body.tr-preview-mode .tr-progress { height:4px; }
    body.tr-preview-mode .tr-section-header { margin:0.9rem 0 0.45rem; padding-bottom:0.3rem; font-size:0.58rem; }
    body.tr-preview-mode .tr-budget-table { border-radius:8px; box-shadow:none; }
    body.tr-preview-mode .tr-budget-table th { padding:0.48rem 0.65rem; font-size:0.56rem; }
    body.tr-preview-mode .tr-budget-table td { padding:0.5rem 0.65rem; font-size:0.72rem; }
    body.tr-preview-mode .rpt-summary-bar { border-radius:8px; padding:0.8rem 0.9rem; gap:0.7rem; margin-bottom:0.95rem; }
    body.tr-preview-mode .rpt-summary-stat-label { font-size:0.56rem; }
    body.tr-preview-mode .rpt-summary-stat-value { font-size:0.96rem; }
    .tr-sidebar-standard-links { margin-top:auto; border-top:1px solid rgba(255,255,255,0.1); }
    .tr-sidebar-standard-link {
      min-height:56px;
      width:100%;
      display:flex;
      align-items:center;
      gap:0.72rem;
      padding:0.9rem 1.25rem;
      border:0;
      border-bottom:1px solid rgba(255,255,255,0.1);
      background:transparent;
      color:rgba(255,255,255,0.78);
      text-decoration:none;
      font-family:var(--bts-font,'Inter',sans-serif);
      font-size:0.84rem;
      font-weight:850;
      line-height:1.15;
      text-align:left;
      cursor:pointer;
    }
    .tr-sidebar-standard-link:hover,
    .tr-sidebar-standard-link.active { background:rgba(255,255,255,0.08); color:#fff; }
    .tr-sidebar-standard-link img { width:20px; height:20px; object-fit:contain; filter:brightness(0) invert(1); opacity:0.78; flex-shrink:0; }
    .tr-sidebar-standard-link:hover img,
    .tr-sidebar-standard-link.active img { opacity:1; }
    .tr-sidebar-nested-label { min-height:34px; padding:0.48rem 1rem 0.32rem 2.75rem; color:rgba(255,255,255,0.78); font-size:0.74rem; font-weight:850; line-height:1.15; }
    .tr-sidebar-nested-item { padding-left:3.45rem !important; }
    .tr-sidebar-footer { padding:1rem 1rem 1.05rem; }
    .tr-sidebar-org-logo { min-height:34px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.76rem; font-weight:950; letter-spacing:0.08em; line-height:1.15; text-align:center; text-transform:uppercase; }
    .tr-sidebar-org-logo img { display:block; max-width:150px; max-height:54px; object-fit:contain; }
    .tr-sidebar-forget { display:block; width:100%; margin-top:1.05rem; padding:0; border:0; background:transparent; color:rgba(255,255,255,0.48); font:inherit; font-size:0.72rem; font-weight:800; line-height:1.3; text-align:left; text-decoration:underline; cursor:pointer; }
    .tr-sidebar-forget:hover { color:rgba(255,255,255,0.75); }

    @media (max-width: 860px) {
      .prod-main { margin-left: 0; max-width: 100%; }
      .prod-main::before { inset: 0; }
      .tr-summary-grid { grid-template-columns: 1fr; }
      .rsc-status-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Login overlay -->
<div class="tr-login-overlay" id="tr-login-overlay">
  <div class="tr-login-box">
    <img src="/ASSETS/Images/LogoBrand/logo-long-black.png" alt="Build The Show" class="tr-login-logo" />
    <div class="tr-login-title">Treasurer Portal</div>
    <div class="tr-login-sub">Enter your email and access code to continue.</div>
    <div class="tr-login-field">
      <label>Email</label>
      <input type="email" id="tr-login-email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="tr-login-field">
      <label>Access Code</label>
      <input type="text" id="tr-login-code" placeholder="6-digit code" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
    </div>
    <button class="tr-login-btn" onclick="trLogin()">Sign In</button>
    <div class="tr-login-error" id="tr-login-error"></div>
  </div>
</div>

<!-- Sidebar -->
<div class="prod-sidebar" id="prod-sidebar">
  <div class="sidebar-top">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPA_URL = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
  const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

  let _prodId = '';
  let _prod = null;
  let _org = null;
  let _currentNav = 'fin-dashboard';
  let _previewPerson = null;
  let _rptPaymentRecords = {};
  let _rptHouseholds = [];
  let _rptCastItems = [];
  let _rptSortOrder = 'az';

  function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

  function trVolunteerPasscode(email, productionId) {
    const str = (email || '').toLowerCase().trim() + (productionId || '');
    let h = 0;
    for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
    return String(Math.abs(h) % 900000 + 100000);
  }

  // ── Auth ───────────────────────────────────────────────────────────────────

  async function trLogin() {
    const email = document.getElementById('tr-login-email')?.value?.trim().toLowerCase() || '';
    const code  = document.getElementById('tr-login-code')?.value?.trim() || '';
    const errEl = document.getElementById('tr-login-error');
    if (!email || !code) { errEl.textContent = 'Enter your email and access code.'; return; }
    errEl.textContent = 'Checking...';

    const parts = window.location.pathname.replace(/\/+$/, '').split('/').filter(Boolean);
    const orgAbbrev = parts[0] || '';
    const showSlug  = parts[1] || '';

    try {
      const { data: prodData, error: prodErr } = await sb.rpc('resolve_team_portal', {
        p_org_abbrev: orgAbbrev,
        p_show_slug: showSlug,
      });
      if (prodErr || !prodData) { errEl.textContent = 'Production not found. Check your link.'; return; }
      _prodId = prodData;

      const { data: vol, error: volErr } = await sb
        .from('volunteer_signups')
        .select('id,name,email,role_name,production_id,volunteer_passcode')
        .eq('production_id', _prodId)
        .eq('email', email)
        .eq('role_name', 'Treasurer')
        .in('status', ['approved','checked_in','completed'])
        .maybeSingle();

      const expectedCode = String(vol?.volunteer_passcode || '').trim() || trVolunteerPasscode(email, _prodId);
      if (volErr || !vol || expectedCode !== code) { errEl.textContent = 'That email and code did not match. Contact your production team.'; return; }

      sessionStorage.setItem('bts_treasurer_session', JSON.stringify({ email, code, prodId: _prodId }));
      bootPortal();
    } catch (e) {
      errEl.textContent = 'Something went wrong. Try again.';
      console.error('[Treasurer Portal] login error', e);
    }
  }

  async function trInit() {
    const params = new URLSearchParams(window.location.search);
    const pvwEmail = params.get('pvw_email');
    const pvwCode  = params.get('pvw_code');
    const pvwToken = params.get('pvw_token');
    const pvwEmbed = params.get('pvw_embed') === '1';
    if (pvwEmbed || pvwToken) document.body.classList.add('tr-preview-mode');

    const parts = window.location.pathname.replace(/\/+$/, '').split('/').filter(Boolean);
    const orgAbbrev = parts[0] || '';
    const showSlug  = parts[1] || '';

    if (pvwToken) {
      const key = `bts_portal_preview:${pvwToken}`;
      const legacyKey = `bts_treasurer_preview:${pvwToken}`;
      let preview = null;
      try { preview = JSON.parse(sessionStorage.getItem(key) || localStorage.getItem(key) || sessionStorage.getItem(legacyKey) || localStorage.getItem(legacyKey) || 'null'); } catch (_) {}
      if (preview?.prodId && Date.now() - Number(preview.createdAt || 0) < 10 * 60 * 1000) {
        _prodId = preview.prodId;
        _previewPerson = preview.person || null;
        try { sessionStorage.removeItem(key); } catch (_) {}
        try { localStorage.removeItem(key); } catch (_) {}
        try { sessionStorage.removeItem(legacyKey); } catch (_) {}
        try { localStorage.removeItem(legacyKey); } catch (_) {}
        await bootPortal();
        return;
      }
    }

    if (pvwEmail && pvwCode) {
      document.getElementById('tr-login-email').value = pvwEmail;
      document.getElementById('tr-login-code').value  = pvwCode;
      await trLogin();
      return;
    }

    const saved = sessionStorage.getItem('bts_treasurer_session');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        if (s.email && s.code && s.prodId) {
          _prodId = s.prodId;
          document.getElementById('tr-login-email').value = s.email;
          document.getElementById('tr-login-code').value  = s.code;
          await trLogin();
          return;
        }
      } catch (_) {}
    }
  }

  async function bootPortal() {
    const { data, error } = await sb.from('productions').select('*,organizations(id,name,email,logo_url,logo_white_url,slug)').eq('id', _prodId).single();
    if (error || !data) { document.getElementById('tr-login-error').textContent = 'Could not load production.'; return; }
    _prod = data;
    _org = data.organizations || null;
    renderTreasurerBranding();
    document.getElementById('hdr-title').textContent = _prod.title || 'Production';
    document.getElementById('hdr-sub').textContent = `Welcome back, ${trPortalFirstName()}.`;
    document.getElementById('tr-login-overlay').style.display = 'none';
    document.getElementById('tr-main').style.display = '';
    trNav('fin-dashboard');
  }

  function renderTreasurerBranding() {
    const posterEl = document.getElementById('tr-sidebar-poster');
    if (posterEl) {
      if (_prod?.poster_url) {
        posterEl.innerHTML = `<img src="${esc(_prod.poster_url)}" alt="${esc(_prod.title || 'Production')} poster" />`;
        posterEl.classList.remove('hidden');
      } else {
        posterEl.innerHTML = '';
        posterEl.classList.add('hidden');
      }
    }
    const orgLogoEl = document.getElementById('tr-sidebar-org-logo');
    if (orgLogoEl) {
      const logoUrl = _org?.logo_white_url || _org?.logo_url || '';
      orgLogoEl.innerHTML = logoUrl
        ? `<img src="${esc(logoUrl)}" alt="${esc(_org?.name || 'Organisation')} logo" />`
        : esc(_org?.name || 'Build The Show');
    }
    const volLink = document.getElementById('tr-volunteer-link');
    if (volLink) volLink.href = trVolunteerUrl();
  }

  function trPortalFirstName() {
    const raw = _previewPerson?.name
      || document.getElementById('tr-login-email')?.value
      || _previewPerson?.email
      || 'there';
    const clean = String(raw).trim();
    if (!clean || clean.includes('@')) return 'there';
    return clean.split(/\s+/)[0] || 'there';
  }

  function trVolunteerUrl() {
    const orgSlug = _org?.slug || _prod?.org_slug || '';
    const showSlug = _prod?.slug || '';
    if (orgSlug && showSlug) return `/${encodeURIComponent(orgSlug)}/${encodeURIComponent(showSlug)}/volunteers`;
    const url = new URL('/volunteers', window.location.origin);
    if (_prodId) url.searchParams.set('prod', _prodId);
    return url.pathname + url.search;
  }

  function trForgetDevice() {
    try { sessionStorage.removeItem('bts_treasurer_session'); } catch (_) {}
    window.location.reload();
  }

  // ── Navigation ─────────────────────────────────────────────────────────────

  function trToggleGroup(group) {
    const isFinancials = group === 'financials';
    const wrap = isFinancials ? document.getElementById('group-financials') : document.getElementById(`${group}-wrap`);
    const items = isFinancials ? document.getElementById('group-financials-items') : document.getElementById(`${group}-submenu`);
    if (!wrap || !items) return;
    const open = wrap.classList.toggle('open');
    items.style.display = open ? 'flex' : 'none';
    items.style.flexDirection = 'column';
    const trigger = isFinancials ? wrap.querySelector('.sidebar-group-header') : document.getElementById(`${group}-parent-tab`);
    if (trigger) trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  function trGroupKey(event, group) {
    if (event.key !== 'Enter' && event.key !== ' ') return;
    event.preventDefault();
    trToggleGroup(group);
  }

  function trNav(key) {
    _currentNav = key;
    document.querySelectorAll('.prod-tab, .prod-sub-item, .tr-sidebar-standard-link').forEach(el => el.classList.remove('active'));
    const active = document.getElementById('tnav-' + key.replace('-', '-'));
    if (active) active.classList.add('active');
    const inFinancials = key.startsWith('fin-');
    const financialsGroup = document.getElementById('group-financials');
    const financialsItems = document.getElementById('group-financials-items');
    const financialsTrigger = financialsGroup?.querySelector('.sidebar-group-header');
    if (financialsGroup && financialsItems && inFinancials) {
      financialsGroup.classList.add('open');
      financialsItems.style.display = 'flex';
      financialsItems.style.flexDirection = 'column';
      financialsTrigger?.setAttribute('aria-expanded', 'true');
    }
    const castWrap = document.getElementById('cast-wrap');
    const castSubmenu = document.getElementById('cast-submenu');
    const castParent = document.getElementById('cast-parent-tab');
    if (castWrap && castSubmenu && key === 'reg-status') {
      castWrap.classList.add('open');
      castSubmenu.style.display = 'flex';
      castParent?.classList.add('active');
      castParent?.setAttribute('aria-expanded', 'true');
    }

    const sectionMap = {
      'fin-dashboard':   ['Financials', 'Dashboard'],
      'fin-budgeting':   ['Financials', 'Budgeting'],
      'fin-receipts':    ['Financials', 'Receipts'],
      'fin-reports':     ['Financials', 'Reports'],
      'reg-status':      ['Cast › Registration', 'Status'],
      'contact':         ['Portal', 'Production Contact'],
    };
    const [section, page] = sectionMap[key] || ['', key];
    document.getElementById('tr-hero-section').textContent = section;
    document.getElementById('tr-hero-title').textContent   = page;
    document.getElementById('tr-hero-prod').textContent    = _prod?.title || 'Production';

    if (key === 'fin-dashboard') loadFinDashboard();
    if (key === 'fin-budgeting') loadFinBudgeting();
    if (key === 'fin-receipts')  loadFinReceipts();
    if (key === 'fin-reports')   loadFinReports();
    if (key === 'reg-status')    loadRegStatus();
    if (key === 'contact')       loadProductionContact();
  }

  // ── Portal: Production Contact ─────────────────────────────────────────────

  function loadProductionContact() {
    const contactName = _prod?.producer_name || _prod?.producer || _org?.name || 'Production Team';
    const contactEmail = _prod?.producer_email || _org?.email || '';
    const rows = [
      ['Production', esc(_prod?.title || 'Production')],
      ['Contact', esc(contactName)],
      contactEmail ? ['Email', `<a href="mailto:${esc(contactEmail)}" style="color:#572e88;font-weight:900;text-decoration:none;">${esc(contactEmail)}</a>`] : null,
    ].filter(Boolean);
    const html = `<div class="tr-section-header">Production Contact</div>
      <table class="tr-budget-table"><tbody>
        ${rows.map(([label, value]) => `<tr><th style="width:180px">${esc(label)}</th><td>${value}</td></tr>`).join('')}
        ${!contactEmail ? `<tr><td colspan="2" style="color:rgba(87,46,136,0.45);font-style:italic;">No production contact email is connected yet.</td></tr>` : ''}
      </tbody></table>`;
    setContent(html);
  }

  // ── Financials ─────────────────────────────────────────────────────────────

  function trMoney(cents) {
    return '$' + ((Number(cents) || 0) / 100).toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  async function trLoadBudgetData() {
    const [cRes, iRes, rRes] = await Promise.all([
      sb.from('budget_categories').select('*').eq('production_id', _prodId).order('sort_order'),
      sb.from('budget_items').select('*').eq('production_id', _prodId).order('created_at', { ascending: false }),
      sb.from('budget_receipts').select('*').eq('production_id', _prodId).order('receipt_date', { ascending: false }),
    ]);
    return {
      cats: cRes.data || [],
      items: iRes.data || [],
      receipts: rRes.data || [],
    };
  }

  async function loadFinDashboard() {
    setContent('<p style="color:rgba(87,46,136,0.45);font-size:0.85rem;">Loading...</p>');
    const { cats, items, receipts } = await trLoadBudgetData();
    const planned = cats.reduce((sum, cat) => sum + (Number(cat.planned_cents) || 0), 0);
    const committed = items.reduce((sum, item) => sum + (Number(item.committed_cents) || 0), 0);
    const approvedReceipts = receipts.filter(r => r.status === 'approved' || r.status === 'paid');
    const spent = approvedReceipts.reduce((sum, r) => sum + (Number(r.amount_cents) || 0), 0);
    const remaining = Math.max(0, planned - Math.max(committed, spent));
    const pendingReceipts = receipts.filter(r => !['approved', 'paid', 'rejected'].includes(String(r.status || '').toLowerCase()));

    setContent(`
      <div class="tr-summary-grid">
        <div class="tr-tile green"><div class="tr-tile-label">Budget Remaining</div><div class="tr-tile-value">${trMoney(remaining)}</div><div class="tr-tile-sub">${planned ? 'Against planned budget' : 'No budget created yet'}</div></div>
        <div class="tr-tile"><div class="tr-tile-label">Committed</div><div class="tr-tile-value">${trMoney(committed)}</div><div class="tr-tile-sub">${items.length} budget ${items.length === 1 ? 'item' : 'items'}</div></div>
        <div class="tr-tile orange"><div class="tr-tile-label">Receipts</div><div class="tr-tile-value">${receipts.length}</div><div class="tr-tile-sub">${pendingReceipts.length} pending review</div></div>
      </div>
      <div class="tr-section-header">Needs Attention</div>
      <table class="tr-budget-table"><tbody>
        ${pendingReceipts.length ? pendingReceipts.slice(0, 8).map(r => `<tr><td>${esc(r.description || r.vendor || 'Receipt')}</td><td>${esc(r.submitted_by || 'Unknown')}</td><td class="num">${trMoney(r.amount_cents)}</td><td>${esc(r.status || 'Pending')}</td></tr>`).join('') : '<tr><td style="color:rgba(87,46,136,0.45);font-style:italic;text-align:center">Everything looks good right now.</td></tr>'}
      </tbody></table>
    `);
  }

  async function loadFinBudgeting() {
    setContent('<p style="color:rgba(87,46,136,0.45);font-size:0.85rem;">Loading...</p>');
    const { cats, items, receipts } = await trLoadBudgetData();
    const spentByCat = receipts
      .filter(r => r.status === 'approved' || r.status === 'paid')
      .reduce((map, r) => {
        const key = String(r.category_id || '');
        map[key] = (map[key] || 0) + (Number(r.amount_cents) || 0);
        return map;
      }, {});
    const committedByCat = items.reduce((map, item) => {
      const key = String(item.category_id || '');
      map[key] = (map[key] || 0) + (Number(item.committed_cents) || 0);
      return map;
    }, {});

    let html = `<table class="tr-budget-table"><thead><tr><th>Category</th><th class="num">Planned</th><th class="num">Committed</th><th class="num">Spent</th><th class="num">Remaining</th></tr></thead><tbody>`;
    cats.forEach(cat => {
      const planned = Number(cat.planned_cents) || 0;
      const committed = committedByCat[String(cat.id)] || 0;
      const spent = spentByCat[String(cat.id)] || 0;
      const remaining = planned - Math.max(committed, spent);
      html += `<tr>
        <td>${esc(cat.name || '—')}</td>
        <td class="num">${trMoney(planned)}</td>
        <td class="num">${trMoney(committed)}</td>
        <td class="num">${trMoney(spent)}</td>
        <td class="num ${remaining < 0 ? 'over' : 'ok'}">${trMoney(remaining)}</td>
      </tr>`;
    });
    if (!cats.length) html += `<tr><td colspan="5" style="color:rgba(87,46,136,0.4);font-style:italic;text-align:center">No budget categories yet</td></tr>`;
    html += `</tbody></table>`;
    setContent(html);
  }

  async function loadFinReceipts() {
    setContent('<p style="color:rgba(87,46,136,0.45);font-size:0.85rem;">Loading...</p>');
    const { cats, receipts } = await trLoadBudgetData();
    let html = `<table class="tr-budget-table"><thead><tr><th>Receipt</th><th>Category</th><th>Submitted By</th><th>Status</th><th class="num">Amount</th></tr></thead><tbody>`;
    receipts.forEach(r => {
      const cat = cats.find(c => String(c.id) === String(r.category_id));
      html += `<tr>
        <td>${esc(r.description || r.vendor || '—')}</td>
        <td>${esc(cat?.name || '—')}</td>
        <td>${esc(r.submitted_by || '—')}</td>
        <td>${esc(r.status || 'Pending')}</td>
        <td class="num">${trMoney(r.amount_cents)}</td>
      </tr>`;
    });
    if (!receipts.length) html += `<tr><td colspan="5" style="color:rgba(87,46,136,0.4);font-style:italic;text-align:center">No receipts yet</td></tr>`;
    html += `</tbody></table>`;
    setContent(html);
  }

  async function loadFinReports() {
    setContent('<p style="color:rgba(87,46,136,0.45);font-size:0.85rem;">Loading...</p>');
    const { cats, items } = await trLoadBudgetData();

    let html = `<table class="tr-budget-table"><thead><tr><th>Item</th><th>Category</th><th class="num">Committed</th><th>Notes</th></tr></thead><tbody>`;
    items.forEach(item => {
      const cat = cats.find(c => c.id === item.category_id);
      html += `<tr>
        <td>${esc(item.description || '—')}</td>
        <td>${esc(cat?.name || '—')}</td>
        <td class="num">${esc(trMoney(item.committed_cents || 0))}</td>
        <td style="font-size:0.72rem;color:rgba(26,21,48,0.5)">${esc(item.notes || '')}</td>
      </tr>`;
    });
    if (!items.length) html += `<tr><td colspan="4" style="color:rgba(87,46,136,0.4);font-style:italic;text-align:center">No budget items yet</td></tr>`;
    html += `</tbody></table>`;
    setContent(html);
  }

  // ── Registration Status ────────────────────────────────────────────────────

  async function loadRegStatus() {
    setContent('<p style="color:rgba(87,46,136,0.45);font-size:0.85rem;">Loading...</p>');
    const [assignRes, payRes, prodRes] = await Promise.all([
      sb.from('casting_assignments').select('*').eq('production_id', _prodId).eq('state', 'offer_accepted'),
      sb.from('registration_payment_records').select('*').eq('production_id', _prodId),
      sb.from('productions').select('registration_settings,registration_households').eq('id', _prodId).single(),
    ]);
    const assignments = assignRes.data || [];
    const payments    = payRes.data || [];
    const prodData    = prodRes.data || {};
    const settings = prodData?.registration_settings || {};

    const applicantIds = [...new Set(assignments.map(a => a.applicant_id).filter(Boolean).map(String))];
    const [appRes, bookingRes] = applicantIds.length ? await Promise.all([
      sb.from('audition_applications').select('*').in('id', applicantIds),
      sb.from('audition_bookings').select('*').in('id', applicantIds),
    ]) : [{ data: [] }, { data: [] }];

    _rptPaymentRecords = {};
    payments.forEach(r => {
      const id = String(r.casting_assignment_id || r.assignment_id || '');
      if (!id) return;
      if (!_rptPaymentRecords[id]) _rptPaymentRecords[id] = [];
      _rptPaymentRecords[id].push(r);
    });

    _rptHouseholds = (Array.isArray(prodData.registration_households) ? prodData.registration_households : []).map(h => ({
      id: String(h.id || ''),
      name: h.family_name || h.name || '',
      member_ids: (h.member_ids || h.member_assignment_ids || []).map(String),
    })).filter(h => h.id && h.member_ids.length);

    const applicantMap = {};
    (bookingRes.data || []).forEach(b => { applicantMap[String(b.id)] = b; });
    (appRes.data || []).forEach(a => { applicantMap[String(a.id)] = a; });

    const seenApplicants = new Set();
    _rptCastItems = assignments.reduce((acc, a) => {
      const appId = String(a.applicant_id || '');
      if (!appId || seenApplicants.has(appId)) return acc;
      const app = applicantMap[appId] || {};
      seenApplicants.add(appId);
      acc.push({ assignment: a, app });
      return acc;
    }, []);

    const paySettings = settings?.payment_settings || settings || {};
    const modeSettings = {
      mode: paySettings.payment_mode || paySettings.mode || 'none',
      flat_fee: paySettings.flat_fee || '',
      installment_1_amount: paySettings.installment_1_amount || '',
      installment_1_due: paySettings.installment_1_due || '',
      installment_2_amount: paySettings.installment_2_amount || '',
      installment_2_due: paySettings.installment_2_due || '',
      installment_1_label: paySettings.installment_1_label || '',
      installment_2_label: paySettings.installment_2_label || '',
      currency: paySettings.currency || 'CAD',
      sibling_discount_enabled: paySettings.sibling_discount_enabled || false,
      sibling_first_child: paySettings.sibling_first_child || '',
      sibling_additional: paySettings.sibling_additional || '',
      volunteer_discount_enabled: paySettings.volunteer_discount_enabled || false,
      volunteer_hours: paySettings.volunteer_hours || '',
      volunteer_discount: paySettings.volunteer_discount || '',
    };

    let totalDue = 0, totalPaid = 0;
    _rptCastItems.forEach(item => {
      const ef = rptEffectiveFee(item, modeSettings);
      const paidAmt = ((_rptPaymentRecords[String(item.assignment?.id)] || [])
        .filter(r => r.paid)
        .reduce((s, r) => s + (ef.installments[r.installment_index]?.amount || 0), 0));
      totalDue  += ef.total;
      totalPaid += paidAmt;
    });

    const sym = { CAD: '$', USD: '$', GBP: '£' }[modeSettings.currency] || '$';
    let html = `<div class="rpt-summary-bar">
      <div class="rpt-summary-stat"><div class="rpt-summary-stat-label">Cast</div><div class="rpt-summary-stat-value">${_rptCastItems.length}</div></div>
      <div class="rpt-summary-divider"></div>
      <div class="rpt-summary-stat"><div class="rpt-summary-stat-label">Total Due</div><div class="rpt-summary-stat-value">${sym}${Math.round(totalDue).toLocaleString('en-CA')}</div></div>
      <div class="rpt-summary-divider"></div>
      <div class="rpt-summary-stat"><div class="rpt-summary-stat-label">Collected</div><div class="rpt-summary-stat-value">${sym}${Math.round(totalPaid).toLocaleString('en-CA')}</div></div>
      <div class="rpt-summary-divider"></div>
      <div class="rpt-summary-stat"><div class="rpt-summary-stat-label">Outstanding</div><div class="rpt-summary-stat-value" style="color:#d1523d">${sym}${Math.round(Math.max(0, totalDue - totalPaid)).toLocaleString('en-CA')}</div></div>
    </div>`;

    html += rptBuildGridHtml(_rptCastItems, modeSettings);
    setContent(html);
  }

  // ── Registration rendering helpers ─────────────────────────────────────────

  function rptHouseholdFor(assignmentId) {
    return _rptHouseholds.find(h => (h.member_ids || []).includes(String(assignmentId))) || null;
  }

  function rptFormatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
    return isNaN(d) ? '' : d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function registrationPaymentCurrency(settings) { return settings?.currency || 'CAD'; }

  function registrationFormatPaymentAmount(amount, settings) {
    const sym = { CAD: '$', USD: '$', GBP: '£' }[registrationPaymentCurrency(settings)] || '$';
    return `${sym}${Number(amount || 0).toFixed(2)}`;
  }

  function rptGetInstallments(settings) {
    if (settings.mode === 'flat') {
      const amt = parseFloat(String(settings.flat_fee || '').replace(/[^0-9.]/g, '')) || 0;
      return [{ amount: amt, label: 'Payment', dueDate: '' }];
    }
    if (settings.mode === 'split') {
      const i1 = parseFloat(String(settings.installment_1_amount || '').replace(/[^0-9.]/g, '')) || 0;
      const i2 = parseFloat(String(settings.installment_2_amount || '').replace(/[^0-9.]/g, '')) || 0;
      return [
        { amount: i1, label: settings.installment_1_label || 'First Payment',  dueDate: settings.installment_1_due || '' },
        { amount: i2, label: settings.installment_2_label || 'Final Payment',  dueDate: settings.installment_2_due || '' },
      ].filter(i => i.amount > 0);
    }
    return [];
  }

  function rptScaleInstallments(base, total) {
    const baseTotal = base.reduce((s, i) => s + i.amount, 0);
    if (!baseTotal || baseTotal === total) return base;
    return base.map(i => ({ ...i, amount: Math.round((i.amount / baseTotal) * total * 100) / 100 }));
  }

  function rscVolunteerDiscountEarned(assignment = {}, settings = {}) {
    if (assignment.volunteer_discount_approved) return true;
    const required = parseFloat(String(settings.volunteer_hours || '').replace(/[^0-9.]/g, '')) || 0;
    if (!required) return false;
    const completed = parseFloat(String(assignment.volunteer_hours_completed || '').replace(/[^0-9.]/g, '')) || 0;
    return completed >= required;
  }

  function rptEffectiveFee(item, settings) {
    const assignId = String(item.assignment?.id || '');
    const household = rptHouseholdFor(assignId);
    const base = rptGetInstallments(settings);
    const baseTotal = base.reduce((s, i) => s + i.amount, 0);
    const householdMemberIds = household ? (household.member_ids || []).map(String) : [];
    const householdPos = household ? householdMemberIds.indexOf(assignId) : -1;
    let effectiveBase = baseTotal;
    const parts = [];
    if (settings.sibling_discount_enabled && household) {
      const rate = householdPos === 0
        ? parseFloat(String(settings.sibling_first_child || '').replace(/[^0-9.]/g, '')) || 0
        : parseFloat(String(settings.sibling_additional || '').replace(/[^0-9.]/g, '')) || 0;
      if (rate > 0) { effectiveBase = rate; parts.push('Sibling rate'); }
    }
    let volAdj = 0;
    const volunteerApplies = rscVolunteerDiscountEarned(item.assignment, settings);
    if (settings.volunteer_discount_enabled && volunteerApplies) {
      volAdj = parseFloat(String(settings.volunteer_discount || '').replace(/[^0-9.]/g, '')) || 0;
    }
    let schAdj = 0;
    if (item.assignment?.scholarship_status === 'approved') {
      schAdj = parseFloat(String(item.assignment?.scholarship_amount || '').replace(/[^0-9.]/g, '')) || 0;
    }
    const total = Math.max(0, effectiveBase - volAdj - schAdj);
    const adjustments = [];
    if (effectiveBase !== baseTotal) {
      const pct = baseTotal > 0 ? Math.round((1 - effectiveBase / baseTotal) * 100) : 0;
      adjustments.push({ type: 'sibling', label: 'Sibling Rate', value: effectiveBase, isRate: true, pct });
    }
    if (volAdj) adjustments.push({ type: 'volunteer', label: 'Volunteer Discount', deduct: volAdj, hours: String(settings.volunteer_hours || '') });
    if (schAdj) adjustments.push({ type: 'scholarship', label: 'Scholarship', deduct: schAdj });
    return { installments: rptScaleInstallments(base, total), total, baseTotal, adjustments };
  }

  function rscMoneyShort(amount, settings) {
    const n = Number(amount || 0);
    const sym = { CAD: '$', USD: '$', GBP: '£' }[registrationPaymentCurrency(settings)] || '$';
    return `${sym}${Number.isFinite(n) ? (n % 1 === 0 ? String(Math.round(n)) : n.toFixed(2)) : '0'}`;
  }

  function rscPersonInitials(name = '') {
    const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
    return (parts[0]?.[0] || '?') + (parts.length > 1 ? parts[parts.length - 1][0] : '');
  }

  function rptPersonName(app = {}) {
    return app.name || app.child_name || app.performer_name || app.student_name || [app.first_name, app.last_name].filter(Boolean).join(' ') || 'Unknown';
  }

  function rptPersonEmail(app = {}) {
    return app.email || app.parent_email || app.guardian_email || app.contact_email || '';
  }

  async function trTogglePaid(assignmentId, installmentIndex, currentlyPaid) {
    const btn = document.getElementById(`rsc-inst-${assignmentId}-${installmentIndex}`);
    if (btn) { btn.disabled = true; btn.style.opacity = '0.55'; }
    const newPaid = !currentlyPaid;
    try {
      const { error } = await sb.from('registration_payment_records')
        .upsert({
          production_id: _prodId,
          casting_assignment_id: assignmentId,
          installment_index: installmentIndex,
          paid: newPaid,
          paid_at: newPaid ? new Date().toISOString() : null,
          updated_at: new Date().toISOString(),
        }, { onConflict: 'casting_assignment_id,installment_index' });
      if (error) throw error;
      await loadRegStatus();
    } catch (err) {
      console.error('[Treasurer Portal] payment update failed', err);
      alert('Could not update payment. Try again.');
      if (btn) { btn.disabled = false; btn.style.opacity = ''; }
    }
  }

  async function trLogHouseholdInstallment(householdId, installmentIndex) {
    const hh = _rptHouseholds.find(h => String(h.id) === String(householdId));
    if (!hh) return;
    const btn = document.getElementById(`rsc-hh-inst-${householdId}-${installmentIndex}`);
    if (btn) { btn.disabled = true; btn.style.opacity = '0.55'; }
    try {
      await Promise.all((hh.member_ids || []).map(async memberId => {
        const existing = (_rptPaymentRecords[String(memberId)] || [])
          .find(r => Number(r.installment_index) === Number(installmentIndex));
        if (existing?.paid) return;
        const { error } = await sb.from('registration_payment_records')
          .upsert({
            production_id: _prodId,
            casting_assignment_id: memberId,
            installment_index: installmentIndex,
            paid: true,
            paid_at: new Date().toISOString(),
            updated_at: new Date().toISOString(),
          }, { onConflict: 'casting_assignment_id,installment_index' });
        if (error) throw error;
      }));
      await loadRegStatus();
    } catch (err) {
      console.error('[Treasurer Portal] household payment update failed', err);
      alert('Could not update household payment. Try again.');
      if (btn) { btn.disabled = false; btn.style.opacity = ''; }
    }
  }

  function rscPaymentCellHtml(primaryItem, settings, items, household) {
    items = Array.isArray(items) ? items : [primaryItem];
    const sym = { CAD: '$', USD: '$', GBP: '£' }[registrationPaymentCurrency(settings)] || '$';
    const fmt = n => `${sym}${Number.isFinite(Number(n)) ? Math.round(Number(n)) : 0}`;

    function buildStmtHtml({ totalFee, totalPaid, balance, allPaid, stateClass, statusLabel, feeBreakdownHtml, ledgerHtml, cardsHtml }) {
      return `<div class="rsc-stmt-status-bar ${stateClass}">${esc(statusLabel)}</div>
      <div class="rsc-stmt-block">
        <div class="rsc-stmt-block-label">Fee</div>
        ${feeBreakdownHtml}
      </div>
      <div class="rsc-stmt-block">
        <div class="rsc-stmt-block-label">Payments</div>
        ${ledgerHtml}
        <div class="rsc-stmt-row rsc-stmt-balance ${stateClass}">
          <span>Balance</span><span>${esc(fmt(balance))}</span>
        </div>
      </div>
      ${cardsHtml?.trim() ? `<div class="rsc-inst-row">${cardsHtml}</div>` : ''}`;
    }

    function feeBreakdown(ef) {
      const hasAdj = (ef.adjustments || []).length > 0;
      let html = `<div class="rsc-stmt-row"><span>Production Fee</span><span>${esc(fmt(ef.baseTotal))}</span></div>`;
      (ef.adjustments || []).forEach(adj => {
        if (adj.type === 'sibling') {
          const saving = ef.baseTotal - adj.value;
          html += `<div class="rsc-stmt-row rsc-stmt-deduct rsc-stmt-member-line"><span>Sibling Discount (${esc(fmt(saving))} off)</span><span>-${esc(fmt(saving))}</span></div>`;
        } else if (adj.type === 'volunteer') {
          const hrsLabel = adj.hours ? ` (${adj.hours} hrs)` : '';
          html += `<div class="rsc-stmt-row rsc-stmt-deduct rsc-stmt-member-line"><span>Volunteer Discount${esc(hrsLabel)}</span><span>-${esc(fmt(adj.deduct))}</span></div>`;
        } else if (adj.type === 'scholarship') {
          html += `<div class="rsc-stmt-row rsc-stmt-deduct rsc-stmt-member-line"><span>Scholarship</span><span>-${esc(fmt(adj.deduct))}</span></div>`;
        }
      });
      if (hasAdj) html += `<div class="rsc-stmt-row rsc-stmt-total"><span>Total Due</span><span>${esc(fmt(ef.total))}</span></div>`;
      return html;
    }

    if (household && items.length > 1) {
      const data = items.map(item => {
        const id = String(item.assignment?.id || '');
        const ef = rptEffectiveFee(item, settings);
        const records = _rptPaymentRecords[id] || [];
        const paid = records.filter(r => r.paid).reduce((sum, r) => sum + (ef.installments[r.installment_index]?.amount || 0), 0);
        return { item, id, ef, records, paid };
      });
      if (!(settings.mode === 'flat' || settings.mode === 'split') || !data.some(d => d.ef.total > 0))
        return `<div class="rsc-stmt-empty">No fee configured.</div>`;
      const totalFee  = data.reduce((s, d) => s + d.ef.baseTotal, 0);
      const totalPaid = data.reduce((s, d) => s + d.paid, 0);
      const balance   = Math.max(0, data.reduce((s, d) => s + d.ef.total, 0) - totalPaid);
      const allPaid   = balance === 0 && totalPaid > 0;
      const stateClass = allPaid ? 'full' : totalPaid > 0 ? 'partial' : 'unpaid';
      const statusLabel = allPaid ? 'Paid in Full' : totalPaid > 0 ? 'Partially Paid' : 'Unpaid';
      const feeLines = data.map(d => {
        const firstName = rptPersonName(d.item.app || {}).trim().split(/\s+/)[0].toUpperCase() || 'MEMBER';
        return `<div class="rsc-stmt-row"><span>Production Fee &ndash; ${esc(firstName)}</span><span>${esc(fmt(d.ef.baseTotal))}</span></div>`;
      }).join('');
      const allAdj = [];
      data.forEach(d => (d.ef.adjustments || []).forEach(adj => {
        if (!allAdj.find(a => a.type === adj.type)) allAdj.push({ ...adj, baseTotal: d.ef.baseTotal });
      }));
      const discountLines = allAdj.map(adj => {
        if (adj.type === 'sibling') {
          const saving = adj.baseTotal - adj.value;
          return `<div class="rsc-stmt-row rsc-stmt-deduct"><span>Sibling Discount (${esc(fmt(saving))} off)</span><span>-${esc(fmt(saving))}</span></div>`;
        } else if (adj.type === 'volunteer') {
          const hrsLabel = adj.hours ? ` (${adj.hours} hrs)` : '';
          return `<div class="rsc-stmt-row rsc-stmt-deduct"><span>Volunteer Discount${esc(hrsLabel)}</span><span>-${esc(fmt(adj.deduct))}</span></div>`;
        } else if (adj.type === 'scholarship') {
          return `<div class="rsc-stmt-row rsc-stmt-deduct"><span>Scholarship</span><span>-${esc(fmt(adj.deduct))}</span></div>`;
        }
        return '';
      }).join('');
      const hhTotalFee = data.reduce((s, d) => s + d.ef.total, 0);
      const feeBreakdownHtml = feeLines + discountLines + `<div class="rsc-stmt-row rsc-stmt-total rsc-stmt-hh-total"><span>Total Due</span><span>${esc(fmt(hhTotalFee))}</span></div>`;
      const allRecords = data.flatMap(d => d.records.filter(r => r.paid).map(r => ({ paid_at: r.paid_at, amount: d.ef.installments[r.installment_index]?.amount || 0 })));
      allRecords.sort((a, b) => new Date(a.paid_at || 0) - new Date(b.paid_at || 0));
      const ledgerHtml = allRecords.length
        ? allRecords.map(r => `<div class="rsc-stmt-row rsc-stmt-paid-row"><span>${esc(rptFormatDate(r.paid_at))}</span><span>${esc(fmt(r.amount))}</span></div>`).join('')
        : `<div class="rsc-stmt-row rsc-stmt-none">No payments yet</div>`;
      const maxInst = Math.max(0, ...data.map(d => d.ef.installments.length));
      const cardsHtml = Array.from({ length: maxInst }, (_, idx) => {
        const parts2 = data.map(d => { const inst = d.ef.installments[idx]; if (!inst || inst.amount <= 0) return null; const rec = d.records.find(r => r.installment_index === idx); return { inst, rec, isPaid: !!rec?.paid }; }).filter(Boolean);
        if (!parts2.length) return '';
        const isPaid = parts2.every(p => p.isPaid);
        const firstDue = parts2.find(p => p.inst.dueDate)?.inst.dueDate || '';
        const isOverdue = !isPaid && firstDue && new Date(firstDue) < new Date(new Date().toDateString());
        const label = (parts2[0].inst.label || '').replace(/\s*\(.*\)$/, '') || `Payment ${idx + 1}`;
        const sub = isPaid ? 'Paid' : (firstDue ? `Due ${rptFormatDate(firstDue)}` : 'Due date not set');
        return `<button type="button" class="rsc-inst-card ${isPaid ? 'paid' : isOverdue ? 'overdue' : ''}" id="rsc-hh-inst-${esc(household.id)}-${idx}" ${isPaid ? 'disabled' : `onclick="trLogHouseholdInstallment('${esc(household.id)}',${idx})"`}>
          <div class="rsc-inst-label">${esc(label)}</div>
          <div class="rsc-inst-sub">${esc(sub)}${isPaid ? '' : ' · click to mark received'}</div>
        </button>`;
      }).join('');
      return buildStmtHtml({ totalFee: hhTotalFee, totalPaid, balance, allPaid, stateClass, statusLabel, feeBreakdownHtml, ledgerHtml, cardsHtml });
    }

    const item = primaryItem || {};
    const assignId = String(item.assignment?.id || '');
    const ef = rptEffectiveFee(item, settings);
    const records = _rptPaymentRecords[assignId] || [];
    const hasFee = (settings.mode === 'flat' || settings.mode === 'split') && ef.total > 0;
    if (!hasFee) return `<div class="rsc-stmt-empty">No fee configured.</div>`;
    const paidAmt = records.filter(r => r.paid).reduce((s, r) => s + (ef.installments[r.installment_index]?.amount || 0), 0);
    const balance = Math.max(0, ef.total - paidAmt);
    const allPaid = balance === 0 && paidAmt > 0;
    const stateClass = allPaid ? 'full' : paidAmt > 0 ? 'partial' : 'unpaid';
    const statusLabel = allPaid ? 'Paid in Full' : paidAmt > 0 ? 'Partially Paid' : 'Unpaid';
    const paidRecords = ef.installments.map((inst, idx) => { const rec = records.find(r => r.installment_index === idx && r.paid); return rec ? { paid_at: rec.paid_at, amount: inst.amount } : null; }).filter(Boolean);
    paidRecords.sort((a, b) => new Date(a.paid_at || 0) - new Date(b.paid_at || 0));
    const ledgerHtml = paidRecords.length
      ? paidRecords.map(r => `<div class="rsc-stmt-row rsc-stmt-paid-row"><span>${esc(rptFormatDate(r.paid_at))}</span><span>${esc(fmt(r.amount))}</span></div>`).join('')
      : `<div class="rsc-stmt-row rsc-stmt-none">No payments yet</div>`;
    const cardsHtml = ef.installments.map((inst, idx) => {
      const rec = records.find(r => r.installment_index === idx);
      const isPaid = !!rec?.paid;
      const label = (inst.label || '').replace(/\s*\(.*\)$/, '') || (ef.installments.length === 1 ? 'Payment' : `Payment ${idx + 1}`);
      const sub = isPaid ? `Paid ${rptFormatDate(rec.paid_at) || ''}`.trim() : (inst.dueDate ? `Due ${rptFormatDate(inst.dueDate)}` : 'Due date not set');
      const isOverdue = !isPaid && inst.dueDate && new Date(inst.dueDate) < new Date(new Date().toDateString());
      return `<button type="button" class="rsc-inst-card ${isPaid ? 'paid' : isOverdue ? 'overdue' : ''}" id="rsc-inst-${esc(assignId)}-${idx}" onclick="trTogglePaid('${esc(assignId)}',${idx},${isPaid ? 'true' : 'false'})">
        <div class="rsc-inst-label">${esc(label)}</div>
        <div class="rsc-inst-sub">${esc(sub)}${isPaid ? ' · click to undo' : ' · click to mark received'}</div>
      </button>`;
    }).join('');
    return buildStmtHtml({ totalFee: ef.total, totalPaid: paidAmt, balance, allPaid, stateClass, statusLabel, feeBreakdownHtml: feeBreakdown(ef), ledgerHtml, cardsHtml });
  }

  function rscConnectionsCellHtml(item, settings, household) {
    const app = item.app || {};
    const assignment = item.assignment || {};
    const familyRequested = !!(app.registration_answers?.['__bts_registration_household_requested'] || app.registration_answers?.['pf_sibling_discount']);
    const volApproved = rscVolunteerDiscountEarned(assignment, settings);
    const volRequested = !!(app.registration_answers?.['pf_volunteer_discount'] || app.registration_answers?.['__bts_registration_volunteer_discount_requested']);
    const schRequested = !!(app.registration_answers?.['pf_scholarship_request'] || app.registration_answers?.['__bts_registration_scholarship_requested']);
    const schStatus = String(assignment.scholarship_status || (schRequested ? 'requested' : 'none'));
    const hhChipLabel = household ? (household.name || 'Connected') : familyRequested ? 'Review' : 'Add';
    const hhChipClass = household ? 'ok' : familyRequested ? 'warn' : 'muted';
    const volLabel = volApproved ? 'Approved' : volRequested ? 'Interested' : 'No';
    const volClass = volApproved ? 'ok' : volRequested ? 'info' : 'muted';
    const schLabel = { none: 'No', requested: 'Requested', approved: 'Yes', declined: 'Declined' }[schStatus] || schStatus;
    const schClass = schStatus === 'approved' ? 'ok' : schStatus === 'requested' ? 'warn' : 'muted';
    return `<div class="rsc-connect-list">
      <div class="rsc-connect-item">
        <div><img class="rsc-connect-svg-icon" src="/ASSETS/Images/Icons/household-yes.svg" alt="" /></div>
        <span class="rsc-connect-title">Household</span>
        <span class="rsc-connect-chip ${hhChipClass}">${esc(hhChipLabel)}</span>
      </div>
      <div class="rsc-connect-item">
        <div><img class="rsc-connect-svg-icon" src="/ASSETS/Images/Icons/volunteer-not-interested.svg" alt="" /></div>
        <span class="rsc-connect-title">Volunteer</span>
        <span class="rsc-connect-chip ${volClass}">${esc(volLabel)}</span>
      </div>
      <div class="rsc-connect-item">
        <div><img class="rsc-connect-svg-icon" src="/ASSETS/Images/Icons/scolarships-no.svg" alt="" /></div>
        <span class="rsc-connect-title">Scholarship</span>
        <span class="rsc-connect-chip ${schClass}">${esc(schLabel)}</span>
      </div>
    </div>`;
  }

  function rptLastName(name) {
    const parts = String(name || '').trim().split(/\s+/);
    return (parts.length > 1 ? parts[parts.length - 1] : parts[0] || '').toLowerCase();
  }

  function rptSortKey(item) {
    const assignId = String(item.assignment?.id || '');
    const hh = rptHouseholdFor(assignId);
    return hh ? rptLastName(hh.name) : rptLastName(rptPersonName(item.app || {}));
  }

  function rptBuildGridHtml(items, settings) {
    const sorted = [...items].sort((a, b) => {
      const ka = rptSortKey(a), kb = rptSortKey(b);
      return _rptSortOrder === 'az' ? ka.localeCompare(kb) : kb.localeCompare(ka);
    });

    const assignedToHousehold = new Set();
    const groups = [];
    _rptHouseholds.forEach(hh => {
      const members = hh.member_ids.map(mid => sorted.find(i => String(i.assignment?.id) === mid)).filter(Boolean);
      if (members.length > 1) {
        members.forEach(m => assignedToHousehold.add(String(m.assignment?.id)));
        groups.push({ hh, members });
      }
    });
    groups.sort((a, b) => rptLastName(a.hh.name).localeCompare(rptLastName(b.hh.name)));
    const ungrouped = sorted.filter(i => !assignedToHousehold.has(String(i.assignment?.id)));

    let html = '';
    groups.forEach(({ hh, members }) => {
      const payHtml = rscPaymentCellHtml(members[0], settings, members, hh);
      const connHtml = rscConnectionsCellHtml(members[0], settings, hh);
      html += `<div class="rsc-hh-group">
        <div class="rsc-hh-group-header">
          <img class="rsc-hh-group-icon" src="/ASSETS/Images/Icons/household-yes.svg" alt="" />
          <span class="rsc-hh-group-name">${esc(hh.name)}</span>
          <span class="rsc-hh-group-membercount">${members.length} members</span>
        </div>
        <div class="rsc-status-row">
          <div class="rsc-status-cell">
            <div class="rsc-col-header">Cast Members</div>
            ${members.map(m => {
              const name = rptPersonName(m.app || {});
              return `<div class="rsc-cast-initials" style="width:40px;height:40px;font-size:0.8rem;border-radius:7px;margin-bottom:0.3rem">${esc(rscPersonInitials(name))}</div>
              <div style="font-size:0.85rem;font-weight:950;color:#1a1530">${esc(name)}</div>`;
            }).join('')}
          </div>
          <div class="rsc-status-cell">${payHtml}</div>
          <div class="rsc-status-cell">${connHtml}</div>
          <div class="rsc-status-cell"></div>
        </div>
      </div>`;
    });

    if (ungrouped.length && groups.length) {
      html += `<div class="rsc-hh-ungrouped-divider">Individual Cast</div>`;
    }
    ungrouped.forEach(item => {
      const assignId = String(item.assignment?.id || '');
      const name = rptPersonName(item.app || {});
      const payHtml  = rscPaymentCellHtml(item, settings);
      const connHtml = rscConnectionsCellHtml(item, settings, null);
      html += `<div class="rsc-status-row" id="rpt-row-${esc(assignId)}">
        <div class="rsc-status-cell">
          <div class="rsc-cast-cell">
            <div class="rsc-cast-initials">${esc(rscPersonInitials(name))}</div>
            <div>
              <div class="rsc-cast-name">${esc(name)}</div>
              <div class="rsc-cast-email">${esc(rptPersonEmail(item.app || {}))}</div>
            </div>
          </div>
        </div>
        <div class="rsc-status-cell">${payHtml}</div>
        <div class="rsc-status-cell">${connHtml}</div>
        <div class="rsc-status-cell"></div>
      </div>`;
    });

    if (!sorted.length) html = `<p style="color:rgba(87,46,136,0.45);font-style:italic;font-size:0.85rem">No accepted cast members yet.</p>`;
    return html;
  }

  function setContent(html) {
    document.getElementById('tr-section-content').innerHTML = html;
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', trInit);
</script>
</body>
</html>
