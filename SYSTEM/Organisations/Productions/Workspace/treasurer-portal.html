<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Portal — Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=20260718c" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100vh; }
    body {
      background: #1a1530;
      font-family: var(--bts-font, 'Inter', sans-serif);
      color: #1a1530;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png');
      background-repeat: repeat;
      background-size: 720px;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }

    .tp-wrap { position: relative; z-index: 1; width: min(420px, 100%); }

    .tp-show-badge { display: flex; align-items: center; gap: 0.85rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0.8rem 1rem; margin-bottom: 1.25rem; }
    .tp-poster { width: 42px; height: 42px; border-radius: 7px; object-fit: cover; background: rgba(87,46,136,0.4); flex-shrink: 0; }
    .tp-show-name { font-size: 0.95rem; font-weight: 900; color: #fff; line-height: 1.2; }
    .tp-show-sub { font-size: 0.72rem; color: rgba(255,255,255,0.5); margin-top: 0.1rem; }

    .tp-card { background: #fff; border-radius: 18px; padding: 2.5rem 2rem; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
    .tp-kicker { font-size: 0.67rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; color: #572e88; margin-bottom: 0.35rem; }
    .tp-title { font-size: 1.55rem; font-weight: 900; color: #1a1530; margin: 0 0 0.3rem; line-height: 1.1; }
    .tp-subtitle { font-size: 0.82rem; color: rgba(26,21,48,0.5); margin: 0 0 1.8rem; }

    .tp-field { margin-bottom: 1rem; }
    .tp-field label { display: block; font-size: 0.73rem; font-weight: 800; color: rgba(26,21,48,0.6); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .tp-field input { width: 100%; border: 1.5px solid rgba(87,46,136,0.22); border-radius: 8px; padding: 0.68rem 0.85rem; font-size: 0.9rem; font-family: var(--bts-font, 'Inter', sans-serif); color: #1a1530; outline: none; transition: border-color 0.12s; }
    .tp-field input:focus { border-color: #572e88; }

    .tp-btn { width: 100%; background: #572e88; color: #fff; border: none; border-radius: 8px; padding: 0.82rem; font-size: 0.9rem; font-weight: 900; cursor: pointer; margin-top: 0.5rem; font-family: var(--bts-font, 'Inter', sans-serif); transition: filter 0.12s; }
    .tp-btn:hover { filter: brightness(1.12); }
    .tp-btn:disabled { opacity: 0.6; cursor: not-allowed; filter: none; }
    .tp-btn-secondary { background: transparent; color: #572e88; border: 1.5px solid rgba(87,46,136,0.22); }
    .tp-btn-secondary:hover { background: rgba(87,46,136,0.04); filter: none; }

    .tp-error { font-size: 0.78rem; color: #d1523d; font-weight: 700; margin-top: 0.85rem; min-height: 1em; }

    .tp-loading { text-align: center; padding: 2.5rem 1rem; }
    .tp-spinner { width: 32px; height: 32px; border: 3px solid rgba(87,46,136,0.18); border-top-color: #572e88; border-radius: 50%; animation: tp-spin 0.7s linear infinite; margin: 0 auto 1rem; }
    @keyframes tp-spin { to { transform: rotate(360deg); } }
    .tp-loading-text { font-size: 0.85rem; color: rgba(26,21,48,0.55); }
  </style>
</head>
<body>
  <div class="tp-wrap">
    <div class="tp-show-badge" id="tp-show-badge" style="display:none">
      <img class="tp-poster" id="tp-poster" src="" alt="" />
      <div>
        <div class="tp-show-name" id="tp-show-name">Loading...</div>
        <div class="tp-show-sub" id="tp-show-sub"></div>
      </div>
    </div>

    <div class="tp-card" id="tp-card">
      <div id="tp-body">
        <div class="tp-loading">
          <div class="tp-spinner"></div>
          <div class="tp-loading-text">Setting up...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (async function () {
      'use strict';

      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      const SESSION_KEY = 'bts-team-portal-v1';
      const STORAGE_KEY_PREFIX = 'bts-volunteer-portal-access:';

      const params  = new URLSearchParams(location.search);
      const prodId  = params.get('id') || '';
      const pvwEmail = params.get('pvw_email') || '';
      const pvwCode  = params.get('pvw_code') || '';
      const pvwToken = params.get('pvw_token') || '';

      if (!prodId) { showError('No production specified.'); return; }

      const sb = supabase.createClient(SB_URL, SB_ANON);

      // ── Load production info ──
      const { data: prod } = await sb
        .from('productions')
        .select('id, title, subtitle, season_year, poster_url')
        .eq('id', prodId)
        .single();

      if (prod) {
        const badge = document.getElementById('tp-show-badge');
        const poster = document.getElementById('tp-poster');
        badge.style.display = '';
        document.getElementById('tp-show-name').textContent = prod.title || '';
        const sub = [prod.subtitle, prod.season_year].filter(Boolean).join(' · ');
        document.getElementById('tp-show-sub').textContent = sub;
        if (prod.poster_url) { poster.src = prod.poster_url; } else { poster.style.display = 'none'; }
        document.title = (prod.title || 'Team Portal') + ' — Build The Show';
      }

      // ── Preview token from Manage Access "Portal Preview" ──
      if (pvwToken) {
        const key = `bts_portal_preview:${pvwToken}`;
        let preview = null;
        try { preview = JSON.parse(sessionStorage.getItem(key) || localStorage.getItem(key) || 'null'); } catch (_) {}
        if (preview && preview.prodId && Date.now() - Number(preview.createdAt || 0) < 10 * 60 * 1000) {
          try { sessionStorage.removeItem(key); } catch (_) {}
          try { localStorage.removeItem(key); } catch (_) {}
          const email = String(preview.person?.email || '').trim().toLowerCase();
          if (email) { await attemptLogin(email, null, null, true); return; }
        }
      }

      // ── Auto-login via preview params ──
      if (pvwEmail && pvwCode) {
        await attemptLogin(pvwEmail, pvwCode, null);
        return;
      }

      // ── Offer saved session explicitly ──
      const saved = loadSavedSession();
      if (saved && saved.email && saved.code) {
        showSavedSessionChoice(saved);
        return;
      }

      // ── Show login form ──
      showLoginForm();

      // ── Auth helpers ──

      function loadSavedSession() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY_PREFIX + prodId);
          return raw ? JSON.parse(raw) : null;
        } catch { return null; }
      }

      function clearSavedSession() {
        try { localStorage.removeItem(STORAGE_KEY_PREFIX + prodId); } catch {}
      }

      function clearPortalSession() {
        try { sessionStorage.removeItem(SESSION_KEY); } catch {}
      }

      function saveSession(email, code) {
        try {
          localStorage.setItem(STORAGE_KEY_PREFIX + prodId, JSON.stringify({
            email, code, savedAt: new Date().toISOString(),
          }));
        } catch {}
      }

      function volunteerPasscodeFallback(email) {
        const str = (email || '').toLowerCase().trim() + (prodId || '');
        let h = 0;
        for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
        return String(Math.abs(h) % 900000 + 100000);
      }

      // skipPasscodeCheck is only true for the Manage Access preview flow, which is
      // already access-controlled by the short-lived preview token itself.
      async function attemptLogin(email, code, errEl, skipPasscodeCheck) {
        const cleanEmail = (email || '').trim().toLowerCase();
        const cleanCode  = (code || '').trim();
        if (!cleanEmail || (!skipPasscodeCheck && !cleanCode)) {
          if (errEl) errEl.textContent = 'Enter your email and access code.';
          return;
        }

        if (errEl) errEl.textContent = '';
        const btn = document.getElementById('tp-signin-btn');
        if (btn) btn.disabled = true;

        const { data: vols, error } = await sb
          .from('volunteer_signups')
          .select('id,name,email,role_name,volunteer_passcode')
          .eq('production_id', prodId)
          .eq('email', cleanEmail)
          .in('status', ['approved', 'checked_in', 'completed']);

        const fallbackCode = volunteerPasscodeFallback(cleanEmail);
        const vol = skipPasscodeCheck
          ? (vols || [])[0]
          : (vols || []).find(v => (String(v.volunteer_passcode || '').trim() || fallbackCode) === cleanCode);

        if (error || !vol) {
          if (btn) btn.disabled = false;
          const msg = 'That email and code did not match. Contact your production team.';
          if (errEl) { errEl.textContent = msg; } else { showError(msg, true); }
          return;
        }

        clearPortalSession();
        if (!skipPasscodeCheck) saveSession(cleanEmail, cleanCode);
        await storePortalSession(vol);
        redirect();
      }

      async function storePortalSession(vol) {
        const memberId = (vol.email || '').trim().toLowerCase();
        let menuKeys = [];

        try {
          const { data: permRows } = await sb.from('portal_permissions')
            .select('module_key,access_level')
            .eq('production_id', prodId)
            .eq('person_id', memberId);
          if (permRows && permRows.length) {
            menuKeys = permissionsToMenuKeys(permRows);
          } else {
            menuKeys = ROLE_MENU_DEFAULTS[roleKeyFor(vol.role_name)] || ROLE_MENU_DEFAULTS.volunteer;
          }
        } catch (_) {
          menuKeys = ROLE_MENU_DEFAULTS[roleKeyFor(vol.role_name)] || ROLE_MENU_DEFAULTS.volunteer;
        }

        const context = {
          memberId,
          name: vol.name || '',
          role: vol.role_name || '',
          roleLabel: vol.role_name || 'Volunteer',
          email: vol.email || '',
          menuKeys,
          prodId,
        };
        try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(context)); } catch {}
      }

      function redirect() {
        const raw = sessionStorage.getItem(SESSION_KEY);
        if (!raw) { location.href = pageUrl('volunteer-calendar.html'); return; }
        let ctx;
        try { ctx = JSON.parse(raw); } catch { ctx = {}; }
        const firstPage = getFirstPage(ctx.menuKeys || []);
        location.href = pageUrl(firstPage);
      }

      function roleKeyFor(roleName) {
        const clean = String(roleName || '').trim();
        if (clean === 'Treasurer') return 'treasurer';
        if (/^lead\s/i.test(clean)) return 'dept_lead';
        return 'volunteer';
      }

      const ROLE_MENU_DEFAULTS = {
        volunteer: ['shifts', 'hours'],
        dept_lead: ['shifts', 'hours', 'departments'],
        treasurer: ['financials', 'financials:dashboard', 'financials:budgeting', 'financials:receipts', 'financials:reports'],
      };

      // Convert portal_permissions rows (SIDEBAR_TREE keys) into real sidebar menu keys.
      // Same map used by team-portal.html / audition-team.html, kept in sync manually.
      const MODULE_TO_MENU_KEYS = {
        'overview': ['overview'], 'overview:dashboard': ['overview'],
        'plan': ['schedule'], 'plan:calendar': ['schedule'], 'plan:dashboard': ['schedule'],
        'plan:timeline': ['schedule'], 'plan:team': ['schedule'], 'plan:script': ['schedule'],
        'plan:files': ['schedule'], 'plan:setup': ['schedule'],
        'cast': ['cast-dashboard', 'auditions', 'auditions:dashboard', 'auditions:schedule', 'auditions:allperformers', 'auditions:settings', 'casting', 'casting:castingboard', 'casting:castlist', 'casting:offers', 'registration', 'checkin'],
        'cast:dashboard': ['cast-dashboard'],
        'cast:auditions': ['auditions', 'auditions:dashboard', 'auditions:schedule', 'auditions:allperformers', 'auditions:settings'],
        'cast:auditions:dashboard': ['auditions', 'auditions:dashboard'],
        'cast:auditions:schedule': ['auditions', 'auditions:schedule'],
        'cast:auditions:performers': ['auditions', 'auditions:allperformers'],
        'cast:auditions:selftapes': ['auditions'],
        'cast:auditions:settings': ['auditions', 'auditions:settings'],
        'cast:casting': ['casting', 'casting:castingboard', 'casting:castlist', 'casting:offers'],
        'cast:casting:dashboard': ['casting'],
        'cast:casting:board': ['casting', 'casting:castingboard'],
        'cast:casting:list': ['casting', 'casting:castlist'],
        'cast:casting:offers': ['casting', 'casting:offers'],
        'cast:registration': ['registration'], 'cast:registration:dashboard': ['registration'],
        'cast:registration:form': ['registration'], 'cast:registration:status': ['registration'],
        'cast:registration:settings': ['registration'], 'cast:checkin': ['checkin'],
        'departments': ['departments'], 'departments:dashboard': ['departments'],
        'departments:foh': ['departments'], 'departments:foh:ushers': ['departments'],
        'departments:foh:concessions': ['departments'], 'departments:foh:boxoffice': ['departments'],
        'departments:backstage': ['departments'], 'departments:backstage:crew': ['departments'],
        'departments:backstage:changes': ['departments'], 'departments:backstage:wrangling': ['departments'],
        'departments:backstage:rehearsal': ['departments'], 'departments:technical': ['departments'],
        'departments:technical:lighting': ['departments'], 'departments:technical:sound': ['departments'],
        'departments:technical:mics': ['departments'], 'departments:technical:spotlight': ['departments'],
        'departments:design': ['departments'], 'departments:design:building': ['departments'],
        'departments:design:painting': ['departments'], 'departments:design:dressing': ['departments'],
        'departments:design:props': ['departments'], 'departments:costumes': ['departments'],
        'departments:costumes:costumes': ['departments'], 'departments:costumes:laundry': ['departments'],
        'departments:costumes:moveout': ['departments'], 'departments:hair': ['departments'],
        'departments:hair:hair': ['departments'], 'departments:hair:makeup': ['departments'],
        'departments:marketing': ['departments'], 'departments:marketing:branding': ['departments'],
        'departments:marketing:programme': ['departments'], 'departments:marketing:media': ['departments'],
        'departments:marketing:sponsors': ['departments'], 'departments:marketing:promo': ['departments'],
        'departments:stage': ['departments'], 'departments:stage:management': ['departments'],
        'departments:producer': ['departments'],
        'promote': ['marketing', 'sponsors', 'programme'], 'promote:dashboard': ['marketing', 'sponsors', 'programme'],
        'promote:marketing': ['marketing'], 'promote:marketing:dashboard': ['marketing'],
        'promote:marketing:assets': ['marketing'], 'promote:marketing:media': ['marketing'],
        'promote:marketing:calendar': ['marketing'], 'promote:marketing:tasks': ['marketing'],
        'promote:sponsors': ['sponsors'], 'promote:sponsors:dashboard': ['sponsors'],
        'promote:sponsors:ads': ['sponsors'], 'promote:sponsors:show': ['sponsors'],
        'promote:sponsors:settings': ['sponsors'], 'promote:programme': ['programme'],
        'ticketing': ['ticketing'], 'ticketing:dashboard': ['ticketing'], 'ticketing:events': ['ticketing'],
        'ticketing:sales': ['ticketing'], 'ticketing:discounts': ['ticketing'],
        'ticketing:reports': ['ticketing'], 'ticketing:settings': ['ticketing'],
        'volunteers': ['shifts', 'hours'], 'volunteers:calendar': ['shifts', 'hours'],
        'volunteers:plan': ['shifts', 'hours'], 'volunteers:suggestions': ['shifts', 'hours'],
        'volunteers:roles': ['shifts', 'hours'], 'volunteers:publish': ['shifts', 'hours'],
        'volunteers:share': ['shifts', 'hours'], 'volunteers:requests': ['shifts', 'hours'],
        'financials': ['financials', 'financials:dashboard', 'financials:budgeting', 'financials:receipts', 'financials:reports'],
        'financials:dashboard': ['financials', 'financials:dashboard'],
        'financials:budgeting': ['financials:budgeting'], 'financials:receipts': ['financials:receipts'],
        'financials:reports': ['financials:reports'],
        'wrapup': ['wrapup'], 'wrapup:dashboard': ['wrapup'], 'wrapup:surveys': ['wrapup'], 'wrapup:archive': ['wrapup'],
        'settings': ['settings'], 'settings:production': ['settings'], 'settings:team': ['settings'],
        'settings:communications': ['settings'], 'settings:emails': ['settings'], 'settings:forms': ['settings'],
        'settings:payments': ['settings'], 'settings:integrations': ['settings'],
      };

      function permissionsToMenuKeys(permRows) {
        const keys = [];
        permRows.forEach(p => {
          if (p.access_level === 'none') return;
          const mapped = MODULE_TO_MENU_KEYS[p.module_key];
          if (mapped) keys.push(...mapped);
        });
        return [...new Set(keys)];
      }

      function getFirstPage(menuKeys) {
        const keys = new Set(menuKeys);
        if (keys.has('overview')) return 'production-overview.html';
        if (keys.has('shifts') || keys.has('hours')) return 'volunteer-calendar.html';
        if (keys.has('departments')) return 'departments-dashboard.html';
        if (keys.has('schedule')) return 'plan-calendar.html';
        if (keys.has('cast-dashboard')) return 'cast-dashboard.html';
        if (keys.has('auditions:dashboard') || keys.has('auditions')) return 'auditions-dashboard.html';
        if (keys.has('casting:castingboard') || keys.has('casting')) return 'casting-board.html';
        if (keys.has('casting:castlist')) return 'casting-castlist.html';
        if (keys.has('checkin')) return 'cast-checkin.html';
        if (keys.has('registration')) return 'registration-dashboard.html';
        if (keys.has('marketing')) return 'marketing-dashboard.html';
        if (keys.has('ticketing')) return 'ticketing-dashboard.html';
        if (keys.has('financials') || keys.has('financials:dashboard')) return 'financials-dashboard.html';
        if (keys.has('financials:budgeting')) return 'budgeting.html';
        if (keys.has('wrapup')) return 'wrapup-dashboard.html';
        if (keys.has('settings')) return 'production-settings.html';
        return 'volunteer-calendar.html';
      }

      function pageUrl(file) {
        return '/SYSTEM/Organisations/Productions/Workspace/' + file + '?id=' + encodeURIComponent(prodId);
      }

      // ── UI helpers ──

      function showSavedSessionChoice(saved) {
        const savedEmail = String(saved?.email || '').trim();
        document.getElementById('tp-body').innerHTML = `
          <div class="tp-kicker">Team Portal</div>
          <h1 class="tp-title">Welcome Back</h1>
          <p class="tp-subtitle">This device still has saved access for this production.</p>
          <div style="border:1.5px solid rgba(87,46,136,0.14);border-radius:12px;padding:1rem 1rem 0.9rem;margin-bottom:1rem;background:rgba(87,46,136,0.03);">
            <div style="font-size:0.72rem;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;color:rgba(26,21,48,0.45);margin-bottom:0.3rem;">Saved access</div>
            <div style="font-size:1rem;font-weight:900;color:#1a1530;">${esc(savedEmail || 'Saved user')}</div>
          </div>
          <button class="tp-btn" id="tp-continue-btn">Continue as ${esc(savedEmail || 'saved user')}</button>
          <button class="tp-btn tp-btn-secondary" id="tp-switch-btn" style="margin-top:0.75rem;">Use different email</button>
          <div class="tp-error" id="tp-err"></div>
        `;
        document.getElementById('tp-continue-btn')?.addEventListener('click', async () => {
          const errEl = document.getElementById('tp-err');
          const btn = document.getElementById('tp-continue-btn');
          const switchBtn = document.getElementById('tp-switch-btn');
          if (btn) btn.disabled = true;
          if (switchBtn) switchBtn.disabled = true;
          if (errEl) errEl.textContent = 'Opening saved access...';
          await attemptLogin(saved.email, saved.code, errEl);
        });
        document.getElementById('tp-switch-btn')?.addEventListener('click', () => {
          clearSavedSession();
          clearPortalSession();
          showLoginForm('', '');
        });
      }

      function showLoginForm(notice, initialEmail = '') {
        clearPortalSession();
        document.getElementById('tp-body').innerHTML = `
          <div class="tp-kicker">Team Portal</div>
          <h1 class="tp-title">Sign In</h1>
          <p class="tp-subtitle">Enter your email and the access code you were given.</p>
          ${notice ? `<div style="font-size:0.8rem;color:#d1523d;font-weight:700;margin-bottom:1rem;">${esc(notice)}</div>` : ''}
          <div class="tp-field">
            <label for="tp-email">Email</label>
            <input type="email" id="tp-email" name="email" autocomplete="email" placeholder="your@email.com" value="${esc(initialEmail)}" />
          </div>
          <div class="tp-field">
            <label for="tp-code">Access Code</label>
            <input type="text" id="tp-code" name="code" autocomplete="one-time-code" inputmode="numeric" maxlength="6" placeholder="6-digit code" />
          </div>
          <button class="tp-btn" id="tp-signin-btn" onclick="handleSignIn()">Sign In</button>
          <div class="tp-error" id="tp-err"></div>
        `;
        const emailEl = document.getElementById('tp-email');
        if (emailEl) emailEl.focus();
        [document.getElementById('tp-email'), document.getElementById('tp-code')].forEach(el => {
          if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });
        });
      }

      window.handleSignIn = async function () {
        const email = (document.getElementById('tp-email')?.value || '').trim();
        const code  = (document.getElementById('tp-code')?.value || '').trim();
        const errEl = document.getElementById('tp-err');
        await attemptLogin(email, code, errEl);
      };

      function showError(msg, showRetry) {
        document.getElementById('tp-body').innerHTML = `
          <div style="text-align:center;padding:1rem 0">
            <div style="font-size:0.88rem;color:#d1523d;font-weight:700;margin-bottom:1rem;">${esc(msg)}</div>
            ${showRetry ? `<button class="tp-btn" style="width:auto;padding:0.6rem 1.5rem" onclick="showLoginForm()">Try Again</button>` : ''}
          </div>`;
        if (showRetry) window.showLoginForm = showLoginForm;
      }

      function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

    })();
  </script>
</body>
</html>
