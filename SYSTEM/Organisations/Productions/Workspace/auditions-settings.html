<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audition Settings - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/production-sidebar.css?v=sidebar-v47-20260610" />
  <style>
    * { box-sizing: border-box; }
    html { width: 100%; max-width: 100%; overflow-x: hidden; }
    body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; background: #fff; font-family: var(--bts-font); color: #1a1530; display: flex; flex-direction: column; min-height: 100vh; }
    body.mobile-sidebar-open { overflow: hidden; }
    .prod-main { margin-left: 220px; flex: 1; min-height: 100vh; padding: 2rem 2.25rem; max-width: calc(100vw - 220px); overflow-x: clip; position: relative; }
    .prod-main::before { content: ''; position: fixed; inset: 0 0 0 220px; background-image: url('/ASSETS/Images/Decrotive/Grid-purple.png'); background-repeat: repeat; background-size: 720px; opacity: 0.04; pointer-events: none; z-index: 0; }
    .prod-main-inner { position: relative; z-index: 1; max-width: 1360px; }
    @media (max-width: 900px) {
      .prod-main { margin-left: 0; max-width: 100vw; width: 100%; padding: 4.5rem 1rem 2rem; }
      .prod-main::before { inset: 0; }
    }

    .page-kicker { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(26,21,48,0.38); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .page-kicker-dot { width: 6px; height: 6px; border-radius: 50%; background: #572e88; flex-shrink: 0; }
    .page-title { font-size: 2rem; font-weight: 950; color: #1a1530; margin: 0 0 1.25rem; }

    .set-tabs { display: flex; gap: 0; border-bottom: 2px solid rgba(87,46,136,0.1); margin-bottom: 1.75rem; }
    .set-tab-btn { font-size: 0.82rem; font-weight: 800; padding: 0.6rem 1.1rem; border: none; background: none; cursor: pointer; font-family: var(--bts-font); color: rgba(26,21,48,0.5); border-bottom: 2.5px solid transparent; margin-bottom: -2px; transition: all 0.12s; }
    .set-tab-btn:hover { color: #572e88; }
    .set-tab-btn.active { color: #572e88; border-bottom-color: #572e88; }

    .set-panel { display: none; }
    .set-panel.active { display: block; }

    .set-panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem; }
    .set-panel-title { font-size: 1rem; font-weight: 900; }
    .set-add-btn { font-size: 0.78rem; font-weight: 850; border-radius: 8px; padding: 0.42rem 0.9rem; border: none; background: #572e88; color: #fff; cursor: pointer; font-family: var(--bts-font); transition: background 0.12s; }
    .set-add-btn:hover { background: #3d1f66; }

    .set-card { border: 1.5px solid rgba(87,46,136,0.12); border-radius: 10px; padding: 1.1rem 1.25rem; margin-bottom: 0.65rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; background: #fff; }
    .set-card-info { min-width: 0; }
    .set-card-name { font-size: 0.92rem; font-weight: 850; }
    .set-card-meta { font-size: 0.75rem; color: rgba(26,21,48,0.45); margin-top: 0.15rem; }
    .set-card-type { font-size: 0.68rem; font-weight: 850; border-radius: 100px; padding: 0.18rem 0.5rem; background: #f0ecfc; color: #572e88; flex-shrink: 0; }
    .set-card-actions { display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; }
    .set-card-btn { font-size: 0.72rem; font-weight: 800; border-radius: 7px; padding: 0.3rem 0.65rem; border: 1.5px solid rgba(87,46,136,0.18); background: #fff; color: rgba(26,21,48,0.6); cursor: pointer; font-family: var(--bts-font); transition: all 0.12s; }
    .set-card-btn:hover { border-color: #572e88; color: #572e88; }
    .set-card-btn.del:hover { border-color: #d1523d; color: #d1523d; }

    .set-empty { text-align: center; padding: 2.5rem 1rem; color: rgba(26,21,48,0.35); font-size: 0.88rem; border: 1.5px dashed rgba(87,46,136,0.12); border-radius: 10px; }

    /* Session editor modal */
    .set-modal-overlay { position: fixed; inset: 0; background: rgba(26,21,48,0.5); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.18s; }
    .set-modal-overlay.open { opacity: 1; pointer-events: auto; }
    .set-modal { background: #fff; border-radius: 14px; padding: 1.75rem 2rem; width: 100%; max-width: 520px; position: relative; max-height: 90vh; overflow-y: auto; }
    .set-modal-title { font-size: 1.1rem; font-weight: 950; margin-bottom: 1.25rem; }
    .set-modal-close { position: absolute; top: 1rem; right: 1rem; width: 30px; height: 30px; border-radius: 50%; border: none; background: rgba(87,46,136,0.1); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; color: #572e88; font-family: var(--bts-font); }
    .set-field { margin-bottom: 1rem; }
    .set-field label { display: block; font-size: 0.75rem; font-weight: 850; color: rgba(26,21,48,0.65); margin-bottom: 0.3rem; }
    .set-field input, .set-field select, .set-field textarea { width: 100%; border: 1.5px solid rgba(87,46,136,0.18); border-radius: 8px; padding: 0.5rem 0.8rem; font-size: 0.88rem; font-family: var(--bts-font); color: #1a1530; background: #fff; outline: none; transition: border-color 0.12s; }
    .set-field input:focus, .set-field select:focus, .set-field textarea:focus { border-color: #572e88; }
    .set-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .set-modal-actions { display: flex; gap: 0.65rem; margin-top: 1.25rem; }
    .set-modal-save { flex: 1; font-size: 0.85rem; font-weight: 850; border-radius: 8px; padding: 0.55rem 1rem; border: none; background: #572e88; color: #fff; cursor: pointer; font-family: var(--bts-font); transition: background 0.12s; }
    .set-modal-save:hover { background: #3d1f66; }
    .set-modal-cancel { font-size: 0.82rem; font-weight: 800; border-radius: 8px; padding: 0.52rem 0.9rem; border: 1.5px solid rgba(87,46,136,0.2); background: #fff; color: rgba(26,21,48,0.55); cursor: pointer; font-family: var(--bts-font); }

    .set-loading { color: rgba(26,21,48,0.38); font-size: 0.88rem; padding: 1rem 0; }
    .set-saved-pill { background: #efab45; color: #1a1530; font-size: 0.72rem; font-weight: 900; border-radius: 100px; padding: 0.2rem 0.6rem; display: inline-block; margin-left: 0.5rem; }
  </style>
</head>
<body>
  <div id="prod-sidebar-host"></div>
  <div class="prod-main">
    <div class="prod-main-inner">
      <div class="page-kicker"><span class="page-kicker-dot"></span>AUDITIONS</div>
      <h1 class="page-title">Settings</h1>

      <div class="set-tabs">
        <button class="set-tab-btn active" onclick="switchTab('sessions',this)">Sessions</button>
        <button class="set-tab-btn" onclick="switchTab('characters',this)">Characters</button>
        <button class="set-tab-btn" onclick="switchTab('questions',this)">Questions</button>
      </div>

      <div id="set-panel-sessions" class="set-panel active">
        <div class="set-loading">Loading sessions...</div>
      </div>
      <div id="set-panel-characters" class="set-panel">
        <div class="set-loading">Loading characters...</div>
      </div>
      <div id="set-panel-questions" class="set-panel">
        <div class="set-loading">Loading questions...</div>
      </div>
    </div>
  </div>

  <!-- Session editor modal -->
  <div class="set-modal-overlay" id="sess-modal">
    <div class="set-modal">
      <button class="set-modal-close" onclick="closeModal()">x</button>
      <div class="set-modal-title" id="sess-modal-title">Add Session</div>
      <div class="set-field">
        <label>Session Name</label>
        <input type="text" id="sess-name" placeholder="e.g. General Auditions" />
      </div>
      <div class="set-field">
        <label>Type</label>
        <select id="sess-type">
          <option value="audition">General Auditions</option>
          <option value="dance_call">Dance Call</option>
          <option value="callback">Callback</option>
          <option value="selftape">Self Tape</option>
        </select>
      </div>
      <div class="set-field-row">
        <div class="set-field">
          <label>Date</label>
          <input type="date" id="sess-date" />
        </div>
        <div class="set-field">
          <label>Start Time</label>
          <input type="time" id="sess-start" />
        </div>
      </div>
      <div class="set-field">
        <label>Location</label>
        <input type="text" id="sess-location" placeholder="e.g. Studio A" />
      </div>
      <div class="set-field">
        <label>Instructions (shown to performers)</label>
        <textarea id="sess-instructions" rows="3" placeholder="What should performers know?"></textarea>
      </div>
      <div class="set-modal-actions">
        <button class="set-modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="set-modal-save" onclick="saveSession()">Save Session</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/SHARED/Navigation/production-sidebar-nav.js?v=18"></script>
  <script>
    window.initProductionPage('cast');

    const SESSION_COLORS = {
      audition: '#572e88', general: '#572e88',
      dance_call: '#78bbd4', dance: '#78bbd4',
      callback: '#efab45', selftape: '#ca7ea7', self_tape: '#ca7ea7',
    };
    const SESSION_TYPE_LABELS = {
      audition: 'General Auditions', general: 'General Auditions',
      dance_call: 'Dance Call', dance: 'Dance Call',
      callback: 'Callback', selftape: 'Self Tape', self_tape: 'Self Tape',
    };
    function sessionColor(type) { return SESSION_COLORS[String(type||'').toLowerCase()] || '#572e88'; }
    function sessionTypeLabel(type) { return SESSION_TYPE_LABELS[String(type||'').toLowerCase()] || type || 'Audition'; }

    function fmtDate(d) {
      if (!d) return 'No date';
      return new Date(d + 'T00:00:00').toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    function fmtTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
    }
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    let _sb        = null;
    let _prodId    = '';
    let _sessions  = [];
    let _chars     = [];
    let _questions = [];
    let _editId    = null;
    let _activeTab = 'sessions';

    function switchTab(tab, btn) {
      _activeTab = tab;
      document.querySelectorAll('.set-tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.set-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('set-panel-' + tab)?.classList.add('active');
    }

    function renderSessions() {
      const el = document.getElementById('set-panel-sessions');
      const html = _sessions.length
        ? _sessions.map(s => {
            const color = sessionColor(s.type);
            const meta  = [fmtDate(s.date), s.start_time ? fmtTime(s.start_time) : '', s.location].filter(Boolean).join(' · ');
            return `<div class="set-card">
              <div class="set-card-info">
                <div style="display:flex;align-items:center;gap:0.5rem;">
                  <div class="set-card-name">${esc(s.name || sessionTypeLabel(s.type))}</div>
                  <span class="set-card-type" style="background:${esc(color)}22;color:${esc(color)};">${esc(sessionTypeLabel(s.type))}</span>
                </div>
                <div class="set-card-meta">${esc(meta)}</div>
              </div>
              <div class="set-card-actions">
                <button class="set-card-btn" onclick="editSession('${esc(s.id)}')">Edit</button>
                <button class="set-card-btn del" onclick="deleteSession('${esc(s.id)}')">Delete</button>
              </div>
            </div>`;
          }).join('')
        : `<div class="set-empty">No sessions yet. Add one to get started.</div>`;
      el.innerHTML = `
        <div class="set-panel-head">
          <div class="set-panel-title">Audition Sessions</div>
          <button class="set-add-btn" onclick="openNewSession()">+ Add Session</button>
        </div>
        ${html}`;
    }

    function renderCharacters() {
      const el = document.getElementById('set-panel-characters');
      const html = _chars.length
        ? _chars.map(c => {
            const meta = [c.role_type, c.age_range, c.vocal_usage].filter(Boolean).join(' · ');
            return `<div class="set-card">
              <div class="set-card-info">
                <div class="set-card-name">${esc(c.name)}</div>
                <div class="set-card-meta">${esc(meta) || 'No details set'}</div>
              </div>
              ${c.role_type ? `<span class="set-card-type">${esc(c.role_type)}</span>` : ''}
            </div>`;
          }).join('')
        : `<div class="set-empty">No characters added yet. Characters are managed in the Casting section.</div>`;
      el.innerHTML = `
        <div class="set-panel-head">
          <div class="set-panel-title">Characters &amp; Roles</div>
        </div>
        ${html}`;
    }

    function renderQuestions() {
      const el = document.getElementById('set-panel-questions');
      const html = _questions.length
        ? _questions.map(q => {
            return `<div class="set-card">
              <div class="set-card-info">
                <div class="set-card-name">${esc(q.question_text)}</div>
                <div class="set-card-meta">${esc(q.question_type)}${q.required ? ' · Required' : ''}</div>
              </div>
              <span class="set-card-type">${esc(q.question_type)}</span>
            </div>`;
          }).join('')
        : `<div class="set-empty">No custom questions yet.</div>`;
      el.innerHTML = `
        <div class="set-panel-head">
          <div class="set-panel-title">Audition Questions</div>
        </div>
        ${html}`;
    }

    function openNewSession() {
      _editId = null;
      document.getElementById('sess-modal-title').textContent = 'Add Session';
      document.getElementById('sess-name').value        = '';
      document.getElementById('sess-type').value        = 'audition';
      document.getElementById('sess-date').value        = '';
      document.getElementById('sess-start').value       = '';
      document.getElementById('sess-location').value    = '';
      document.getElementById('sess-instructions').value = '';
      document.getElementById('sess-modal').classList.add('open');
    }

    function editSession(id) {
      const s = _sessions.find(x => x.id === id);
      if (!s) return;
      _editId = id;
      document.getElementById('sess-modal-title').textContent = 'Edit Session';
      document.getElementById('sess-name').value         = s.name || '';
      document.getElementById('sess-type').value         = s.type || 'audition';
      document.getElementById('sess-date').value         = s.date || '';
      document.getElementById('sess-start').value        = s.start_time || '';
      document.getElementById('sess-location').value     = s.location || '';
      document.getElementById('sess-instructions').value = s.instructions || '';
      document.getElementById('sess-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('sess-modal').classList.remove('open');
      _editId = null;
    }

    async function saveSession() {
      const payload = {
        name:         document.getElementById('sess-name').value.trim() || null,
        type:         document.getElementById('sess-type').value,
        date:         document.getElementById('sess-date').value || null,
        start_time:   document.getElementById('sess-start').value || null,
        location:     document.getElementById('sess-location').value.trim() || null,
        instructions: document.getElementById('sess-instructions').value.trim() || null,
        production_id: _prodId,
      };
      if (!payload.name) { alert('Please enter a session name.'); return; }

      const btn = document.querySelector('.set-modal-save');
      btn.textContent = 'Saving...';
      btn.disabled    = true;

      let error;
      if (_editId) {
        ({ error } = await _sb.from('audition_sessions').update(payload).eq('id', _editId));
        if (!error) {
          const idx = _sessions.findIndex(s => s.id === _editId);
          if (idx >= 0) _sessions[idx] = { ..._sessions[idx], ...payload };
        }
      } else {
        const { data, error: err } = await _sb.from('audition_sessions').insert(payload).select().single();
        error = err;
        if (!error && data) _sessions.push(data);
      }

      btn.textContent = 'Save Session';
      btn.disabled    = false;

      if (error) { alert('Could not save. Please try again.'); return; }
      closeModal();
      renderSessions();
    }

    async function deleteSession(id) {
      if (!confirm('Delete this session? This cannot be undone.')) return;
      const { error } = await _sb.from('audition_sessions').delete().eq('id', id);
      if (error) { alert('Could not delete.'); return; }
      _sessions = _sessions.filter(s => s.id !== id);
      renderSessions();
    }

    (async function () {
      const SB_URL  = 'https://tkmaiktxpwqfbgeojbnf.supabase.co';
      const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8';
      _prodId = new URLSearchParams(location.search).get('id') || '';
      if (!_prodId) return;
      _sb = supabase.createClient(SB_URL, SB_ANON);

      const [sessRes, charRes, qRes] = await Promise.all([
        _sb.from('audition_sessions').select('id,name,type,date,start_time,location,instructions').eq('production_id', _prodId).order('sort_order').order('date'),
        _sb.from('production_characters').select('id,name,role_type,age_range,vocal_usage').eq('production_id', _prodId).order('sort_order').order('name'),
        _sb.from('audition_custom_questions').select('id,question_text,question_type,required').eq('production_id', _prodId).eq('enabled', true).order('sort_order'),
      ]);

      _sessions  = sessRes.data || [];
      _chars     = charRes.data || [];
      _questions = qRes.data    || [];

      renderSessions();
      renderCharacters();
      renderQuestions();
    })();
  </script>
</body>
</html>
