<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casting Board - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css" />
  <link rel="stylesheet" href="/ASSETS/styles/casting-card.css" />
  <style>
    /* ── Layout ───────────────────────────────────────────── */
    .casting-main {
      position: relative;
      z-index: 10;
      padding: 3rem 2rem 6rem;
      max-width: 1180px;
      margin-left: auto;
      margin-right: auto;
      transition: padding-right 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    @media (min-width: 681px) {
      .casting-main.panel-open { padding-right: 360px; }
    }

    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 57px);
      color: #7a7490;
      font-size: 0.9375rem;
    }

    /* ── Nav link ─────────────────────────────────────────── */
    .nav-link {
      color: #7a7490;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-link:hover { color: #f0ecf8; }

    /* ── Page header ──────────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .page-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #f0ecf8;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }
    .page-header-subtitle { font-size: 0.9rem; color: #7a7490; }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn--primary-sm {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.25rem; border-radius: 8px;
      background: #572e88; color: #fff;
      font-size: 0.875rem; font-weight: 700; font-family: inherit;
      border: none; cursor: pointer; text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .btn--primary-sm:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn--ghost-sm {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1rem; border-radius: 7px;
      background: transparent; color: #7a7490;
      font-size: 0.8125rem; font-weight: 600; font-family: inherit;
      border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
      text-decoration: none; transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .btn--ghost-sm:hover { color: #f0ecf8; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }

    /* ── Summary cards ────────────────────────────────────── */
    .summary-row {
      display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    .summary-card {
      background: rgba(15,14,28,0.7); border: 1px solid rgba(87,46,136,0.3);
      border-radius: 12px; padding: 1.1rem 1.5rem;
      flex: 1; min-width: 110px; transition: border-color 0.2s;
    }
    .summary-card:hover { border-color: rgba(87,46,136,0.55); }
    .summary-value { font-size: 1.75rem; font-weight: 800; color: #f0ecf8; letter-spacing: -0.03em; line-height: 1; margin-bottom: 0.3rem; }
    .summary-label { font-size: 0.75rem; color: #7a7490; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }

    /* ── View tabs ────────────────────────────────────────── */
    .view-tabs {
      display: flex; gap: 0.25rem; margin-bottom: 1.5rem;
      background: rgba(255,255,255,0.04); border-radius: 10px; padding: 0.3rem;
      width: fit-content;
    }
    .view-tab {
      padding: 0.45rem 1.1rem; border-radius: 7px;
      font-size: 0.84rem; font-weight: 600; font-family: inherit;
      background: none; border: none; color: #7a7490; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .view-tab.active { background: #572e88; color: #fff; }
    .view-tab:not(.active):hover { color: #f0ecf8; background: rgba(255,255,255,0.06); }

    /* ── Filter bar ───────────────────────────────────────── */
    .filter-bar {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    .filter-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.35rem 0.9rem; border-radius: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #7a7490; font-size: 0.8rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { color: #f0ecf8; border-color: rgba(255,255,255,0.2); }
    .filter-btn.active { background: rgba(87,46,136,0.25); border-color: rgba(87,46,136,0.6); color: #d4c4f0; }
    .filter-count { background: rgba(87,46,136,0.4); border-radius: 10px; padding: 0.05rem 0.45rem; font-size: 0.7rem; }

    /* ── Applications table ───────────────────────────────── */
    .applications-table-wrap {
      background: rgba(15,14,28,0.7); border: 1px solid rgba(87,46,136,0.3);
      border-radius: 14px; overflow: hidden;
    }
    .applications-table { width: 100%; border-collapse: collapse; }
    .applications-table th {
      text-align: left; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: #7a7490;
      padding: 0.85rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(87,46,136,0.08); white-space: nowrap;
    }
    .applications-table td {
      padding: 0.9rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.875rem; color: #f0ecf8; vertical-align: middle;
    }
    .applications-table tr:last-child td { border-bottom: none; }
    .applications-table tbody tr { transition: background 0.15s; }
    .applications-table tbody tr:hover { background: rgba(87,46,136,0.07); }

    .applicant-name-btn {
      font-weight: 600; color: #d4c4f0; background: none; border: none;
      cursor: pointer; font-size: 0.875rem; font-family: inherit; padding: 0;
      text-align: left; transition: color 0.15s;
    }
    .applicant-name-btn:hover { color: #fff; text-decoration: underline; }
    .applicant-email { font-size: 0.8rem; color: #7a7490; margin-top: 0.15rem; }

    /* ── Status select ────────────────────────────────────── */
    .status-select {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #f0ecf8; border-radius: 7px; padding: 0.35rem 0.75rem;
      font-size: 0.8rem; font-family: inherit; cursor: pointer; outline: none;
      transition: border-color 0.2s;
    }
    .status-select:focus { border-color: rgba(87,46,136,0.6); }
    .status-select option { background: #0f0e1c; }

    /* ── Status badges ────────────────────────────────────── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 0.22rem 0.55rem; border-radius: 20px;
    }
    .status-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .badge--started    { background: rgba(122,116,144,0.12); color: #7a7490; border: 1px solid rgba(122,116,144,0.2); }
    .badge--submitted  { background: rgba(87,46,136,0.18);   color: #b89fe0; border: 1px solid rgba(87,46,136,0.4); }
    .badge--confirmed  { background: rgba(52,199,89,0.1);    color: #4cd96a; border: 1px solid rgba(52,199,89,0.25); }
    .badge--auditioned { background: rgba(150,176,215,0.12); color: #96b0d7; border: 1px solid rgba(150,176,215,0.25); }
    .badge--callback   { background: rgba(239,171,69,0.12);  color: #efab45; border: 1px solid rgba(239,171,69,0.3); }
    .badge--cast       { background: rgba(52,199,89,0.15);   color: #4cd96a; border: 1px solid rgba(52,199,89,0.35); }
    .badge--not-cast   { background: rgba(122,116,144,0.12); color: #7a7490; border: 1px solid rgba(122,116,144,0.2); }
    .badge--waitlist   { background: rgba(239,171,69,0.12);  color: #efab45; border: 1px solid rgba(239,171,69,0.2); }
    .badge--withdrawn  { background: rgba(122,116,144,0.12); color: #7a7490; border: 1px solid rgba(122,116,144,0.2); }
    .badge--declined   { background: rgba(220,60,60,0.1);    color: #f08080; border: 1px solid rgba(220,60,60,0.2); }

    /* ── Notes cell ───────────────────────────────────────── */
    .notes-cell { max-width: 200px; }
    .notes-text {
      font-size: 0.78rem; color: #9a90b0; font-style: italic;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 180px;
    }
    .notes-empty { font-size: 0.75rem; color: rgba(122,116,144,0.4); }
    .notes-edit-btn {
      background: none; border: none; cursor: pointer; padding: 0.1rem 0.3rem;
      color: #7a7490; font-size: 0.72rem; font-family: inherit;
      border-radius: 4px; transition: color 0.15s, background 0.15s;
    }
    .notes-edit-btn:hover { color: #f0ecf8; background: rgba(255,255,255,0.06); }

    /* ── Character assign select ──────────────────────────── */
    .char-assign-select {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #f0ecf8; border-radius: 7px; padding: 0.35rem 0.6rem;
      font-size: 0.78rem; font-family: inherit; cursor: pointer; outline: none;
      max-width: 160px; transition: border-color 0.2s;
    }
    .char-assign-select:focus { border-color: rgba(87,46,136,0.6); }
    .char-assign-select option { background: #0f0e1c; }

    /* ── Profile panel ────────────────────────────────────── */
    .profile-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 340px; background: #13112a;
      border-left: 1px solid rgba(87,46,136,0.35);
      z-index: 200; overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
    }
    .profile-panel.open { transform: translateX(0); }
    .profile-panel-overlay {
      position: fixed; inset: 0; z-index: 190;
      background: rgba(0,0,0,0.4); opacity: 0;
      pointer-events: none; transition: opacity 0.3s;
    }
    .profile-panel-overlay.open { opacity: 1; pointer-events: all; }

    .profile-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.25rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .profile-panel-title { font-size: 0.85rem; font-weight: 700; color: #7a7490; letter-spacing: 0.06em; text-transform: uppercase; }
    .profile-panel-close {
      background: none; border: none; color: #7a7490; cursor: pointer;
      font-size: 1.1rem; padding: 0.2rem 0.4rem; border-radius: 5px;
      transition: color 0.15s; font-family: inherit;
    }
    .profile-panel-close:hover { color: #f0ecf8; }

    .profile-panel-body { padding: 1.25rem; flex: 1; }

    .profile-headshot-wrap {
      width: 100%; aspect-ratio: 4/5; border-radius: 10px; overflow: hidden;
      background: rgba(87,46,136,0.15); margin-bottom: 1rem;
      max-height: 280px;
    }
    .profile-headshot-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .profile-headshot-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 3rem; color: rgba(122,116,144,0.3);
    }

    .profile-headshot-edit-btn {
      display: block; width: 100%; margin-top: -0.5rem; margin-bottom: 0.85rem;
      padding: 0.3rem 0; font-size: 0.72rem; font-weight: 700; color: #9a90b0;
      background: none; border: none; cursor: pointer; font-family: inherit;
      text-align: center; letter-spacing: 0.03em; text-decoration: underline;
      text-underline-offset: 2px;
    }
    .profile-headshot-edit-btn:hover { color: #c4b8e8; }
    .profile-headshot-edit-btn:disabled { opacity: 0.5; cursor: default; }

    .profile-name { font-size: 1.1rem; font-weight: 800; color: #f0ecf8; letter-spacing: -0.02em; margin-bottom: 0.2rem; }
    .profile-sub { font-size: 0.8rem; color: #7a7490; margin-bottom: 1rem; }

    .profile-data { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
    .profile-data-row { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; }
    .profile-data-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #7a7490; white-space: nowrap; }
    .profile-data-value { font-size: 0.82rem; color: #d4c4f0; text-align: right; }

    .profile-section-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: #7a7490; margin-bottom: 0.5rem; padding-bottom: 0.3rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .profile-notes-area {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 0.65rem 0.75rem; color: #f0ecf8; font-size: 0.82rem;
      font-family: inherit; resize: vertical; min-height: 80px;
      transition: border-color 0.2s; outline: none; box-sizing: border-box;
    }
    .profile-notes-area:focus { border-color: rgba(87,46,136,0.6); }
    .profile-notes-save {
      margin-top: 0.5rem; width: 100%;
      padding: 0.5rem; border-radius: 7px;
      background: #572e88; color: #fff;
      border: none; font-size: 0.82rem; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: opacity 0.2s;
    }
    .profile-notes-save:hover { opacity: 0.85; }

    .profile-status-row {
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
      margin-top: 1rem;
    }

    /* ── Notes modal ──────────────────────────────────────── */
    .notes-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 300;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .notes-modal-overlay.open { display: flex; }
    .notes-modal {
      background: #13112a; border: 1px solid rgba(87,46,136,0.4);
      border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 420px;
    }
    .notes-modal-title { font-size: 1rem; font-weight: 700; color: #f0ecf8; margin-bottom: 0.25rem; }
    .notes-modal-sub { font-size: 0.8rem; color: #7a7490; margin-bottom: 1rem; }
    .notes-modal-textarea {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 0.65rem 0.75rem; color: #f0ecf8; font-size: 0.85rem;
      font-family: inherit; resize: vertical; min-height: 90px;
      transition: border-color 0.2s; outline: none; box-sizing: border-box;
    }
    .notes-modal-textarea:focus { border-color: rgba(87,46,136,0.6); }
    .notes-modal-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }

    /* ── Notify button ────────────────────────────────────── */
    .notify-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.3rem 0.65rem; border-radius: 6px;
      background: rgba(87,46,136,0.18); border: 1px solid rgba(87,46,136,0.4);
      color: #b89fe0; font-size: 0.75rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .notify-btn:hover { background: rgba(87,46,136,0.32); border-color: rgba(87,46,136,0.65); color: #d4c4f0; }

    /* ── Notify modal ─────────────────────────────────────── */
    .notify-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 300;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .notify-modal-overlay.open { display: flex; }
    .notify-modal {
      background: #13112a; border: 1px solid rgba(87,46,136,0.4);
      border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 480px;
    }
    .notify-modal-title { font-size: 1rem; font-weight: 700; color: #f0ecf8; margin-bottom: 0.2rem; }
    .notify-modal-sub { font-size: 0.8rem; color: #7a7490; margin-bottom: 1.1rem; }
    .notify-modal-to {
      font-size: 0.78rem; color: #9a90b0; margin-bottom: 0.85rem;
      padding: 0.5rem 0.75rem;
      background: rgba(255,255,255,0.03); border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .notify-modal-to strong { color: #d4c4f0; }
    .notify-modal-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #7a7490; margin-bottom: 0.35rem; }
    .notify-modal-textarea {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 0.65rem 0.75rem; color: #f0ecf8; font-size: 0.85rem;
      font-family: inherit; resize: vertical; min-height: 130px;
      transition: border-color 0.2s; outline: none; box-sizing: border-box;
    }
    .notify-modal-textarea:focus { border-color: rgba(87,46,136,0.6); }
    .notify-modal-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .notify-modal-sending { font-size: 0.78rem; color: #7a7490; padding: 0.5rem 0; display: none; }

    /* ── Empty state ──────────────────────────────────────── */
    .empty-state {
      background: rgba(15,14,28,0.5); border: 1px dashed rgba(87,46,136,0.3);
      border-radius: 14px; padding: 3rem 2rem; text-align: center;
      color: #7a7490; font-size: 0.9rem; line-height: 1.6;
    }
    .empty-state strong { display: block; font-size: 1rem; color: #a89ec0; margin-bottom: 0.4rem; }

    /* ── Clio card grid ──────────────────────────────────── */
    .clio-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }
    .clio-card-wrap {
      cursor: pointer;
      border-radius: 14px;
      transition: transform 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .clio-card-wrap:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(87,46,136,0.25); }
    .clio-card-wrap:focus-visible { box-shadow: 0 0 0 2px #8b5cf6; }
    .clio-card-wrap.clio-card-called .casting-card { box-shadow: 0 0 0 2px #efab45; }
    .clio-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.4rem;
      padding: 0.45rem 0.25rem 0;
      flex-wrap: wrap;
    }
    .clio-card-role {
      font-size: 0.7rem;
      color: #7a7490;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
    }

    /* ── Toast notification ───────────────────────────────── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: rgba(52,199,89,0.15); border: 1px solid rgba(52,199,89,0.35);
      border-radius: 10px; padding: 0.75rem 1.25rem;
      color: #4cd96a; font-size: 0.875rem; font-weight: 600;
      z-index: 400; opacity: 0; transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s; pointer-events: none;
    }
    .toast.visible { opacity: 1; transform: translateY(0); }
    .toast.toast--error { background: rgba(220,60,60,0.12); border-color: rgba(220,60,60,0.35); color: #f08080; }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 680px) {
      .casting-main { padding: 2rem 1rem 5rem; }
      .applications-table th:nth-child(4),
      .applications-table td:nth-child(4),
      .applications-table th:nth-child(5),
      .applications-table td:nth-child(5) { display: none; }
      .profile-panel { width: 100%; }
    }

    /* ── Callback mode toggle ─────────────────────────────── */
    .mode-toggle-wrap {
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .mode-toggle {
      display: flex; gap: 0; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 9px; overflow: hidden;
    }
    .mode-toggle-btn {
      padding: 0.42rem 1.1rem; border: none; background: none;
      color: #7a7490; font-size: 0.82rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .mode-toggle-btn.active {
      background: #572e88; color: #fff;
    }
    .mode-toggle-btn:not(.active):hover { color: #f0ecf8; background: rgba(255,255,255,0.05); }

    /* ── Callback phase banner ────────────────────────────── */
    .cb-phase-banner {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 1rem; border-radius: 10px; margin-bottom: 1.25rem;
      background: rgba(239,171,69,0.08); border: 1px solid rgba(239,171,69,0.3);
      color: #efab45; font-size: 0.82rem; font-weight: 600;
      flex-wrap: wrap;
    }
    .cb-phase-banner strong { color: #f0c96a; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.75rem; }
    .cb-phase-banner span { color: rgba(239,171,69,0.7); font-weight: 400; }
    .cb-add-group-btn {
      margin-left: auto; padding: 0.3rem 0.85rem; border-radius: 7px;

  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    const params      = new URLSearchParams(window.location.search);
    const productionId = params.get('id');
    const main        = document.getElementById('casting-main');

    let allApplications    = [];
    let allCharacters      = [];
    let allProfiles        = [];
    let allCallbackGroups  = [];
    let allBookings        = [];
    let allSessionsById    = {};
    let allSlotsById       = {};
    let activeView         = 'applicants'; // 'applicants' | 'castlist'
    let boardMode          = 'audition';   // 'audition' | 'callback'
    let cbStatusFilter     = 'all';        // 'all' | 'attended' | 'complete'
    let cbGroupFilter      = null;         // null | group id
    let selectedGroupColour = '#efab45';
    let openPanelAppId          = null;
    let _prod                   = null;
    let _org                    = null;
    let _reschedulingBookingId  = null;
    let _reschedulingSessionId  = null;
    let _reschedulingAppId      = null;
    let castingRealtimeChannel  = null;

    const CB_GROUP_COLOURS = [
      '#efab45','#f03592','#55acda','#4ab847','#a87af8','#22cdd4','#ff7db4','#ef7d05',
    ];

    function calculateAgeFromDob(dateOfBirth) {
      if (!dateOfBirth) return null;
      const dob = new Date(dateOfBirth);
      if (Number.isNaN(dob.getTime())) return null;

      const today = new Date();
      let age = today.getFullYear() - dob.getFullYear();
      const hasHadBirthday =
        today.getMonth() > dob.getMonth() ||
        (today.getMonth() === dob.getMonth() && today.getDate() >= dob.getDate());
      if (!hasHadBirthday) age -= 1;
      return age >= 0 ? age : null;
    }

    // ── Fates (schedule) helpers ──────────────────────────────
    function normalizeApplicationAssignments(app) {
      const fromJson = Array.isArray(app?.slot_assignments)
        ? app.slot_assignments
        : [];
      const normalized = fromJson
        .filter(entry => entry && entry.session_id)
        .map(entry => ({
          session_id: entry.session_id,
          slot_id: entry.slot_id || null,
        }));

      const legacySessionId = app?.session_id || null;
      const legacySlotId = app?.time_slot_id || app?.slot_id || null;
      if (legacySessionId && !normalized.some(entry => entry.session_id === legacySessionId)) {
        normalized.push({ session_id: legacySessionId, slot_id: legacySlotId });
      }

      return normalized;
    }

    function buildApplicationSlotUpdate(app, sessionId, slotId) {
      const nextAssignments = normalizeApplicationAssignments(app)
        .filter(entry => entry.session_id !== sessionId);
      nextAssignments.push({ session_id: sessionId, slot_id: slotId || null });

      const currentPrimarySessionId = app?.session_id || null;
      const shouldMirrorLegacy = currentPrimarySessionId && currentPrimarySessionId === sessionId;
      return {
        slot_assignments: nextAssignments,
        ...(shouldMirrorLegacy ? { time_slot_id: slotId || null, slot_id: slotId || null } : {}),
      };
    }

    function buildApplicationScheduleEntries(app) {
      return normalizeApplicationAssignments(app).map((entry, index) => ({
        id: `application-${app.id}-${entry.session_id || index}`,
        applicant_id: app.id,
        email: app.applicant_email || null,
        session_id: entry.session_id || null,
        slot_id: entry.slot_id || null,
        status: app.status || 'pending',
        _source: 'application',
        _session: allSessionsById[entry.session_id] || null,
        _slot: allSlotsById[entry.slot_id] || null,
      }));
    }

    function mergeCastingScheduleEntries(bookingRows) {
      const merged = [];
      const seenApplicationSessions = new Set();

      (bookingRows || []).forEach(row => {
        const key = row.applicant_id && row.session_id ? `${row.applicant_id}:${row.session_id}` : '';
        if (key) seenApplicationSessions.add(key);
        merged.push({
          ...row,
          _source: 'booking',
          _session: allSessionsById[row.session_id] || null,
          _slot: allSlotsById[row.slot_id] || null,
        });
      });

      allApplications.forEach(app => {
        buildApplicationScheduleEntries(app).forEach(entry => {
          const key = entry.applicant_id && entry.session_id ? `${entry.applicant_id}:${entry.session_id}` : '';
          if (key && seenApplicationSessions.has(key)) return;
          merged.push(entry);
        });
      });

      allBookings = merged;
    }

    async function reloadCastingScheduleState() {
      const { data: bookingRows } = await sb
        .from('audition_bookings')
        .select('id, applicant_id, email, slot_id, session_id, status, created_at')
        .eq('production_id', productionId)
        .not('status', 'in', '("canceled","cancelled")');

      const applicationAssignments = allApplications.flatMap(app => normalizeApplicationAssignments(app));
      const sessionIds = [...new Set([
        ...(bookingRows || []).map(row => row.session_id).filter(Boolean),
        ...applicationAssignments.map(entry => entry.session_id).filter(Boolean),
      ])];
      const slotIds = [...new Set([
        ...(bookingRows || []).map(row => row.slot_id).filter(Boolean),
        ...applicationAssignments.map(entry => entry.slot_id).filter(Boolean),
      ])];

      const [sessionResult, slotResult] = await Promise.all([
        sessionIds.length ? sb.from('audition_sessions').select('id, name').in('id', sessionIds) : Promise.resolve({ data: [] }),
        slotIds.length ? sb.from('audition_time_slots').select('id, slot_time, slot_date').in('id', slotIds) : Promise.resolve({ data: [] }),
      ]);

      allSessionsById = Object.fromEntries((sessionResult.data || []).map(session => [session.id, session]));
      allSlotsById = Object.fromEntries((slotResult.data || []).map(slot => [slot.id, slot]));
      mergeCastingScheduleEntries(bookingRows || []);
    }

    function getBookingsForApplicant(app) {
      return allBookings
        .filter(b => {
          if (b.status === 'canceled' || b.status === 'cancelled') return false;
          return b.applicant_id === app.id;
        })
        .sort((a, b) => {
          const aDate = `${a._slot?.slot_date || ''} ${a._slot?.slot_time || ''}`.trim();
          const bDate = `${b._slot?.slot_date || ''} ${b._slot?.slot_time || ''}`.trim();
          return aDate.localeCompare(bDate) || String(a.created_at || '').localeCompare(String(b.created_at || ''));
        });
    }

    function fmtSlotDateTime(booking) {
      const slotDate = booking._slot?.slot_date || booking.slot_date;
      const slotTime = booking._slot?.slot_time || booking.slot_time;
      if (!slotDate && !slotTime) return null;
      const parts = [];
      if (slotDate) {
        const d = new Date(slotDate + 'T00:00:00');
        if (!isNaN(d)) parts.push(d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }));
      }
      if (slotTime) {
        const m = String(slotTime).match(/^(\d{1,2}):(\d{2})/);
        if (m) {
          const h = parseInt(m[1], 10), min = m[2];
          parts.push(`${h % 12 || 12}:${min} ${h >= 12 ? 'PM' : 'AM'}`);
        }
      }
      return parts.join(' · ') || null;
    }

    // ── Toast ─────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      clearTimeout(toastTimer);
      t.textContent = msg;
      t.classList.toggle('toast--error', isError);
      t.classList.add('visible');
      toastTimer = setTimeout(() => t.classList.remove('visible'), 3000);
    }

    async function updateCastingApplication(appId, patch, options = {}) {
      const errorMessage = options.errorMessage || 'Could not update performer.';
      const successMessage = options.successMessage || '';
      const rerenderPanel = options.rerenderPanel !== false;
      const rerenderBoard = options.rerenderBoard !== false;

      const { error } = await sb.from('audition_applications').update(patch).eq('id', appId);
      if (error) {
        showToast(errorMessage, true);
        return error;
      }

      const app = allApplications.find(item => item.id === appId);
      if (app) Object.assign(app, patch);

      if (successMessage) showToast(successMessage);
      if (rerenderBoard) render();
      if (rerenderPanel && openPanelAppId === appId) openProfilePanel(appId);
      return null;
    }

    // ── Status helpers ─────────────────────────────────────────
    const STATUS_OPTIONS = [
      'started','submitted','confirmed','auditioned',
      'callback','cast','not_cast','waitlist','withdrawn','declined'
    ];
    function badgeHTML(status) {
      const labels = { started:'Started', submitted:'Submitted', confirmed:'Confirmed', auditioned:'Auditioned', callback:'Callback', cast:'Cast', not_cast:'Not Cast', waitlist:'Waitlist', withdrawn:'Withdrawn', declined:'Declined' };
      const cls = (status || 'started').replace('_', '-');
      return `<span class="status-badge badge--${cls}">${labels[status] || status}</span>`;
    }
    function statusSelectHTML(appId, currentStatus) {
      const opts = STATUS_OPTIONS.map(s =>
        `<option value="${s}" ${s === currentStatus ? 'selected' : ''}>${s.replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase())}</option>`
      ).join('');
      return `<select class="status-select" data-id="${esc(appId)}">${opts}</select>`;
    }

    // ── Character assign select ────────────────────────────────
    function charSelectHTML(appId, currentCharId) {
      const opts = `<option value="">No character assigned</option>` +
        allCharacters.map(c =>
          `<option value="${esc(c.id)}" ${c.id === currentCharId ? 'selected' : ''}>${esc(c.name)}</option>`
        ).join('');
      return `<select class="char-assign-select" data-app-id="${esc(appId)}">${opts}</select>`;
    }

    // ── Render wrapper ─────────────────────────────────────────
    function render() {
      if (boardMode === 'callback') { renderCallbackMode(); return; }
      if (activeView === 'applicants') renderApplicants();
      else renderCastList();
    }

    // ── Board mode toggle ──────────────────────────────────────
    function toggleBoardMode(mode) {
      boardMode = mode;
      if (mode === 'audition') { cbStatusFilter = 'all'; cbGroupFilter = null; }
      render();
    }

    // ── Applicants view ────────────────────────────────────────
    function renderApplicants() {
      function castingAttendanceModeLabel(record) {
        const customAnswers = (typeof record?.custom_answers === 'string')
          ? JSON.parse(record.custom_answers || '{}')
          : (record?.custom_answers || {});
        const raw = String(
          record?.attendance_mode ||
          customAnswers['Attendance Type'] ||
          customAnswers['attendance_mode'] ||
          ''
        ).trim().toLowerCase();
        if (['in_person', 'in person', 'in-person', 'onsite', 'on site'].includes(raw)) return 'In Person';
        if (['video_call', 'video call', 'video', 'virtual', 'online', 'zoom', 'google meet', 'meet', 'on a video call'].includes(raw)) return 'On a Video Call';
        return '';
      }

      const statusCounts = {};
      allApplications.forEach(a => { statusCounts[a.status] = (statusCounts[a.status] || 0) + 1; });

      const castCount      = statusCounts['cast'] || 0;
      const callbackCount  = statusCounts['callback'] || 0;
      const activeCount    = (statusCounts['submitted']||0)+(statusCounts['confirmed']||0)+(statusCounts['auditioned']||0)+callbackCount;
      const charsCastCount = allCharacters.filter(c => allApplications.some(a => a.status==='cast' && a.character_id===c.id)).length;

      const gridHTML = allApplications.length === 0
        ? `<div class="empty-state"><strong>No performers here.</strong>When performers apply, they'll show up here.</div>`
        : `<div class="clio-cards-grid">
            ${allApplications.map(a => {
              const profile = a.profile_id ? allProfiles.find(p => p.id === a.profile_id) : null;
              const nameParts = (a.applicant_name || '').trim().split(/\s+/);
              const firstName = profile?.legal_first_name || nameParts[0] || '';
              const lastName  = profile?.legal_last_name  || nameParts.slice(1).join(' ') || '';
              const age       = calculateAgeFromDob(profile?.date_of_birth);
              const pronouns  = profile?.sections?.performer?.pronouns || '';
              const photo     = profile?.headshot_url || a.headshot_url || '';
              const isCalled  = a.callback_status && a.callback_status !== 'none';
              const cardHTML  = renderCastingCard({
                first_name: firstName,
                last_name: lastName,
                age,
                pronouns,
                headshot_url: photo,
                casting_categories: pronouns ? [pronouns] : [],
                role_openness: a.role_name ? 'specific' : 'open',
                attendance_mode: castingAttendanceModeLabel(a) || null,
              }, {
                size: 'default',
                hasPadding: true,
                hasIcons: true,
                state: a.status === 'cast' ? 'chosen' : null,
              });
              // Wrap the card so clicking anywhere opens the profile panel
              return `<div class="clio-card-wrap${isCalled ? ' clio-card-called' : ''}" data-profile-app="${esc(a.id)}" role="button" tabindex="0" title="View ${esc(a.applicant_name || 'performer')}">
                ${cardHTML}
                <div class="clio-card-meta">
                  ${badgeHTML(a.status)}
                  ${a.role_name ? `<span class="clio-card-role">${esc(a.role_name)}</span>` : ''}
                </div>
              </div>`;
            }).join('')}
          </div>`;

      main.innerHTML = `
        ${headerHTML()}
        ${summaryHTML(allApplications.length, activeCount, castCount, charsCastCount)}
        ${viewTabsHTML()}
        ${gridHTML}
      `;

    // ── Cast List view ─────────────────────────────────────────
    function renderCastList() {
      const castCount     = allApplications.filter(a => a.status === 'cast').length;
      const activeCount   = allApplications.filter(a => ['submitted','confirmed','auditioned','callback'].includes(a.status)).length;
      const charsCastCount = allCharacters.filter(c => allApplications.some(a => a.status==='cast' && a.character_id===c.id)).length;

      let gridHTML;
      if (allCharacters.length === 0) {
        gridHTML = `<div class="empty-state"><strong>No characters yet.</strong>Add characters in the Characters tab of your production workspace, then come back here to assign performers.</div>`;
      } else {
        // Build casting card data for each character
        const cardDataArray = allCharacters.map(char => {
          const castApp = allApplications.find(a => a.character_id === char.id && a.status === 'cast');
          const profile = castApp?.profile_id ? allProfiles.find(p => p.id === castApp.profile_id) : null;
          
          // Extract pronouns from profile sections
          let pronouns = [];
          if (profile?.sections?.performer?.pronouns) {
            pronouns = [profile.sections.performer.pronouns];
          }
          
          // Determine role openness based on character type
          const roleOpenness = char.vocal_type ? 'specific' : 'ensemble';
          
          return {
            first_name: castApp ? (profile?.legal_first_name || castApp.applicant_name?.split(' ')[0] || '') : '',
            last_name: castApp ? (profile?.legal_last_name || castApp.applicant_name?.split(' ').slice(1).join(' ') || '') : char.name,
            age: castApp ? calculateAgeFromDob(profile?.date_of_birth) : null,
            pronouns: Array.isArray(pronouns) ? pronouns.join('/') : '',
            headshot_url: castApp ? (profile?.headshot_url || castApp.headshot_url || '') : '',
            casting_categories: pronouns,
            role_openness: roleOpenness,
            attendance_mode: castingAttendanceModeLabel(castApp) || null,
            char_name: char.name,
            char_type: char.character_type,
            vocal_type: char.vocal_type,
            is_cast: !!castApp,
            candidate_count: allApplications.filter(a => a.role_name && char.name && a.role_name.toLowerCase() === char.name.toLowerCase() && a.status !== 'not_cast' && a.status !== 'withdrawn' && a.status !== 'declined').length
          };
        });
        
        // Render using the casting-card component
        gridHTML = `<div class="casting-cards-grid" id="cast-list-grid">
          ${cardDataArray.map((data, idx) => {
            const cardOptions = {
              size: 'default',
              grid: 'default',
              hasPadding: true,
              hasIcons: true,
              state: data.is_cast ? 'chosen' : null,
              indicators: null,
              id: `cast-card-${idx}`,
              title: data.char_name
            };
            return renderCastingCard(data, cardOptions);
          }).join('')}
        </div>`;
      }

      main.innerHTML = `
        ${headerHTML()}
        ${summaryHTML(allApplications.length, activeCount, castCount, charsCastCount)}
        ${viewTabsHTML()}
        ${gridHTML}
      `;
    }

    // ── Callback Mode view ─────────────────────────────────────

      // Sub-filter by status
      let list = allCalled;
      if (cbStatusFilter === 'attended') list = allCalled.filter(a => a.callback_status === 'attended');
      if (cbStatusFilter === 'complete') list = allCalled.filter(a => a.callback_status === 'complete');
      // Group filter
      if (cbGroupFilter) list = list.filter(a => a.callback_group_id === cbGroupFilter);

      const statusCounts = {};
      allCalled.forEach(a => { statusCounts[a.callback_status] = (statusCounts[a.callback_status] || 0) + 1; });

      // Sub-filter pills
      const subFilters = [
        ['all', `All Callbacks`, allCalled.length],
        ['attended', 'Attended', statusCounts['attended'] || 0],
        ['complete', 'Complete', statusCounts['complete'] || 0],
      ].map(([val, label, count]) =>
        `<button class="filter-btn${cbStatusFilter === val ? ' active' : ''}" data-cb-status-filter="${val}" style="${cbStatusFilter===val?'background:rgba(239,171,69,0.15);border-color:rgba(239,171,69,0.5);color:#efab45;':''}">
          ${label}${count > 0 ? `<span class="filter-count">${count}</span>` : ''}

      ).join('');

      // Group filter pills
      const groupPills = allCallbackGroups.map(g =>
        `<button class="filter-btn${cbGroupFilter === g.id ? ' active' : ''}" data-cb-group-filter="${esc(g.id)}"
          style="border-color:${g.colour}44;color:${cbGroupFilter===g.id ? g.colour : '#7a7490'};${cbGroupFilter===g.id ? `background:${g.colour}18;` : ''}">
          <span style="width:7px;height:7px;border-radius:50%;background:${g.colour};display:inline-block;margin-right:0.15rem;"></span>
          ${esc(g.name)}

      ).join('');

      const tableHTML = list.length === 0
        ? `<div class="empty-state"><strong>${allCalled.length === 0 ? 'No callbacks yet.' : 'No performers match this filter.'}</strong>${allCalled.length === 0 ? 'In Audition Mode, click "Call Back" on any performer to add them here.' : ''}</div>`
        : `<div class="applications-table-wrap">
            <table class="applications-table">
              <thead>
                <tr>
                  <th>Performer</th>
                  <th>Group</th>
                  <th>Callback Notes</th>
                  <th>Callback Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${list.map(a => {
                  const group = allCallbackGroups.find(g => g.id === a.callback_group_id);
                  const groupChip = group
                    ? `<span class="cb-group-chip" style="color:${group.colour};border-color:${group.colour}44;background:${group.colour}12;">${esc(group.name)}</span>`
                    : '';
                  const groupOpts = `<option value="">No group</option>` +
                    allCallbackGroups.map(g => `<option value="${esc(g.id)}" ${a.callback_group_id === g.id ? 'selected' : ''}>${esc(g.name)}</option>`).join('');
                  const cbNotes = a.callback_notes
                    ? `<span class="notes-text" title="${esc(a.callback_notes)}">${esc(a.callback_notes)}</span>`
                    : `<span class="notes-empty" style="font-size:0.75rem;color:rgba(122,116,144,0.4);">—</span>`;
                  const cbBookings = getBookingsForApplicant(a);
                  const cbSlotLines = cbBookings.map(b => {
                    const dt = fmtSlotDateTime(b);
                    const label = b._session?.name || 'Audition';
                    return dt ? `<div style="font-size:0.7rem;color:#7a7490;margin-top:0.15rem;">📅 ${esc(label)}: ${esc(dt)}</div>` : '';
                  }).filter(Boolean).join('');
                  return `<tr>
                    <td>
                      <button class="applicant-name-btn" data-profile-app="${esc(a.id)}">${esc(a.applicant_name || a.applicant_email || 'Performer')}</button>
                      <div class="applicant-email">${esc(a.applicant_email || '')}</div>
                      ${cbSlotLines}
                    </td>
                    <td>
                      <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">
                        ${groupChip}
                        <select class="cb-group-select" data-cb-group-assign="${esc(a.id)}">
                          ${groupOpts}

                      </div>
                    </td>
                    <td class="notes-cell">${cbNotes}</td>
                    <td>
                      <select class="cb-status-select" data-cb-status="${esc(a.id)}">
                        <option value="selected" ${a.callback_status==='selected'?'selected':''}>Selected</option>
                        <option value="attended" ${a.callback_status==='attended'?'selected':''}>Attended</option>
                        <option value="complete" ${a.callback_status==='complete'?'selected':''}>Complete</option>
                      </select>
                    </td>
                    <td>
                      <button class="cb-btn is-called" data-cb-toggle="${esc(a.id)}" title="Remove from callbacks" style="font-size:0.68rem;">✕ Remove</button>
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>`;

      main.innerHTML = `
        ${headerHTML()}
        <div class="cb-filter-bar">
          <span class="cb-filter-label">Status:</span>
          ${subFilters}
          ${allCallbackGroups.length ? `<span class="cb-filter-label" style="margin-left:0.5rem;">Group:</span>${groupPills}` : ''}

      const newStatus = (app.callback_status && app.callback_status !== 'none') ? 'none' : 'selected';
      await updateCastingApplication(appId, { callback_status: newStatus }, {
        errorMessage: 'Could not update callback status.',
        successMessage: newStatus === 'selected' ? 'Added to callbacks.' : 'Removed from callbacks.',
      });

      await sb.from('audition_applications').update({ callback_group_id: null }).eq('callback_group_id', groupId);
      allApplications.forEach(a => { if (a.callback_group_id === groupId) a.callback_group_id = null; });
      await sb.from('callback_groups').delete().eq('id', groupId);
      allCallbackGroups = allCallbackGroups.filter(g => g.id !== groupId);
      renderCbGroupsList();

    // ── Headshot upload ────────────────────────────────────────
    function clioTriggerHeadshotUpload(btn) {
      const appId     = btn.dataset.appId;
      const profileId = btn.dataset.profileId || '';
      const oldUrl    = btn.dataset.oldUrl    || null;
      const input = document.getElementById('clio-headshot-input');
      if (!input) return;
      input.onchange = () => clioUploadHeadshot(appId, profileId, oldUrl, input.files[0]);
      input.value = '';
      input.click();
    }

    async function clioUploadHeadshot(appId, profileId, oldUrl, file) {
      if (!file) return;
      const btn = document.getElementById('clio-headshot-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Uploading…'; }

      try {
        const ext  = (file.name.split('.').pop() || 'jpg').toLowerCase();
        const path = `${productionId}/${appId}.${ext}`;

        // Delete old file from storage if it exists and was in our bucket
        if (oldUrl && oldUrl.includes('audition-headshots')) {
          const oldPath = oldUrl.split('/audition-headshots/')[1]?.split('?')[0];
          if (oldPath) {
            await sb.storage.from('audition-headshots').remove([oldPath]).catch(() => {});
          }
        }

        // Upload new file
        const { data: upData, error: upErr } = await sb.storage
          .from('audition-headshots')
          .upload(path, file, { upsert: true, contentType: file.type });
        if (upErr) throw upErr;

        const { data: urlData } = sb.storage.from('audition-headshots').getPublicUrl(upData.path);
        const newUrl = urlData?.publicUrl ? urlData.publicUrl + '?t=' + Date.now() : null;
        if (!newUrl) throw new Error('Could not get public URL');

        // Update audition_applications
        await sb.from('audition_applications').update({ headshot_url: newUrl }).eq('id', appId).catch(() => {});

        // Also update profiles table if linked
        if (profileId) {
          await sb.from('profiles').update({ headshot_url: newUrl }).eq('id', profileId).catch(() => {});
        }

        // Update in-memory records
        const app = allApplications.find(a => a.id === appId);
        if (app) app.headshot_url = newUrl;
        const profile = allProfiles.find(p => p.id === profileId);
        if (profile) profile.headshot_url = newUrl;

        // Update the headshot in the panel immediately
        const wrap = document.getElementById('clio-headshot-wrap');
        if (wrap) wrap.innerHTML = `<img src="${esc(newUrl)}" alt="Headshot" style="width:100%;height:100%;object-fit:cover;object-position:center top;" />`;
        if (btn) { btn.disabled = false; btn.textContent = 'Change headshot'; btn.dataset.oldUrl = newUrl; }

        // Re-render all views
        try { renderApplicants(); } catch {}
        try { renderCastList(); } catch {}
      } catch (err) {
        console.error('[Clio] Headshot upload failed:', err);
        if (btn) { btn.disabled = false; btn.textContent = 'Upload failed — try again'; }
      }
    }

    // ── Reschedule (Fates integration) ────────────────────────
    async function openPanelReschedule(bookingId, sessionId, appId) {
      _reschedulingBookingId = bookingId;
      _reschedulingSessionId = sessionId;
      _reschedulingAppId     = appId;

      const slotSection = document.getElementById('panel-reschedule-slots');
      if (!slotSection) return;
      slotSection.style.display = 'block';
      slotSection.innerHTML = '<div style="font-size:0.78rem;color:#7a7490;padding:0.35rem 0;">Loading slots…</div>';

      try {
        const { data: slots } = await sb
          .from('audition_time_slots')
          .select('id, slot_time, slot_date, is_available, booked_count, capacity')
          .eq('session_id', sessionId)
          .order('slot_date').order('slot_time');

        if (!slots?.length) {
          slotSection.innerHTML = '<div style="font-size:0.78rem;color:#9a90b0;padding:0.35rem 0;">No slots found for this session.</div>';
          return;
        }

        const currentBooking = allBookings.find(b => b.id === bookingId);
        const byDate = {};
        slots.forEach(s => { const d = s.slot_date || 'TBD'; (byDate[d] = byDate[d] || []).push(s); });

        function fmtTime(t) {
          const m = String(t || '').match(/^(\d{1,2}):(\d{2})/);
          if (!m) return t || '?';
          const h = parseInt(m[1], 10), mn = m[2];
          return `${h % 12 || 12}:${mn} ${h >= 12 ? 'PM' : 'AM'}`;
        }

        slotSection.innerHTML = `
          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#7a7490;margin-bottom:0.6rem;">Pick a new time</div>
          ${Object.entries(byDate).map(([date, daySlots]) => {
            const dateLabel = date !== 'TBD'
              ? new Date(date + 'T00:00:00').toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric' })
              : 'TBD';
            return `<div style="margin-bottom:0.65rem;">
              <div style="font-size:0.68rem;color:#9a90b0;font-weight:600;margin-bottom:0.3rem;">${esc(dateLabel)}</div>
              <div style="display:flex;flex-wrap:wrap;gap:0.3rem;">
                ${daySlots.map(slot => {
                  const isCurrent = slot.id === currentBooking?.slot_id;
                  const isFull    = !slot.is_available && !isCurrent;
                  return `<button
                    data-new-slot-id="${esc(slot.id)}"
                    ${isFull ? 'disabled' : ''}
                    style="padding:0.28rem 0.65rem;border-radius:20px;font-size:0.73rem;font-weight:600;font-family:inherit;
                      cursor:${isFull ? 'not-allowed' : 'pointer'};
                      border:1px solid ${isCurrent ? '#572e88' : isFull ? 'rgba(122,116,144,0.18)' : 'rgba(87,46,136,0.22)'};
                      background:${isCurrent ? 'rgba(87,46,136,0.13)' : isFull ? 'rgba(122,116,144,0.05)' : '#fff'};
                      color:${isCurrent ? '#572e88' : isFull ? 'rgba(122,116,144,0.4)' : '#352756'};">
                    ${esc(fmtTime(slot.slot_time))}${isCurrent ? ' ✓' : isFull ? ' full' : ''}
                  </button>`;
                }).join('')}
              </div>
            </div>`;
          }).join('')}
          <button onclick="closePanelReschedule()" style="margin-top:0.35rem;width:100%;padding:0.38rem;border-radius:7px;border:1px solid rgba(87,46,136,0.15);background:transparent;color:#7a7490;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:inherit;">Cancel</button>`;

        slotSection.querySelectorAll('[data-new-slot-id]:not([disabled])').forEach(btn => {
          btn.addEventListener('click', () => confirmCastingReschedule(btn.dataset.newSlotId));
        });
      } catch {
        slotSection.innerHTML = '<div style="font-size:0.78rem;color:#f08080;padding:0.35rem 0;">Could not load slots.</div>';
      }
    }

    function closePanelReschedule() {
      _reschedulingBookingId = null;
      _reschedulingSessionId = null;
      _reschedulingAppId     = null;
      const slotSection = document.getElementById('panel-reschedule-slots');
      if (slotSection) { slotSection.style.display = 'none'; slotSection.innerHTML = ''; }
    }

    async function confirmCastingReschedule(newSlotId) {
      if (!_reschedulingBookingId) return;
      const bookingId   = _reschedulingBookingId;
      const appId       = _reschedulingAppId;
      const panelAppId  = openPanelAppId;
      const app = allApplications.find(item => item.id === appId);

      if (!appId || !productionId || !app) {
        showToast('Could not reschedule: missing ID.', true);
        closePanelReschedule();
        return;
      }

      const slotSection = document.getElementById('panel-reschedule-slots');
      if (slotSection) slotSection.innerHTML = '<div style="font-size:0.78rem;color:#7a7490;padding:0.35rem 0;">Saving…</div>';

      const applicationUpdate = buildApplicationSlotUpdate(app, _reschedulingSessionId, newSlotId);
      const { error: appErr } = await sb
        .from('audition_applications')
        .update(applicationUpdate)
        .eq('id', appId)
        .eq('production_id', productionId);

      if (appErr) {
        showToast('Could not reschedule: ' + appErr.message, true);
        closePanelReschedule();
        return;
      }

      app.slot_assignments = applicationUpdate.slot_assignments || [];
      if ('time_slot_id' in applicationUpdate) app.time_slot_id = applicationUpdate.time_slot_id;
      if ('slot_id' in applicationUpdate) app.slot_id = applicationUpdate.slot_id;

      if (!String(bookingId || '').startsWith('application-') && bookingId) {
        const { error: bkErr } = await sb
          .from('audition_bookings')
          .update({ slot_id: newSlotId })
          .eq('id', bookingId)
          .eq('production_id', productionId);

        if (bkErr) {
          showToast('Could not reschedule: ' + bkErr.message, true);
          closePanelReschedule();
          return;
        }
      }

      try {
        await reloadCastingScheduleState();
      } catch (e) {
        console.warn('[Clio reschedule] Could not reload bookings', e);
      }

      showToast('Rescheduled.');
      _reschedulingBookingId = null;
      _reschedulingSessionId = null;
      _reschedulingAppId     = null;
      render();
      if (panelAppId) openProfilePanel(panelAppId);
    }

    // ── Notify modal ───────────────────────────────────────────

    // Each performer status maps to an email_templates category.
    // No template = no send. Every email must come from a template the org has set up.
    const NOTIFY_TEMPLATE_CATEGORY = {
      callback: 'callback',
      cast:     'cast_announcement',
      not_cast: 'not_cast',
    };

    const NOTIFY_STATUS_LABEL = {
      callback: 'Callback Invite',
      cast:     'Cast Announcement',
      not_cast: 'Not Cast',
    };

    function notifyFmtDate(dateStr) {
      if (!dateStr) return '';
      try {
        return new Date(`${dateStr}T00:00:00`).toLocaleDateString('en-CA', {
          weekday: 'long',
          month: 'long',
          day: 'numeric',
          year: 'numeric'
        });
      } catch {
        return String(dateStr);
      }
    }

    function notifyFmtTime(timeStr) {
      if (!timeStr) return '';
      try {
        const parts = String(timeStr).includes('T')
          ? String(timeStr).split('T')[1].split(':')
          : String(timeStr).split(':');
        const h = Number(parts[0]);
        const m = Number(parts[1] || 0);
        const ampm = h >= 12 ? 'pm' : 'am';
        const h12 = h % 12 || 12;
        return m === 0 ? `${h12}${ampm}` : `${h12}:${String(m).padStart(2, '0')}${ampm}`;
      } catch {
        return String(timeStr);
      }
    }

    function notifyFirstDefined(...values) {
      for (const value of values) {
        if (value === null || value === undefined) continue;
        const str = String(value).trim();
        if (str) return str;
      }
      return '';
    }

    function notifyNormalizeLookupKey(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ');
    }

    function notifyLookupFlexibleValue(source, rawKey) {
      const target = notifyNormalizeLookupKey(rawKey);
      for (const [key, value] of Object.entries(source || {})) {
        if (notifyNormalizeLookupKey(key) === target) return notifyFirstDefined(value);
      }
      return '';
    }

    // Replace {{tokens}} in a template string with real performer and production values
    function substituteTemplateTokens(text, app) {
      if (!text) return '';
      const firstName = (app.applicant_name || '').split(' ')[0] || 'Performer';
      const prod = _prod || {};
      const bookings = getBookingsForApplicant(app);
      const firstBooking = bookings[0] || null;
      const slotDate = firstBooking?._slot?.slot_date || firstBooking?.slot_date || '';
      const slotTime = firstBooking?._slot?.slot_time || firstBooking?.slot_time || '';
      const callbackBooking = bookings.find(booking => {
        const sessionName = String(booking?._session?.name || '').toLowerCase();
        return sessionName.includes('callback');
      }) || null;
      const callbackDate = callbackBooking?._slot?.slot_date || callbackBooking?.slot_date || '';
      const callbackTime = callbackBooking?._slot?.slot_time || callbackBooking?.slot_time || '';
      const roleName = notifyFirstDefined(app.role_name, app.character_name);
      const showDates = prod?.start_date && prod?.end_date
        ? `${notifyFmtDate(prod.start_date)} – ${notifyFmtDate(prod.end_date)}`
        : notifyFmtDate(prod?.start_date || '');
      const tokenValues = {
        '{{performer_name}}': app.applicant_name || 'Performer',
        '{{performer_first_name}}': firstName,
        '{{performer_pronouns}}': app.pronouns || '',
        '{{performer_email}}': app.applicant_email || '',
        '{{show_name}}': prod.title || '',
        '{{show_subtitle}}': prod.subtitle || '',
        '{{show_venue}}': prod.venue || '',
        '{{show_dates}}': showDates,
        '{{audition_session}}': firstBooking?._session?.name || '',
        '{{audition_date}}': notifyFmtDate(slotDate),
        '{{audition_time}}': notifyFmtTime(slotTime),
        '{{audition_venue}}': prod.venue || '',
        '{{audition_notes}}': '',
        '{{booking_link}}': productionId ? `https://buildtheshow.com/audition-info?prod=${productionId}` : '',
        '{{org_name}}': (_org && _org.name) || prod.org_name || '',
        '{{director_name}}': prod.director || '',
        '{{role_name}}': roleName,
        '{{role_type}}': '',
        '{{callback_date}}': notifyFmtDate(callbackDate),
        '{{callback_time}}': notifyFmtTime(callbackTime),
        '{{callback_venue}}': prod.venue || '',
        '{{rehearsal_start_date}}': notifyFmtDate(prod.start_date || ''),
        '{{rehearsal_schedule}}': '',
        '{{opening_night}}': notifyFmtDate(prod.end_date || ''),
      };
      const productionFieldValues = {
        ...(prod || {}),
        org_name: (_org && _org.name) || prod.org_name || '',
        director_name: prod.director || '',
        show_dates: showDates,
      };
      const performerFieldValues = {
        ...(app || {}),
        performer_name: app.applicant_name || 'Performer',
        performer_first_name: firstName,
        performer_email: app.applicant_email || '',
        role_name: roleName,
      };
      const customFieldValues = (app && typeof app.custom_answers === 'object' && !Array.isArray(app.custom_answers))
        ? app.custom_answers
        : {};
      let result = String(text || '');
      Object.entries(tokenValues).forEach(([token, value]) => {
        result = result.replaceAll(token, value);
      });
      result = result.replace(/\{\{\s*(custom|production|performer|booking|app|organization|org)\s*:\s*([^}]+)\}\}/gi, (_match, scope, rawKey) => {
        const scopeName = String(scope || '').toLowerCase();
        const key = String(rawKey || '').trim();
        let value = '';
        if (scopeName === 'custom') value = notifyLookupFlexibleValue(customFieldValues, key);
        if (scopeName === 'production') value = notifyLookupFlexibleValue(productionFieldValues, key);
        if (scopeName === 'performer' || scopeName === 'booking' || scopeName === 'app') value = notifyLookupFlexibleValue(performerFieldValues, key);
        if (scopeName === 'organization' || scopeName === 'org') value = notifyLookupFlexibleValue({ name: (_org && _org.name) || prod.org_name || '', email: (_org && _org.email) || '' }, key);
        return value;
      });
      return result;
    }

    async function openNotifyModal(appId, forceCategory) {
      const app = allApplications.find(a => a.id === appId);
      if (!app) return;

      const status   = forceCategory ? Object.keys(NOTIFY_TEMPLATE_CATEGORY).find(k => NOTIFY_TEMPLATE_CATEGORY[k] === forceCategory) || app.status : app.status;
      const category = forceCategory || NOTIFY_TEMPLATE_CATEGORY[status];

      // Reset modal state
      document.getElementById('notify-modal-app-id').value        = appId;
      document.getElementById('notify-modal-sub').textContent      = `Send a ${NOTIFY_STATUS_LABEL[status] || 'notification'} to this performer.`;
      document.getElementById('notify-modal-to').innerHTML         = `To: <strong>${esc(app.applicant_name || 'Performer')}</strong> &lt;${esc(app.applicant_email || '')}&gt;`;
      document.getElementById('notify-modal-sending').style.display     = 'none';
      document.getElementById('notify-modal-no-template').style.display = 'none';
      document.getElementById('notify-modal-fields').style.display      = 'block';
      document.getElementById('notify-send-btn').disabled               = false;
      document.getElementById('notify-modal').classList.add('open');

      // Fetch the template for this status — block send if none exists
      try {
        const { data } = await sb.from('email_templates')
          .select('*')
          .eq('production_id', productionId)
          .eq('category', category)
          .order('created_at', { ascending: false })
          .limit(1);

        const template = data?.[0];
        if (!template) {
          document.getElementById('notify-modal-fields').style.display      = 'none';
          document.getElementById('notify-send-btn').disabled               = true;
          document.getElementById('notify-modal-no-template').style.display = 'block';
          document.getElementById('notify-modal-no-template').innerHTML     =
            `No <strong>${NOTIFY_STATUS_LABEL[status] || 'notification'}</strong> template found for this production. Create one in the <strong>Emails</strong> tab of the workspace first.`;
          return;
        }

        document.getElementById('notify-modal-subject').value  = substituteTemplateTokens(template.subject, app);
        document.getElementById('notify-modal-textarea').value = substituteTemplateTokens(template.body, app);
        document.getElementById('notify-modal-textarea').focus();
      } catch {
        document.getElementById('notify-modal-subject').value  = '';
        document.getElementById('notify-modal-textarea').value = '';
      }
    }

    function closeNotifyModal() {
      document.getElementById('notify-modal').classList.remove('open');
    }

    async function sendNotification() {
      const appId   = document.getElementById('notify-modal-app-id').value;
      const subject = document.getElementById('notify-modal-subject').value.trim();
      const message = document.getElementById('notify-modal-textarea').value.trim();
      const app     = allApplications.find(a => a.id === appId);
      if (!app || !message) return;

      const sendBtn   = document.getElementById('notify-send-btn');
      const sendingEl = document.getElementById('notify-modal-sending');
      sendBtn.disabled = true;
      sendingEl.style.display = 'block';

      try {
        const { data, error } = await sb.functions.invoke('send-email', {
          body: {
            applicant_id: app.id,
            production_id: productionId,
            status: app.status,
            subject: subject || undefined,
            message,
            context: {
              show_name:     _prod?.title || '',
              show_subtitle: _prod?.subtitle || '',
              org_name:      (_org && _org.name) || _prod?.org_name || '',
              org_email:     (_org && _org.email) || '',
              director_name: _prod?.director || '',
              production: {
                title:           _prod?.title || '',
                subtitle:        _prod?.subtitle || '',
                venue:           _prod?.venue || '',
                director:        _prod?.director || '',
                organization_id: _prod?.organization_id || '',
                start_date:      _prod?.start_date || '',
                end_date:        _prod?.end_date || '',
                org_name:        (_org && _org.name) || _prod?.org_name || '',
              },
            },
          },
        });
        if (error) throw error;
        if (!data?.sent) throw new Error(data?.error || 'Email was not sent.');

        closeNotifyModal();
        showToast('Email sent.');
      } catch (err) {
        sendingEl.style.display = 'none';
        sendBtn.disabled = false;
        showToast(`Could not send email: ${err.message}`, true);
      }
    }

    // ── Event delegation ───────────────────────────────────────
    function bindEvents() {
      document.addEventListener('click', e => {
        // View tab
        const viewTab = e.target.closest('.view-tab');
        if (viewTab && viewTab.dataset.view) {
          activeView = viewTab.dataset.view;
          render(); return;
        }
        // Callback status sub-filter (callback mode)
        const filterBtn = e.target.closest('.filter-btn');
        if (filterBtn && filterBtn.dataset.cbStatusFilter) {
          cbStatusFilter = filterBtn.dataset.cbStatusFilter;
          renderCallbackMode(); return;
        }
        // Callback group filter
        if (filterBtn && filterBtn.dataset.cbGroupFilter !== undefined) {
          cbGroupFilter = filterBtn.dataset.cbGroupFilter || null;
          renderCallbackMode(); return;
        }
        // Open profile panel (click or keyboard on clio card wrappers)
        const profileBtn = e.target.closest('[data-profile-app]');
        if (profileBtn) {
          openProfilePanel(profileBtn.dataset.profileApp); return;
        }
        // Open reschedule slot picker
        const rescheduleBtn = e.target.closest('[data-reschedule-booking]');
        if (rescheduleBtn) {
          openPanelReschedule(
            rescheduleBtn.dataset.rescheduleBooking,
            rescheduleBtn.dataset.rescheduleSession,
            rescheduleBtn.dataset.rescheduleApp
          ); return;
        }
        // Call Back toggle button
        const cbToggle = e.target.closest('[data-cb-toggle]');
        if (cbToggle) {
          toggleCallBack(cbToggle.dataset.cbToggle); return;
        }
        // Open notes modal (from table)
        const notesBtn = e.target.closest('[data-notes-app]');
        if (notesBtn) {
          openNotesModal(notesBtn.dataset.notesApp); return;
        }
        // Callback rating star
        const cbStar = e.target.closest('[data-cb-rate]');
        if (cbStar) {
          const appId = cbStar.dataset.cbRateApp;
          const cat   = cbStar.dataset.cbRate;
          const val   = parseInt(cbStar.dataset.cbRateVal, 10);
          saveCallbackRating(appId, cat, val);
          // Update stars visually without full re-render
          const starsRow = cbStar.closest('.cb-rating-stars');
          if (starsRow) {
            starsRow.querySelectorAll('.cb-star').forEach((s, i) => {
              s.classList.toggle('filled', i < val);
            });
          }
          return;
        }
        // Callback group colour swatch
        const colourSwatch = e.target.closest('[data-cb-colour]');
        if (colourSwatch) {
          selectedGroupColour = colourSwatch.dataset.cbColour;
          document.querySelectorAll('.cb-colour-swatch').forEach(s => s.classList.remove('selected'));
          colourSwatch.classList.add('selected');
          return;
        }
        // Delete callback group
        const deleteGroupBtn = e.target.closest('[data-cb-delete-group]');
        if (deleteGroupBtn) {
          deleteCallbackGroup(deleteGroupBtn.dataset.cbDeleteGroup); return;
        }
        // Callback group modal close on backdrop
        const cbModal = e.target.closest('.cb-modal-overlay');
        if (cbModal && e.target === cbModal) { closeCbGroupModal(); return; }
      });

      // Enter/Space on focusable clio card wrappers
      document.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          const card = e.target.closest('[data-profile-app]');
          if (card) { e.preventDefault(); openProfilePanel(card.dataset.profileApp); }
        }
      });

      // Enter key in group modal
      document.getElementById('cb-group-name-input')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') createCallbackGroup();
      });

      // Status change
      document.addEventListener('change', async e => {
        // Main status
        const statusSel = e.target.closest('.status-select');
        if (statusSel) {
          const appId     = statusSel.dataset.id;
          const newStatus = statusSel.value;
          const prev      = allApplications.find(a => a.id === appId)?.status;
          const error = await updateCastingApplication(appId, { status: newStatus }, {
            errorMessage: 'Could not update status.',
            successMessage: 'Status updated.',
          });
          if (error) statusSel.value = prev;
          return;
        }

        // Character assignment
        const charSel = e.target.closest('.char-assign-select');
        if (charSel) {
          const appId  = charSel.dataset.appId;
          const charId = charSel.value || null;
          await updateCastingApplication(appId, { character_id: charId }, {
            errorMessage: 'Could not assign character.',
            successMessage: 'Character assigned.',
          });
          return;
        }

        // Callback sub-status (from table row)
        const cbStatusSel = e.target.closest('.cb-status-select');
        if (cbStatusSel && cbStatusSel.dataset.cbStatus) {
          const appId  = cbStatusSel.dataset.cbStatus;
          const status = cbStatusSel.value;
          await updateCallbackStatus(appId, status);
          return;
        }

        // Callback group assignment
        const cbGroupSel = e.target.closest('.cb-group-select');
        if (cbGroupSel && cbGroupSel.dataset.cbGroupAssign) {
          await assignCallbackGroup(cbGroupSel.dataset.cbGroupAssign, cbGroupSel.value);
          if (boardMode === 'callback') renderCallbackMode();
          return;
        }
      });

      document.getElementById('notes-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeNotesModal();
      });

      document.getElementById('notify-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeNotifyModal();
      });
    }

    async function loadCastingData() {
      const [prodResult, charsResult, groupsResult] = await Promise.all([
        sb.from('productions').select('*').eq('id', productionId).single(),
        sb.from('production_characters').select('*').eq('production_id', productionId).order('sort_order').order('created_at'),
        sb.from('callback_groups').select('*').eq('production_id', productionId).order('created_at'),
      ]);

      if (prodResult.error || !prodResult.data) {
        main.innerHTML = `<div class="loading-state" style="color:#f08080;">Production not found.</div>`;
        return false;
      }

      _prod             = prodResult.data;
      _org              = null;
      allCharacters     = charsResult.data || [];
      allCallbackGroups = groupsResult.data || [];

      if (_prod.organization_id) {
        try {
          const { data: org } = await sb
            .from('organizations')
            .select('id, name, email')
            .eq('id', _prod.organization_id)
            .maybeSingle();
          _org = org || null;
        } catch {
          _org = null;
        }
      }

      try {
        const { data: apps } = await sb
          .from('audition_applications')
          .select('id, status, name, email, role_interest, notes, org_notes, character_id, profile_id, headshot_url, callback_status, callback_notes, callback_rating, callback_group_id, session_id, slot_id, time_slot_id, slot_assignments, custom_answers, attendance_mode')
          .eq('production_id', productionId)
          .order('created_at', { ascending: false });
        allApplications = (apps || []).map(a => ({
          ...a,
          applicant_name:  a.name,
          applicant_email: a.email,
          role_name:       a.role_interest,
          custom_answers:  a.custom_answers || {},
          notes:           a.org_notes,
          performer_notes: a.notes,
        }));
      } catch {
        allApplications = [];
      }

      const profileIds = [...new Set(allApplications.filter(a => a.profile_id).map(a => a.profile_id))];
      if (profileIds.length > 0) {
        try {
          const { data: profs } = await sb
            .from('profiles')
            .select('id, credit_name, legal_first_name, legal_last_name, date_of_birth, headshot_url, sections')
            .in('id', profileIds);
          allProfiles = profs || [];
        } catch {
          allProfiles = [];
        }
      } else {
        allProfiles = [];
      }

      try {
        await reloadCastingScheduleState();
      } catch {
        allBookings = [];
        allSessionsById = {};
        allSlotsById = {};
      }

      return true;
    }

    function subscribeCastingRealtime() {
      if (castingRealtimeChannel) {
        try { sb.removeChannel(castingRealtimeChannel); } catch {}
        castingRealtimeChannel = null;
      }

      castingRealtimeChannel = sb
        .channel(`casting-live-${productionId}`)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'audition_applications', filter: `production_id=eq.${productionId}` }, async () => {
          if (await loadCastingData()) render();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'audition_bookings', filter: `production_id=eq.${productionId}` }, async () => {
          if (await loadCastingData()) render();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'production_characters', filter: `production_id=eq.${productionId}` }, async () => {
          if (await loadCastingData()) render();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'callback_groups', filter: `production_id=eq.${productionId}` }, async () => {
          if (await loadCastingData()) render();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'audition_sessions', filter: `production_id=eq.${productionId}` }, async () => {
          if (await loadCastingData()) render();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'audition_time_slots' }, async () => {
          if (await loadCastingData()) render();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, async () => {
          if (await loadCastingData()) render();
        })
        .subscribe();
    }

    // ── Init ───────────────────────────────────────────────────
    async function init() {
      if (!productionId) { window.location.href = '../../org-dashboard.html'; return; }

      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../../../Members/Account/login.html'; return; }

      if (!await loadCastingData()) return;
      bindEvents();
      render();
      subscribeCastingRealtime();
    }

    init();
  </script>
