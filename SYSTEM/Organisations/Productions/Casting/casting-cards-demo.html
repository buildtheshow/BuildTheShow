<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casting Cards Demo - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css" />
  <link rel="stylesheet" href="/ASSETS/styles/casting-card.css" />
  <style>
    /* Demo page styling */
    .demo-main {
      position: relative;
      z-index: 10;
      padding: 3rem 2rem 6rem;
    }
    
    .demo-header {
      margin-bottom: 2rem;
    }
    
    .demo-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #f0ecf8;
      margin-bottom: 0.5rem;
    }
    
    .demo-header p {
      color: #7a7490;
      font-size: 0.95rem;
    }
    
    .demo-section {
      margin-bottom: 3rem;
    }
    
    .demo-section h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #d4c4f0;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(87, 46, 136, 0.3);
    }
    
    .demo-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: rgba(15, 14, 28, 0.5);
      border-radius: 10px;
    }
    
    .demo-legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #a89ec0;
    }
    
    .demo-legend-icon {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }
    
    .light-page { background: #f8f7fc; }
    .light-page .grid-bg { display: none; }
    .light-page .demo-header h1 { color: #1a1530; }
    .light-page .demo-header p { color: #5a5070; }
    .light-page .demo-section h2 { color: #572e88; border-color: rgba(87, 46, 136, 0.2); }
    .light-page .demo-legend { background: #ffffff; border: 1px solid rgba(87, 46, 136, 0.15); }
    .light-page .demo-legend-item { color: #4a3f62; }
    
    @media (max-width: 680px) {
      .demo-main { padding: 2rem 1rem 5rem; }
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>

  <header class="nav">
    <div class="nav-logo">
      <a href="../../../HOME/index.html">
        <img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" class="nav-logo-img" />
      </a>
    </div>
    <nav class="nav-links">
      <a href="casting.html" class="nav-link">← Back to Casting</a>
    </nav>
  </header>

  <main class="demo-main">
    <div class="demo-header">
      <h1>Casting Card Demo</h1>
      <p>Polaroid-style casting card component with icon overlays</p>
    </div>
    
    <!-- Legend -->
    <div class="demo-legend">
      <div class="demo-legend-item">
        <div class="demo-legend-icon" style="background:#e91e63;color:#fff;">△</div>
        <span>Woman / Girl</span>
      </div>
      <div class="demo-legend-item">
        <div class="demo-legend-icon" style="background:#2196f3;color:#fff;">□</div>
        <span>Man / Boy</span>
      </div>
      <div class="demo-legend-item">
        <div class="demo-legend-icon" style="background:#9c27b0;color:#fff;">⬡</div>
        <span>Non-binary (They/Them)</span>
      </div>
      <div class="demo-legend-item">
        <div class="demo-legend-icon" style="background:linear-gradient(135deg,#e91e63 50%,#2196f3 50%);color:#fff;">◉</div>
        <span>Multiple categories</span>
      </div>
      <div class="demo-legend-item">
        <div class="demo-legend-icon" style="background:#f59e0b;border-radius:50%;">A</div>
        <span>Open to anything</span>
      </div>
      <div class="demo-legend-item">
        <div class="demo-legend-icon" style="background:#8b5cf6;border-radius:50%;">E</div>
        <span>Ensemble-focused</span>
      </div>
      <div class="demo-legend-item">
        <div class="demo-legend-icon" style="background:#1f2937;border-radius:50%;">S</div>
        <span>Specific roles</span>
      </div>
    </div>
    
    <!-- Default Size Grid -->
    <div class="demo-section">
      <h2>Default Size (180px+)</h2>
      <div id="default-grid"></div>
    </div>
    
    <!-- Small Size Grid -->
    <div class="demo-section">
      <h2>Small Size (160px max)</h2>
      <div id="small-grid"></div>
    </div>
    
    <!-- Light Background Demo -->
    <div class="light-page" style="padding:2rem;border-radius:14px;margin-top:2rem;">
      <div class="demo-section">
        <h2>Light Background Variant</h2>
        <div id="light-grid"></div>
      </div>
    </div>
  </main>

  <script defer src="/ASSETS/scripts/casting-card.js"></script>
  <script>
    // Demo data with various configurations
    const demoData = [
      {
        first_name: "Katie",

        age: 24,
        headshot_url: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=500&fit=crop",
        casting_categories: ["She/Her"],
        role_openness: "open"
      },
      {
        first_name: "Jamie",
        last_name: "Rivera",
        age: 21,
        headshot_url: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=500&fit=crop",
        casting_categories: ["He/Him"],
        role_openness: "ensemble"
      },
      {
        first_name: "Alex",
        last_name: "Chen",
        age: 28,
        headshot_url: "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=400&h=500&fit=crop",
        casting_categories: ["They/Them"],
        role_openness: "specific"
      },
      {
        first_name: "Morgan",
        last_name: "Taylor",
        age: 19,
        headshot_url: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=400&h=500&fit=crop",
        casting_categories: ["She/Her", "He/Him"],
        role_openness: "open"
      },
      {
        first_name: "Jordan",
        last_name: "Lee",
        age: 32,
        headshot_url: "", // No image - will show placeholder

      },
      {
        first_name: "Sam",

        casting_categories: ["She/Her"],
        role_openness: "specific"
      }
    ];
    
    // Render default size grid
    document.getElementById('default-grid').innerHTML = renderCastingCardsGrid(demoData, {
      size: 'default',
      hasPadding: true
    });
    
    // Render small size grid
    document.getElementById('small-grid').innerHTML = renderCastingCardsGrid(demoData, {
      size: 'sm',
      hasPadding: true
    });
    
    // Render light background grid
    document.getElementById('light-grid').innerHTML = renderCastingCardsGrid(demoData.slice(0, 3), {
      size: 'default',
      hasPadding: true
    });
    
    // Custom click handler
    function handleCastingCardClick(cardElement) {
      // Get the first name and last age from the card
      const firstName = cardElement.querySelector('.casting-card-first-name')?.textContent;
      const lastAge = cardElement.querySelector('.casting-card-last-age')?.textContent;
      alert(`Clicked on: ${firstName} ${lastAge}`);
    }
  </script>
  <script defer src="/SHARED/Components/text-fit.js"></script>
</body>
</html>
