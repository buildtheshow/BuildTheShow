<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In The Room</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/casting-card.css" />
</head>

<body>

  <!-- NAV -->
  <div id="nav"></div>

  <!-- PAGE -->
  <main class="inroom-shell" id="legacy-inroom-template-host"></main>

  <!-- LOAD NAV -->
  <script>
    fetch('/SHARED/Navigation/production-nav.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('nav').innerHTML = data;
      });
  </script>

  <script src="/SHARED/Components/audition-page-templates.js"></script>
  <script defer src="/SHARED/Components/text-fit.js"></script>
  <script>
    const esc = value => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    function renderLegacyInRoomTemplateHost() {
      const host = document.getElementById('legacy-inroom-template-host');
      if (!host || !window.BTSAuditionTemplates) return;
      host.innerHTML = `
        ${window.BTSAuditionTemplates.renderTemplateById('auditions.in-room.checked-in-strip', {
          esc,
          label: 'Checked In',
          trayCards: ''
        })}
        ${window.BTSAuditionTemplates.renderTemplate({ area: 'auditions', component: 'empty-state' }, {
          title: 'Open In The Room from the production workspace',
          message: 'This legacy route uses the shared audition templates. The live room opens from the production workspace or team portal.'
        })}
        ${window.BTSAuditionTemplates.renderTemplateById('auditions.character-list', {
          esc,
          roleTypeOptions: [],
          roleChipsHtml: ''
        })}
      `;
    }

    renderLegacyInRoomTemplateHost();
  </script>
</body>
</html>
