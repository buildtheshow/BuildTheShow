<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In The Room</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css" />
</head>

<body>

  <!-- NAV -->
  <div id="nav"></div>

  <!-- PAGE -->
  <div class="in-room-page">

    <!-- TOP STRIP -->
    <section class="checked-in-strip">
      <div class="checked-in-label">CHECKED IN</div>
      <div class="checked-in-cards"></div>
    </section>

    <!-- MAIN -->
    <section class="in-room-main">

      <!-- PERFORMER -->
      <div class="current-performer"></div>

      <!-- TAGS -->
      <div class="evaluation-panel"></div>

    </section>

    <!-- NOTES -->
    <section class="in-room-notes"></section>

    <!-- CHARACTERS -->
    <section class="character-list-section">
      <h2 class="character-list-title">CHARACTER LIST</h2>
      <div class="character-list-divider"></div>
      <div class="character-controls"></div>
      <div class="character-list"></div>
    </section>

  </div>

  <!-- LOAD NAV -->
  <script>
    fetch('../../../../SHARED/Navigation/production-nav.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('nav').innerHTML = data;
      });
  </script>

  <script src="/SHARED/Components/text-fit.js"></script>
</body>
</html>
