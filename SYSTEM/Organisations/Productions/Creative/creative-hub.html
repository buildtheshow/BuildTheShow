<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Team Hub - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-law-20260421-2010" />
  <style>
    body { background: #f4f2f8; }

    .hub-welcome { margin-bottom: 2rem; }
    .hub-welcome-title { font-size: 1.5rem; font-weight: 800; color: #1a1530; letter-spacing: 0; margin-bottom: 0.3rem; }
    .hub-welcome-sub { font-size: 0.9375rem; color: #6b5e80; }

    .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.5rem; }
    @media (max-width: 800px) { .hub-grid { grid-template-columns: 1fr; } }

    .hub-card { background: #fff; border: 1.5px solid rgba(87,46,136,0.1); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .hub-card-title { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #9a90b0; margin-bottom: 0.75rem; }

    .cta-band {
      background: #0369a1; border-radius: 14px; padding: 1.25rem 1.75rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    .cta-band-title { font-size: 0.9375rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
    .cta-band-sub   { font-size: 0.8125rem; color: rgba(255,255,255,0.75); }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.25rem; border-radius: 8px; background: #fff;
      color: #0369a1; font-size: 0.875rem; font-weight: 700;
      text-decoration: none; white-space: nowrap; flex-shrink: 0; transition: opacity 0.2s;
    }
    .cta-btn:hover { opacity: 0.88; }

    .loading-state { display: flex; align-items: center; justify-content: center; min-height: 200px; color: #a098b8; }
  </style>
</head>
<body>
  <div class="dashboard-layout">

    <div id="nav"></div>

    <main class="dashboard-main" id="hub-main">
      <div class="loading-state">Getting your hub ready...</div>
    </main>
  </div>

  <script defer src="../../../../SHARED/Components/legal-footer.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    const profileId = sessionStorage.getItem('bts_active_profile_id');
    if (!profileId) window.location.href = '../../../Members/Profiles/profile-select.html';

    function renderHub(profile) {
      const main = document.getElementById('hub-main');
      const firstName = (profile.credit_name || 'there').split(' ')[0];

      main.innerHTML = `
        <div class="hub-welcome">
          <div class="hub-welcome-title">Hey, ${esc(firstName)}.</div>
          <div class="hub-welcome-sub">Find creative team roles that match your experience.</div>
        </div>

        <div class="cta-band">
          <div>
            <div class="cta-band-title">Browse creative team opportunities</div>
            <div class="cta-band-sub">Directors, choreographers, musical directors, and more.</div>
          </div>
          <a href="../../../../PUBLIC/find.html?type=creative_team" class="cta-btn">Find Roles →</a>
        </div>

        <div class="hub-grid">
          <div class="hub-card">
            <div class="hub-card-title">Your Skills</div>
            <p style="font-size:0.875rem;color:#6b5e80;margin-bottom:1rem;">Keep your creative team profile up to date so productions can find you.</p>
            <a href="../../../Members/Profiles/profile-sections.html?id=${esc(profileId)}" style="display:inline-flex;align-items:center;gap:0.35rem;padding:0.45rem 1rem;border-radius:8px;border:1.5px solid rgba(87,46,136,0.2);color:#572e88;font-size:0.8rem;font-weight:600;text-decoration:none;">Update Profile →</a>
          </div>
          <div class="hub-card">
            <div class="hub-card-title">Your Profile</div>
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;">
              ${profile.headshot_url
                ? `<img src="${esc(profile.headshot_url)}" style="width:52px;height:65px;border-radius:6px;object-fit:cover;object-position:top;" alt="" />`
                : `<div style="width:52px;height:65px;border-radius:6px;background:#ede8f5;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">👤</div>`}
              <div>
                <div style="font-size:0.9375rem;font-weight:700;color:#1a1530;">${esc(profile.credit_name || 'Unnamed')}</div>
                <div style="font-size:0.78rem;color:#9a90b0;">${esc(profile.profile_display_id || '')}</div>
              </div>
            </div>
            <a href="../../../Members/Profiles/profile-view.html?id=${esc(profileId)}" style="display:inline-flex;align-items:center;gap:0.35rem;padding:0.45rem 1rem;border-radius:8px;border:1.5px solid rgba(87,46,136,0.2);color:#572e88;font-size:0.8rem;font-weight:600;text-decoration:none;">View Full Profile →</a>
          </div>
        </div>`;
    }

    fetch('../../../../SHARED/Navigation/production-nav.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('nav').innerHTML = html;
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', async () => {
            await sb.auth.signOut();
            sessionStorage.clear();
            window.location.href = '../../../../HOME/index.html';
          });
        }
      });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../../../Members/Account/login.html'; return; }
      const emailEl = document.getElementById('sidebar-email');
      if (emailEl) emailEl.textContent = session.user.email;

      const { data: profile } = await sb.from('profiles')
        .select('id, credit_name, headshot_url, profile_display_id, sections')
        .eq('id', profileId).single();

      if (!profile) { window.location.href = '../../../Members/Profiles/profile-select.html'; return; }
      sessionStorage.setItem('bts_active_profile_sections', JSON.stringify(profile.sections || {}));
      sessionStorage.setItem('bts_active_profile_name', profile.credit_name || 'Unnamed');

      renderHub(profile);
    }

    init();
  </script>
  <script defer src="/SHARED/Components/text-fit.js"></script>
</body>
</html>
