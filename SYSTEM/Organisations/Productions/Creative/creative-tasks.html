<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks - Build The Show</title>
  <link rel="stylesheet" href="../../../../ASSETS/styles/styles.css" />
  <style>
    body { background: #f4f2f8; }
    .dashboard-main { padding: 2rem 2.5rem 3rem; }
    .page-title { font-size: 1.5rem; font-weight: 800; color: #1a1530; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
    .page-subtitle { font-size: 0.9375rem; color: #6b5e80; margin-bottom: 2rem; }
    .coming-soon-card {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      padding: 3rem 2rem;
      text-align: center;
    }
    .coming-soon-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.35; }
    .coming-soon-title { font-size: 1.05rem; font-weight: 700; color: #1a1530; margin-bottom: 0.4rem; }
    .coming-soon-desc { font-size: 0.875rem; color: #9a90b0; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="dashboard-layout">

    <div id="nav"></div>

    <main class="dashboard-main">
      <div class="page-title">Tasks</div>
      <div class="page-subtitle">Tasks assigned to you for productions you are working on.</div>
      <div class="coming-soon-card">
        <div class="coming-soon-icon">✅</div>
        <div class="coming-soon-title">Tasks coming soon</div>
        <div class="coming-soon-desc">Tasks assigned to you by production teams will appear here. You will be able to mark them complete and track deadlines.</div>
      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    const profileId = sessionStorage.getItem('bts_active_profile_id');
    if (!profileId) window.location.href = '../../../Members/Profiles/profile-select.html';

    fetch('../../../../SHARED/Navigation/production-nav.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('nav').innerHTML = html;
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', async () => {
            await sb.auth.signOut();
            sessionStorage.clear();
            window.location.href = '../../../../HOME/index.html';
          });
        }
      });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../../../Members/Account/login.html'; return; }
      const emailEl = document.getElementById('sidebar-email');
      if (emailEl) emailEl.textContent = session.user.email;
    }

    init();
  </script>
</body>
</html>
