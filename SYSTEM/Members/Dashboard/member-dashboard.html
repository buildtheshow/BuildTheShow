<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Dashboard - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/member-sidebar.css" />
  <style>
    body { background: #f4f2f8; }

    .welcome-block {
      margin-bottom: 2rem;
    }
    .welcome-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a1530;
      letter-spacing: 0;
      margin-bottom: 0.25rem;
    }
    .welcome-sub {
      font-size: 0.9375rem;
      color: #6b5e80;
    }

    /* ── Position cards ── */
    .positions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .position-card {
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .position-card:hover {
      border-color: #572e88;
      box-shadow: 0 4px 18px rgba(87,46,136,0.1);
      transform: translateY(-2px);
    }

    .position-card-icon {
      width: 36px;
      height: 36px;
      margin-bottom: 0.85rem;
      object-fit: contain;
      filter: brightness(0) saturate(100%) invert(20%) sepia(40%) saturate(500%) hue-rotate(240deg);
    }
    .position-card-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9a90b0;
      margin-bottom: 0.3rem;
    }
    .position-card-title {
      font-size: 1.05rem;
      font-weight: 800;
      color: #1a1530;
      margin-bottom: 0.5rem;
    }
    .position-card-desc {
      font-size: 0.8rem;
      color: #9a90b0;
      flex: 1;
      margin-bottom: 0.85rem;
    }
    .position-card-cta {
      font-size: 0.8rem;
      font-weight: 700;
      color: #572e88;
    }

    .position-card--performer { border-left: 3px solid #572e88; }
    .position-card--volunteer { border-left: 3px solid #b45309; }
    .position-card--creative  { border-left: 3px solid #0369a1; }

    .position-card--add {
      border-style: dashed;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: rgba(87,46,136,0.5);
      gap: 0.5rem;
      flex-direction: column;
    }
    .position-card--add:hover { background: rgba(87,46,136,0.03); border-color: #572e88; }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.85rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.08);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }
    .stat-card-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #9a90b0; margin-bottom: 0.35rem; }
    .stat-card-value { font-size: 1.5rem; font-weight: 800; color: #1a1530; }

    /* ── Find opportunities CTA ── */
    .cta-band {
      background: #572e88;
      border-radius: 14px;
      padding: 1.25rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .cta-band-title { font-size: 0.9375rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
    .cta-band-sub   { font-size: 0.8125rem; color: rgba(255,255,255,0.7); }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.25rem; border-radius: 8px; background: #efab45;
      color: #1a1008; font-size: 0.875rem; font-weight: 700;
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }
    .cta-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9a90b0;
      margin-bottom: 0.75rem;
    }

    /* ── Week strip calendar ── */
    .week-strip-wrap {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      padding: 1.1rem 1.25rem 0.85rem;
      margin-bottom: 2rem;
    }
    .week-strip-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .week-strip-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: #1a1530;
      letter-spacing: 0;
    }
    .week-strip-link {
      font-size: 0.75rem;
      font-weight: 600;
      color: #572e88;
      text-decoration: none;
    }
    .week-strip-link:hover { opacity: 0.75; }
    .week-strip-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.3rem;
    }
    .week-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 0.4rem 0.25rem;
      border-radius: 8px;
    }
    .week-day.today {
      background: rgba(87,46,136,0.08);
    }
    .week-day-name {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9a90b0;
    }
    .week-day.today .week-day-name { color: #572e88; }
    .week-day-num {
      font-size: 0.82rem;
      font-weight: 700;
      color: #1a1530;
    }
    .week-day.today .week-day-num { color: #572e88; }
    .week-day-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #efab45;
    }
    .week-day-dot-placeholder {
      width: 5px;
      height: 5px;
    }

    /* ── Upcoming list ── */
    .upcoming-list {
      border-top: 1px solid rgba(87,46,136,0.07);
      margin-top: 0.75rem;
      padding-top: 0.75rem;
    }
    .upcoming-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.45rem 0;
      border-bottom: 1px solid rgba(87,46,136,0.05);
    }
    .upcoming-item:last-child { border-bottom: none; }
    .upcoming-date-badge {
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }
    .upcoming-date-mon {
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #572e88;
    }
    .upcoming-date-day {
      font-size: 1.1rem;
      font-weight: 800;
      color: #1a1530;
      line-height: 1;
    }
    .upcoming-event-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: #1a1530;
    }
    .upcoming-event-sub {
      font-size: 0.75rem;
      color: #9a90b0;
      margin-top: 0.1rem;
    }
    .upcoming-empty {
      font-size: 0.8rem;
      color: #b0a8c8;
      padding: 0.5rem 0;
    }

    .loading-state { display: flex; align-items: center; justify-content: center; min-height: 200px; color: #a098b8; }
    .no-positions {
      text-align: center;
      padding: 3rem 1rem;
      color: #9a90b0;
    }
    .no-positions-title { font-size: 1.05rem; font-weight: 700; color: #1a1530; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="dashboard-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" aria-label="Main navigation">

      <div class="sidebar-logo">
        <a href="../../../HOME/index.html">
          <img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" />
        </a>
      </div>

      <!-- Profile switcher -->
      <a href="../Profiles/profile-select.html" class="sidebar-profile-switcher" id="sidebar-profile-switcher" aria-label="Switch profile">
        <div class="sidebar-profile-avatar-placeholder" id="sidebar-avatar-placeholder">👤</div>
        <div class="sidebar-profile-switcher-info">
          <div class="sidebar-profile-switcher-name" id="sidebar-profile-name">One moment...</div>
          <div class="sidebar-profile-switcher-hint">Switch profile</div>
        </div>
        <span class="sidebar-profile-switcher-chevron">▾</span>
      </a>

      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main">
        <!-- Populated by member-sidebar.js -->
      </nav>

      <div class="sidebar-bottom">
        <div class="sidebar-email" id="sidebar-email"></div>
        <button class="sidebar-logout" id="logout-btn">
          <svg width="14" height="14" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-4-4-4M14 8H6"/>
          </svg>
          Log Out
        </button>
      </div>

    </aside>

    <!-- ── Main ── -->
    <main class="dashboard-main" id="hub-main">
      <div class="loading-state">Getting your dashboard ready...</div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/ASSETS/scripts/member-sidebar.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    const profileId = sessionStorage.getItem('bts_active_profile_id');
    let dashboardRealtimeChannel = null;

    function renderSidebarAvatar(profile) {
      const switcher = document.getElementById('sidebar-profile-switcher');
      if (!switcher || !profile) return;
      if (profile.headshot_url) {
        const placeholder = document.getElementById('sidebar-avatar-placeholder');
        if (placeholder) {
          const img = document.createElement('img');
          img.src = profile.headshot_url;
          img.alt = '';
          img.className = 'sidebar-profile-avatar';
          placeholder.replaceWith(img);
        }
      }
    }

    function positionCard(icon, type, title, desc, href) {
      return `
        <a href="${href}" class="position-card position-card--${type}">
          <img src="${icon}" class="position-card-icon" alt="" />
          <div class="position-card-label">Position</div>
          <div class="position-card-title">${title}</div>
          <div class="position-card-desc">${desc}</div>
          <span class="position-card-cta">Open hub →</span>
        </a>`;
    }

    function buildWeekStrip(events) {
      const today = new Date();
      const day = today.getDay();
      const monday = new Date(today);
      monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));

      const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const eventDates = new Set(
        events.map(e => e.date ? e.date.slice(0, 10) : null).filter(Boolean)
      );

      let daysHTML = '';
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        const isToday = d.toDateString() === today.toDateString();
        const dateStr = d.toISOString().slice(0, 10);
        const hasEvent = eventDates.has(dateStr);
        daysHTML += `
          <div class="week-day${isToday ? ' today' : ''}">
            <div class="week-day-name">${DAY_NAMES[i]}</div>
            <div class="week-day-num">${d.getDate()}</div>
            ${hasEvent ? '<div class="week-day-dot"></div>' : '<div class="week-day-dot-placeholder"></div>'}
          </div>`;
      }

      // Upcoming - next 5 events after today
      const upcomingEvents = events
        .filter(e => e.date && e.date >= today.toISOString().slice(0, 10))
        .sort((a, b) => a.date.localeCompare(b.date))
        .slice(0, 5);

      const upcomingHTML = upcomingEvents.length
        ? upcomingEvents.map(e => {
            const dt = new Date(e.date + 'T00:00:00');
            const mon = dt.toLocaleString('en-CA', { month: 'short' }).toUpperCase();
            return `
              <div class="upcoming-item">
                <div class="upcoming-date-badge">
                  <div class="upcoming-date-mon">${mon}</div>
                  <div class="upcoming-date-day">${dt.getDate()}</div>
                </div>
                <div>
                  <div class="upcoming-event-title">${esc(e.title)}</div>
                  ${e.sub ? `<div class="upcoming-event-sub">${esc(e.sub)}</div>` : ''}
                </div>
              </div>`;
          }).join('')
        : '<div class="upcoming-empty">No upcoming events this week.</div>';

      const weekStart = monday.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
      const weekEnd = new Date(monday.setDate(monday.getDate() + 6))
        .toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });

      return `
        <div class="week-strip-wrap">
          <div class="week-strip-header">
            <div class="week-strip-title">This Week <span style="font-weight:400;color:#9a90b0;font-size:0.75rem;">${weekStart} to ${weekEnd}</span></div>
            <a href="member-calendar.html" class="week-strip-link">Full calendar →</a>
          </div>
          <div class="week-strip-days">${daysHTML}</div>
          <div class="upcoming-list">${upcomingHTML}</div>
        </div>`;
    }

    function renderDashboard(profile, calEvents) {
      const main = document.getElementById('hub-main');
      const firstName = (profile.credit_name || 'there').split(' ')[0];

      let sections = {};
      try { sections = JSON.parse(sessionStorage.getItem('bts_active_profile_sections') || '{}'); } catch (_) {}

      const isPerformer = !!sections?.performer?.enabled;
      const isVolunteer = !!sections?.volunteer?.enabled;
      const isCreative  = !!sections?.creative?.enabled;
      const hasAny      = isPerformer || isVolunteer || isCreative;

      let positionCardsHTML = '';
      if (isPerformer) positionCardsHTML += positionCard('/ASSETS/Images/Performer.svg', 'performer', 'Performer', 'Audition, apply for roles, and track your schedule.', '../Performer/performer-hub.html');
      if (isCreative)  positionCardsHTML += positionCard('/ASSETS/Images/CreativeTeam-Director.svg', 'creative', 'Creative Team', 'Find directing, choreography, and production roles.', '../../Organisations/Productions/Creative/creative-hub.html');
      if (isVolunteer) positionCardsHTML += positionCard('/ASSETS/Images/Volunteers.svg', 'volunteer', 'Volunteer', 'Find volunteer opportunities and get matched to productions.', '../Volunteer/volunteer-hub.html');

      if (!hasAny) {
        positionCardsHTML = `
          <div class="no-positions" style="grid-column:1/-1;">
            <div class="no-positions-title">No positions enabled yet</div>
            <p style="font-size:0.875rem;margin-bottom:1rem;">Go to Settings to enable Performer, Volunteer, or Creative Team positions.</p>
            <a href="../Performer/performer-settings.html" style="display:inline-flex;align-items:center;gap:0.35rem;padding:0.5rem 1.1rem;border-radius:8px;background:#572e88;color:#fff;font-size:0.8rem;font-weight:700;text-decoration:none;">Go to Settings →</a>
          </div>`;
      }

      main.innerHTML = `
        <div class="welcome-block">
          <div class="welcome-title">Hey, ${esc(firstName)}.</div>
          <div class="welcome-sub">Here's what's on this week.</div>
        </div>

        ${buildWeekStrip(calEvents)}

        ${(isPerformer || isVolunteer) ? `
        <div class="cta-band">
          <div>
            <div class="cta-band-title">Find opportunities</div>
            <div class="cta-band-sub">Browse open auditions and volunteer roles near you.</div>
          </div>
          <a href="../../../PUBLIC/find.html" class="cta-btn">Find Opportunities →</a>
        </div>` : ''}

        <div class="section-label">Your Positions</div>
        <div class="positions-grid">
          ${positionCardsHTML}
          ${hasAny ? `
          <a href="../Performer/performer-settings.html" class="position-card position-card--add">
            <span style="font-size:1.5rem;">⚙</span>
            <span style="font-size:0.82rem;font-weight:600;">Manage Positions</span>
          </a>` : ''}
        </div>`;
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      sessionStorage.clear();
      window.location.href = '../../../HOME/index.html';
    });

    async function loadDashboardData() {
      const [profileRes, appsRes] = await Promise.all([
        sb.from('profiles').select('id, credit_name, headshot_url, profile_display_id, sections').eq('id', profileId).single(),
        sb.from('audition_applications')
          .select('id, status, productions(id, title)')
          .eq('profile_id', profileId)
          .not('status', 'eq', 'withdrawn'),
      ]);

      const profile = profileRes.data;
      if (!profile) { window.location.href = '../Profiles/profile-select.html'; return; }

      sessionStorage.setItem('bts_active_profile_sections', JSON.stringify(profile.sections || {}));
      sessionStorage.setItem('bts_active_profile_name',     profile.credit_name || 'Unnamed');

      // Build production title map from applications
      const apps = appsRes.data || [];
      const prodIds = [...new Set(apps.map(a => a.productions?.id).filter(Boolean))];

      // Load calendar events from Zeus (production_events) — single source of truth for all dates
      let calEvents = [];
      if (prodIds.length) {
        const prodTitleMap = {};
        apps.forEach(a => { if (a.productions?.id) prodTitleMap[a.productions.id] = a.productions.title; });

        const { data: pe } = await sb.from('production_events')
          .select('id, production_id, event_type, title, start_time')
          .in('production_id', prodIds)
          .order('start_time');

        calEvents = (pe || []).map(ev => ({
          date: ev.start_time ? ev.start_time.slice(0, 10) : null,
          title: prodTitleMap[ev.production_id] || ev.title,
          sub: ev.title,
        })).filter(e => e.date);
      }

      renderSidebarAvatar(profile);
      renderDashboard(profile, calEvents);
    }

    function subscribeDashboardRealtime() {
      if (dashboardRealtimeChannel) {
        try { sb.removeChannel(dashboardRealtimeChannel); } catch {}
        dashboardRealtimeChannel = null;
      }

      dashboardRealtimeChannel = sb
        .channel(`member-dashboard-${profileId}`)
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'audition_applications',
          filter: `profile_id=eq.${profileId}`,
        }, async () => {
          await loadDashboardData();
        })
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'profiles',
          filter: `id=eq.${profileId}`,
        }, async () => {
          await loadDashboardData();
        })
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'production_events',
        }, async () => {
          await loadDashboardData();
        })
        .subscribe();
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../Account/login.html'; return; }
      document.getElementById('sidebar-email').textContent = session.user.email;

      // If no profile selected, send to profile selector
      if (!profileId) { window.location.href = '../Profiles/profile-select.html'; return; }

      renderMemberSidebar('member-dashboard');
      await loadDashboardData();
      subscribeDashboardRealtime();
    }

    init();
  </script>
  <script defer src="/SHARED/Components/text-fit.js"></script>
</body>
</html>
