<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Calendar - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-law-20260421-2010" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" />
  <style>
    body { background: #f4f2f8; }

    .dashboard-main { padding: 2rem 2.5rem 3rem; }

    .page-header { margin-bottom: 1.5rem; }
    .page-title { font-size: 1.5rem; font-weight: 800; color: #1a1530; letter-spacing: 0; }
    .page-subtitle { font-size: 0.9375rem; color: #6b5e80; margin-top: 0.25rem; }

    /* ── Calendar wrapper ── */
    .cal-wrap {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* FullCalendar overrides */
    .fc { font-family: var(--bts-font); }
    .fc .fc-toolbar-title { font-size: 1rem; font-weight: 700; color: #1a1530; }
    .fc .fc-button { background: #572e88; border-color: #572e88; font-family: var(--bts-font); font-size: 0.8rem; padding: 0.35rem 0.75rem; }
    .fc .fc-button:hover { background: #6b3ba8; border-color: #6b3ba8; }
    .fc .fc-button-active { background: #3d1f65; border-color: #3d1f65; }
    .fc .fc-today-button { background: #efab45; border-color: #efab45; color: #1a1008; }
    .fc .fc-today-button:hover { background: #e09a30; border-color: #e09a30; }
    .fc .fc-daygrid-day.fc-day-today { background: rgba(87,46,136,0.05); }
    .fc .fc-event { border-radius: 5px; font-size: 0.78rem; padding: 1px 4px; }
    .fc .fc-col-header-cell { font-size: 0.75rem; font-weight: 700; color: #6b5e80; text-transform: uppercase; letter-spacing: 0.05em; }
    .fc .fc-daygrid-day-number { font-size: 0.8rem; color: #6b5e80; }
    .fc .fc-day-today .fc-daygrid-day-number { color: #572e88; font-weight: 700; }

    /* ── Upcoming events list ── */
    .upcoming-list {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
    }
    .upcoming-title { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #9a90b0; margin-bottom: 0.75rem; }
    .event-row {
      display: flex; align-items: flex-start; gap: 0.85rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(87,46,136,0.06);
    }
    .event-row:last-child { border-bottom: none; }
    .event-date-block {
      min-width: 42px;
      text-align: center;
      background: rgba(87,46,136,0.07);
      border-radius: 8px;
      padding: 0.35rem 0.4rem;
      flex-shrink: 0;
    }
    .event-date-month { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: #572e88; letter-spacing: 0.05em; }
    .event-date-day   { font-size: 1.05rem; font-weight: 800; color: #1a1530; line-height: 1; }
    .event-info { flex: 1; min-width: 0; }
    .event-info-title  { font-size: 0.875rem; font-weight: 600; color: #1a1530; }
    .event-info-sub    { font-size: 0.75rem; color: #9a90b0; margin-top: 0.1rem; }
    .event-type-badge  {
      font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.5rem;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em;
      white-space: nowrap; flex-shrink: 0; margin-top: 0.15rem;
    }
    .badge-audition  { background: rgba(87,46,136,0.1);  color: #572e88; }
    .badge-callback  { background: rgba(245,158,11,0.1); color: #d97706; }
    .badge-rehearsal { background: rgba(22,163,74,0.1);  color: #16a34a; }
    .badge-show      { background: rgba(239,171,69,0.12); color: #b45309; }
    .badge-other     { background: rgba(156,163,175,0.1); color: #6b7280; }

    .empty-state { text-align: center; padding: 2rem 0; color: #b0a0c8; font-size: 0.9rem; }
    .loading-state { display: flex; align-items: center; justify-content: center; min-height: 200px; color: #a098b8; }

    /* ── Calendar tabs (My Calendar / All Profiles) ── */
    .cal-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.25rem;
      border-bottom: 2px solid rgba(87,46,136,0.1);
    }
    .cal-tab {
      padding: 0.5rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #9a8ab0;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--bts-font);
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .cal-tab:hover { color: #572e88; }
    .cal-tab.active { color: #572e88; border-bottom-color: #572e88; }

    /* Profile name badge on All Profiles events */
    .profile-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.1rem 0.4rem;
      border-radius: 20px;
      background: rgba(87,46,136,0.1);
      color: #572e88;
      margin-left: 0.35rem;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    /* ── Toast ── */
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); color:#e8e0ff; padding:0.7rem 1.2rem; border-radius:0.5rem; font-size:0.87rem; opacity:0; transform:translateY(6px); transition:opacity 0.2s,transform 0.2s; pointer-events:none; z-index:9999; }
    .toast.visible { opacity:1; transform:translateY(0); }
    .toast.toast--error { background:rgba(220,60,60,0.12); border-color:rgba(220,60,60,0.35); color:#f08080; }
    @media (max-width: 700px) {
      .dashboard-main { padding: 1.25rem 1rem 2.5rem; }
      .cal-wrap,
      .upcoming-list {
        padding: 0.85rem;
        border-radius: 12px;
      }
      #member-calendar .fc-toolbar {
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      #member-calendar .fc-toolbar-title { font-size: 0.95rem; }
      #member-calendar .fc-button { font-size: 0.74rem; padding: 0.3rem 0.55rem; }
      #member-calendar .fc-list {
        border-radius: 12px;
        overflow: hidden;
        border-color: rgba(87,46,136,0.12);
      }
      #member-calendar .fc-list-day-cushion {
        background: rgba(87,46,136,0.06);
        color: #1a1530;
        font-size: 0.75rem;
      }
      #member-calendar .fc-list-event-title,
      #member-calendar .fc-list-event-time {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="dashboard-layout">

    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">
        <a href="../../../HOME/index.html"><img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" /></a>
      </div>
      <a href="../Profiles/profile-select.html" class="sidebar-profile-switcher" id="sidebar-profile-switcher" aria-label="Switch profile">
        <div class="sidebar-profile-avatar-placeholder" id="sidebar-avatar-placeholder">👤</div>
        <div class="sidebar-profile-switcher-info">
          <div class="sidebar-profile-switcher-name" id="sidebar-profile-name">One moment...</div>
          <div class="sidebar-profile-switcher-hint">Switch profile</div>
        </div>
        <span class="sidebar-profile-switcher-chevron">▾</span>
      </a>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main">
        <!-- Populated by member-sidebar.js -->
      </nav>
      <div class="sidebar-bottom">
        <div class="sidebar-email" id="sidebar-email"></div>
        <button class="sidebar-logout" id="logout-btn">
          <svg width="14" height="14" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-4-4-4M14 8H6"/>
          </svg>
          Log Out
        </button>
      </div>
    </aside>

    <main class="dashboard-main">

      <div class="page-header">
        <div class="page-title">Calendar</div>
      </div>

      <!-- Tab switcher -->
      <div class="cal-tabs">
        <button class="cal-tab active" id="tab-mine" onclick="switchCalTab('mine')">My Calendar</button>
        <button class="cal-tab" id="tab-all" onclick="switchCalTab('all')">All Profiles</button>
      </div>

      <!-- Full calendar view -->
      <div class="cal-wrap">
        <div id="member-calendar"></div>
      </div>

      <!-- Upcoming events list -->
      <div class="upcoming-list">
        <div class="upcoming-title" id="upcoming-title">Upcoming</div>
        <div id="upcoming-list-content">
          <div class="loading-state">Checking the schedule...</div>
        </div>
      </div>

    </main>
  </div>

  <footer style="margin-left:210px;border-top:1px solid rgba(87,46,136,0.08);padding:1rem 2.5rem;display:flex;flex-wrap:wrap;gap:0.5rem 1.5rem;align-items:center;">
    <a href="../../../SHARED/Legal/privacy-policy.html" target="_blank" style="font-size:0.78rem;color:#a098b8;text-decoration:none;font-weight:500;">Privacy Policy</a>
    <a href="../../../SHARED/Legal/terms-of-service.html" target="_blank" style="font-size:0.78rem;color:#a098b8;text-decoration:none;font-weight:500;">Terms of Service</a>
    <span style="font-size:0.78rem;color:#c8c0d8;">© 2026 Build The Show</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script defer src="/ASSETS/scripts/member-sidebar.js"></script>
  <script>
    let toastTimer;
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      clearTimeout(toastTimer);
      t.textContent = msg;
      t.classList.toggle('toast--error', isError);
      t.classList.add('visible');
      toastTimer = setTimeout(() => t.classList.remove('visible'), 3000);
    }

    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    const profileId = sessionStorage.getItem('bts_active_profile_id');
    if (!profileId) window.location.href = '../Profiles/profile-select.html';

    let fcCalendar = null;
    let currentTab = 'mine';  // 'mine' | 'all'
    let allProfilesData = null; // cached for the All Profiles tab
    let currentUserId = null;
    let calendarRealtimeChannel = null;

    // Colours matching Zeus / Apollo
    const CAL_COLOURS = {
      audition: '#648be4', dance_call: '#648be4', callback: '#d97706',
      other_audition: '#648be4', rehearsal: '#69cdee', tech: '#2b44c2',
      dress: '#5f8e7a', performance: '#6abf2a', event: '#c026d3', meeting: '#9a90b0',
    };
    const CAL_LABELS = {
      audition: 'Audition', dance_call: 'Dance Call', callback: 'Callback',
      other_audition: 'Audition', rehearsal: 'Rehearsal', tech: 'Tech',
      dress: 'Dress Rehearsal', performance: 'Performance', event: 'Event', meeting: 'Meeting',
    };

    // Badge classes for the upcoming list
    function eventBadge(type) {
      const map = {
        audition: 'badge-audition', dance_call: 'badge-audition', other_audition: 'badge-audition',
        callback: 'badge-callback',
        rehearsal: 'badge-rehearsal', tech: 'badge-rehearsal', dress: 'badge-rehearsal',
        performance: 'badge-show',
      };
      const cls = map[type] || 'badge-other';
      const lbl = CAL_LABELS[type] || 'Event';
      return `<span class="event-type-badge ${cls}">${lbl}</span>`;
    }

    function updateSidebarAvatar(profile) {
      if (!profile?.headshot_url) return;
      const placeholder = document.getElementById('sidebar-avatar-placeholder');
      if (!placeholder) return;
      const img = document.createElement('img');
      img.src = profile.headshot_url;
      img.alt = '';
      img.className = 'sidebar-profile-avatar';
      placeholder.replaceWith(img);
    }

    // Build FullCalendar events from Zeus production_events.
    // prodEvents: rows from production_events table
    // prodTitleMap: { production_id: title }
    // appliedProdIds: Set of production IDs the user has applied to
    // profileName: optional label for All Profiles view
    function buildCalendarEvents(prodEvents, prodTitleMap, appliedProdIds, profileName) {
      const stripTz = s => s ? s.slice(0, 19) : null;
      return (prodEvents || [])
        .filter(e => appliedProdIds.has(e.production_id))
        .map(e => {
          const prodTitle = prodTitleMap[e.production_id] || '';
          const label = e.title || CAL_LABELS[e.event_type] || 'Event';
          const title = profileName ? `${label} – ${prodTitle} (${profileName})` : `${label} – ${prodTitle}`;
          const col = CAL_COLOURS[e.event_type] || '#572e88';
          return {
            title,
            start: stripTz(e.start_time),
            end:   stripTz(e.end_time),
            allDay: e.all_day || false,
            backgroundColor: col,
            borderColor: col,
            extendedProps: { type: e.event_type, production: prodTitle, venue: e.venue, profileName: profileName || null },
          };
        });
    }

    async function loadAllProfilesCalendarData() {
      document.getElementById('upcoming-list-content').innerHTML = '<div class="loading-state">Loading all profiles...</div>';
      const { data: allProfiles } = await sb.from('profiles').select('id, credit_name').eq('user_id', currentUserId);
      const profileIds = (allProfiles || []).map(p => p.id);
      const nameMap = {};
      (allProfiles || []).forEach(p => { nameMap[p.id] = (p.credit_name || 'Unnamed').split(' ')[0]; });

      let apps = [];
      if (profileIds.length) {
        const { data: appRows } = await sb.from('audition_applications')
          .select('id, profile_id, status, productions(id, title)')
          .in('profile_id', profileIds)
          .not('status', 'eq', 'withdrawn');
        apps = appRows || [];
      }

      const prodTitleMap = {};
      apps.forEach(a => { if (a.productions?.id) prodTitleMap[a.productions.id] = a.productions.title; });
      const prodIds = Object.keys(prodTitleMap);

      let prodEvents = [];
      if (prodIds.length) {
        const { data: pe } = await sb.from('production_events')
          .select('id, production_id, event_type, title, start_time, end_time, all_day, venue')
          .in('production_id', prodIds).order('start_time');
        prodEvents = pe || [];
      }

      allProfilesData = { apps, nameMap, prodEvents, prodTitleMap };
      return allProfilesData;
    }

    async function loadMineCalendarData() {
      const [profileRes, appsRes] = await Promise.all([
        sb.from('profiles').select('id, credit_name, headshot_url, sections').eq('id', profileId).single(),
        sb.from('audition_applications')
          .select('id, status, productions(id, title)')
          .eq('profile_id', profileId)
          .not('status', 'eq', 'withdrawn'),
      ]);

      const profile = profileRes.data;
      if (!profile) { window.location.href = '../Profiles/profile-select.html'; return null; }

      sessionStorage.setItem('bts_active_profile_sections', JSON.stringify(profile.sections || {}));
      sessionStorage.setItem('bts_active_profile_name', profile.credit_name || 'Unnamed');

      const apps = appsRes.data || [];
      const prodTitleMap = {};
      apps.forEach(a => { if (a.productions?.id) prodTitleMap[a.productions.id] = a.productions.title; });
      const prodIds = Object.keys(prodTitleMap);

      let prodEvents = [];
      if (prodIds.length) {
        const { data: pe } = await sb.from('production_events')
          .select('id, production_id, event_type, title, start_time, end_time, all_day, venue')
          .in('production_id', prodIds)
          .order('start_time');
        prodEvents = pe || [];
      }

      window._calMineData = { apps, prodEvents, prodTitleMap };
      return profile;
    }

    async function refreshCurrentCalendarView() {
      if (currentTab === 'mine') {
        const profile = await loadMineCalendarData();
        if (!profile) return;
        updateSidebarAvatar(profile);
        const { apps, prodEvents, prodTitleMap } = window._calMineData || {};
        const appliedProdIds = new Set((apps || []).map(a => a.productions?.id).filter(Boolean));
        updateCalendar(buildCalendarEvents(prodEvents || [], prodTitleMap || {}, appliedProdIds), prodEvents || [], prodTitleMap || {}, appliedProdIds);
        document.getElementById('upcoming-title').textContent = 'Upcoming';
        return;
      }

      const { apps, nameMap, prodEvents, prodTitleMap } = await loadAllProfilesCalendarData();
      const allEvents = [];
      const byProfile = {};
      (apps || []).forEach(a => {
        if (!byProfile[a.profile_id]) byProfile[a.profile_id] = [];
        byProfile[a.profile_id].push(a);
      });
      Object.entries(byProfile).forEach(([pid, profileApps]) => {
        const appliedProdIds = new Set(profileApps.map(a => a.productions?.id).filter(Boolean));
        allEvents.push(...buildCalendarEvents(prodEvents, prodTitleMap, appliedProdIds, nameMap[pid]));
      });

      const allAppliedProdIds = new Set((apps || []).map(a => a.productions?.id).filter(Boolean));
      updateCalendar(allEvents, prodEvents, prodTitleMap, allAppliedProdIds);
      document.getElementById('upcoming-title').textContent = 'Upcoming (All Profiles)';
    }

    function subscribeCalendarRealtime() {
      if (calendarRealtimeChannel) {
        try { sb.removeChannel(calendarRealtimeChannel); } catch {}
        calendarRealtimeChannel = null;
      }

      calendarRealtimeChannel = sb
        .channel(`member-calendar-${profileId}`)
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'audition_applications',
        }, async () => {
          allProfilesData = null;
          await refreshCurrentCalendarView();
        })
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'profiles',
        }, async () => {
          allProfilesData = null;
          await refreshCurrentCalendarView();
        })
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'production_events',
        }, async () => {
          allProfilesData = null;
          await refreshCurrentCalendarView();
        })
        .subscribe();
    }

    // Switch between My Calendar and All Profiles
    async function switchCalTab(tab) {
      currentTab = tab;
      document.getElementById('tab-mine').classList.toggle('active', tab === 'mine');
      document.getElementById('tab-all').classList.toggle('active', tab === 'all');
      await refreshCurrentCalendarView();
    }

    function updateCalendar(calEvents, prodEvents, prodTitleMap, appliedProdIds) {
      if (fcCalendar) {
        fcCalendar.removeAllEvents();
        fcCalendar.addEventSource(calEvents);
      }
      renderUpcomingList(prodEvents, prodTitleMap, appliedProdIds);
    }

    function renderUpcomingList(prodEvents, prodTitleMap, appliedProdIds) {
      const container = document.getElementById('upcoming-list-content');
      const today = new Date(); today.setHours(0,0,0,0);

      const rows = (prodEvents || [])
        .filter(e => appliedProdIds.has(e.production_id) && e.start_time)
        .map(e => ({
          date:       new Date(e.start_time.slice(0, 10) + 'T00:00:00'),
          type:       e.event_type,
          name:       e.title || CAL_LABELS[e.event_type] || 'Event',
          production: prodTitleMap[e.production_id] || '',
          venue:      e.venue || '',
        }))
        .filter(r => r.date >= today)
        .sort((a, b) => a.date - b.date)
        .slice(0, 12);

      if (!rows.length) {
        container.innerHTML = `<div class="empty-state">No upcoming dates yet. Apply to auditions to see your schedule here.</div>`;
        return;
      }

      container.innerHTML = rows.map(r => {
        const month = r.date.toLocaleDateString('en-CA', { month: 'short' }).toUpperCase();
        const day   = r.date.getDate();
        const sub   = [r.production, r.venue].filter(Boolean).join(' · ');
        return `
          <div class="event-row">
            <div class="event-date-block">
              <div class="event-date-month">${month}</div>
              <div class="event-date-day">${day}</div>
            </div>
            <div class="event-info">
              <div class="event-info-title">${esc(r.name)}</div>
              <div class="event-info-sub">${esc(sub)}</div>
            </div>
            ${eventBadge(r.type)}
          </div>`;
      }).join('');
    }

    function initCalendar(calEvents) {
      const el = document.getElementById('member-calendar');
      if (!el) return;
      const isMobileCalendar = window.matchMedia('(max-width: 700px)').matches;
      fcCalendar = new FullCalendar.Calendar(el, {
        initialView: isMobileCalendar ? 'listMonth' : 'dayGridMonth',
        headerToolbar: isMobileCalendar
          ? { left: 'prev,next', center: 'title', right: 'listMonth' }
          : { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
        height: 'auto',
        events: calEvents,
        eventClick(info) {
          showToast(info.event.title);
        },
      });
      fcCalendar.render();
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      sessionStorage.clear();
      window.location.href = '../../../HOME/index.html';
    });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../Account/login.html'; return; }
      currentUserId = session.user.id;
      document.getElementById('sidebar-email').textContent = session.user.email;

      renderMemberSidebar('calendar');
      const profile = await loadMineCalendarData();
      if (!profile) return;
      updateSidebarAvatar(profile);

      const { apps, prodEvents, prodTitleMap } = window._calMineData || {};
      const appliedProdIds = new Set(Object.keys(prodTitleMap || {}));
      initCalendar(buildCalendarEvents(prodEvents || [], prodTitleMap || {}, appliedProdIds));
      renderUpcomingList(prodEvents || [], prodTitleMap || {}, appliedProdIds);
      subscribeCalendarRealtime();
    }

    init();
  </script>
  <script defer src="/SHARED/Components/text-fit.js"></script>
</body>
</html>
