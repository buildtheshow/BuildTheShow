<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password - Build The Show</title>
  <link rel="stylesheet" href="../../../ASSETS/styles/styles.css" />
  <style>
    body { background: #ffffff; }
    .grid-bg { background-image: url('../../../ASSETS/Images/Grid-Glow-Purple.png'); opacity: 0.03; }
    .nav { background: #572e88; border-bottom-color: rgba(87,46,136,0.2); }
    .auth-main {
      position: relative; z-index: 10;
      min-height: calc(100vh - 57px);
      display: flex; align-items: center; justify-content: center;
      padding: 3rem 1.5rem;
    }
    .auth-card {
      background: #ffffff;
      border: 1px solid rgba(87,46,136,0.18);
      border-radius: 14px;
      padding: 2.75rem 2.5rem;
      width: 100%; max-width: 440px;
      box-shadow: 0 4px 24px rgba(87,46,136,0.08);
      transition: box-shadow 0.3s;
    }
    .auth-card:hover { box-shadow: 0 0 40px rgba(87,46,136,0.18), 0 4px 24px rgba(87,46,136,0.1); }
    .auth-card-title { font-size: 1.65rem; font-weight: 800; letter-spacing: -0.02em; color: #1a1530; margin-bottom: 0.5rem; }
    .auth-card-subtitle { font-size: 0.875rem; color: #6a5a80; margin-bottom: 2rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem; }
    .form-label { font-size: 0.8125rem; font-weight: 600; color: #4a3d6b; letter-spacing: 0.04em; text-transform: uppercase; }
    .form-input {
      background: #f7f5fc; border: 1px solid rgba(87,46,136,0.2); color: #1a1530;
      border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.9375rem; font-family: inherit;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: #9a90b0; }
    .form-input:focus { border-color: rgba(87,46,136,0.6); box-shadow: 0 0 0 3px rgba(87,46,136,0.12); }
    .btn--accent {
      display: block; width: 100%; padding: 0.85rem 1.5rem; border-radius: 8px;
      background: #efab45; color: #1a1008; font-size: 0.9375rem; font-weight: 700;
      font-family: inherit; border: none; cursor: pointer; letter-spacing: 0.01em;
      margin-top: 0.5rem; transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn--accent:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(239,171,69,0.35); }
    .btn--accent:active { transform: translateY(0); }
    .btn--accent:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .auth-error {
      display: none; background: rgba(200,40,40,0.08); border: 1px solid rgba(200,40,40,0.3);
      border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.875rem; color: #b91c1c; margin-bottom: 1.25rem;
    }
    .auth-error.visible { display: block; }
    .auth-success {
      display: none; background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.3);
      border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.875rem; color: #166534; margin-bottom: 1.25rem;
    }
    .auth-success.visible { display: block; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: #6a5a80; }
    .auth-footer a { color: #572e88; text-decoration: none; font-weight: 600; transition: opacity 0.2s; }
    .auth-footer a:hover { opacity: 0.75; }
    .hint { font-size: 0.78rem; color: #9a90b0; margin-top: 0.2rem; }
  </style>
</head>
<body>

  <div class="grid-bg"></div>

  <header class="nav">
    <div class="nav-logo">
      <a href="../../../HOME/index.html">
        <img src="../../../ASSETS/Images/logo-long-white.png" alt="Build The Show" class="nav-logo-img" />
      </a>
    </div>
    <nav class="nav-links"></nav>
    <div class="nav-actions"></div>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <h1 class="auth-card-title" id="page-title">Set a new password</h1>
      <p class="auth-card-subtitle" id="page-subtitle">Choose something you'll remember.</p>

      <div class="auth-error" id="error-msg" role="alert" aria-live="assertive"></div>
      <div class="auth-success" id="success-msg"></div>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="password">New password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" required />
          <div class="hint">At least 8 characters</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm">Confirm password</label>
          <input class="form-input" type="password" id="confirm" name="confirm" placeholder="Same password again" autocomplete="new-password" required />
        </div>
        <button type="submit" class="btn--accent" id="submit-btn">Save New Password</button>
      </form>

      <div class="auth-footer" id="login-link" style="display:none;">
        <a href="login.html">Back to log in</a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    const errorMsg   = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const submitBtn  = document.getElementById('submit-btn');
    const form       = document.getElementById('reset-form');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      successMsg.classList.remove('visible');
    }

    // Supabase sends the session via URL hash when redirecting from a password reset email.
    // We need to exchange it for a session before the user can update their password.
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Session is now active - user can set a new password
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('visible');

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (!password || password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }
      if (password !== confirm) {
        showError('Passwords do not match. Give it another go.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      const { error } = await sb.auth.updateUser({ password });

      submitBtn.disabled = false;
      submitBtn.textContent = 'Save New Password';

      if (error) {
        showError(error.message);
        return;
      }

      successMsg.textContent = 'Password updated. You can log in now.';
      successMsg.classList.add('visible');
      form.style.display = 'none';
      document.getElementById('login-link').style.display = 'block';
    });
  </script>

  <style>
    .legal-footer {
      border-top: 1px solid rgba(87,46,136,0.12); background: #fff;
      padding: 1.25rem; text-align: center; position: relative; z-index: 10;
    }
    .legal-footer-inner { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    .legal-footer-links { display: flex; flex-wrap: wrap; gap: 1.25rem; justify-content: center; }
    .legal-footer-links a { color: #572e88; text-decoration: none; font-size: 0.82rem; font-weight: 600; }
    .legal-footer-links a:hover { opacity: 0.7; }
    .legal-footer-copy { font-size: 0.78rem; color: #9a90b0; }
  </style>

  <footer class="legal-footer">
    <div class="legal-footer-inner">
      <div class="legal-footer-links">
        <a href="../../../SHARED/Legal/privacy-policy.html">Privacy Policy</a>
        <a href="../../../SHARED/Legal/terms-of-service.html">Terms of Service</a>
        <a href="mailto:privacy@buildtheshow.com">Contact</a>
      </div>
      <p class="legal-footer-copy">© 2026 Build The Show. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
