<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose a Profile - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f4f2f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Grid background ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: url('/ASSETS/Images/Grid-Glow-Purple.png');
      background-size: cover;
      background-position: center;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      padding: 3rem 2rem 4rem;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .page-logo {
      height: 96px;
      width: auto;
      margin-bottom: 1.2rem;
    }

    .page-title {
      font-size: 1.9rem;
      font-weight: 800;
      color: #1a1530;
      letter-spacing: 0;
    }

    .page-subtitle {
      font-size: 0.9375rem;
      color: #6b5e80;
    }

    /* ── Profile grid ── */
    .profiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .profile-card {
      display: flex;
      flex-direction: column;
      border: 1.5px solid rgba(87,46,136,0.12);
      border-radius: 14px;
      overflow: hidden;
      background: #ffffff;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.18s, box-shadow 0.18s, transform 0.15s;
    }

    .profile-card:hover {
      border-color: #572e88;
      box-shadow: 0 6px 24px rgba(87,46,136,0.14);
      transform: translateY(-3px);
    }

    .profile-card-img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .profile-card-img-placeholder {
      width: 100%;
      aspect-ratio: 4 / 5;
      background: linear-gradient(160deg, #ede8f5 0%, #d9cff0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    .profile-card-body {
      padding: 0.75rem 0.85rem 0.85rem;
    }

    .profile-card-name {
      font-size: 0.9375rem;
      font-weight: 700;
      color: #1a1530;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-card-meta {
      font-size: 0.75rem;
      color: #a098b8;
      margin-bottom: 0.35rem;
    }

    .profile-type-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
    }

    .profile-type-badge {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 20px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1.5px solid currentColor;
    }

    .profile-type-badge--performer { color: #572e88; border-color: rgba(87,46,136,0.35); background: rgba(87,46,136,0.07); }
    .profile-type-badge--volunteer { color: #b45309; border-color: rgba(217,119,6,0.35); background: rgba(217,119,6,0.07); }
    .profile-type-badge--creative  { color: #0369a1; border-color: rgba(3,105,161,0.35); background: rgba(14,165,233,0.07); }

    /* ── Add card ── */
    .profile-card--add {
      background: transparent;
      border-style: dashed;
      align-items: center;
      justify-content: center;
      min-height: 220px;
    }

    .profile-card--add:hover {
      background: rgba(87,46,136,0.03);
      border-color: rgba(87,46,136,0.4);
    }

    .profile-card-add-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.5rem;
    }

    .profile-card-add-icon {
      font-size: 2rem;
      color: rgba(87,46,136,0.35);
      line-height: 1;
    }

    .profile-card-add-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(87,46,136,0.5);
    }

    /* ── Footer row ── */
    .page-footer {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .footer-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border-radius: 9px;
      font-size: 0.8125rem;
      font-weight: 600;
      font-family: var(--bts-font);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      border: 1.5px solid rgba(87,46,136,0.18);
      color: #572e88;
      background: rgba(87,46,136,0.04);
    }
    .footer-btn:hover { background: rgba(87,46,136,0.1); border-color: rgba(87,46,136,0.35); }

    .footer-link {
      font-size: 0.78rem;
      color: #c0b8d4;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--bts-font);
    }
    .footer-link:hover { color: #572e88; }

    .footer-sep { color: #d0c8e0; font-size: 0.8125rem; }

    /* ── Loading ── */
    .loading-state {
      text-align: center;
      color: #a098b8;
      font-size: 0.9375rem;
      padding: 4rem 0;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>

  <div class="page-wrap">

    <div class="page-header">
      <a href="../../../HOME/index.html">
        <img src="/ASSETS/Images/logo-square-black.png" alt="Build The Show" class="page-logo" />
      </a>
      <h1 class="page-title">Who's going in?</h1>
      <p class="page-subtitle">Pick a profile to continue.</p>
    </div>

    <div class="profiles-grid" id="profiles-grid">
      <div class="loading-state">Finding your profiles...</div>
    </div>

    <div class="page-footer">
      <a href="profiles.html" class="footer-btn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <circle cx="6" cy="5" r="3"/><path d="M1 14c0-3 2-5 5-5h0"/>
          <circle cx="13" cy="8" r="2.5"/><path d="M13 5.5v5M10.5 8h5"/>
        </svg>
        Manage Profiles
      </a>
      <a href="../Performer/performer-settings.html" class="footer-btn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M11.4 4.6l-1.4 1.4M4.6 11.4l-1.4 1.4"/>
        </svg>
        Settings
      </a>
      <span class="footer-sep">·</span>
      <button class="footer-link" id="logout-btn">Log out</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    function calcAge(dob) {
      if (!dob) return null;
      const d = new Date(dob);
      const today = new Date();
      let age = today.getFullYear() - d.getFullYear();
      const m = today.getMonth() - d.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
      return age;
    }

    function selectProfile(profile, num) {
      sessionStorage.setItem('bts_active_profile_id',         profile.id);
      sessionStorage.setItem('bts_active_profile_name',       profile.credit_name || 'Unnamed');
      sessionStorage.setItem('bts_active_profile_sections',   JSON.stringify(profile.sections || {}));
      sessionStorage.setItem('bts_active_profile_num',        num ?? '');
      sessionStorage.setItem('bts_active_profile_custom_id',  profile.custom_id || '');
      window.location.href = '../Performer/performer-dashboard.html';
    }

    function typeBadgesHTML(sections) {
      const badges = [];
      if (sections?.performer?.enabled) badges.push(`<span class="profile-type-badge profile-type-badge--performer">Performer</span>`);
      if (sections?.volunteer?.enabled) badges.push(`<span class="profile-type-badge profile-type-badge--volunteer">Volunteer</span>`);
      if (sections?.creative?.enabled)  badges.push(`<span class="profile-type-badge profile-type-badge--creative">Creative</span>`);
      return badges.length ? `<div class="profile-type-badges">${badges.join('')}</div>` : '';
    }

    function renderProfiles(profiles) {
      const grid = document.getElementById('profiles-grid');

      if (!profiles.length) {
        grid.innerHTML = `
          <div class="loading-state">No profiles yet.</div>
          <a href="profile-create.html" class="profile-card profile-card--add">
            <div class="profile-card-add-inner">
              <span class="profile-card-add-icon">+</span>
              <span class="profile-card-add-label">Add Profile</span>
            </div>
          </a>`;
        return;
      }

      const cardsHTML = profiles.map(p => {
        const name = p.credit_name || 'Unnamed Profile';
        const age  = calcAge(p.date_of_birth);
        const meta = [age !== null ? `Age ${age}` : null, p.pronouns].filter(Boolean).join(' · ');

        const thumb = p.headshot_url
          ? `<img src="${esc(p.headshot_url)}" alt="${esc(name)}" class="profile-card-img" />`
          : `<div class="profile-card-img-placeholder" aria-hidden="true">👤</div>`;

        return `
          <div class="profile-card" role="button" tabindex="0" aria-label="Enter as ${esc(name)}" data-profile-id="${esc(p.id)}">
            ${thumb}
            <div class="profile-card-body">
              <div class="profile-card-name">${esc(name)}</div>
              ${meta ? `<div class="profile-card-meta">${esc(meta)}</div>` : ''}
              ${typeBadgesHTML(p.sections)}
            </div>
          </div>`;
      }).join('');

      grid.innerHTML = cardsHTML + `
        <a href="profile-create.html" class="profile-card profile-card--add" aria-label="Add new profile">
          <div class="profile-card-add-inner">
            <span class="profile-card-add-icon">+</span>
            <span class="profile-card-add-label">Add Profile</span>
          </div>
        </a>`;

      // Attach click handlers using the stored profiles array
      profiles.forEach((p, i) => {
        const card = grid.querySelector(`[data-profile-id="${p.id}"]`);
        if (!card) return;
        card.addEventListener('click', () => selectProfile(p, i + 1));
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectProfile(p, i + 1); } });
      });
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = '../../../HOME/index.html';
    });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../Account/login.html'; return; }

      const [{ data: profiles, error }, { data: memberIdRow }] = await Promise.all([
        sb.from('profiles')
          .select('id, credit_name, headshot_url, date_of_birth, pronouns, sections, custom_id')
          .eq('user_id', session.user.id)
          .order('created_at'),
        sb.from('member_ids')
          .select('display_id')
          .eq('user_id', session.user.id)
          .maybeSingle(),
      ]);

      if (error) {
        document.getElementById('profiles-grid').innerHTML =
          `<div class="loading-state" style="color:#b91c1c;">Error loading profiles: ${error.message}</div>`;
        return;
      }

      // Store the BTS ID so the sidebar can show it
      const btsId = memberIdRow?.display_id || '';
      sessionStorage.setItem('bts_user_display_id', btsId);

      renderProfiles(profiles || []);
    }

    init();
  </script>
  <script defer src="/SHARED/Components/text-fit.js"></script>
  <script src="/SHARED/Components/auto-save.js?v=1"></script>
</body>
</html>
