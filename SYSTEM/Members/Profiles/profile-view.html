<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <link rel="stylesheet" href="/ASSETS/styles/member-sidebar.css" />
  <style>
    body { background: #f6f4fb; }

    /* ── Page ────────────────────────────────────────── */
    .view-main {
      position: relative;
      z-index: 10;
      margin-left: 220px;
      padding: 3rem 2rem 5rem;
      min-height: 100vh;
    }
    @media (max-width: 700px) { .view-main { margin-left: 0; } }
    .view-inner {
      width: 100%;
      max-width: 1200px;
    }

    /* ── Back link ───────────────────────────────────── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #7a6e90;
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #572e88; }

    /* ── Hero card ───────────────────────────────────── */
    .profile-hero {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.12);
      border-radius: 18px;
      padding: 2rem 2rem 1.75rem;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      gap: 1.75rem;
      align-items: flex-start;
      margin-bottom: 1.25rem;
      box-shadow: 0 4px 24px rgba(87,46,136,0.07);
      position: relative;
    }

    /* Headshot strip */
    .headshot-strip {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .headshot-primary {
      width: 120px;
      height: 150px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid rgba(87,46,136,0.18);
      background: rgba(87,46,136,0.06);
      display: block;
    }
    .headshot-primary-placeholder {
      width: 120px;
      height: 150px;
      border-radius: 10px;
      background: rgba(87,46,136,0.06);
      border: 2px dashed rgba(87,46,136,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: rgba(87,46,136,0.25);
    }
    .headshot-thumbs {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      max-width: 120px;
    }
    .headshot-thumb {
      width: 34px;
      height: 42px;
      border-radius: 5px;
      object-fit: cover;
      border: 1.5px solid rgba(87,46,136,0.18);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .headshot-thumb:hover { border-color: #572e88; }
    .headshot-thumb.active { border-color: #572e88; }

    /* Hero info */
    .profile-hero-info {
      flex: 1;
      min-width: 0;
    }
    .profile-hero-name {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 800;
      color: #1a1530;
      letter-spacing: 0;
      margin-bottom: 0.35rem;
    }
    .profile-hero-meta {
      font-size: 0.9rem;
      color: #7a6e90;
      margin-bottom: 0.25rem;
    }
    .profile-hero-id {
      font-size: 0.78rem;
      color: #b0a8c8;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    .profile-hero-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .role-tag {
      display: inline-flex;
      align-items: center;
      padding: 0.28rem 0.75rem;
      border-radius: 20px;
      font-size: 0.775rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .role-tag.performer { background: rgba(87,46,136,0.1); color: #572e88; }
    .role-tag.volunteer { background: rgba(0,120,80,0.08); color: #006644; }
    .role-tag.creative  { background: rgba(180,80,0,0.08); color: #8a4000; }

    /* Edit button in hero */
    .btn--edit-profile {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      font-size: 0.825rem;
      font-weight: 600;
      color: #572e88;
      background: rgba(87,46,136,0.07);
      border: 1.5px solid rgba(87,46,136,0.22);
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
      font-family: var(--bts-font);
    }
    .btn--edit-profile:hover { background: rgba(87,46,136,0.13); border-color: rgba(87,46,136,0.38); }

    /* ── Section cards ───────────────────────────────── */
    .view-section {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      padding: 1.4rem 1.5rem;
      margin-bottom: 1.1rem;
      box-shadow: 0 2px 12px rgba(87,46,136,0.05);
      width: 100%;
      box-sizing: border-box;
    }
    .view-section-header {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 1.2rem;
      padding-bottom: 0.75rem;
      border-bottom: 1.5px solid rgba(87,46,136,0.08);
    }
    .view-section-icon {
      width: 30px;
      height: 30px;
      background: rgba(87,46,136,0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #572e88;
    }
    .view-section-title {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #572e88;
    }

    /* ── Data grid ───────────────────────────────────── */
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem 1.5rem;
    }
    .data-item {}
    .data-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9a8ab0;
      margin-bottom: 0.25rem;
    }
    .data-value {
      font-size: 0.9rem;
      color: #1a1530;
      font-weight: 500;
      line-height: 1.5;
    }
    .data-value.empty { color: #c0b8d0; font-style: italic; font-weight: 400; }

    /* Level badges */
    .level-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      background: rgba(87,46,136,0.1);
      color: #572e88;
    }

    /* Full-width data item */
    .data-item.full { grid-column: 1 / -1; }
    .data-value.multiline { white-space: pre-wrap; overflow-wrap: normal; word-break: normal; }

    /* Resume link */
    .resume-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #572e88;
      text-decoration: none;
      padding: 0.4rem 0.85rem;
      background: rgba(87,46,136,0.07);
      border-radius: 7px;
      border: 1.5px solid rgba(87,46,136,0.2);
      transition: background 0.2s;
    }
    .resume-link:hover { background: rgba(87,46,136,0.13); }

    /* ── Profile sub-tabs ────────────────────────────── */
    .pdash-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid rgba(87,46,136,0.1);
      padding-bottom: 0;
    }
    .pdash-tab {
      padding: 0.55rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #9a8ab0;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--bts-font);
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      border-radius: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .pdash-tab:hover { color: #572e88; }
    .pdash-tab.active { color: #572e88; border-bottom-color: #572e88; }
    .pdash-panel { display: none; width: 100%; }
    .pdash-panel.active { display: block; width: 100%; }

    /* ── Danger zone ─────────────────────────────────── */
    .danger-zone-card {
      background: #fff8f8;
      border: 1.5px solid rgba(220,38,38,0.2);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.1rem;
    }
    .danger-zone-title {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #dc2626;
      margin-bottom: 0.5rem;
    }
    .danger-zone-desc {
      font-size: 0.875rem;
      color: #7a6e90;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .danger-zone-warning {
      background: rgba(220,38,38,0.06);
      border: 1px solid rgba(220,38,38,0.15);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-size: 0.82rem;
      color: #991b1b;
      line-height: 1.6;
      margin-bottom: 1.1rem;
    }
    .btn--delete-danger {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.25rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: #dc2626;
      background: rgba(220,38,38,0.07);
      border: 1.5px solid rgba(220,38,38,0.3);
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--bts-font);
      transition: background 0.2s, border-color 0.2s;
    }
    .btn--delete-danger:hover { background: rgba(220,38,38,0.14); border-color: rgba(220,38,38,0.5); }

    /* ── Basics summary table ───────────────────────── */
    .basics-summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .basics-summary-table tr + tr td { padding-top: 0.45rem; }
    .basics-summary-label {
      color: #9b8db8;
      font-weight: 600;
      width: 45%;
      vertical-align: top;
      padding-right: 0.75rem;
    }
    .basics-summary-value {
      color: #2d1f4a;
    }

    /* ── Dashboard headshot strip ───────────────────── */
    .dash-headshot-strip {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
    }
    .dash-headshot-thumb {
      width: 64px;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 7px;
      border: 2px solid rgba(87,46,136,0.2);
      display: block;
    }
    .dash-headshot-thumb--primary {
      border-color: rgba(87,46,136,0.55);
      box-shadow: 0 2px 10px rgba(87,46,136,0.18);
    }

    /* ── Notification area ───────────────────────────── */
    .notif-card {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      width: 100%;
      box-sizing: border-box;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.1rem;
      box-shadow: 0 2px 12px rgba(87,46,136,0.05);
    }
    .notif-empty {
      font-size: 0.85rem;
      color: #b0a8c8;
      text-align: center;
      padding: 1.5rem 0;
    }

    /* ── Empty / loading states ──────────────────────── */
    .loading-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #9a8ab0;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .sidebar { width: 100%; min-height: auto; position: static; flex-direction: column; }
      .view-main { margin-left: 0; padding: 2rem 1rem 4rem; }
      .profile-hero { flex-direction: column; }
      .headshot-strip { flex-direction: row; align-items: flex-start; }
      .headshot-thumbs { max-width: none; }
    }
    /* ── Toast ── */
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); color:#e8e0ff; padding:0.7rem 1.2rem; border-radius:0.5rem; font-size:0.87rem; opacity:0; transform:translateY(6px); transition:opacity 0.2s,transform 0.2s; pointer-events:none; z-index:9999; }
    .toast.visible { opacity:1; transform:translateY(0); }
    .toast.toast--error { background:rgba(220,60,60,0.12); border-color:rgba(220,60,60,0.35); color:#f08080; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="grid-bg"></div>

  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">
        <a href="../../../HOME/index.html"><img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" /></a>
      </div>
      <a href="profile-select.html" class="sidebar-profile-switcher" id="sidebar-profile-switcher" aria-label="Switch profile">
        <div class="sidebar-profile-avatar-placeholder" id="sidebar-avatar-placeholder">👤</div>
        <div class="sidebar-profile-switcher-info">
          <div class="sidebar-profile-switcher-name" id="sidebar-profile-name">One moment...</div>
          <div class="sidebar-profile-switcher-hint">Switch profile</div>
        </div>
        <span class="sidebar-profile-switcher-chevron">▾</span>
      </a>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main">
        <!-- Populated by member-sidebar.js -->
      </nav>
      <div class="sidebar-bottom">
        <div class="sidebar-email" id="sidebar-email"></div>
        <button class="sidebar-logout" id="logout-btn">
          <svg width="14" height="14" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-4-4-4M14 8H6"/>
          </svg>
          Log Out
        </button>
      </div>
    </aside>

    <main class="view-main">
      <div class="view-inner">

        <a href="../Performer/performer-dashboard.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M10 3L5 8l5 5"/></svg>
          Back to Dashboard
        </a>

        <div id="profile-content">
          <div class="loading-state">Loading profile...</div>
        </div>

      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/ASSETS/scripts/member-sidebar.js"></script>
  <script>
    let toastTimer;
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      clearTimeout(toastTimer);
      t.textContent = msg;
      t.classList.toggle('toast--error', isError);
      t.classList.add('visible');
      toastTimer = setTimeout(() => t.classList.remove('visible'), 3000);
    }

    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    function calcAge(dob) {
      if (!dob) return null;
      const today = new Date();
      const birth = new Date(dob);
      let age = today.getFullYear() - birth.getFullYear();
      const m = today.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
      return (age >= 0 && age < 120) ? age : null;
    }

    function val(str) {
      return str ? esc(str) : '<span class="empty">Not set</span>';
    }

    function dataItem(label, value, full) {
      const cls = full ? 'data-item full' : 'data-item';
      return '<div class="' + cls + '"><div class="data-label">' + label + '</div><div class="data-value">' + value + '</div></div>';
    }

    function renderProfile(profile, editId) {
      const name  = profile.credit_name || 'Unnamed Profile';
      const age   = calcAge(profile.date_of_birth);
      const sec   = profile.sections || {};
      const roles = profile.roles || [];

      /* Headshots */
      const allUrls = (profile.headshot_urls && profile.headshot_urls.length) ? profile.headshot_urls : (profile.headshot_url ? [profile.headshot_url] : []);
      const primarySrc = allUrls[0] || null;
      const headshotHtml = primarySrc
        ? '<div class="headshot-strip"><img id="hero-primary-img" src="' + esc(primarySrc) + '" class="headshot-primary" alt="' + esc(name) + '" /></div>'
        : '<div class="headshot-strip"><div class="headshot-primary-placeholder" aria-hidden="true">&#128100;</div></div>';

      /* Meta */
      const metaParts = [];
      if (age !== null) metaParts.push('Age ' + age);
      if (profile.pronouns) metaParts.push(esc(profile.pronouns));
      const metaLine = metaParts.length ? '<div class="profile-hero-meta">' + metaParts.join(' · ') + '</div>' : '';
      const idLine   = profile.profile_display_id ? '<div class="profile-hero-id">' + esc(profile.profile_display_id) + '</div>' : '';
      const metaHtml = metaLine + idLine;

      /* Role tags */
      const tagMap = { Performer: 'performer', Volunteer: 'volunteer', 'Creative Team': 'creative' };
      const tagsHtml = roles.map(function(r) {
        return '<span class="role-tag ' + (tagMap[r] || '') + '">' + esc(r) + '</span>';
      }).join('');

      /* Hero card (shared across all tabs) */
      const editBtn =
        '<a href="profile-sections.html?id=' + esc(editId) + '" class="btn--edit-profile" style="margin-bottom:0.85rem;display:inline-flex;">' +
          '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M11 2l3 3-9 9H2v-3L11 2z"/></svg>' +
          'Edit Profile' +
        '</a>';

      const heroHtml =
        editBtn +
        '<div class="profile-hero">' +
          headshotHtml +
          '<div class="profile-hero-info">' +
            '<h1 class="profile-hero-name">' + esc(name) + '</h1>' +
            metaHtml +
            (tagsHtml ? '<div class="profile-hero-tags">' + tagsHtml + '</div>' : '') +
          '</div>' +
        '</div>';

      /* ── Build tab buttons ── */
      const tabs = [{ id: 'dashboard', label: 'Dashboard' }];
      const perf = sec.performer;
      const vol  = sec.volunteer;
      const cre  = sec.creative;
      if (perf && perf.enabled) tabs.push({ id: 'performer',    label: 'Performer' });
      if (vol  && vol.enabled)  tabs.push({ id: 'volunteer',    label: 'Volunteer' });
      if (cre  && cre.enabled)  tabs.push({ id: 'creative',     label: 'Creative Team' });
      tabs.push({ id: 'danger', label: 'Danger Zone' });

      const tabNav = '<div class="pdash-tabs">' +
        tabs.map(function(t, i) {
          return '<button class="pdash-tab' + (i === 0 ? ' active' : '') + '" data-tab="' + t.id + '" onclick="switchPdashTab(\'' + t.id + '\')">' + t.label + '</button>';
        }).join('') +
      '</div>';

      /* ── Dashboard panel ── */
      /* Basics rows */
      const basicsRows = [];
      if (profile.credit_name) basicsRows.push(['Programme / Credit Name', esc(profile.credit_name)]);
      if (profile.nickname)    basicsRows.push(['Nickname', esc(profile.nickname)]);
      if (profile.pronouns)    basicsRows.push(['Pronouns', esc(profile.pronouns)]);
      if (age !== null)        basicsRows.push(['Age', String(age)]);
      if (profile.profile_display_id)   basicsRows.push(['Profile ID', esc(profile.profile_display_id)]);

      const basicsTableHtml = basicsRows.length
        ? '<table class="basics-summary-table">' +
            basicsRows.map(function(r) {
              return '<tr><td class="basics-summary-label">' + r[0] + '</td><td class="basics-summary-value">' + r[1] + '</td></tr>';
            }).join('') +
          '</table>'
        : '<p style="font-size:0.85rem;color:#b0a8c8;margin:0;">No basics filled in yet. Go to Edit Profile to add your details.</p>';

      /* Headshot strip for dashboard */
      const dashShotsHtml = allUrls.length
        ? '<div class="dash-headshot-strip">' +
            allUrls.map(function(url, i) {
              return '<img src="' + esc(url) + '" class="dash-headshot-thumb' + (i === 0 ? ' dash-headshot-thumb--primary' : '') + '" alt="Headshot ' + (i+1) + '" />';
            }).join('') +
          '</div>'
        : '';

      const dashPanel =
        '<div class="pdash-panel active" id="pdash-dashboard">' +
          '<div class="notif-card">' +
            '<div class="view-section-header" style="margin-bottom:0.75rem;"><div class="view-section-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div><span class="view-section-title">Notifications</span></div>' +
            '<div class="notif-empty">No new notifications</div>' +
          '</div>' +
          '<div class="view-section">' +
            '<div class="view-section-header" style="margin-bottom:0.75rem;"><div class="view-section-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><span class="view-section-title">Basics</span></div>' +
            basicsTableHtml +
          '</div>' +
          (dashShotsHtml ? '<div class="view-section" style="margin-top:1rem;">' + dashShotsHtml + '</div>' : '') +
        '</div>';

      /* ── Performer panel ── */
      let perfPanel = '';
      if (perf && perf.enabled) {
        const voiceLabel      = {'Soprano':'Soprano','Mezzo-Soprano':'Mezzo-Soprano','Alto':'Alto','Tenor':'Tenor','Baritone':'Baritone','Bass':'Bass','Non-singing':'Non-singing','Other':'Other'};
        const danceLevelLabel = {'none':'No experience','beginner':'Beginner','intermediate':'Intermediate','advanced':'Advanced'};
        const actingLevelLabel= {'first-show':'First show','some':'Some experience','experienced':'Experienced','professional':'Professional'};
        const vocalLabel      = {'prefer-not':'Prefers not to sing','chorus':'Comfortable in chorus','harmonies':'Comfortable with harmonies','solos':'Comfortable singing solos'};
        perfPanel =
          '<div class="pdash-panel" id="pdash-performer">' +
            '<div class="view-section">' +
              '<div class="view-section-header"><div class="view-section-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><span class="view-section-title">Performance Skills</span></div>' +
              '<div class="data-grid">' +
                (perf.voice_type    ? dataItem('Vocal Range',    '<span class="level-badge">' + esc(voiceLabel[perf.voice_type]    || perf.voice_type)    + '</span>') : '') +
                (perf.vocal_comfort ? dataItem('Singing Comfort','<span class="level-badge">' + esc(vocalLabel[perf.vocal_comfort]  || perf.vocal_comfort)  + '</span>') : '') +
                (perf.dance_level   ? dataItem('Dance Level',    '<span class="level-badge">' + esc(danceLevelLabel[perf.dance_level]  || perf.dance_level)  + '</span>') : '') +
                (perf.acting_level  ? dataItem('Acting Level',   '<span class="level-badge">' + esc(actingLevelLabel[perf.acting_level] || perf.acting_level) + '</span>') : '') +
                (perf.dance_styles  ? dataItem('Dance Styles',   val(perf.dance_styles)) : '') +
                (perf.instruments   ? dataItem('Instruments',    val(perf.instruments))  : '') +
                (perf.accents       ? dataItem('Accents',        val(perf.accents))      : '') +
                (perf.combat        ? dataItem('Stage Combat',   val(perf.combat))       : '') +
                (perf.height        ? dataItem('Height',         val(perf.height))       : '') +
                (perf.eye_colour    ? dataItem('Eye Colour',     val(perf.eye_colour))   : '') +
                (perf.hair_colour   ? dataItem('Hair Colour',    val(perf.hair_colour))  : '') +
                (perf.other_skills  ? dataItem('Special Skills', val(perf.other_skills), true) : '') +
              '</div>' +
            '</div>' +
            ((perf.experience || perf.training)
              ? '<div class="view-section">' +
                  '<div class="view-section-header"><div class="view-section-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg></div><span class="view-section-title">Experience &amp; Background</span></div>' +
                  '<div class="data-grid">' +
                    (perf.experience ? dataItem('Experience', '<span class="multiline">' + esc(perf.experience) + '</span>', true) : '') +
                    (perf.training   ? dataItem('Training',   '<span class="multiline">' + esc(perf.training)   + '</span>', true) : '') +
                  '</div>' +
                  (perf.resume_url ? '<div style="margin-top:1rem;"><a href="' + esc(perf.resume_url) + '" class="resume-link" target="_blank" rel="noopener">View Resume</a></div>' : '') +
                '</div>'
              : '') +
          '</div>';
      }

      /* ── Volunteer panel ── */
      let volPanel = '';
      if (vol && vol.enabled) {
        const skillNames = {foh:'Front of House','box-office':'Box Office & Ticketing','stage-crew':'Stage Crew',props:'Props',costumes:'Costumes',
          'set-build':'Set Build',lighting:'Lighting',sound:'Sound',photo:'Photography / Video',youth:'Working with Children',
          'customer-service':'Customer Service',admin:'Administration'};
        const skillItems = vol.skills ? Object.entries(vol.skills).map(function(e) {
          return '<span style="display:inline-block;background:rgba(87,46,136,0.08);border-radius:6px;padding:0.2rem 0.55rem;font-size:0.8rem;font-weight:600;color:#572e88;margin:0.15rem;">' + esc(skillNames[e[0]] || e[0]) + '</span>';
        }).join('') : '';

        volPanel =
          '<div class="pdash-panel" id="pdash-volunteer">' +
            '<div class="view-section">' +
              '<div class="view-section-header"><div class="view-section-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><span class="view-section-title">Volunteer Skills</span></div>' +
              (skillItems ? '<div style="margin-bottom:0.75rem;">' + skillItems + '</div>' : '<p style="font-size:0.85rem;color:#b0a8c8;">No skills selected yet.</p>') +
              '<div class="data-grid" style="margin-top:0.75rem;">' +
                (vol.availability  ? dataItem('Availability',  val(vol.availability)) : '') +
                (vol.leadership    ? dataItem('Leadership',    val(vol.leadership))   : '') +
              '</div>' +
            '</div>' +
            '<div style="text-align:center;margin-top:1rem;">' +
              '<a href="../Volunteer/volunteer-best-fit.html" style="display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.4rem;background:#572e88;color:#fff;border-radius:8px;font-size:0.875rem;font-weight:700;text-decoration:none;">Find My Best Fit Role →</a>' +
            '</div>' +
          '</div>';
      }

      /* ── Creative Team panel ── */
      let crePanel = '';
      if (cre && cre.enabled) {
        const creRoleLabels = {director:'Director',choreographer:'Choreographer',vocal_director:'Vocal Director',producer:'Producer'};
        let creRoleHtml = '';
        if (cre.roles) {
          Object.entries(cre.roles).forEach(function(e) {
            const roleKey = e[0], roleData = e[1];
            if (!roleData || !roleData.enabled) return;
            creRoleHtml +=
              '<div class="view-section" style="margin-bottom:0.75rem;">' +
                '<div class="view-section-header" style="margin-bottom:0.5rem;"><div class="view-section-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg></div><span class="view-section-title">' + esc(creRoleLabels[roleKey] || roleKey) + '</span></div>' +
                (roleData.experience ? '<div class="data-value multiline" style="font-size:0.875rem;">' + esc(roleData.experience) + '</div>' : '<div class="data-value" style="color:#c0b8d0;font-style:italic;">No experience notes added</div>') +
              '</div>';
          });
        }
        crePanel =
          '<div class="pdash-panel" id="pdash-creative">' +
            (creRoleHtml || '<p style="font-size:0.875rem;color:#b0a8c8;text-align:center;padding:2rem 0;">No creative roles enabled. Go to Edit Profile to select your roles.</p>') +
          '</div>';
      }

      /* ── Danger Zone panel ── */
      const dangerPanel =
        '<div class="pdash-panel" id="pdash-danger">' +
          '<div class="danger-zone-card">' +
            '<div class="danger-zone-title">Delete This Profile</div>' +
            '<div class="danger-zone-desc">Permanently removes this profile and all associated data. This action cannot be undone.</div>' +
            '<div class="danger-zone-warning">' +
              '<strong>Before you delete:</strong><br>' +
              '• Any active audition applications linked to this profile will remain in the system for the production record but will no longer be associated with your account.<br>' +
              '• Your legal name, date of birth, and personal details will be removed from our systems in compliance with PIPEDA.<br>' +
              '• Headshots and resume files stored in our system will be permanently deleted.<br>' +
              '• This profile\'s ID cannot be reused or recovered.' +
            '</div>' +
            '<button class="btn--delete-danger" id="delete-profile-btn" onclick="confirmDeleteProfile(\'' + esc(editId) + '\', \'' + esc(name) + '\')">' +
              '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 10h8l1-10"/></svg>' +
              'Delete This Profile' +
            '</button>' +
          '</div>' +
        '</div>';

      document.getElementById('profile-content').innerHTML =
        heroHtml + tabNav + dashPanel + perfPanel + volPanel + crePanel + dangerPanel;
    }

    function switchPdashTab(tabId) {
      document.querySelectorAll('.pdash-tab').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });
      document.querySelectorAll('.pdash-panel').forEach(function(panel) {
        panel.classList.toggle('active', panel.id === 'pdash-' + tabId);
      });
    }

    async function confirmDeleteProfile(profileId, profileName) {
      if (!confirm('Delete the profile "' + profileName + '"? This cannot be undone.')) return;
      const typed = prompt('Type DELETE to confirm permanently removing this profile:');
      if (typed !== 'DELETE') { showToast('Deletion cancelled.'); return; }
      const btn = document.getElementById('delete-profile-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Deleting…'; }
      const { error } = await sb.from('profiles').delete().eq('id', profileId);
      if (error) { showToast('Could not delete: ' + error.message, true); if (btn) { btn.disabled = false; btn.textContent = 'Delete This Profile'; } return; }
      sessionStorage.removeItem('bts_active_profile_id');
      sessionStorage.removeItem('bts_active_profile_name');
      sessionStorage.removeItem('bts_active_profile_sections');
      window.location.href = 'profile-select.html';
    }

    function updateSidebarAvatar(profile) {
      if (!profile?.headshot_url) return;
      const placeholder = document.getElementById('sidebar-avatar-placeholder');
      if (!placeholder) return;
      const img = document.createElement('img');
      img.src = profile.headshot_url;
      img.alt = '';
      img.className = 'sidebar-profile-avatar';
      placeholder.replaceWith(img);
    }

    function swapPrimary(thumb, url) {
      const primary = document.getElementById('hero-primary-img');
      if (primary) primary.src = url;
    }

    document.getElementById('logout-btn').addEventListener('click', async function() {
      await sb.auth.signOut();
      sessionStorage.clear();
      window.location.href = '../../../HOME/index.html';
    });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../Account/login.html'; return; }

      // URL param takes priority; fall back to active session profile
      const profileId = new URLSearchParams(window.location.search).get('id')
        || sessionStorage.getItem('bts_active_profile_id');
      if (!profileId) { window.location.href = 'profile-select.html'; return; }

      document.getElementById('sidebar-email').textContent = session.user.email || '';

      const { data: profile } = await sb.from('profiles').select('*').eq('id', profileId).single();

      if (!profile) {
        document.getElementById('profile-content').innerHTML = '<div class="loading-state">Profile not found.</div>';
        renderMemberSidebar('profile-view');
        return;
      }

      // Keep sessionStorage in sync with this profile
      sessionStorage.setItem('bts_active_profile_sections', JSON.stringify(profile.sections || {}));
      sessionStorage.setItem('bts_active_profile_name', profile.credit_name || 'Unnamed');

      renderMemberSidebar('profile-view');
      updateSidebarAvatar(profile);

      document.title = (profile.credit_name || 'Profile') + ' - Build The Show';
      renderProfile(profile, profileId);
    }

    init();
  </script>

  <script defer src="/SHARED/Components/text-fit.js"></script>
</body>
</html>
