<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profiles - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css" />
  <style>
    body { background: #f4f2f8; }

    .page-title  { font-size: 1.4rem; font-weight: 800; color: #1a1530; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
    .page-subtitle { font-size: 0.9rem; color: #6b5e80; margin-bottom: 2rem; }

    /* ── Profile cards grid ── */
    .profiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1rem;
    }

    .profile-card {
      display: flex;
      flex-direction: column;
      border: 1.5px solid rgba(87,46,136,0.12);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.18s, box-shadow 0.18s, transform 0.15s;
    }
    .profile-card:hover {
      border-color: rgba(87,46,136,0.35);
      box-shadow: 0 4px 18px rgba(87,46,136,0.1);
      transform: translateY(-2px);
    }

    .profile-card-img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
    .profile-card-img-placeholder {
      width: 100%;
      aspect-ratio: 4 / 5;
      background: linear-gradient(160deg, #ede8f5, #d9cff0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .profile-card-body {
      padding: 0.75rem 0.85rem 0;
    }

    .profile-card-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: #1a1530;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-card-meta {
      font-size: 0.72rem;
      color: #a098b8;
      margin-bottom: 0.35rem;
    }

    .profile-type-badges { display: flex; flex-wrap: wrap; gap: 0.2rem; margin-bottom: 0.35rem; }
    .profile-type-badge {
      font-size: 0.6rem; font-weight: 700; padding: 0.13rem 0.42rem;
      border-radius: 20px; letter-spacing: 0.04em; text-transform: uppercase;
      border: 1.5px solid currentColor;
    }
    .profile-type-badge--performer { color: #572e88; border-color: rgba(87,46,136,0.35); background: rgba(87,46,136,0.07); }
    .profile-type-badge--volunteer { color: #b45309; border-color: rgba(217,119,6,0.35);  background: rgba(217,119,6,0.07); }
    .profile-type-badge--creative  { color: #0369a1; border-color: rgba(3,105,161,0.35);  background: rgba(14,165,233,0.07); }

    .profile-card-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 0.85rem;
      border-top: 1px solid rgba(87,46,136,0.07);
      margin-top: 0.5rem;
    }
    .profile-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.32rem 0.72rem;
      border-radius: 6px;
      border: 1.5px solid rgba(87,46,136,0.18);
      background: transparent;
      color: #7a6e90;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .profile-action-btn:hover { border-color: #572e88; color: #572e88; }

    /* ── Add card ── */
    .profile-card--add {
      background: transparent;
      border-style: dashed;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      gap: 0.5rem;
      text-decoration: none;
    }
    .profile-card--add:hover { background: rgba(87,46,136,0.03); border-color: rgba(87,46,136,0.4); transform: none; }
    .profile-card-add-icon  { font-size: 1.75rem; color: rgba(87,46,136,0.35); line-height: 1; }
    .profile-card-add-label { font-size: 0.85rem; font-weight: 600; color: rgba(87,46,136,0.5); }

    /* ── Enter button ── */
    .enter-btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.38rem 0.85rem; border-radius: 6px;
      border: 1.5px solid rgba(87,46,136,0.18);
      background: transparent; color: #572e88;
      font-size: 0.75rem; font-weight: 700;
      text-decoration: none; cursor: pointer; font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }
    .enter-btn:hover { background: rgba(87,46,136,0.07); border-color: #572e88; }

    .loading-state { text-align: center; padding: 4rem 0; color: #a098b8; }
  </style>
</head>
<body>
  <div class="dashboard-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">
        <a href="../../../HOME/index.html">
          <img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" />
        </a>
      </div>

      <a href="profile-select.html" class="sidebar-profile-switcher" id="sidebar-profile-switcher" aria-label="Switch profile">
        <div class="sidebar-profile-avatar-placeholder" id="sidebar-avatar-placeholder">👤</div>
        <div class="sidebar-profile-switcher-info">
          <div class="sidebar-profile-switcher-name" id="sidebar-profile-name">One moment...</div>
          <div class="sidebar-profile-switcher-hint">Switch profile</div>
        </div>
        <span class="sidebar-profile-switcher-chevron">▾</span>
      </a>

      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main">
        <!-- Populated by member-sidebar.js -->
      </nav>

      <div class="sidebar-bottom">
        <div class="sidebar-email" id="sidebar-email"></div>
        <button class="sidebar-logout" id="logout-btn">
          <svg width="14" height="14" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-4-4-4M14 8H6"/>
          </svg>
          Log Out
        </button>
      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="dashboard-main" id="profiles-main">
      <div class="loading-state">Loading profiles...</div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/ASSETS/scripts/member-sidebar.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    function calcAge(dob) {
      if (!dob) return null;
      const d = new Date(dob);
      const today = new Date();
      let age = today.getFullYear() - d.getFullYear();
      const m = today.getMonth() - d.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
      return age;
    }

    function typeBadgesHTML(sections) {
      const badges = [];
      if (sections?.performer?.enabled) badges.push(`<span class="profile-type-badge profile-type-badge--performer">Performer</span>`);
      if (sections?.volunteer?.enabled) badges.push(`<span class="profile-type-badge profile-type-badge--volunteer">Volunteer</span>`);
      if (sections?.creative?.enabled)  badges.push(`<span class="profile-type-badge profile-type-badge--creative">Creative</span>`);
      return badges.length ? `<div class="profile-type-badges">${badges.join('')}</div>` : '';
    }

    // Enter as this profile - sets context and goes to dashboard
    function enterAsProfile(profile) {
      sessionStorage.setItem('bts_active_profile_id',       profile.id);
      sessionStorage.setItem('bts_active_profile_name',     profile.credit_name || 'Unnamed');
      sessionStorage.setItem('bts_active_profile_sections', JSON.stringify(profile.sections || {}));
      window.location.href = '../Dashboard/member-dashboard.html';
    }

    function renderProfiles(profiles) {
      const main = document.getElementById('profiles-main');

      const cardsHTML = profiles.map(p => {
        const name = p.credit_name || 'Unnamed';
        const age  = calcAge(p.date_of_birth);
        const meta = [age != null ? `Age ${age}` : null, p.pronouns].filter(Boolean).join(' · ');
        const thumb = p.headshot_url
          ? `<img src="${esc(p.headshot_url)}" alt="${esc(name)}" class="profile-card-img" />`
          : `<div class="profile-card-img-placeholder">👤</div>`;

        return `
          <div class="profile-card" onclick="void(0)">
            ${thumb}
            <div class="profile-card-body">
              <div class="profile-card-name">${esc(name)}</div>
              ${meta ? `<div class="profile-card-meta">${esc(meta)}</div>` : ''}
              ${typeBadgesHTML(p.sections)}
            </div>
            <div class="profile-card-actions" onclick="event.stopPropagation()">
              <button class="enter-btn" onclick="enterAsProfile(${JSON.stringify(p).replace(/"/g, '&quot;')})">Enter →</button>
              <a href="profile-view.html?id=${esc(p.id)}" class="profile-action-btn">View</a>
              <a href="profile-sections.html?id=${esc(p.id)}" class="profile-action-btn">Edit</a>
            </div>
          </div>`;
      }).join('');

      main.innerHTML = `
        <h1 class="page-title">Profiles</h1>
        <p class="page-subtitle">Each profile is a real person. One account can hold multiple profiles.</p>
        <div class="profiles-grid">
          ${cardsHTML}
          <a href="profile-create.html" class="profile-card profile-card--add">
            <span class="profile-card-add-icon">+</span>
            <span class="profile-card-add-label">Add Profile</span>
          </a>
        </div>`;
    }

    function updateSidebarAvatar(profile) {
      if (!profile?.headshot_url) return;
      const placeholder = document.getElementById('sidebar-avatar-placeholder');
      if (!placeholder) return;
      const img = document.createElement('img');
      img.src = profile.headshot_url;
      img.alt = '';
      img.className = 'sidebar-profile-avatar';
      placeholder.replaceWith(img);
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      sessionStorage.clear();
      window.location.href = '../../../HOME/index.html';
    });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../Account/login.html'; return; }
      document.getElementById('sidebar-email').textContent = session.user.email;

      const profileId = sessionStorage.getItem('bts_active_profile_id');

      const { data: profiles } = await sb.from('profiles')
        .select('id, credit_name, headshot_url, date_of_birth, pronouns, sections, profile_display_id')
        .eq('user_id', session.user.id)
        .order('created_at');

      // Update sidebar with active profile context
      const activeProfile = profiles?.find(p => p.id === profileId) || profiles?.[0];
      if (activeProfile) {
        sessionStorage.setItem('bts_active_profile_sections', JSON.stringify(activeProfile.sections || {}));
        sessionStorage.setItem('bts_active_profile_name',     activeProfile.credit_name || 'Unnamed');
        updateSidebarAvatar(activeProfile);
      }

      renderMemberSidebar('profiles');
      renderProfiles(profiles || []);
    }

    init();
  </script>
</body>
</html>
