<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Auditions - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-law-20260421-2010" />
  <style>
    body { background: #f4f2f8; }

    /* ── Main ── */
    .dashboard-main {
      flex: 1;
      padding: 2.5rem 2.5rem 4rem;
    }

    .page-title {
      font-size: 1.45rem;
      font-weight: 800;
      color: #1a1530;
      letter-spacing: 0;
      margin-bottom: 0.35rem;
    }
    .page-subtitle {
      font-size: 0.875rem;
      color: #7a6a90;
      margin-bottom: 2rem;
    }

    /* ── Application cards ── */
    .applications-list { display: flex; flex-direction: column; gap: 1rem; }

    .app-card {
      background: #fff;
      border: 1px solid rgba(87,46,136,0.1);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem 1.5rem;
      align-items: start;
      box-shadow: 0 2px 8px rgba(87,46,136,0.04);
    }

    .app-show { font-size: 1rem; font-weight: 700; color: #1a1530; margin-bottom: 0.2rem; }
    .app-meta { font-size: 0.8125rem; color: #7a6a90; display: flex; flex-wrap: wrap; gap: 0.25rem 1rem; }
    .app-meta span { display: flex; align-items: center; gap: 0.3rem; }

    .status-badge {
      display: inline-block;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-pending    { background: #f0ece8; color: #7a6040; }
    .status-offered    { background: #edfbf0; color: #1a7a40; }
    .status-accepted   { background: rgba(87,46,136,0.1); color: #572e88; }
    .status-rejected   { background: #fdf0f0; color: #8a2020; }
    .status-withdrawn  { background: #f4f2f8; color: #9a90b0; }
    .status-shortlisted { background: rgba(239,171,69,0.15); color: #8a5a10; }

    .app-withdraw-btn {
      font-size: 0.75rem; color: #b090c0; background: none; border: none;
      cursor: pointer; font-family: var(--bts-font); padding: 0;
      text-decoration: underline; text-underline-offset: 2px;
      margin-top: 0.5rem; display: block;
    }
    .app-withdraw-btn:hover { color: #572e88; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #9a90b0;
    }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 700; color: #3a2a55; margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn-primary {
      display: inline-block;
      background: #572e88; color: #fff;
      border: none; border-radius: 8px;
      padding: 0.6rem 1.4rem;
      font-size: 0.875rem; font-weight: 700;
      cursor: pointer; font-family: var(--bts-font);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; }

    @media (max-width: 700px) {
      .sidebar { width: 100%; min-height: auto; position: static; flex-direction: column; }
      .dashboard-main { margin-left: 0; padding: 1.5rem 1rem 3rem; max-width: 100%; }
    }
    /* ── Toast ── */
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); color:#e8e0ff; padding:0.7rem 1.2rem; border-radius:0.5rem; font-size:0.87rem; opacity:0; transform:translateY(6px); transition:opacity 0.2s,transform 0.2s; pointer-events:none; z-index:9999; }
    .toast.visible { opacity:1; transform:translateY(0); }
    .toast.toast--error { background:rgba(220,60,60,0.12); border-color:rgba(220,60,60,0.35); color:#f08080; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="grid-bg" aria-hidden="true"></div>

  <div class="dashboard-layout">

    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">
        <a href="../../../HOME/index.html"><img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" /></a>
      </div>
      <a href="../Profiles/profile-select.html" class="sidebar-profile-switcher" id="sidebar-profile-switcher" aria-label="Switch profile">
        <div class="sidebar-profile-avatar-placeholder" id="sidebar-avatar-placeholder">👤</div>
        <div class="sidebar-profile-switcher-info">
          <div class="sidebar-profile-switcher-name" id="sidebar-profile-name">One moment...</div>
          <div class="sidebar-profile-switcher-hint">Switch profile</div>
        </div>
        <span class="sidebar-profile-switcher-chevron">▾</span>
      </a>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main">
        <!-- Populated by member-sidebar.js -->
      </nav>
      <div class="sidebar-bottom">
        <div class="sidebar-email" id="sidebar-email"></div>
        <button class="sidebar-logout" id="logout-btn">
          <svg width="14" height="14" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-4-4-4M14 8H6"/>
          </svg>
          Log Out
        </button>
      </div>
    </aside>

    <main class="dashboard-main">
      <div class="page-title">My Auditions</div>
      <div class="page-subtitle">Productions you've applied to or booked an audition for.</div>
      <div id="applications-list" class="applications-list">
        <div style="color:#9a90b0;font-size:0.875rem;padding:2rem 0;">Loading...</div>
      </div>
    </main>

  </div>

  <footer style="margin-left:210px;border-top:1px solid rgba(87,46,136,0.08);padding:1rem 2.5rem;display:flex;flex-wrap:wrap;gap:0.5rem 1.5rem;align-items:center;">
    <a href="../../../SHARED/Legal/privacy-policy.html" target="_blank" style="font-size:0.78rem;color:#a098b8;text-decoration:none;font-weight:500;">Privacy Policy</a>
    <a href="../../../SHARED/Legal/terms-of-service.html" target="_blank" style="font-size:0.78rem;color:#a098b8;text-decoration:none;font-weight:500;">Terms of Service</a>
    <a href="mailto:privacy@buildtheshow.com" style="font-size:0.78rem;color:#a098b8;text-decoration:none;font-weight:500;">Contact</a>
    <span style="font-size:0.78rem;color:#c8c0d8;">© 2026 Build The Show</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/ASSETS/scripts/member-sidebar.js"></script>
  <script>
    let toastTimer;
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      clearTimeout(toastTimer);
      t.textContent = msg;
      t.classList.toggle('toast--error', isError);
      t.classList.add('visible');
      toastTimer = setTimeout(() => t.classList.remove('visible'), 3000);
    }

    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-CA', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    const STATUS_LABELS = {
      pending:     'Pending',
      shortlisted: 'Shortlisted',
      offered:     'Offered',
      accepted:    'Accepted',
      rejected:    'Unsuccessful',
      withdrawn:   'Withdrawn',
    };

    const profileId = sessionStorage.getItem('bts_active_profile_id');
    let applicationsRealtimeChannel = null;
    if (!profileId) window.location.href = '../Profiles/profile-select.html';

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      sessionStorage.clear();
      window.location.href = '../../../HOME/index.html';
    });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../Account/login.html'; return; }

      document.getElementById('sidebar-email').textContent = session.user.email || '';
      renderMemberSidebar('applications');

      await loadApplications();
      subscribeApplicationsRealtime();
    }

    async function loadApplications() {
      const el = document.getElementById('applications-list');

      const { data, error } = await sb
        .from('audition_applications')
        .select('*, productions(title, subtitle, start_date, venue)')
        .eq('profile_id', profileId)
        .order('created_at', { ascending: false });

      if (error || !data || !data.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><img src="/ASSETS/Images/Applications.svg" alt="" style="width:2.5rem;height:2.5rem;opacity:0.35;filter:invert(20%) sepia(40%) saturate(500%) hue-rotate(240deg);" /></div>
            <h3>No applications yet</h3>
            <p>When you apply for an audition, it will appear here.<br>You can track the status of each one.</p>
            <a href="../../../PUBLIC/find.html" class="btn-primary">Find Auditions</a>
          </div>`;
        return;
      }

      el.innerHTML = data.map(a => {
        const prod = a.productions;
        const showName = prod?.title || 'Production';
        const statusKey = a.status || 'pending';
        const statusLabel = STATUS_LABELS[statusKey] || statusKey;
        const canWithdraw = statusKey === 'pending' || statusKey === 'shortlisted';
        return `
          <div class="app-card" id="app-${esc(a.id)}">
            <div>
              <div class="app-show">${esc(showName)}</div>
              <div class="app-meta">
                ${a.role_interest ? `<span>🎭 ${esc(a.role_interest)}</span>` : ''}
                ${prod?.venue   ? `<span>📍 ${esc(prod.venue)}</span>` : ''}
                ${prod?.start_date ? `<span>📅 ${fmtDate(prod.start_date)}</span>` : ''}
                <span>Applied ${fmtDate(a.created_at)}</span>
              </div>
              ${canWithdraw ? `<button class="app-withdraw-btn" onclick="withdrawApplication('${esc(a.id)}')">Withdraw application</button>` : ''}
            </div>
            <div>
              <span class="status-badge status-${esc(statusKey)}">${esc(statusLabel)}</span>
            </div>
          </div>`;
      }).join('');
    }

    function subscribeApplicationsRealtime() {
      if (applicationsRealtimeChannel) {
        try { sb.removeChannel(applicationsRealtimeChannel); } catch {}
        applicationsRealtimeChannel = null;
      }

      applicationsRealtimeChannel = sb
        .channel(`member-applications-${profileId}`)
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'audition_applications',
          filter: `profile_id=eq.${profileId}`,
        }, async () => {
          await loadApplications();
        })
        .subscribe();
    }

    async function withdrawApplication(appId) {
      if (!confirm('Withdraw this application? This cannot be undone.')) return;
      const { error } = await sb.from('audition_applications').update({ status: 'withdrawn' }).eq('id', appId);
      if (error) { showToast('Could not withdraw: ' + error.message, true); return; }
      // Refresh the card
      const card = document.getElementById('app-' + appId);
      if (card) {
        card.querySelector('.status-badge').className = 'status-badge status-withdrawn';
        card.querySelector('.status-badge').textContent = 'Withdrawn';
        card.querySelector('.app-withdraw-btn')?.remove();
      }
    }

    init();
  </script>
  <script defer src="/SHARED/Components/text-fit.js"></script>
</body>
</html>
