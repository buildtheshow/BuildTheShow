<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hours - Build The Show</title>
  <link rel="stylesheet" href="../../../ASSETS/Styles (CSS)/styles.css" />
  <link rel="stylesheet" href="../../../ASSETS/Styles (CSS)/member-sidebar.css" />
  <style>
    body { background: #f4f2f8; }
    .dashboard-main { padding: 2rem 2.5rem 3rem; }
    .page-title { font-size: 1.5rem; font-weight: 800; color: #1a1530; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
    .page-subtitle { font-size: 0.9375rem; color: #6b5e80; margin-bottom: 2rem; }
    .coming-soon-card {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      padding: 3rem 2rem;
      text-align: center;
    }
    .coming-soon-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.35; }
    .coming-soon-title { font-size: 1.05rem; font-weight: 700; color: #1a1530; margin-bottom: 0.4rem; }
    .coming-soon-desc { font-size: 0.875rem; color: #9a90b0; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="dashboard-layout">

    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">
        <a href="../../../HOME/index.html"><img src="../../../ASSETS/Images/logo-long-white.png" alt="Build The Show" /></a>
      </div>
      <a href="../Profiles/profile-select.html" class="sidebar-profile-switcher" id="sidebar-profile-switcher" aria-label="Switch profile">
        <div class="sidebar-profile-avatar-placeholder" id="sidebar-avatar-placeholder">👤</div>
        <div class="sidebar-profile-switcher-info">
          <div class="sidebar-profile-switcher-name" id="sidebar-profile-name">One moment...</div>
          <div class="sidebar-profile-switcher-hint">Switch profile</div>
        </div>
        <span class="sidebar-profile-switcher-chevron">▾</span>
      </a>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main">
        <!-- Populated by member-sidebar.js -->
      </nav>
      <div class="sidebar-bottom">
        <div class="sidebar-email" id="sidebar-email"></div>
        <button class="sidebar-logout" id="logout-btn">
          <svg width="14" height="14" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-4-4-4M14 8H6"/>
          </svg>
          Log Out
        </button>
      </div>
    </aside>

    <main class="dashboard-main">
      <div class="page-title">Hours</div>
      <div class="page-subtitle">Your volunteer hours log across all productions.</div>
      <div class="coming-soon-card">
        <div class="coming-soon-icon">⏱</div>
        <div class="coming-soon-title">Hours tracking coming soon</div>
        <div class="coming-soon-desc">Your total volunteer hours across all productions will be tracked here. Great for school credits, community service records, and personal milestones.</div>
      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../../ASSETS/Scripts (JS)/member-sidebar.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    const profileId = sessionStorage.getItem('bts_active_profile_id');
    if (!profileId) window.location.href = '../Profiles/profile-select.html';

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      sessionStorage.clear();
      window.location.href = '../../../HOME/index.html';
    });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../Account/login.html'; return; }
      document.getElementById('sidebar-email').textContent = session.user.email;
      renderMemberSidebar('volunteer-hours');
    }

    init();
  </script>
</body>
</html>
