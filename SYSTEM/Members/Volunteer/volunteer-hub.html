<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Hub - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <style>
    body { background: #f4f2f8; }

    .hub-welcome { margin-bottom: 2rem; }
    .hub-welcome-title { font-size: 1.5rem; font-weight: 800; color: #1a1530; letter-spacing: 0; margin-bottom: 0.3rem; }
    .hub-welcome-sub { font-size: 0.9375rem; color: #6b5e80; }

    .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.5rem; }
    @media (max-width: 800px) { .hub-grid { grid-template-columns: 1fr; } }

    .hub-card { background: #fff; border: 1.5px solid rgba(87,46,136,0.1); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .hub-card-title { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #9a90b0; margin-bottom: 0.75rem; }
    .hub-card-empty { font-size: 0.875rem; color: #b0a0c8; text-align: center; padding: 1.5rem 0; }

    .cta-band {
      background: #b45309; border-radius: 14px; padding: 1.25rem 1.75rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    .cta-band-title { font-size: 0.9375rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
    .cta-band-sub   { font-size: 0.8125rem; color: rgba(255,255,255,0.75); }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.25rem; border-radius: 8px; background: #fff;
      color: #b45309; font-size: 0.875rem; font-weight: 700;
      text-decoration: none; white-space: nowrap; flex-shrink: 0; transition: opacity 0.2s;
    }
    .cta-btn:hover { opacity: 0.88; }

    .loading-state { display: flex; align-items: center; justify-content: center; min-height: 200px; color: #a098b8; }
  </style>
</head>
<body>
  <div class="dashboard-layout">

    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">
        <a href="../../../HOME/index.html"><img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" /></a>
      </div>
      <a href="../Profiles/profile-select.html" class="sidebar-profile-switcher" id="sidebar-profile-switcher" aria-label="Switch profile">
        <div class="sidebar-profile-avatar-placeholder" id="sidebar-avatar-placeholder">👤</div>
        <div class="sidebar-profile-switcher-info">
          <div class="sidebar-profile-switcher-name" id="sidebar-profile-name">One moment...</div>
          <div class="sidebar-profile-switcher-hint">Switch profile</div>
        </div>
        <span class="sidebar-profile-switcher-chevron">▾</span>
      </a>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main">
        <!-- Populated by member-sidebar.js -->
      </nav>
      <div class="sidebar-bottom">
        <div class="sidebar-email" id="sidebar-email"></div>
        <button class="sidebar-logout" id="logout-btn">
          <svg width="14" height="14" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-4-4-4M14 8H6"/>
          </svg>
          Log Out
        </button>
      </div>
    </aside>

    <main class="dashboard-main" id="hub-main">
      <div class="loading-state">Getting your hub ready...</div>
    </main>
  </div>

  <footer style="margin-left:210px;border-top:1px solid rgba(87,46,136,0.08);padding:1rem 2.5rem;display:flex;flex-wrap:wrap;gap:0.5rem 1.5rem;align-items:center;">
    <a href="../../../SHARED/Legal/privacy-policy.html" target="_blank" style="font-size:0.78rem;color:#a098b8;text-decoration:none;font-weight:500;">Privacy Policy</a>
    <a href="../../../SHARED/Legal/terms-of-service.html" target="_blank" style="font-size:0.78rem;color:#a098b8;text-decoration:none;font-weight:500;">Terms of Service</a>
    <span style="font-size:0.78rem;color:#c8c0d8;">© 2026 Build The Show</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/ASSETS/scripts/member-sidebar.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    const profileId = sessionStorage.getItem('bts_active_profile_id');
    if (!profileId) window.location.href = '../Profiles/profile-select.html';

    function updateSidebarAvatar(profile) {
      if (!profile?.headshot_url) return;
      const placeholder = document.getElementById('sidebar-avatar-placeholder');
      if (!placeholder) return;
      const img = document.createElement('img');
      img.src = profile.headshot_url;
      img.alt = '';
      img.className = 'sidebar-profile-avatar';
      placeholder.replaceWith(img);
    }

    function renderHub(profile) {
      const main = document.getElementById('hub-main');
      const firstName = (profile.credit_name || 'there').split(' ')[0];

      main.innerHTML = `
        <div class="hub-welcome">
          <div class="hub-welcome-title">Hey, ${esc(firstName)}.</div>
          <div class="hub-welcome-sub">Find volunteer roles that fit your skills and schedule.</div>
        </div>

        <div class="cta-band">
          <div>
            <div class="cta-band-title">Browse open volunteer roles</div>
            <div class="cta-band-sub">Find opportunities in community productions near you.</div>
          </div>
          <a href="../../../PUBLIC/find.html?type=volunteer" class="cta-btn">Find Roles →</a>
        </div>

        <div class="hub-grid">
          <div class="hub-card">
            <div class="hub-card-title">Volunteer Match</div>
            <p style="font-size:0.875rem;color:#6b5e80;margin-bottom:1rem;">Answer a few questions and we'll match you with productions that need your skills.</p>
            <a href="volunteer-best-fit.html" style="display:inline-flex;align-items:center;gap:0.35rem;padding:0.45rem 1rem;border-radius:8px;border:1.5px solid rgba(87,46,136,0.2);color:#572e88;font-size:0.8rem;font-weight:600;text-decoration:none;">Get Matched →</a>
          </div>
          <div class="hub-card">
            <div class="hub-card-title">Your Profile</div>
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;">
              ${profile.headshot_url
                ? `<img src="${esc(profile.headshot_url)}" style="width:52px;height:65px;border-radius:6px;object-fit:cover;object-position:top;" alt="" />`
                : `<div style="width:52px;height:65px;border-radius:6px;background:#ede8f5;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">👤</div>`}
              <div>
                <div style="font-size:0.9375rem;font-weight:700;color:#1a1530;">${esc(profile.credit_name || 'Unnamed')}</div>
                <div style="font-size:0.78rem;color:#9a90b0;">${esc(profile.profile_display_id || '')}</div>
              </div>
            </div>
            <a href="../Profiles/profile-view.html?id=${esc(profileId)}" style="display:inline-flex;align-items:center;gap:0.35rem;padding:0.45rem 1rem;border-radius:8px;border:1.5px solid rgba(87,46,136,0.2);color:#572e88;font-size:0.8rem;font-weight:600;text-decoration:none;">View Full Profile →</a>
          </div>
        </div>`;
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      sessionStorage.clear();
      window.location.href = '../../../HOME/index.html';
    });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../Account/login.html'; return; }
      document.getElementById('sidebar-email').textContent = session.user.email;

      const { data: profile } = await sb.from('profiles')
        .select('id, credit_name, headshot_url, profile_display_id, sections')
        .eq('id', profileId).single();

      if (!profile) { window.location.href = '../Profiles/profile-select.html'; return; }
      sessionStorage.setItem('bts_active_profile_sections', JSON.stringify(profile.sections || {}));
      sessionStorage.setItem('bts_active_profile_name', profile.credit_name || 'Unnamed');

      renderMemberSidebar('volunteer-hub');
      updateSidebarAvatar(profile);
      renderHub(profile);
    }

    init();
  </script>
  <script defer src="/SHARED/Components/text-fit.js"></script>
</body>
</html>
