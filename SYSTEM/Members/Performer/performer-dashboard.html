<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://tkmaiktxpwqfbgeojbnf.supabase.co" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css?v=typography-safe-20260421-2025" />
  <style>
    body { background: #f4f2f8; }
    .grid-bg { display: none; }

    .sidebar::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('/ASSETS/Images/Grid-Glow-Purple.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .sidebar > * { position: relative; z-index: 1; }

    /* ── Layout ─────────────────────────────────────────────── */
    .dashboard-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: 210px;
      min-height: 100vh;
      background: #572e88;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 1.5rem 1.25rem 1.1rem;
    }

    .sidebar-logo img {
      height: 22px;
      width: auto;
    }

    .sidebar-account {
      margin: 0 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 0.7rem 1rem;
    }

    .sidebar-account-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.2rem;
    }

    .sidebar-account-id {
      font-size: 0.9375rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.03em;
    }

    /* ── Sidebar nav ─────────────────────────────────────────── */
    .sidebar-nav {
      flex: 1;
      padding: 0.25rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 0.75rem;
      border-radius: 7px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--bts-font);
      width: 100%;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    .sidebar-nav-item.active {
      background: rgba(255, 255, 255, 0.16);
      color: #ffffff;
      font-weight: 600;
    }

    /* ── Sidebar profile sub-list ────────────────────────────── */
    .sidebar-profiles-list {
      margin: 0.1rem 0 0.1rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.05rem;
    }

    .sidebar-profile-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-profile-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .sidebar-profile-thumb {
      width: 18px;
      height: 22px;
      border-radius: 3px;
      object-fit: cover;
      object-position: center top;
      background: rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }

    .sidebar-profile-thumb-placeholder {
      width: 18px;
      height: 22px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.18);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.5);
    }

    .sidebar-profile-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-profile-age {
      font-size: 0.68rem;
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.6);
      padding: 0.1rem 0.35rem;
      border-radius: 10px;
      flex-shrink: 0;
    }

    /* ── Sidebar bottom ──────────────────────────────────────── */
    .sidebar-bottom {
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar-email {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 0.65rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-logout {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--bts-font);
      padding: 0;
      transition: color 0.2s;
    }

    .sidebar-logout:hover { color: #ffffff; }

    /* ── Main content ────────────────────────────────────────── */
    .dashboard-main {
      margin-left: 210px;
      flex: 1;
      padding: 2.5rem 2.5rem 4rem;
      min-height: 100vh;
      max-width: calc(100% - 210px);
    }

    /* ── Account number card ─────────────────────────────────── */
    .account-card {
      background: #ffffff;
      border: 1px solid rgba(87, 46, 136, 0.1);
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      display: flex;
      align-items: flex-start;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 6px rgba(87, 46, 136, 0.06);
    }

    .account-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #f4f2f8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 800;
      color: #9a90b0;
      flex-shrink: 0;
    }

    .account-card-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9a90b0;
      margin-bottom: 0.2rem;
    }

    .account-card-id {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1a1530;
      letter-spacing: 0.03em;
      margin-bottom: 0.15rem;
    }

    .account-card-email {
      font-size: 0.875rem;
      color: #6a5a80;
      margin-bottom: 0.6rem;
    }

    .account-card-desc {
      font-size: 0.8125rem;
      color: #a098b8;
      line-height: 1.65;
      max-width: 600px;
    }

    /* ── Section card ────────────────────────────────────────── */
    .section-card {
      background: #ffffff;
      border: 1px solid rgba(87, 46, 136, 0.1);
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      box-shadow: 0 1px 6px rgba(87, 46, 136, 0.06);
    }

    .section-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.25rem;
    }

    .section-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1530;
      margin-bottom: 0.2rem;
    }

    .section-card-subtitle {
      font-size: 0.8rem;
      color: #a098b8;
    }

    /* ── Add profile button ───────────────────────────────────── */
    .btn--add-profile {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      background: #572e88;
      color: #ffffff;
      font-size: 0.8125rem;
      font-weight: 700;
      font-family: var(--bts-font);
      border: none;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn--add-profile:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    /* ── Profile cards grid ──────────────────────────────────── */
    .profiles-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.85rem;
      margin-top: 1.1rem;
    }

    .profile-card {
      display: flex;
      flex-direction: column;
      border: 1.5px solid rgba(87,46,136,0.12);
      border-radius: 12px;
      overflow: hidden;
      padding: 0;
      background: #faf9fd;
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }

    .profile-card:hover {
      border-color: rgba(87,46,136,0.3);
      box-shadow: 0 3px 14px rgba(87,46,136,0.09);
      background: #f6f2fc;
    }

    .profile-card--add {
      display: flex;
      align-items: center;
      justify-content: center;
      border-style: dashed;
      background: transparent;
      text-decoration: none;
      min-height: 220px;
    }
    .profile-card--add:hover { background: rgba(87,46,136,0.04); }
    .profile-card-add-inner { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .profile-card-add-icon { font-size: 1.75rem; color: rgba(87,46,136,0.35); line-height: 1; }
    .profile-card-add-label { font-size: 0.85rem; font-weight: 600; color: rgba(87,46,136,0.5); }

    /* 4:5 portrait image at top of card */
    .profile-card-img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .profile-card-img-placeholder {
      width: 100%;
      aspect-ratio: 4 / 5;
      background: #ede8f5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b0a0cc;
      font-size: 3rem;
    }

    .profile-card-body {
      padding: 0.75rem 1rem 0;
      flex: 1;
    }

    .profile-row-info {
      flex: 1;
      min-width: 0;
    }

    .profile-row-name-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.2rem;
    }

    .profile-row-name {
      font-size: 0.9375rem;
      font-weight: 700;
      color: #1a1530;
    }

    .profile-row-id {
      font-size: 0.7rem;
      font-weight: 600;
      color: #a098b8;
      background: #f4f2f8;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }

    .profile-row-meta {
      font-size: 0.8rem;
      color: #a098b8;
      margin-bottom: 0.35rem;
    }

    .profile-row-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .profile-tag {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      letter-spacing: 0.02em;
    }

    .profile-tag--performer  { background: rgba(87, 46, 136, 0.1);  color: #572e88; }
    .profile-tag--creative   { background: rgba(14, 165, 233, 0.1); color: #0369a1; }
    .profile-tag--volunteer  { background: rgba(239, 68, 68, 0.1);  color: #dc2626; }
    .profile-tag--other      { background: rgba(87, 46, 136, 0.07); color: #7a6498; }

    .profile-type-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.4rem;
    }
    .profile-type-badge {
      font-size: 0.67rem;
      font-weight: 700;
      padding: 0.18rem 0.55rem;
      border-radius: 20px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1.5px solid currentColor;
    }
    .profile-type-badge--performer { color: #572e88; border-color: rgba(87,46,136,0.35); background: rgba(87,46,136,0.07); }
    .profile-type-badge--volunteer { color: #b45309; border-color: rgba(217,119,6,0.35); background: rgba(217,119,6,0.07); }
    .profile-type-badge--creative  { color: #0369a1; border-color: rgba(3,105,161,0.35); background: rgba(14,165,233,0.07); }

    .profile-card-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: auto;
      padding: 0.65rem 1rem;
      border-top: 1px solid rgba(87,46,136,0.08);
    }

    .btn--edit {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.38rem 0.85rem;
      border-radius: 7px;
      border: 1px solid rgba(87, 46, 136, 0.22);
      background: transparent;
      color: #572e88;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: var(--bts-font);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn--edit:hover {
      background: rgba(87, 46, 136, 0.06);
      border-color: rgba(87, 46, 136, 0.38);
    }

    .btn--delete-profile {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      border: 1px solid rgba(87, 46, 136, 0.12);
      background: transparent;
      color: #c4b8d8;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .btn--delete-profile:hover {
      background: rgba(220, 60, 60, 0.06);
      color: #dc2626;
      border-color: rgba(220, 60, 60, 0.22);
    }

    /* ── Add another profile row ─────────────────────────────── */
    .add-profile-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      padding: 0.9rem;
      margin-top: 0.75rem;
      border: 1.5px dashed rgba(87, 46, 136, 0.18);
      border-radius: 10px;
      color: #a098b8;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      background: none;
      font-family: var(--bts-font);
      width: 100%;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .add-profile-row:hover {
      border-color: rgba(87, 46, 136, 0.38);
      color: #572e88;
      background: rgba(87, 46, 136, 0.03);
    }

    /* ── Loading ─────────────────────────────────────────────── */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: #a098b8;
      font-size: 0.9375rem;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 700px) {
      .sidebar {
        width: 100%;
        min-height: auto;
        position: static;
        flex-direction: column;
      }
      .dashboard-main {
        margin-left: 0;
        padding: 1.5rem 1rem 3rem;
        max-width: 100%;
      }
    }
    /* ── Toast ── */
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); color:#e8e0ff; padding:0.7rem 1.2rem; border-radius:0.5rem; font-size:0.87rem; opacity:0; transform:translateY(6px); transition:opacity 0.2s,transform 0.2s; pointer-events:none; z-index:9999; }
    .toast.visible { opacity:1; transform:translateY(0); }
    .toast.toast--error { background:rgba(220,60,60,0.12); border-color:rgba(220,60,60,0.35); color:#f08080; }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    let toastTimer;
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      clearTimeout(toastTimer);
      t.textContent = msg;
      t.classList.toggle('toast--error', isError);
      t.classList.add('visible');
      toastTimer = setTimeout(() => t.classList.remove('visible'), 3000);
    }

    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    // ── Escape HTML ──────────────────────────────────────────────
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    // IDs are stored in the database - no client-side generation needed

    // ── Age from date_of_birth ────────────────────────────────────
    function calcAge(dob) {
      if (!dob) return null;
      const d = new Date(dob);
      const today = new Date();
      let age = today.getFullYear() - d.getFullYear();
      const m = today.getMonth() - d.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
      return age;
    }

    // ── Role tag HTML ─────────────────────────────────────────────
    function profileTypeBadgesHTML(sections) {
      const badges = [];
      if (sections?.performer?.enabled) badges.push(`<span class="profile-type-badge profile-type-badge--performer">Performer</span>`);
      if (sections?.volunteer?.enabled) badges.push(`<span class="profile-type-badge profile-type-badge--volunteer">Volunteer</span>`);
      if (sections?.creative?.enabled)  badges.push(`<span class="profile-type-badge profile-type-badge--creative">Creative Team</span>`);
      return badges.length ? `<div class="profile-type-badges">${badges.join('')}</div>` : '';
    }

    function roleTagsHTML(roles) {
      if (!roles || roles.length === 0) return '';
      const tagClass = {
        'Performer':     'performer',
        'Creative Team': 'creative',
        'Volunteer':     'volunteer',
      };
      return roles.map(r => {
        const cls = tagClass[r] || 'other';
        return `<span class="profile-tag profile-tag--${cls}">${esc(r)}</span>`;
      }).join('');
    }

    // ── Sidebar profile thumbnails ────────────────────────────────
    function renderSidebarProfiles(profiles) {
      const container = document.getElementById('sidebar-profiles-list');
      if (!profiles.length) { container.innerHTML = ''; return; }
      container.innerHTML = profiles.map(p => {
        const firstName = (p.credit_name || '').split(' ')[0] || 'Unnamed';
        const thumb = p.headshot_url
          ? `<img src="${esc(p.headshot_url)}" alt="" class="sidebar-profile-thumb" aria-hidden="true" />`
          : `<div class="sidebar-profile-thumb-placeholder" aria-hidden="true">👤</div>`;
        return `
          <a href="../Profiles/profile-view.html?id=${esc(p.id)}" class="sidebar-profile-item">
            ${thumb}
            <span class="sidebar-profile-name">${esc(firstName)}</span>
          </a>`;
      }).join('');
    }

    // ── Main content ──────────────────────────────────────────────
    function renderMain(user, profiles, accountId) {
      const main = document.getElementById('dashboard-main');

      const profileCardsHTML = profiles.map((p, i) => {
        const name      = p.credit_name || 'Unnamed Profile';
        const age       = calcAge(p.date_of_birth);
        const profileId = p.profile_display_id || `${accountId}-${String(i + 1).padStart(2, '0')}`;
        const metaParts = [];
        if (age !== null) metaParts.push(`Age ${age}`);
        if (p.pronouns)   metaParts.push(p.pronouns);

        const thumb = p.headshot_url
          ? `<img src="${esc(p.headshot_url)}" alt="${esc(name)}" class="profile-card-img" />`
          : `<div class="profile-card-img-placeholder" aria-hidden="true">👤</div>`;

        return `
          <div class="profile-card" onclick="location.href='../Profiles/profile-view.html?id=${esc(p.id)}'">
            ${thumb}
            <div class="profile-card-body">
              <div class="profile-row-name-row">
                <span class="profile-row-name">${esc(name)}</span>
                <span class="profile-row-id">${esc(profileId)}</span>
              </div>
              ${metaParts.length ? `<div class="profile-row-meta">${esc(metaParts.join(' · '))}</div>` : ''}
              ${profileTypeBadgesHTML(p.sections)}
              <div class="profile-row-tags">${roleTagsHTML(p.roles)}</div>
            </div>
            <div class="profile-card-actions" onclick="event.stopPropagation()">
              <a href="../Profiles/profile-view.html?id=${esc(p.id)}" class="btn--edit" style="background:none;border-color:rgba(87,46,136,0.18);color:#7a6e90;">
                <svg width="12" height="12" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
                  <circle cx="8" cy="8" r="3"/><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
                </svg>
                View
              </a>
              <a href="../Profiles/profile-sections.html?id=${esc(p.id)}" class="btn--edit">
                <svg width="12" height="12" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M11 2l3 3-9 9H2v-3L11 2z"/>
                </svg>
                Settings
              </a>
            </div>
          </div>`;
      }).join('');

      main.innerHTML = `
        <!-- Account number card -->
        <div class="account-card" aria-label="Account information">
          <div class="account-card-icon" aria-hidden="true">#</div>
          <div>
            <div class="account-card-label">Account Number</div>
            <div class="account-card-id">${esc(accountId)}</div>
            <div class="account-card-email">${esc(user.email)}</div>
            <p class="account-card-desc">This is your permanent account ID. One account can manage multiple theatre profiles. For example, a parent can manage separate profiles for each of their children. Each profile gets a unique ID with a profile suffix.</p>
          </div>
        </div>

        <!-- Find Auditions -->
        <div style="background:#572e88;border-radius:12px;padding:1.25rem 1.75rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;">
          <div>
            <div style="font-size:0.95rem;font-weight:700;color:#ffffff;margin-bottom:0.2rem;">Browse open auditions</div>
            <div style="font-size:0.8125rem;color:rgba(255,255,255,0.7);">Find and apply for roles in community theatre near you.</div>
          </div>
          <a href="../../../PUBLIC/find.html" style="display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.25rem;border-radius:8px;background:#efab45;color:#1a1008;font-size:0.875rem;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:opacity 0.2s,transform 0.15s;" onmouseover="this.style.opacity='0.9';this.style.transform='translateY(-1px)'" onmouseout="this.style.opacity='1';this.style.transform='none'">Find Auditions →</a>
        </div>

        <!-- Profiles section -->
        <div class="section-card" id="profiles">
          <div class="section-card-header">
            <div>
              <div class="section-card-title">Profiles</div>
              <div class="section-card-subtitle">Each profile is a real person. One account can manage multiple profiles.</div>
            </div>
          </div>

          <div class="profiles-grid">
            ${profileCardsHTML}
            <a href="../Profiles/profile-create.html" class="profile-card profile-card--add">
              <div class="profile-card-add-inner">
                <span class="profile-card-add-icon">+</span>
                <span class="profile-card-add-label">Add Profile</span>
              </div>
            </a>
          </div>
        </div>
      `;
    }

    // ── Delete profile ────────────────────────────────────────────
    document.getElementById('dashboard-main').addEventListener('click', async (e) => {
      const btn = e.target.closest('.btn--delete-profile');
      if (!btn) return;
      const id   = btn.dataset.profileId;
      const name = btn.dataset.profileName;
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      const typed = prompt('Type DELETE to confirm:');
      if (typed !== 'DELETE') return;
      const { error } = await sb.from('profiles').delete().eq('id', id);
      if (error) { showToast('Could not delete profile: ' + error.message, true); return; }
      init();
    });

    // ── Logout ────────────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = '../../../HOME/index.html';
    });

    // ── Init ──────────────────────────────────────────────────────
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../Account/login.html'; return; }

      const user = session.user;

      document.getElementById('sidebar-email').textContent = user.email;

      // Load Member ID and profiles in parallel
      const [memberIdResult, profilesResult] = await Promise.all([
        sb.from('member_ids').select('display_id').eq('user_id', user.id).limit(1),
        sb.from('profiles').select('*').eq('user_id', user.id),
      ]);

      const accountId  = memberIdResult.data?.[0]?.display_id || '-';
      const profileList = profilesResult.data || [];

      document.getElementById('sidebar-account-id').textContent = accountId;

      renderSidebarProfiles(profileList);
      renderMain(user, profileList, accountId);
    }

    // ── Position-based nav ────────────────────────────────────────
    function applyPositionNav() {
      let sections = {};
      try { sections = JSON.parse(sessionStorage.getItem('bts_active_profile_sections') || '{}'); } catch (_) {}
      const isPerformer = !!sections?.performer?.enabled;
      const isVolunteer = !!sections?.volunteer?.enabled;
      const isCreative  = !!sections?.creative?.enabled;

      // Show Applications nav item only for performer positions
      const appLink = document.querySelector('.sidebar-nav-item[href="../Auditions/applications.html"]');
      if (appLink) appLink.style.display = isPerformer || (!isVolunteer && !isCreative) ? '' : 'none';

      // Show Volunteer Match only for volunteer/creative positions
      const volLink = document.querySelector('.sidebar-nav-item[href="../Volunteer/volunteer-best-fit.html"]');
      if (volLink) volLink.style.display = isVolunteer || isCreative || (!isPerformer) ? '' : 'none';
    }

    init();
    applyPositionNav();
  </script>

  <script defer src="/SHARED/Components/text-fit.js"></script>
</body>
</html>
