<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performer Hub - Build The Show</title>
  <link rel="stylesheet" href="/ASSETS/styles/styles.css" />
  <style>
    body { background: #f4f2f8; }

    .hub-welcome {
      margin-bottom: 2rem;
    }
    .hub-welcome-title {
      font-size: 1.5rem; font-weight: 800; color: #1a1530;
      letter-spacing: -0.02em; margin-bottom: 0.3rem;
    }
    .hub-welcome-sub { font-size: 0.9375rem; color: #6b5e80; }

    .hub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 800px) { .hub-grid { grid-template-columns: 1fr; } }

    .hub-card {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
    }
    .hub-card-title {
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: #9a90b0; margin-bottom: 0.75rem;
    }
    .hub-card-empty {
      font-size: 0.875rem; color: #b0a0c8; text-align: center;
      padding: 1.5rem 0;
    }

    .app-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(87,46,136,0.06);
    }
    .app-row:last-child { border-bottom: none; }
    .app-row-info { flex: 1; min-width: 0; }
    .app-row-title { font-size: 0.875rem; font-weight: 600; color: #1a1530; }
    .app-row-meta  { font-size: 0.75rem; color: #9a90b0; margin-top: 0.1rem; }
    .app-row-status {
      font-size: 0.68rem; font-weight: 700; padding: 0.2rem 0.55rem;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .status-pending   { background: rgba(245,158,11,0.1);  color: #d97706; }
    .status-reviewed  { background: rgba(87,46,136,0.1);   color: #572e88; }
    .status-accepted  { background: rgba(22,163,74,0.1);   color: #16a34a; }
    .status-declined  { background: rgba(220,38,38,0.1);   color: #dc2626; }
    .status-withdrawn { background: rgba(156,163,175,0.1); color: #6b7280; }

    .cta-band {
      background: #572e88; border-radius: 14px;
      padding: 1.25rem 1.75rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    .cta-band-title { font-size: 0.9375rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
    .cta-band-sub   { font-size: 0.8125rem; color: rgba(255,255,255,0.7); }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.25rem; border-radius: 8px; background: #efab45;
      color: #1a1008; font-size: 0.875rem; font-weight: 700;
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }
    .cta-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    .loading-state { display: flex; align-items: center; justify-content: center; min-height: 200px; color: #a098b8; }
    /* ── Toast ── */
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); color:#e8e0ff; padding:0.7rem 1.2rem; border-radius:0.5rem; font-size:0.87rem; opacity:0; transform:translateY(6px); transition:opacity 0.2s,transform 0.2s; pointer-events:none; z-index:9999; }
    .toast.visible { opacity:1; transform:translateY(0); }
    .toast.toast--error { background:rgba(220,60,60,0.12); border-color:rgba(220,60,60,0.35); color:#f08080; }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="dashboard-layout">

    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">
        <a href="../../../HOME/index.html"><img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" /></a>
      </div>
      <a href="../Profiles/profile-select.html" class="sidebar-profile-switcher" id="sidebar-profile-switcher" aria-label="Switch profile">
        <div class="sidebar-profile-avatar-placeholder" id="sidebar-avatar-placeholder">👤</div>
        <div class="sidebar-profile-switcher-info">
          <div class="sidebar-profile-switcher-name" id="sidebar-profile-name">One moment...</div>
          <div class="sidebar-profile-switcher-hint">Switch profile</div>
        </div>
        <span class="sidebar-profile-switcher-chevron">▾</span>
      </a>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main">
        <!-- Populated by member-sidebar.js -->
      </nav>
      <div class="sidebar-bottom">
        <div class="sidebar-email" id="sidebar-email"></div>
        <button class="sidebar-logout" id="logout-btn">
          <svg width="14" height="14" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-4-4-4M14 8H6"/>
          </svg>
          Log Out
        </button>
      </div>
    </aside>

    <main class="dashboard-main" id="hub-main">
      <div class="loading-state">Getting your hub ready...</div>
    </main>

  </div>

  <script src="../../../SHARED/Components/legal-footer.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ASSETS/scripts/member-sidebar.js"></script>
<script>
  let toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    clearTimeout(toastTimer);
    t.textContent = msg;
    t.classList.toggle('toast--error', isError);
    t.classList.add('visible');
    toastTimer = setTimeout(() => t.classList.remove('visible'), 3000);
  }

  // ── Supabase client ─────────────────────────────
  const { createClient } = supabase;
  const sb = createClient(
    'https://tkmaiktxpwqfbgeojbnf.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
  );

  // ── Escape HTML ─────────────────────────────────
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str ?? '';
    return d.innerHTML;
  }

  // ── Profile ID check ─────────────────────────────
  const profileId = sessionStorage.getItem('bts_active_profile_id');
  if (!profileId) window.location.href = '../Profiles/profile-select.html';
  let hubRealtimeChannel = null;

  // ── Avatar update safely ────────────────────────
  function updateSidebarAvatar(profile) {
    try {
      if (!profile?.headshot_url) return;
      const placeholder = document.getElementById('sidebar-avatar-placeholder');
      if (!placeholder) return;
      const img = document.createElement('img');
      img.src = profile.headshot_url;
      img.alt = profile.credit_name || '';
      img.className = 'sidebar-profile-avatar';
      placeholder.replaceWith(img);
    } catch (err) {
      console.error('Failed to update sidebar avatar', err);
    }
  }

  // ── Status badges ───────────────────────────────
  function statusBadge(status) {
    const labels = { pending: 'Pending', reviewed: 'Reviewed', accepted: 'Accepted', declined: 'Declined', withdrawn: 'Withdrawn' };
    const cls = { pending: 'status-pending', reviewed: 'status-reviewed', accepted: 'status-accepted', declined: 'status-declined', withdrawn: 'status-withdrawn' };
    const s = (status || 'pending').toLowerCase();
    return `<span class="app-row-status ${cls[s] || 'status-pending'}">${labels[s] || status}</span>`;
  }

  // ── Render hub content ───────────────────────────
  function renderHub(profile, applications) {
    const main = document.getElementById('hub-main');
    const firstName = (profile.credit_name || 'there').split(' ')[0];

    const recentApps = (applications || []).slice(0, 5);
    const appsHTML = recentApps.length
      ? recentApps.map(a => `
          <div class="app-row">
            <div class="app-row-info">
              <div class="app-row-title">${esc(a.productions?.title || 'Production')}</div>
              <div class="app-row-meta">${esc(a.character_name || a.role_interest || 'General audition')}</div>
            </div>
            ${statusBadge(a.status)}
          </div>`).join('')
      : `<div class="hub-card-empty">No applications yet.<br><a href="../../../PUBLIC/find.html" style="color:#572e88;font-weight:600;">Find auditions →</a></div>`;

    main.innerHTML = `
      <div class="hub-welcome">
        <div class="hub-welcome-title">Hey, ${esc(firstName)}.</div>
        <div class="hub-welcome-sub">Here's what's happening with your auditions.</div>
      </div>

      <div class="cta-band">
        <div>
          <div class="cta-band-title">Browse open auditions</div>
          <div class="cta-band-sub">Find roles in community theatre near you.</div>
        </div>
        <a href="../../../PUBLIC/find.html" class="cta-btn">Find Auditions →</a>
      </div>

      <div class="hub-grid">
        <div class="hub-card">
          <div class="hub-card-title">Recent Auditions</div>
          ${appsHTML}
          ${recentApps.length ? `<div style="margin-top:0.75rem;"><a href="../Auditions/applications.html" style="font-size:0.8rem;font-weight:600;color:#572e88;text-decoration:none;">View all →</a></div>` : ''}
        </div>
        <div class="hub-card">
          <div class="hub-card-title">Your Profile</div>
          <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;">
            ${profile.headshot_url
              ? `<img src="${esc(profile.headshot_url)}" style="width:52px;height:65px;border-radius:6px;object-fit:cover;object-position:top;" alt="" />`
              : `<div style="width:52px;height:65px;border-radius:6px;background:#ede8f5;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">👤</div>`}
            <div>
              <div style="font-size:0.9375rem;font-weight:700;color:#1a1530;">${esc(profile.credit_name || 'Unnamed')}</div>
              <div style="font-size:0.78rem;color:#9a90b0;">${esc(profile.profile_display_id || '')}</div>
            </div>
          </div>
          <a href="../Profiles/profile-view.html?id=${esc(profileId)}" style="display:inline-flex;align-items:center;gap:0.35rem;padding:0.45rem 1rem;border-radius:8px;border:1.5px solid rgba(87,46,136,0.2);color:#572e88;font-size:0.8rem;font-weight:600;text-decoration:none;">View Full Profile →</a>
        </div>
      </div>`;
  }

  // ── Logout ───────────────────────────────────────
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
    sessionStorage.clear();
    window.location.href = '../../../HOME/index.html';
  });

  async function loadHubData() {
    const [profileRes, appsRes] = await Promise.all([
      sb.from('profiles').select('id, credit_name, headshot_url, profile_display_id, sections').eq('id', profileId).single(),
      sb.from('audition_applications')
        .select('id, status, character_name, role_interest, created_at, productions(title)')
        .eq('profile_id', profileId)
        .order('created_at', { ascending: false })
        .limit(10),
    ]);

    if (profileRes.error) throw profileRes.error;
    if (appsRes.error) throw appsRes.error;

    const profile = profileRes.data;
    if (!profile) { window.location.href = '../Profiles/profile-select.html'; return; }

    sessionStorage.setItem('bts_active_profile_sections', JSON.stringify(profile.sections || {}));
    sessionStorage.setItem('bts_active_profile_name', profile.credit_name || 'Unnamed');

    updateSidebarAvatar(profile);
    renderHub(profile, appsRes.data || []);
  }

  function subscribeHubRealtime() {
    if (hubRealtimeChannel) {
      try { sb.removeChannel(hubRealtimeChannel); } catch {}
      hubRealtimeChannel = null;
    }

    hubRealtimeChannel = sb
      .channel(`performer-hub-${profileId}`)
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'audition_applications',
        filter: `profile_id=eq.${profileId}`,
      }, async () => {
        await loadHubData();
      })
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'profiles',
        filter: `id=eq.${profileId}`,
      }, async () => {
        await loadHubData();
      })
      .subscribe();
  }

  // ── Init page ────────────────────────────────────
  async function init() {
    try {
      const { data: { session }, error: sessionError } = await sb.auth.getSession();
      if (sessionError || !session) { window.location.href = '../Account/login.html'; return; }

      document.getElementById('sidebar-email').textContent = session.user.email;

      renderMemberSidebar('performer-hub');
      await loadHubData();
      subscribeHubRealtime();
    } catch (err) {
      showToast('Error loading hub: ' + (err.message || err), true);
      console.error(err);
      document.getElementById('hub-main').textContent = 'Could not load your hub. Try refreshing.';
    }
  }

  init();
</script>
</body>
</html>
