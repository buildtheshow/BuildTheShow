<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration | Build The Show</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/ASSETS/styles/casting-card.css?v=in-show-card-20260527" />
  <style>
    /* ── Design tokens ── */
    :root {
      --purple:      #572e88;
      --purple-dark: #1a1530;
      --gold:        #efab45;
      --green:       #769e7b;
      --red:         #d1523d;
      --blue:        #476aaa;
      --ink:         #1a1530;
      --muted:       #6a5a80;
      --soft:        #9a90b0;
      --line:        rgba(87,46,136,0.12);
      --bg:          #efefef;
      --font:        'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    /* ── Loading / error states ── */
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    body.form-ready { display: block; }
    .loading-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
    }
    .loading-logo {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--purple);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.4rem; font-weight: 900;
      overflow: hidden;
    }
    .loading-logo.has-org-logo {
      width: 84px;
      height: 84px;
      border-radius: 18px;
      background: #fff;
      padding: 0.65rem;
      box-shadow: 0 10px 28px rgba(26,21,48,0.08);
    }
    .loading-logo.has-org-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .loading-title { font-size: 1rem; font-weight: 700; color: var(--purple); }
    .loading-copy  { font-size: 0.82rem; color: var(--muted); max-width: 280px; line-height: 1.5; }
    .loading-spinner {
      width: 24px; height: 24px;
      border: 2.5px solid rgba(87,46,136,0.15);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-shell {
      display: none; flex-direction: column; align-items: center;
      gap: 0.85rem; padding: 2rem; text-align: center; max-width: 360px;
    }
    .error-icon { font-size: 2rem; }
    .error-title { font-size: 1rem; font-weight: 700; color: var(--ink); }
    .error-copy  { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

    /* ── RPF shell ── */
    .rpf-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
    }

    /* ── Left sidebar ── */
    .rpf-left-bar {
      width: 240px;
      flex-shrink: 0;
      background: var(--purple);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .rpf-left-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('/ASSETS/Images/Grid-Glow-Purple.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.05;
      pointer-events: none;
    }
    .rpf-left-bar > * { position: relative; z-index: 1; }

    .rpf-left-logo {
      padding: 1.25rem 1.1rem 0;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
    }
    .rpf-left-logo img {
      max-height: 112px;
      max-width: 200px;
      width: auto;
      display: block;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }
    .rpf-left-logo-name {
      font-size: 0.72rem; font-weight: 850;
      color: rgba(255,255,255,0.7); letter-spacing: 0.02em;
    }

    .rpf-left-cards {
      position: relative;
      height: 160px;
      flex-shrink: 0;
      margin: 1.1rem 0.85rem 0.75rem;
    }
    .rpf-card-poster {
      position: absolute; left: 4px; top: 8px;
      width: 100px; aspect-ratio: 8.5 / 11;
      border-radius: 8px; overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.45);
      transform: rotate(-6deg);
      background: #1a1530;
    }
    .rpf-card-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rpf-card-poster-ph {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.1);
      font-size: 2.2rem;
    }
    .rpf-card-inshow {
      position: absolute;
      left: 92px;
      top: 18px;
      width: 108px;
      transform: rotate(1.5deg);
    }
    .rpf-card-inshow .casting-card {
      width: 100%;
      cursor: default;
      box-shadow: 0 7px 22px rgba(0,0,0,0.36);
    }
    .rpf-card-inshow .casting-card:hover {
      transform: none;
      box-shadow: 0 7px 22px rgba(0,0,0,0.36);
    }

    .rpf-left-info {
      padding: 0 1rem 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .rpf-left-prod-name { font-size: 0.8rem; font-weight: 850; color: #fff; line-height: 1.2; }
    .rpf-left-deadline  { font-size: 0.62rem; font-weight: 700; color: rgba(255,255,255,0.6); margin-top: 0.2rem; }

    .rpf-left-nav {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 0;
      scrollbar-width: none;
    }
    .rpf-left-nav::-webkit-scrollbar { display: none; }
    .rpf-left-nav-heading {
      font-size: 0.56rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.45);
      padding: 0 1rem 0.4rem;
    }

    .rpf-left-item { display: block; transition: background 0.1s; }
    .rpf-left-item-main {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.48rem 1rem; cursor: pointer;
    }
    .rpf-left-item:hover { background: rgba(255,255,255,0.08); }
    .rpf-left-item.rpf-active { background: rgba(255,255,255,0.14); }

    .rpf-left-dot {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; font-weight: 800;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0; transition: all 0.15s;
    }
    .rpf-left-item.rpf-active .rpf-left-dot { border-color: #fff; background: #fff; color: var(--purple); }
    .rpf-left-item.rpf-done   .rpf-left-dot { border-color: #34d371; background: #34d371; color: #fff; }

    .rpf-left-label { font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.65); line-height: 1.2; }
    .rpf-left-item.rpf-active .rpf-left-label { color: #fff; }
    .rpf-left-item.rpf-done   .rpf-left-label { color: rgba(255,255,255,0.55); }

    .rpf-left-sublist {
      display: none; flex-direction: column; gap: 0.16rem;
      padding: 0.1rem 0.9rem 0.72rem 2.75rem;
    }
    .rpf-left-item.rpf-active .rpf-left-sublist { display: flex; }
    .rpf-left-subitem {
      display: flex; align-items: center; gap: 0.42rem;
      color: rgba(255,255,255,0.66); font-size: 0.6rem; font-weight: 750;
      line-height: 1.18; padding: 0.16rem 0;
    }
    .rpf-left-subdot {
      width: 0.72rem; height: 0.72rem; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.28);
      display: flex; align-items: center; justify-content: center;
      color: transparent; font-size: 0.48rem; font-weight: 950; flex: 0 0 auto;
    }
    .rpf-left-subitem.rpf-sub-done { color: rgba(255,255,255,0.86); }
    .rpf-left-subitem.rpf-sub-done .rpf-left-subdot { background: #34d371; border-color: #34d371; color: #fff; }

    /* ── Main content area ── */
    .rpf-main {
      flex: 1 1 0;
      min-width: 0;
      overflow-y: auto;
      background: var(--bg);
    }
    .rpf-page { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
    .rpf-card { background: #fff; border-radius: 18px; overflow: hidden; }
    .rpf-body { padding: 2.15rem 1.75rem 0; }

    /* ── Steps / panels ── */
    .rpf-panel { display: none; }
    .rpf-panel.rpf-active { display: block; }
    .rpf-step-title {
      color: var(--ink);
      font-size: 1.52rem; font-weight: 950; line-height: 1.08;
      text-align: center; margin: 0 auto 1.1rem; max-width: 90%;
    }
    .rpf-prefill-badge {
      display: block;
      background: #f1fbf5; border-left: 4px solid #34d371;
      padding: 0.5rem 0.7rem;
      font-size: 0.75rem; font-weight: 800; color: #1a7540;
      margin: 0 auto 0.9rem; text-align: left;
    }

    /* ── Sections within a panel ── */
    .rpf-section {
      margin: 0 0 1.25rem;
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10), 0 1px 3px rgba(0,0,0,0.07);
    }
    .rpf-section-head {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--rpf-head, var(--purple));
      color: var(--rpf-ink, #ffffff);
      padding: 0.55rem 1rem;
      font-size: 0.78rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .rpf-section-body { padding: 1rem; background: var(--rpf-bg, #ffffff); }

    /* ── Fields ── */
    .rpf-form-section-divider {
      margin: 1.55rem 0 0.7rem; padding-bottom: 0.45rem;
      border-bottom: 1.5px solid rgba(87,46,136,0.12);
      font-size: 1.02rem; font-weight: 950;
      letter-spacing: 0; color: var(--ink); text-align: center;
    }
    .rpf-form-section-divider:first-child { margin-top: 0; }
    .rpf-section-text { font-size: 0.84rem; color: #333; line-height: 1.65; margin: 0.15rem 0 0.75rem; }
    .rpf-section-text p { margin: 0 0 0.45em; }
    .rpf-section-text p:last-child { margin-bottom: 0; }
    .rpf-form-group { margin-bottom: 0.75rem; }
    .rpf-form-group:last-child { margin-bottom: 0; }
    .rpf-label { display: block; font-size: 0.78rem; font-weight: 700; color: #000; margin-bottom: 0.35rem; letter-spacing: 0.01em; }
    .rpf-req { color: var(--red); }
    .rpf-input {
      width: 100%; padding: 0.52rem 0.75rem;
      border: 1.5px solid #ebe6f1; border-radius: 8px;
      font-size: 0.875rem; font-family: var(--font);
      color: #000; background: #fff;
      outline: none; box-sizing: border-box; transition: border-color 0.15s;
    }
    .rpf-input:focus { border-color: var(--purple); }
    .rpf-input.rpf-prefilled { background: #eef9f2; border-color: var(--green); color: #1a2e1d; }
    .rpf-form-group:has(.rpf-input.rpf-prefilled) .rpf-label::after { content: " \2713"; color: var(--green); font-weight: 900; margin-left: 0.3em; }
    .rpf-input:not(.rpf-prefilled):not(:focus) { border-color: #ddd8e8; }
    textarea.rpf-input { resize: vertical; min-height: 80px; }
    .rpf-age-note { margin-top: 0.38rem; font-size: 0.72rem; font-weight: 800; color: var(--purple); }
    .rpf-input.rpf-input-error, input.rpf-input-error, select.rpf-input-error, textarea.rpf-input-error { border-color: #d1523d !important; background: #fff5f4 !important; }
    .rpf-field-error { color: #d1523d; font-size: 0.75rem; font-weight: 700; margin-top: 0.35rem; }
    .rpf-agree-row:has(input.rpf-input-error) { color: #d1523d; }

    /* ── Agree row / checkboxes ── */
    .rpf-agree-row {
      display: flex; align-items: flex-start; gap: 0.55rem;
      font-size: 0.8rem; color: #000; line-height: 1.45;
      cursor: pointer; margin-top: 0.4rem;
    }
    .rpf-agree-row input { flex-shrink: 0; margin-top: 0.15rem; accent-color: var(--purple); cursor: pointer; }

    /* ── Medical reveal ── */
    .rpf-medical-reveal {
      border: 1px solid rgba(71,106,170,0.14); border-radius: 10px;
      background: #fff; padding: 0.72rem 0.85rem;
    }
    .rpf-medical-toggle {
      display: flex; align-items: flex-start; gap: 0.58rem;
      cursor: pointer; margin: 0;
      font-size: 0.82rem; font-weight: 850; color: var(--ink); line-height: 1.35;
    }
    .rpf-medical-toggle input { flex: 0 0 auto; margin-top: 0.12rem; width: 1rem; height: 1rem; accent-color: var(--blue); cursor: pointer; }
    .rpf-medical-details { display: none; margin-top: 0.65rem; }
    .rpf-medical-reveal:has(.rpf-medical-toggle input:checked) .rpf-medical-details { display: block; }
    .rpf-medical-details .rpf-label { color: #364c7d; }

    /* ── Solo / pickup toggles ── */
    .rpf-solo-toggle-row {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.7rem 0.9rem; background: rgba(87,46,136,0.06);
      border-radius: 10px; cursor: pointer; margin-bottom: 0.9rem;
    }
    .rpf-solo-toggle-row input { width: 1rem; height: 1rem; accent-color: var(--purple); cursor: pointer; flex-shrink: 0; margin: 0; }
    .rpf-solo-toggle-label { font-size: 0.82rem; font-weight: 800; color: #000; }
    .rpf-pickup-person-heading {
      display: flex; align-items: center; justify-content: space-between;
      margin: 1rem 0 0; padding: 0.52rem 0.8rem;
      border: 1px solid rgba(87,46,136,0.14); border-bottom: 0;
      border-radius: 12px 12px 0 0;
      background: var(--blue); color: #fff;
      font-size: 0.7rem; font-weight: 950; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .rpf-pickup-person-heading:first-child { margin-top: 0; }
    .rpf-pickup-field {
      margin-bottom: 0; padding: 0.72rem 0.8rem;
      border: 1px solid rgba(87,46,136,0.14); border-top: 0; background: #fff;
    }
    .rpf-pickup-field--last { margin-bottom: 1rem; border-radius: 0 0 12px 12px; box-shadow: 0 8px 22px rgba(26,21,48,0.08); }
    .rpf-pickup-field .rpf-label { color: #4a3d6b; font-size: 0.72rem; }
    .rpf-pickup-add-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.45rem;
      width: 100%; background: none;
      border: 1.5px dashed rgba(87,46,136,0.3); border-radius: 8px;
      padding: 0.52rem 0.9rem; font-size: 0.78rem; font-weight: 800;
      color: var(--purple); cursor: pointer; font-family: var(--font); margin-bottom: 0.75rem;
      transition: background 0.1s;
    }
    .rpf-pickup-add-btn:hover { background: rgba(87,46,136,0.06); }

    /* ── Sig preview ── */
    .rpf-sig-preview {
      font-family: 'Alex Brush', cursive;
      font-size: 2rem; color: var(--ink);
      line-height: 1.1; min-height: 2.5rem;
      margin-top: 0.35rem; padding: 0.2rem 0;
      border-bottom: 1.5px solid rgba(87,46,136,0.18);
    }

    /* ── CoC / agreements ── */
    .rpf-coc, .rpf-media-release { display: flex; flex-direction: column; gap: 0.9rem; }
    .rpf-coc-section { background: #fff; border-radius: 10px; border: 1px solid rgba(87,46,136,0.1); padding: 0.85rem 1rem; }
    .rpf-coc-section-title { font-size: 0.82rem; font-weight: 900; color: var(--ink); margin-bottom: 0.5rem; }
    .rpf-coc-section-body { font-size: 0.83rem; color: #333; line-height: 1.65; }
    .rpf-coc-section-body p { margin: 0 0 0.45em; }
    .rpf-coc-section-body p:last-child { margin-bottom: 0; }
    .rpf-coc-section-body ul { padding-left: 1.4em; margin: 0.35em 0 0.45em; }
    .rpf-coc-section-body li { margin-bottom: 0.2em; }
    .rpf-mr-section-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.4rem; }
    .rpf-mr-text { font-size: 0.83rem; color: #333; line-height: 1.65; }
    .rpf-mr-text p { margin: 0 0 0.45em; }
    .rpf-mr-text p:last-child { margin-bottom: 0; }
    .rpf-mr-text ul { padding-left: 1.4em; margin: 0.35em 0 0.45em; }
    .rpf-mr-text li { margin-bottom: 0.2em; }
    .rpf-mr-sig-block {
      margin-top: 1rem;
      background: rgba(255,255,255,0.72);
      border: 1.5px solid rgba(87,46,136,0.12);
      border-radius: 14px;
      padding: 1rem;
    }
    .rpf-mr-sig-row { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 0.85rem 1rem; }
    .rpf-mr-sig-row + .rpf-mr-sig-row { margin-top: 0.9rem; }
    .rpf-mr-sig-field { min-width: 0; }
    .rpf-mr-sig-field label { display: block; font-size: 0.75rem; font-weight: 850; color: var(--ink); margin-bottom: 0.4rem; }
    .rpf-mr-sig-field input {
      width: 100%;
      border: 1.5px solid rgba(87,46,136,0.18);
      border-radius: 9px;
      padding: 0.62rem 0.78rem;
      background: #fff;
      color: var(--ink);
      font: 600 0.88rem var(--font);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .rpf-mr-sig-field input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(87,46,136,0.12);
    }
    .rpf-mr-guardian-block { margin-top: 1.2rem; padding-top: 1.15rem; border-top: 1.5px dashed rgba(87,46,136,0.18); }
    .rpf-mr-guardian-label { font-size: 0.74rem; font-weight: 950; color: var(--purple); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
    .rpf-mr-perm-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid rgba(87,46,136,0.1); }
    .rpf-mr-perm-row:last-child { border-bottom: none; padding-bottom: 0; }
    .rpf-mr-perm-label { font-size: 0.83rem; color: #333; line-height: 1.45; flex: 1 1 0; }
    .rpf-mr-perm-choices { display: flex; gap: 0.35rem; flex-shrink: 0; }
    .rpf-mr-perm-choice { display: flex; align-items: center; gap: 0.3rem; font-size: 0.78rem; font-weight: 800; cursor: pointer; padding: 0.35rem 0.6rem; border-radius: 7px; border: 1.5px solid rgba(209,82,61,0.22); white-space: nowrap; transition: all 0.12s; }
    .rpf-mr-perm-choice input[type="radio"] { display: none; }
    .rpf-mr-perm-agree { color: var(--red); }
    .rpf-mr-perm-disagree { color: #888; }
    .rpf-mr-perm-choice:has(input:checked).rpf-mr-perm-agree { background: var(--red); color: #fff; border-color: var(--red); }
    .rpf-mr-perm-choice:has(input:checked).rpf-mr-perm-disagree { background: #888; color: #fff; border-color: #888; }
    .rpf-mr-perms { display: flex; flex-direction: column; gap: 0; }

    /* ── Upload placeholder ── */
    .rpf-upload {
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
      padding: 1.5rem 1rem;
      border: 2px dashed rgba(87,46,136,0.25); border-radius: 10px;
      text-align: center; cursor: pointer;
      transition: border-color 0.15s;
    }
    .rpf-upload:hover { border-color: var(--purple); }
    .rpf-upload-hint { font-size: 0.82rem; color: var(--muted); font-weight: 600; }
    .rpf-upload-sub  { font-size: 0.72rem; color: var(--soft); }

    /* ── Final agreement ── */
    .rpf-final-agree { padding: 0.35rem 0; }
    .rpf-final-kicker { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); text-align: center; margin-bottom: 0.4rem; }
    .rpf-final-title  { font-size: 2.2rem; font-weight: 950; text-align: center; color: var(--ink); letter-spacing: -0.01em; }
    .rpf-final-copy   { font-size: 0.88rem; color: var(--muted); text-align: center; line-height: 1.55; margin: 0.7rem auto 1.25rem; max-width: 470px; }
    .rpf-final-agree-box {
      background: rgba(87,46,136,0.06);
      border: 1.5px solid rgba(87,46,136,0.08);
      border-radius: 13px;
      padding: 1rem 1.1rem;
      margin-bottom: 1.1rem;
    }
    .rpf-final-agree-box .rpf-agree-row { margin: 0; font-size: 0.88rem; line-height: 1.45; }

    /* ── Production fee ── */
    .rpf-pf { display: flex; flex-direction: column; gap: 0.5rem; }
    .rpf-pf-block { display: flex; flex-direction: column; gap: 0.4rem; }
    .rpf-pf-block-title { font-size: 0.8rem; font-weight: 900; color: var(--ink); margin-bottom: 0.15rem; }
    .rpf-pf-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.35rem 0; border-bottom: 1px solid rgba(87,46,136,0.07); font-size: 0.83rem; }
    .rpf-pf-row-label { color: var(--muted); }
    .rpf-pf-row-value { font-weight: 700; color: var(--ink); }

<body>

  <!-- Loading state -->
  <div class="loading-shell" id="loading-shell">
    <div class="loading-logo">B</div>
    <div class="loading-title">Loading your registration</div>
    <div class="loading-spinner"></div>
    <div class="loading-copy" id="loading-prod-name"></div>
  </div>

  <!-- Error state -->
  <div class="error-shell" id="error-shell">
    <div class="error-icon">&#127917;</div>
    <div class="error-title" id="error-title">Link not found</div>
    <div class="error-copy" id="error-copy">This registration link does not match any active production. It may have expired or been removed. Please contact your production team for a new link.</div>
  </div>

  <!-- Form shell (injected by JS) -->
  <div id="rpf-root" style="display:none; height:100vh; width:100%;"></div>

  <!-- Save indicator -->
  <div class="rpf-save-indicator" id="rpf-save-indicator">Saved</div>

  <script src="/ASSETS/scripts/casting-card.js?v=in-show-card-20260527"></script>
  <script>
  'use strict';

  // ── URL parsing ──────────────────────────────────────────────────────────────
  // URL: /:org/:show/registration/:code
  const _pathParts = window.location.pathname.replace(/^\//, '').split('/');
  const _hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
  const _orgSlug   = _pathParts[0] || '';
  const _showSlug  = _pathParts[1] || '';
  const _regCode   = _pathParts[3] || new URLSearchParams(window.location.search).get('code') || _hashParams.get('code') || '';
  const _applicantId = _hashParams.get('app') || new URLSearchParams(window.location.search).get('app') || '';
  const _productionId = _hashParams.get('prod') || new URLSearchParams(window.location.search).get('prod') || '';
  const _pdfMode = _hashParams.get('pdf') === '1' || new URLSearchParams(window.location.search).get('pdf') === '1';
  const _sampleMode = _hashParams.get('sample') === '1' || new URLSearchParams(window.location.search).get('sample') === '1';
  const _downloadMode = _hashParams.get('download') === '1' || new URLSearchParams(window.location.search).get('download') === '1';

  // ── Supabase ─────────────────────────────────────────────────────────────────
  let sb = null;
  async function ensureSupabaseClient() {
    if (sb) return sb;
    const mod = await import('/ASSETS/scripts/supabase.js');
    sb = mod.supabase;
    return sb;
  }

  // ── Global state ──────────────────────────────────────────────────────────────
  let _offer      = null;
  let _prod       = null;
  let _org        = null;
  let _applicant  = null;
  let _booking    = null;
  let _resolvedProductionId = _productionId || '';
  let _prefill    = null;
  let _registrationRoleNames = [];
  let _regSettings = {};
  let _formTemplates = {};
  let _rpfSections = [];
  let _rpfCurrent  = 0;
  let _rpfCompleted = new Set();
  let _saveTimer   = null;
  let _rehearsalStartDate = '';
  const CAST_OFFER_KEYS = {
    code: '__bts_cast_offer_code',
    token: '__bts_cast_offer_token',
  };

  // ── Utilities ────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function updateLoadingOrganisationLogo(org = null) {
    const logo = document.getElementById('loading-logo');
    if (!logo) return;
    const logoUrl = org?.logo_url || '';
    if (logoUrl) {
      logo.classList.add('has-org-logo');
      logo.innerHTML = `<img src="${esc(logoUrl)}" alt="${esc(org?.name || org?.abbreviation || 'Organisation')}" />`;
      return;
    }
    logo.classList.remove('has-org-logo');
    logo.textContent = (org?.abbreviation || org?.name || 'B').trim().slice(0, 1).toUpperCase() || 'B';
  }

  function showError(title, copy) {
    document.getElementById('loading-shell').style.display = 'none';
    const sh = document.getElementById('error-shell');
    sh.style.display = 'flex';
    if (title) document.getElementById('error-title').textContent = title;
    if (copy)  document.getElementById('error-copy').textContent  = copy;
  }

  function showSavedIndicator() {
    const el = document.getElementById('rpf-save-indicator');
    if (!el) return;
    el.classList.add('visible');
    clearTimeout(el._hideTimer);
    el._hideTimer = setTimeout(() => el.classList.remove('visible'), 1800);
  }

  // ── Default form constants ───────────────────────────────────────────────────
  const REGISTRATION_FORM_TEMPLATE_DEFS = [
    { key: 'cast_registration',   group: 'Core Registration',    color: '#476aaa', defaultOn: true,  title: 'Cast Registration',                     defaultFields: ['Legal first name *', 'Legal last name *', 'Preferred name *', 'Pronouns *', 'Date of birth *', 'Contact email *', 'Contact phone number *', '{guard}Guardian first name *', '{guard}Guardian last name *', '{guard}Guardian relationship to performer *'] },
    { key: 'pickup_dismissal',    group: 'Core Registration',    color: '#476aaa', defaultOn: true,  title: 'Pickup & Dismissal',                    defaultFields: ['{solo-toggle}Performer can leave on their own', '{solo}Authorised pickup 1 full name *', '{solo}Authorised pickup 1 relationship to performer *', '{solo}Authorised pickup 1 phone number *', '{solo}Authorised pickup 2 full name', '{solo}Authorised pickup 2 relationship to performer', '{solo}Authorised pickup 2 phone number', '{pickup-add}', 'Additional pickup notes'] },
    { key: 'emergency_medical',   group: 'Core Registration',    color: '#476aaa', defaultOn: true,  title: 'Emergency & Medical',                   defaultFields: ['Emergency contact name *', 'Emergency contact phone *', 'Emergency contact relationship *', 'Allergies', 'Medications', 'Medical conditions'] },
    { key: 'accessibility',       group: 'Core Registration',    color: '#476aaa', defaultOn: true,  title: 'Accessibility & Accommodation',          defaultFields: ['Accessibility and accommodation needs'] },
    { key: 'cast_agreement',      group: 'Agreements & Consent', color: '#d1523d', defaultOn: true,  title: 'Cast Agreement',                        defaultFields: ['{section}Rehearsal Expectations', 'I understand the rehearsal expectations for this production *', '{section}Attendance Policy', 'I understand the attendance expectations for this production *', '{section}Tech Week & Performance Commitment', 'I understand that attendance during tech week and performances is mandatory *', '{section}Illness & Safety Expectations', 'I understand the illness and safety expectations for this production *'] },
    { key: 'code_of_conduct',     group: 'Agreements & Consent', color: '#d1523d', defaultOn: true,  title: 'Code of Conduct',                       defaultFields: ['{code-of-conduct}'] },
    { key: 'media_release',       group: 'Agreements & Consent', color: '#d1523d', defaultOn: true,  title: 'Media Release',                         defaultFields: ['{media-release}'] },
    { key: 'medical_treatment_auth', group: 'Agreements & Consent', color: '#d1523d', defaultOn: true, title: 'Medical Treatment Authorisation',     defaultFields: ['{medical-treatment-auth}'] },
    { key: 'transportation_waiver',  group: 'Agreements & Consent', color: '#d1523d', defaultOn: false, title: 'Transportation & Travel Permission', defaultFields: ['{travel-permission}'] },
    { key: 'physical_activity_waiver', group: 'Agreements & Consent', color: '#d1523d', defaultOn: false, title: 'Special Performance Acknowledgement', defaultFields: ['{physical-performance}'] },
    { key: 'costume_measurements', group: 'Costumes',            color: '#ca7ea7', defaultOn: true,  title: 'Costume Measurements',                  defaultFields: ['{costume-measurements}'] },
    { key: 'hair_makeup',          group: 'Costumes',            color: '#ca7ea7', defaultOn: true,  title: 'Hair & Makeup',                         defaultFields: ['Skin allergies or sensitivities', 'Makeup sensitivities', 'Wig considerations', 'Other notes for hair and makeup'] },
    { key: 'programme_credit',     group: 'Programme',           color: '#78bbd4', defaultOn: true,  title: 'Programme Credit',                      defaultFields: ['Exact first and last name *'] },
    { key: 'cast_bio',             group: 'Programme',           color: '#78bbd4', defaultOn: true,  title: 'Cast Bio',                              defaultFields: ['Programme bio (50 words or less) *', 'Previous credits', 'Fun fact'] },
    { key: 'headshot',             group: 'Programme',           color: '#78bbd4', defaultOn: true,  title: 'Headshot Submission',                   defaultFields: ['Headshot upload *'] },
    { key: 'production_fee',       group: 'Production Fees',     color: '#769e7b', defaultOn: false, title: 'Production Fees',                       defaultFields: ['{production-fee}'] },
  ];

  const DEFAULT_COC_SECTIONS = [
    { id: 'intro',     title: 'Introduction',                  visible: true, content: `<p>We are committed to creating a safe, respectful, and welcoming environment for everyone involved in this production.</p><p>By participating, all cast members agree to contribute positively to the rehearsal and performance process.</p>` },
    { id: 'respect',   title: 'Respect &amp; Inclusion',       visible: true, content: `<p>All participants are expected to treat others with kindness, respect, and professionalism.</p><p>Bullying, harassment, discrimination, or inappropriate behaviour will not be tolerated.</p>` },
    { id: 'rehearsal', title: 'Rehearsal &amp; Backstage',     visible: true, content: `<p>Participants are expected to arrive on time and prepared, follow direction from the production team, and treat rehearsal and backstage spaces with care.</p>` },
    { id: 'safety',    title: 'Safety &amp; Boundaries',       visible: true, content: `<p>The physical and emotional safety of all participants is important. No participant should feel pressured into any activity that makes them uncomfortable. Speak with the production team if a concern arises.</p>` },
    { id: 'reporting', title: 'Reporting Concerns',            visible: true, content: `<p>If you experience or witness behaviour that violates this Code of Conduct, please report it to the production team. All concerns will be taken seriously.</p>` },
  ];

  const DEFAULT_MEDIA_PERMISSIONS = [
    { id: 'marketing',     label: 'Print and digital marketing (posters, programmes, websites, social media, newsletters)', mode: 'optional' },
    { id: 'name_identify', label: 'Participant may be identified by first name in captions or posts', mode: 'optional' },
    { id: 'archival',      label: 'Internal archival use only (not for public posting)', mode: 'required' },
  ];

  // ── Token substitution ───────────────────────────────────────────────────────
  function buildTokenMap() {
    const perfName = _prefill ? [_prefill.preferred_name || _prefill.first_name, _prefill.last_name].filter(Boolean).join(' ') : '';
    return {
      '{{organisation_name}}': _org?.name || _org?.abbreviation || '',
      '{{org_name}}':          _org?.name || _org?.abbreviation || '',
      '{{show_name}}':         _prod?.title || '',
      '{{show_venue}}':        _prod?.venue || '',
      '{{rehearsal_start_date}}': rpfRehearsalStartDateLabel(),
      '{{rehearsal_end_date}}':   _prod?.end_date   ? new Date(_prod.end_date   + 'T00:00:00').toLocaleDateString('en-CA', { month: 'long', day: 'numeric', year: 'numeric' }) : '',
      '{{performer_name}}':  perfName,
      '{{child_name}}':      perfName,
      '{{etransfer_email}}': _regSettings?.payment_settings?.etransfer_email || '',
      '{{org_email}}':       _regSettings?.payment_settings?.etransfer_email || '',
    };
  }

  function subTokens(html) {
    if (!html) return html || '';
    const map = buildTokenMap();
    return html
      .replace(/\{\{[^}]+\}\}/g, t => map[t] ?? t)
      .replace(/<p>\s*<br\s*\/?>\s*<\/p>/gi, '')
      .replace(/<p>\s*&nbsp;\s*<\/p>/gi, '');
  }

  function rpfDateLabel(raw) {
    const value = String(raw || '').trim();
    if (!value) return '';
    const date = new Date(`${value.slice(0, 10)}T00:00:00`);
    if (Number.isNaN(date.getTime())) return value;
    return date.toLocaleDateString('en-CA', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  const RPF_EVENT_LABELS = {

    choreography: 'Choreography',

    dress: 'Dress Rehearsal',

  function rpfTimeLabel(raw) {
    const value = String(raw || '').slice(11, 16);
    if (!value) return '';
    const [hh, mm] = value.split(':').map(Number);
    if (Number.isNaN(hh) || Number.isNaN(mm)) return value;
    const hour12 = ((hh + 11) % 12) + 1;
    return `${hour12}:${String(mm).padStart(2, '0')} ${hh >= 12 ? 'PM' : 'AM'}`;
  }

  function rpfFormatScheduleEvent(row) {
    if (!row?.start_time) return row?.title || RPF_EVENT_LABELS[row?.event_type] || 'Event';
    const typeLabel = RPF_EVENT_LABELS[row.event_type] || row.event_type || 'Event';
    const date = rpfDateLabel(String(row.start_time).slice(0, 10));
    const time = rpfTimeLabel(row.start_time);
    const venue = row.venue ? ` at ${row.venue}` : '';
    return `${row.title || typeLabel}: ${[date, time].filter(Boolean).join(' at ')}${venue}`;
  }

  function rpfBuildEventScheduleHtml(rows) {
    if (!rows.length) return '';
    const fmtT = t => t ? rpfTimeLabel(t) : '';
    const sorted = [...rows].sort((a, b) => String(a.start_time || '').localeCompare(String(b.start_time || '')));
    return sorted.map(row => {
      const iso      = String(row.start_time || '').slice(0, 10);
      const d        = new Date(iso + 'T12:00:00');
      const dayFirst = isNaN(d) ? iso : `${d.getDate()} ${d.toLocaleDateString('en-CA', { month: 'long' }).toUpperCase()}, ${d.getFullYear()}`;
      const weekday  = !isNaN(d) ? d.toLocaleDateString('en-CA', { weekday: 'long' }) : '';
      const start    = fmtT(row.start_time);
      const end      = fmtT(row.end_time);
      const tRange   = start ? `(${end && end !== start ? start + ' – ' + end : start})` : '';
      const line1    = `<strong>${dayFirst}</strong> | <em>${[weekday, tRange].filter(Boolean).join(' ')}</em>`;
      const type     = `<strong>${row.title || RPF_EVENT_LABELS[row.event_type] || 'Event'}</strong>`;
      const location = row.venue ? ` | Location: ${row.venue}` : '';
      return `<div style="font-size:14px;color:#1a1530;padding:8px 0;border-bottom:1px solid rgba(87,46,136,0.08);">${line1}<br>${type}${location}</div>`;
    }).join('');
  }

  async function rpfLoadProductionScheduleSummaries() {
    if (!_resolvedProductionId) return { performance_schedule: '', event_schedule: '', production_schedule: '' };
    try {
      const { data, error } = await sb.from('production_events')
        .select('title,start_time,end_time,venue,event_type,is_public,show_in_cast_schedule')
        .eq('production_id', _resolvedProductionId)
        .order('start_time', { ascending: true });
      if (error) throw error;
      const rows = [...(data || [])].sort((a, b) => String(a.start_time || '').localeCompare(String(b.start_time || '')));
      const performanceRows = rows.filter(row => String(row.event_type || '').toLowerCase() === 'performance' && row.show_in_cast_schedule === true);
      const eventRows = rows.filter(row => {
        const type = String(row.event_type || '').toLowerCase();
        if (['audition','dance_call','callback','other_audition'].includes(type)) return false;
        return row.show_in_cast_schedule === true;
      });
      return {
        performance_schedule: performanceRows.map(rpfFormatScheduleEvent).filter(Boolean).join('\n'),
        event_schedule: rpfBuildEventScheduleHtml(eventRows.filter(Boolean)),
        production_schedule: rows.map(rpfFormatScheduleEvent).filter(Boolean).join('\n'),
      };
    } catch (error) {
      console.warn('[BTS] Could not load production schedule for registration email.', error);
      return { performance_schedule: '', event_schedule: '', production_schedule: '' };
    }
  }

  function rpfPlainTextFromHtml(html) {
    return String(html || '')
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<\/p>/gi, '\n')
      .replace(/<\/li>/gi, '\n')
      .replace(/<li[^>]*>/gi, '- ')
      .replace(/<[^>]+>/g, '')
      .replace(/&nbsp;/g, ' ')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>')
      .replace(/&quot;/g, '"')
      .replace(/&#39;/g, "'")
      .replace(/\n{3,}/g, '\n\n')
      .trim();
  }

  function rpfBuildPaymentEmailDetails() {
    const s = _regSettings?.payment_settings || {};
    const currency = String(s.currency || 'CAD').toUpperCase();
    const currSym = { CAD: '$', USD: '$', GBP: '£' }[currency] || '$';
    const currCode = currency !== 'CAD' ? ` ${currency}` : '';
    const fmtAmt = value => {
      const n = parseFloat(String(value || '').replace(/[^0-9.]/g, ''));
      if (!Number.isFinite(n) || n <= 0) return '';
      return `${currSym}${Number.isInteger(n) ? n : n.toFixed(2)}${currCode}`;
    };
    const fmtDate = value => rpfDateLabel(value) || '';
    const lines = [];

    if (!s.mode || s.mode === 'none') {
      lines.push('No production fee has been configured for this show.');
    } else if (s.mode === 'flat') {
      if (s.fee) lines.push(`Registration fee: ${fmtAmt(s.fee) || s.fee}`);
      if (s.fee_due_date) lines.push(`Due date: ${fmtDate(s.fee_due_date)}`);
      if (s.late_fee_date) lines.push(`Late payment after: ${fmtDate(s.late_fee_date)}`);
      if (!lines.length) lines.push('Production fee amount has not been configured yet.');
    } else if (s.mode === 'split') {
      const insts = (s.split_installments || []).filter((_, i) => i < (s.split_count || 2));
      if (insts.length) {
        insts.forEach((inst, index) => {
          const due = inst.due_date ? ` due ${fmtDate(inst.due_date)}` : '';
          lines.push(`Payment ${index + 1}: ${fmtAmt(inst.amount) || 'Amount not set'}${due}`);
        });
        const total = insts.reduce((sum, inst) => sum + (parseFloat(String(inst.amount || '').replace(/[^0-9.]/g, '')) || 0), 0);
        if (total > 0) lines.push(`Total: ${fmtAmt(total)}`);
        if (s.split_allow_upfront) lines.push('Full upfront payment is also available.');
      } else {
        lines.push('Payment amounts have not been configured yet.');
      }
    }

    const info = [];
    if (s.checkout_etransfer_enabled !== false && s.etransfer_email) info.push(`E-transfer: ${s.etransfer_email}`);
    if (s.checkout_square_enabled === true) info.push('Square checkout is available.');
    if (s.checkout_pay_later_enabled !== false) info.push('Pay later is available if needed.');
    const instructions = rpfPlainTextFromHtml(subTokens(s.instructions || ''));
    if (instructions) info.push(instructions);

    const discounts = [];
    if (s.sibling_discount_enabled) discounts.push('Sibling/family discount may apply.');
    if (s.volunteer_discount_enabled) discounts.push('Volunteer discount may apply.');
    if (s.scholarship_enabled) discounts.push(s.scholarship_note ? rpfPlainTextFromHtml(subTokens(s.scholarship_note)) : 'Financial assistance is available by request.');

    return {
      schedule: esc(lines.join('\n')),
      information: esc([
        info.join('\n'),
        discounts.length ? `Discounts and assistance:\n${discounts.join('\n')}` : '',
      ].filter(Boolean).join('\n\n')),
    };
  }

  function rpfBuildPaymentEmailSummary() {
    const details = rpfBuildPaymentEmailDetails();
    return [details.schedule, details.information].filter(Boolean).join('\n\n');
  }

  // ── Age helpers ──────────────────────────────────────────────────────────────
  function rpfParseDateValue(value) {
    if (!value) return null;
    if (value instanceof Date) return value;
    const m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    return new Date(value);
  }

  function rpfCalcAge(dob) {
    const d = rpfParseDateValue(dob);
    if (!d || isNaN(d)) return null;
    const today = new Date();
    let age = today.getFullYear() - d.getFullYear();
    const m = today.getMonth() - d.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age--;
    return age >= 0 ? age : null;
  }

  function rpfTodayInputValue() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  window.rpfCheckGuardianFields = function(dobInput) {
    const note = dobInput.closest('.rpf-form-group')?.querySelector('[data-rpf-age-note]');
    if (note) {
      const age = rpfCalcAge(dobInput.value);
      note.textContent = age === null ? '' : `Age today: ${age} ${age === 1 ? 'year old' : 'years old'}`;
      note.style.display = age === null ? 'none' : '';
    }
    const panel = dobInput.closest('.rpf-panel');
    if (!panel) return;
    const age = rpfCalcAge(dobInput.value);
    const isUnder19 = age !== null && age < 19;
    panel.querySelectorAll('[data-rpf-guard]').forEach(el => { el.style.display = isUnder19 ? '' : 'none'; });
    const soloCheckbox = panel.querySelector('.rpf-solo-toggle-row input:not([data-rpf-minor-toggle])');
    if (soloCheckbox && age !== null) {
      const shouldBeChecked = age >= 19;
      if (soloCheckbox.checked !== shouldBeChecked) {
        soloCheckbox.checked = shouldBeChecked;
        rpfToggleSoloPickup(soloCheckbox);
      }
    }
    panel.querySelectorAll('[data-rpf-minor-toggle]').forEach(cb => {
      if (age !== null) cb.checked = age < 19;
      rpfToggleMinorFields(cb);
    });
  };

  window.rpfToggleSoloPickup = function(checkbox) {
    const body = checkbox.closest('.rpf-section-body, .rpf-panel');

    body.querySelectorAll('[data-rpf-solo]').forEach(el => { el.style.display = checkbox.checked ? 'none' : ''; });

  window.rpfCsdOpen = function(input) {
    if (!window._rpfCsdClickBound) {
      window._rpfCsdClickBound = true;
      document.addEventListener('click', e => {
        if (!e.target.closest('.rpf-csd')) {
          document.querySelectorAll('.rpf-csd-dropdown:not([hidden])').forEach(d => { d.hidden = true; });
        }
      });
    }
    const wrap = input.closest('.rpf-csd');
    if (!wrap) return;
    document.querySelectorAll('.rpf-csd-dropdown:not([hidden])').forEach(d => { if (d !== wrap.querySelector('.rpf-csd-dropdown')) d.hidden = true; });
    const dd = wrap.querySelector('.rpf-csd-dropdown');
    if (dd) dd.hidden = false;
  };

  window.rpfCsdFilter = function(input) {
    rpfCsdOpen(input);
    const q = (input.value || '').toLowerCase().trim();
    const wrap = input.closest('.rpf-csd');
    if (!wrap) return;
    const dd = wrap.querySelector('.rpf-csd-dropdown');
    if (!dd) return;
    let anyVisible = false;
    dd.querySelectorAll('.rpf-csd-group').forEach(grp => {
      let grpVisible = false;
      grp.querySelectorAll('.rpf-csd-option').forEach(opt => {
        const match = !q || opt.textContent.toLowerCase().includes(q);
        opt.classList.toggle('rpf-csd-option--hidden', !match);
        if (match) grpVisible = true;
      });
      grp.hidden = !grpVisible;
      if (grpVisible) anyVisible = true;
    });
    const empty = dd.querySelector('.rpf-csd-empty');
    if (empty) empty.style.display = anyVisible ? 'none' : '';
  };

  window.rpfCsdSelect = function(option, value) {
    const wrap = option.closest('.rpf-csd');
    if (!wrap) return;
    const visibleInput = wrap.querySelector('.rpf-csd-input');
    const hiddenInput  = wrap.querySelector('input[type="hidden"]');
    if (visibleInput) visibleInput.value = value;
    if (hiddenInput)  hiddenInput.value  = value;
    visibleInput?.dispatchEvent(new Event('input', { bubbles: true }));
    hiddenInput?.dispatchEvent(new Event('change', { bubbles: true }));
    const dd = wrap.querySelector('.rpf-csd-dropdown');
    if (dd) dd.hidden = true;
    wrap.querySelectorAll('.rpf-csd-option').forEach(o => o.classList.remove('rpf-csd-option--hidden'));
    wrap.querySelectorAll('.rpf-csd-group').forEach(g => { g.hidden = false; });
    const empty = dd?.querySelector('.rpf-csd-empty');
    if (empty) empty.style.display = 'none';
  };

  // ── Field type detection ──────────────────────────────────────────────────────
  function rpfFieldType(label) {
    const n = label.toLowerCase();
    const pickupMatch = n.match(/^authori[sz]ed pickup \d+ (full name|relationship to performer|phone number)$/);
    if (pickupMatch) return pickupMatch[1] === 'phone number' ? 'tel' : 'text';
    if (/upload|headshot|photo/.test(n)) return 'upload';
    if (/date of birth|birth date|signature date/.test(n)) return 'date';
    if (/\bemail\b/.test(n)) return 'email';
    if (/\bphone\b/.test(n)) return 'tel';
    if (/address|bio|notes|instructions|schedule|credits|fun fact|comments|additional|allergies|medications|conditions|accommodations|supports|needs|requests|describe|other|sensitivities|considerations/.test(n)) return 'textarea';
    if (/acknowledged|consent|agree|authoris|commit|release|permission|waiver|policy|confirm|understand|accept/.test(n)) return 'checkbox';
    return 'text';
  }

  // ── Prefill value resolution ──────────────────────────────────────────────────
  function rpfPrefillValue(label, prefill) {
    if (!prefill) return '';
    const n = label.toLowerCase();
    const pickupMatch = n.match(/^authori[sz]ed pickup (\d+) (full name|relationship to performer|phone number)$/);
    if (pickupMatch) return '';
    if (/legal first name|^first name/.test(n))  return prefill.first_name || '';
    if (/legal last name|^last name/.test(n))    return prefill.last_name  || '';
    if (/preferred name/.test(n))                return prefill.preferred_name || '';
    if (/pronoun/.test(n))                       return prefill.pronouns || '';
    if (/date of birth|birth date/.test(n))      return prefill.date_of_birth || '';
    if (/secondary.*name|additional contact.*name/.test(n)) return prefill.secondary_name || '';
    if (/secondary.*phone|additional contact.*phone/.test(n)) return prefill.secondary_phone || '';
    if (/secondary.*email|additional contact.*email/.test(n)) return prefill.secondary_email || '';
    if (/guardian first name|guardian.*first/.test(n)) return prefill.guardian_first || '';
    if (/guardian last name|guardian.*last/.test(n))   return prefill.guardian_last  || '';
    if (/guardian.*relationship|relationship.*performer/.test(n)) return prefill.guardian_relationship || '';
    if (/guardian.*phone/.test(n)) return prefill.guardian_phone || '';
    if (/guardian.*email/.test(n)) return prefill.guardian_email || '';
    if (/emergency contact name/.test(n))  return prefill.emergency_name || prefill.guardian_first || '';
    if (/emergency contact phone/.test(n)) return prefill.emergency_phone || prefill.guardian_phone || prefill.phone || '';
    if (/contact email|participant email/.test(n)) return prefill.email || '';
    if (/contact phone/.test(n) && !/guardian/.test(n)) return prefill.phone || '';
    if (/\bphone\b/.test(n) && !/guardian/.test(n)) return prefill.phone || '';
    return '';
  }

  function isTemplateEnabled(def) {
    const saved = _regSettings || {};
    const groupKey = `form_group_${String(def.group || '').toLowerCase().replace(/[^a-z0-9]+/g, '_')}`;
    const groupOn = saved[groupKey] !== false;
    if (!groupOn) return false;
    const defKey = `form_${def.key}`;
    if (saved[defKey] !== undefined) return saved[defKey] !== false;
    return def.defaultOn;
  }

  function registrationFormVisibleFields(fields = []) {
    const visible = [];
    let skipping = false;
    fields.forEach(field => {
      const raw = String(field || '').trim();
      if (!raw) return;
      if (raw.startsWith('{section}')) {
        const title = raw.slice(9).trim();
        skipping = /^signature$/i.test(title) || /final acknowledgement|final acknowledgment/i.test(title);
        if (!skipping) visible.push(field);
        return;
      }
      if (skipping) return;
      const label = raw.replace(/^\{(?:minor|solo|guard)\}/, '').replace(/\s*\*$/, '').trim();
      if (!/\bsignature\b/i.test(label)) visible.push(field);
    });
    return visible;
  }

  function rpfDisplayFieldLabel(label) {
    const text = String(label || '').trim();
    if (/^name\s+as\s+it\s+should\s+appear\s+in\s+the\s+programme$/i.test(text)) {
      return 'Exact first and last name';
    }
    return text;
  }

  function rpfTemplateIntro(def, template) {
    const intro = template?.intro ? String(template.intro) : '';
    if (def?.key === 'programme_credit' && (!intro.trim() || /^the\s+name\s+they\s+want\s+printed\s+in\s+the\s+programme\.?$/i.test(intro.trim()))) {
      return 'Enter the exact first and last name to print in the programme. This will be copied and pasted exactly as written.';

    return intro;
  }
