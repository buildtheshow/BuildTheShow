  function rpfCsdBuildDropdown(groups) {
    return groups.map(g => `<div class="rpf-csd-group">
        ${g.options.map(o => `<div class="rpf-csd-option" tabindex="0" data-csd-value="${esc(o)}" onmousedown="event.preventDefault();rpfCsdSelect(this,this.dataset.csdValue)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();rpfCsdSelect(this,this.dataset.csdValue)}">${esc(o)}</div>`).join('')}
      </div>`).join('') + `<div class="rpf-csd-empty" style="display:none;">No matches. Try a different search.</div>`;
  }

  function rpfCsdField({ name, label, groups, hint, required = false }) {
    const req = required ? `<span class="rpf-req"> *</span>` : '';
    return `<div class="rpf-form-group">
      <label class="rpf-label">${esc(label)}${req}</label>
      <div class="rpf-csd">
        <div class="rpf-csd-input-wrap">
          <input class="rpf-csd-input rpf-input" type="text" name="${esc(name)}_display" data-field-name="${esc(label)}" autocomplete="off"
                 placeholder="Search or choose..."
                 oninput="rpfCsdFilter(this)" onfocus="rpfCsdOpen(this)" />
          <span class="rpf-csd-arrow">&#9662;</span>
        </div>
        <div class="rpf-csd-dropdown" hidden>
          ${rpfCsdBuildDropdown(groups)}
        </div>
        <input type="hidden" name="${esc(name)}" />
      </div>
      ${hint ? `<div class="rpf-cm-hint">${esc(hint)}</div>` : ''}
    </div>`;
  }

  // ── Section renderers ────────────────────────────────────────────────────────
  function rpfRenderCostumeMeasurementsSection(template) {
    const g = COSTUME_SIZE_GROUPS;
    const fields = [
      rpfCsdField({ name: 'cm_top_size',    label: 'Top Size',    groups: g.top,        hint: 'e.g. Youth L, Adult M, Adult 2XL',        required: true }),
      rpfCsdField({ name: 'cm_bottom_size', label: 'Bottom Size', groups: g.bottom,     hint: 'e.g. Youth M, Adult 10, 32W',             required: true }),
      rpfCsdField({ name: 'cm_dress_size',  label: 'Dress Size',  groups: g.dress,      hint: 'e.g. Youth 10, Adult M, Adult 8' }),
      rpfCsdField({ name: 'cm_shoe_size',   label: 'Shoe Size',   groups: g.shoe,       hint: "e.g. Kids 4, Women's 8, Men's 10",       required: true }),
      rpfCsdField({ name: 'cm_height',      label: 'Height',      groups: g.height,     hint: "e.g. 5'4\" (163 cm), 4'11\" (150 cm)",   required: true }),
      rpfCsdField({ name: 'cm_hair_length', label: 'Hair Length', groups: g.hairLength, hint: 'e.g. Short (1–3 in), Shoulder-length' }),
      rpfCsdField({ name: 'cm_hair_colour', label: 'Hair Colour', groups: g.hairColour, hint: 'e.g. Medium Brown, Light Blonde' }),
    ].join('');
    const notes = [
      { name: 'cm_costume_notes', label: 'Costume concerns or special considerations', ph: 'Anything the costume team should know about fit, comfort, or preferences...' },
      { name: 'cm_sensory_notes', label: 'Sensory notes', ph: 'e.g. cannot tolerate tight collars, itchy fabrics, or heavy headpieces...' },
    ].map(n => `<div class="rpf-form-group"><label class="rpf-label">${esc(n.label)}</label><textarea class="rpf-input" data-field-name="${esc(n.label)}" rows="2" placeholder="${esc(n.ph)}"></textarea></div>`).join('');
    return `<div class="rpf-cm">${fields}${notes}</div>`;
  }

  function rpfRenderMediaReleaseSection(template) {
    const perms = (template?.permissions || DEFAULT_MEDIA_PERMISSIONS).filter(p => p.mode !== 'hidden');
    const age = rpfCalcAge(_prefill?.date_of_birth);
    const isMinor = age !== null && age < 19;
    const agreement = isMinor
      ? subTokens(template?.agreementTextMinor || `<p>I give permission for {{organisation_name}} to photograph and/or record {{performer_name}} during rehearsals, performances, and other production-related activities.</p><p>I understand these images and recordings may be used for social media, websites, programmes, posters, newsletters, archival purposes, and future production promotion.</p><p>I understand that no compensation will be provided and I release {{organisation_name}} from claims related to the use of this media.</p><p>For participants under the age of 19, this agreement must be completed by a parent or guardian.</p>`)
      : subTokens(template?.agreementTextAdult || `<p>I give permission for {{organisation_name}} to photograph and/or record me during rehearsals, performances, and other production-related activities.</p><p>I understand these images and recordings may be used for social media, websites, programmes, posters, newsletters, archival purposes, and future production promotion.</p><p>I understand that no compensation will be provided and I release {{organisation_name}} from claims related to the use of this media.</p>`);
    const permsHtml = perms.length ? `
      <div class="rpf-coc-section">
        <div class="rpf-coc-section-title">Media permissions</div>
        <div class="rpf-coc-section-body rpf-mr-perms">
          ${perms.map(p => `<div class="rpf-mr-perm-row">
            <span class="rpf-mr-perm-label">${esc(p.label)}</span>
            <div class="rpf-mr-perm-choices">
              <label class="rpf-mr-perm-choice rpf-mr-perm-agree"><input type="radio" name="mr_perm_${esc(p.id)}" value="agree" data-field-name="mr_perm_${esc(p.id)}" checked />I agree</label>
              <label class="rpf-mr-perm-choice rpf-mr-perm-disagree"><input type="radio" name="mr_perm_${esc(p.id)}" value="disagree" />I disagree</label>
            </div>
          </div>`).join('')}
        </div>
      </div>` : '';
    return `<div class="rpf-media-release rpf-coc">
      <div class="rpf-coc-section">
        <div class="rpf-coc-section-title">Media agreement</div>
        <div class="rpf-coc-section-body">${agreement}</div>
      </div>
      ${permsHtml}
    </div>`;
  }

  function rpfRenderCodeOfConductSection(template) {
    const sections = (template?.sections || DEFAULT_COC_SECTIONS).filter(s => s.visible !== false);
    return `<div class="rpf-coc">
      ${sections.map(sec => `<div class="rpf-coc-section">
        <div class="rpf-coc-section-title">${esc(sec.title)}</div>
        <div class="rpf-coc-section-body">${subTokens(sec.content || '')}</div>
      </div>`).join('')}
    </div>`;
  }

  function rpfRenderMedicalTreatmentAuthSection(template) {
    const text = subTokens(template?.agreementText || `<p>I authorise {{organisation_name}} and its representatives to seek emergency medical treatment for {{performer_name}} if reasonable attempts to contact emergency contacts or guardians cannot be made in time.</p><p>I understand that every reasonable effort will be made to contact the participant's emergency contacts or guardians as soon as possible.</p>`);
    return `<div class="rpf-media-release">
      <div class="rpf-mr-section-label">Agreement</div>
      <div class="rpf-mr-text">${text}</div>
    </div>`;
  }

  function rpfRenderTravelPermissionSection(template) {
    const text = subTokens(template?.agreementText || `<p>I give permission for {{performer_name}} to participate in approved production-related travel, transportation, performances, festivals, workshops, and other off-site activities organised by {{organisation_name}}.</p><p>Participants are expected to follow all instructions provided by the production team, supervisors, drivers, and venue staff while participating in off-site activities.</p>`);
    return `<div class="rpf-media-release">
      <div class="rpf-mr-section-label">Agreement</div>
      <div class="rpf-mr-text">${text}</div>
    </div>`;
  }

  function rpfRenderPhysicalPerformanceSection(template) {
    const text = subTokens(template?.agreementText || `<p>I understand that participation in this production may involve elevated physical activity, including choreography, stage combat, flying effects, lifts, or other physically demanding elements.</p><p>I understand that all performers are expected to follow safety instructions, choreography guidance, and staging direction provided by the production team.</p><p>I understand that participation may involve an increased risk of physical injury, and I agree to immediately communicate any injuries, concerns, or physical limitations to the production team.</p>`);
    return `<div class="rpf-media-release">
      <div class="rpf-mr-section-label">Agreement</div>
      <div class="rpf-mr-text">${text}</div>
    </div>`;
  }

  function rpfRenderCastAgreementSection(template) {
    const fields = registrationFormVisibleFields(template?.fields?.length ? template.fields : REGISTRATION_FORM_TEMPLATE_DEFS.find(d => d.key === 'cast_agreement')?.defaultFields || []);
    const sectionTexts = template?.sectionTexts || {
      'Rehearsal Expectations': `<p>Cast members are expected to attend all scheduled rehearsals, arrive on time, and come prepared to participate fully.</p>`,
      'Attendance Policy': `<p>If a performer is unable to attend due to illness or emergency, the production team should be notified as soon as possible. Repeated absences may affect participation in the production.</p>`,
      'Tech Week & Performance Commitment': `<p>Attendance during tech week, dress rehearsals, and performances is mandatory. These rehearsals bring together all technical and performance elements, and every cast member is expected to fully participate.</p>`,
      'Illness & Safety Expectations': `<p>Performers should stay home when sick and notify the production team as soon as possible if they are unable to attend.</p>`,
    };
    const parts = [];
    let current = null;
    fields.forEach(field => {
      const raw = String(field).trim();
      if (raw.startsWith('{section}')) {
        const title = raw.slice(9).trim();
        if (/^signature$/i.test(title) || /final acknowledgement/i.test(title)) return;
        current = title;
        const text = subTokens(sectionTexts[title] || '');
        parts.push(`<div class="rpf-form-section-divider">${esc(title)}</div>${text ? `<div class="rpf-section-text">${text}</div>` : ''}`);
      } else {
        const label = raw.replace(/^\{(?:minor|solo|guard)\}/, '').replace(/\s*\*$/, '').trim();
        if (/\bsignature\b/i.test(label)) return;
        const isReq = raw.endsWith('*');
        const req = isReq ? `<span class="rpf-req"> *</span>` : '';
        if (rpfFieldType(label) === 'checkbox') {
          parts.push(`<div class="rpf-form-group"><label class="rpf-agree-row"><input type="checkbox" data-field-name="${esc(label)}"${isReq ? ' required' : ''} /><span>${esc(label)}${req}</span></label></div>`);
        }
      }
    });
    return `<div class="rpf-coc">${parts.join('')}</div>`;
  }

  function rpfRenderProductionFeeSection(template) {
    const s = _regSettings?.payment_settings || {};
    const age = rpfCalcAge(_prefill?.date_of_birth);
    const currSym = { CAD: '$', USD: '$', GBP: '£' }[s.currency || 'CAD'] || '$';
    const currCode = s.currency && s.currency !== 'CAD' ? ` ${s.currency}` : '';
    const fmtAmt = v => {
      if (!v) return null;
      const n = parseFloat(v);
      if (!Number.isFinite(n)) return null;
      const amount = Number.isInteger(n) ? String(n) : n.toFixed(2);
      return `${currSym}${amount}${currCode}`;
    };
    const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-CA', { month: 'long', day: 'numeric', year: 'numeric' }) : null;
    const row = (label, value, note = '') => `<div class="rpf-pf-row">
      <span class="rpf-pf-row-label">${esc(label)}</span>
      <span class="rpf-pf-row-value">${esc(value)}${note ? `<span class="rpf-pf-sub-note">${esc(note)}</span>` : ''}</span>
    </div>`;
    const discountFact = (label, value) => value ? `<div class="rpf-pf-discount-fact"><span>${esc(label)}</span><span>${esc(value)}</span></div>` : '';
    const discountCard = ({ name, fieldName, title, description, facts = '', extra = '' }) => `<div class="rpf-pf-discount-card">
      <label class="rpf-pf-discount-check">
        <input type="checkbox" name="${esc(name)}" data-field-name="${esc(fieldName || title)}" />
        <span>
          <span class="rpf-pf-discount-title">${esc(title)}</span>
          <span class="rpf-pf-discount-desc">${esc(description)}</span>
        </span>
      </label>
      ${facts ? `<div class="rpf-pf-discount-facts">${facts}</div>` : ''}
      ${extra ? `<div class="rpf-pf-discount-extra">${extra}</div>` : ''}
    </div>`;

    const mode = s.mode || 'none';
    let feeRows = '';
    let feeTotal = '';
    if (mode === 'none' || !mode) {
      feeRows = `<div class="rpf-pf-none">No production fee has been configured for this show.</div>`;
    } else if (mode === 'flat') {
      feeRows = [
        s.fee ? row('Registration fee', fmtAmt(s.fee)) : null,
        s.fee_due_date ? row('Due date', fmtDate(s.fee_due_date)) : null,
        s.late_fee_date ? row('Late payment after', fmtDate(s.late_fee_date)) : null,
      ].filter(Boolean).join('') || `<div class="rpf-pf-none">Fee amount not yet configured.</div>`;
    } else if (mode === 'split') {
      const insts = (s.split_installments || []).filter((_, i) => i < (s.split_count || 2));
      if (insts.length) {
        feeRows = insts.map((inst, i) => {
          const dateLabel = inst.due_date ? ` <em style="font-style:italic;color:#7a6a95;">(due ${fmtDate(inst.due_date)})</em>` : '';
          return `<div class="rpf-pf-split-row">
            <div class="rpf-pf-split-label">Payment ${i + 1}${dateLabel}</div>
            <div class="rpf-pf-split-amount">${esc(fmtAmt(inst.amount) || 'Amount not set')}</div>
          </div>`;
        }).join('');
        const total = insts.reduce((sum, inst) => sum + (parseFloat(inst.amount) || 0), 0);
        if (total > 0) feeTotal = `<div class="rpf-pf-split-total"><span>Total</span><span>${fmtAmt(String(total))}</span></div>`;
        if (s.split_allow_upfront) feeRows += `<div class="rpf-pf-split-upfront"><em>You may also pay the full amount upfront.</em></div>`;
      } else {
        feeRows = `<div class="rpf-pf-none">Payment amounts have not been configured yet.</div>`;
      }
    }

    const discountBlocks = [];
    if (s.sibling_discount_enabled) {
      const facts = [
        s.sibling_first_child ? discountFact('First performer fee', fmtAmt(s.sibling_first_child)) : '',
        s.sibling_additional ? discountFact('Additional performer fee', `${fmtAmt(s.sibling_additional)} per additional performer`) : '',
      ].filter(Boolean).join('');
      discountBlocks.push(discountCard({
        name: 'pf_sibling_discount',
        fieldName: 'Same immediate family, more than one performer',
        title: 'Same immediate family, more than one performer',
        description: 'Choose this if another performer from your immediate family is also registered for this show.',
        facts,
        extra: `<div class="rpf-form-group" style="margin:0;">
          <label class="rpf-label" style="font-size:0.75rem;">Other performer names</label>
          <textarea class="rpf-input" name="pf_sibling_performer_names" data-field-name="Other performer names" rows="2" placeholder="List the other performer names in your immediate family..."></textarea>
        </div>`,
      }));
    }
    if (s.volunteer_discount_enabled) {
      const facts = [
        s.volunteer_discount ? discountFact('Discount', `${fmtAmt(s.volunteer_discount)} off`) : '',
        s.volunteer_hours ? discountFact('Volunteer time', `${s.volunteer_hours} hours`) : '',
      ].filter(Boolean).join('');
      discountBlocks.push(discountCard({
        name: 'pf_volunteer_discount',
        fieldName: 'Someone in our family can volunteer',
        title: 'Someone in our family can volunteer',
        description: 'Volunteering keeps community theatre going. Never helped out before? No worries, we will teach you everything.',
        facts,
        extra: `<div class="rpf-form-group" style="margin:0;">
          <label class="rpf-label" style="font-size:0.75rem;">Volunteer name</label>
          <input type="text" class="rpf-input" name="pf_volunteer_name" data-field-name="Volunteer name" placeholder="Who will volunteer?" />
        </div>
        <div class="rpf-form-group" style="margin:0.72rem 0 0;">
          <label class="rpf-label" style="font-size:0.75rem;">Volunteer note</label>
          <textarea class="rpf-input" name="pf_volunteer_note" data-field-name="Volunteer note" rows="2" placeholder="Anything the production team should know about availability, preferred tasks, or experience?"></textarea>
        </div>`,
      }));
    }
    if (s.scholarship_enabled) {
      const note = s.scholarship_note ? esc(s.scholarship_note) : 'Contact the production team for details.';
      discountBlocks.push(discountCard({
        name: 'pf_scholarship_request',
        fieldName: 'I need help with fees',
        title: 'I need help with fees',
        description: 'Choose this if you would like the production team to follow up about financial assistance.',
        facts: `<div class="rpf-pf-discount-fact"><span>Next step</span><span>${note}</span></div>`,
      }));
    }

    const discountsHtml = discountBlocks.length ? `
      <hr class="rpf-pf-divider" />
      <div class="rpf-pf-block">
        <div class="rpf-pf-block-title">Discounts &amp; Fee Reductions</div>
        <div class="rpf-pf-help-copy">Check anything that applies. We will review it before confirming the final amount.</div>
        <div class="rpf-pf-discount-list">${discountBlocks.join('')}</div>
      </div>` : '';

    const schedSummaryRows = mode === 'split'
      ? (s.split_installments || []).filter((_, i) => i < (s.split_count || 2)).map((inst, i) => {
          const dateLabel = inst.due_date ? ` — due ${fmtDate(inst.due_date)}` : '';
          return `<div class="rpf-pf-row"><span class="rpf-pf-row-label">Payment ${i + 1}${dateLabel}</span><span class="rpf-pf-row-value">${esc(fmtAmt(inst.amount) || 'TBD')}</span></div>`;
        }).join('')
      : mode === 'flat' && s.fee
        ? `<div class="rpf-pf-row"><span class="rpf-pf-row-label">Full fee${s.fee_due_date ? ` — due ${fmtDate(s.fee_due_date)}` : ''}</span><span class="rpf-pf-row-value">${esc(fmtAmt(s.fee))}</span></div>`
        : '';

    const instrHtml = s.instructions ? `
      <hr class="rpf-pf-divider" />
      <div class="rpf-pf-block rpf-pf-instructions">
        <div class="rpf-pf-block-title">How to pay</div>
        ${schedSummaryRows ? `<div style="margin-bottom:0.5rem;">${schedSummaryRows}</div>` : ''}
        <div class="rpf-pf-text">${subTokens(s.instructions)}</div>
      </div>` : '';

    const defaultAck = `<p>I have read and understood the production fee structure, payment schedule, and financial policies outlined above.</p><p>I agree to meet all payment obligations as described, and I understand that participation in {{show_name}} is contingent on compliance with these payment expectations.</p>`;
    const ackRaw = template?.agreementText || defaultAck;
    const ackHtml = `<div style="margin-top:0.25rem;">
      <div class="rpf-pf-text" style="margin-bottom:0.6rem;">${subTokens(ackRaw)}</div>
      <label class="rpf-agree-row"><input type="checkbox" name="pf_ack" data-field-name="Payment expectations acknowledged" required /><span>I agree to the payment expectations and policies outlined above.<span class="rpf-req"> *</span></span></label>
    </div>`;

    return `<div class="rpf-pf">
      <div class="rpf-pf-block">
        <div class="rpf-pf-block-title">Production Fee</div>
        ${feeRows}
        ${feeTotal}
      </div>
      ${discountsHtml}
      ${instrHtml}
      <hr class="rpf-pf-divider" />
      ${ackHtml}
      ${age !== null ? `<input type="hidden" name="pf_signer_age" value="${age}" />` : ''}
    </div>`;
  }

  // ── rpfRenderField — single field string → HTML ──────────────────────────────
  function rpfRenderField(fieldStr) {
    const raw = String(fieldStr).trim();

    if (raw === '{cast-agreement}')       return rpfRenderCastAgreementSection(getFormTemplate('cast_agreement'));
    if (raw === '{media-release}')        return rpfRenderMediaReleaseSection(getFormTemplate('media_release'));
    if (raw === '{code-of-conduct}')      return rpfRenderCodeOfConductSection(getFormTemplate('code_of_conduct'));
    if (raw === '{medical-treatment-auth}')  return rpfRenderMedicalTreatmentAuthSection(getFormTemplate('medical_treatment_auth'));
    if (raw === '{travel-permission}')    return rpfRenderTravelPermissionSection(getFormTemplate('transportation_waiver'));
    if (raw === '{physical-performance}') return rpfRenderPhysicalPerformanceSection(getFormTemplate('physical_activity_waiver'));
    if (raw === '{production-fee}')       return rpfRenderProductionFeeSection(getFormTemplate('production_fee'));
    if (raw === '{costume-measurements}') return rpfRenderCostumeMeasurementsSection(getFormTemplate('costume_measurements'));

    if (raw.startsWith('{section}')) {
      const title = raw.slice(9).trim();
      if (/^signature$/i.test(title) || /final acknowledgement/i.test(title)) return '';
      return `<div class="rpf-form-section-divider">${esc(title)}</div>`;
    }

    if (raw === '{pickup-add}') {
      return `<div class="rpf-form-group" data-rpf-solo="1"><button type="button" class="rpf-pickup-add-btn" onclick="rpfAddPickupPerson(this)">+ Add another person</button></div>`;
    }

    const isMinorToggle = raw.startsWith('{minor-toggle}');
    if (isMinorToggle) {
      const label = raw.slice(14).replace(/\s*\*$/, '').trim();
      const _age = rpfCalcAge(_prefill?.date_of_birth);
      const _checked = _age !== null && _age < 19;
      return `<div class="rpf-form-group"><label class="rpf-solo-toggle-row"><input type="checkbox" data-rpf-minor-toggle="1"${_checked ? ' checked' : ''} data-field-name="${esc(label)}" onchange="rpfToggleMinorFields(this)" /><span class="rpf-solo-toggle-label">${esc(label)}</span></label></div>`;
    }

    const isSoloToggle = raw.startsWith('{solo-toggle}');
    if (isSoloToggle) {
      const label = raw.slice(13).replace(/\s*\*$/, '').trim();
      const _age = rpfCalcAge(_prefill?.date_of_birth);
      const _checked = _age !== null && _age >= 19;
      return `<div class="rpf-form-group"><label class="rpf-solo-toggle-row"><input type="checkbox"${_checked ? ' checked' : ''} data-field-name="${esc(label)}" onchange="rpfToggleSoloPickup(this)" /><span class="rpf-solo-toggle-label">${esc(label)}</span></label></div>`;
    }

    const isSolo  = raw.startsWith('{solo}');
    const isMinor = raw.startsWith('{minor}');
    const afterPrefix = isSolo ? raw.slice(6) : isMinor ? raw.slice(7) : raw;
    const isGuard = afterPrefix.startsWith('{guard}');
    const stripped = isGuard ? afterPrefix.slice(7) : afterPrefix;

    const isRequired = stripped.endsWith('*');
    const label = stripped.replace(/\s*\*$/, '').trim();
    if (/\bsignature\b/i.test(label)) return '';

    const pickupMatch = label.match(/^Authorised pickup (\d+) (full name|relationship to performer|phone number)$/i);
    const pickupPerson = pickupMatch?.[1] || '';
    const pickupPart   = (pickupMatch?.[2] || '').toLowerCase();
    const pickupDivider = pickupPart === 'full name'
      ? `<div class="rpf-pickup-person-heading"${isSolo ? ' data-rpf-solo="1"' : ''}>Person ${pickupPerson}</div>`
      : '';
    const pickupClass = pickupMatch
      ? ` rpf-pickup-field${pickupPart === 'phone number' ? ' rpf-pickup-field--last' : ''}`
      : '';
    const displayLabel = pickupMatch
      ? (pickupPart === 'full name' ? 'Full name' : pickupPart === 'relationship to performer' ? 'Relationship to performer' : 'Phone number')
      : rpfDisplayFieldLabel(label);

    const type = rpfFieldType(label);
    const req  = isRequired ? `<span class="rpf-req"> *</span>` : '';
    const val  = rpfPrefillValue(label.toLowerCase(), _prefill);
    const prefilled = val ? ' rpf-prefilled' : '';

    const soloAttr  = isSolo  ? ' data-rpf-solo="1"' : '';
    const minorAttr = isMinor ? ' data-rpf-minor="1" style="display:none"' : '';
    const guardAttr = isGuard ? ' data-rpf-guard="1" style="display:none"' : '';
    const wrapAttrs = soloAttr + minorAttr + guardAttr;

    // Medical / accessibility reveal pattern
    const medicalReveal = {
      allergies: { check: 'Any allergies?', details: 'Tell us about allergies, reactions, triggers, and what we should do if they happen.' },
      medications: { check: 'Any medications?', details: 'Tell us what they take, when they take it, and anything the team should know.' },
      'medical conditions': { check: 'Any medical conditions we should know about?', details: 'Tell us what the production team needs to know to keep them safe and supported.' },
    }[label.toLowerCase()];
    const supportReveal = /accessibility|accommodation/i.test(label)
      ? { check: 'Does the performer need accessibility or accommodation support?', details: 'Tell us what would help them participate fully.' }
      : null;

    let fieldHtml;
    if (medicalReveal || supportReveal) {
      const reveal = medicalReveal || supportReveal;
      const fieldName = label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
      fieldHtml = `<div class="rpf-form-group${pickupClass}"${wrapAttrs}>
        <div class="rpf-medical-reveal">
          <label class="rpf-medical-toggle">
            <input type="checkbox" name="${esc(fieldName)}_has" data-field-name="${esc(label)}_has" />
            <span>${esc(reveal.check)}${req}</span>
          </label>
          <div class="rpf-medical-details">
            <label class="rpf-label">${esc(reveal.details)}</label>
            <textarea class="rpf-input" name="${esc(fieldName)}_details" data-field-name="${esc(label)}" rows="3" placeholder="Add details here..."></textarea>
          </div>
        </div>
      </div>`;
    } else if (type === 'checkbox') {
      fieldHtml = `<div class="rpf-form-group${pickupClass}"${wrapAttrs}>
        <label class="rpf-agree-row"><input type="checkbox" data-field-name="${esc(label)}"${isRequired ? ' required' : ''} /><span>${esc(displayLabel)}${req}</span></label>
      </div>`;
    } else if (type === 'upload') {
      fieldHtml = `<div class="rpf-form-group${pickupClass}"${wrapAttrs}>
        <label class="rpf-label">${esc(displayLabel)}${req}</label>
        <div class="rpf-upload">
          <div class="rpf-upload-hint">Drop your file here, or <span style="text-decoration:underline;cursor:pointer;">browse</span></div>
          <div class="rpf-upload-sub">JPG, PNG or PDF. Max 10 MB</div>
        </div>
      </div>`;
    } else if (type === 'textarea') {
      fieldHtml = `<div class="rpf-form-group${pickupClass}"${wrapAttrs}>
        <label class="rpf-label">${esc(displayLabel)}${req}</label>
        <textarea class="rpf-input${prefilled}" data-field-name="${esc(label)}" placeholder="${esc(label)}...">${esc(val)}</textarea>
      </div>`;
    } else {
      const isDob = type === 'date' && /date of birth|birth date/.test(label.toLowerCase());
      const dobAttr  = isDob ? ` data-rpf-dob="1" oninput="rpfCheckGuardianFields(this)" onchange="rpfCheckGuardianFields(this)"` : '';
      const ageNote  = isDob
        ? `<div class="rpf-age-note" data-rpf-age-note${rpfCalcAge(val) ? '' : ' style="display:none"'}>${rpfCalcAge(val) !== null ? `Age today: ${rpfCalcAge(val)} ${rpfCalcAge(val) === 1 ? 'year old' : 'years old'}` : ''}</div>`
        : '';
      const isSig    = /\bsignature\b/i.test(label);
      const sigWrap  = isSig ? ' rpf-sig-field-wrap' : '';
      const sigEvent = isSig ? ' oninput="rpfUpdateSigPreview(this)"' : '';
      const ph       = type === 'date' ? '' : `placeholder="${esc(label)}..."`;
      fieldHtml = `<div class="rpf-form-group${pickupClass}${sigWrap}"${wrapAttrs}>
        <label class="rpf-label">${esc(displayLabel)}${req}</label>
        <input type="${type}" class="rpf-input${prefilled}" data-field-name="${esc(label)}" ${ph} value="${esc(val)}"${dobAttr}${sigEvent} />
        ${ageNote}
      </div>`;
    }
    return pickupDivider + fieldHtml;
  }

  // ── Final agreement section ──────────────────────────────────────────────────
  function rpfRenderFinalAgreementSection() {
    const age = rpfCalcAge(_prefill?.date_of_birth);
    const isMinor = age !== null && age < 19;
    const ageUnknown = age === null;
    const perfName = _prefill ? [_prefill.preferred_name || _prefill.first_name || '', _prefill.last_name || ''].filter(Boolean).join(' ') : '';
    const prodName = _prod?.title || 'this production';

    const groupTermMap = {
      'Core Registration': 'registration information',
      'Agreements & Consent': 'agreements and permissions',
      'Costumes': 'costume and appearance details',
      'Programme': 'programme details',
      'Production Fees': 'payment expectations',
    };
    const activeGroups = _rpfSections.filter(g => !g.finalAgreement);
    const terms = activeGroups.map(g => groupTermMap[g.name] || g.name.toLowerCase());
    const termStr = terms.length <= 1
      ? (terms[0] || 'registration materials')
      : terms.slice(0, -1).join(', ') + ', and ' + terms[terms.length - 1];

    const adultSig = `<div class="rpf-mr-sig-block"${isMinor ? ' style="display:none"' : ''}>
      <div class="rpf-mr-sig-row">
        <div class="rpf-mr-sig-field rpf-sig-field-wrap">
          <label>Performer signature<span class="rpf-req"> *</span></label>
          <input type="text" name="final_signer_name" data-field-name="final_signer_name" oninput="rpfUpdateSigPreview(this)"${isMinor ? '' : ' required'} autocomplete="name" value="${esc(perfName)}" />
        </div>
        <div class="rpf-mr-sig-field">
          <label>Date<span class="rpf-req"> *</span></label>
          <input type="date" name="final_signed_date" data-field-name="final_signed_date"${isMinor ? '' : ' required'} value="${rpfTodayInputValue()}" />
        </div>
      </div>
    </div>`;

    const guardianSig = `<div class="rpf-mr-guardian-block"${isMinor || ageUnknown ? '' : ' style="display:none"'}>
      <div class="rpf-mr-guardian-label">Parent / Guardian Signature</div>
      <div class="rpf-mr-sig-block">
        <div class="rpf-mr-sig-row">
          <div class="rpf-mr-sig-field">
            <label>Parent or guardian full name<span class="rpf-req"> *</span></label>
            <input type="text" name="final_guardian_name" data-field-name="final_guardian_name"${isMinor ? ' required' : ''} autocomplete="name" />
          </div>
          <div class="rpf-mr-sig-field">
            <label>Relationship to performer<span class="rpf-req"> *</span></label>
            <input type="text" name="final_guardian_relationship" data-field-name="final_guardian_relationship"${isMinor ? ' required' : ''} />
          </div>
        </div>
        <div class="rpf-mr-sig-row">
          <div class="rpf-mr-sig-field rpf-sig-field-wrap">
            <label>Parent or guardian signature<span class="rpf-req"> *</span></label>
            <input type="text" name="final_guardian_sig" data-field-name="final_guardian_sig" oninput="rpfUpdateSigPreview(this)"${isMinor ? ' required' : ''} />
          </div>
          <div class="rpf-mr-sig-field">
            <label>Date<span class="rpf-req"> *</span></label>
            <input type="date" name="final_guardian_date" data-field-name="final_guardian_date"${isMinor ? ' required' : ''} value="${rpfTodayInputValue()}" />
          </div>
        </div>
      </div>
    </div>`;

    return `<div class="rpf-final-agree">
      <div class="rpf-final-kicker">Final step</div>
      <div class="rpf-final-title">I AGREE</div>
      <div class="rpf-final-copy">By signing below, I confirm that I have reviewed the ${esc(termStr)} for ${esc(prodName)}.</div>
      <div class="rpf-final-agree-box">
        <label class="rpf-agree-row"><input type="checkbox" name="final_all_agree" data-field-name="final_all_agree" required /><span>I have read and agree to the registration terms and confirm the information provided is accurate.<span class="rpf-req"> *</span></span></label>
      </div>
      ${!isMinor ? adultSig : ''}
      ${(isMinor || ageUnknown) ? guardianSig : ''}
    </div>`;
  }

  // ── Validation ───────────────────────────────────────────────────────────────
  function rpfIsFieldVisible(el) {
    let node = el.parentElement;
    while (node && node.id !== 'rpf-root') {
      if (node.hidden || node.style.display === 'none') return false;
      node = node.parentElement;
    }
    return true;
  }

  function rpfMarkFieldError(el) {
    el.classList.add('rpf-input-error');
    const group = el.closest('.rpf-form-group, .rpf-mr-sig-field, .rpf-final-agree-box, .rpf-mr-sig-block');
    if (group && !group.querySelector('.rpf-field-error')) {
      const err = document.createElement('div');
      err.className = 'rpf-field-error';
      err.textContent = 'This field is required.';
      group.appendChild(err);
    }
  }

  function rpfValidatePanel(panelIndex) {
    const panel = document.querySelectorAll('.rpf-panel')[panelIndex];
    if (!panel) return true;
    let valid = true;

    panel.querySelectorAll('.rpf-field-error').forEach(el => el.remove());
    panel.querySelectorAll('.rpf-input-error').forEach(el => el.classList.remove('rpf-input-error'));

    // Required attribute — checkboxes must be checked, text/date/etc must have value
    panel.querySelectorAll('[required]').forEach(el => {
      if (!rpfIsFieldVisible(el)) return;
      const empty = el.type === 'checkbox' ? !el.checked : !el.value.trim();
      if (empty) { rpfMarkFieldError(el); valid = false; }
    });

    // Visually required fields (label has .rpf-req) not already covered by [required]
    panel.querySelectorAll('.rpf-form-group').forEach(group => {
      if (!group.querySelector('.rpf-req')) return;
      // CSD custom dropdown: validate the hidden value input
      const csd = group.querySelector('.rpf-csd');
      if (csd) {
        const hidden = csd.querySelector('input[type="hidden"]');
        const display = csd.querySelector('.rpf-csd-input');
        if (hidden && !hidden.value.trim() && rpfIsFieldVisible(display || hidden)) {
          rpfMarkFieldError(display || hidden); valid = false;
        }
        return;
      }
      // Regular inputs not already flagged by [required]
      group.querySelectorAll('input:not([type="hidden"]):not([type="radio"]):not([required]), select:not([required]), textarea:not([required])').forEach(el => {
        if (!rpfIsFieldVisible(el)) return;
        const empty = el.type === 'checkbox' ? !el.checked : !el.value.trim();
        if (empty) { rpfMarkFieldError(el); valid = false; }
      });
    });

    return valid;
  }

  // ── Navigation ───────────────────────────────────────────────────────────────
  window.rpfGoTo = function(index) {
    if (index < 0 || index >= _rpfSections.length) return;
    const prev = _rpfCurrent;
    if (index > prev) {
      if (!rpfValidatePanel(prev)) {
        const panels = document.querySelectorAll('.rpf-panel');
        panels[prev]?.querySelector('.rpf-input-error')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }
      _rpfCompleted.add(prev);
    }
    _rpfCurrent = index;
    rpfUpdateNav(index);
    document.querySelectorAll('.rpf-panel').forEach((p, i) => p.classList.toggle('rpf-active', i === index));
    document.getElementById('rpf-wizard-body')?.scrollTo({ top: 0, behavior: 'smooth' });
    scheduleSave();
  };

  function rpfUpdateNav(current) {
    _rpfSections.forEach((_, i) => {
      const item = document.getElementById(`rpf-left-item-${i}`);
      const dot  = document.getElementById(`rpf-dot-${i}`);
      if (!item || !dot) return;
      const isDone = _rpfCompleted.has(i) && i !== current;
      item.classList.toggle('rpf-active', i === current);
      item.classList.toggle('rpf-done',   isDone);
      dot.textContent = isDone ? '✓' : String(i + 1);
    });
    const activeItem = document.getElementById(`rpf-left-item-${current}`);
    activeItem?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── Form data collection ──────────────────────────────────────────────────────
  function collectFormAnswers() {
    const shell = document.getElementById('rpf-root');
    if (!shell) return {};
    const answers = {};
    // Named inputs
    shell.querySelectorAll('input[name], select[name], textarea[name]').forEach(el => {
      const name = el.name;
      if (!name) return;
      if (el.type === 'checkbox') answers[name] = el.checked;
      else if (el.type === 'radio') { if (el.checked) answers[name] = el.value; }
      else answers[name] = el.value;
    });
    // data-field-name elements (unnamed)
    shell.querySelectorAll('[data-field-name]:not([name])').forEach(el => {
      const name = el.dataset.fieldName;
      if (!name) return;
      if (el.tagName === 'INPUT' && el.type === 'checkbox') answers[name] = el.checked;
      else if (el.tagName === 'INPUT' && el.type === 'radio') { if (el.checked) answers[name] = el.value; }
      else answers[name] = el.value;
    });
    return answers;
  }

  function rpfTextForPdf(value) {
    return String(value ?? '')
      .replace(/&nbsp;/gi, ' ')
      .replace(/&amp;/gi, '&')
      .replace(/&lt;/gi, '<')
      .replace(/&gt;/gi, '>')
      .replace(/&quot;/gi, '"')
      .replace(/&#39;|&apos;/gi, "'")
      .replace(/\u00a0/g, ' ')
      .replace(/[“”]/g, '"')
      .replace(/[‘’]/g, "'")
      .replace(/[–—]/g, '-')
      .replace(/[^\x09\x0A\x0D\x20-\x7E]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function rpfNodeTextForPdf(node) {
    const html = node.innerHTML !== undefined ? node.innerHTML : (node.textContent || '');
    return rpfTextForPdf(
      html
        .replace(/<br\s*\/?>/gi, ' ')
        .replace(/<\/?(p|div|h[1-6]|li|ul|ol|blockquote)[^>]*>/gi, ' ')
        .replace(/<[^>]+>/g, '')
    );
  }

  function rpfPdfEscape(value) {
    return rpfTextForPdf(value).replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
  }

  function rpfPdfBinaryFromBase64(base64) {
    if (typeof atob === 'function') return atob(base64);
    if (typeof Buffer !== 'undefined') return Buffer.from(base64, 'base64').toString('binary');
    return '';
  }

  function rpfPdfBlobFromBinaryString(pdf) {
    const bytes = new Uint8Array(pdf.length);
    for (let i = 0; i < pdf.length; i += 1) bytes[i] = pdf.charCodeAt(i) & 0xff;
    return new Blob([bytes], { type: 'application/pdf' });
  }

  function rpfSignatureImageForPdf(name) {
    const text = rpfTextForPdf(name);
    if (!text || typeof document === 'undefined') return null;
    const canvas = document.createElement('canvas');
    canvas.width = 900;
    canvas.height = 240;
    const ctx = canvas.getContext('2d');
    if (!ctx) return null;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#572e88';
    ctx.textBaseline = 'middle';
    ctx.font = '132px "Alex Brush", cursive';
    let width = ctx.measureText(text).width;
    if (width > 830) {
      const size = Math.max(76, Math.floor(132 * (830 / width)));
      ctx.font = `${size}px "Alex Brush", cursive`;
      width = ctx.measureText(text).width;
    }
    ctx.fillText(text, 28, 126);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    const base64 = dataUrl.split(',')[1] || '';
    const data = rpfPdfBinaryFromBase64(base64);
    return data ? { data, width: canvas.width, height: canvas.height } : null;
  }

  function rpfPdfLabelForField(el) {
    const permRow = el.closest('.rpf-mr-perm-row');
    if (permRow) return rpfTextForPdf(permRow.querySelector('.rpf-mr-perm-label')?.textContent || el.dataset.fieldName || el.name || 'Answer');
    const wrap = el.closest('.rpf-form-group, .rpf-mr-sig-field, .rpf-final-agree-box');
    const label = wrap?.querySelector('.rpf-label, label, .rpf-mr-guardian-label');
    const raw = label?.textContent || el.dataset.fieldName || el.name || 'Answer';
    return rpfTextForPdf(raw).replace(/\s*\*\s*/g, '').replace(/\s+/g, ' ');
  }

  function rpfPdfValueForField(el) {
    if (el.type === 'checkbox') return el.checked ? 'Yes' : 'No';
    if (el.type === 'radio') {
      const selected = document.querySelector(`input[type="radio"][name="${CSS.escape(el.name)}"]:checked`);
      if (!selected) return 'N/A';
      return rpfTextForPdf(selected.closest('label')?.textContent || selected.value || 'Selected');
    }
    if (el.type === 'file') return el.files?.length ? Array.from(el.files).map(f => f.name).join(', ') : 'N/A';
    return rpfTextForPdf(el.value || 'N/A');
  }

  function rpfPerformerNameForPdf() {
    const fromPrefill = _prefill ? [_prefill.preferred_name || _prefill.first_name || '', _prefill.last_name || ''].filter(Boolean).join(' ') : '';
    const collected = collectFormAnswers();
    return rpfTextForPdf(fromPrefill || [collected['Preferred name'] || collected['Legal first name'] || '', collected['Legal last name'] || ''].filter(Boolean).join(' ') || 'Performer');
  }

  function rpfContractDateForPdf() {
    const collected = collectFormAnswers();
    return rpfTextForPdf(collected.final_guardian_date || collected.final_signed_date || rpfTodayInputValue());
  }

  function rpfContractTitleForPdf() {
    return [
      _org?.name || _org?.abbreviation || 'Organisation',
      _prod?.title || 'Production',
      rpfPerformerNameForPdf(),
      rpfContractDateForPdf(),
    ].map(rpfTextForPdf).filter(Boolean).join(' - ');
  }

  function rpfContractFileSlugForPdf(title) {
    return String(title || 'registration-contract')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '')
      .slice(0, 120) || 'registration-contract';
  }

  function rpfSectionWordingForPdf(section) {
    const selectors = [
      '.rpf-section-text',
      '.rpf-form-section-divider',
      '.rpf-coc-section-title',
      '.rpf-coc-section-body',
      '.rpf-mr-section-label',
      '.rpf-mr-text',
      '.rpf-pf-block-title',
      '.rpf-pf-row',
      '.rpf-pf-split-row',
      '.rpf-pf-none',
      '.rpf-pf-text',
      '.rpf-final-copy',
      '.rpf-final-agree-box span',
      '.rpf-mr-guardian-label',
    ];
    const boldSelectors = new Set(['rpf-coc-section-title', 'rpf-form-section-divider', 'rpf-mr-section-label', 'rpf-pf-block-title', 'rpf-mr-guardian-label']);
    const seen = new Set();
    const wording = [];
    section.querySelectorAll(selectors.join(',')).forEach(node => {
      if (node.closest('.rpf-csd-dropdown')) return;
      if (node.classList.contains('rpf-mr-perms') || node.closest('.rpf-mr-perms')) return;
      const text = rpfNodeTextForPdf(node);
      if (!text || seen.has(text)) return;
      seen.add(text);
      const bold = [...node.classList].some(c => boldSelectors.has(c));
      wording.push({ text, bold });
    });
    return wording;
  }

  function rpfSectionAnswersForPdf(section) {
    const rows = [];
    const seen = new Set();
    const radioGroups = new Set();
    section.querySelectorAll('input, select, textarea').forEach(el => {
      if (el.disabled) return;
      if (el.type === 'hidden') return;
      if (el.closest('.rpf-csd-dropdown')) return;
      if (el.type === 'radio') {
        if (!el.name || radioGroups.has(el.name)) return;
        radioGroups.add(el.name);
      }
      const label = rpfPdfLabelForField(el);
      const value = rpfPdfValueForField(el);
      const key = `${label}::${el.name || el.dataset.fieldName || el.type}`;
      if (seen.has(key)) return;
      seen.add(key);
      rows.push({ label, value, key: el.name || el.dataset.fieldName || '' });
    });
    return rows;
  }

  function rpfCollectAnswerRowsForPdf() {
    const shell = document.getElementById('rpf-root');
    const title = rpfContractTitleForPdf();
    const doc = {
      title,
      fileSlug: rpfContractFileSlugForPdf(title),
      generatedAt: rpfFormatPdfDate(new Date().toISOString(), true),
      organisation: rpfTextForPdf(_org?.name || _org?.abbreviation || 'Organisation'),
      logoUrl: _org?.logo_white_url || _org?.logo_url || '',
      posterUrl: _prod?.poster_url || '',
      production: rpfTextForPdf(_prod?.title || 'Production'),
      performer: rpfPerformerNameForPdf(),
      date: rpfContractDateForPdf(),
      sections: [],
    };
    if (!shell) return doc;
    shell.querySelectorAll('.rpf-panel').forEach(panel => {
      const group = rpfTextForPdf(panel.querySelector('.rpf-step-title')?.textContent);
      panel.querySelectorAll('.rpf-section').forEach(section => {
        const title = rpfTextForPdf(section.querySelector('.rpf-section-head span')?.textContent || group || 'Section');
        doc.sections.push({
          group,
          title,
          wording: rpfSectionWordingForPdf(section),
          answers: rpfSectionAnswersForPdf(section),
        });
      });
    });
    return doc;
  }

  function rpfWrapPdfLine(text, max = 78) {
    const words = rpfTextForPdf(text).split(/\s+/).filter(Boolean);
    const lines = [];
    let line = '';
    words.forEach(word => {
      const next = line ? `${line} ${word}` : word;
      if (next.length > max && line) {
        lines.push(line);
        line = word;
      } else {
        line = next;
      }
    });
    if (line) lines.push(line);
    return lines.length ? lines : [''];
  }

  function rpfPdfAnswerFromDoc(doc, labels) {
    const wanted = labels.map(label => String(label).toLowerCase());
    const normalize = value => String(value || '').toLowerCase();
    for (const section of doc.sections || []) {
      for (const row of section.answers || []) {
        const key = normalize(row.key);
        if (wanted.some(w => key === w)) return rpfTextForPdf(row.value);
      }
    }
    for (const section of doc.sections || []) {
      for (const row of section.answers || []) {
        const label = normalize(row.label);
        if (wanted.some(w => label === w)) return rpfTextForPdf(row.value);
      }
    }
    for (const section of doc.sections || []) {
      for (const row of section.answers || []) {
        const label = normalize(row.label);
        if (wanted.some(w => label.includes(w))) return rpfTextForPdf(row.value);
      }
    }
    return '';
  }

  function rpfFormatPdfDate(value, withTime = false) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    const normalized = /^\d{4}-\d{2}-\d{2}$/.test(raw) ? `${raw}T00:00:00` : raw;
    const date = new Date(normalized);
    if (Number.isNaN(date.getTime())) return raw;
    const options = withTime
      ? { year: 'numeric', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit' }
      : { year: 'numeric', month: 'long', day: 'numeric' };
    return date.toLocaleString('en-CA', options);
  }

  function rpfPdfSignatureInfo(doc) {
    const guardianName = rpfPdfAnswerFromDoc(doc, ['final_guardian_name', 'parent or guardian full name']);
    const guardianRel = rpfPdfAnswerFromDoc(doc, ['final_guardian_relationship', 'relationship to performer']);
    const guardianSig = rpfPdfAnswerFromDoc(doc, ['final_guardian_sig', 'parent or guardian signature']);
    const guardianDate = rpfPdfAnswerFromDoc(doc, ['final_guardian_date']);
    const performerSig = rpfPdfAnswerFromDoc(doc, ['final_signer_name', 'performer signature']);
    const performerDate = rpfPdfAnswerFromDoc(doc, ['final_signed_date']);
    const signer = guardianSig || guardianName || performerSig || doc.performer || 'N/A';
    return {
      signer,
      printedName: guardianName || performerSig || doc.performer || 'N/A',
      relationship: guardianRel || (guardianName ? 'Parent / Guardian' : 'Performer'),
      signedDate: guardianDate || performerDate || doc.date || 'N/A',
    };
  }

  function rpfPdfLineItemsForContract(doc) {
    const items = [];
    const add = (text, opts = {}) => items.push(Object.assign({ type: 'text', text: rpfTextForPdf(text), size: 9.5, font: 'F1', indent: 0, gap: 2, align: 'left', color: 'ink' }, opts));
    const sig = rpfPdfSignatureInfo(doc);
    const sectionColors = ['purple'];

    add('Registration Summary', { size: 22, font: 'F2', align: 'center', gap: 12, color: 'purple' });
    add(doc.production, { size: 12, font: 'F2', align: 'center', gap: 5, color: 'gold' });
    add(doc.organisation, { size: 10, font: 'F1', align: 'center', gap: 18, color: 'muted' });
    items.push({ type: 'rule', gap: 18, color: 'purple' });

    // Details card
    items.push({ type: 'sectionHeader', label: 'Registration Details', color: 'purple', num: '01', gap: 2 });
    [
      ['Organisation', doc.organisation],
      ['Production', doc.production],
      ['Performer', doc.performer],
      ['Date Submitted', rpfFormatPdfDate(doc.date)],
      ['Document Generated', doc.generatedAt],
    ].forEach(([label, value], i) => {
      items.push({ type: 'answerRow', label: rpfTextForPdf(label), value: rpfTextForPdf(value), shade: i % 2 === 0, gap: 0 });
    });
    items.push({ type: 'spacer', h: 14 });

    // Form sections
    (doc.sections || []).forEach((section, index) => {
      const sectionColor = sectionColors[index % sectionColors.length];
      const num = String(index + 2).padStart(2, '0');
      const sectionLabel = [section.group, section.title]
        .filter(Boolean)
        .filter((v, i, a) => a.indexOf(v) === i)
        .join(' - ');
      items.push({ type: 'sectionHeader', label: rpfTextForPdf(sectionLabel), color: sectionColor, num, gap: 2 });
      if (section.wording?.length && !/^costume measurements$/i.test(section.title || '')) {
        items.push({ type: 'wordingBlock', lines: section.wording });
      }
      if (section.answers?.length) {
        section.answers.forEach((row, ri) => {
          items.push({ type: 'answerRow', label: rpfTextForPdf(row.label), value: rpfTextForPdf(row.value), shade: ri % 2 === 0, gap: 0 });
        });
      } else if (!section.wording?.length) {
        add('No information collected for this section.', { indent: 14, gap: 6, color: 'muted', size: 9 });
      }
      items.push({ type: 'spacer', h: 16 });
    });

    items.push({ type: 'signatureBlock', sig });
    return items;
  }

  function rpfBuildAnswersPdf(data) {
    const doc = Array.isArray(data)
      ? { title: rpfContractTitleForPdf(), generatedAt: rpfFormatPdfDate(new Date().toISOString(), true), organisation: _org?.name || _org?.abbreviation || 'Organisation', logoUrl: _org?.logo_white_url || _org?.logo_url || '', posterUrl: _prod?.poster_url || '', production: _prod?.title || 'Production', performer: rpfPerformerNameForPdf(), date: rpfContractDateForPdf(), sections: [{ group: 'Registration', title: 'Submitted Answers', wording: [], answers: data }] }
      : data;
    const lineItems = rpfPdfLineItemsForContract(doc);
    const pages = [[]];
    const firstPageTop = 678;
    const pageTop = 720;
    let y = firstPageTop;
    const nextPage = () => {
      pages.push([]);
      y = pageTop;
    };
    function rpfEstimatePdfItemHeight(item) {
      if (!item) return 0;
      if (item.type === 'spacer') return item.h || 8;
      if (item.type === 'rule') return item.gap || 10;
      if (item.type === 'sectionHeader') return 24 + (item.gap || 4);
      if (item.type === 'answerRow') {
        const wrapLabel = rpfWrapPdfLine(item.label || '', 62);
        const wrapValue = rpfWrapPdfLine(item.value || '', 24);
        return Math.max(wrapLabel.length, wrapValue.length) * 13 + 7 + (item.gap || 0);
      }
      if (item.type === 'wordingBlock') {
        const lineCount = (item.lines || []).reduce((sum, w) => {
          const str = typeof w === 'string' ? w : rpfTextForPdf(w.text || '');
          return sum + rpfWrapPdfLine(str, 116).length;
        }, 0);
        return lineCount * 12 + 16 + (item.gap || 10);
      }
      const lineHeight = Math.max(12, (item.size || 9.5) * 1.35);
      return lineHeight + (item.gap || 0);
    }
    lineItems.forEach((item, index) => {
      if (item.type === 'spacer') {
        y -= item.h || 8;
        return;
      }
      if (item.type === 'rule') {
        if (y < 62) nextPage();
        pages[pages.length - 1].push(Object.assign({}, item, { y }));
        y -= item.gap || 10;
        return;
      }
      if (item.type === 'signatureBlock') {
        const blockH = 108;
        if (y > pageTop - 34 || y - 94 < 62) nextPage();
        pages[pages.length - 1].push(Object.assign({}, item, { y }));
        y -= blockH + 12;
        return;
      }
      if (item.type === 'sectionHeader') {
        const h = 24;
        const nextContent = lineItems[index + 1]?.type === 'spacer' ? lineItems[index + 2] : lineItems[index + 1];
        const keepWith = Math.min(rpfEstimatePdfItemHeight(nextContent), 160, pageTop - 62);
        if (y - h - (item.gap || 4) - keepWith < 62) nextPage();
        pages[pages.length - 1].push(Object.assign({}, item, { y, h }));
        y -= h + (item.gap || 4);
        return;
      }
      if (item.type === 'answerRow') {
        const wrapLabel = rpfWrapPdfLine(item.label || '', 62);
        const wrapValue = rpfWrapPdfLine(item.value || '', 24);
        const rowH = Math.max(wrapLabel.length, wrapValue.length) * 13 + 7;
        if (y - rowH < 62) nextPage();
        pages[pages.length - 1].push(Object.assign({}, item, { y, h: rowH, wrapLabel, wrapValue }));
        y -= rowH + (item.gap || 0);
        return;
      }
      if (item.type === 'wordingBlock') {
        const allLines = (item.lines || []).flatMap(w => {
          const str = typeof w === 'string' ? w : rpfTextForPdf(w.text || '');
          const bold = typeof w !== 'string' && !!w.bold;
          return rpfWrapPdfLine(str, 116).map((t, i) => ({ text: t, bold: bold && i === 0 }));
        });
        let remaining = allLines.slice();
        while (remaining.length) {
          const wordingBottomLimit = 96;
          const available = y - wordingBottomLimit;
          let maxLines = Math.floor((available - 20) / 12);
          if (remaining.length > maxLines && remaining.length - maxLines > 0 && remaining.length - maxLines < 3 && maxLines > 4) {
            maxLines -= 3 - (remaining.length - maxLines);
          }
          if (maxLines < 1) {
            nextPage();
            continue;
          }
          const chunk = remaining.splice(0, maxLines);
          const blockH = chunk.length * 12 + 16;
          pages[pages.length - 1].push(Object.assign({}, item, { y, h: blockH, allLines: chunk }));
          y -= blockH + (remaining.length ? 0 : (item.gap || 10));
          if (remaining.length) nextPage();
        }
        return;
      }
      const maxChars = Math.max(28, Math.floor((512 - item.indent) / (item.size * 0.52)));
      const wrapped = item.text ? rpfWrapPdfLine(item.text, maxChars) : [''];
      wrapped.forEach((line, i) => {
        const lineHeight = Math.max(12, item.size * 1.35);
        if (y - lineHeight < 62) nextPage();
        pages[pages.length - 1].push(Object.assign({}, item, { text: line, y }));
        y -= lineHeight;
        if (i === wrapped.length - 1) y -= item.gap || 0;
      });
    });
    const objects = ['<< /Type /Catalog /Pages 2 0 R >>'];
    const pageRefs = [];
    objects.push(null);
    objects.push('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
    objects.push('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
    objects.push('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Oblique >>');
    let logoObjNum = null;
    if (doc.logoData?.data && doc.logoData?.width && doc.logoData?.height) {
      logoObjNum = objects.length + 1;
      objects.push(`<< /Type /XObject /Subtype /Image /Width ${doc.logoData.width} /Height ${doc.logoData.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${doc.logoData.data.length} >>\nstream\n${doc.logoData.data}\nendstream`);
    }
    let posterObjNum = null;
    if (doc.posterData?.data && doc.posterData?.width && doc.posterData?.height) {
      posterObjNum = objects.length + 1;
      objects.push(`<< /Type /XObject /Subtype /Image /Width ${doc.posterData.width} /Height ${doc.posterData.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${doc.posterData.data.length} >>\nstream\n${doc.posterData.data}\nendstream`);
    }
    const xObjectEntries = [];
    if (logoObjNum) xObjectEntries.push(`/ImLogo ${logoObjNum} 0 R`);
    if (posterObjNum) xObjectEntries.push(`/ImPoster ${posterObjNum} 0 R`);
    let sigImageIndex = 0;
    pages.forEach(pageLines => {
      pageLines.forEach(line => {
        if (line.type !== 'signatureBlock') return;
        const image = rpfSignatureImageForPdf(line.sig?.signer || '');
        if (!image) return;
        const objNum = objects.length + 1;
        const name = `ImSig${++sigImageIndex}`;
        line.signatureImageName = name;
        line.signatureImage = image;
        objects.push(`<< /Type /XObject /Subtype /Image /Width ${image.width} /Height ${image.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${image.data.length} >>\nstream\n${image.data}\nendstream`);
        xObjectEntries.push(`/${name} ${objNum} 0 R`);
      });
    });
    const color = name => ({
      purple: '0.341 0.180 0.533',
      green: '0.463 0.620 0.482',
      gold: '0.937 0.671 0.271',
      blue: '0.278 0.416 0.667',
      pink: '0.792 0.494 0.655',
      ink: '0.102 0.082 0.188',
      muted: '0.416 0.353 0.502',
      white: '1 1 1',
      softGreen: '0.922 0.965 0.929',
      softGold: '1 0.969 0.902',
      softPurple: '0.949 0.933 0.965',
      lightRow: '0.941 0.929 0.961',
    }[name] || '0.102 0.082 0.188');
    pages.forEach((pageLines, pageIndex) => {
      const logoMark = logoObjNum
        ? `\nq\n116 0 0 46 34 735 cm\n/ImLogo Do\nQ`
        : `\nBT\n${color('white')} rg\n/F2 13 Tf\n50 754 Td\n(${rpfPdfEscape(doc.organisation)}) Tj\nET`;
      const posterMark = posterObjNum
        ? `\nq\n${color('white')} rg\n517 729 46 58 re f\nQ\nq\n42 0 0 54 519 731 cm\n/ImPoster Do\nQ`
        : '';
      const pageBrand = pageIndex === 0
        ? `q\n${color('purple')} rg\n0 724 612 68 re f\n${color('gold')} rg\n0 716 612 8 re f\nQ${logoMark}${posterMark}`
        : '';
      const footer = `q\n${color('green')} RG\n0.75 w\n50 46 m\n562 46 l\nS\nQ\nBT\n${color('muted')} rg\n/F1 8 Tf\n50 34 Td\n(${rpfPdfEscape(doc.title)}) Tj\nET\nBT\n${color('muted')} rg\n/F1 8 Tf\n500 34 Td\n(Page ${pageIndex + 1} of ${pages.length}) Tj\nET`;
      const header = pageIndex > 0 ? `BT\n${color('purple')} rg\n/F2 9 Tf\n50 738 Td\n(${rpfPdfEscape(doc.title)}) Tj\nET` : '';
      const body = pageLines.map(line => {
        if (line.type === 'rule') {
          return `q\n${color(line.color)} RG\n1.2 w\n50 ${line.y} m\n562 ${line.y} l\nS\nQ`;
        }
        if (line.type === 'signatureBlock') {
          const sig = line.sig || {};
          const signatureFallback = `BT\n${color('purple')} rg\n/F3 22 Tf\n72 ${line.y - 34} Td\n(${rpfPdfEscape(sig.signer || 'N/A')}) Tj\nET`;
          const signatureMark = line.signatureImageName
            ? `q\n218 0 0 58 72 ${line.y - 51} cm\n/${line.signatureImageName} Do\nQ`
            : signatureFallback;
          return [
            `q\n${color('white')} rg\n44 ${line.y - 94} 524 108 re f\n${color('gold')} RG\n1 w\n44 ${line.y - 94} 524 108 re S\nQ`,
            signatureMark,
            `BT\n${color('purple')} rg\n/F2 10.5 Tf\n64 ${line.y - 6} Td\n(Digital Signature) Tj\nET`,
            `q\n${color('green')} RG\n1 w\n64 ${line.y - 48} m\n302 ${line.y - 48} l\nS\nQ`,
            `BT\n${color('ink')} rg\n/F1 8.6 Tf\n64 ${line.y - 66} Td\n(Digitally signed by: ${rpfPdfEscape(sig.printedName || 'N/A')}) Tj\nET`,
            `BT\n${color('muted')} rg\n/F1 8.6 Tf\n64 ${line.y - 82} Td\n(Relationship / capacity: ${rpfPdfEscape(sig.relationship || 'N/A')}) Tj\nET`,
            `BT\n${color('ink')} rg\n/F1 8.6 Tf\n380 ${line.y - 66} Td\n(Date: ${rpfPdfEscape(sig.signedDate || 'N/A')}) Tj\nET`,
          ].join('\n');
        }
        if (line.type === 'sectionHeader') {
          const bg = line.color || 'purple';
          const fg = bg === 'gold' ? 'ink' : 'white';
          const ty = line.y - line.h + 8;
          return [
            `q\n${color(bg)} rg\n50 ${line.y - line.h} 512 ${line.h} re f\nQ`,
            `BT\n${color(fg)} rg\n/F2 9.5 Tf\n62 ${ty} Td\n(${rpfPdfEscape(line.num || '')}) Tj\nET`,
            `BT\n${color(fg)} rg\n/F2 9.5 Tf\n88 ${ty} Td\n(${rpfPdfEscape(rpfWrapPdfLine(line.label || '', 66)[0] || '')}) Tj\nET`,
          ].join('\n');
        }
        if (line.type === 'answerRow') {
          const parts = [];
          if (line.shade) parts.push(`q\n${color('lightRow')} rg\n50 ${line.y - line.h} 512 ${line.h} re f\nQ`);
          const labelLines = line.wrapLabel || [''];
          const valueLines = line.wrapValue || [''];
          const labelBlockH = labelLines.length * 13;
          const valueBlockH = valueLines.length * 13;
          const labelStartY = line.y - ((line.h - labelBlockH) / 2) - 8;
          const valueStartY = line.y - ((line.h - valueBlockH) / 2) - 8;
          labelLines.forEach((lbl, i) => {
            parts.push(`BT\n${color('ink')} rg\n/F2 8.8 Tf\n58 ${labelStartY - i * 13} Td\n(${rpfPdfEscape(lbl)}) Tj\nET`);
          });
          valueLines.forEach((val, i) => {
            parts.push(`BT\n${color('ink')} rg\n/F1 8.8 Tf\n430 ${valueStartY - i * 13} Td\n(${rpfPdfEscape(val)}) Tj\nET`);
          });
          return parts.join('\n');
        }
        if (line.type === 'wordingBlock') {
          const parts = [`q\n${color('softPurple')} rg\n50 ${line.y - line.h} 512 ${line.h} re f\nQ`];
          (line.allLines || []).forEach((w, i) => {
            const txt = typeof w === 'string' ? w : (w.text || '');
            const bold = typeof w !== 'string' && w.bold;
            const font = bold ? 'F2' : 'F1';
            const sz = bold ? 8.6 : 8.4;
            const c = bold ? 'ink' : 'muted';
            parts.push(`BT\n${color(c)} rg\n/${font} ${sz} Tf\n64 ${line.y - 12 - i * 12} Td\n(${rpfPdfEscape(txt)}) Tj\nET`);
          });
          return parts.join('\n');
        }
        const x = line.align === 'center' ? Math.max(50, 306 - (rpfTextForPdf(line.text).length * line.size * 0.24)) : 50 + (line.indent || 0);
        return `BT\n${color(line.color)} rg\n/${line.font} ${line.size} Tf\n${x} ${line.y} Td\n(${rpfPdfEscape(line.text)}) Tj\nET`;
      }).join('\n');
      const stream = [pageBrand, header, body, footer].filter(Boolean).join('\n');
      const streamObjNum = objects.length + 2;
      const pageObjNum = objects.length + 1;
      const xObjects = xObjectEntries.length ? ` /XObject << ${xObjectEntries.join(' ')} >>` : '';
      objects.push(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Resources << /Font << /F1 3 0 R /F2 4 0 R /F3 5 0 R >>${xObjects} >> /Contents ${streamObjNum} 0 R >>`);
      objects.push(`<< /Length ${stream.length} >>\nstream\n${stream}\nendstream`);
      pageRefs.push(`${pageObjNum} 0 R`);
    });
    objects[1] = `<< /Type /Pages /Kids [${pageRefs.join(' ')}] /Count ${pageRefs.length} >>`;

    let pdf = '%PDF-1.4\n';
    const offsets = [0];
    objects.forEach((obj, idx) => {
      offsets[idx + 1] = pdf.length;
      pdf += `${idx + 1} 0 obj\n${obj}\nendobj\n`;
    });
    const xref = pdf.length;
    pdf += `xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`;
    offsets.slice(1).forEach(offset => { pdf += `${String(offset).padStart(10, '0')} 00000 n \n`; });
    pdf += `trailer\n<< /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
    return pdf;
  }

  function rpfDrawPdfImageToCanvas(img, opts = {}) {
    const canvas = document.createElement('canvas');
    canvas.width = opts.width || 240;
    canvas.height = opts.height || 96;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = opts.background || '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const maxW = opts.maxWidth || canvas.width;
    const maxH = opts.maxHeight || canvas.height;
    const naturalW = img.naturalWidth || img.width || 1;
    const naturalH = img.naturalHeight || img.height || 1;
    const scaleFn = opts.fit === 'cover' ? Math.max : Math.min;
    const scale = scaleFn(maxW / naturalW, maxH / naturalH);
    const w = Math.max(1, naturalW * scale);
    const h = Math.max(1, naturalH * scale);
    ctx.drawImage(img, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    return { width: canvas.width, height: canvas.height, data: rpfPdfBinaryFromBase64(dataUrl.split(',')[1] || '') };
  }

  function rpfLoadImageElement(src, useCors = false) {
    return new Promise(resolve => {
      if (!src) { resolve(null); return; }
      const img = new Image();
      if (useCors) img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = src;
    });
  }

  async function rpfLoadPdfImage(url, opts = {}) {
    if (!url || typeof document === 'undefined') return null;
    let objectUrl = '';
    try {
      if (/^https?:/i.test(url) && typeof fetch === 'function' && typeof URL !== 'undefined') {
        const response = await fetch(url, { mode: 'cors', cache: 'force-cache' });
        if (response.ok) {
          const blob = await response.blob();
          objectUrl = URL.createObjectURL(blob);
          const localImg = await rpfLoadImageElement(objectUrl);
          if (localImg) return rpfDrawPdfImageToCanvas(localImg, opts);
        }
      }
    } catch (error) {
      console.warn('[BTS] PDF image fetch failed; trying direct image load', error);
    } finally {
      if (objectUrl) URL.revokeObjectURL(objectUrl);
    }
    try {
      const directImg = await rpfLoadImageElement(url, true);
      return directImg ? rpfDrawPdfImageToCanvas(directImg, opts) : null;
    } catch (error) {
      console.warn('[BTS] PDF image could not be embedded', error);
      return null;
    }
  }

  function rpfLoadPdfLogo(url) {
    return rpfLoadPdfImage(url, {
      width: 300,
      height: 120,
      maxWidth: 270,
      maxHeight: 86,
      fit: 'contain',
      background: '#572e88',
    });
  }

  function rpfLoadPdfPoster(url) {
    return rpfLoadPdfImage(url, {
      width: 180,
      height: 240,
      maxWidth: 180,
      maxHeight: 240,
      fit: 'cover',
      background: '#ffffff',
    });
  }

  async function rpfEnsureSignatureFont() {
    try {
      if (document.fonts?.load) {
        await document.fonts.load('132px "Alex Brush"');
        await document.fonts.ready;
      }
    } catch {}
  }

  window.rpfDownloadAnswersPdf = async function() {
    const doc = window._rpfSubmittedAnswerRows || rpfCollectAnswerRowsForPdf();
    await rpfEnsureSignatureFont();
    if (!doc.logoData) doc.logoData = await rpfLoadPdfLogo(doc.logoUrl || _org?.logo_white_url || _org?.logo_url || '');
    if (!doc.posterData) doc.posterData = await rpfLoadPdfPoster(doc.posterUrl || _prod?.poster_url || '');
    const pdf = rpfBuildAnswersPdf(doc);
    const slug = doc.fileSlug || rpfContractFileSlugForPdf(doc.title);
    const blob = rpfPdfBlobFromBinaryString(pdf);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${slug}.pdf`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  async function rpfOpenAnswersPdfInline() {
    const doc = window._rpfSubmittedAnswerRows || rpfCollectAnswerRowsForPdf();
    await rpfEnsureSignatureFont();
    if (!doc.logoData) doc.logoData = await rpfLoadPdfLogo(doc.logoUrl || _org?.logo_white_url || _org?.logo_url || '');
    if (!doc.posterData) doc.posterData = await rpfLoadPdfPoster(doc.posterUrl || _prod?.poster_url || '');
    const pdf = rpfBuildAnswersPdf(doc);
    const blob = rpfPdfBlobFromBinaryString(pdf);

  function rpfSavedAnswerValue(saved, key) {
    if (!saved || !key) return undefined;
    if (saved[key] !== undefined) return saved[key];
    const normalizedKey = String(key).toLowerCase().replace(/[^a-z0-9]+/g, '');
    const actual = Object.keys(saved).find(k => String(k).toLowerCase().replace(/[^a-z0-9]+/g, '') === normalizedKey);
    return actual ? saved[actual] : undefined;
  }

  function rpfApplySavedAnswers(saved = _applicant?.custom_answers || {}) {
    const shell = document.getElementById('rpf-root');
    if (!shell || !saved || typeof saved !== 'object') return;
    shell.querySelectorAll('input, select, textarea').forEach(el => {
      if (el.type === 'file') return;
      const key = el.name || el.dataset.fieldName;
      const value = rpfSavedAnswerValue(saved, key);
      if (value === undefined || value === null) return;
      if (el.type === 'checkbox') el.checked = value === true || value === 'true' || value === 'Yes' || value === 'yes' || value === 'on';
      else if (el.type === 'radio') el.checked = String(el.value) === String(value);
      else el.value = String(value);
    });
  }

  async function rpfEnsurePortalCode() {
    if (!_applicant?.id) return '';
    const existing = String(_applicant?.custom_answers?.['__bts_portal_code'] || '').trim();
    if (existing) return existing;
    const buf = new Uint32Array(1);
    if (window.crypto?.getRandomValues) window.crypto.getRandomValues(buf);
    const code = String((buf[0] % 900000) + 100000);
    try {
      const merged = { ...(_applicant.custom_answers || {}), '__bts_portal_code': code };
      await sb.from('audition_applications').update({ custom_answers: merged }).eq('id', _applicant.id);
      _applicant.custom_answers = merged;

    return code;

  // ── Phone formatting ──────────────────────────────────────────────────────────
  function rpfFormatPhone(raw) {
    const digits = String(raw || '').replace(/\D/g, '').slice(0, 10);
    if (digits.length <= 3) return digits;
    if (digits.length <= 6) return `${digits.slice(0,3)}-${digits.slice(3)}`;
    return `${digits.slice(0,3)}-${digits.slice(3,6)}-${digits.slice(6)}`;
  }
  document.addEventListener('input', e => {
    const el = e.target;
    if (el.type !== 'tel') return;
    const pos = el.selectionStart;
    const oldLen = el.value.length;
    el.value = rpfFormatPhone(el.value);
    const newLen = el.value.length;
    el.setSelectionRange(pos + (newLen - oldLen), pos + (newLen - oldLen));
  }, true);

  document.addEventListener('input', e => {
    const el = e.target;
    if (el.classList.contains('rpf-input-error') || el.closest('.rpf-input-error')) {
      el.classList.remove('rpf-input-error');
      el.closest('.rpf-form-group, .rpf-mr-sig-field, .rpf-final-agree-box, .rpf-mr-sig-block')?.querySelector('.rpf-field-error')?.remove();
    }
  }, true);
  document.addEventListener('change', e => {
    const el = e.target;
    if (el.classList.contains('rpf-input-error')) {
      el.classList.remove('rpf-input-error');
      el.closest('.rpf-form-group, .rpf-mr-sig-field, .rpf-final-agree-box, .rpf-mr-sig-block')?.querySelector('.rpf-field-error')?.remove();
    }
  }, true);

  function renderForm() {
    const savedSettings = _regSettings || {};

    // Determine which defs are enabled
    const enabledDefs = REGISTRATION_FORM_TEMPLATE_DEFS.filter(def => {
      const groupKey = `form_group_${String(def.group || '').toLowerCase().replace(/[^a-z0-9]+/g, '_')}`;
      const groupOn = savedSettings[groupKey] !== false;
      if (!groupOn) return false;
      const defKey = `form_${def.key}`;
      if (savedSettings[defKey] !== undefined) return savedSettings[defKey] !== false;
      return def.defaultOn;
    });

    // Build section groups
    const groupOrder = [];
    const groupMap = {};
    enabledDefs.forEach(def => {
      if (!groupMap[def.group]) { groupMap[def.group] = []; groupOrder.push(def.group); }
      groupMap[def.group].push(def);

    const groups = groupOrder.map(name => ({ name, defs: groupMap[name] }));
    groups.push({ name: 'Final Agreement', finalAgreement: true, defs: [{ title: 'I Agree' }] });
