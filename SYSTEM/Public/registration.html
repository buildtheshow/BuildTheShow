      }).join('');

      return `<div class="rpf-panel${i === 0 ? ' rpf-active' : ''}" id="rpf-panel-${i}">
        <div class="rpf-step-title">${esc(g.name)}</div>
        ${hasPrefill && i === 0 ? `<div class="rpf-prefill-badge">&#10003; Pre-filled from your profile</div>` : ''}
        ${sectionsHtml}
        <div class="rpf-nav">
          <button class="rpf-btn-back" style="${i === 0 ? 'visibility:hidden' : ''}" onclick="rpfGoTo(${i - 1})">&#8592; Back</button>
          <div class="rpf-autosave"><div class="rpf-autosave-dot"></div> Saved automatically</div>
          ${isLast
            ? `<button class="rpf-btn-next rpf-submit-btn" onclick="rpfSubmit()">Submit Registration</button>`
            : `<button class="rpf-btn-next" onclick="rpfGoTo(${i + 1})">Next &#8594;</button>`
          }
        </div>
      </div>`;
    }).join('');

    const orgLogoUrl = _org?.logo_white_url || _org?.logo_url || '';
    const orgLogoHtml = orgLogoUrl
      ? `<img src="${esc(orgLogoUrl)}" alt="${esc(_org?.name || '')}" />`
      : `<div class="rpf-left-logo-name">${esc(_org?.name || _org?.abbreviation || 'Build The Show')}</div>`;

    const posterHtml = posterUrl
      ? `<img src="${esc(posterUrl)}" alt="${esc(prodName)}" />`
      : `<div class="rpf-card-poster-ph">&#127917;</div>`;
    const performerFirst = _prefill?.preferred_name || _prefill?.first_name || '';
    const performerLast = _prefill?.last_name || '';
    const performerName = [performerFirst, performerLast].filter(Boolean).join(' ').trim();
    const performerRole = _registrationRoleNames.length ? _registrationRoleNames.join(', ') : 'Cast Member';
    const performerCardHtml = performerName && typeof window.renderCastingCard === 'function'
      ? `<div class="rpf-card-inshow">${window.renderCastingCard({
          first_name: performerFirst,
          last_name: performerLast,
          headshot_url: _prefill?.headshot_url || '',
          character_name: performerRole
        }, { variant: 'inTheShow' })}</div>`
      : '';

    const root = document.getElementById('rpf-root');
    root.innerHTML = `<div class="rpf-shell">
      <div class="rpf-left-bar">
        <div class="rpf-left-logo">${orgLogoHtml}</div>
        <div class="rpf-left-cards">
          <div class="rpf-card-poster">${posterHtml}</div>
          ${performerCardHtml}
        </div>
        <div class="rpf-left-info">
          <div class="rpf-left-prod-name">${esc(prodName)}</div>
          <div class="rpf-left-deadline">${esc(deadlineLabel)}</div>
        </div>
        <div class="rpf-left-nav">
          <div class="rpf-left-nav-heading">Sections</div>
          ${navItemsHtml}
        </div>
      </div>
      <div class="rpf-main" id="rpf-wizard-body">
        <div class="rpf-page">
          <div class="rpf-card">
            <div class="rpf-body">${panelsHtml}</div>
          </div>
        </div>
      </div>
    </div>`;

    // Post-render hooks
    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (typeof window.fitCastingCardNames === 'function') window.fitCastingCardNames(root);
      root.querySelectorAll('[data-rpf-dob]').forEach(el => rpfCheckGuardianFields(el));
      root.querySelectorAll('.rpf-sig-field-wrap input').forEach(el => rpfUpdateSigPreview(el));
      root.querySelectorAll('.rpf-solo-toggle-row input').forEach(cb => { if (cb.checked) rpfToggleSoloPickup(cb); });
      root.querySelectorAll('[data-rpf-minor-toggle]').forEach(cb => rpfToggleMinorFields(cb));
    }));

    // Bind autosave on any input/change
    root.addEventListener('input', () => scheduleSave(1500), true);
    root.addEventListener('change', () => scheduleSave(600), true);
  }

  // ── Data loading & boot ───────────────────────────────────────────────────────
  function registrationAnswerValue(source, keys = []) {
    const ca = source?.custom_answers || source || {};
    const exactKeys = Object.keys(ca || {});
    const normalized = new Map(exactKeys.map(key => [String(key).toLowerCase().replace(/[^a-z0-9]+/g, ''), key]));
    for (const key of keys) {
      if (ca[key] !== undefined && ca[key] !== null && String(ca[key]).trim() !== '') return String(ca[key]).trim();
      const normalizedKey = String(key).toLowerCase().replace(/[^a-z0-9]+/g, '');
      const actual = normalized.get(normalizedKey);
      if (actual && ca[actual] !== undefined && ca[actual] !== null && String(ca[actual]).trim() !== '') return String(ca[actual]).trim();
    }
    return '';
  }

  function mergeRegistrationAnswers(...sources) {
    return sources.reduce((merged, source) => {
      const answers = source?.custom_answers || {};
      if (answers && typeof answers === 'object') Object.assign(merged, answers);
      return merged;
    }, {});
  }

  function splitRegistrationName(value) {
    const parts = String(value || '').trim().split(/\s+/).filter(Boolean);
    return {
      first: parts[0] || '',
      last: parts.slice(1).join(' '),
    };
  }

  function parseRegistrationContactParts(value) {
    const parts = String(value || '').split(/[·|,;]/).map(part => part.trim()).filter(Boolean);
    return {
      email: parts.find(part => /@/.test(part)) || '',
      phone: parts.find(part => !/@/.test(part) && /\d/.test(part)) || '',
    };
  }

  function buildPrefill(applicant) {
    if (!applicant) return null;
    const ca = mergeRegistrationAnswers(_booking, applicant);
    const nameParts = String(applicant.name || '').trim().split(/\s+/);
    const caValue = (...keys) => registrationAnswerValue(ca, keys);
    const guardianName = caValue(
      'Guardian name',
      'Guardian Name',
      'Parent/Guardian name',
      'Parent or guardian full name',
      'Parent/Guardian full name'
    ) || applicant.guardian_name || _booking?.guardian_name || '';
    const guardianParts = splitRegistrationName(guardianName);
    const guardianContactRaw = caValue(
      'Guardian Contact',
      'guardian_contact',
      'Guardian contact',
      'Parent/Guardian contact',
      'Parent or guardian contact'
    ) || applicant.guardian_contact || _booking?.guardian_contact || '';
    const guardianContactParts = parseRegistrationContactParts(guardianContactRaw);
    const firstName = caValue('Legal first name', 'Legal First Name', 'First Name', 'first_name')
      || _booking?.first_name
      || splitRegistrationName(_booking?.name).first
      || nameParts[0]
      || '';
    const lastName = caValue('Legal last name', 'Legal Last Name', 'Last Name', 'last_name')
      || _booking?.last_name
      || splitRegistrationName(_booking?.name).last
      || nameParts.slice(1).join(' ')
      || '';
    return {
      first_name:     firstName,
      last_name:      lastName,
      preferred_name: caValue('Preferred Name', 'Preferred name', 'preferred_name') || firstName,
      pronouns:       applicant.pronouns || _booking?.pronouns || caValue('Pronouns', 'pronouns') || '',
      date_of_birth:  applicant.date_of_birth || applicant.dob || applicant.birth_date || _booking?.date_of_birth || _booking?.dob || _booking?.birth_date || caValue('Date of Birth', 'Date of birth', 'Birth Date', 'Birthday', 'date_of_birth', 'dob'),
      email:          applicant.email || _booking?.email || caValue('Contact email', 'Contact Email', 'Participant email', 'Email', 'email'),
      phone:          applicant.phone || _booking?.phone || caValue('Contact phone number', 'Contact Phone Number', 'Contact phone', 'Participant phone', 'Phone Number', 'Phone', 'phone') || '',
      headshot_url:   applicant.headshot_url || _booking?.headshot_url || caValue('headshot_url', 'Headshot URL', 'Headshot'),
      guardian_first: caValue('Guardian first name', 'Guardian First Name', 'Parent/Guardian first name', 'Parent or guardian first name') || guardianParts.first || '',
      guardian_last:  caValue('Guardian last name', 'Guardian Last Name', 'Parent/Guardian last name', 'Parent or guardian last name') || guardianParts.last || '',
      guardian_phone: applicant.guardian_phone || _booking?.guardian_phone || guardianContactParts.phone || caValue('Guardian phone', 'Guardian Phone', 'Parent/Guardian phone', 'Parent or guardian phone', 'Guardian contact phone', 'Parent phone'),
      guardian_email: applicant.guardian_email || _booking?.guardian_email || guardianContactParts.email || caValue('Guardian email', 'Guardian Email', 'Parent/Guardian email', 'Parent or guardian email', 'Guardian contact email', 'Parent email'),
      guardian_relationship: caValue('Guardian relationship to performer', 'Guardian Relationship to Performer', 'Parent/Guardian relationship', 'Parent or guardian relationship', 'Relationship to performer'),
      contact_name: applicant.contact_name || _booking?.contact_name || caValue('Contact Name', 'Contact name', 'contact_name'),
      secondary_name: caValue('Secondary Contact Name', 'secondary_contact_name', 'Additional Contact Name', 'additional_contact_name'),
      secondary_phone: caValue('Secondary Contact Phone', 'secondary_contact_phone', 'Additional Contact Phone', 'additional_contact_phone'),
      secondary_email: caValue('Secondary Contact Email', 'secondary_contact_email', 'Additional Contact Email', 'additional_contact_email'),
      pickup_1_name: caValue('Authorised pickup 1 full name', 'Authorized pickup 1 full name', 'Pickup 1 full name'),
      pickup_1_relationship: caValue('Authorised pickup 1 relationship to performer', 'Authorized pickup 1 relationship to performer', 'Pickup 1 relationship to performer'),
      pickup_1_phone: caValue('Authorised pickup 1 phone number', 'Authorized pickup 1 phone number', 'Pickup 1 phone number'),
      pickup_2_name: caValue('Authorised pickup 2 full name', 'Authorized pickup 2 full name', 'Pickup 2 full name'),
      pickup_2_relationship: caValue('Authorised pickup 2 relationship to performer', 'Authorized pickup 2 relationship to performer', 'Pickup 2 relationship to performer'),
      pickup_2_phone: caValue('Authorised pickup 2 phone number', 'Authorized pickup 2 phone number', 'Pickup 2 phone number'),
    };
  }

  async function loadLinkedRegistrationBooking(applicant) {
    if (!applicant?.id && !applicant?.email) return null;
    try {
      let query = sb.from('audition_bookings')
        .select('*')
        .eq('production_id', applicant.production_id || _resolvedProductionId || _offer?.production_id || '');
      if (applicant.id) query = query.eq('applicant_id', applicant.id);
      else query = query.eq('email', applicant.email);
      const { data, error } = await query.limit(1);
      if (error) throw error;
      if (data?.[0]) return data[0];
    } catch (error) {
      console.warn('[BTS] registration booking lookup failed', error);
    }
    return null;
  }

  async function loadRegistrationRoleNames(applicant) {
    if (!applicant?.id || !applicant?.production_id) return [];
    try {
      const { data: assignments, error } = await sb.from('casting_assignments')
        .select('id,character_id,state')
        .eq('production_id', applicant.production_id)
        .eq('applicant_id', applicant.id)
        .in('state', ['chosen', 'ensemble_manual', 'offer_accepted']);
      if (error) throw error;
      const rows = assignments || [];
      const charIds = rows.map(row => row.character_id).filter(Boolean);
      const { data: chars } = charIds.length
        ? await sb.from('production_characters').select('id,name').in('id', charIds)
        : { data: [] };
      const charMap = new Map((chars || []).map(char => [String(char.id), char.name]));
      const names = rows.map(row => row.character_id ? (charMap.get(String(row.character_id)) || '') : 'Ensemble').filter(Boolean);
      return [...new Set(names)];
    } catch (error) {
      console.warn('[BTS] registration role lookup failed', error);
      return [];
    }
  }

  async function resolveProductionFromRegistrationPath() {
    if (_resolvedProductionId || !_orgSlug || !_showSlug || /^system$/i.test(_orgSlug)) return;
    try {
      const orgKey = _orgSlug;
      const { data: orgMatch } = await sb.from('organizations').select('id,name,logo_url,logo_white_url,abbreviation,slug')
        .or(`slug.eq.${orgKey},abbreviation.eq.${orgKey},abbreviation.eq.${orgKey.toUpperCase()},abbreviation.eq.${orgKey.toLowerCase()}`)
        .maybeSingle();
      const orgId = orgMatch?.id || '';
      if (orgMatch) _org = orgMatch;
      let q = sb.from('productions').select('id').ilike('slug', _showSlug);
      if (orgId) q = q.eq('organization_id', orgId);
      const { data: prodMatch } = await q.maybeSingle();
      _resolvedProductionId = prodMatch?.id || '';
    } catch (error) {
      console.warn('[BTS] registration production path lookup failed', error);
    }
  }

  async function findApplicantByRegistrationCode(applicantSelect) {
    const code = String(_regCode || '').trim();
    if (!code) return null;

    const dashIdx = code.lastIndexOf('-');
    const idPrefix = (dashIdx >= 0 ? code.slice(dashIdx + 1) : '').toLowerCase();
    const namePart = (dashIdx >= 0 ? code.slice(0, dashIdx) : code).toLowerCase();

    if (/^[0-9a-f]{3}$/.test(idPrefix)) {
      const prefixNum = parseInt(idPrefix, 16);
      const nextHex = (prefixNum + 1).toString(16).padStart(3, '0');
      const idLow = `${idPrefix}00000-0000-0000-0000-000000000000`;
      const idHigh = `${nextHex}00000-0000-0000-0000-000000000000`;
      let q = sb.from('audition_applications').select(applicantSelect).gte('id', idLow);
      if (nextHex.length === 3) q = q.lt('id', idHigh);
      if (_resolvedProductionId) q = q.eq('production_id', _resolvedProductionId);
      const { data, error } = await q;
      if (error) throw error;
      const match = (data || []).find(row => {
        const rowId = String(row.id || '').slice(0, 3).toLowerCase();
        const ca = row.custom_answers || {};
        const rowName = String(ca['Preferred Name'] || ca['Preferred name'] || row.name || '').trim().split(/\s+/)[0].replace(/[^a-z0-9]/gi, '').toLowerCase();
        return rowId === idPrefix && rowName === namePart;
      });
      if (match) return match;
    }

    async function findApplicantByOfferKey(key) {
      const { data, error } = await sb
        .from('audition_applications')
        .select(applicantSelect)
        .contains('custom_answers', { [key]: code })
        .limit(1);
      if (error) throw error;
      return data?.[0] || null;
    }
    return await findApplicantByOfferKey(CAST_OFFER_KEYS.code)
      || await findApplicantByOfferKey(CAST_OFFER_KEYS.token);
  }

  async function boot() {
    await ensureSupabaseClient();
    if (!_regCode && !_applicantId && !(_sampleMode && _productionId)) {
      showError('No registration code', 'This link is missing a registration code. Please use the link from your invitation email.');
      return;
    }
    if (_productionId) _resolvedProductionId = _productionId;
    await resolveProductionFromRegistrationPath();

    // 1. Resolve the same offer identity used by the cast-offer page.
    const applicantSelect = '*';
    let applicant = null;
    if (_applicantId) {
      let byId = sb.from('audition_applications').select(applicantSelect).eq('id', _applicantId);
      if (_resolvedProductionId) byId = byId.eq('production_id', _resolvedProductionId);
      const { data, error } = await byId.maybeSingle();
      if (error) throw error;
      applicant = data || null;
    }
    if (!applicant && _regCode && !_sampleMode) applicant = await findApplicantByRegistrationCode(applicantSelect);

    let offer = null;
    if (!applicant && !_sampleMode) {
      try {
        const { data: offerMatch, error: offerErr } = await sb
          .from('cast_offers')
          .select('id, production_id, applicant_id, token, code')
          .or(`token.eq.${_regCode},code.eq.${_regCode}`)
          .maybeSingle();
        if (offerErr) throw offerErr;
        offer = offerMatch || null;
      } catch (offerErr) {
        console.warn('[BTS] legacy cast_offers lookup unavailable for registration link', offerErr);
      }
    }

    if (!applicant && !offer && !_sampleMode) {
      showError('Link not found', 'This registration link does not match any active production. It may have expired or been removed. Please contact your production team for a new link.');
      return;
    }
    _offer = offer || {
      id: '',
      production_id: applicant?.production_id || _resolvedProductionId || '',
      applicant_id: applicant?.id || '',
      token: _regCode,
      code: _regCode,
    };

    // 2. Production
    const { data: prod, error: prodErr } = await sb
      .from('productions')
      .select('id, title, slug, registration_settings, poster_url, start_date, end_date, venue, organization_id')
      .eq('id', _offer.production_id)
      .maybeSingle();

    if (prodErr || !prod) {
      showError('Production not found', 'Unable to load this production. Please contact your production team.');
      return;
    }
    _prod = prod;
    _regSettings = (typeof prod.registration_settings === 'object' && prod.registration_settings) ? prod.registration_settings : {};
    await rpfLoadRehearsalStartDate();

    const loadingCopy = document.getElementById('loading-prod-name');
    if (loadingCopy) loadingCopy.textContent = prod.title || '';

    // 3. Organisation
    if (prod.organization_id) {
      const { data: org } = await sb
        .from('organizations')
        .select('name, email, logo_url, logo_white_url, abbreviation, slug')
        .eq('id', prod.organization_id)
        .maybeSingle();
      _org = org || null;
      updateLoadingOrganisationLogo(_org);
    }

    // 4. Applicant / prefill
    if (applicant) {
      _applicant = applicant;
      _booking = await loadLinkedRegistrationBooking(_applicant);
      _registrationRoleNames = await loadRegistrationRoleNames(_applicant);
      _prefill = buildPrefill(_applicant);
    } else if (_sampleMode) {
      _prefill = rpfSampleRegistrationPrefill();
      _registrationRoleNames = ['Glinda'];
    } else if (_offer.applicant_id) {
      const { data: applicantMatch } = await sb
        .from('audition_applications')
        .select(applicantSelect)
        .eq('id', _offer.applicant_id)
        .maybeSingle();
      _applicant = applicantMatch || null;
      _booking = await loadLinkedRegistrationBooking(_applicant);
      _registrationRoleNames = await loadRegistrationRoleNames(_applicant);
      _prefill = buildPrefill(_applicant);
    }

    // 5. Render
    document.getElementById('loading-shell').style.display = 'none';
    const root = document.getElementById('rpf-root');
    root.style.display = 'block';
    document.body.classList.add('form-ready');
    document.title = `${prod.title || 'Registration'} | Build The Show`;

    renderForm();
    if (_sampleMode) rpfApplySampleAnswers();
    else rpfApplySavedAnswers(_applicant?.custom_answers);
    if (_sampleMode && _pdfMode) {
      window._rpfSubmittedAnswerRows = rpfCollectAnswerRowsForPdf();
      if (_downloadMode) await rpfDownloadAnswersPdf();
      else await rpfOpenAnswersPdfInline();
      return;
    }
    if (rpfRegistrationIsComplete()) {
      window._rpfSubmittedAnswerRows = rpfCollectAnswerRowsForPdf();
      if (_pdfMode) {
        await rpfOpenAnswersPdfInline();
        return;
      }
      rpfShowSuccessScreen();
    }
  }

  boot().catch(err => {
    console.error('[BTS] registration boot failed', err);
    showError('Something went wrong', `Unable to load the registration form. ${err?.message || ''}`);
  });

  </script>
