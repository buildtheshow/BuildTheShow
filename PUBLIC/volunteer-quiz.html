<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Quiz | Build The Show</title>
  <meta http-equiv="refresh" content="0; url=/member/volunteer/best-fit" />
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fbf9ff;
      color: #1a1530;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .panel {
      width: min(420px, calc(100% - 2rem));
      padding: 1.5rem;
      border-radius: 8px;
      background: #fff;
      border: 1px solid rgba(87,46,136,0.16);
      box-shadow: 0 18px 45px rgba(26,21,48,0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.6rem;
      color: #572e88;
      font-size: 1.35rem;
      line-height: 1.2;
    }

    p {
      margin: 0 0 1rem;
      color: #746985;
      font-weight: 650;
      line-height: 1.5;
    }

    a {
      color: #572e88;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Opening the volunteer quiz</h1>
    <p>You will be sent to your volunteer best-fit quiz.</p>
    <a id="quiz-link" href="/member/volunteer/best-fit">Open quiz</a>
  </main>
  <script>
    'use strict';
    const qs = window.location.search || '';
    const dest = `/member/volunteer/best-fit${qs}`;
    document.getElementById('quiz-link').href = dest;
    window.location.replace(dest);
  </script>
</body>
</html>
