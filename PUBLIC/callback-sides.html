<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Callback Sides | Build The Show</title>
  <style>
    :root {
      --bts-purple: #572e88;
      --bts-amber: #efab45;
      --bts-ink: #1a1530;
      --bts-muted: #7f7194;
      --bts-line: rgba(87,46,136,0.14);
      --bts-bg: #fbfaff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--bts-ink);
      background:
        linear-gradient(rgba(87,46,136,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(87,46,136,0.035) 1px, transparent 1px),
        var(--bts-bg);
      background-size: 48px 48px;
    }
    button, a { font: inherit; }
    .page-shell {
      width: min(1280px, calc(100% - 2rem));
      margin: 0 auto;
      padding: clamp(1.25rem, 4vw, 3.2rem) 0 2.5rem;
    }
    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .brand {
      font-size: 0.82rem;
      font-weight: 900;
      color: var(--bts-purple);
      text-decoration: none;
    }
    .production-name {
      color: var(--bts-muted);
      font-size: 0.84rem;
      font-weight: 800;
      text-align: right;
    }
    .aud-visual-hero {
      background: var(--bts-purple);
      color: #fff;
      border-radius: 8px;
      padding: clamp(1.2rem, 4vw, 2.2rem);
      box-shadow: 0 18px 48px rgba(87,46,136,0.12);
      margin-bottom: 1.25rem;
    }
    .aud-visual-hero-content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 1.25rem;
    }
    .aud-visual-kicker {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--bts-amber);
      font-size: 0.76rem;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.45rem;
    }
    .aud-visual-kicker-dot {
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 999px;
      background: currentColor;
    }
    .aud-visual-title {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 4.6rem);
      line-height: 0.92;
      letter-spacing: 0;
    }
    .aud-visual-copy {
      margin: 1rem 0 0;
      max-width: 760px;
      color: rgba(255,255,255,0.82);
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      line-height: 1.45;
      font-weight: 700;
    }
    .aud-visual-total {
      min-width: 112px;
      padding: 1rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }
    .aud-visual-total-value {
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 0.95;
      font-weight: 950;
    }
    .aud-visual-total-label {
      margin-top: 0.35rem;
      font-size: 0.72rem;
      font-weight: 950;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.7rem;
      margin-bottom: 1.25rem;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      padding: 0.58rem 1rem;
      background: var(--bts-amber);
      color: #171026;
      font-size: 0.86rem;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }
    .files-section {
      background: #fff;
      border: 1.5px solid var(--bts-line);
      border-radius: 8px;
      overflow: hidden;
    }
    .files-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid rgba(87,46,136,0.1);
      background: rgba(87,46,136,0.025);
    }
    .files-section-title {
      font-size: 0.92rem;
      font-weight: 900;
      color: var(--bts-ink);
    }
    .files-section-meta {
      font-size: 0.74rem;
      font-weight: 800;
      color: rgba(87,46,136,0.55);
      white-space: nowrap;
    }
    .files-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.9rem;
      padding: 1rem;
    }
    .template-brand-card {
      container-type: inline-size;
      position: relative;
      display: block;
      width: 100%;
      max-width: 260px;
      aspect-ratio: 1 / 1;
      border: 0;
      border-radius: 8px;
      background: var(--brand-tile-bg, var(--bts-purple));
      color: var(--brand-tile-ink, #fff);
      overflow: hidden;
      text-align: left;
      font-family: inherit;
    }
    .template-brand-card-inner {
      height: 100%;
      padding: 7cqw;
    }
    .template-brand-tile-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 0;
    }
    .template-brand-tile-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
      color: #fff;
      border: 0;
      background: transparent;
    }
    .template-brand-tile-container--header { flex: 0 0 10cqw; }
    .template-brand-tile-container--title { flex: 0 0 30cqw; }
    .template-brand-tile-container--body { flex: 1 1 0; }
    .template-brand-tile-container--footer { flex: 0 0 14cqw; }
    .template-brand-tile-kicker {
      font-size: 4cqw;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.76;
    }
    .template-brand-tile-title {
      font-size: 10cqw;
      line-height: 1;
      font-weight: 950;
      overflow-wrap: anywhere;
    }
    .template-brand-tile-body {
      font-size: 4.4cqw;
      line-height: 1.24;
      font-weight: 850;
    }
    .file-kind-summary {
      font-size: 4.2cqw;
      font-weight: 850;
      line-height: 1.15;
      opacity: 0.86;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .template-brand-tile-button {
      width: 100%;
      border: 0;
      border-radius: 7px;
      background: #fff;
      color: var(--bts-purple);
      padding: 5.2cqw 4.8cqw;
      min-height: 15cqw;
      font-size: 6.2cqw;
      font-weight: 950;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .state {
      padding: 1.25rem;
      background: #fff;
      border: 1.5px solid var(--bts-line);
      border-radius: 8px;
      color: var(--bts-muted);
      font-weight: 800;
    }
    .footer {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      margin-top: 2.5rem;
      color: #aaa0ba;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .footer a { color: inherit; text-decoration: none; }
    @media (max-width: 720px) {
      .page-shell { width: min(100% - 1rem, 1280px); }
      .aud-visual-hero-content { grid-template-columns: 1fr; }
      .aud-visual-total { width: 100%; }
      .actions { justify-content: stretch; }
      .btn-primary { width: 100%; }
      .files-list { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <div class="topline">
      <a class="brand" href="/">Build The Show</a>
      <div class="production-name" id="production-name"></div>
    </div>
    <div id="page-header"></div>
    <div class="actions">
      <button type="button" class="btn-primary" id="download-all-btn">Download All</button>
    </div>
    <div id="content" class="state">Loading callback sides...</div>
    <footer class="footer">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
      <a href="mailto:privacy@buildtheshow.com">Contact</a>
      <span>© 2026 Build The Show</span>
    </footer>
  </main>

  <script src="/SHARED/Components/audition-page-templates.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    function esc(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }

    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    const params = new URLSearchParams(window.location.search);
    const pathParts = window.location.pathname.split('/').filter(Boolean).map(decodeURIComponent);
    const routeIndex = pathParts.findIndex(part => /^callback-?(sides|materials?)$/i.test(part));
    const orgPathKey = params.get('org') || (routeIndex >= 2 ? pathParts[routeIndex - 2] : '');
    const prodSlug = params.get('slug') || params.get('show') || (routeIndex >= 1 ? pathParts[routeIndex - 1] : '');
    const prodId = params.get('prod') || params.get('id') || '';
    let publicFiles = [];

    function materialFileNameFromUrl(url) {
      if (!url) return '';
      try {
        const cleanPath = new URL(url).pathname.split('/').pop() || '';
        return decodeURIComponent(cleanPath).split('/').pop();
      } catch {
        return String(url).split('/').pop() || '';
      }
    }

    function materialFileBelongsToSlot(file, charId, type, slot) {
      if (!file || !charId || !type || !slot) return false;
      const tags = Array.isArray(file.tags) ? file.tags.map(tag => String(tag || '').toLowerCase()) : [];
      if (tags.includes(`character:${String(charId).toLowerCase()}`) && tags.includes(String(slot).toLowerCase())) return true;
      const path = String(file.file_path || file.path || '');
      return path.includes(`_${type}_${slot}_${charId}_`);
    }

    function materialFileRecordsForSlot(char, prodFiles, slotMeta) {
      const records = (prodFiles || [])
        .filter(file => materialFileBelongsToSlot(file, char.id, 'callback', slotMeta.key))
        .map(file => ({
          id: file.id || '',
          url: file.file_url || file.url || '',
          path: file.file_path || '',
          name: file.name || materialFileNameFromUrl(file.file_url || file.url || '') || `${slotMeta.label} file`,
        }))
        .filter(file => file.url);
      const legacyUrl = char[slotMeta.urlField] || '';
      if (legacyUrl && !records.some(file => file.url === legacyUrl)) {
        records.unshift({
          id: '',
          url: legacyUrl,
          path: char[slotMeta.pathField] || '',
          name: char[slotMeta.nameField] || materialFileNameFromUrl(legacyUrl) || `${slotMeta.label} file`,
        });
      }
      return records;
    }

    function publicFileKindLabel(kind) {
      const label = String(kind || 'Material').trim();
      if (/song/i.test(label) || /music/i.test(label)) return 'Music';
      if (/side/i.test(label)) return 'Sides';
      if (/other/i.test(label)) return 'Other';
      return label || 'Material';
    }

    function collectCallbackFiles(characters, prodFiles) {
      const slots = [
        { key: 'side', label: 'Sides', urlField: 'callback_side_url', pathField: 'callback_side_path', nameField: 'callback_side_name' },
        { key: 'songcut', label: 'Music', urlField: 'callback_songcut_url', pathField: 'callback_songcut_path', nameField: 'callback_songcut_name' },
        { key: 'other', label: 'Other', urlField: 'callback_other_url', pathField: 'callback_other_path', nameField: 'callback_other_name' },
      ];
      const files = [];
      (characters || [])
        .filter(char => char.show_on_public_page !== false)
        .forEach(char => {
          slots.forEach(slot => {
            materialFileRecordsForSlot(char, prodFiles, slot).forEach(file => {
              files.push({
                characterId: char.id || '',
                role: char.name || 'Callback role',
                kind: slot.label,
                url: file.url,
                name: file.name || materialFileNameFromUrl(file.url) || `${slot.label} file`,
              });
            });
          });
        });
      return files;
    }

    function characterCount(files) {
      return new Set((files || []).map(file => String(file.role || 'Production')).filter(Boolean)).size;
    }

    function renderHeader(count, productionTitle) {
      const host = document.getElementById('page-header');
      if (!host) return;
      if (window.BTSAuditionTemplates?.renderTemplateById) {
        host.innerHTML = window.BTSAuditionTemplates.renderTemplateById('auditions.page-header', {
          esc,
          kicker: 'Auditions',
          title: 'Callback Sides',
          copy: 'A public-view version of the callback material performers can access for visible roles.',
          statValue: String(count || 0),
          statLabel: count === 1 ? 'character' : 'characters',
        });
      } else {
        host.innerHTML = `<div class="aud-visual-hero"><h1>${esc(productionTitle || 'Callback Sides')}</h1></div>`;
      }
    }

    function downloadFiles(files) {
      (files || []).forEach((file, index) => {
        setTimeout(() => {
          const link = document.createElement('a');
          link.href = file.url;
          link.target = '_blank';
          link.rel = 'noopener';
          link.download = file.name || materialFileNameFromUrl(file.url) || 'callback-side';
          document.body.appendChild(link);
          link.click();
          link.remove();
        }, index * 120);
      });
    }

    function downloadRoleFromTile(button) {
      const tile = button?.closest?.('[data-role]');
      const role = tile?.dataset?.role || '';
      const characterId = tile?.dataset?.characterId || '';
      downloadFiles(publicFiles.filter(file => characterId
        ? String(file.characterId || '') === String(characterId)
        : String(file.role || '') === String(role)));
    }

    function renderFiles(files) {
      const content = document.getElementById('content');
      const downloadAllBtn = document.getElementById('download-all-btn');
      publicFiles = files || [];
      if (downloadAllBtn) {
        downloadAllBtn.disabled = !publicFiles.length;
        downloadAllBtn.onclick = () => downloadFiles(publicFiles);
      }
      if (!publicFiles.length) {
        content.className = 'state';
        content.textContent = 'No callback sides are available yet.';
        return;
      }
      const byRole = publicFiles.reduce((acc, file) => {
        const key = file.role || 'Production';
        if (!acc[key]) acc[key] = [];
        acc[key].push(file);
        return acc;
      }, {});
      const count = Object.keys(byRole).length;
      content.className = 'files-section';
      content.innerHTML = `
        <div class="files-section-head">
          <div class="files-section-title">Callbacks</div>
          <div class="files-section-meta">${count} character${count === 1 ? '' : 's'}</div>
        </div>
        <div class="files-list">
          ${Object.entries(byRole).sort(([a], [b]) => String(a).localeCompare(String(b), undefined, { sensitivity: 'base' })).map(([role, roleFiles]) => {
            const kinds = [...new Set(roleFiles.map(file => publicFileKindLabel(file.kind)).filter(Boolean))];
            const kindsSummary = kinds.join(' & ');
            return `<article class="template-brand-card" data-role="${esc(role)}" data-character-id="${esc(roleFiles[0]?.characterId || '')}" style="--brand-tile-bg:#572e88;--brand-tile-ink:#ffffff;" aria-label="${esc(role)} callback material">
              <div class="template-brand-card-inner">
                <div class="template-brand-tile-content">
                  <div class="template-brand-tile-container template-brand-tile-container--header">
                    <div class="template-brand-tile-kicker">Callback Material</div>
                  </div>
                  <div class="template-brand-tile-container template-brand-tile-container--title">
                    <div class="template-brand-tile-title">${esc(role)}</div>
                  </div>
                  <div class="template-brand-tile-container template-brand-tile-container--body">
                    <div class="template-brand-tile-body">
                      <button type="button" class="template-brand-tile-button" onclick="downloadRoleFromTile(this)">Download</button>
                    </div>
                  </div>
                  <div class="template-brand-tile-container template-brand-tile-container--footer">
                    <div class="file-kind-summary" title="${esc(kindsSummary)}">${esc(kindsSummary)}</div>
                  </div>
                </div>
              </div>
            </article>`;
          }).join('')}
        </div>`;
    }

    async function loadPage() {
      if (!prodId && (!orgPathKey || !prodSlug)) throw new Error('This callback sides link is missing its organisation or production.');
      let org = null;
      if (orgPathKey) {
        const { data, error } = await sb
          .from('organizations')
          .select('id,name,slug,abbreviation')
          .or(`slug.eq.${orgPathKey},abbreviation.eq.${orgPathKey},abbreviation.eq.${String(orgPathKey).toUpperCase()},abbreviation.eq.${String(orgPathKey).toLowerCase()}`)
          .maybeSingle();
        if (error) throw error;
        org = data || null;
        if (!org?.id && !prodId) throw new Error('Organisation not found.');
      }

      let prodQuery = sb
        .from('productions')
        .select('id,title,slug,organization_id,wizard_data,page_status');
      prodQuery = prodId
        ? prodQuery.eq('id', prodId)
        : prodQuery.eq('organization_id', org.id).ilike('slug', prodSlug);
      const { data: prod, error: prodError } = await prodQuery.maybeSingle();
      if (prodError) throw prodError;
      if (!prod?.id) throw new Error('Production not found.');

      if (!org?.id && prod.organization_id) {
        const { data, error } = await sb
          .from('organizations')
          .select('id,name,slug,abbreviation')
          .eq('id', prod.organization_id)
          .maybeSingle();
        if (error) throw error;
        org = data || null;
      }

      const settings = prod.wizard_data?.materials_enabled || {};
      document.title = `${prod.title || 'Callback Sides'} | Callback Sides`;
      document.getElementById('production-name').textContent = [org.name, prod.title].filter(Boolean).join(' · ');

      if (settings.callback === false) {
        renderHeader(0, prod.title);
        renderFiles([]);
        return;
      }

      const [charsResult, filesResult] = await Promise.all([
        sb.from('production_characters')
          .select('id,name,show_on_public_page,callback_side_url,callback_side_path,callback_side_name,callback_songcut_url,callback_songcut_path,callback_songcut_name,callback_other_url,callback_other_path,callback_other_name')
          .eq('production_id', prod.id)
          .order('sort_order', { ascending: true }),
        sb.from('production_files')
          .select('*')
          .eq('production_id', prod.id)
          .order('created_at', { ascending: false }),
      ]);
      if (charsResult.error) throw charsResult.error;
      if (filesResult.error) throw filesResult.error;

      const files = collectCallbackFiles(charsResult.data || [], filesResult.data || []);
      renderHeader(characterCount(files), prod.title);
      renderFiles(files);
    }

    loadPage().catch(error => {
      console.error('[BTS] callback sides page failed', error);
      renderHeader(0, 'Callback Sides');
      const content = document.getElementById('content');
      content.className = 'state';
      content.textContent = error?.message || 'Could not load callback sides.';
      const button = document.getElementById('download-all-btn');
      if (button) button.disabled = true;
    });
  </script>
</body>
</html>
