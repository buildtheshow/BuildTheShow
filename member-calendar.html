<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Calendar - Build The Show</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" />
  <style>
    body { background: #f4f2f8; }

    .dashboard-main { padding: 2rem 2.5rem 3rem; }

    .page-header { margin-bottom: 1.5rem; }
    .page-title { font-size: 1.5rem; font-weight: 800; color: #1a1530; letter-spacing: -0.02em; }
    .page-subtitle { font-size: 0.9375rem; color: #6b5e80; margin-top: 0.25rem; }

    /* ── Calendar wrapper ── */
    .cal-wrap {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* FullCalendar overrides */
    .fc { font-family: inherit; }
    .fc .fc-toolbar-title { font-size: 1rem; font-weight: 700; color: #1a1530; }
    .fc .fc-button { background: #572e88; border-color: #572e88; font-family: inherit; font-size: 0.8rem; padding: 0.35rem 0.75rem; }
    .fc .fc-button:hover { background: #6b3ba8; border-color: #6b3ba8; }
    .fc .fc-button-active { background: #3d1f65; border-color: #3d1f65; }
    .fc .fc-today-button { background: #efab45; border-color: #efab45; color: #1a1008; }
    .fc .fc-today-button:hover { background: #e09a30; border-color: #e09a30; }
    .fc .fc-daygrid-day.fc-day-today { background: rgba(87,46,136,0.05); }
    .fc .fc-event { border-radius: 5px; font-size: 0.78rem; padding: 1px 4px; }
    .fc .fc-col-header-cell { font-size: 0.75rem; font-weight: 700; color: #6b5e80; text-transform: uppercase; letter-spacing: 0.05em; }
    .fc .fc-daygrid-day-number { font-size: 0.8rem; color: #6b5e80; }
    .fc .fc-day-today .fc-daygrid-day-number { color: #572e88; font-weight: 700; }

    /* ── Upcoming events list ── */
    .upcoming-list {
      background: #fff;
      border: 1.5px solid rgba(87,46,136,0.1);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
    }
    .upcoming-title { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #9a90b0; margin-bottom: 0.75rem; }
    .event-row {
      display: flex; align-items: flex-start; gap: 0.85rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(87,46,136,0.06);
    }
    .event-row:last-child { border-bottom: none; }
    .event-date-block {
      min-width: 42px;
      text-align: center;
      background: rgba(87,46,136,0.07);
      border-radius: 8px;
      padding: 0.35rem 0.4rem;
      flex-shrink: 0;
    }
    .event-date-month { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: #572e88; letter-spacing: 0.05em; }
    .event-date-day   { font-size: 1.05rem; font-weight: 800; color: #1a1530; line-height: 1; }
    .event-info { flex: 1; min-width: 0; }
    .event-info-title  { font-size: 0.875rem; font-weight: 600; color: #1a1530; }
    .event-info-sub    { font-size: 0.75rem; color: #9a90b0; margin-top: 0.1rem; }
    .event-type-badge  {
      font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.5rem;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em;
      white-space: nowrap; flex-shrink: 0; margin-top: 0.15rem;
    }
    .badge-audition  { background: rgba(87,46,136,0.1);  color: #572e88; }
    .badge-callback  { background: rgba(245,158,11,0.1); color: #d97706; }
    .badge-rehearsal { background: rgba(22,163,74,0.1);  color: #16a34a; }
    .badge-show      { background: rgba(239,171,69,0.12); color: #b45309; }
    .badge-other     { background: rgba(156,163,175,0.1); color: #6b7280; }

    .empty-state { text-align: center; padding: 2rem 0; color: #b0a0c8; font-size: 0.9rem; }
    .loading-state { display: flex; align-items: center; justify-content: center; min-height: 200px; color: #a098b8; }

    /* ── Calendar tabs (My Calendar / All Profiles) ── */
    .cal-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.25rem;
      border-bottom: 2px solid rgba(87,46,136,0.1);
    }
    .cal-tab {
      padding: 0.5rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #9a8ab0;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .cal-tab:hover { color: #572e88; }
    .cal-tab.active { color: #572e88; border-bottom-color: #572e88; }

    /* Profile name badge on All Profiles events */
    .profile-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.1rem 0.4rem;
      border-radius: 20px;
      background: rgba(87,46,136,0.1);
      color: #572e88;
      margin-left: 0.35rem;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">

    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">
        <a href="index.html"><img src="logo-long-white.png" alt="Build The Show" /></a>
      </div>
      <a href="profile-select.html" class="sidebar-profile-switcher" id="sidebar-profile-switcher" aria-label="Switch profile">
        <div class="sidebar-profile-avatar-placeholder" id="sidebar-avatar-placeholder">👤</div>
        <div class="sidebar-profile-switcher-info">
          <div class="sidebar-profile-switcher-name" id="sidebar-profile-name">Loading...</div>
          <div class="sidebar-profile-switcher-hint">Switch profile</div>
        </div>
        <span class="sidebar-profile-switcher-chevron">▾</span>
      </a>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Main">
        <!-- Populated by member-sidebar.js -->
      </nav>
      <div class="sidebar-bottom">
        <div class="sidebar-email" id="sidebar-email"></div>
        <button class="sidebar-logout" id="logout-btn">
          <svg width="14" height="14" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-4-4-4M14 8H6"/>
          </svg>
          Log Out
        </button>
      </div>
    </aside>

    <main class="dashboard-main">

      <div class="page-header">
        <div class="page-title">Calendar</div>
      </div>

      <!-- Tab switcher -->
      <div class="cal-tabs">
        <button class="cal-tab active" id="tab-mine" onclick="switchCalTab('mine')">My Calendar</button>
        <button class="cal-tab" id="tab-all" onclick="switchCalTab('all')">All Profiles</button>
      </div>

      <!-- Full calendar view -->
      <div class="cal-wrap">
        <div id="member-calendar"></div>
      </div>

      <!-- Upcoming events list -->
      <div class="upcoming-list">
        <div class="upcoming-title" id="upcoming-title">Upcoming</div>
        <div id="upcoming-list-content">
          <div class="loading-state">Loading events...</div>
        </div>
      </div>

    </main>
  </div>

  <footer style="margin-left:210px;border-top:1px solid rgba(87,46,136,0.08);padding:1rem 2.5rem;display:flex;flex-wrap:wrap;gap:0.5rem 1.5rem;align-items:center;">
    <a href="privacy-policy.html" target="_blank" style="font-size:0.78rem;color:#a098b8;text-decoration:none;font-weight:500;">Privacy Policy</a>
    <a href="terms-of-service.html" target="_blank" style="font-size:0.78rem;color:#a098b8;text-decoration:none;font-weight:500;">Terms of Service</a>
    <span style="font-size:0.78rem;color:#c8c0d8;">© 2026 Build The Show</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="member-sidebar.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    const profileId = sessionStorage.getItem('bts_active_profile_id');
    if (!profileId) window.location.href = 'profile-select.html';

    let fcCalendar = null;
    let currentTab = 'mine';  // 'mine' | 'all'
    let allProfilesApps = null; // cached for the All Profiles tab

    // Colour scheme by event type
    const EVENT_COLORS = {
      audition:       { bg: '#572e88', text: '#fff' },
      dance_call:     { bg: '#7c3aed', text: '#fff' },
      callback:       { bg: '#d97706', text: '#fff' },
      rehearsal:      { bg: '#16a34a', text: '#fff' },
      show:           { bg: '#b45309', text: '#fff' },
      other_audition: { bg: '#6b7280', text: '#fff' },
    };

    // Badge classes for the upcoming list
    function eventBadge(type) {
      const map = { audition: 'badge-audition', dance_call: 'badge-audition', callback: 'badge-callback', rehearsal: 'badge-rehearsal', show: 'badge-show' };
      const labels = { audition: 'Audition', dance_call: 'Dance Call', callback: 'Callback', rehearsal: 'Rehearsal', show: 'Show', other_audition: 'Audition' };
      const cls = map[type] || 'badge-other';
      const lbl = labels[type] || 'Event';
      return `<span class="event-type-badge ${cls}">${lbl}</span>`;
    }

    function updateSidebarAvatar(profile) {
      if (!profile?.headshot_url) return;
      const placeholder = document.getElementById('sidebar-avatar-placeholder');
      if (!placeholder) return;
      const img = document.createElement('img');
      img.src = profile.headshot_url;
      img.alt = '';
      img.className = 'sidebar-profile-avatar';
      placeholder.replaceWith(img);
    }

    // Build calendar events from audition applications that have dates.
    // profileName is optional - used when showing All Profiles view.
    function buildCalendarEvents(applications, profileName) {
      const events = [];

      (applications || []).forEach(app => {
        const prod = app.productions;
        if (!prod) return;

        const sessionTypes = prod.audition_configs?.[0]?.session_types;
        if (!sessionTypes) return;

        const sessions = Array.isArray(sessionTypes)
          ? sessionTypes
          : Object.entries(sessionTypes)
              .filter(([, v]) => v.enabled && v.date)
              .map(([key, v]) => ({ type: key, name: v.name || key, date: v.date }));

        sessions.forEach(s => {
          if (!s.date) return;
          const col = EVENT_COLORS[s.type] || EVENT_COLORS.audition;
          const title = profileName
            ? `${s.name || s.type} - ${prod.title} (${profileName})`
            : `${s.name || s.type} - ${prod.title}`;
          events.push({
            title,
            start: s.date,
            allDay: true,
            backgroundColor: col.bg,
            borderColor: col.bg,
            textColor: col.text,
            extendedProps: { type: s.type, production: prod.title, profileName: profileName || null },
          });
        });
      });

      return events;
    }

    // Switch between My Calendar and All Profiles
    async function switchCalTab(tab) {
      currentTab = tab;
      document.getElementById('tab-mine').classList.toggle('active', tab === 'mine');
      document.getElementById('tab-all').classList.toggle('active', tab === 'all');

      if (tab === 'mine') {
        // Re-load single-profile view (cached from init)
        const apps = window._calAppsCache || [];
        updateCalendar(buildCalendarEvents(apps), apps);
        document.getElementById('upcoming-title').textContent = 'Upcoming';
      } else {
        // Load all profiles if not cached
        if (!allProfilesApps) {
          document.getElementById('upcoming-list-content').innerHTML = '<div class="loading-state">Loading all profiles...</div>';
          const { data: { session } } = await sb.auth.getSession();
          if (!session) return;

          const { data: allProfiles } = await sb.from('profiles')
            .select('id, credit_name')
            .eq('user_id', session.user.id);

          const profileIds = (allProfiles || []).map(p => p.id);
          const profileNameMap = {};
          (allProfiles || []).forEach(p => { profileNameMap[p.id] = (p.credit_name || 'Unnamed').split(' ')[0]; });

          const { data: apps } = await sb.from('audition_applications')
            .select(`id, profile_id, status,
              productions(id, title,
                audition_configs(session_types))`)
            .in('profile_id', profileIds)
            .not('status', 'eq', 'withdrawn');

          allProfilesApps = { apps: apps || [], nameMap: profileNameMap };
        }

        // Build events with profile labels
        const allEvents = [];
        const { apps, nameMap } = allProfilesApps;
        const byProfile = {};
        (apps || []).forEach(app => {
          const pid = app.profile_id;
          if (!byProfile[pid]) byProfile[pid] = [];
          byProfile[pid].push(app);
        });
        Object.entries(byProfile).forEach(([pid, profileApps]) => {
          allEvents.push(...buildCalendarEvents(profileApps, nameMap[pid]));
        });

        updateCalendar(allEvents, apps || []);
        document.getElementById('upcoming-title').textContent = 'Upcoming (All Profiles)';
      }
    }

    function updateCalendar(calEvents, applications) {
      if (fcCalendar) {
        fcCalendar.removeAllEvents();
        fcCalendar.addEventSource(calEvents);
      }
      renderUpcomingList(applications, currentTab === 'all' ? allProfilesApps?.nameMap : null);
    }

    // nameMap is optional { profileId: firstName } - used for All Profiles view
    function renderUpcomingList(applications, nameMap) {
      const container = document.getElementById('upcoming-list-content');

      const rows = [];
      const today = new Date(); today.setHours(0,0,0,0);

      (applications || []).forEach(app => {
        const prod = app.productions;
        if (!prod) return;
        const sessionTypes = prod.audition_configs?.[0]?.session_types;
        if (!sessionTypes) return;

        const sessions = Array.isArray(sessionTypes)
          ? sessionTypes
          : Object.entries(sessionTypes)
              .filter(([, v]) => v.enabled && v.date)
              .map(([key, v]) => ({ type: key, name: v.name || key, date: v.date, location: v.location }));

        const profileFirstName = nameMap ? (nameMap[app.profile_id] || null) : null;

        sessions.forEach(s => {
          if (!s.date) return;
          const d = new Date(s.date + 'T00:00:00');
          if (d < today) return;
          rows.push({ date: d, type: s.type, name: s.name || s.type, production: prod.title, location: s.location, profileName: profileFirstName });
        });
      });

      rows.sort((a, b) => a.date - b.date);

      if (!rows.length) {
        container.innerHTML = `<div class="empty-state">No upcoming dates yet. Apply to auditions to see your schedule here.</div>`;
        return;
      }

      container.innerHTML = rows.slice(0, 12).map(r => {
        const month = r.date.toLocaleDateString('en-CA', { month: 'short' }).toUpperCase();
        const day   = r.date.getDate();
        const sub   = [r.production, r.location].filter(Boolean).join(' · ');
        const profileBadge = r.profileName ? `<span class="profile-badge">${esc(r.profileName)}</span>` : '';
        return `
          <div class="event-row">
            <div class="event-date-block">
              <div class="event-date-month">${month}</div>
              <div class="event-date-day">${day}</div>
            </div>
            <div class="event-info">
              <div class="event-info-title">${esc(r.name)}${profileBadge}</div>
              <div class="event-info-sub">${esc(sub)}</div>
            </div>
            ${eventBadge(r.type)}
          </div>`;
      }).join('');
    }

    function initCalendar(calEvents) {
      const el = document.getElementById('member-calendar');
      if (!el) return;
      fcCalendar = new FullCalendar.Calendar(el, {
        initialView: 'dayGridMonth',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
        height: 'auto',
        events: calEvents,
        eventClick(info) {
          // Simple tooltip via alert for now
          const p = info.event.extendedProps;
          alert(`${info.event.title}`);
        },
      });
      fcCalendar.render();
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await sb.auth.signOut();
      sessionStorage.clear();
      window.location.href = 'index.html';
    });

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      document.getElementById('sidebar-email').textContent = session.user.email;

      const [profileRes, appsRes] = await Promise.all([
        sb.from('profiles').select('id, credit_name, headshot_url, sections').eq('id', profileId).single(),
        sb.from('audition_applications')
          .select(`id, status, character_name,
            productions(id, title,
              audition_configs(session_types))`)
          .eq('profile_id', profileId)
          .not('status', 'eq', 'withdrawn'),
      ]);

      const profile = profileRes.data;
      if (!profile) { window.location.href = 'profile-select.html'; return; }

      sessionStorage.setItem('bts_active_profile_sections', JSON.stringify(profile.sections || {}));
      sessionStorage.setItem('bts_active_profile_name', profile.credit_name || 'Unnamed');

      renderMemberSidebar('calendar');
      updateSidebarAvatar(profile);

      const apps = appsRes.data || [];
      window._calAppsCache = apps;  // cache for tab switching
      const calEvents = buildCalendarEvents(apps);

      initCalendar(calEvents);
      renderUpcomingList(apps);
    }

    init();
  </script>
</body>
</html>
