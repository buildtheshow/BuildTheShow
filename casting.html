<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casting Board - Build The Show</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Layout ───────────────────────────────────────────── */
    .casting-main {
      position: relative;
      z-index: 10;
      padding: 3rem 2rem 6rem;
    }

    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 57px);
      color: #7a7490;
      font-size: 0.9375rem;
    }

    /* ── Nav link ─────────────────────────────────────────── */
    .nav-link {
      color: #7a7490;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-link:hover { color: #f0ecf8; }

    /* ── Page header ──────────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .page-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #f0ecf8;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }
    .page-header-subtitle { font-size: 0.9rem; color: #7a7490; }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn--primary-sm {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.25rem; border-radius: 8px;
      background: #572e88; color: #fff;
      font-size: 0.875rem; font-weight: 700; font-family: inherit;
      border: none; cursor: pointer; text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .btn--primary-sm:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn--ghost-sm {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1rem; border-radius: 7px;
      background: transparent; color: #7a7490;
      font-size: 0.8125rem; font-weight: 600; font-family: inherit;
      border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
      text-decoration: none; transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .btn--ghost-sm:hover { color: #f0ecf8; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }

    /* ── Summary cards ────────────────────────────────────── */
    .summary-row {
      display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    .summary-card {
      background: rgba(15,14,28,0.7); border: 1px solid rgba(87,46,136,0.3);
      border-radius: 12px; padding: 1.1rem 1.5rem;
      flex: 1; min-width: 110px; transition: border-color 0.2s;
    }
    .summary-card:hover { border-color: rgba(87,46,136,0.55); }
    .summary-value { font-size: 1.75rem; font-weight: 800; color: #f0ecf8; letter-spacing: -0.03em; line-height: 1; margin-bottom: 0.3rem; }
    .summary-label { font-size: 0.75rem; color: #7a7490; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }

    /* ── View tabs ────────────────────────────────────────── */
    .view-tabs {
      display: flex; gap: 0.25rem; margin-bottom: 1.5rem;
      background: rgba(255,255,255,0.04); border-radius: 10px; padding: 0.3rem;
      width: fit-content;
    }
    .view-tab {
      padding: 0.45rem 1.1rem; border-radius: 7px;
      font-size: 0.84rem; font-weight: 600; font-family: inherit;
      background: none; border: none; color: #7a7490; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .view-tab.active { background: #572e88; color: #fff; }
    .view-tab:not(.active):hover { color: #f0ecf8; background: rgba(255,255,255,0.06); }

    /* ── Filter bar ───────────────────────────────────────── */
    .filter-bar {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    .filter-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.35rem 0.9rem; border-radius: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #7a7490; font-size: 0.8rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { color: #f0ecf8; border-color: rgba(255,255,255,0.2); }
    .filter-btn.active { background: rgba(87,46,136,0.25); border-color: rgba(87,46,136,0.6); color: #d4c4f0; }
    .filter-count { background: rgba(87,46,136,0.4); border-radius: 10px; padding: 0.05rem 0.45rem; font-size: 0.7rem; }

    /* ── Applications table ───────────────────────────────── */
    .applications-table-wrap {
      background: rgba(15,14,28,0.7); border: 1px solid rgba(87,46,136,0.3);
      border-radius: 14px; overflow: hidden;
    }
    .applications-table { width: 100%; border-collapse: collapse; }
    .applications-table th {
      text-align: left; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: #7a7490;
      padding: 0.85rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(87,46,136,0.08); white-space: nowrap;
    }
    .applications-table td {
      padding: 0.9rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.875rem; color: #f0ecf8; vertical-align: middle;
    }
    .applications-table tr:last-child td { border-bottom: none; }
    .applications-table tbody tr { transition: background 0.15s; }
    .applications-table tbody tr:hover { background: rgba(87,46,136,0.07); }

    .applicant-name-btn {
      font-weight: 600; color: #d4c4f0; background: none; border: none;
      cursor: pointer; font-size: 0.875rem; font-family: inherit; padding: 0;
      text-align: left; transition: color 0.15s;
    }
    .applicant-name-btn:hover { color: #fff; text-decoration: underline; }
    .applicant-email { font-size: 0.8rem; color: #7a7490; margin-top: 0.15rem; }

    /* ── Status select ────────────────────────────────────── */
    .status-select {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #f0ecf8; border-radius: 7px; padding: 0.35rem 0.75rem;
      font-size: 0.8rem; font-family: inherit; cursor: pointer; outline: none;
      transition: border-color 0.2s;
    }
    .status-select:focus { border-color: rgba(87,46,136,0.6); }
    .status-select option { background: #0f0e1c; }

    /* ── Status badges ────────────────────────────────────── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 0.22rem 0.55rem; border-radius: 20px;
    }
    .status-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .badge--started    { background: rgba(122,116,144,0.12); color: #7a7490; border: 1px solid rgba(122,116,144,0.2); }
    .badge--submitted  { background: rgba(87,46,136,0.18);   color: #b89fe0; border: 1px solid rgba(87,46,136,0.4); }
    .badge--confirmed  { background: rgba(52,199,89,0.1);    color: #4cd96a; border: 1px solid rgba(52,199,89,0.25); }
    .badge--auditioned { background: rgba(150,176,215,0.12); color: #96b0d7; border: 1px solid rgba(150,176,215,0.25); }
    .badge--callback   { background: rgba(239,171,69,0.12);  color: #efab45; border: 1px solid rgba(239,171,69,0.3); }
    .badge--cast       { background: rgba(52,199,89,0.15);   color: #4cd96a; border: 1px solid rgba(52,199,89,0.35); }
    .badge--not-cast   { background: rgba(122,116,144,0.12); color: #7a7490; border: 1px solid rgba(122,116,144,0.2); }
    .badge--waitlist   { background: rgba(239,171,69,0.12);  color: #efab45; border: 1px solid rgba(239,171,69,0.2); }
    .badge--withdrawn  { background: rgba(122,116,144,0.12); color: #7a7490; border: 1px solid rgba(122,116,144,0.2); }
    .badge--declined   { background: rgba(220,60,60,0.1);    color: #f08080; border: 1px solid rgba(220,60,60,0.2); }

    /* ── Notes cell ───────────────────────────────────────── */
    .notes-cell { max-width: 200px; }
    .notes-text {
      font-size: 0.78rem; color: #9a90b0; font-style: italic;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 180px;
    }
    .notes-empty { font-size: 0.75rem; color: rgba(122,116,144,0.4); }
    .notes-edit-btn {
      background: none; border: none; cursor: pointer; padding: 0.1rem 0.3rem;
      color: #7a7490; font-size: 0.72rem; font-family: inherit;
      border-radius: 4px; transition: color 0.15s, background 0.15s;
    }
    .notes-edit-btn:hover { color: #f0ecf8; background: rgba(255,255,255,0.06); }

    /* ── Character assign select ──────────────────────────── */
    .char-assign-select {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #f0ecf8; border-radius: 7px; padding: 0.35rem 0.6rem;
      font-size: 0.78rem; font-family: inherit; cursor: pointer; outline: none;
      max-width: 160px; transition: border-color 0.2s;
    }
    .char-assign-select:focus { border-color: rgba(87,46,136,0.6); }
    .char-assign-select option { background: #0f0e1c; }

    /* ── Cast List grid ───────────────────────────────────── */
    .cast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .cast-card {
      background: rgba(15,14,28,0.7); border: 1px solid rgba(87,46,136,0.25);
      border-radius: 14px; padding: 1.25rem; transition: border-color 0.2s;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .cast-card:hover { border-color: rgba(87,46,136,0.5); }
    .cast-card.is-cast { border-color: rgba(52,199,89,0.3); }
    .cast-card-name {
      font-size: 0.9rem; font-weight: 700; color: #f0ecf8;
      letter-spacing: -0.01em;
    }
    .cast-card-type {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #9a90b0; margin-top: 0.1rem;
    }
    .cast-card-vocal {
      font-size: 0.75rem; color: #7a7490;
    }
    .cast-card-performer {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.75rem;
      background: rgba(52,199,89,0.07); border: 1px solid rgba(52,199,89,0.2);
      border-radius: 8px;
    }
    .cast-card-performer-thumb {
      width: 30px; height: 37px; border-radius: 4px; object-fit: cover;
      object-position: center top; flex-shrink: 0;
      background: rgba(87,46,136,0.2);
    }
    .cast-card-performer-name { font-size: 0.82rem; font-weight: 600; color: #4cd96a; }
    .cast-card-uncast {
      font-size: 0.78rem; color: rgba(122,116,144,0.5);
      font-style: italic; padding: 0.4rem 0;
    }
    .cast-card-count {
      font-size: 0.72rem; color: #7a7490;
    }
    .cast-card-count span { color: #b89fe0; font-weight: 600; }
    .cast-card-view-btn {
      font-size: 0.75rem; font-weight: 600; color: #9a90b0;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; padding: 0.3rem 0.7rem; cursor: pointer;
      font-family: inherit; transition: color 0.15s, border-color 0.15s;
      align-self: flex-start;
    }
    .cast-card-view-btn:hover { color: #f0ecf8; border-color: rgba(255,255,255,0.2); }

    /* ── Profile panel ────────────────────────────────────── */
    .profile-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 340px; background: #13112a;
      border-left: 1px solid rgba(87,46,136,0.35);
      z-index: 200; overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
    }
    .profile-panel.open { transform: translateX(0); }
    .profile-panel-overlay {
      position: fixed; inset: 0; z-index: 190;
      background: rgba(0,0,0,0.4); opacity: 0;
      pointer-events: none; transition: opacity 0.3s;
    }
    .profile-panel-overlay.open { opacity: 1; pointer-events: all; }

    .profile-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.25rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .profile-panel-title { font-size: 0.85rem; font-weight: 700; color: #7a7490; letter-spacing: 0.06em; text-transform: uppercase; }
    .profile-panel-close {
      background: none; border: none; color: #7a7490; cursor: pointer;
      font-size: 1.1rem; padding: 0.2rem 0.4rem; border-radius: 5px;
      transition: color 0.15s; font-family: inherit;
    }
    .profile-panel-close:hover { color: #f0ecf8; }

    .profile-panel-body { padding: 1.25rem; flex: 1; }

    .profile-headshot-wrap {
      width: 100%; aspect-ratio: 4/5; border-radius: 10px; overflow: hidden;
      background: rgba(87,46,136,0.15); margin-bottom: 1rem;
      max-height: 280px;
    }
    .profile-headshot-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .profile-headshot-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 3rem; color: rgba(122,116,144,0.3);
    }

    .profile-name { font-size: 1.1rem; font-weight: 800; color: #f0ecf8; letter-spacing: -0.02em; margin-bottom: 0.2rem; }
    .profile-sub { font-size: 0.8rem; color: #7a7490; margin-bottom: 1rem; }

    .profile-data { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
    .profile-data-row { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; }
    .profile-data-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #7a7490; white-space: nowrap; }
    .profile-data-value { font-size: 0.82rem; color: #d4c4f0; text-align: right; }

    .profile-section-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: #7a7490; margin-bottom: 0.5rem; padding-bottom: 0.3rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .profile-notes-area {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 0.65rem 0.75rem; color: #f0ecf8; font-size: 0.82rem;
      font-family: inherit; resize: vertical; min-height: 80px;
      transition: border-color 0.2s; outline: none; box-sizing: border-box;
    }
    .profile-notes-area:focus { border-color: rgba(87,46,136,0.6); }
    .profile-notes-save {
      margin-top: 0.5rem; width: 100%;
      padding: 0.5rem; border-radius: 7px;
      background: #572e88; color: #fff;
      border: none; font-size: 0.82rem; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: opacity 0.2s;
    }
    .profile-notes-save:hover { opacity: 0.85; }

    .profile-status-row {
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
      margin-top: 1rem;
    }

    /* ── Notes modal ──────────────────────────────────────── */
    .notes-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 300;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .notes-modal-overlay.open { display: flex; }
    .notes-modal {
      background: #13112a; border: 1px solid rgba(87,46,136,0.4);
      border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 420px;
    }
    .notes-modal-title { font-size: 1rem; font-weight: 700; color: #f0ecf8; margin-bottom: 0.25rem; }
    .notes-modal-sub { font-size: 0.8rem; color: #7a7490; margin-bottom: 1rem; }
    .notes-modal-textarea {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 0.65rem 0.75rem; color: #f0ecf8; font-size: 0.85rem;
      font-family: inherit; resize: vertical; min-height: 90px;
      transition: border-color 0.2s; outline: none; box-sizing: border-box;
    }
    .notes-modal-textarea:focus { border-color: rgba(87,46,136,0.6); }
    .notes-modal-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }

    /* ── Notify button ────────────────────────────────────── */
    .notify-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.3rem 0.65rem; border-radius: 6px;
      background: rgba(87,46,136,0.18); border: 1px solid rgba(87,46,136,0.4);
      color: #b89fe0; font-size: 0.75rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .notify-btn:hover { background: rgba(87,46,136,0.32); border-color: rgba(87,46,136,0.65); color: #d4c4f0; }

    /* ── Notify modal ─────────────────────────────────────── */
    .notify-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 300;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .notify-modal-overlay.open { display: flex; }
    .notify-modal {
      background: #13112a; border: 1px solid rgba(87,46,136,0.4);
      border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 480px;
    }
    .notify-modal-title { font-size: 1rem; font-weight: 700; color: #f0ecf8; margin-bottom: 0.2rem; }
    .notify-modal-sub { font-size: 0.8rem; color: #7a7490; margin-bottom: 1.1rem; }
    .notify-modal-to {
      font-size: 0.78rem; color: #9a90b0; margin-bottom: 0.85rem;
      padding: 0.5rem 0.75rem;
      background: rgba(255,255,255,0.03); border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .notify-modal-to strong { color: #d4c4f0; }
    .notify-modal-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #7a7490; margin-bottom: 0.35rem; }
    .notify-modal-textarea {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 0.65rem 0.75rem; color: #f0ecf8; font-size: 0.85rem;
      font-family: inherit; resize: vertical; min-height: 130px;
      transition: border-color 0.2s; outline: none; box-sizing: border-box;
    }
    .notify-modal-textarea:focus { border-color: rgba(87,46,136,0.6); }
    .notify-modal-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .notify-modal-sending { font-size: 0.78rem; color: #7a7490; padding: 0.5rem 0; display: none; }

    /* ── Empty state ──────────────────────────────────────── */
    .empty-state {
      background: rgba(15,14,28,0.5); border: 1px dashed rgba(87,46,136,0.3);
      border-radius: 14px; padding: 3rem 2rem; text-align: center;
      color: #7a7490; font-size: 0.9rem; line-height: 1.6;
    }
    .empty-state strong { display: block; font-size: 1rem; color: #a89ec0; margin-bottom: 0.4rem; }

    /* ── Toast notification ───────────────────────────────── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: rgba(52,199,89,0.15); border: 1px solid rgba(52,199,89,0.35);
      border-radius: 10px; padding: 0.75rem 1.25rem;
      color: #4cd96a; font-size: 0.875rem; font-weight: 600;
      z-index: 400; opacity: 0; transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s; pointer-events: none;
    }
    .toast.visible { opacity: 1; transform: translateY(0); }
    .toast.toast--error { background: rgba(220,60,60,0.12); border-color: rgba(220,60,60,0.35); color: #f08080; }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 680px) {
      .casting-main { padding: 2rem 1rem 5rem; }
      .applications-table th:nth-child(4),
      .applications-table td:nth-child(4),
      .applications-table th:nth-child(5),
      .applications-table td:nth-child(5) { display: none; }
      .profile-panel { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>

  <header class="nav">
    <div class="nav-logo">
      <a href="index.html">
        <img src="logo-long-white.png" alt="Build The Show" class="nav-logo-img" />
      </a>
    </div>
    <nav class="nav-links"></nav>
    <div class="nav-actions">
      <a href="org-dashboard.html" class="nav-link">Dashboard</a>
    </div>
  </header>

  <main class="casting-main" id="casting-main">
    <div class="loading-state" id="loading-state">Loading casting board...</div>
  </main>

  <!-- Profile panel overlay -->
  <div class="profile-panel-overlay" id="profile-overlay" onclick="closeProfilePanel()"></div>

  <!-- Profile panel -->
  <aside class="profile-panel" id="profile-panel">
    <div class="profile-panel-header">
      <div class="profile-panel-title">Applicant</div>
      <button class="profile-panel-close" onclick="closeProfilePanel()">✕</button>
    </div>
    <div class="profile-panel-body" id="profile-panel-body">
      <!-- filled by openProfilePanel() -->
    </div>
  </aside>

  <!-- Notes modal -->
  <div class="notes-modal-overlay" id="notes-modal">
    <div class="notes-modal">
      <div class="notes-modal-title">Internal Notes</div>
      <div class="notes-modal-sub" id="notes-modal-sub">Notes are only visible to your organisation.</div>
      <input type="hidden" id="notes-modal-app-id" />
      <textarea class="notes-modal-textarea" id="notes-modal-textarea" placeholder="e.g. Great callback, strong belt. Consider for lead…"></textarea>
      <div class="notes-modal-actions">
        <button class="btn--ghost-sm" onclick="closeNotesModal()" style="flex:1;justify-content:center;">Cancel</button>
        <button class="btn--primary-sm" onclick="saveNotesFromModal()" style="flex:2;justify-content:center;">Save Notes</button>
      </div>
    </div>
  </div>

  <!-- Notify modal -->
  <div class="notify-modal-overlay" id="notify-modal">
    <div class="notify-modal">
      <div class="notify-modal-title">Send Notification</div>
      <div class="notify-modal-sub" id="notify-modal-sub">Let this performer know their status.</div>
      <div class="notify-modal-to" id="notify-modal-to"></div>
      <input type="hidden" id="notify-modal-app-id" />
      <div class="notify-modal-label">Message</div>
      <textarea class="notify-modal-textarea" id="notify-modal-textarea" placeholder="Write your message here…"></textarea>
      <div class="notify-modal-sending" id="notify-modal-sending">Sending…</div>
      <div class="notify-modal-actions">
        <button class="btn--ghost-sm" onclick="closeNotifyModal()" style="flex:1;justify-content:center;">Cancel</button>
        <button class="btn--primary-sm" onclick="sendNotification()" id="notify-send-btn" style="flex:2;justify-content:center;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Send Email
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://tkmaiktxpwqfbgeojbnf.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrbWFpa3R4cHdxZmJnZW9qYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzE4MTcsImV4cCI6MjA4OTMwNzgxN30.TkTZBNWUatk3Y6Vmfv1hIRR3DfVjgwauwa76Pf00J_8'
    );

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    const params      = new URLSearchParams(window.location.search);
    const productionId = params.get('id');
    const main        = document.getElementById('casting-main');

    let allApplications = [];
    let allCharacters   = [];
    let allProfiles     = [];
    let activeFilter    = 'all';
    let activeView      = 'applicants'; // 'applicants' | 'castlist'
    let openPanelAppId  = null;
    let _prod           = null;

    // ── Toast ─────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      clearTimeout(toastTimer);
      t.textContent = msg;
      t.classList.toggle('toast--error', isError);
      t.classList.add('visible');
      toastTimer = setTimeout(() => t.classList.remove('visible'), 3000);
    }

    // ── Status helpers ─────────────────────────────────────────
    const STATUS_OPTIONS = [
      'started','submitted','confirmed','auditioned',
      'callback','cast','not_cast','waitlist','withdrawn','declined'
    ];
    function badgeHTML(status) {
      const labels = { started:'Started', submitted:'Submitted', confirmed:'Confirmed', auditioned:'Auditioned', callback:'Callback', cast:'Cast', not_cast:'Not Cast', waitlist:'Waitlist', withdrawn:'Withdrawn', declined:'Declined' };
      const cls = (status || 'started').replace('_', '-');
      return `<span class="status-badge badge--${cls}">${labels[status] || status}</span>`;
    }
    function statusSelectHTML(appId, currentStatus) {
      const opts = STATUS_OPTIONS.map(s =>
        `<option value="${s}" ${s === currentStatus ? 'selected' : ''}>${s.replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase())}</option>`
      ).join('');
      return `<select class="status-select" data-id="${esc(appId)}">${opts}</select>`;
    }

    // ── Character assign select ────────────────────────────────
    function charSelectHTML(appId, currentCharId) {
      const opts = `<option value="">No character assigned</option>` +
        allCharacters.map(c =>
          `<option value="${esc(c.id)}" ${c.id === currentCharId ? 'selected' : ''}>${esc(c.name)}</option>`
        ).join('');
      return `<select class="char-assign-select" data-app-id="${esc(appId)}">${opts}</select>`;
    }

    // ── Render wrapper ─────────────────────────────────────────
    function render() {
      if (activeView === 'applicants') renderApplicants();
      else renderCastList();
    }

    // ── Applicants view ────────────────────────────────────────
    function renderApplicants() {
      const filtered = activeFilter === 'all'
        ? allApplications
        : allApplications.filter(a => a.status === activeFilter);

      const statusCounts = {};
      allApplications.forEach(a => { statusCounts[a.status] = (statusCounts[a.status] || 0) + 1; });

      const filterBtns = [
        ['all',       'All',        allApplications.length],
        ['submitted', 'Submitted',  statusCounts['submitted'] || 0],
        ['callback',  'Callback',   statusCounts['callback'] || 0],
        ['auditioned','Auditioned', statusCounts['auditioned'] || 0],
        ['cast',      'Cast',       statusCounts['cast'] || 0],
        ['not_cast',  'Not Cast',   statusCounts['not_cast'] || 0],
      ].map(([val, label, count]) =>
        `<button class="filter-btn${activeFilter === val ? ' active' : ''}" data-filter="${val}">
          ${label}${count > 0 ? `<span class="filter-count">${count}</span>` : ''}
        </button>`
      ).join('');

      const castCount      = statusCounts['cast'] || 0;
      const callbackCount  = statusCounts['callback'] || 0;
      const activeCount    = (statusCounts['submitted']||0)+(statusCounts['confirmed']||0)+(statusCounts['auditioned']||0)+callbackCount;
      const charsCastCount = allCharacters.filter(c => allApplications.some(a => a.status==='cast' && a.character_id===c.id)).length;

      const tableHTML = filtered.length === 0
        ? `<div class="empty-state"><strong>No applications here.</strong>${activeFilter==='all' ? 'When performers apply, they\'ll show up here.' : 'No applications match this filter.'}</div>`
        : `<div class="applications-table-wrap">
            <table class="applications-table">
              <thead>
                <tr>
                  <th>Applicant</th>
                  <th>Role Applied For</th>
                  <th>Character</th>
                  <th>Notes</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${filtered.map(a => {
                  const notesCell = a.notes
                    ? `<div style="display:flex;align-items:center;gap:0.3rem;">
                        <span class="notes-text" title="${esc(a.notes)}">${esc(a.notes)}</span>
                        <button class="notes-edit-btn" data-notes-app="${esc(a.id)}" title="Edit notes">✎</button>
                       </div>`
                    : `<button class="notes-edit-btn" data-notes-app="${esc(a.id)}" title="Add notes"><span class="notes-empty">+ Note</span></button>`;
                  const canNotify = a.applicant_email && ['callback','cast','not_cast'].includes(a.status);
                  const notifyBtn = canNotify
                    ? `<button class="notify-btn" onclick="openNotifyModal('${esc(a.id)}')" title="Send notification email">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        Notify
                      </button>` : '';
                  return `<tr>
                    <td>
                      <button class="applicant-name-btn" data-profile-app="${esc(a.id)}">${esc(a.applicant_name || 'Performer')}</button>
                      <div class="applicant-email">${esc(a.applicant_email || '')}</div>
                    </td>
                    <td>${esc(a.role_name || '-')}</td>
                    <td>${charSelectHTML(a.id, a.character_id)}</td>
                    <td class="notes-cell">${notesCell}</td>
                    <td>
                      <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">
                        ${statusSelectHTML(a.id, a.status)}
                        ${notifyBtn}
                      </div>
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>`;

      main.innerHTML = `
        ${headerHTML()}
        ${summaryHTML(allApplications.length, activeCount, castCount, charsCastCount)}
        ${viewTabsHTML()}
        <div class="filter-bar" id="filter-bar">${filterBtns}</div>
        ${tableHTML}
      `;
    }

    // ── Cast List view ─────────────────────────────────────────
    function renderCastList() {
      const castCount     = allApplications.filter(a => a.status === 'cast').length;
      const activeCount   = allApplications.filter(a => ['submitted','confirmed','auditioned','callback'].includes(a.status)).length;
      const charsCastCount = allCharacters.filter(c => allApplications.some(a => a.status==='cast' && a.character_id===c.id)).length;

      let gridHTML;
      if (allCharacters.length === 0) {
        gridHTML = `<div class="empty-state"><strong>No characters yet.</strong>Add characters in the Characters tab of your production workspace, then come back here to assign performers.</div>`;
      } else {
        gridHTML = `<div class="cast-grid">` + allCharacters.map(char => {
          const castApp = allApplications.find(a => a.character_id === char.id && a.status === 'cast');
          const profile  = castApp?.profile_id ? allProfiles.find(p => p.id === castApp.profile_id) : null;
          const candidates = allApplications.filter(a => a.role_name && char.name && a.role_name.toLowerCase() === char.name.toLowerCase() && a.status !== 'not_cast' && a.status !== 'withdrawn' && a.status !== 'declined').length;

          let performerBlock;
          if (castApp) {
            const name = profile
              ? (profile.credit_name || `${profile.legal_first_name || ''} ${profile.legal_last_name || ''}`.trim())
              : (castApp.applicant_name || 'Performer');
            const thumb = profile?.headshot_url
              ? `<img src="${esc(profile.headshot_url)}" class="cast-card-performer-thumb" alt="" />`
              : `<div class="cast-card-performer-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1rem;">👤</div>`;
            performerBlock = `<div class="cast-card-performer">${thumb}<span class="cast-card-performer-name">${esc(name)}</span></div>`;
          } else {
            performerBlock = `<div class="cast-card-uncast">Not yet cast</div>`;
          }

          const typeLabel = char.character_type || '';
          const vocalLabel = char.vocal_type ? char.vocal_type : '';

          return `<div class="cast-card${castApp ? ' is-cast' : ''}">
            <div>
              <div class="cast-card-name">${esc(char.name)}</div>
              ${typeLabel ? `<div class="cast-card-type">${esc(typeLabel)}</div>` : ''}
              ${vocalLabel ? `<div class="cast-card-vocal">${esc(vocalLabel)}</div>` : ''}
            </div>
            ${performerBlock}
            ${candidates > 0 ? `<div class="cast-card-count"><span>${candidates}</span> candidate${candidates !== 1 ? 's' : ''}</div>` : ''}
            <button class="cast-card-view-btn" data-char-filter="${esc(char.name)}">View applicants →</button>
          </div>`;
        }).join('') + `</div>`;
      }

      main.innerHTML = `
        ${headerHTML()}
        ${summaryHTML(allApplications.length, activeCount, castCount, charsCastCount)}
        ${viewTabsHTML()}
        ${gridHTML}
      `;
    }

    // ── Shared fragments ───────────────────────────────────────
    function headerHTML() {
      return `<div class="page-header">
        <div>
          <h1>${esc(_prod?.title || 'Production')}</h1>
          <p class="page-header-subtitle">Casting Board</p>
        </div>
        <a href="production-workspace.html?id=${esc(productionId)}" class="btn--ghost-sm">&larr; Back to Workspace</a>
      </div>`;
    }

    function summaryHTML(total, active, cast, charsCast) {
      return `<div class="summary-row">
        <div class="summary-card"><div class="summary-value">${total}</div><div class="summary-label">Applications</div></div>
        <div class="summary-card"><div class="summary-value">${active}</div><div class="summary-label">Active</div></div>
        <div class="summary-card"><div class="summary-value">${cast}</div><div class="summary-label">Cast</div></div>
        <div class="summary-card"><div class="summary-value">${charsCast} / ${allCharacters.length}</div><div class="summary-label">Characters Filled</div></div>
      </div>`;
    }

    function viewTabsHTML() {
      return `<div class="view-tabs">
        <button class="view-tab${activeView==='applicants'?' active':''}" data-view="applicants">Applicants</button>
        <button class="view-tab${activeView==='castlist'?' active':''}" data-view="castlist">Cast List</button>
      </div>`;
    }

    // ── Profile panel ──────────────────────────────────────────
    function openProfilePanel(appId) {
      const app     = allApplications.find(a => a.id === appId);
      if (!app) return;
      const profile = app.profile_id ? allProfiles.find(p => p.id === app.profile_id) : null;
      openPanelAppId = appId;

      const name = profile
        ? (profile.credit_name || `${profile.legal_first_name || ''} ${profile.legal_last_name || ''}`.trim())
        : (app.applicant_name || 'Performer');

      const headshotSrc = profile?.headshot_url || app.headshot_url || null;
      const headshot = headshotSrc
        ? `<img src="${esc(headshotSrc)}" alt="${esc(name)}" style="width:100%;height:100%;object-fit:cover;object-position:center top;" />`
        : `<div class="profile-headshot-placeholder">👤</div>`;

      const sections = profile?.sections || {};
      const perf     = sections.performer || {};
      const voiceType    = perf.voice_type || '-';
      const experience   = perf.experience || '-';
      const danceLevel   = perf.dance_level || null;
      const actingLevel  = perf.acting_level || null;
      const vocalComfort = perf.vocal_comfort || null;
      const danceStyles  = (perf.dance_styles || []).join(', ') || null;

      const dataRows = [
        ['Role applied for', app.role_name || '-'],
        ['Voice type', voiceType],
        danceLevel   ? ['Dance level', danceLevel]   : null,
        actingLevel  ? ['Acting level', actingLevel]  : null,
        vocalComfort ? ['Vocal comfort', vocalComfort] : null,
        danceStyles  ? ['Dance styles', danceStyles]   : null,
        ['Email', app.applicant_email || '-'],
      ].filter(Boolean).map(([label, val]) =>
        `<div class="profile-data-row"><span class="profile-data-label">${esc(label)}</span><span class="profile-data-value">${esc(val)}</span></div>`
      ).join('');

      document.getElementById('profile-panel-body').innerHTML = `
        <div class="profile-headshot-wrap">${headshot}</div>
        <div class="profile-name">${esc(name)}</div>
        <div class="profile-sub">${badgeHTML(app.status)}</div>

        <div class="profile-data">${dataRows}</div>

        <div class="profile-section-title">Status</div>
        <div class="profile-status-row">
          ${statusSelectHTML(app.id, app.status)}
          ${charSelectHTML(app.id, app.character_id)}
        </div>

        ${app.performer_notes ? `
        <div style="margin-top:1.25rem;">
          <div class="profile-section-title">Their Notes</div>
          <div style="font-size:0.82rem;color:#9a90b0;line-height:1.6;white-space:pre-wrap;">${esc(app.performer_notes)}</div>
        </div>` : ''}

        <div style="margin-top:1.25rem;">
          <div class="profile-section-title">Internal Notes</div>
          <textarea class="profile-notes-area" id="panel-notes-area" placeholder="Only visible to your team…">${esc(app.notes || '')}</textarea>
          <button class="profile-notes-save" onclick="saveNotesFromPanel()">Save Notes</button>
        </div>
      `;

      document.getElementById('profile-panel').classList.add('open');
      document.getElementById('profile-overlay').classList.add('open');
    }

    function closeProfilePanel() {
      document.getElementById('profile-panel').classList.remove('open');
      document.getElementById('profile-overlay').classList.remove('open');
      openPanelAppId = null;
    }

    async function saveNotesFromPanel() {
      if (!openPanelAppId) return;
      const notes = document.getElementById('panel-notes-area').value.trim();
      await persistNotes(openPanelAppId, notes);
      closeProfilePanel();
      render();
    }

    // ── Notes modal ────────────────────────────────────────────
    function openNotesModal(appId) {
      const app = allApplications.find(a => a.id === appId);
      if (!app) return;
      document.getElementById('notes-modal-app-id').value = appId;
      document.getElementById('notes-modal-textarea').value = app.notes || '';
      document.getElementById('notes-modal-sub').textContent = `Notes for ${app.applicant_name || 'Performer'} - only visible to your team.`;
      document.getElementById('notes-modal').classList.add('open');
      document.getElementById('notes-modal-textarea').focus();
    }
    function closeNotesModal() { document.getElementById('notes-modal').classList.remove('open'); }

    async function saveNotesFromModal() {
      const appId = document.getElementById('notes-modal-app-id').value;
      const notes = document.getElementById('notes-modal-textarea').value.trim();
      await persistNotes(appId, notes);
      closeNotesModal();
      render();
    }

    async function persistNotes(appId, notes) {
      const { error } = await sb.from('audition_applications').update({ org_notes: notes }).eq('id', appId);
      if (error) { showToast('Could not save notes.', true); return; }
      const app = allApplications.find(a => a.id === appId);
      if (app) app.notes = notes;
      showToast('Notes saved.');
    }

    // ── Notify modal ───────────────────────────────────────────
    const STATUS_MESSAGES = {
      callback: (name, prod) =>
        `Hi ${name},\n\nWe're pleased to let you know that you've been called back for ${prod}.\n\nWe'll be in touch shortly with more details about what to expect.\n\nThank you for auditioning - we look forward to seeing you again.`,
      cast: (name, prod) =>
        `Hi ${name},\n\nCongratulations! We are thrilled to offer you a role in ${prod}.\n\nPlease reply to confirm your acceptance, and we'll be in touch with next steps.\n\nWelcome to the cast!`,
      not_cast: (name, prod) =>
        `Hi ${name},\n\nThank you so much for auditioning for ${prod}. It was a pleasure meeting you.\n\nUnfortunately we are unable to offer you a role at this time. We hope to see you at future auditions.\n\nThank you again for your time and talent.`,
    };

    function openNotifyModal(appId) {
      const app = allApplications.find(a => a.id === appId);
      if (!app) return;

      const name    = app.applicant_name || 'Performer';
      const email   = app.applicant_email || '';
      const status  = app.status;
      const prodTitle = _prod?.title || 'our production';

      document.getElementById('notify-modal-app-id').value = appId;
      document.getElementById('notify-modal-sub').textContent =
        status === 'callback' ? 'Send a callback notice to this performer.' :
        status === 'cast'     ? 'Send a cast offer to this performer.' :
                                'Send a not-cast notice to this performer.';
      document.getElementById('notify-modal-to').innerHTML =
        `To: <strong>${esc(name)}</strong> &lt;${esc(email)}&gt;`;

      const msgFn = STATUS_MESSAGES[status];
      document.getElementById('notify-modal-textarea').value =
        msgFn ? msgFn(name, prodTitle) : '';

      document.getElementById('notify-modal-sending').style.display = 'none';
      document.getElementById('notify-send-btn').disabled = false;
      document.getElementById('notify-modal').classList.add('open');
      document.getElementById('notify-modal-textarea').focus();
    }

    function closeNotifyModal() {
      document.getElementById('notify-modal').classList.remove('open');
    }

    async function sendNotification() {
      const appId   = document.getElementById('notify-modal-app-id').value;
      const message = document.getElementById('notify-modal-textarea').value.trim();
      const app     = allApplications.find(a => a.id === appId);
      if (!app || !message) return;

      const sendBtn   = document.getElementById('notify-send-btn');
      const sendingEl = document.getElementById('notify-modal-sending');
      sendBtn.disabled = true;
      sendingEl.style.display = 'block';

      try {
        const { data: { session } } = await sb.auth.getSession();
        const res = await fetch(
          'https://tkmaiktxpwqfbgeojbnf.supabase.co/functions/v1/send-cast-notification',
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${session?.access_token || ''}`,
            },
            body: JSON.stringify({
              to:      app.applicant_email,
              name:    app.applicant_name || 'Performer',
              status:  app.status,
              message: message,
              production_title: _prod?.title || '',
            }),
          }
        );

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server error ${res.status}`);
        }

        closeNotifyModal();
        showToast('Email sent.');
      } catch (err) {
        sendingEl.style.display = 'none';
        sendBtn.disabled = false;
        showToast(`Could not send email: ${err.message}`, true);
      }
    }

    // ── Event delegation ───────────────────────────────────────
    function bindEvents() {
      document.addEventListener('click', e => {
        // View tab
        const viewTab = e.target.closest('.view-tab');
        if (viewTab && viewTab.dataset.view) {
          activeView = viewTab.dataset.view;
          render(); return;
        }
        // Filter button
        const filterBtn = e.target.closest('.filter-btn');
        if (filterBtn && filterBtn.dataset.filter) {
          activeFilter = filterBtn.dataset.filter;
          renderApplicants(); return;
        }
        // Open profile panel
        const profileBtn = e.target.closest('[data-profile-app]');
        if (profileBtn) {
          openProfilePanel(profileBtn.dataset.profileApp); return;
        }
        // Open notes modal (from table)
        const notesBtn = e.target.closest('[data-notes-app]');
        if (notesBtn) {
          openNotesModal(notesBtn.dataset.notesApp); return;
        }
        // Cast list → filter to character
        const charFilterBtn = e.target.closest('[data-char-filter]');
        if (charFilterBtn) {
          activeView   = 'applicants';
          activeFilter = 'all';
          renderApplicants();
          // Scroll to table
          setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 50);
          return;
        }
      });

      // Status change
      document.addEventListener('change', async e => {
        const statusSel = e.target.closest('.status-select');
        if (statusSel) {
          const appId     = statusSel.dataset.id;
          const newStatus = statusSel.value;
          const prev      = allApplications.find(a => a.id === appId)?.status;
          const { error } = await sb.from('audition_applications').update({ status: newStatus }).eq('id', appId);
          if (error) { statusSel.value = prev; showToast('Could not update status.', true); return; }
          const app = allApplications.find(a => a.id === appId);
          if (app) app.status = newStatus;
          showToast('Status updated.');
          render();
          // If panel is open for this app, refresh it
          if (openPanelAppId === appId) openProfilePanel(appId);
          return;
        }

        // Character assignment
        const charSel = e.target.closest('.char-assign-select');
        if (charSel) {
          const appId  = charSel.dataset.appId;
          const charId = charSel.value || null;
          const { error } = await sb.from('audition_applications').update({ character_id: charId }).eq('id', appId);
          if (error) { showToast('Could not assign character.', true); return; }
          const app = allApplications.find(a => a.id === appId);
          if (app) app.character_id = charId;
          showToast('Character assigned.');
          render();
          if (openPanelAppId === appId) openProfilePanel(appId);
          return;
        }
      });

      document.getElementById('notes-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeNotesModal();
      });

      document.getElementById('notify-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeNotifyModal();
      });
    }

    // ── Init ───────────────────────────────────────────────────
    async function init() {
      if (!productionId) { window.location.href = 'org-dashboard.html'; return; }

      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      // Load production + characters in parallel
      const [prodResult, charsResult] = await Promise.all([
        sb.from('productions').select('*').eq('id', productionId).single(),
        sb.from('production_characters').select('*').eq('production_id', productionId).order('sort_order').order('created_at'),
      ]);

      if (prodResult.error || !prodResult.data) {
        main.innerHTML = `<div class="loading-state" style="color:#f08080;">Production not found.</div>`;
        return;
      }

      _prod         = prodResult.data;
      allCharacters = charsResult.data || [];

      // Load applications directly by production_id
      try {
        const { data: apps } = await sb
          .from('audition_applications')
          .select('id, status, name, email, role_interest, notes, org_notes, character_id, profile_id, headshot_url')
          .eq('production_id', productionId)
          .order('created_at', { ascending: false });
        // Normalise field names so the rest of the code works uniformly
        allApplications = (apps || []).map(a => ({
          ...a,
          applicant_name:  a.name,
          applicant_email: a.email,
          role_name:       a.role_interest,
          notes:           a.org_notes,   // org_notes is the internal org field
          performer_notes: a.notes,       // original submission notes
        }));
      } catch { allApplications = []; }

      // Load profiles for applications that have profile_id
      const profileIds = [...new Set(allApplications.filter(a => a.profile_id).map(a => a.profile_id))];
      if (profileIds.length > 0) {
        try {
          const { data: profs } = await sb
            .from('profiles')
            .select('id, credit_name, legal_first_name, legal_last_name, headshot_url, sections')
            .in('id', profileIds);
          allProfiles = profs || [];
        } catch { allProfiles = []; }
      }

      bindEvents();
      render();
    }

    init();
  </script>

</body>
