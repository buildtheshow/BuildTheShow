<button class="mobile-nav-toggle" id="mobile-nav-toggle" type="button" aria-label="Open navigation" aria-controls="prod-sidebar" aria-expanded="false" onclick="toggleMobileSidebar()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
    <path d="M4 7h16M4 12h16M4 17h16"></path>
  </svg>
</button>
<div class="mobile-nav-scrim" id="mobile-nav-scrim" onclick="closeMobileSidebar()"></div>

<div class="prod-sidebar" id="prod-sidebar">
  <div class="sidebar-top">
    <img src="/ASSETS/Images/logo-long-white.png" alt="Build The Show" class="sidebar-logo-img" />
  </div>
  <div class="sidebar-mobile-hero">
    <div class="sidebar-mobile-poster hidden" id="sidebar-mobile-poster-wrap"></div>
    <div class="sidebar-mobile-summary">
      <div class="sidebar-mobile-title" id="hdr-mobile-title">One moment...</div>
      <div class="sidebar-mobile-sub" id="hdr-mobile-sub"></div>
      <span class="status-badge s-setup sidebar-mobile-status" id="hdr-mobile-status">Setup</span>
    </div>
  </div>
  <div class="sidebar-poster hidden" id="sidebar-poster-wrap"></div>
  <div class="sidebar-prod">
    <div class="sidebar-prod-title" id="hdr-title">One moment...</div>
    <div class="sidebar-prod-sub" id="hdr-sub"></div>
    <span class="status-badge s-setup" id="hdr-status">Setup</span>
    <div id="global-save-indicator"></div>
    <a id="sidebar-public-link" href="#" target="_blank" rel="noopener" style="display:none;margin-top:0.75rem;font-size:0.8rem;font-weight:600;color:#fff;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.22);border-radius:8px;padding:0.4rem 0.85rem;text-decoration:none;align-items:center;gap:0.4rem;transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.12)'">
      View Public Page
    </a>
  </div>
  <nav class="prod-tabs">
    <div class="prod-tab active" data-tab="overview">
      <span class="tab-icon-slot"><img src="/ASSETS/Images/navoverview.svg" class="tab-icon" alt="" aria-hidden="true" /></span>
      Overview
    </div>
    <div class="prod-tab" data-tab="team">
      <span class="tab-icon-slot"><img src="/ASSETS/Images/navproductionteam.svg" class="tab-icon" alt="" aria-hidden="true" /></span>
      Production Team
    </div>
    <div class="prod-tab" data-tab="calendar">
      <span class="tab-icon-slot"><img src="/ASSETS/Images/navproductioncalendar.svg" class="tab-icon" alt="" aria-hidden="true" /></span>
      Production Calendar
    </div>

    <!-- Auditions — expandable submenu -->
    <div class="prod-tab-submenu-wrap" id="auditions-wrap">
      <div class="prod-tab" data-tab="auditions" id="auditions-parent-tab" onclick="openAuditionsParentTab(event)">
        <span class="prod-tab-label">
          <span class="tab-icon-slot"><img src="/ASSETS/Images/navauditions.svg" class="tab-icon" alt="" aria-hidden="true" /></span>
          Auditions
        </span>
        <span class="tab-chevron" role="button" tabindex="0" aria-label="Toggle Auditions menu" onclick="toggleAuditionsMenu(event)" onkeydown="handleSidebarChevronKey(event, 'auditions')">▼</span>
      </div>
      <div class="prod-submenu">
        <div class="prod-sub-item" id="asub-dashboard" onclick="openAuditionsSubTab('dashboard')">Dashboard</div>
        <div class="prod-sub-item" id="asub-setup" onclick="openAuditionsSubTab('setup')">Settings</div>
        <div class="prod-sub-item" id="asub-audschedule" onclick="openAuditionsSubTab('audschedule')">Audition Schedule</div>
        <div class="prod-sub-item" id="asub-auditions" onclick="openAuditionsSubTab('auditions')">Performers</div>
        <div id="asub-session-items"></div>
      </div>
    </div>

    <div class="prod-tab" data-tab="profile" id="team-profile-tab" style="display:none;">
      <span class="tab-icon-slot"><img src="/ASSETS/Images/navprofile.svg" class="tab-icon" alt="" aria-hidden="true" /></span>
      Profile
    </div>

    <div class="prod-tab" data-tab="emails" onclick="switchProdTab('emails')">
      <span class="tab-icon-slot"><img src="/ASSETS/Images/navemailtemplate.svg" class="tab-icon" alt="" aria-hidden="true" /></span>
      Email Templates
    </div>
    <div class="prod-tab" data-tab="settings">
      <span class="tab-icon-slot"><img src="/ASSETS/Images/navsettings.svg" class="tab-icon" alt="" aria-hidden="true" /></span>
      Settings
    </div>

    <!-- V2 — hidden for now -->
    <div class="prod-tab v2-hidden" data-tab="checklist">
      Checklists
    </div>
    <div class="prod-tab v2-hidden" data-tab="messages">
      Messages
    </div>
    <div class="prod-tab v2-hidden" data-tab="files">
      Production Files
    </div>
  </nav>
</div>
